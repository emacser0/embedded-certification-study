/* ---------- markdown ---------- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inlineMd(s){
  var out='', re=/!\[([^\]]*)\]\(([^)]+)\)/g, last=0, m;
  while((m=re.exec(s))){
    out += esc(s.slice(last,m.index));
    out += '<img alt="'+esc(m[1])+'" src="'+m[2]+'">';
    last = re.lastIndex;
  }
  out += esc(s.slice(last));
  return out;
}
/* 노트/해설 전용 리치 인라인: 굵게(**), 인라인 코드(`). 문제 보기엔 미적용(C 포인터 코드 보호) */
function inlineRich(s){
  return inlineMd(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
}
function mdToHtmlWith(md, inl){
  if(!md) return '';
  var lines = String(md).replace(/\r/g,'').split('\n'), i=0, html='';
  while(i<lines.length){
    var line=lines[i];
    if(/^```/.test(line)){
      var lang=line.slice(3).trim(), buf=[]; i++;
      while(i<lines.length && !/^```/.test(lines[i])){buf.push(lines[i]);i++;}
      i++;
      html+='<pre><code>'+esc(buf.join('\n'))+'</code></pre>';
    } else if(/^\s*\|.*\|\s*$/.test(line)){
      var rows=[];
      while(i<lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){
        rows.push(lines[i].trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(function(c){return c.trim();}));
        i++;
      }
      var sep = rows.length>1 && rows[1].every(function(c){return /^-+$/.test(c.replace(/\s/g,''));});
      html+='<table>';
      rows.forEach(function(r,ri){
        if(sep && ri===1) return;
        var tag = (sep && ri===0)?'th':'td';
        html+='<tr>'+r.map(function(c){return '<'+tag+'>'+inl(c)+'</'+tag+'>';}).join('')+'</tr>';
      });
      html+='</table>';
    } else if(/^\s*>/.test(line)){
      var buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){buf.push(lines[i].replace(/^\s*>\s?/,''));i++;}
      html+='<blockquote>'+buf.map(inl).join('<br>')+'</blockquote>';
    } else if(/^\s*#{1,6}\s+/.test(line)){
      html+='<div class="md-h">'+inl(line.replace(/^\s*#{1,6}\s+/,''))+'</div>'; i++;
    } else if(/^\s*[-*]\s+/.test(line)){
      var buf=[];
      while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){buf.push(lines[i].replace(/^\s*[-*]\s+/,''));i++;}
      html+='<ul>'+buf.map(function(t){return '<li>'+inl(t)+'</li>';}).join('')+'</ul>';
    } else if(line.trim()===''){
      i++;
    } else {
      var buf=[];
      while(i<lines.length && lines[i].trim()!=='' && !/^```|^\s*\||^\s*>|^\s*#{1,6}\s+|^\s*[-*]\s+/.test(lines[i])){
        buf.push(lines[i]); i++;
      }
      html+='<p>'+buf.map(inl).join('<br>')+'</p>';
    }
  }
  return html;
}
function mdToHtml(md){ return mdToHtmlWith(md, inlineMd); }
function mdRich(md){ return mdToHtmlWith(md, inlineRich); }
/* 해설 평문 → 가독성 마크다운: 정답 강조 + 암기팁 콜아웃 */
function expToMd(t){
  t=String(t||'').trim();
  t=t.replace(/\s*(암기\s*(?:팁|포인트|법)[\s\S]*)$/, function(_,tip){ return '\n\n> 💡 '+tip.trim(); });
  t=t.replace(/((?:따라서\s*)?정답은[^.]*\.)\s*/, '**$1**\n\n');
  return t;
}
function fmtNote(md){ return mdRich(md); }
function fmtExp(text){ return mdRich(expToMd(text)); }

/* ---------- state ---------- */
var S = null; // {list, answers{}, idx, mode, label, submitted}

function $(id){return document.getElementById(id);}
function show(sec){['home','quiz','results','study'].forEach(function(s){$(s).classList.toggle('hide', s!==sec);});}

function goHome(){
  if(S && !S.submitted && Object.keys(S.answers).length>0){
    if(!confirm('진행 중인 시험이 있습니다. 나가시겠습니까?')) return;
  }
  S=null; renderHome(); show('home'); $('topMeta').innerHTML='';
}

function renderHome(){
  var g=$('setGrid'); g.innerHTML='';
  SETS.forEach(function(s){
    var d=document.createElement('div'); d.className='setcard';
    d.onclick=function(){startSet(s.key,s.label);};
    d.innerHTML='<div class="t">'+s.label+'</div><div class="s">총 '+s.count+'문항 · 채점가능 '+s.gradable+'</div>';
    g.appendChild(d);
  });
  var tot=ALL.length, grad=ALL.filter(function(q){return q.ans && q.opts.length>=2;}).length;
  $('statBox').innerHTML='📊 전체 '+tot+'문항 · 채점가능 '+grad+'문항 · '+SETS.length+'개 세트 · 이미지 포함';
  renderHomeExtras();
}

function startSet(key,label){
  var list=ALL.filter(function(q){return q.setKey===key;});
  beginQuiz(list,label,false);
}
function startRandom(n){
  var pool=ALL.filter(function(q){return q.ans && q.opts.length>=2;}).slice();
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  beginQuiz(pool.slice(0,n),'랜덤 모의고사 '+n+'문항',true);
}
function beginQuiz(list,label,shuffled,kind){
  S={list:list, answers:{}, idx:0, mode: $('practiceMode').checked?'practice':'exam',
     label:label, submitted:false, start:Date.now(), kind:kind||'set'};
  // 보기 순서 섞기
  if($('shuffleOpts')&&$('shuffleOpts').checked){
    S.perm={};
    list.forEach(function(q){ if(q.opts&&q.opts.length>1){ S.perm[q.id]=shuffle(q.opts.map(function(_,i){return i;})); } });
  }
  // 실전 제한시간 (실전 모드에서만)
  var tl=$('timeLimit')?Number($('timeLimit').value):0;
  if(S.mode==='exam'&&tl>0){ S.limitSec=tl*60; }
  show('quiz'); renderQ(); startTimer(); saveProgress();
}

/* ---------- quiz render ---------- */
var timer=null;
function startTimer(){
  if(timer) clearInterval(timer);
  timer=setInterval(updMeta,1000); updMeta();
}
function updMeta(){
  if(!S){return;}
  var sec=Math.floor((Date.now()-S.start)/1000);
  var ans=Object.keys(S.answers).length;
  var timeStr;
  if(S.limitSec && !S.submitted){
    var rem=S.limitSec-sec;
    if(rem<=0){
      if(timer)clearInterval(timer);
      S.limitSec=0; S.submitted=true; clearProgress();
      alert('⏰ 제한시간이 종료되어 자동 제출합니다.');
      renderResults(); return;
    }
    var rmm=String(Math.floor(rem/60)).padStart(2,'0'), rss=String(rem%60).padStart(2,'0');
    timeStr='<span style="color:'+(rem<=60?'var(--bad)':'inherit')+';font-weight:700">⏳ '+rmm+':'+rss+'</span>';
  } else {
    var mm=String(Math.floor(sec/60)).padStart(2,'0'), ss=String(sec%60).padStart(2,'0');
    timeStr='⏱ '+mm+':'+ss;
  }
  $('topMeta').innerHTML='<span>'+S.label+'</span><span>'+timeStr+'</span><span>'+ans+' / '+S.list.length+' 답함</span>';
}
function renderQ(){
  var q=S.list[S.idx];
  $('qNo').textContent='Q'+(S.idx+1)+'. ';
  $('qSubj').textContent=q.subjectNorm + (q.tag? ' · '+q.tag : '') + ' · '+q.setLabel+' '+q.num+'번';
  $('qBody').innerHTML=mdToHtml(q.q);
  var sel=S.answers[q.id];
  var revealed = S.submitted || (S.mode==='practice' && sel!=null);
  var oc=$('qOpts'); oc.innerHTML='';
  if(q.opts.length===0){
    oc.innerHTML='<div class="muted small">※ 이 문제의 보기는 위 이미지 안에 표시됩니다 (텍스트 보기 없음).</div>';
  }
  var ord=(S.perm&&S.perm[q.id])?S.perm[q.id]:q.opts.map(function(_,i){return i;});
  ord.forEach(function(origIdx,d){
    var text=q.opts[origIdx]; var n=origIdx+1;
    var div=document.createElement('div'); div.className='opt';
    if(sel===n) div.classList.add('sel');
    if(revealed){
      if(q.ans===n) div.classList.add('correct');
      else if(sel===n) div.classList.add('wrong');
    }
    div.innerHTML='<div class="num">'+CIRC[d]+'</div><div>'+inlineMd(text)+'</div>';
    div.onclick=function(){ if(S.submitted) return;
      if(S.mode==='practice' && S.answers[q.id]!=null) return; // lock after answer in practice
      S.answers[q.id]=n;
      if(S.mode==='practice'){ markResult(q, n===q.ans); recordStat(q, n===q.ans); }
      saveProgress(); renderQ(); renderOMR(); updMeta();
    };
    oc.appendChild(div);
  });
  // feedback
  var fb=$('qFeed'); fb.className='feedback';
  if(revealed && q.ans){
    if(sel===q.ans){ fb.classList.add('show','good'); fb.innerHTML='✅ 정답입니다.'; }
    else if(sel!=null){ fb.classList.add('show','bad'); fb.innerHTML='❌ 오답 · 정답은 '+CIRC[q.ans-1]+' 입니다.'; }
    else { fb.classList.add('show','bad'); fb.innerHTML='⚠ 미응답 · 정답은 '+CIRC[q.ans-1]+' 입니다.'; }
    var ex=expFor(q);
    if(ex) fb.innerHTML+='<div class="expl mdnote">'+(ex.ai?'<div class="exp-h">🤖 AI 해설</div>':'')+fmtExp(ex.text)+'</div>';
  }
  if(revealed && !q.ans){
    fb.classList.add('show'); fb.style.background='var(--panel2)';
    fb.innerHTML='<span class="muted">이 문제는 원본에 정답이 표기되어 있지 않습니다.</span>';
  }
  $('prevBtn').disabled = S.idx===0;
  $('nextBtn').disabled = S.idx===S.list.length-1;
  renderOMR();
  updBmkBtn();
  saveProgress();
}
function renderOMR(){
  var o=$('omr'); o.innerHTML='';
  S.list.forEach(function(q,k){
    var c=document.createElement('div'); c.className='cell';
    c.textContent=k+1;
    if(S.answers[q.id]!=null) c.classList.add('answered');
    if(isBmk(q.id)) c.classList.add('flag');
    if(k===S.idx) c.classList.add('cur');
    if(S.submitted && q.ans){
      c.classList.remove('answered');
      c.classList.add(S.answers[q.id]===q.ans?'ok':'no');
    }
    c.onclick=function(){S.idx=k;renderQ();};
    o.appendChild(c);
  });
}
function move(d){var n=S.idx+d; if(n<0||n>=S.list.length)return; S.idx=n; renderQ();}
function clearAns(){var q=S.list[S.idx]; if(S.mode==='practice'&&S.submitted)return; delete S.answers[q.id]; renderQ(); updMeta();}

/* ---------- submit / results ---------- */
function submitQuiz(){
  var unanswered=S.list.filter(function(q){return q.ans && q.opts.length>=2 && S.answers[q.id]==null;}).length;
  if(unanswered>0 && !confirm('미응답 '+unanswered+'문항이 있습니다. 제출하시겠습니까?')) return;
  S.submitted=true; if(timer)clearInterval(timer);
  clearProgress();
  renderResults();
}
function renderResults(){
  var gradable=S.list.filter(function(q){return q.ans && q.opts.length>=2;});
  gradable.forEach(function(q){
    var correct=S.answers[q.id]===q.ans;
    markResult(q, correct);
    if(S.mode==='exam' && S.answers[q.id]!=null) recordStat(q, correct);
  });
  var correct=gradable.filter(function(q){return S.answers[q.id]===q.ans;}).length;
  var pct = gradable.length? Math.round(correct/gradable.length*100):0;
  // per subject
  var subj={};
  gradable.forEach(function(q){
    var s=q.subjectNorm; subj[s]=subj[s]||{c:0,t:0};
    subj[s].t++; if(S.answers[q.id]===q.ans) subj[s].c++;
  });
  var subjKeys=Object.keys(subj);
  var anyFail=subjKeys.some(function(k){return subj[k].t>=5 && subj[k].c/subj[k].t<0.4;});
  var passed = pct>=60 && !anyFail;
  var sec=Math.floor((Date.now()-S.start)/1000);
  var mm=Math.floor(sec/60), ss=sec%60;
  var color = pct>=60?'var(--ok)':(pct>=40?'var(--warn)':'var(--bad)');
  var html='<div class="row" style="justify-content:space-between;align-items:flex-end">'+
    '<div><div class="muted">'+S.label+'</div><div class="score" style="color:'+color+'">'+pct+'점</div>'+
    '<div class="muted small">'+correct+' / '+gradable.length+' 정답 · 소요 '+mm+'분 '+ss+'초</div></div>'+
    '<div><span class="tag '+(passed?'pass':'fail')+'" style="font-size:15px;padding:6px 14px">'+
       (passed?'합격 예상':'불합격 예상')+'</span></div></div>'+
    '<div class="bar"><i style="width:'+pct+'%;background:'+color+'"></i></div>';
  if(subjKeys.length>1){
    html+='<div style="margin-top:16px"><b>과목별 결과</b> <span class="muted small">(과목 40% 미만 시 과락)</span>';
    subjKeys.forEach(function(k){
      var o=subj[k], p=Math.round(o.c/o.t*100), fail=o.t>=5&&p<40;
      html+='<div class="subjrow"><span>'+k+'</span><span class="row"><span class="muted small">'+o.c+'/'+o.t+'</span>'+
        '<b style="color:'+(p>=60?'var(--ok)':p>=40?'var(--warn)':'var(--bad)')+'">'+p+'%</b>'+
        (fail?'<span class="tag fail">과락</span>':'')+'</span></div>';
    });
    html+='</div>';
  }
  $('scoreCard').innerHTML=html;
  var snw=$('studyNextWrap');
  if(snw){
    if(S.studyCtx){
      var subj2=S.studyCtx.subject, ni=S.studyCtx.idx+1, has=(CONCEPTS[subj2]||[])[ni];
      snw.innerHTML='<button class="btn ok" onclick="studyContinue(\''+jsq(subj2)+'\','+ni+')">'+(has?'📚 다음 개념 학습 ▶':'📚 개념 학습 완료 — 목록으로')+'</button>';
    } else snw.innerHTML='';
  }
  show('results'); renderReview();
  $('topMeta').innerHTML='<span>'+S.label+'</span><span>채점 완료</span>';
}
function renderReview(){
  var wrongOnly=$('wrongOnly').checked, box=$('review'); box.innerHTML='';
  S.list.forEach(function(q,k){
    var sel=S.answers[q.id], ok=(sel===q.ans);
    if(wrongOnly && (ok || !q.ans)) return;
    var d=document.createElement('div'); d.className='card'; d.style.margin='12px 0';
    var head='<div class="qhead"><span class="qno" style="font-size:16px">Q'+(k+1)+'</span>'+
      '<span class="row" style="gap:6px"><span class="chip">'+q.subjectNorm+' · '+q.setLabel+' '+q.num+'번'+
      (q.ans? (ok?' · <span style="color:var(--ok)">정답</span>':' · <span style="color:var(--bad)">오답</span>') : ' · <span class="muted">정답없음</span>')+
      '</span><button class="askbtn" onclick="openAskMenu(event,'+q.id+')" title="AI에게 질문 (GPT/Gemini/Claude)">🤖</button></span></div>';
    var body='<div class="qbody">'+mdToHtml(q.q)+'</div><div class="opts">';
    q.opts.forEach(function(t,oi){
      var n=oi+1, cls='opt';
      if(q.ans===n) cls+=' correct'; else if(sel===n) cls+=' wrong';
      body+='<div class="'+cls+'"><div class="num">'+CIRC[oi]+'</div><div>'+inlineMd(t)+
        (sel===n?' <span class="muted small">(내 선택)</span>':'')+'</div></div>';
    });
    body+='</div>';
    var rex=expFor(q);
    if(rex) body+='<div class="feedback show" style="background:var(--panel2)"><div class="exp-h">'+(rex.ai?'🤖 AI 해설':'해설')+'</div><div class="expl mdnote">'+fmtExp(rex.text)+'</div></div>';
    d.innerHTML=head+body;
    box.appendChild(d);
  });
  if(!box.children.length) box.innerHTML='<div class="muted small" style="padding:10px">표시할 문제가 없습니다. 🎉</div>';
}

/* keyboard */
document.addEventListener('keydown',function(e){
  if($('quiz').classList.contains('hide')||!S||S.submitted) return;
  if(e.key==='ArrowLeft') move(-1);
  else if(e.key==='ArrowRight') move(1);
  else if(['1','2','3','4'].includes(e.key)){
    var q=S.list[S.idx];
    var p=Number(e.key)-1;
    var ord=(S.perm&&S.perm[q.id])?S.perm[q.id]:null;
    var origIdx=ord?ord[p]:p;
    if(origIdx!=null && q.opts.length>origIdx && !(S.mode==='practice'&&S.answers[q.id]!=null)){
      var n=origIdx+1;
      S.answers[q.id]=n;
      if(S.mode==='practice'){ markResult(q, n===q.ans); recordStat(q, n===q.ans); }
      renderQ(); updMeta();
    }
  }
});

applyTheme();
renderHome(); show('home');

/* 서비스 워커 등록: 웹(https)에서 재배포 즉시 반영 + 오프라인. 앱(file://)에선 미등록 */
if('serviceWorker' in navigator && location.protocol==='https:'){
  try{
    var __hadCtrl = !!navigator.serviceWorker.controller;
    navigator.serviceWorker.register('sw.js').then(function(reg){
      reg.addEventListener('updatefound', function(){
        var nw = reg.installing;
        if(nw) nw.addEventListener('statechange', function(){
          // 이미 워커가 제어 중이던 페이지에 새 버전이 활성화되면 1회 새로고침
          if(nw.state==='activated' && __hadCtrl){ location.reload(); }
        });
      });
    })['catch'](function(){});
  }catch(e){}
}

/* KaTeX: 렌더 후 $..$ 수식 변환 */
function __km(el){if(el&&window.renderMathInElement){try{renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}catch(e){}}}
window.__rerenderMath=function(){['quiz','results','study','home'].forEach(function(id){__km(document.getElementById(id));});};
['renderQ','renderReview','showStudy','renderResults'].forEach(function(nm){var o=window[nm];if(typeof o==="function"){window[nm]=function(){var r=o.apply(this,arguments);__km(document.body);return r;};}});
</script>
