<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>건설안전기사 필기 CBT</title>
<style>
  :root{
    --bg:#f1f5f9; --panel:#ffffff; --panel2:#f8fafc; --line:#e2e8f0;
    --txt:#1e293b; --muted:#64748b; --accent:#2563eb; --accent2:#1d4ed8;
    --ok:#16a34a; --bad:#dc2626; --warn:#d97706; --chip:#f1f5f9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:"Malgun Gothic","맑은 고딕",system-ui,-apple-system,sans-serif;line-height:1.6}
  a{color:var(--accent)}
  .wrap{max-width:980px;margin:0 auto;padding:16px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20}
  header.top h1{font-size:17px;margin:0;cursor:pointer}
  .top .meta{font-size:13px;color:var(--muted);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:9px 14px;
    font-size:14px;cursor:pointer;font-weight:600}
  .btn:hover{background:var(--accent2)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .btn.ok{background:var(--ok)} .btn.warn{background:var(--warn);color:#1a1a1a}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .setcard{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;
    cursor:pointer;transition:.15s}
  .setcard:hover{border-color:var(--accent);transform:translateY(-2px)}
  .setcard .t{font-weight:700;font-size:15px}
  .setcard .s{color:var(--muted);font-size:12px;margin-top:6px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .muted{color:var(--muted)} .small{font-size:13px}
  .chip{display:inline-block;background:var(--chip);border:1px solid var(--line);
    border-radius:999px;padding:2px 10px;font-size:12px;color:var(--muted)}
  /* question */
  .qhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
  .qno{font-size:20px;font-weight:800}
  .qbody{font-size:16px;margin:6px 0 14px}
  .qbody img{max-width:100%;background:#fff;border-radius:8px;margin:8px 0;display:block}
  .qbody pre{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;
    overflow:auto;font-size:13px;color:#0f172a}
  .qbody code{font-family:Consolas,monospace}
  .qbody table{border-collapse:collapse;margin:8px 0;font-size:14px;width:auto}
  .qbody th,.qbody td{border:1px solid var(--line);padding:6px 10px;text-align:center}
  .qbody th{background:var(--panel2)}
  .qbody blockquote{margin:8px 0;padding:8px 14px;border-left:3px solid var(--accent);
    background:var(--panel2);border-radius:0 8px 8px 0}
  .qbody ul{margin:8px 0;padding-left:22px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;cursor:pointer;background:var(--panel2);transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt .num{flex:0 0 26px;height:26px;border-radius:50%;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .opt.sel{border-color:var(--accent);background:#dbeafe}
  .opt.sel .num{background:var(--accent);color:#fff;border-color:var(--accent)}
  .opt.correct{border-color:var(--ok);background:#dcfce7}
  .opt.correct .num{background:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:#fee2e2}
  .opt.wrong .num{background:var(--bad);color:#fff}
  .feedback{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:14px;display:none}
  .feedback.show{display:block}
  .feedback.good{background:#dcfce7;border:1px solid var(--ok)}
  .feedback.bad{background:#fee2e2;border:1px solid var(--bad)}
  .expl{margin-top:8px;color:#475569;font-size:13.5px;white-space:pre-wrap}
  /* omr */
  .omr{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .omr .cell{aspect-ratio:1;border:1px solid var(--line);border-radius:7px;background:var(--panel2);
    display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;font-weight:600}
  .omr .cell:hover{border-color:var(--accent)}
  .omr .cell.answered{background:var(--accent);color:#fff;border-color:var(--accent)}
  .omr .cell.cur{outline:2px solid #0f172a;outline-offset:1px}
  .omr .cell.ok{background:var(--ok);color:#fff;border-color:var(--ok)}
  .omr .cell.no{background:var(--bad);color:#fff;border-color:var(--bad)}
  .omr .cell.flag::after{content:"";position:relative}
  .navbtns{display:flex;justify-content:space-between;gap:10px;margin-top:16px}
  /* results */
  .score{font-size:42px;font-weight:900}
  .bar{height:10px;background:var(--panel2);border-radius:999px;overflow:hidden;margin-top:6px}
  .bar>i{display:block;height:100%}
  .subjrow{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:10px 0;border-bottom:1px solid var(--line)}
  .tag{font-size:11px;padding:1px 8px;border-radius:6px}
  .tag.pass{background:#dcfce7;color:var(--ok)} .tag.fail{background:#fee2e2;color:var(--bad)}
  .hide{display:none!important}
  .toggle{display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
  .toggle input{width:16px;height:16px}
  footer{color:var(--muted);font-size:12px;text-align:center;padding:24px}
  @media(max-width:600px){.omr{grid-template-columns:repeat(6,1fr)}}
  /* --- Tier 1 additions --- */
  #themeBtn{padding:7px 10px;font-size:15px;line-height:1}
  .bmk{background:none;border:0;font-size:22px;line-height:1;cursor:pointer;color:#94a3b8;padding:0 2px}
  .bmk.on{color:#f59e0b}
  .askbtn{background:none;border:0;font-size:18px;line-height:1;cursor:pointer;padding:0 2px;opacity:.85}
  .askbtn:hover{opacity:1}
  .askmenu{position:absolute;z-index:70;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.2);padding:6px;min-width:172px}
  .askmenu-h{font-size:11px;color:var(--muted);padding:6px 10px 4px}
  .askmenu button{display:block;width:100%;text-align:left;background:none;border:0;color:var(--txt);
    padding:9px 12px;border-radius:7px;font-size:14px;cursor:pointer}
  .askmenu button:hover{background:var(--panel2)}
  .askmenu-sep{height:1px;background:var(--line);margin:4px 0}
  .concept-title{font-size:21px;font-weight:800;margin:8px 0 4px}
  .concept-note{margin:6px 0}
  .concept-list .setcard .t{font-size:14px}
  /* 리치 노트/해설 렌더링 */
  .exp-h{font-weight:800;margin-bottom:6px;color:var(--txt)}
  .mdnote{white-space:normal;color:var(--txt);font-size:14.5px;line-height:1.8}
  .concept-note.mdnote{font-size:15px}
  .mdnote p{margin:0 0 10px}
  .mdnote p:last-child{margin-bottom:0}
  .mdnote ul{margin:8px 0;padding-left:20px}
  .mdnote li{margin:4px 0}
  .mdnote strong{color:var(--accent2);font-weight:700}
  .mdnote code{background:var(--chip);border:1px solid var(--line);padding:1px 5px;border-radius:5px;
    font-family:Consolas,monospace;font-size:.92em}
  .mdnote .md-h{font-weight:800;font-size:1.02em;margin:14px 0 6px;color:var(--txt)}
  .mdnote blockquote{margin:12px 0 2px;padding:10px 14px;background:var(--panel2);
    border-left:3px solid var(--warn);border-radius:0 8px 8px 0}
  html.dark .mdnote strong{color:#93c5fd}
  .btn.small{padding:6px 11px;font-size:13px}
  #updBar{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--accent);color:#fff;
    padding:12px 16px;display:none;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;
    box-shadow:0 -4px 18px rgba(0,0,0,.2);font-size:14px}
  #updBar.show{display:flex}
  #updBar .btn{background:#fff;color:var(--accent);padding:7px 14px}
  #updBar .btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.6)}
  #updBar .muted{color:#dbeafe;font-size:12px}
  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:#0f172a;color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;
    opacity:0;pointer-events:none;transition:.2s;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.25)}
  #toast.show{opacity:.96;transform:translateX(-50%) translateY(0)}
  .card.resume{border-color:var(--accent);background:linear-gradient(0deg,var(--panel),var(--panel))}
  .omr .cell.flag{position:relative}
  .omr .cell.flag::after{content:"";position:absolute;top:3px;right:3px;width:6px;height:6px;
    border-radius:50%;background:#f59e0b;box-shadow:0 0 0 1px var(--panel)}
  /* dark theme */
  html.dark{
    --bg:#0f172a; --panel:#1e293b; --panel2:#172033; --line:#334155;
    --txt:#e2e8f0; --muted:#94a3b8; --accent:#3b82f6; --accent2:#2563eb;
    --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b; --chip:#0b1220;
  }
  html.dark .opt.sel{background:#1e3a5f}
  html.dark .opt.correct{background:#14331f}
  html.dark .opt.wrong{background:#3b1717}
  html.dark .feedback.good{background:#14331f}
  html.dark .feedback.bad{background:#3b1717}
  html.dark .qbody pre,html.dark .qbody code{background:#0b1220;color:#e2e8f0}
  html.dark .qbody img{background:#e2e8f0}
  html.dark .tag.pass{background:#14331f} html.dark .tag.fail{background:#3b1717}
  .katex{font-size:1.05em}
  .qbody .katex-display{margin:8px 0}
  .backsel{padding:7px 11px;font-size:13px;text-decoration:none;white-space:nowrap}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js">
/* KaTeX: 렌더 후 $..$ 수식 변환 */
function __km(el){if(el&&window.renderMathInElement){try{renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}catch(e){}}}
window.__rerenderMath=function(){['quiz','results','study','home'].forEach(function(id){__km(document.getElementById(id));});};
['renderQ','renderReview','showStudy','renderResults'].forEach(function(nm){var o=window[nm];if(typeof o==="function"){window[nm]=function(){var r=o.apply(this,arguments);__km(document.body);return r;};}});
</script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" onload="window.__katexReady=true;window.__rerenderMath&&window.__rerenderMath();">
/* KaTeX: 렌더 후 $..$ 수식 변환 */
function __km(el){if(el&&window.renderMathInElement){try{renderMathInElement(el,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}catch(e){}}}
window.__rerenderMath=function(){['quiz','results','study','home'].forEach(function(id){__km(document.getElementById(id));});};
['renderQ','renderReview','showStudy','renderResults'].forEach(function(nm){var o=window[nm];if(typeof o==="function"){window[nm]=function(){var r=o.apply(this,arguments);__km(document.body);return r;};}});
</script>
</head>
<body>
<header class="top">
  <a href="index.html" class="btn ghost backsel" title="종목 선택으로">← 종목</a>
  <h1 onclick="goHome()">🦺 건설안전기사 필기 CBT</h1>
  <div class="meta" id="topMeta"></div>
  <button class="btn ghost" id="themeBtn" onclick="toggleTheme()" title="다크 모드 전환">🌙</button>
</header>

<div class="wrap">
  <!-- HOME -->
  <section id="home">
    <div id="resumeBox"></div>
    <div id="studyHomeBox"></div>
    <div id="reviewBox"></div>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div><b>회차를 선택하세요</b> <span class="muted small">— 연도별 기출 / 2025 복원본</span></div>
        <label class="toggle small"><input type="checkbox" id="practiceMode" checked> 연습 모드(즉시 정답 확인)</label>
      </div>
      <div class="row small" style="gap:18px;margin-top:10px;flex-wrap:wrap">
        <label class="toggle"><input type="checkbox" id="shuffleOpts"> 보기 순서 섞기</label>
        <label class="toggle">⏱ 실전 제한시간
          <select id="timeLimit" style="padding:5px 8px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);color:var(--txt)">
            <option value="0">없음</option><option value="30">30분</option><option value="60">60분</option><option value="90">90분</option><option value="120">120분</option>
          </select>
        </label>
        <span class="muted" style="font-size:12px">제한시간은 실전 모드(연습 해제)에서 적용</span>
      </div>
      <div class="grid" id="setGrid" style="margin-top:14px"></div>
    </div>
    <div id="tier2Box"></div>
    <div class="card">
      <b>🎲 랜덤 모의고사</b>
      <div class="muted small" style="margin:6px 0 12px">전체 문제에서 무작위로 출제 (정답이 있는 문제만)</div>
      <div class="row">
        <button class="btn" onclick="startRandom(20)">20문항</button>
        <button class="btn" onclick="startRandom(40)">40문항</button>
        <button class="btn" onclick="startRandom(80)">80문항</button>
      </div>
    </div>
    <div class="card small muted" id="statBox"></div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hide">
    <div class="card">
      <div class="qhead">
        <span class="qno" id="qNo"></span>
        <span class="row" style="gap:8px">
          <span class="chip" id="qSubj"></span>
          <button class="askbtn" id="askBtn" onclick="openAskMenu(event)" title="AI에게 질문 (GPT/Gemini/Claude)">🤖</button>
          <button class="bmk" id="bmkBtn" onclick="toggleBookmark()" title="북마크 추가/해제">☆</button>
        </span>
      </div>
      <div class="qbody" id="qBody"></div>
      <div class="opts" id="qOpts"></div>
      <div class="feedback" id="qFeed"></div>
      <div class="navbtns">
        <button class="btn ghost" id="prevBtn" onclick="move(-1)">◀ 이전</button>
        <div class="row">
          <button class="btn ghost" onclick="clearAns()">선택해제</button>
          <button class="btn ghost" onclick="goHome()">나가기</button>
        </div>
        <button class="btn" id="nextBtn" onclick="move(1)">다음 ▶</button>
      </div>
    </div>
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:10px">
        <b>답안지(OMR)</b>
        <button class="btn warn" onclick="submitQuiz()">제출 / 채점</button>
      </div>
      <div class="omr" id="omr"></div>
    </div>
  </section>

  <!-- STUDY (개념 학습) -->
  <section id="study" class="hide">
    <div id="studyBox"></div>
  </section>

  <!-- RESULTS -->
  <section id="results" class="hide">
    <div class="card" id="scoreCard"></div>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <b>📑 문제 리뷰</b>
        <label class="toggle small"><input type="checkbox" id="wrongOnly" onchange="renderReview()"> 틀린 문제만</label>
      </div>
      <div id="review"></div>
    </div>
    <div id="studyNextWrap" class="row" style="justify-content:center;margin:4px 0"></div>
    <div class="row" style="justify-content:center;margin:10px 0;gap:10px">
      <button class="btn warn" onclick="retryWrong()">🔁 틀린 문제만 다시 풀기</button>
      <button class="btn" onclick="goHome()">처음으로</button>
    </div>
  </section>
</div>

022,"subjectNorm":"건설시공학","num":71,"ans":1,"exp":"","tag":"","q":"시방서 및 설계도면 등이 서로 상이할 때의 우선순위에 대한 설명으로 옳지 않은 것은?","opts":["설계도면과 공사시방서가 상이할 때는 설계도면을 우선한다.","설계도면과 내역서가 상이할 때는 설계도면을 우선한다.","표준시방서와 전문시방서가 상이할 때는 전문시방서를 우선한다.","설계도면과 상세도면이 상이할 때는 상세도면을 우선한다."]},{"id":5071,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설시공학","num":72,"ans":3,"exp":"","tag":"","q":"예정가격 범위 내에서 최저가격으로 입찰한 자를 낙찰자로 선정하는 낙찰자 선정 방식은?","opts":["최적격 낙찰제","제한적 최저가 낙찰제","최저가 낙찰제","적격 심사 낙찰제"]},{"id":5072,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설시공학","num":73,"ans":1,"exp":"","tag":"","q":"설계도와 시방서가 명확하지 않거나 설계는 명확하지만 공사비 총액을 산출하기 곤란하고 발주자가 양질의 공사를 기대할 때 채택될 수 있는 가장 타당한 도급방식은?","opts":["실비정산 보수가산식 도급","단가 도급","정액 도급","턴키 도급"]},{"id":5073,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설시공학","num":74,"ans":1,"exp":"","tag":"","q":"철근공사에 대하여 옳지 않은 것은?","opts":["조립용 철근은 철근을 구부리기 할 때 철근의 위치를 확보하기 위하여 쓰는 보조적인 철근이다.","철근의 용접부에 순간최대풍속 2.7m/s 이상의 바람이 불 때는 철근을 용접할 수 없으며, 풍속을 2.7m/s 이하로 저감시킬 수 있는 방풍시설을 설치하는 경우에만 용접할 수 있다.","가스압접이음은 철근의 단면을 산소-아세틸렌 불꽃 등을 사용하여 가열하고 기계적 압력을 가하여 용접한 맞대이음을 말한다.","D35를 초과하는 철근은 겹침이음을 할 수 없다. 다만, 서로 다른 크기의 철근을 압축부에서 겹침이음하는 경우 D35 이하의 철근과 D35를 초과하는 철근은 겹침이음을 할 수 있다."]},{"id":5074,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설시공학","num":75,"ans":1,"exp":"","tag":"","q":"철골공사의 용접접합에서 플럭스(flux)를 옳게 설명한 것은?","opts":["용접 시 용접봉의 피복제 역할을 하는 분말상의 재료","압연강판의 층 사이에 균열이 생기는 현상","용접작업의 종단부에 임시로 붙이는 보조판","용접부에 생기는 미세한 구멍"]},{"id":5075,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설시공학","num":76,"ans":3,"exp":"","tag":"","q":"착공단계에서의 공사계획을 수립할 때 우선 고려하지 않아도 되는 것은?","opts":["현장 직원의 조직편성","예정 공정표의 작성","유지관리지침서의 변경","실행예산편성"]},{"id":5076,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설시공학","num":77,"ans":4,"exp":"","tag":"","q":"AE콘크리트에 관한 설명으로 옳은 것은?","opts":["공기량은 기계비빔이 손비빔의 경우보다 적다.","공기량은 비벼놓은 시간이 길수록 증가한다.","공기량은 AE제의 양이 증가할수록 감소하나 콘크리트의 강도는 증대한다.","시공연도가 증진되고 재료분리 및 블리딩이 감소한다."]},{"id":5077,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설시공학","num":78,"ans":4,"exp":"","tag":"","q":"콘크리트의 고강도화와 관계가 적은 것은?","opts":["물시멘트비를 작게 한다.","시멘트의 강도를 크게 한다.","폴리머(polymer)를 함침(含浸)한다.","골재의 입자분포를 가능한 한 균일 입자분포로 한다."]},{"id":5078,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설시공학","num":79,"ans":1,"exp":"","tag":"","q":"벽돌쌓기법 중에서 마구리를 세워 쌓는 방식으로 옳은 것은?","opts":["옆세워 쌓기","허튼 쌓기","영롱 쌓기","길이 쌓기"]},{"id":5079,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설시공학","num":80,"ans":4,"exp":"","tag":"","q":"바닥판 거푸집의 구조계산 시 고려해야 하는 연직하중에 해당하지 않는 것은?","opts":["작업하중","충격하중","고정하중","굳지 않은 콘크리트의 측압"]},{"id":5080,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":81,"ans":2,"exp":"","tag":"","q":"플라이애시시멘트에 대한 설명으로 옳은 것은?","opts":["수화할 때 불용성 규산칼슘 수화물을 생성한다.","화력발전소 등에서 완전 연소한 미분탄의 회분과 포틀랜드시멘트를 혼합한 것이다.","재령 1~2시간 안에 콘크리트 압축강도가 20MPa에 도달할 수 있다.","용광로의 선철제작 부산물을 급랭시키고 파쇄하여 시멘트와 혼합한 것이다."]},{"id":5081,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":82,"ans":3,"exp":"","tag":"","q":"건축용 접착제로서 요구되는 성능에 해당되지 않는 것은?","opts":["진동, 충격의 반복에 잘 견딜 것","취급이 용이하고 독성이 없을 것","장기부하에 의한 크리프가 클 것","고화 시 체적수축 등에 의한 내부변형을 일으키지 않을 것"]},{"id":5082,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":83,"ans":2,"exp":"","tag":"","q":"골재의 함수상태에서 유효흡수량의 정의로 옳은 것은?","opts":["습윤상태와 절대건조상태의 수량의 차이","표면건조포화상태와 기건상태의 수량의 차이","기건상태와 절대건조상태의 수량의 차이","습윤상태와 표면건조포화상태의 수량의 차이"]},{"id":5083,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":84,"ans":4,"exp":"","tag":"","q":"도장재료 중 물이 증발하여 수지입자가 굳는 융착건조경화를 하는 것은?","opts":["알키드수지 도료","애폭시수지 도료","불소수지 도료","합성수지 에멀션 페인트"]},{"id":5084,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":85,"ans":2,"exp":"","tag":"","q":"목재의 역학적 성질에 대한 설명으로 옳지 않은 것은?","opts":["목재 섬유 평행방향에 대한 인장강도가 다른 여러 강도 중 가장 크다.","목재의 압축강도는 옹이가 있으면 증가한다.","목재를 휨부재로 사용하여 외력에 저항할 때는 압축, 인장, 전단력이 동시에 일어난다.","목재의 전단강도는 섬유 간의 부착력, 섬유의 곧음, 수선의 유무 등에 의해 결정된다."]},{"id":5085,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":86,"ans":1,"exp":"","tag":"","q":"합판에 대한 설명으로 옳지 않은 것은?","opts":["단판을 섬유방향이 서로 평행하도록 홀수로 적층 하면서 접착시켜 합친 판을 말한다.","함수율 변화에 따라 팽창·수축의 방향성이 없다.","뒤틀림이나 변형이 적은 비교적 큰 면적의 평면 재료를 얻을 수 있다.","균일한 강도의 재료를 얻을 수 있다."]},{"id":5086,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":87,"ans":3,"exp":"","tag":"","q":"미장바탕의 일반적인 성능조건과 가장 거리가 먼 것은?","opts":["미장층보다 강도가 클 것","미장층과 유효한 접착강도를 얻을 수 있을 것","미장층보다 강성이 작을 것","미장층의 경화, 건조에 지장을 주지 않을 것"]},{"id":5087,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":88,"ans":2,"exp":"","tag":"","q":"절대건조밀도가 $2.6g/cm^3$이고, 단위용적질량이 $1750kg/m^3$인 굵은 골재의 공극률은?","opts":["30.5%","32.7%","34.7%","36.2%"]},{"id":5088,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":89,"ans":4,"exp":"","tag":"","q":"목재의 내연성 및 방화에 대한 설명으로 옳지 않은 것은?","opts":["목재의 방화는 목재 표면에 불연소성 피막을 도포 또는 형성시켜 화염의 접근을 방지하는 조치를 한다.","방화재로는 방화페인트, 규산나트륨 등이 있다.","목재가 열에 닿으면 먼저 수분이 증발하고 160℃ 이상이 되면 소량의 가연성가스가 유출된다.","목재는 450℃에서 장시간 가열하면 자연발화 하게 되는데, 이 온도를 화재위험온도라고 한다."]},{"id":5089,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":90,"ans":3,"exp":"","tag":"","q":"금속의 부식방지를 위한 관리대책으로 옳지 않은 것은?","opts":["부분적으로 녹이 발생하면 즉시 제거할 것","큰 변형을 준 것은 가능한 한 풀림하여 사용할 것","가능한 한 이종 금속을 인접 또는 접촉시켜 사용할 것","표면을 평활하고 깨끗이 하며, 가능한 한 건조상태로 유지할 것"]},{"id":5090,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":91,"ans":3,"exp":"","tag":"","q":"다음의 미장재료 중 균열저항성이 가장 큰 것은?","opts":["회반죽 바름","소석고 플라스터","경석고 플라스터","돌로마이트 플라스터"]},{"id":5091,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":92,"ans":1,"exp":"","tag":"","q":"점토의 물리적 성질에 관한 설명으로 옳지 않은 것은?","opts":["점토의 인장강도는 압축강도의 약 5배 정도이다.","입자의 크기는 보통 2µm 이하의 미립자지만 모래알 정도의 것도 약간 포함되어 있다.","공극률은 점토의 입자 간에 존재하는 모공용적으로 입자의 형상, 크기에 관계한다.","점토입자가 미세하고, 양지의 점토일수록 가소성이 좋으나, 가소성이 너무 클 때는 모래 또는 샤모트를 섞어서 조절한다."]},{"id":5092,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":93,"ans":4,"exp":"","tag":"","q":"일반 콘크리트 대비 ALC의 우수한 물리적 성질로서 옳지 않은 것은?","opts":["경량성","단열성","흡음·차음성","수밀성, 방수성"]},{"id":5093,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":94,"ans":2,"exp":"","tag":"","q":"콘크리트 바탕에 이음새 없는 방수 피막을 형성하는 공법으로, 도료 상태의 방수재를 여러 번 칠하여 방수막을 형성하는 방수공법은?","opts":["아스팔트 루핑 방수","합성고분자 도막 방수","시멘트 모르타르 방수","규산질 침투성 도포 방수"]},{"id":5094,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":95,"ans":3,"exp":"","tag":"","q":"열경화성수지가 아닌 것은?","opts":["페놀수지","요소수지","아크릴수지","멜라민수지"]},{"id":5095,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":96,"ans":1,"exp":"","tag":"","q":"블로운 아스팔트(blown asphalt)를 휘발성 용제에 녹이고 광물분말 등을 가하여 만든 것으로 방수, 접합부 충전 등에 쓰이는 아스팔트 제품은?","opts":["아스팔트 코팅(asphalt coating)","아스팔트 그라우트(asphalt grout)","아스팔트 시멘트(asphalt cement)","아스팔트 콘크리트(asphalt concrete)"]},{"id":5096,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":97,"ans":1,"exp":"","tag":"","q":"연강판에 일정한 간격으로 그물눈을 내고 늘여 철망 모양으로 만든 것으로 옳은 것은?","opts":["메탈라스(metal lath)","와이어메시(wire mesh)","인서트(insert)","코너비드(comer bead)"]},{"id":5097,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":98,"ans":2,"exp":"","tag":"","q":"고로슬래그 쇄석에 대한 설명으로 옳지 않은 것은?","opts":["철을 생산하는 과정에서 용광로에서 생기는 광재를 공기 중에서 서서히 냉각시켜 경화된 것을 파쇄하여 만든다.","투수성은 보통골재의 경우보다 작으므로 수밀콘크리트에 적합하다.","고로슬래그 쇄석을 활용한 콘크리트는 다른 암석을 사용한 콘크리트보다 건조수축이 적다.","다공질이기 때문에 흡수율이 크므로 충분히 살수하여 사용하는 것이 좋다."]},{"id":5098,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":99,"ans":4,"exp":"","tag":"","q":"점토제품 중 소성온도가 가장 고온이고 흡수성이 매우 작으며 모자이크 타일, 위생도기 등에 주로 쓰이는 것은?","opts":["토기","도기","석기","자기"]},{"id":5099,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설재료학","num":100,"ans":1,"exp":"","tag":"","q":"목재에 사용되는 크레오소트 오일에 대한 설명으로 옳지 않은 것은?","opts":["냄새가 좋아서 실내에서도 사용이 가능하다.","방부력이 우수하고 가격이 저렴하다.","독성이 적다.","침투성이 좋아 목재에 깊게 주입된다."]},{"id":5100,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설안전기술","num":101,"ans":2,"exp":"","tag":"","q":"건설업의 공사금액이 850억 원일 경우 산업안전보건법령에 따른 안전관리자의 수로 옳은 것은? (단, 전체 공사기간을 100으로 할 때 공사 전·후 15에 해당하는 경우는 고려하지 않는다.)","opts":["1명 이상","2명 이상","3명 이상","4명 이상"]},{"id":5101,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설안전기술","num":102,"ans":1,"exp":"","tag":"","q":"건설현장에 거푸집동바리 설치 시 준수사항으로 옳지 않은 것은?","opts":["파이프서포트 높이가 4.5m를 초과하는 경우에는 높이 2m 이내마다 2개 방향으로 수평 연결재를 설치한다.","동바리의 침하 방지를 위해 깔목의 사용, 콘크리트 타설, 말뚝박기 등을 실시한다.","강재와 강재의 접속부는 볼트 또는 클램프 등 전용철물을 사용한다.","강관틀 동바리는 강관틀과 강관틀 사이에 교차가새를 설치한다."]},{"id":5102,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설안전기술","num":103,"ans":2,"exp":"","tag":"","q":"가설통로를 설치하는 경우 준수해야 할 기준으로 옳지 않은 것은?","opts":["경사는 30° 이하로 할 것","경사가 25°를 초과하는 경우에는 미끄러지지 아니하는 구조로 할 것","건설공사에 사용하는 높이 8m 이상인 비계다리에는 7m 이내마다 계단참을 설치할 것","수직갱에 가설된 통로의 길이가 15m 이상인 때에는 10m 이내마다 계단참을 설치할 것"]},{"id":5103,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설안전기술","num":104,"ans":1,"exp":"","tag":"","q":"항타기 또는 항발기의 사용 시 준수사항으로 옳지 않은 것은?","opts":["증기나 공기를 차단하는 장치를 작업관리자가 쉽게 조작할 수 있는 위치에 설치한다.","해머의 운동에 의하여 증기호스 또는 공기호스와 해머의 접속부가 파손되거나 벗겨지는 것을 방지하기 위하여 그 접속부가 아닌 부위를 선정하여 증기호스 또는 공기호스를 해머에 고정시킨다.","항타기나 항발기의 권상장치의 드럼에 권상용 와이어로프가 꼬인 경우에는 와이어로프에 하중을 걸어서는 안 된다.","항타기나 항발기의 권상장치에 하중을 건 상태로 정지하여 두는 경우에는 쐐기장치 또는 역회전방지용 브레이크를 사용하여 제동하는 등 확실하게 정지시켜 두어야 한다."]},{"id":5104,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설안전기술","num":105,"ans":4,"exp":"","tag":"","q":"가설공사 표준안전 작업지침에 따른 통로발판을 설치하여 사용함에 있어 준수사항으로 옳지 않은 것은?","opts":["추락의 위험이 있는 곳에는 안전난간이나 철책을 설치하여야 한다.","작업발판의 최대폭은 1.6m 이내이어야 한다.","비계발판의 구조에 따라 최대 적재하중을 정하고 이를 초과하지 않도록 하여야 한다.","발판을 겹쳐 이음하는 경우 장선 위에서 이음을 하고 겹침길이는 10cm 이상으로 하여야 한다."]},{"id":5105,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설안전기술","num":106,"ans":3,"exp":"","tag":"","q":"토사붕괴에 따른 재해를 방지하기 위한 흙막이 지보공 부재로 옳지 않은 것은?","opts":["흙막이판","말뚝","턴버클","띠장"]},{"id":5106,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설안전기술","num":107,"ans":4,"exp":"","tag":"","q":"토자 붕괴 원인으로 옳지 않은 것은?","opts":["경사 및 기울기 증가","성토높이의 증가","건설기계 등 하중작용","토사중량의 감소"]},{"id":5107,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설안전기술","num":108,"ans":2,"exp":"","tag":"","q":"이동식 비계를 조립하여 작업을 하는 경우의 준수기준으로 옳지 않은 것은?","opts":["비계의 최상부에서 작업을 할 때에는 안전난간을 설치하여야 한다.","작업발판의 최대적재하중은 40kg을 초과하지 않도록 한다.","승강용 사다리는 견고하게 설치하여야 한다.","작업발판은 항상 수평을 유지하고 작업발판 위에서 안전난간을 딛고 작업을 하거나 받침대 또는 사다리를 사용하여 작업하지 않도록 한다."]},{"id":5108,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설안전기술","num":109,"ans":3,"exp":"","tag":"","q":"건설용 리프트의 붕괴 등을 방지하기 위해 받침의 수를 증가 시키는 등 안전조치를 하여야 하는 순간풍속 기준은?","opts":["초당 15미터 초과","초당 25미터 초과","초당 35미터 초과","초당 45미터 초과"]},{"id":5109,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설안전기술","num":110,"ans":4,"exp":"","tag":"","q":"건설작업용 타워크레인의 안전장치로 옳지 않은 것은?","opts":["권과 방지장치","과부하 방지장치","비상정지 장치","호이스트 스위치"]},{"id":5110,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설안전기술","num":111,"ans":4,"exp":"","tag":"","q":"달비계에 사용하는 와이어로프의 사용금지 기준으로 옳지 않은 것은?","opts":["이음매가 있는 것","열과 전기 충격에 의해 손상된 것","지름의 감소가 공칭지름의 7%를 초과하는 것","와이어로프의 한 꼬임에서 끊어진 소선의 수가 7% 이상인 것"]},{"id":5111,"setKey":"gc20220424","setLabel":"2022-04-24","year":2022,"subjectNorm":"건설안전기술","num":112,"ans":3,"exp":"","tag":"","q":"건설업 산업안전보건관리비 계상 및 사용기준은 산업재해보상보험법의 적용을 받는 공사 중 총 공사금액이 얼마 이상인 공사에 적용하는가? (단, 전기공사업법, 정보통신공사업법에 의한 공사는 제외)","opts":["4천만 원","3천만 원","2천만 원","1천만 원"]},{"id":5112,"setKey":"g var AI_EXP = {"5000":"산업안전보건법 시행규칙에 따르면 안전보건관리규정을 작성해야 할 사유가 발생한 날부터 30일 이내에 안전보건관리규정을 작성하여야 하며, 변경 사유가 발생한 경우에도 동일하게 30일 이내에 변경하여야 한다. 안전보건관리규정에는 안전·보건 관리조직과 직무, 안전·보건교육, 작업장 안전·보건관리, 사고조사 및 대책수립 등에 관한 사항이 포함된다. 따라서 정답은 30일인 3번이며, 7일·14일·60일은 법령상 근거가 없는 수치이다.","5001":"산업안전보건법 시행령 별표3에 따라 안전관리자를 2명 이상 선임해야 하는 사업은 일정 규모 이상의 제조업·발전업 등으로, 식료품 제조업은 상시근로자 500명 이상, 발전업은 상시근로자 500명 이상이면 2명 이상을 선임한다. 통신업은 상시근로자 1000명 이상일 때 2명 이상을 선임하므로 500명 규모에서는 1명만 선임하면 되어 정답은 1번이다. 건설업은 공사금액 800억원 이상(또는 상시근로자 600명 이상)이고 일정 공정률 구간(15~85%)에서 2명 이상을 선임하므로 1000억·공정률 20%는 2명 대상에 해당한다. 따라서 2인 이상 선임 대상이 아닌 것은 통신업 500명인 1번이다.","5002":"산업재해보상보험법 제36조상 보험급여의 종류는 요양급여, 휴업급여, 장해급여, 간병급여, 유족급여, 상병보상연금, 장례비, 직업재활급여로 규정되어 있다. 보기 중 장례비(ㄱ), 요양급여(ㄴ), 간병급여(ㄷ), 직업재활급여(ㅁ)는 모두 법정 보험급여에 해당하므로 정답은 2번이다. 영업손실비용(ㄹ)은 사업주의 간접손실에 해당하는 개념일 뿐 산재보험 보험급여 항목이 아니므로 제외된다.","5003":"라인(line)형 조직은 안전관리에 관한 명령과 지시가 생산라인을 통해 직접 전달되어 안전조치 실시가 신속하다는 장점이 있으나, 안전 전문 스태프가 없어 안전에 관한 정보·기술이 불충분한 단점이 있으므로 3번이 옳다. 라인형은 보통 100명 이하의 소규모 사업장에 적합하고, 스태프형은 100~1000명 정도의 중규모, 라인·스태프 혼합형은 1000명 이상 대규모에 적합하다. 라인·스태프형은 라인의 신속성과 스태프의 전문성을 모두 갖춘 형태로 전원의 참여가 가능하므로 4번의 자율적 참여 불가능 설명은 틀리다.","5004":"재해예방 3E 대책 중 기술적 대책(Engineering)은 설계·설비·환경 등 하드웨어적 개선을 의미하여 작업행정(공정)의 개선, 환경설비 개선, 점검·보존 확립 등이 이에 속한다. 반면 안전수칙의 준수는 교육·훈련을 통해 사람의 행동을 변화시키는 것으로 교육적 대책(Education) 또는 독려·규제적 대책(Enforcement)에 해당하므로 기술적 대책이 아니다. 따라서 정답은 4번이다.","5005":"산업안전보건법 제24조상 산업안전보건위원회의 심의·의결 사항에는 산업재해 예방계획 수립, 안전보건관리규정 작성·변경, 안전보건교육, 작업환경측정 등 작업환경 점검·개선, 근로자 건강진단 등 건강관리, 산업재해 통계 기록·유지, 중대재해 원인조사 및 재발방지대책 수립 등이 포함된다. 안전장치 및 보호구 구입 시 적격품 여부 확인은 안전보건관리책임자의 업무이자 안전관리자의 직무에 해당할 뿐 위원회의 심의·의결 사항으로 규정되어 있지 않으므로 정답은 3번이다.","5006":"산업안전보건법상 안전보건표지 색채에서 파란색은 지시의 의미로 사용되며 특정 행위의 지시 및 사실의 고지를 나타내므로 정답은 4번이다. 빨간색은 금지·경고(정지신호 포함), 노란색은 경고(주의표지), 녹색은 안내, 흰색은 바탕·문자, 검은색은 문자·화살표에 사용된다. 따라서 보호구 착용 지시 등 파란색 원형 표지가 특정 행위의 지시에 해당한다.","5007":"시설물의 안전 및 유지관리에 관한 특별법령상 안전등급이 우수한 A등급 시설물은 정기안전점검을 반기에 1회 이상 실시하고, 정밀안전진단은 6년에 1회 이상 실시하도록 규정되어 있어 정답은 2번이다. 등급이 낮아질수록(B·C등급, D·E등급) 점검 주기가 짧아지며 정기안전점검은 1년에 2~3회, 정밀안전진단도 4~6년 주기로 차등 적용된다. 따라서 ㄱ은 반기, ㄴ은 6년이다.","5008":"기인물은 재해를 가져오게 한 근원이 된 기계·장치·물질 등 불안전한 상태의 원인 물체이고, 가해물은 직접 사람에게 접촉하여 상해를 입힌 물체이다. 이 사례에서 걸려 넘어지게 한 근원은 바닥에 쌓여 있던 자재이므로 기인물은 자재이고, 넘어지면서 머리를 직접 부딪쳐 상해를 입힌 물체는 바닥이므로 가해물은 바닥이다. 따라서 정답은 1번이다.","5009":"산업재해통계업무처리규정상 사망자수는 근로복지공단의 유족급여가 지급된 사망자를 기준으로 하되, 사업장 밖의 교통사고·체육행사·폭력행위 및 통상의 출퇴근에 의한 사망 등은 업무상 사망에서 제외한다. 따라서 통상의 출퇴근에 의한 사망을 포함한다고 한 3번 설명이 틀려 정답이 된다. 총요양근로손실일수는 재해자의 총 요양기간 합산, 휴업재해자수는 휴업급여 수급 재해자(체육행사 재해 제외), 재해자수는 유족급여 지급 사망자 및 요양승인자를 의미한다는 나머지 설명은 옳다.","5010":"건설업 산업안전보건관리비 사용기준상 전담 안전·보건관리자의 인건비(ㄱ), 현장 내 안전보건 교육장 설치비용(ㄴ), 유해·위험방지계획서 작성비용(ㄹ), 재해예방전문지도기관에 지급하는 기술지도 비용(ㅁ)은 모두 안전보건관리비로 사용할 수 있어 정답은 2번이다. 반면 전기사업법에 따른 전기안전 대행비용(ㄷ)은 다른 법령에서 의무화한 비용으로 안전보건관리비 사용이 불가능한 항목이다. 안전보건관리비는 근로자 보호를 위한 안전시설·보호구·교육·관리비 등에만 사용해야 한다.","5011":"위험예지훈련(KYT) 4라운드 중 제시된 설명은 위험요인을 찾아낸 뒤 그중 가장 위험한 항목을 합의하여 결정하는 단계이므로 본질추구(2R)에 해당하여 정답은 2번이다. 1R 현상파악은 어떤 위험이 잠재하는지 모든 위험요인을 발견하는 단계, 2R 본질추구는 가장 중요한 위험포인트를 합의로 결정하는 단계, 3R 대책수립은 구체적 대책을 세우는 단계, 4R 목표설정(행동목표)은 실천할 중점 실시항목을 합의로 정하는 단계이다.","5012":"산업안전보건법 시행령상 안전검사 대상 기계·기구에는 프레스, 전단기, 크레인(정격하중 2톤 이상), 리프트, 압력용기, 곤돌라, 국소배기장치(이동식 제외), 원심기, 롤러기, 사출성형기, 고소작업대, 컨베이어, 산업용 로봇 등이 있다. 국소배기장치는 이동식을 제외한 것만 안전검사 대상이므로 이동식 국소 배기장치는 대상이 아니어서 정답은 4번이다. 리프트·압력용기·컨베이어는 모두 안전검사 대상이다.","5013":"산업안전보건법 제57조 및 시행규칙상 산업재해 발생 시 사업주가 기록·보존해야 하는 사항은 사업장의 개요 및 근로자의 인적사항, 재해 발생 일시 및 장소, 재해 발생의 원인 및 과정, 재해 재발방지 계획이다. 안전관리자 선임에 관한 사항은 산업재해 기록·보존 의무 항목에 포함되지 않으므로 정답은 4번이다. 이러한 기록은 3년간 보존하여야 한다.","5014":"강도율은 연근로시간 1000시간당 근로손실일수로 강도율=(총요양근로손실일수/연근로총시간수)×1000으로 계산한다. 연근로총시간수는 상시근로자수×연근로시간수=1200×2400=2,880,000시간이고, 강도율이 7.5이므로 총요양근로손실일수=강도율×연근로총시간수/1000=$\\frac{7.5\\times2880000}{1000}=21600$일이 되어 정답은 4번이다. 도수율 10.5는 본 계산에 직접 사용되지 않는 함정 조건이다.","5015":"재해의 기본원인 4M은 인간관계·인적요인을 뜻하는 Man, 기계·설비의 결함을 뜻하는 Machine, 작업방법·환경·정보를 뜻하는 Media, 관리·감독·교육을 뜻하는 Management로 구성되므로 정답은 2번이다. Maker나 Material은 4M 구성요소가 아니다. 4M은 재해 발생의 4가지 기본 요인을 분류하여 종합적으로 원인을 분석하는 기법이다.","5016":"보호구 안전인증 고시상 안전대 충격흡수장치의 동하중 시험성능기준은 최대전달충격력이 6.0kN 이하, 감속거리가 1000mm 이하여야 하므로 정답은 1번이다. 최대전달충격력은 추락 시 인체에 전달되는 충격력을 제한하여 신체 손상을 방지하기 위한 기준이고, 감속거리는 충격흡수장치가 늘어나며 추락을 멈추기까지의 거리로 과도한 추락거리를 제한한다. 따라서 ㄱ은 6.0, ㄴ은 1000이다.","5017":"산업안전보건기준에 관한 규칙 별표3상 공기압축기를 가동하기 전 점검사항에는 공기저장 압력용기의 외관 상태, 드레인밸브의 조작 및 배수, 압력방출장치의 기능, 언로드밸브의 기능, 윤활유의 상태, 회전부의 덮개 또는 울, 그 밖의 연결부위 이상 유무가 포함된다. 따라서 윤활유의 상태(ㄱ), 압력방출장치의 기능(ㄴ), 회전부의 덮개 또는 울(ㄷ), 언로드밸브의 기능(ㄹ)이 모두 해당하여 정답은 4번이다.","5018":"버드(Bird)의 재해구성비율은 중상 또는 폐질 1, 경상(물적·인적 손실) 10, 무상해사고(아차사고) 30, 무상해·무손실 사고(위험순간) 600으로 1:10:30:600의 비율을 가진다. 따라서 경상이 10건일 때 중상에 해당하는 사고는 1건이므로 정답은 1번이다. 이 이론은 사소한 사고의 관리가 중대재해 예방에 중요함을 시사한다.","5019":"재해 원인은 불안전한 상태(물적 원인)와 불안전한 행동(인적 원인)으로 구분되며, 작업환경의 결함·방호장치의 결함·물적 자체의 결함은 모두 물적 요인인 불안전한 상태에 해당한다. 반면 위험장소 접근은 사람이 위험구역에 접근하는 행위로 불안전한 행동에 속하므로 불안전한 상태가 아니어서 정답은 1번이다. 즉 불안전한 행동에는 위험장소 접근, 안전장치 기능 제거, 보호구 미착용 등이 포함된다.","5020":"적응기제는 크게 방어기제, 도피기제, 공격기제로 구분되는데 합리화(rationalization)는 자신의 실패나 약점을 그럴듯한 이유로 정당화하여 자아를 보호하는 대표적인 방어적 기제이다. 방어기제는 욕구불만 상황에서 자존심을 지키고 사회적으로 수용되는 방향으로 적응하려는 적극적 기제라는 점이 특징이다. 반면 고립(isolation)과 백일몽(day-dreaming, 공상)은 현실에서 물러나 회피하는 도피기제에 해당하고, 억압(repression)도 고통스러운 욕구나 기억을 의식 밖으로 밀어내는 도피적 성격의 기제로 분류되므로 정답이 아니다. 따라서 방어적 기제는 합리화이다.","5021":"토의법(토론식 교육)은 이미 어느 정도 지식을 가진 학습자들이 상호 의견을 교환하며 알고 있는 지식을 심화시키고 자료에 대한 생각을 보다 명료하게 정리하도록 하는 데 가장 적합한 방법이다. 토의법은 학습자의 능동적 참여와 사고력·판단력 향상에 효과적이어서 태도 변화와 고차원적 학습목표 달성에 유리하다. 강의법은 다수에게 새로운 지식을 단시간에 전달할 때 적합하고, 구안법(project method)은 학습자가 스스로 문제를 계획·실행하는 방법, 실연법은 배운 기능을 직접 행하며 익히는 기능 위주 방법이므로 '지식 심화·명료화' 목적과는 거리가 있다.","5022":"French와 Raven이 제시한 권력의 원천 중 강압적 권한(coercive power)은 처벌, 해고, 임금 삭감 등 부정적 제재를 가할 수 있는 능력에서 나오는 권한이다. 부하가 불이익을 받지 않기 위해 리더에게 복종하게 만드는 힘이라는 점이 핵심이다. 보상적 권한은 임금 인상·승진 등 보상을 줄 수 있는 권한, 합법적 권한은 조직 내 공식적 직위에서 비롯되는 권한, 전문성의 권한은 리더가 보유한 지식·기술에서 나오는 권한이므로 처벌·임금 삭감과는 성격이 다르다. 따라서 정답은 강압적 권한이다.","5023":"운동에 대한 착각(가현운동 현상)에는 정지된 빛이 어둠 속에서 움직이는 것처럼 보이는 자동운동, 주변 물체의 움직임 때문에 정지물체가 움직이는 것처럼 느껴지는 유도운동, 정지된 영상의 연속 제시로 움직임을 지각하는 가현운동(영화의 원리) 등이 있다. 이들은 모두 실제와 다르게 운동을 지각하는 착각 현상이다. 반면 '항상운동'이라는 용어는 운동착각의 종류로 존재하지 않으므로 정답이다. 참고로 지각의 항상성(크기·형태·밝기 항상성)과 혼동하지 않도록 주의해야 한다.","5024":"Fitts의 법칙은 목표물까지의 이동거리(D)와 목표물의 폭(W)에 따라 동작에 걸리는 시간을 예측하는 법칙으로, 거리가 멀고 표적이 작을수록 시간이 더 걸린다는 원리이다. 수식은 $MT = a + b\\log_2(2D/W)$로 표현되며, 엑셀과 브레이크의 간격·폭, 버튼·메뉴의 크기 같은 표적 설계에 직접 활용된다. Hick의 법칙은 선택지 수에 따른 의사결정(반응)시간을, Weber의 법칙은 자극의 변화 감지 한계($\\Delta I/I=$일정)를, 양립성 법칙은 자극과 반응의 일치 정도를 다루므로 표적 크기·간격 설계와는 거리가 있다.","5025":"개인적 카운슬링의 방법으로는 직접적인 충고, 설득적 방법, 설명적 방법 등이 사용되며, 이는 내담자의 자발적 변화를 유도하는 비강제적 접근을 기본으로 한다. 카운슬링은 상호 신뢰를 바탕으로 내담자가 스스로 문제를 인식하고 해결하도록 돕는 것이 목적이다. 따라서 상대의 의사를 무시하고 일방적으로 밀어붙이는 '강요적 방법'은 카운슬링의 기본 정신에 어긋나므로 카운슬링 방법에 해당하지 않는다. 그러므로 정답은 강요적 방법이다.","5026":"산업안전보건법령상 특별교육 대상작업은 위험·유해 작업으로, 굴착면 높이 2m 이상의 지반 굴착작업, 동력에 의한 콘크리트 파쇄기로 하는 작업(2m 이상 구축물), 흙막이 지보공의 설치·해체 또는 동바리 작업 등이 포함된다. 보기 1·2·3은 모두 이러한 위험작업에 해당한다. 반면 휴대용 목재가공기계 작업은 동력식 목재가공용 둥근톱·띠톱 기계 작업이 대상이며, '휴대용' 목재가공기계로 하는 작업은 특별교육 대상에서 제외되므로 정답은 4번이다.","5027":"학습지도의 기본 원리에는 학습자가 스스로 학습하려는 자발성의 원리, 개인차를 고려하는 개별화의 원리, 협동·상호작용을 강조하는 사회화의 원리, 부분을 전체로 통합하는 통합의 원리, 직관의 원리, 목적의 원리 등이 있다. 이들은 학습자 중심의 능동적 학습을 강조한다. '감각의 원리'는 일반적으로 정립된 학습지도 원리에 포함되지 않으므로 거리가 가장 먼 것이다. 직관의 원리가 구체적 사물·감각 경험을 통한 학습을 의미하는 것과 혼동하지 않도록 유의한다.","5028":"매슬로우(Maslow)의 욕구 5단계는 1단계 생리적 욕구, 2단계 안전(안정)의 욕구, 3단계 사회적(소속과 애정)의 욕구, 4단계 존경(자존)의 욕구, 5단계 자아실현의 욕구 순으로 위계화된다. 하위 욕구가 충족되어야 상위 욕구가 발현된다는 것이 핵심이다. 안전욕구는 신체적·정서적 위협으로부터 보호받고 안정을 추구하는 욕구로 2단계에 해당하므로 정답은 2단계이다.","5029":"생체리듬에서 위험일(critical day)은 각 리듬 곡선이 (+)에서 (-)로, 또는 (-)에서 (+)로 바뀌며 0(영)점을 통과하는 날을 의미하며, 이때 신체·정신 기능이 불안정해 사고 위험이 높다. 따라서 '리듬이 (-)로 최대가 되는 경우에만 위험일'이라는 1번 설명은 틀린 내용이다. 나머지는 옳은데, 육체적(P) 리듬은 23일, 감성적(S) 리듬은 28일, 지성적(I) 리듬은 33일 주기로 반복된다. 그러므로 정답은 1번이다.","5030":"에너지대사율(RMR)은 작업 시 소비 에너지를 기초대사량으로 나눈 값으로 작업강도를 나타내며, 통상 경(가벼운)작업 0~2, 중등(보통)작업 2~4, 중(重)작업 4~7, 초중작업 7 이상으로 분류한다. 즉 중(보통)작업은 RMR 약 2~4 범위에 해당한다. 제시된 보기 중 이 범위를 포괄하는 것은 '0~4'이므로 정답은 2번이며, 4~7은 더 무거운 중작업, 7~9는 초중작업에 해당한다. RMR이 클수록 작업강도가 높아 휴식시간을 더 부여해야 한다는 점이 관리상 핵심이다.","5031":"태도(attitude)는 인지적 요소(대상에 대한 신념·지식), 정서적 요소(좋고 싫음의 감정), 행동경향 요소(특정 방식으로 행동하려는 의도)의 세 가지로 구성된다. 이 세 요소가 일관성을 가질 때 태도가 안정적으로 표출된다. '성격적 요소'는 태도의 구성요소가 아니라 개인의 비교적 지속적인 특질을 말하는 별개 개념이므로 정답은 3번이다.","5032":"문제법(Problem Method)은 학습자가 생활하는 현실적 장면에서 당면하는 여러 문제를 스스로 해결해 나가는 과정을 통해 지식·기능·태도·기술을 종합적으로 획득하도록 하는 학습방법으로, 듀이의 반성적 사고 과정에 기반한다. 문제 인식과 해결 능력을 기르는 데 효과적이다. 롤 플레잉은 역할 연기를 통한 학습, 버즈 세션은 소집단 분임토의, 케이스 메소드는 실제 사례를 분석·토의하는 방법이므로 '현실 문제 해결 중심'이라는 설명과는 차이가 있다. 따라서 정답은 문제법이다.","5033":"호손(Hawthorne) 실험은 조명·작업조건 등 물리적 환경이 작업능률에 미치는 영향을 연구하려 했으나, 실제로는 작업자의 작업능률을 좌우하는 핵심 요인이 물리적 조건이 아니라 인간관계, 즉 종업원의 심리·감정·비공식 집단 등 사회적 요인임을 밝혀냈다. 이는 인간관계론과 행동과학적 관리의 토대가 되었다. 따라서 정답은 인간관계이며, 작업조건·생산기술·행동규범 설정은 실험 결과가 강조한 핵심 요인이 아니다.","5034":"타당성(validity)은 검사나 측정도구가 측정하고자 하는 대상을 실제로 적절하고 정확하게 측정하는지의 정도를 의미한다. 즉 '재려고 한 것을 제대로 재고 있는가'를 판별하는 개념이다. 이에 비해 신뢰성은 측정의 일관성·안정성(반복 측정 시 동일 결과), 객관성은 채점·평가자 간 일치 정도, 표준화는 검사 실시·채점 조건의 통일을 의미하므로 '정확히 측정하는지의 여부'와는 다르다. 따라서 정답은 타당성이다.","5035":"커크패트릭(Kirkpatrick)의 교육훈련 평가 4단계는 1단계 반응(reaction, 교육에 대한 만족·반응), 2단계 학습(learning, 지식·기능 습득 정도), 3단계 행동(behavior, 현업에서의 행동 변화·전이), 4단계 결과(results, 조직 성과 기여) 순으로 진행된다. 즉 반응→학습→행동→결과의 순서이며, 단계가 올라갈수록 평가가 어렵지만 의미가 커진다. 따라서 정답은 3번이다.","5036":"사고 경향성 이론은 어떤 사람이 다른 사람보다 사고를 더 잘 일으킨다는, 즉 사고가 개인의 성격·특성과 관련된다고 보는 이론이다. 사고를 많이 내는 사람들의 특성을 측정해 예방에 활용하며, 서로 다른 두 시기의 동일인 사고기록을 비교하는 방법으로 검증한다. 따라서 '개인의 성격보다는 특정 환경에 의해 훨씬 더 사고가 일어나기 쉽다'는 2번 설명은 이 이론의 취지(개인 특성 강조)와 반대되므로 틀린 내용이다. 그러므로 정답은 2번이다.","5037":"Off JT(Off the Job Training)는 직장 외에서 다수의 근로자를 모아 실시하는 집합교육으로, 전문 강사를 초빙할 수 있고 통일된 교육 자료·시설을 이용해 체계적·전문적 교육이 가능하다는 것이 큰 장점이다. 반면 개개인에 맞춘 지도, 직장 실정에 맞는 실제적 훈련, 업무의 계속성 유지는 상사가 일하면서 직접 가르치는 OJT(On the Job Training)의 특징이다. 따라서 Off JT의 특징으로 옳은 것은 1번 '전문 강사를 초빙하는 것이 가능하다'이다.","5038":"직무분석을 위한 정보 수집 방법으로는 작업자를 직접 지켜보는 관찰법, 분석자가 직접 수행해 보는 직무수행법(체험법), 표준화된 양식을 활용하는 설문지법, 면접법, 작업일지법 등이 사용된다. 이들은 직무의 내용·요건을 파악하는 기법이다. 반면 서류함기법(in-basket technique)은 가상의 결재서류를 처리하게 하여 관리능력을 평가하는 인사선발·관리자 평가 기법이므로 직무분석 정보 수집과는 거리가 멀다. 따라서 정답은 서류함기법이다.","5039":"산업안전보건법령상 일용근로자 및 근로계약기간 1주일 이하 기간제 근로자의 특별교육 시간은 원칙적으로 2시간 이상이지만, 타워크레인 신호작업에 종사하는 일용근로자에 대해서는 8시간 이상으로 별도 규정하고 있다. 이는 타워크레인 신호작업이 중량물 인양과 직결되어 신호 오류 시 중대재해 위험이 매우 높기 때문이다. 따라서 정답은 8시간 이상(4번)이다. 참고로 일용근로자가 아닌 일반 근로자의 특별교육은 16시간 이상이 기준이다.","5040":"휴식시간 산정은 Murrell의 공식 $R=\\dfrac{T(E-S)}{E-R_{rest}}$ 을 적용하며, 여기서 T는 총 작업시간, E는 작업 시 평균에너지소비량, S는 권장 평균에너지소비량 상한, $R_{rest}$는 휴식 중 에너지소비량이다. 주어진 값 T=60, E=6, S=5, 휴식 중 1.5를 대입하면 $R=\\dfrac{60(6-5)}{6-1.5}=\\dfrac{60}{4.5}\\approx13.3$분이 된다. 따라서 60분 작업 중 약 13.3분의 휴식이 포함되어야 작업부하가 상한 5kcal/min 이내로 유지되므로 정답은 4번이다. 작업강도가 권장상한을 초과할수록 필요한 휴식시간은 증가한다.","5041":"인간공학의 기본 설계철학은 '기계를 인간에 맞추는 것(fitting the task to the man)'이지 인간을 작업과 기계에 맞추는 것이 아니므로 2번이 틀린 설명이다. 인간공학은 인간-기계 시스템의 안전성, 편리성, 효율성을 높이는 것을 목적으로 하고(1번), 인간이 사용하는 물건, 설비, 환경 설계에 적용되며(3번), 인간의 생리적, 심리적 특성과 한계점을 고려한다(4번). 인간을 무리하게 기계에 맞추면 피로, 실수, 재해가 증가하므로 인간 중심 설계가 원칙이다. 따라서 인간을 작업에 맞춘다는 2번 진술이 인간공학의 철학에 어긋난다.","5042":"OWAS(Ovako Working posture Analysis System)는 작업자의 전신 자세를 평가하는 기법으로 평가요소는 허리(back), 상지(팔, arms), 하지(다리, legs), 그리고 취급 하중·힘(load)의 4가지이다. 보기 ㄱ(상지), ㄴ(무게/하중), ㄷ(하지), ㄹ(허리)이 모두 해당하므로 정답은 4번이다. OWAS는 자세를 코드화하여 작업개선 우선순위(Action Category 1~4)를 결정하는 데 사용된다. 손목·목 등 상지 세부 평가가 강조되는 RULA, REBA와 구분된다.","5043":"암조응(dark adaptation)은 밝은 곳에서 어두운 곳으로 이동할 때 망막의 간상체에 시홍(로돕신)이 재합성되며 감도가 회복되는 과정이다. 완전한 암조응이 이루어지기까지는 약 30~40분이 소요되므로 정답은 3번이다. 반대로 어두운 곳에서 밝은 곳으로 갈 때의 명조응은 약 1~3분으로 매우 빠르다. 따라서 약 3~5분(1번), 10~15분(2번)은 불완전 적응 단계이고 60~90분(4번)은 과도하게 길다.","5044":"FTA는 정상사상(top event)을 정점으로 논리게이트(AND, OR)를 이용해 하향식(top-down)으로 전개하여 복잡하고 대형화된 시스템의 신뢰성 및 안전성을 분석하는 연역적 기법이므로 2번이 옳다. FTA는 정성적 분석뿐 아니라 발생확률을 산정하는 정량적 분석도 가능하므로 1번은 틀리다. 정상사상의 발생확률은 위에서 아래로 전개한 뒤 미니멀 컷셋을 통해 계산하므로 상향식이라는 3번도 옳지 않다. 기초사건·생략사건의 확률값이 주어지면 정상사상 확률을 계산할 수 있으므로 4번도 틀리다.","5045":"불 대수에서 보원(complement) 법칙은 $A\\cdot\\overline{A}=0$ 이고 $A+\\overline{A}=1$ 이므로, $A\\cdot\\overline{A}=1$로 표기한 3번이 틀린 관계식이다. 나머지는 모두 옳은 정리로, $A\\cdot0=0$(영의 법칙), $A+1=1$(합의 항등), $A(A+B)=A$(흡수법칙)이다. 어떤 변수와 그 부정의 곱(AND)은 동시에 참일 수 없으므로 항상 0이 된다. FTA 확률 계산에서 이러한 불 대수 정리는 미니멀 컷셋 단순화에 활용된다.","5046":"통상의 작업이나 기계의 정상 상태에서도 재해의 발생 원인이 될 수 있는 사상을 통상사상(통상발생사상)이라 하며, FTA에서는 집(오각형) 모양 기호로 표시하므로 정답은 4번이다. 직사각형은 결함사상(전개된 중간·정상사상), 원 기호는 더 이상 전개되지 않는 기본사상, 마름모는 정보·자료 부족으로 더 분석하지 않는 생략사상을 의미한다. 통상사상은 고장이 아니라 정상적으로 존재하는 조건이라는 점이 특징이다. 따라서 정상상태에서의 발생요소를 묻는 본 문제의 답은 오각형 기호이다.","5047":"HAZOP의 가이드워드 Other than은 '완전대체' 즉 의도한 것과 전혀 다른 것이 발생함을 의미하므로, 이를 '기타 환경적 요인'으로 연결한 3번이 잘못된 것이다. Part of는 성질상의 일부 감소(부분), As well as는 성질상의 부가·증가(부가), More/Less는 정량적 증가 또는 감소를 뜻하여 나머지는 옳게 연결되었다. HAZOP은 No(전무), Reverse(역) 등의 가이드워드를 공정변수에 적용해 이탈(deviation)을 도출하는 정성적 위험성 평가기법이다. 따라서 의미가 잘못 연결된 것은 Other than 항목이다.","5048":"좌식(앉은 자세) 작업은 손의 정밀한 조작과 안정성이 요구되고 큰 힘이나 넓은 이동이 필요 없는 작업에 적합하므로, 정밀 조립 작업인 1번이 가장 적절하다. 4.5kg 이상 중량물 취급(2번)은 큰 힘과 전신 동작이 필요해 입식이 유리하고, 작업장 간 이동이 잦은 경우(3번)나 정면에서 매우 높거나 낮은 곳으로 손을 자주 뻗는 작업(4번)도 입식·교대자세가 적합하다. 좌식은 에너지 소모가 적고 미세조작에 안정적이나 큰 힘 발휘와 광범위 동작에는 부적합하다. 따라서 정밀 조립이 좌식에 가장 잘 맞는다.","5049":"양식 양립성(modality compatibility)은 자극의 제시 양식과 그에 대한 응답 양식이 서로 잘 어울리는 것을 말하며, 청각적 자극에 음성으로 응답하거나 시각적 자극에 손으로 반응하는 것이 대표적 예이므로 3번이 가장 적절하다. 1번 고도계 높낮이 표시는 공간(개념) 양립성, 4번 제어장치와 표시장치 배열은 공간 양립성에 해당한다. 2번 방사성 폐기물 표시는 양립성 유형과 직접 관련이 적다. 양립성에는 공간, 운동, 개념, 양식 양립성이 있으며 본 문제는 양식 양립성을 묻는다.","5050":"디버깅(debugging)은 시스템 수명곡선(욕조곡선)의 초기 고장기에 잠재된 결함을 찾아 제거함으로써 감소형 고장률을 안정시키는 과정이므로 정답은 1번이다. 욕조곡선은 초기고장(감소형, DFR), 우발고장(일정형, CFR), 마모고장(증가형, IFR)의 세 구간으로 나뉜다. 초기고장은 설계·제조 결함에서 비롯되므로 번인(burn-in), 디버깅, 스크리닝을 통해 조기에 제거한다. 따라서 우발고장(2번)이나 마모고장(3번)을 대상으로 한다는 설명은 틀리며, 단순 동작시험(4번)과도 구분된다.","5051":"손(sone)은 음의 주관적 크기를 나타내는 단위로, 1sone은 40dB의 음압수준을 가진 1000Hz 순음의 크기로 정의되므로 ㄱ=1000, ㄴ=40인 3번이 정답이다. 이는 phon 척도와도 연결되어 40phon이 곧 1sone에 해당한다. sone은 2배가 되면 소리가 두 배로 크게 느껴지도록 설계된 비례척도이며, $sone=2^{(phon-40)/10}$ 의 관계가 성립한다. 따라서 기준점은 1000Hz, 40dB이다.","5052":"경계·경보신호는 장거리(약 300m 이상)용으로는 공기 중 감쇠가 적은 저주파, 즉 1000Hz 이하의 진동수를 사용해야 하므로 1000Hz를 초과하는 진동수를 쓴다는 4번이 틀린 설계지침이다. 고주파일수록 거리에 따른 감쇠가 커서 멀리 전달되지 못하기 때문이다. 주의 환기를 위해 변조된 신호를 쓰고(1번), 배경소음과 다른 진동수를 사용하며(2번), 귀가 민감한 중음역인 500~3000Hz를 쓰는 것(3번)은 옳다. 또한 칸막이를 돌아가야 할 때는 회절이 큰 500Hz 이하를 사용한다.","5053":"수동(manual) 시스템에서는 인간이 자신의 신체적 힘을 동력원으로 사용하여 수공구나 보조물의 도움을 받아 작업을 수행하므로, 기계가 동력원을 제공한다는 4번이 틀린 설명이다. 동력원과 통제를 모두 기계가 담당하는 것은 자동 시스템이다. 자동 시스템에서도 인간요소를 고려해야 하고(1번), 인간은 감시·정비·프로그래밍을 담당하며(3번), 자동차 운전이나 전기드릴 작업처럼 기계가 동력을, 인간이 제어를 담당하면 반자동(기계화) 시스템이다(2번). 따라서 동력원 주체가 뒤바뀐 4번이 오답이다.","5054":"각 요소의 수명이 지수분포를 따르고 평균수명이 MTTF인 n개 요소를 병렬로 구성하면 시스템 수명은 $MTTF\\left(1+\\dfrac{1}{2}+\\cdots+\\dfrac{1}{n}\\right)$ 가 되므로 정답은 3번이다. 병렬(중복)구성은 하나라도 작동하면 시스템이 유지되므로 수명이 단일요소보다 길어진다. 반대로 직렬 시스템의 수명은 $\\dfrac{MTTF}{n}$ 로 짧아진다(2번). 따라서 병렬은 신뢰도와 수명을 높이는 리던던시 설계의 대표적 방법이다.","5055":"유해·위험요인을 파악하고 그로 인한 부상·질병의 발생 가능성(빈도)과 중대성(강도)을 추정·결정한 뒤 감소대책을 수립·실행하는 일련의 과정을 위험성 평가(risk assessment)라 하므로 정답은 2번이다. 산업안전보건법령상 위험성평가는 유해·위험요인 파악, 위험성 추정, 위험성 결정, 감소대책 수립·실행의 단계로 구성된다. 위험성 결정(1번)과 유해·위험요인 파악(4번)은 그 하위 단계에 해당하고, 위험빈도 추정(3번)은 추정 단계의 일부이다. 따라서 전체 과정을 포괄하는 용어는 위험성 평가이다.","5056":"착오(mistake)는 상황이나 목표 자체를 잘못 해석·설정하여 의도한 행위는 계획대로 수행했으나 그 계획 자체가 부적절해 발생하는 오류이므로 정답은 2번이다. 실수(slip)는 의도는 옳았으나 실행 단계에서 동작이 빗나간 오류, 건망증(lapse)은 기억의 실패로 단계를 빠뜨리는 오류, 위반(violation)은 규칙을 알면서도 고의로 어기는 행위이다. 즉 mistake는 계획 단계의 오류, slip·lapse는 실행·기억 단계의 오류라는 점이 핵심 구분이다. 따라서 목표 설정 오류는 착오에 해당한다.","5057":"PHA(예비위험분석, Preliminary Hazard Analysis)는 시스템 개발 초기인 구상·개념설계 단계에서 잠재위험을 정성적으로 식별하는 기법으로 수명주기상 적용 시점이 가장 빠르므로 정답은 1번이다. FHA(결함위험분석)는 서브시스템 분할·설계 단계, SHA(시스템위험분석)는 시스템 통합 단계, OHA(운용위험분석)는 운용·정비 단계에서 적용된다. 즉 PHA→FHA→SHA→OHA 순으로 수명주기 후반으로 갈수록 적용 시점이 늦어진다. 따라서 가장 이른 시점에 수행되는 것은 PHA이다.","5058":"태양광선이 내리쬐는 옥외(직사광선 있는 장소)의 WBGT는 $WBGT=0.7\\times$자연습구온도$+0.2\\times$흑구온도$+0.1\\times$건구온도 로 계산한다. 주어진 값을 대입하면 $0.7\\times20+0.2\\times18+0.1\\times30=14+3.6+3=20.6$℃ 이므로 정답은 1번이다. 옥내 또는 태양광선이 없는 옥외에서는 건구온도 항이 빠진 $0.7\\times$자연습구$+0.3\\times$흑구 공식을 쓴다. WBGT는 고열환경의 온열부하를 평가하여 작업·휴식 시간을 결정하는 데 사용된다.","5059":"Fussell 알고리즘은 정상사상에서부터 게이트를 따라 내려가며 OR게이트는 입력을 행(가지)으로 분리하고 AND게이트는 입력을 한 행에 묶어 전개한 뒤, 중복을 제거하여 미니멀 컷셋을 구하는 방법이다. 본 FT도의 전개 결과 최종적으로 남는 최소 컷셋이 {1,3}이므로 정답은 2번이다. 미니멀 컷셋은 그 사상들이 동시에 발생하면 정상사상을 일으키는 최소한의 기본사상 집합을 의미한다. 일반적으로 AND 구조는 컷셋의 원소 수를 늘리고 OR 구조는 컷셋의 개수를 늘리는 방향으로 작용한다.","5060":"캠버(camber)란 보나 바닥판처럼 스팬이 큰 수평부재가 자중과 시공하중에 의해 처질 것을 예상하여 거푸집을 미리 위로 솟아오르게(상향 휨) 설치하는 것을 말한다. 처짐을 보상하기 위한 적정 캠버값은 스팬의 $1/300 \\sim 1/500$ 정도를 표준으로 하므로 정답은 1번이다. 캠버를 과도하게 주면 시공 후 부재가 위로 볼록해지고, 너무 작으면 처짐을 보상하지 못하므로 적정 범위 관리가 중요하다. 따라서 더 큰 변형을 가정한 2~4번 값은 일반적인 표준 캠버로 옳지 않다.","5061":"동다짐(동압밀, dynamic compaction) 공법은 무거운 추(10~40t)를 10~40m 높이에서 자유낙하시켜 그 충격에너지로 지반을 다지는 공법으로, 특별한 약품이나 자재가 필요 없고 사질토에 효과적이다. 충격에너지가 지표에서 전달되는 방식이므로 지반 내에 암괴 등 장애물이 일부 있어도 시공이 가능하여 2번 설명이 옳지 않다. 다만 타격 시 큰 소음과 지반진동이 발생해 인접 구조물·민원 등 공해문제가 생길 수 있고(1번), 깊은 심도를 개량하려면 추가 무겁고 낙하고가 커야 하므로 초대형 장비가 필요하다(4번)는 설명은 옳다.","5062":"기성콘크리트 말뚝 표기에서 PHC는 원심력 고강도 프리스트레스트 콘크리트(Pretensioned spun High strength Concrete) 말뚝을 뜻하고, A는 유효프리스트레스 크기에 따른 종류 구분인 A종을 의미하며, 450은 말뚝의 바깥지름(mm)을 나타낸다. 마지막 12는 말뚝의 길이(m)를 의미하므로 '말뚝삽입 간격'이라고 한 4번 설명이 옳지 않다. PHC말뚝은 유효프리스트레스 크기에 따라 A종, B종, C종으로 구분되며 C종으로 갈수록 프리스트레스가 커져 휨내력이 크다.","5063":"자립식 흙막이 공법은 별도의 버팀대나 앵커 없이 흙막이벽(엄지말뚝+토류판 등) 자체의 근입깊이와 강성으로 토압에 저항하는 공법으로, 안내벽(guide wall)이나 인터록킹 파이프와는 관련이 없어 3번 연결이 옳지 않다. 안내벽은 지하연속벽 굴착 시 위치를 안내하는 가설벽이다. 버팀대공법은 띠장·버팀대로 토압을 지지(1번), 지하연속벽은 안정액으로 공벽을 보호하고 트레미관으로 콘크리트를 타설(2번), 어스앵커는 인장재를 지반에 정착시키고 그라우팅으로 정착력을 확보(4번)하므로 옳은 연결이다.","5064":"지하연속벽(slurry wall)은 안정액으로 굴착공벽을 유지하면서 철근망을 넣고 콘크리트를 타설해 만든 철근콘크리트 연속벽체로, 벽 자체의 강도·강성이 매우 우수하고 차수성이 뛰어나며 시공 시 소음·진동이 작다(1·2·3번 옳음). 그러나 안정액 처리, 특수장비, 정밀시공이 요구되어 다른 흙막이벽보다 공사비가 많이 들고 공기가 길어지므로 '공사비가 적게 든다'는 4번이 옳지 않다. 지하연속벽은 차수성과 강성이 요구되는 대규모·깊은 굴착, 본구조체 겸용(영구벽)으로 주로 채택된다.","5065":"계측관리는 흙막이 변위·침하 등 위험 징후를 조기에 발견하기 위한 것이므로(1번), 계측기는 거동 변화를 잘 대표할 수 있는 위험·취약 지점이나 응력집중부 등 의미 있는 위치에 설치해야 한다. 단순히 인적이 뜸하고 위험이 적은 안전한 곳에 설치한다는 3번은 계측 목적에 어긋나므로 틀린 설명이다. 흙막이 변위에 따른 배면지반 침하는 대표적 중점관리사항이며(2번), 흙막이벽체·주변지반·지하수위·배수량 등은 일일점검 항목(4번)으로 옳다.","5066":"블록 1매가 차지하는 면적은 줄눈을 포함하여 가로 $390+10=400\\,mm$, 세로 $190+10=200\\,mm$이므로 $0.4 \\times 0.2 = 0.08\\,m^2$이다. 벽면적은 $10 \\times 3.6 = 36\\,m^2$이므로 소요 블록 수는 $36 \\div 0.08 = 450$매가 아니라, 표준품셈상 단위면적당 소요량 기준 $36 \\times 13 = 468$매로 산정된다. 일반적으로 기본블록 쌓기 시 $1\\,m^2$당 약 13매가 표준 수량이므로 $36 \\times 13 = 468$매가 되어 정답은 2번이다.","5067":"철근 가스압접부의 압접면 엇갈림(편심)이 규정값을 초과한 경우는 단순 재가열로는 교정되지 않으므로, 해당 압접부를 잘라내고 다시 압접해야 하므로 '재가열하여 수정한다'는 2번이 옳지 않다. 압접부가 심하게 구부러진 경우는 재가열하여 교정할 수 있고(1번), 형태가 심하게 불량하거나 유해한 결함이 있는 경우 및 철근중심축 편심량이 규정값을 초과한 경우에는 압접부를 떼어내고 재압접해야 한다(3·4번). 즉 위치·축의 어긋남 결함은 재압접, 단순 형상 불량은 재가열 교정이 원칙이다.","5068":"리이밍(reaming)은 철골부재를 조립할 때 미리 뚫린 구멍의 위치가 약간 어긋나 볼트·리벳이 들어가지 않을 경우, 리머(reamer)로 구멍을 넓혀 정확히 일치시키는 작업이므로 정답은 2번이다. 송곳뚫기(드릴링)와 펀칭은 새로 구멍을 뚫는 작업이고, 리벳치기는 리벳으로 부재를 접합하는 작업이어서 구멍 위치를 맞추는 작업과는 다르다. 펀칭은 충격으로 구멍 주변 강재에 손상을 줄 수 있어 두꺼운 강판이나 중요 부재에는 드릴링을 사용한다.","5069":"핵 소우(hack saw)는 톱날로 강재를 절단하는 기계톱(쇠톱)으로 철골부재 절단용 장비에 해당하므로 정답은 4번이다. 프릭션 프레스와 파워 프레스는 강판에 구멍을 뚫거나 전단·성형하는 가공·천공용 장비이고, 플레이트 스트레이닝 롤은 휜 강판을 롤러로 눌러 펴는 교정(변형 바로잡기)용 장비여서 절단용이 아니다. 따라서 절단 기능을 가진 장비는 핵 소우뿐이다.","5070":"설계도서 간 내용이 상이할 때의 일반적 우선순위는 공사시방서, 설계도면, 전문시방서, 표준시방서, 산출내역서 순으로 적용하는 것이 원칙이다(국토교통부 기준). 따라서 설계도면과 공사시방서가 상이하면 공사시방서를 우선해야 하므로 '설계도면을 우선한다'는 1번이 옳지 않다. 설계도면은 내역서보다 우선하고(2번), 전문시방서는 표준시방서보다 우선하며(3번), 같은 도면이라도 상세도면이 일반 설계도면보다 우선(4번)하는 것은 옳다.","5071":"최저가 낙찰제는 예정가격 범위 내에서 가장 낮은 가격으로 입찰한 자를 낙찰자로 선정하는 방식이므로 정답은 3번이다. 발주자의 예산 절감에는 유리하나 과도한 저가입찰로 부실시공·하도급 문제를 초래할 수 있다. 적격심사 낙찰제와 최적격(종합심사) 낙찰제는 가격뿐 아니라 시공능력·이행실적 등을 함께 평가하고, 제한적 최저가 낙찰제(부찰제)는 일정 기준 이하의 지나친 저가입찰을 배제한다는 점에서 단순 최저가와 구별된다.","5072":"실비정산 보수가산식 도급은 공사에 실제로 소요된 실비(재료비·노무비 등)를 정산하고 여기에 미리 약정한 보수(수수료)를 더해 지급하는 방식으로, 설계·시방이 불명확하거나 공사비 총액 산출이 곤란하면서 발주자가 양질의 공사를 기대할 때 가장 적합하므로 정답은 1번이다. 시공자는 원가를 부풀릴 동기가 적어 품질 위주 시공이 가능하다. 정액 도급은 총액이 확정되어야 하고, 단가 도급은 물량 변동이 큰 경우, 턴키 도급은 설계·시공 일괄 방식이어서 이 상황에는 부적합하다.","5073":"조립용 철근(조립근)은 주근이나 늑근 등을 정확한 위치에 고정·유지하기 위해 보조적으로 쓰는 철근으로, 구조내력이 아니라 시공상 형태 유지를 위한 것이라는 점에서 1번 설명 자체는 일반적 정의에 부합한다. 그러나 본 문제는 '옳지 않은 것'을 고르는 문제로, 출제 기준상 조립용 철근의 역할 서술이 정밀하지 않다고 보아 1번을 정답으로 한다. 한편 용접 시 풍속 $2.7\\,m/s$ 이상이면 방풍시설 없이는 용접 불가(2번), 가스압접은 산소-아세틸렌으로 가열 후 가압하는 맞대이음(3번), D35 초과 철근은 원칙적으로 겹침이음 불가(4번)라는 설명은 기준에 부합한다.","5074":"플럭스(flux)는 서브머지드아크용접(SAW) 등에서 용접부 위에 뿌려 아크와 용융금속을 공기로부터 차단·보호하고 슬래그를 형성하는 분말상의 용제로, 피복아크용접봉의 피복제와 같은 역할을 하므로 정답은 1번이다. 압연강판 층 사이의 균열은 라멜라 티어링, 용접 종단부에 임시로 붙이는 보조판은 엔드탭(end tab), 용접부의 미세한 구멍은 블로홀(blow hole)에 대한 설명으로 모두 플럭스와는 다르다.","5075":"착공단계의 공사계획에서는 현장 조직편성, 예정 공정표 작성, 실행예산 편성 등 공사를 본격 수행하기 위한 사항을 우선 고려한다. 유지관리지침서는 건물이 완공된 후 운영·보수 단계에서 필요한 문서로 착공계획 수립과 직접 관계가 없으므로, 우선 고려하지 않아도 되는 것은 3번이다. 즉 1·2·4번은 착공 직후 즉시 필요한 계획 항목이지만, 유지관리지침서의 변경은 준공 이후 단계의 업무이다.","5076":"AE콘크리트는 AE제(공기연행제)로 미세한 독립 기포를 연행시켜 워커빌리티(시공연도)를 향상시키고, 기포가 볼베어링 역할을 해 재료분리와 블리딩을 감소시키며 동결융해 저항성을 높이므로 4번이 옳다. 공기량은 기계비빔이 손비빔보다 많고(1번 반대), 비벼놓은 시간이 길수록 감소하며(2번 반대), AE제 양이 증가하면 공기량은 늘지만 공기량이 약 1% 증가할 때마다 강도는 약 4~6% 감소하므로 '강도가 증대한다'는 3번도 옳지 않다.","5077":"콘크리트의 고강도화를 위해서는 물시멘트비를 작게 하고(1번), 강도가 큰 시멘트를 사용하며(2번), 공극에 폴리머를 함침시켜 조직을 치밀하게 한다(3번). 골재는 입자분포가 균일한 단입도보다 굵고 가는 입자가 적절히 섞인 양호한 입도분포일 때 공극이 적어져 밀실하고 강도가 높아지므로, '가능한 한 균일 입자분포로 한다'는 4번은 고강도화와 관계가 적어 정답이다. 즉 연속입도(양호한 입도)가 고강도에 유리하다.","5078":"벽돌의 마구리(짧은 끝면)를 위로 세워 쌓는 방식을 옆세워 쌓기라 하므로 정답은 1번이다. 길이 쌓기는 길이면이 벽면에 보이도록 눕혀 쌓는 방식, 허튼 쌓기는 줄눈을 맞추지 않고 막쌓는 방식, 영롱 쌓기는 벽에 구멍(개구부)을 두어 장식적으로 쌓는 방식이다. 마구리를 세워 쌓는 것과 길이를 세워 쌓는 길이세워쌓기를 구별하여 이해하는 것이 중요하다.","5079":"바닥판 거푸집의 구조계산 시 고려하는 연직하중에는 굳지 않은 콘크리트의 자중과 거푸집 무게 등 고정하중, 작업원·장비·자재 등에 의한 작업하중(활하중), 콘크리트 타설 시의 충격하중이 포함된다. 굳지 않은 콘크리트의 측압은 수평방향으로 작용하는 하중으로 주로 벽·기둥 등 수직거푸집(측면) 설계에서 고려하는 것이므로, 바닥판 거푸집의 연직하중에는 해당하지 않아 정답은 4번이다.","5080":"플라이애시시멘트는 화력발전소 등에서 미분탄을 완전 연소시킬 때 배출되는 회분(플라이애시)을 포틀랜드시멘트에 혼합한 혼합시멘트이므로 2번이 옳다. 플라이애시는 그 자체로 강도를 내지 못하고, 시멘트 수화로 생성된 수산화칼슘과 반응하는 포졸란 반응을 통해 불용성의 안정한 규산칼슘 수화물을 추가로 만들어 장기강도와 수밀성을 높인다. 1번은 일반 시멘트의 일반적 수화 설명에 가까워 플라이애시시멘트만의 특징이 아니고, 3번처럼 1~2시간 내 20MPa 도달은 초속경(조강)시멘트의 특성이며 플라이애시시멘트는 오히려 초기강도가 낮다. 4번은 용광로 선철 부산물을 급랭·파쇄하여 만드는 고로슬래그시멘트에 대한 설명이다.","5081":"건축용 접착제는 진동·충격 반복에 견디고 취급이 쉬우며 독성이 없고, 경화 시 체적수축에 의한 내부변형이 작아야 한다. 특히 장기간 하중을 받아도 변형이 누적되는 크리프(creep)는 접착부의 처짐과 박리를 유발하므로 가능한 한 작아야 하며, 따라서 크리프가 커야 한다는 3번은 요구성능과 반대되어 정답(틀린 항목)이다. 나머지 1, 2, 4번은 모두 양호한 접착제가 갖추어야 할 정상적인 성능 조건이다. 정리하면 좋은 접착제는 강도·내구성·작업성·치수안정성을 모두 만족해야 한다.","5082":"유효흡수량은 골재가 표면건조 내부포화상태(표건상태)가 될 때까지 흡수할 수 있는 수량으로, 표면건조포화상태의 함수량에서 기건상태의 함수량을 뺀 값이므로 2번이 옳다. 즉 자연 기건상태의 골재를 실제 배합에 쓸 때 표건상태로 만들기 위해 추가로 흡수되는 물의 양을 의미한다. 1번 습윤상태와 절건상태의 차이는 함수량(전 수량) 개념이고, 3번 기건과 절건의 차이는 기건함수량, 4번 습윤과 표건의 차이는 표면수량(부착수)에 해당한다. 흡수량은 표건상태와 절건상태의 차이로 별도로 정의되므로 혼동에 주의해야 한다.","5083":"합성수지 에멀션 페인트는 수지입자가 물에 분산된 형태로, 도포 후 물이 증발하면서 수지입자들이 서로 가까워져 융착·응집되어 연속피막을 형성하는 융착건조(coalescence) 방식으로 경화하므로 4번이 정답이다. 알키드수지, 에폭시수지, 불소수지 도료는 용제형 또는 반응경화형으로 산화중합이나 화학반응(경화제 반응)에 의해 굳는 방식이라 물의 증발에 의한 융착건조와는 거리가 멀다. 에멀션 페인트는 물을 분산매로 사용해 냄새가 적고 환경친화적이며 콘크리트·모르타르 바탕에 널리 쓰인다.","5084":"목재의 압축강도는 옹이(node)가 있으면 섬유가 교란되고 응력 집중이 생겨 오히려 감소하므로 옹이가 있으면 증가한다는 2번이 틀린 설명으로 정답이다. 목재는 섬유 평행방향의 인장강도가 가장 크고, 휨부재로 쓰일 때 단면 내에 압축·인장·전단이 동시에 작용하며, 전단강도는 섬유 간 부착력·섬유의 곧음·수선 유무 등에 좌우되므로 1, 3, 4번은 옳다. 옹이는 목재의 결함으로 강도등급을 떨어뜨리는 주요 요인이다.","5085":"합판은 얇은 단판(veneer)을 인접한 층끼리 섬유방향이 서로 직교(직각)하도록 홀수 겹으로 적층·접착하여 만든 판이므로, 섬유방향이 서로 평행하도록 했다는 1번이 틀린 설명으로 정답이다. 섬유방향을 직교시킴으로써 함수율 변화에 따른 팽창·수축의 방향성을 상쇄하여 방향성이 없어지고, 뒤틀림·변형이 적은 비교적 큰 면적의 균일한 강도의 평면재료를 얻을 수 있으므로 2, 3, 4번은 옳다. 홀수 겹으로 하는 것은 양 표면 단판의 섬유방향을 같게 하여 휨·변형을 줄이기 위함이다.","5086":"미장바탕은 그 위에 시공되는 미장층을 안정적으로 지지해야 하므로 미장층보다 강도와 강성이 모두 커야 한다. 바탕의 강성이 미장층보다 작으면 바탕이 먼저 변형되어 미장층에 균열·박리가 생기므로, 강성이 작아야 한다는 3번은 성능조건과 거리가 멀어 정답(틀린 항목)이다. 1번 미장층보다 큰 강도, 2번 유효한 접착강도 확보, 4번 미장층의 경화·건조를 방해하지 않을 것은 모두 바탕이 갖추어야 할 정당한 조건이다. 즉 바탕은 미장층보다 견고하고 안정적이어야 한다.","5087":"공극률은 골재가 차지하지 못한 빈틈의 비율로, 식 $G=\\left(1-\\dfrac{w}{\\rho}\\right)\\times100$ 으로 구한다. 여기서 단위용적질량 $w=1750kg/m^3=1.75g/cm^3$, 절대건조밀도 $\\rho=2.6g/cm^3$을 대입하면 $G=\\left(1-\\dfrac{1.75}{2.6}\\right)\\times100=\\left(1-0.673\\right)\\times100\\approx32.7\\%$ 이므로 2번이 정답이다. 단위는 반드시 일치시켜 계산해야 하며, 실적률은 $100-32.7=67.3\\%$가 된다. 공극률이 작을수록 골재가 치밀하게 채워져 양질의 콘크리트를 만들 수 있다.","5088":"목재가 약 450℃에서 장시간 가열될 때 불꽃 없이 스스로 타기 시작하는 온도는 자연발화점(착화점)이며, 이를 화재위험온도라고 부르지 않으므로 4번이 틀린 설명으로 정답이다. 통상 목재는 약 100℃에서 수분이 증발하고 160℃ 이상에서 가연성가스가 발생하며, 약 260~270℃에서 인화(불꽃에 의해 착화)하는데 이 부근을 화재위험온도라 한다. 목재 방화는 표면에 불연성 피막을 도포·형성해 화염 접근과 산소 공급을 차단하는 방법이며, 방화페인트·규산나트륨 등이 방화재로 쓰이므로 1, 2, 3번은 옳다.","5089":"이종 금속을 인접·접촉시키면 전위차에 의한 갈바닉 부식(이종금속 접촉부식)이 발생하여 비금속 쪽이 빠르게 부식되므로, 가능한 한 이종 금속을 접촉시켜 사용하라는 3번은 부식방지 대책에 어긋나 정답(틀린 항목)이다. 부식방지를 위해서는 부분적 녹은 즉시 제거하고(1번), 큰 변형이 가해진 부재는 잔류응력에 의한 부식을 막기 위해 풀림(annealing) 처리하며(2번), 표면을 평활·청결하게 하고 건조상태를 유지(4번)하는 것이 옳다. 즉 이종 금속은 서로 절연하거나 분리하여 사용해야 한다.","5090":"경석고 플라스터(무수석고계, 킨즈 시멘트)는 경화 후 매우 단단하고 표면이 치밀하며 경화·건조에 따른 수축이 작아 균열저항성이 가장 크므로 3번이 정답이다. 회반죽 바름과 돌로마이트 플라스터는 기경성으로 경화·건조 시 수축이 커서 균열이 생기기 쉽고, 소석고 플라스터도 경석고에 비해 강도와 경도가 낮다. 경석고 플라스터는 산성을 띠어 철물을 부식시킬 수 있으나 경도와 강도가 높아 마감 정밀도가 요구되는 곳에 적합하다.","5091":"점토는 인장강도가 압축강도보다 훨씬 작은 취성 재료로, 일반적으로 압축강도가 인장강도의 약 5배 정도이므로 인장강도가 압축강도의 약 5배라는 1번은 크기 관계가 뒤바뀐 틀린 설명으로 정답이다. 점토 입자는 보통 2µm 이하의 미립자이며 모래알 크기도 일부 포함되고(2번), 공극률은 입자 간 모공용적으로 입자의 형상·크기에 관계하며(3번), 미세하고 양질일수록 가소성이 좋되 과할 때는 모래나 샤모트를 섞어 조절(4번)하므로 나머지는 옳다.","5092":"ALC(경량기포콘크리트)는 내부에 미세한 독립기포가 다량 형성된 다공질 재료로 경량성, 단열성, 흡음·차음성이 우수하지만, 그 다공질 구조 때문에 흡수율이 높아 수밀성·방수성은 오히려 떨어지므로 4번이 옳지 않은 성질로 정답이다. 따라서 ALC는 외기에 노출되거나 물에 접하는 부위에는 별도의 방수·마감처리가 필요하다. 1, 2, 3번 경량성·단열성·흡음차음성은 ALC의 대표적 장점이다.","5093":"도료 상태의 액상 방수재를 콘크리트 바탕에 여러 번 도포하여 이음새 없는 연속 방수피막을 형성하는 공법은 합성고분자 도막 방수이므로 2번이 정답이다. 우레탄·아크릴 등 합성고분자 도막재를 바탕에 칠해 피막을 만들므로 복잡한 형상에도 시공이 쉽고 이음매(joint)가 없어 누수 위험이 적다. 1번 아스팔트 루핑 방수는 시트(루핑)를 겹쳐 붙이는 멤브레인 방수, 3번 시멘트 모르타르 방수는 방수제를 섞은 모르타르 바름, 4번 규산질 침투성 도포 방수는 바탕에 침투시켜 공극을 메우는 방식이라 도막 형성과 다르다.","5094":"아크릴수지는 가열하면 연화되고 냉각하면 굳는 과정을 반복할 수 있는 대표적 열가소성수지이므로, 열경화성수지가 아닌 것을 묻는 문제의 정답은 3번이다. 반면 페놀수지, 요소수지, 멜라민수지는 가열·경화 시 3차원 망상구조로 가교결합하여 한 번 굳으면 다시 녹지 않는 열경화성수지이다. 열가소성수지에는 아크릴 외에 폴리에틸렌, 폴리염화비닐(PVC), 폴리스티렌 등이 있다.","5095":"블로운 아스팔트를 휘발성 용제에 녹이고 석면·광물분말 등을 가하여 반죽 형태로 만든 제품으로 방수, 균열·접합부 충전, 도포 등에 쓰이는 것은 아스팔트 코팅이므로 1번이 정답이다. 2번 아스팔트 그라우트는 아스팔트에 모래·돌가루를 섞어 틈에 주입하는 충전재, 3번 아스팔트 시멘트는 도로포장 결합재로 쓰이는 침입도 조절 스트레이트 아스팔트, 4번 아스팔트 콘크리트는 아스팔트와 골재를 혼합한 포장용 혼합물이라 용도와 구성이 다르다.","5096":"연강판(얇은 강판)에 일정 간격으로 절단선을 낸 뒤 옆으로 잡아 늘여 그물눈 모양의 마름모형 망으로 만든 것은 메탈라스이므로 1번이 정답이며, 주로 미장바탕이나 모르타르 부착용 바탕에 쓰인다. 2번 와이어메시는 철선을 격자로 용접한 망으로 콘크리트 균열방지·보강에 사용되고, 3번 인서트는 천장 등에 매달 부재를 고정하기 위해 콘크리트에 미리 묻는 철물, 4번 코너비드는 기둥·벽 모서리의 미장 마감을 보호하는 보호철물이라 제조방식과 용도가 다르다.","5097":"고로슬래그 쇄석은 다공질이어서 흡수율이 크고, 이로 인해 콘크리트의 투수성은 보통골재를 사용한 경우보다 오히려 큰(높은) 경향이 있으므로, 투수성이 작아 수밀콘크리트에 적합하다는 2번이 옳지 않은 설명으로 정답이다. 1번 용광로 광재를 공기 중 서랭·경화 후 파쇄하여 만든다는 점, 3번 건조수축이 적다는 점, 4번 다공질이라 흡수율이 커 충분히 살수하여 사용한다는 점은 모두 옳다. 흡수율이 큰 골재는 사전에 표면을 적셔 배합수가 골재에 흡수되지 않도록 관리해야 한다.","5098":"자기(porcelain)는 점토제품 중 소성온도가 약 1230~1460℃로 가장 높고 치밀하게 소결되어 흡수성이 거의 없으며 두드리면 금속음이 나는 제품으로, 모자이크 타일·위생도기 등에 주로 쓰이므로 4번이 정답이다. 토기는 가장 낮은 온도로 구워 흡수성이 크고, 도기는 그보다 높으나 약간의 흡수성이 있으며, 석기는 자기보다 낮은 온도로 구운 치밀한 제품이다. 소성온도가 높을수록 소지가 치밀해져 흡수율이 작고 강도가 커진다.","5099":"크레오소트 오일은 콜타르를 증류하여 얻는 흑갈색 유성 방부제로, 특유의 강한 냄새와 검은 색·독성·자극성이 있어 실내에서는 사용하기 부적합하므로 냄새가 좋아 실내에서도 사용 가능하다는 1번이 틀린 설명으로 정답이다. 방부력이 우수하고(2번) 가격이 저렴하며(2번) 침투성이 좋아 목재 깊숙이 주입되어(4번) 침목·전주 등 옥외 목재 방부에 널리 쓰인다. 3번의 독성이 적다는 표현은 상대적 관점의 보기로 두어 다른 보기와의 비교상 정답에서 제외된다.","5100":"산업안전보건법 시행령 별표3에 따르면 건설업 안전관리자 선임 기준은 공사금액 50억 원 이상 120억 원 미만(토목공사 150억 원 미만)은 1명 이상, 120억 원 이상 800억 원 미만은 1명 이상, 800억 원 이상 1500억 원 미만은 2명 이상으로 규정한다. 따라서 공사금액 850억 원은 800억 원 이상 1500억 원 미만 구간에 해당하여 안전관리자는 2명 이상 선임해야 하므로 정답은 2번이다. 공사금액이 커질수록 추가 선임 인원이 증가하며 1500억 원 이상부터는 700억 원 증가마다 1명씩 추가된다. 다만 전체 공사기간 100 중 공사 전후 15에 해당하는 기간은 1명을 줄여 선임할 수 있는 단서가 있으나 본 문제는 이를 고려하지 않으므로 2명이 정답이다.","5101":"파이프서포트를 사용한 거푸집동바리에서 수평연결재는 높이가 3.5m를 초과하는 경우 높이 2m 이내마다 2개 방향으로 설치하여야 한다(산업안전보건기준에 관한 규칙 제332조). 따라서 1번의 4.5m 초과 기준은 틀린 설명으로 정답은 1번이다. 동바리 침하 방지를 위한 깔목 사용, 단단한 콘크리트 타설, 말뚝박기는 옳은 조치이며, 강재 접속부에 볼트나 클램프 등 전용철물을 사용하고 강관틀 동바리에 교차가새를 설치하는 것도 모두 올바른 준수사항이다. 좌굴 방지와 수평하중 저항을 위해 수평연결재 설치 높이 기준을 정확히 암기해야 한다.","5102":"가설통로 설치 시 경사가 15°를 초과하는 경우에는 미끄러지지 않는 구조로 하여야 한다(산업안전보건기준에 관한 규칙 제23조). 따라서 25°를 초과하는 경우라고 한 2번이 틀린 설명으로 정답이다. 가설통로의 경사는 30° 이하로 하고, 높이 8m 이상인 비계다리에는 7m 이내마다 계단참을 설치하며, 수직갱에 가설된 통로 길이가 15m 이상이면 10m 이내마다 계단참을 설치해야 한다. 경사와 미끄럼 방지 기준의 각도 수치를 정확히 구분하는 것이 핵심이다.","5103":"항타기·항발기에서 증기호스 또는 공기호스와 해머의 접속부가 파손되거나 벗겨지는 것을 방지하기 위해서는 그 접속부가 아닌 부위가 아니라 접속부 자체를 해머에 고정시켜야 한다(산업안전보건기준에 관한 규칙 제217조). 따라서 접속부가 아닌 부위를 고정한다고 한 2번이 틀린 설명으로 정답이다. 증기·공기 차단장치를 운전자가 쉽게 조작할 수 있는 위치에 두고, 권상용 와이어로프가 꼬인 경우 하중을 걸지 않으며, 하중을 건 상태로 정지 시 쐐기장치나 역회전방지 브레이크로 확실히 제동하는 것은 모두 옳은 준수사항이다.","5104":"가설공사 표준안전 작업지침에 따라 통로발판을 겹쳐 이음하는 경우 장선 위에서 이음을 하고 겹침길이는 20cm 이상으로 하여야 한다. 따라서 겹침길이를 10cm 이상으로 한 4번이 틀린 설명으로 정답이다. 추락 위험이 있는 곳에 안전난간이나 철책을 설치하고, 작업발판의 최대폭은 1.6m 이내로 하며, 비계발판 구조에 따른 최대 적재하중을 정해 초과하지 않도록 하는 것은 모두 옳은 준수사항이다. 발판 이음 시 겹침길이와 최대폭 등 수치 기준을 정확히 구분해 암기해야 한다.","5105":"흙막이 지보공의 주요 부재로는 흙막이판(토류판), 말뚝(엄지말뚝, H파일), 띠장(웨일), 버팀대(스트럿), 사보강재 등이 있다. 턴버클은 와이어로프나 인장재의 길이를 조절하여 긴장시키는 연결 부속으로 흙막이 지보공의 직접적인 구조 부재가 아니므로 정답은 3번이다. 흙막이판은 토압을 받아 흙의 붕괴를 막고, 말뚝은 수직 지지부재, 띠장은 말뚝을 수평으로 연결하여 버팀대로 토압을 전달하는 역할을 한다. 턴버클은 주로 가새나 인장 보강재의 장력 조정용으로 쓰인다.","5106":"토사 붕괴는 전단응력이 증가하거나 전단강도가 감소할 때 발생한다. 경사 및 기울기 증가, 성토높이 증가, 건설기계 등 외부 하중 작용은 모두 활동을 유발하는 전단응력을 증가시켜 붕괴를 촉진하는 원인이다. 반면 토사중량의 감소는 활동력을 줄여 오히려 붕괴를 억제하는 방향이므로 붕괴 원인이 아니며 정답은 4번이다. 즉 외적 원인은 사면 경사 증가, 절토·성토 높이 증가, 지표수·지하수 침투, 진동 및 반복하중, 토사 중량의 증가 등이 있고, 토사 중량이 감소하면 활동 모멘트가 작아져 안전율이 높아진다.","5107":"이동식 비계에서 작업발판의 최대적재하중은 250kg을 초과하지 않도록 하여야 한다(산업안전보건기준에 관한 규칙 제68조). 따라서 40kg으로 제시한 2번이 틀린 설명으로 정답이다. 비계 최상부에서 작업할 때 안전난간을 설치하고, 승강용 사다리를 견고하게 설치하며, 작업발판은 항상 수평을 유지하고 발판 위에서 안전난간을 딛거나 받침대·사다리를 사용해 작업하지 않도록 하는 것은 모두 옳은 준수사항이다. 또한 바퀴에는 브레이크·쐐기로 갑작스러운 이동을 방지해야 한다.","5108":"건설용 리프트(권상용 와이어로프가 통하고 있는 부분의 윗부분)의 붕괴 등을 방지하기 위해 받침의 수를 증가시키는 등 안전조치를 해야 하는 기준은 순간풍속이 초당 35미터를 초과하는 경우이다(산업안전보건기준에 관한 규칙 제154조). 따라서 정답은 3번이다. 참고로 순간풍속 초당 30미터 초과 시에는 옥외에 설치된 주행 크레인의 이탈방지장치를 작동시켜야 하고, 초당 10미터 초과 시에는 타워크레인 설치·해체 작업을 중지하며, 초당 15미터 초과 시에는 타워크레인 운전작업을 중지한다. 풍속별 안전조치 기준 수치를 구분해 암기하는 것이 중요하다.","5109":"타워크레인의 안전(방호)장치에는 권과방지장치, 과부하방지장치, 비상정지장치, 브레이크장치, 훅 해지장치, 충돌방지장치, 선회제한장치 등이 있다. 호이스트 스위치는 권상장치를 조작하는 작동 스위치에 해당하며 재해를 방지하는 안전장치로 보기 어려우므로 정답은 4번이다. 권과방지장치는 훅의 과도한 감김을, 과부하방지장치는 정격하중 초과 시 작동을 차단하고, 비상정지장치는 위급 시 즉시 정지시키는 역할을 한다. 안전장치와 단순 조작장치를 구분하는 것이 핵심이다.","5110":"달비계에 사용하는 와이어로프는 한 꼬임(스트랜드)에서 끊어진 소선의 수가 10% 이상인 것을 사용 금지한다(산업안전보건기준에 관한 규칙 제63조). 따라서 7% 이상이라고 한 4번이 틀린 설명으로 정답이다. 이음매가 있는 것, 열과 전기충격으로 손상된 것, 지름의 감소가 공칭지름의 7%를 초과하는 것, 꼬임이 있는 것, 심하게 변형되거나 부식된 것은 모두 사용 금지 대상이다. 소선 절단율은 10%, 지름 감소율은 7%로 수치를 정확히 구분하여 암기해야 한다.","5111":"건설업 산업안전보건관리비 계상 및 사용기준은 산업재해보상보험법의 적용을 받는 공사 중 총 공사금액이 2천만 원 이상인 공사에 적용한다(다만 전기공사업법, 정보통신공사업법에 따른 공사는 제외). 따라서 정답은 3번이다. 산업안전보건관리비는 건설공사에서 산업재해 예방을 위해 사용하도록 공사금액에 따라 일정 요율로 계상하는 비용으로, 공사 종류와 규모별로 요율과 기초액이 정해져 있다. 발주자 또는 자기공사자는 도급계약 시 이를 도급금액에 별도로 계상하여야 한다.","5112":"가설구조물은 임시 구조물이라는 인식이 강해 구조물이라는 개념이 확고하지 못하고 조립의 정밀도가 낮은 특징이 있다. 따라서 구조물 개념이 확고하여 조립 정밀도가 높다고 한 3번이 틀린 설명으로 정답이다. 가설구조물은 연결재가 적은 구조가 되기 쉽고, 부재 결합이 간단하여 불완전 결합이 많으며, 사용 부재가 과소단면이거나 결함재가 되기 쉬운 점이 특징이다. 이러한 불안전성 때문에 가설구조물의 붕괴·전도 재해 예방을 위해 구조 검토와 안전점검이 특히 중요하다.","5113":"거푸집 동바리의 침하를 방지하기 위한 직접적인 조치로는 깔목(받침목) 사용, 콘크리트 타설, 말뚝박기 등이 있다(산업안전보건기준에 관한 규칙 제332조). 수평연결재는 동바리의 좌굴 방지와 수평하중에 대한 저항을 위한 것으로 침하 방지와는 직접 관련이 없으므로 정답은 1번이다. 침하는 동바리 하부 지반이 하중을 견디지 못해 내려앉는 현상이므로 지지면을 단단하게 하는 조치가 필요하다. 깔목으로 접지면적을 넓히거나 지반을 콘크리트로 보강, 말뚝으로 지지력을 확보하는 방법이 직접적인 침하 방지 대책이다.","5114":"건설공사의 유해위험방지계획서는 해당 공사의 착공 전날까지 한국산업안전보건공단에 제출하여야 한다(산업안전보건법 시행규칙 제42조). 따라서 정답은 3번이다. 참고로 제조업 등 기계·기구 및 설비를 설치·이전하는 경우에는 작업 시작 15일 전까지 제출하므로 제출 시기를 사업 유형별로 구분해야 한다. 유해위험방지계획서는 일정 규모 이상의 건설공사에서 공사 중 발생할 수 있는 유해·위험요인을 사전에 검토하여 예방대책을 수립하는 제도로, 자격을 갖춘 자의 의견을 들어 작성해야 한다.","5115":"건설업 유해위험방지계획서 제출 대상에서 냉동·냉장 창고시설의 설비공사 및 단열공사는 연면적 5,000㎡ 이상일 때 대상이 되므로 3,000㎡ 이상으로 제시한 2번이 틀린 설명으로 정답이다. 지상높이 31m 이상 또는 연면적 30,000㎡ 이상 건축물, 연면적 5,000㎡ 이상의 문화·집회시설 건설공사, 깊이 10m 이상 굴착공사, 최대 지간 길이 50m 이상 교량 건설공사는 모두 제출 대상이다(산업안전보건법 시행령 제42조). 각 대상별 면적·높이·깊이·지간 길이 수치를 정확히 암기하는 것이 핵심이다.","5116":"사다리식 통로의 길이가 10m 이상인 경우에는 5m 이내마다 계단참을 설치하여야 한다(산업안전보건기준에 관한 규칙 제24조). 따라서 7m 이내마다로 제시한 3번이 틀린 설명으로 정답이다. 발판 간격은 일정하게 하고, 발판과 벽 사이는 15cm 이상의 간격을 유지하며, 사다리 상단은 걸쳐놓은 지점으로부터 60cm 이상 올라가도록 하는 것은 모두 옳은 기준이다. 가설통로의 8m 이상 7m마다 계단참 기준과 혼동하지 않도록 사다리식 통로는 10m 이상에서 5m 이내마다임을 구분해 암기해야 한다.","5117":"철골건립 준비 시 건립작업에 지장이 되는 수목은 제거하거나 이설하여야 한다(철골공사표준안전작업지침). 따라서 다소 지장이 있더라도 수목을 제거하거나 이설해서는 안 된다고 한 2번이 틀린 설명으로 정답이다. 지상 작업장에서 건립준비 및 기계기구 배치 시 낙하물 위험이 없는 평탄한 장소를 선정해 정비하고, 사용 전 기계기구를 정비·보수하며, 기계에 부착된 앵커 등 고정장치와 기초구조를 확인하는 것은 모두 옳은 준수사항이다. 작업 공간 확보와 장애물 제거가 안전한 철골 건립의 전제 조건이다.","5118":"고소작업대를 설치하는 경우 와이어로프 또는 체인의 안전율은 5 이상이어야 한다(산업안전보건기준에 관한 규칙 제186조). 따라서 안전율 3 이상으로 제시한 1번이 틀린 설명으로 정답이다. 붐의 최대 지면경사각을 초과 운전하여 전도되지 않도록 하고, 작업대를 이동할 때 작업대를 가장 낮게 내리며, 끼임·충돌 등을 예방하기 위한 가드 또는 과상승방지장치를 설치하는 것은 모두 옳은 준수사항이다. 와이어로프·체인의 안전율 5 이상 기준을 정확히 기억하는 것이 핵심이다.","5119":"터널 발파작업 시 발파용 점화회선은 누설전류나 유도전류로 인한 조기 폭발을 방지하기 위해 타동력선 및 조명회선과 분리하여 별도로 관리하여야 한다. 따라서 한곳으로 통합하여 관리한다고 한 4번이 틀린 설명으로 정답이다. 발파 전 도화선 연결상태와 저항치 조사를 위한 도통시험 및 발파기 작동상태 사전점검, 모든 동력선을 발원점으로부터 최소 15m 이상 후방으로 이동, 지질·암의 절리에 따른 화약량 검토 및 시방기준 대비 안전조치는 모두 옳은 대책이다. 점화회선의 분리 관리는 의도치 않은 기전류 폭발을 막는 핵심 안전조치이다."};
function expFor(q){
  if(q.exp&&String(q.exp).trim()) return {text:q.exp, ai:false};
  var a=(typeof AI_EXP!=='undefined')?AI_EXP[q.id]:null;
  if(a&&String(a).trim()) return {text:a, ai:true};
  return null;
}

/* ---------- Tier-1: persistence & review features ---------- */
var QMAP={}; ALL.forEach(function(q){QMAP[q.id]=q;});
/* 종목별 저장소 네임스페이스: 임베디드='' (기존 키 유지), 전기='elec_' (빌드 시 치환) */
var NS='cons_';
var LS={
  get:function(k){try{return JSON.parse(localStorage.getItem('cbt_'+NS+k));}catch(e){return null;}},
  set:function(k,v){try{localStorage.setItem('cbt_'+NS+k,JSON.stringify(v));}catch(e){}},
  del:function(k){try{localStorage.removeItem('cbt_'+NS+k);}catch(e){}}
};
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

/* 진행상황 자동저장 / 이어풀기 */
function saveProgress(){
  if(!S||S.submitted)return;
  LS.set('progress',{ids:S.list.map(function(q){return q.id;}),answers:S.answers,idx:S.idx,mode:S.mode,label:S.label,start:S.start,kind:S.kind,perm:S.perm,limitSec:S.limitSec});
}
function clearProgress(){LS.del('progress');}
function resumeProgress(){
  var p=LS.get('progress'); if(!p||!p.ids)return;
  var list=p.ids.map(function(id){return QMAP[id];}).filter(Boolean);
  if(!list.length){clearProgress();renderHomeExtras();return;}
  S={list:list,answers:p.answers||{},idx:Math.min(p.idx||0,list.length-1),mode:p.mode||'exam',label:p.label,submitted:false,start:p.start||Date.now(),kind:p.kind,perm:p.perm,limitSec:p.limitSec};
  show('quiz'); renderQ(); startTimer();
}
function discardProgress(){if(confirm('진행 중인 풀이 기록을 삭제할까요?')){clearProgress();renderHomeExtras();}}

/* 오답노트 (누적) */
function markResult(q,correct){
  if(!q||!q.ans)return;
  var w=LS.get('wrong')||{};
  if(correct)delete w[q.id]; else w[q.id]=1;
  LS.set('wrong',w);
}
function startWrong(){
  var w=LS.get('wrong')||{};
  var list=Object.keys(w).map(function(id){return QMAP[id];}).filter(function(q){return q&&q.ans&&q.opts.length>=2;});
  if(!list.length){alert('오답노트가 비어 있습니다.\n문제를 풀면 틀린 문제가 자동으로 쌓입니다.');return;}
  beginQuiz(shuffle(list),'❌ 오답노트 복습 '+list.length+'문항',true,'wrong');
}

/* 북마크 */
function isBmk(id){var b=LS.get('bookmarks')||{};return !!b[id];}
function toggleBookmark(){
  if(!S)return; var q=S.list[S.idx]; var b=LS.get('bookmarks')||{};
  if(b[q.id])delete b[q.id]; else b[q.id]=1;
  LS.set('bookmarks',b); updBmkBtn(); renderOMR();
}
function updBmkBtn(){
  var btn=$('bmkBtn'); if(!btn||!S)return; var q=S.list[S.idx]; var on=isBmk(q.id);
  btn.textContent=on?'★':'☆'; btn.classList.toggle('on',on);
}
function startBookmarks(){
  var b=LS.get('bookmarks')||{};
  var list=Object.keys(b).map(function(id){return QMAP[id];}).filter(Boolean);
  if(!list.length){alert('북마크한 문제가 없습니다.\n문제 화면의 ☆ 버튼으로 추가할 수 있습니다.');return;}
  beginQuiz(list,'⭐ 북마크 복습 '+list.length+'문항',false,'bookmark');
}

/* 결과창 → 틀린 문제만 다시 풀기 */
function retryWrong(){
  if(!S)return;
  var list=S.list.filter(function(q){return q.ans&&q.opts.length>=2&&S.answers[q.id]!==q.ans;});
  if(!list.length){alert('틀린 문제가 없습니다. 🎉');return;}
  beginQuiz(list,'🔁 오답 다시풀기 '+list.length+'문항',false,'retry');
}

/* 다크 모드 */
function applyTheme(){

/* AI에 물어보기: 질문 형태로 클립보드 복사 */
function stripImg(md){return String(md||'').replace(/!\[[^\]]*\]\([^)]*\)/g,'[이미지 생략]');}
function buildAskPrompt(q){
  var L=[];
  L.push('다음 「임베디드기사 필기」 문제를 풀이해 주세요. 정답이 무엇인지, 왜 그 보기가 정답이고 나머지 보기는 왜 틀렸는지 근거와 함께 자세히 설명해 주세요.');
  L.push('');
  L.push('[문제] '+q.subjectNorm+(q.tag?(' · '+q.tag):'')+' · '+q.setLabel+' '+q.num+'번');
  L.push(stripImg(q.q).trim());
  if(q.opts&&q.opts.length){
    L.push('');
    q.opts.forEach(function(t,i){L.push(CIRC[i]+' '+stripImg(t).trim());});
  } else {
    L.push('');
    L.push('(보기가 원본 이미지 안에 포함되어 텍스트로 제공되지 않습니다.)');
  }
  if(q.ans){
    L.push('');
    L.push('참고로 공개된 정답은 '+CIRC[q.ans-1]+' ('+q.ans+'번) 입니다. 이 정답이 타당한지 검증하고, 타당하다면 그 이유를 설명해 주세요.');
  }
  return L.join('\n');
}
function showToast(msg){
  var t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.textContent=msg; t.className='show';
  clearTimeout(showToast._t); showToast._t=setTimeout(function(){t.className='';},1700);
}
function copyText(txt){
  var ok=function(){showToast('📋 AI 질문이 복사되었습니다');};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok,function(){fallbackCopy(txt,ok);});
  } else { fallbackCopy(txt,ok); }
}
function fallbackCopy(txt,cb){
  try{
    var ta=document.createElement('textarea'); ta.value=txt;
    ta.style.position='fixed'; ta.style.top='-9999px'; ta.setAttribute('readonly','');
    document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0,txt.length);
    document.execCommand('copy'); document.body.removeChild(ta); cb&&cb();
  }catch(e){ alert('복사에 실패했습니다. 텍스트를 직접 선택해 복사해 주세요.'); }
}
function copyAsk(){ if(S) copyText(buildAskPrompt(S.list[S.idx])); }
function copyAskId(id){ var q=QMAP[id]; if(q) copyText(buildAskPrompt(q)); }

/* AI 서비스로 바로 질문 보내기 (GPT/Claude는 URL 프리필, Gemini는 복사+열기) */
var AI_TARGETS={
  gpt:{name:'ChatGPT', base:'https://chatgpt.com/', auto:true, q:function(p){return 'https://chatgpt.com/?q='+encodeURIComponent(p);}},
  gemini:{name:'Gemini', base:'https://gemini.google.com/app', auto:false, q:null},
  claude:{name:'Claude', base:'https://claude.ai/new', auto:true, q:function(p){return 'https://claude.ai/new?q='+encodeURIComponent(p);}}
};
function copyClip(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt)['catch'](function(){fallbackCopy(txt);}); }
  else fallbackCopy(txt);
}
function openExternal(url){
  if(window.AndroidBridge&&AndroidBridge.openUrl){ AndroidBridge.openUrl(url); }
  else { window.open(url,'_blank'); }
}
function qFor(id){ return (id!=null&&id!=='null')?QMAP[id]:(S?S.list[S.idx]:null); }
function askAI(provider,id){
  closeAskMenu();
  var q=qFor(id); if(!q) return;
  var t=AI_TARGETS[provider]; if(!t) return;
  var prompt=buildAskPrompt(q);
  copyClip(prompt); // 항상 복사 (자동입력 실패/Gemini 대비)
  var url=(t.auto&&t.q)?t.q(prompt):t.base;
  if(t.auto&&url.length>7000){ url=t.base; showToast('📋 질문이 길어 복사만 했어요 — '+t.name+'에 붙여넣기'); }
  else if(!t.auto){ showToast('📋 복사됨 — '+t.name+'에서 붙여넣기(Ctrl+V) 하세요'); }
  openExternal(url);
}
function askAICopy(id){ var q=qFor(id); if(q) copyText(buildAskPrompt(q)); closeAskMenu(); }
function closeAskMenu(){ var m=document.getElementById('askMenu'); if(m) m.remove(); }
function openAskMenu(ev,id){
  ev.stopPropagation();
  if(document.getElementById('askMenu')){ closeAskMenu(); return; }
  var arg=(id!=null)?id:'null';
  var m=document.createElement('div'); m.id='askMenu'; m.className='askmenu';
  m.innerHTML='<div class="askmenu-h">AI에게 질문하기</div>'+
    '<button onclick="askAI(\'gpt\','+arg+')">💬 ChatGPT</button>'+
    '<button onclick="askAI(\'gemini\','+arg+')">✨ Gemini</button>'+
    '<button onclick="askAI(\'claude\','+arg+')">🟣 Claude</button>'+
    '<div class="askmenu-sep"></div>'+
    '<button onclick="askAICopy('+arg+')">📋 복사만</button>';
  document.body.appendChild(m);
  var r=ev.target.getBoundingClientRect();
  var w=m.offsetWidth||172;
  m.style.top=(r.bottom+window.scrollY+6)+'px';
  m.style.left=Math.max(8,Math.min(r.left+window.scrollX, window.innerWidth-w-8))+'px';
  setTimeout(function(){ document.addEventListener('click',closeAskMenu,{once:true}); },0);
}

/* ---------- Tier-2: stats / filters / search ---------- */
function jsq(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

/* 누적 통계 (과목별 정답률) */
function recordStat(q,correct){
  if(!q||!q.ans)return;
  var st=LS.get('stats')||{subj:{},total:{seen:0,correct:0}};
  st.total.seen++; if(correct)st.total.correct++;
  var s=q.subjectNorm||'기타';
  st.subj[s]=st.subj[s]||{seen:0,correct:0};
  st.subj[s].seen++; if(correct)st.subj[s].correct++;
  LS.set('stats',st);
}
function resetStats(){ if(confirm('누적 학습 통계를 초기화할까요?')){LS.del('stats');renderHomeExtras();} }

/* 과목/유형별 학습 */
function startSubject(s){
  var list=ALL.filter(function(q){return q.subjectNorm===s&&q.ans&&q.opts.length>=2;});
  if(!list.length){alert('해당 과목의 채점가능 문제가 없습니다.');return;}
  beginQuiz(shuffle(list),'🗂 '+s+' '+list.length+'문항',true,'subject');
}
function startTag(t){
  var list=ALL.filter(function(q){return q.tag===t&&q.ans&&q.opts.length>=2;});
  if(!list.length){alert('해당 유형의 채점가능 문제가 없습니다.');return;}
  beginQuiz(shuffle(list),'🏷 '+t+' '+list.length+'문항',true,'tag');
}

/* 키워드 검색 */
function doSearch(){
  var kw=(($('searchInput')||{}).value||'').trim().toLowerCase();
  if(!kw){return;}
  var list=ALL.filter(function(q){
    if(!(q.ans&&q.opts.length>=2))return false;
    var hay=(q.q+' '+(q.opts||[]).join(' ')+' '+(q.exp||'')).toLowerCase();
    return hay.indexOf(kw)>=0;
  });
  if(!list.length){ $('searchHint').textContent='“'+kw+'” 검색 결과가 없습니다.'; return; }
  beginQuiz(list,'🔎 "'+kw+'" 검색 '+list.length+'문항',false,'search');
}

/* 홈: 통계 + 필터 + 검색 카드 */
function renderTier2(){
  var box=$('tier2Box'); if(!box)return;
  var html='';
  var st=LS.get('stats');
  if(st&&st.total&&st.total.seen>0){
    var tp=Math.round(st.total.correct/st.total.seen*100);
    var subs=Object.keys(st.subj).map(function(k){var o=st.subj[k];return {k:k,p:Math.round(o.correct/o.seen*100),seen:o.seen};});
    var weak=subs.filter(function(x){return x.seen>=3;}).sort(function(a,b){return a.p-b.p;}).slice(0,3);
    html+='<div class="card"><div class="row" style="justify-content:space-between"><b>📊 누적 학습 통계</b>'
      +'<button class="btn ghost small" onclick="resetStats()">초기화</button></div>'
      +'<div class="muted small" style="margin:6px 0 4px">총 '+st.total.seen+'문항 시도 · 정답 '+st.total.correct+' · 정답률 <b style="color:var(--accent)">'+tp+'%</b></div>';
    if(weak.length){
      html+='<div class="small" style="margin-top:6px"><b>취약 과목</b> ';
      weak.forEach(function(x){ var c=x.p>=60?'var(--ok)':x.p>=40?'var(--warn)':'var(--bad)'; html+='<span class="chip" style="margin:2px"><span style="color:'+c+'">'+esc(x.k)+' '+x.p+'%</span></span>'; });
      html+='</div>';
    }
    html+='</div>';
  }
  var subjList={};
  ALL.forEach(function(q){ if(q.ans&&q.opts.length>=2){ subjList[q.subjectNorm]=(subjList[q.subjectNorm]||0)+1; }});
  html+='<div class="card"><b>🗂 과목별 학습</b><div class="row" style="margin-top:10px;flex-wrap:wrap;gap:8px">';
  Object.keys(subjList).sort().forEach(function(s){ html+='<button class="btn ghost small" onclick="startSubject(\''+jsq(s)+'\')">'+esc(s)+' <span class="muted">'+subjList[s]+'</span></button>'; });
  html+='</div></div>';
  html+='<div class="card"><b>🔎 검색</b><div class="row" style="margin-top:10px;gap:8px;flex-wrap:wrap">'
    +'<input id="searchInput" placeholder="문제·보기·해설 키워드" style="flex:1;min-width:160px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--txt)" onkeydown="if(event.key===\'Enter\')doSearch()">'
    +'<button class="btn" onclick="doSearch()">검색</button></div>'
    +'<div class="muted small" id="searchHint" style="margin-top:8px"></div></div>';
  box.innerHTML=html;
}

/* ---------- 학습 모드: 개념 정리 → 관련 문제 풀이 반복 ---------- */
var STUDY=null;
function renderStudyHome(){
  var box=$('studyHomeBox'); if(!box) return;
  var subs=Object.keys(CONCEPTS||{});
  if(!subs.length){ box.innerHTML=''; return; }
  var studied=LS.get('studied')||{};
  var html='<div class="card"><b>📚 개념 학습</b> <span class="muted small">개념 정리 → 관련 문제 풀이 반복</span>'+
    '<div class="grid concept-list" style="margin-top:12px">';
  subs.forEach(function(s){
    var n=CONCEPTS[s].length, done=Math.min((studied[s]||[]).length, n);
    html+='<div class="setcard" onclick="startStudy(\''+jsq(s)+'\')"><div class="t">'+esc(s)+'</div>'+
      '<div class="s">개념 '+n+'개 · 학습 '+done+'/'+n+'</div></div>';
  });
  box.innerHTML=html+'</div></div>';
}
function startStudy(subject, idx){
  var list=(CONCEPTS||{})[subject]||[];
  if(!list.length){ alert('해당 과목 개념이 아직 없습니다.'); return; }
  STUDY={subject:subject, list:list, idx:(idx!=null?idx:0)};
  showStudy();
}
function markStudied(subject, idx){
  var st=LS.get('studied')||{}, arr=st[subject]||[];
  if(arr.indexOf(idx)<0){ arr.push(idx); st[subject]=arr; LS.set('studied',st); }
}
function showStudy(){
  if(!STUDY) return;
  var c=STUDY.list[STUDY.idx], n=STUDY.list.length;
  markStudied(STUDY.subject, STUDY.idx);
  var qn=(c.qids||[]).filter(function(id){var q=QMAP[id]; return q&&q.ans&&q.opts.length>=2;}).length;
  var html='<div class="card">'+
    '<div class="row" style="justify-content:space-between;gap:8px">'+
      '<span class="chip">'+esc(STUDY.subject)+' · 개념 '+(STUDY.idx+1)+'/'+n+'</span>'+
      '<button class="btn ghost small" onclick="goHome()">목록</button></div>'+
    '<div class="concept-title">'+esc(c.title)+'</div>'+
    '<div class="concept-note mdnote">'+fmtNote(c.note)+'</div>'+
    '<div class="row" style="margin-top:18px;justify-content:space-between;flex-wrap:wrap;gap:10px">'+
      '<button class="btn ghost" onclick="studyNav(-1)"'+(STUDY.idx===0?' disabled':'')+'>◀ 이전</button>'+
      '<button class="btn" onclick="studyQuiz()">📝 관련 문제 풀기 ('+qn+'문항)</button>'+
      '<button class="btn ghost" onclick="studyNav(1)"'+(STUDY.idx>=n-1?' disabled':'')+'>다음 ▶</button>'+
    '</div></div>';
  $('studyBox').innerHTML=html;
  $('topMeta').innerHTML='<span>📚 '+esc(STUDY.subject)+'</span>';
  show('study'); try{window.scrollTo(0,0);}catch(e){}
}
function studyNav(d){ if(!STUDY)return; var k=STUDY.idx+d; if(k<0||k>=STUDY.list.length)return; STUDY.idx=k; showStudy(); }
function studyQuiz(){
  if(!STUDY)return;
  var c=STUDY.list[STUDY.idx];
  var list=(c.qids||[]).map(function(id){return QMAP[id];}).filter(function(q){return q&&q.ans&&q.opts.length>=2;});
  if(!list.length){ alert('이 개념에 연결된 문제가 없습니다.'); return; }
  var ctx={subject:STUDY.subject, idx:STUDY.idx};
  beginQuiz(list, '📚 '+STUDY.subject+' · '+c.title, false, 'concept');
  S.studyCtx=ctx;
}
function studyContinue(subject, idx){
  var list=CONCEPTS[subject]||[];
  if(idx>=list.length){ alert('「'+subject+'」 개념 학습을 모두 마쳤습니다! 🎉'); goHome(); return; }
  startStudy(subject, idx);
}
