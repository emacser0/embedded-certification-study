<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>자격증 CBT — 종목 선택</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--line:#334155;--txt:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:linear-gradient(160deg,#0f172a,#1e293b);color:var(--txt);
    font-family:"Malgun Gothic","맑은 고딕",system-ui,-apple-system,sans-serif}
  .wrap{max-width:760px;margin:0 auto;padding:48px 18px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
  h1{font-size:26px;margin:0 0 6px;text-align:center}
  .sub{color:var(--muted);text-align:center;margin-bottom:32px;font-size:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:18px}
  .pick{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:30px 24px;transition:.18s;cursor:pointer}
  .pick:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.35)}
  .emoji{font-size:46px;line-height:1}
  .pick .t{font-size:21px;font-weight:800;margin:14px 0 6px}
  .pick .d{color:var(--muted);font-size:13px;line-height:1.6}
  .badge{display:inline-block;margin-top:14px;font-size:12px;color:var(--accent);
    border:1px solid var(--accent);border-radius:999px;padding:3px 12px}
  footer{color:var(--muted);text-align:center;font-size:12px;margin-top:34px}
</style>
</head>
<body>
<div class="wrap">
  <h1>📚 자격증 CBT</h1>
  <div class="sub">공부할 종목을 선택하세요</div>
  <div class="grid">
    <a class="pick" href="embedded.html">
      <div class="emoji">📘</div>
      <div class="t">임베디드기사</div>
      <div class="d">연도별 기출 + 2025 복원본 733문항 · 상세 AI 해설 · 개념 학습 모드</div>
      <span class="badge">733문항</span>
    </a>
    <a class="pick" href="electric.html">
      <div class="emoji">⚡</div>
      <div class="t">전기기사</div>
      <div class="d">2013~2022 기출 29회차 · 5과목 · 수식 LaTeX 렌더 · AI 해설</div>
      <span class="badge">2,898문항</span>
    </a>
    <a class="pick" href="gconsafety.html">
      <div class="emoji">🦺</div>
      <div class="t">건설안전기사</div>
      <div class="d">2007~2022 기출 47회차 · 6과목 · 텍스트 변환 · AI 해설</div>
      <span class="badge">5,634문항</span>
    </a>
  </div>
  <footer>로컬 전용 학습 도구 · 진행기록은 종목별로 브라우저에 저장됩니다</footer>
</div>
<script>
if('serviceWorker' in navigator && location.protocol==='https:'){
  try{ navigator.serviceWorker.register('sw.js')['catch'](function(){}); }catch(e){}
}
</script>
</body>
</html>
