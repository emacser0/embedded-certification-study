<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>임베디드기사 필기 CBT</title>
<style>
  :root{
    --bg:#f1f5f9; --panel:#ffffff; --panel2:#f8fafc; --line:#e2e8f0;
    --txt:#1e293b; --muted:#64748b; --accent:#2563eb; --accent2:#1d4ed8;
    --ok:#16a34a; --bad:#dc2626; --warn:#d97706; --chip:#f1f5f9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:"Malgun Gothic","맑은 고딕",system-ui,-apple-system,sans-serif;line-height:1.6}
  a{color:var(--accent)}
  .wrap{max-width:980px;margin:0 auto;padding:16px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20}
  header.top h1{font-size:17px;margin:0;cursor:pointer}
  .top .meta{font-size:13px;color:var(--muted);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:9px 14px;
    font-size:14px;cursor:pointer;font-weight:600}
  .btn:hover{background:var(--accent2)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .btn.ok{background:var(--ok)} .btn.warn{background:var(--warn);color:#1a1a1a}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .setcard{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;
    cursor:pointer;transition:.15s}
  .setcard:hover{border-color:var(--accent);transform:translateY(-2px)}
  .setcard .t{font-weight:700;font-size:15px}
  .setcard .s{color:var(--muted);font-size:12px;margin-top:6px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .muted{color:var(--muted)} .small{font-size:13px}
  .chip{display:inline-block;background:var(--chip);border:1px solid var(--line);
    border-radius:999px;padding:2px 10px;font-size:12px;color:var(--muted)}
  /* question */
  .qhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
  .qno{font-size:20px;font-weight:800}
  .qbody{font-size:16px;margin:6px 0 14px}
  .qbody img{max-width:100%;background:#fff;border-radius:8px;margin:8px 0;display:block}
  .qbody pre{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;
    overflow:auto;font-size:13px;color:#0f172a}
  .qbody code{font-family:Consolas,monospace}
  .qbody table{border-collapse:collapse;margin:8px 0;font-size:14px;width:auto}
  .qbody th,.qbody td{border:1px solid var(--line);padding:6px 10px;text-align:center}
  .qbody th{background:var(--panel2)}
  .qbody blockquote{margin:8px 0;padding:8px 14px;border-left:3px solid var(--accent);
    background:var(--panel2);border-radius:0 8px 8px 0}
  .qbody ul{margin:8px 0;padding-left:22px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;cursor:pointer;background:var(--panel2);transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt .num{flex:0 0 26px;height:26px;border-radius:50%;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .opt.sel{border-color:var(--accent);background:#dbeafe}
  .opt.sel .num{background:var(--accent);color:#fff;border-color:var(--accent)}
  .opt.correct{border-color:var(--ok);background:#dcfce7}
  .opt.correct .num{background:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:#fee2e2}
  .opt.wrong .num{background:var(--bad);color:#fff}
  .feedback{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:14px;display:none}
  .feedback.show{display:block}
  .feedback.good{background:#dcfce7;border:1px solid var(--ok)}
  .feedback.bad{background:#fee2e2;border:1px solid var(--bad)}
  .expl{margin-top:8px;color:#475569;font-size:13.5px;white-space:pre-wrap}
  /* omr */
  .omr{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .omr .cell{aspect-ratio:1;border:1px solid var(--line);border-radius:7px;background:var(--panel2);
    display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;font-weight:600}
  .omr .cell:hover{border-color:var(--accent)}
  .omr .cell.answered{background:var(--accent);color:#fff;border-color:var(--accent)}
  .omr .cell.cur{outline:2px solid #0f172a;outline-offset:1px}
  .omr .cell.ok{background:var(--ok);color:#fff;border-color:var(--ok)}
  .omr .cell.no{background:var(--bad);color:#fff;border-color:var(--bad)}
  .omr .cell.flag::after{content:"";position:relative}
  .navbtns{display:flex;justify-content:space-between;gap:10px;margin-top:16px}
  /* results */
  .score{font-size:42px;font-weight:900}
  .bar{height:10px;background:var(--panel2);border-radius:999px;overflow:hidden;margin-top:6px}
  .bar>i{display:block;height:100%}
  .subjrow{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:10px 0;border-bottom:1px solid var(--line)}
  .tag{font-size:11px;padding:1px 8px;border-radius:6px}
  .tag.pass{background:#dcfce7;color:var(--ok)} .tag.fail{background:#fee2e2;color:var(--bad)}
  .hide{display:none!important}
  .toggle{display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
  .toggle input{width:16px;height:16px}
  footer{color:var(--muted);font-size:12px;text-align:center;padding:24px}
  @media(max-width:600px){.omr{grid-template-columns:repeat(6,1fr)}}
  /* --- Tier 1 additions --- */
  #themeBtn{padding:7px 10px;font-size:15px;line-height:1}
  .bmk{background:none;border:0;font-size:22px;line-height:1;cursor:pointer;color:#94a3b8;padding:0 2px}
  .bmk.on{color:#f59e0b}
  .askbtn{background:none;border:0;font-size:18px;line-height:1;cursor:pointer;padding:0 2px;opacity:.85}
  .askbtn:hover{opacity:1}
  .btn.small{padding:6px 11px;font-size:13px}
  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:#0f172a;color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;
    opacity:0;pointer-events:none;transition:.2s;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.25)}
  #toast.show{opacity:.96;transform:translateX(-50%) translateY(0)}
  .card.resume{border-color:var(--accent);background:linear-gradient(0deg,var(--panel),var(--panel))}
  .omr .cell.flag{position:relative}
  .omr .cell.flag::after{content:"";position:absolute;top:3px;right:3px;width:6px;height:6px;
    border-radius:50%;background:#f59e0b;box-shadow:0 0 0 1px var(--panel)}
  /* dark theme */
  html.dark{
    --bg:#0f172a; --panel:#1e293b; --panel2:#172033; --line:#334155;
    --txt:#e2e8f0; --muted:#94a3b8; --accent:#3b82f6; --accent2:#2563eb;
    --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b; --chip:#0b1220;
  }
  html.dark .opt.sel{background:#1e3a5f}
  html.dark .opt.correct{background:#14331f}
  html.dark .opt.wrong{background:#3b1717}
  html.dark .feedback.good{background:#14331f}
  html.dark .feedback.bad{background:#3b1717}
  html.dark .qbody pre,html.dark .qbody code{background:#0b1220;color:#e2e8f0}
  html.dark .qbody img{background:#e2e8f0}
  html.dark .tag.pass{background:#14331f} html.dark .tag.fail{background:#3b1717}
</style>
</head>
<body>
<header class="top">
  <h1 onclick="goHome()">📘 임베디드기사 필기 CBT</h1>
  <div class="meta" id="topMeta"></div>
  <button class="btn ghost" id="themeBtn" onclick="toggleTheme()" title="다크 모드 전환">🌙</button>
</header>

<div class="wrap">
  <!-- HOME -->
  <section id="home">
    <div id="resumeBox"></div>
    <div id="reviewBox"></div>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div><b>회차를 선택하세요</b> <span class="muted small">— 연도별 기출 / 2025 복원본</span></div>
        <label class="toggle small"><input type="checkbox" id="practiceMode" checked> 연습 모드(즉시 정답 확인)</label>
      </div>
      <div class="row small" style="gap:18px;margin-top:10px;flex-wrap:wrap">
        <label class="toggle"><input type="checkbox" id="shuffleOpts"> 보기 순서 섞기</label>
        <label class="toggle">⏱ 실전 제한시간
          <select id="timeLimit" style="padding:5px 8px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);color:var(--txt)">
            <option value="0">없음</option><option value="30">30분</option><option value="60">60분</option><option value="90">90분</option><option value="120">120분</option>
          </select>
        </label>
        <span class="muted" style="font-size:12px">제한시간은 실전 모드(연습 해제)에서 적용</span>
      </div>
      <div class="grid" id="setGrid" style="margin-top:14px"></div>
    </div>
    <div id="tier2Box"></div>
    <div class="card">
      <b>🎲 랜덤 모의고사</b>
      <div class="muted small" style="margin:6px 0 12px">전체 문제에서 무작위로 출제 (정답이 있는 문제만)</div>
      <div class="row">
        <button class="btn" onclick="startRandom(20)">20문항</button>
        <button class="btn" onclick="startRandom(40)">40문항</button>
        <button class="btn" onclick="startRandom(80)">80문항</button>
      </div>
    </div>
    <div class="card small muted" id="statBox"></div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hide">
    <div class="card">
      <div class="qhead">
        <span class="qno" id="qNo"></span>
        <span class="row" style="gap:8px">
          <span class="chip" id="qSubj"></span>
          <button class="askbtn" id="askBtn" onclick="copyAsk()" title="AI에 물어볼 질문 복사">🤖</button>
          <button class="bmk" id="bmkBtn" onclick="toggleBookmark()" title="북마크 추가/해제">☆</button>
        </span>
      </div>
      <div class="qbody" id="qBody"></div>
      <div class="opts" id="qOpts"></div>
      <div class="feedback" id="qFeed"></div>
      <div class="navbtns">
        <button class="btn ghost" id="prevBtn" onclick="move(-1)">◀ 이전</button>
        <div class="row">
          <button class="btn ghost" onclick="clearAns()">선택해제</button>
          <button class="btn ghost" onclick="goHome()">나가기</button>
        </div>
        <button class="btn" id="nextBtn" onclick="move(1)">다음 ▶</button>
      </div>
    </div>
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:10px">
        <b>답안지(OMR)</b>
        <button class="btn warn" onclick="submitQuiz()">제출 / 채점</button>
      </div>
      <div class="omr" id="omr"></div>
    </div>
  </section>

  <!-- RESULTS -->
  <section id="results" class="hide">
    <div class="card" id="scoreCard"></div>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <b>📑 문제 리뷰</b>
        <label class="toggle small"><input type="checkbox" id="wrongOnly" onchange="renderReview()"> 틀린 문제만</label>
      </div>
      <div id="review"></div>
    </div>
    <div class="row" style="justify-content:center;margin:10px 0;gap:10px">
      <button class="btn warn" onclick="retryWrong()">🔁 틀린 문제만 다시 풀기</button>
      <button class="btn" onclick="goHome()">처음으로</button>
    </div>
  </section>
</div>
<footer>임베디드기사 필기 CBT · 데이터: 연도별 기출 + 2025 복원본 · 로컬 전용</footer>

<script>
var DATA = {"questions":[{"id":1,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":1,"q":"임베디드 하드웨어 전원에 대한 설명으로 옳지 않은 것은?","opts":["OS는 시스템 부하에 따라 idle모드와 sleep모드로 변경한다.","어댑터는 AC 110V 혹은 220V의 전원을 DC 8, 11, 22V등의 가정용 저전압으로     변환하는 장치이다.","전압 레귤레이터는 ON/OFF 과정을 통해 일정한 평균전압을 일정 범위 내 원하는     전압으로 변환하는 기능을 수행한다.","리눅스가 지원하는 전원 관리 표준은 APM과 ACPI가 있다."],"ans":3,"exp":"선후관계가 반전되었다. 레귤레이터는 일정 범위 내 DC 전압을 일정한 DC전압으로 변환하는 장치이다.","tag":"완전 신출"},{"id":2,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":2,"q":"USB에 관한 설명으로 옳지 않은 것은?","opts":["접지되는 부분의 마모로 인식에 한계가 존재한다.","핫 플러그를 지원하여 컴퓨터에 전원이 켜져 있는 상태에서도 바로 연결할 수 있다.","USB는 64개의 주변 기기를 지원하며 자체 220V 전원을 공급할 수 있다.","USB 3.0버전은 최대 5Gbps의 속도를 지원한다."],"ans":3,"exp":"USB는 명칭 그대로 직렬 포트이므로 이론상 한 PC에 127개까지만 인식이 가능하다. 또한, 상식적으로 생각해봐도 USB가 220V의 전원을 공급한다면 USB만으로도 컴퓨터가 부팅이 가능한데 이건 말이 안된다. USB는 +5V의 전원을 공급한다.","tag":"완전 신출"},{"id":3,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":3,"q":"리눅스의 물리적 공간을 논리적으로 나눌 때 최대 몇 개의 파티션으로 나눌 수 있는가?","opts":["12개","5개","1개","10개"],"ans":1,"exp":"리눅스는 프라이머리 3개, 확장파티션 1개, 논리파티션 12개로 총 16개의 파티션으로 나눌 수 있다.","tag":"완전 신출"},{"id":4,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":4,"q":"A,B,C,D의 데이터를 C,D,A,B 순서대로 결과값을 얻고자 할 때 push와 pop을 수행한 순서로 옳은 것은?","opts":["pop-pop-push-push-pop-pop-push-push","pop-pop-push-push-pop-push-pop-push","push-push-pop-pop-push-push-pop-pop","push-push-pop-pop-push-pop-push-pop"],"ans":3,"exp":"일단, C,D를 얻기 위해서는 A를 PUSH하고 B를 PUSH하므로 1,2번은 소거되고, A,B가 남은 상태에서 1번 PUSH하면 B,A가 되고, 여기서 다시 PUSH하면 A,B가 되므로 3번이 정답이다.","tag":"기출변형"},{"id":5,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":5,"q":"다음 설명에 해당하는 객체 지향 분석 방법으로 옳은 것은?\n\n- 문제를 정의한다.(요구사항 분석)\n- 비공식 전략을 개발한다.(문제 해결을 위해 무엇을 행하여야 하는가?)\n- 전략을 공식화한다.\n- 설계가 모두 이루어질 때까지 문제 정의, 비공식 전략 개발, 전략의 공식화를 반복 적용한다.\n- 클래스와 객체를 구현한다.\n- 프로그램의 구성요소는 명세 부분과 외부로부터 감추어진 부분(사각형)으로 표시한다.\n- 구름 모양은 개별 구분 또는 정의되지 않은 구현 상세를 나타낸다.\n- 둥근 사각형은 자료 객체, 직사각형은 객체 연산을 나타낸다.\n- 미시적, 거시적 프로세스를 모두 사용하는 분석하는 방법이다.","opts":["Coad와 Yourdon의 객체 지향 분석","Booch의 객체 지향 분석","Rambaugh의 객체 지향 분석","Jacobson의 객체 지향 분석"],"ans":2,"exp":"성안당 2013 임베디드기사 p.416의 설명을 보기로 그대로 전부 주고 맞추라는 식으로 기출보다 상당히 심화버전의 문제이다. 이 문제가 있다는 것은 다른 객체지향 분석에 대한 문제도 문제은행에 있다는 반증이니 1,3,4번 선지에 대한 특징도 전부 정리해야 할 것이다.","tag":"2013년 70번 기출 심화 응용"},{"id":6,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":6,"q":"RS-232의 PIN 번호의 기능과 표기에 관한 연결로 옳지 않은 것은?\n\n| 핀 | 단자명 | 기능 | 표기 |\n|---|---|---|---|\n| 1 | DATA CARRIER DETECT | 데이터 캐리어 검출 | DCD |\n| 2 | RECEIVED DATA | 수신 데이터 | RXD |\n| 3 | TRANSMITTED DATA | 송신 데이터 | TXD |\n| 4 | DATA TERMINAL READY | 데이터 단말 준비 | DTR |\n| 5 | SIGNAL GROUND | 신호용 접지 | GND |\n| 6 | DATA SET READY | 데이터 세트 허가 | DSR |\n| 7 | REQUEST TO SEND | 송신 요구 | RTS |\n| 8 | CLEAR TO SEND | 송신 허가 | CTS |\n| 9 | RING INDICATOR | 벨울림 검출 | RI |","opts":["데이터 단말 준비-DCD","송신 데이터-TXD","데이터 세트 허가-DSR","송신 허가-CTS"],"ans":1,"exp":"RS232 9핀 신호체계는 다음과 같다. 즉, DCD는 데이터 단말 준비가 아닌 데이터 캐리어 검출에 해당한다.","tag":"완전 신출"},{"id":7,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":7,"q":"다음 논리회로의 명칭은 무엇인가?\n\n![문제 7 그림](images/img001.jpg)","opts":["기수 패리티 발생 회로","비교기","병렬 가감산기","전가산기"],"ans":3,"exp":"인터넷에 비슷한 사진 자체부터가 아예 없어서 직접 그렸다. 정확한 복원을 위해 깔끔하지 못하게 그렸으니 양해의 말씀을... 각설하고 해설하면, 얼핏보면 비교기 같이 보이나, 비교기는 F3부분 B부분에 NOT게이트가 하나 더 붙어야 하고, F4가 없어야 한다. 잘 보면 반가산기와 반감산기를 병렬로 연결한 형태임을 알 수 있다. 전가산기야 다들 잘 알테니 설명은 생략하고, 기수 패리티 발생회로와 우수 패리티 발생회로는 사진을 보고 필히 숙지할 것!","tag":"완전 신출"},{"id":8,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":8,"q":"블랙 박스 테스트에 대한 설명으로 옳지 않은 것은?","opts":["기초적 모델 관점과 데이터, 입출력 위주의 검사 방법으로, 기능검사이다.","경계값 검사는 경계 근처의 입력값의 오류 가능성을 테스트 하는 방법이다.","원시 프로그램과 상관없이 결과만 옳으면 검사를 통과하는 방법이다.","프로그램 원시 코드의 논리적 구조를 커버하도록 테스트 케이스를 설계한다."],"ans":4,"exp":"4번은 화이트박스 테스트에 대한 설명이다. 기존에는 검사 방법으로 옳지 않은 문제를 고르는 문제였으나, 설명을 주고 옳지 않은 것을 고르는 문제가 문제은행에 추가된 것으로 보아 각 테스트에 대한 특징을 모두 숙지해야 할 것으로 생각된다.","tag":"22년 기출 변형"},{"id":9,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":9,"q":"OSI-7계층에서 실제 회선의 연결을 확립, 유지, 단절하기 위한 기계적, 전기적, 기능적, 절차적 특성을 정의하는 계층은?","opts":["물리 계층","전송 계층","데이터링크 계층","표현 계층"],"ans":1,"exp":"","tag":"완전 신출-하지만 쉬운 편"},{"id":10,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":10,"q":"유닉스 표준 시그널에서 시그널의 명칭과 발생 및 용도를 짝지은 것으로 옳지 않은 것은?","opts":["SIGTSTP는 CTRL+Z로 생성하여 터미널을 정지시키는 문자이다.","SIGHUP는 터미널에서 접속이 끊겼을 때 CTRL+Q로 프로세스를 재시작한다.","SIGINT는 CTRL+C로 실행을 중지시키는 문자이다.","SIGQUIT는 CTRL+⧹로 종료 요청과 함께 코어 덤프를 생성한다."],"ans":2,"exp":"SIGHUP는 Hangup 시그널로 전화선이 끊어졌을 때 발생한다. 즉, 디폴트 액션은 종료를 취하며, 변화된 내용을 적용하기 위해 재시작할 때 사용하며, 입력 명령어는 따로 존재하지 않는다. 또한, CTRL+Q라는 단축키는 존재하지도 않는다.","tag":"완전 신출"},{"id":11,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":11,"q":"리눅스의 SIGCHLD 시그널에 대한 설명으로 옳지 않은 것은?","opts":["자식 프로세스가 좀비가 되는 것을 막기 위해서 wait 또는 waitpid 함수를 사용한다.","자식 프로세스가 종료될 경우 종료 상태를 부모 프로세스에게 보내지 않는다.","자식 프로세스가 종료되면 SIGCHLD_HANDLER함수를 통해 시그널 핸들러를 수행한다.","자식보다 부모가 먼저 종료될 경우 데몬 프로세스가 새로운 부모 프로세스가 되어    고아 프로세스가 작업을 마치고 종료될 수 있도록 한다."],"ans":2,"exp":"자식 프로세스가 종료될 경우 종료 상태를 부모에게 자동으로 보낸다. 이것이 SIGCHLD 시그널이다. 하지만, 자식 프로세스에 발생한 결함은 부모에게 전파되지 않는다. 반면, 스레드에서는 자식 스레드에 결함 발생시 부모 스레드로 전파된다.","tag":"완전 신출"},{"id":12,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":12,"q":"다음의 리눅스 부팅과정 5단계 순서를 옳게 나열한 것은?\n\n- ㄱ. 시스템 전원 공급\n- ㄴ. 커널 단계\n- ㄷ. BIOS 단계\n- ㄹ. 부트로드 단계\n- ㅁ. init 프로세스 단계","opts":["ㄱ → ㄴ → ㄷ → ㄹ → ㅁ","ㄱ → ㄹ → ㄷ → ㅁ → ㄴ","ㄱ → ㄷ → ㄹ → ㄴ → ㅁ","ㄱ → ㅁ → ㄹ → ㄴ → ㄷ"],"ans":3,"exp":"일단, init가 맨 마지막에 수행됨을 안다면 1,3번만 남게 된다. 그리고 커널도 부트로드와 바이오스 과정을 모두 거쳐야 실행될 수 있으므로 답은 3번이 된다.","tag":"완전 신출"},{"id":13,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":13,"q":"LVM(Logical Volume Management)에 대한 설명으로 옳지 않은 것은?","opts":["작은 용량의 저장 장치를 하나의 장치처럼 사용하는 기능을 제공한다.","여러 장치를 묶어서 하나의 장치로 표현될 때 사용한다.","합쳐진 하나의 디바이스 사이즈 조정이 자유롭다.","볼륨이 깨지거나 운영 체제가 손상되더라도 자료 복구가 용이하다."],"ans":4,"exp":"LVM은 서로 다른 디바이스를 하나로 묶어서 직관적으로 저장 장치에 접근할 수 있도록 하는 장점이 있으나, 볼륨이 깨지거나 운영 체제가 손상되는 경우 자료 복구가 어렵다는 단점이 존재한다. 이러한 LVM의 단점을 보완하기 위해 현재는 RAID방식을 더 많이 사용한다.","tag":"완전 신출"},{"id":14,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":14,"q":"동적 메모리를 할당하는 함수와 일반적인 커널 메모리를 의미하는 플래그를 옳게 짝지은 것은?","opts":["vmalloc – GFP_KERNEL","kmalloc – GFP_KERNEL","vmalloc – GFP_ATOMIC","kmalloc – GFP_ATOMIC"],"ans":2,"exp":"동적 메모리를 할당하는 함수는 kmalloc으로 2,4번 중 하나인데, 일반적인 커널 메모리라고 하였으므로 GFP_KERNEL이 된다. GFP_ATOMIC은 GFP_KERNEL 플래그 사용시 Sleep모드에 빠질 경우 사용하는 긴급상황용 메모리이다.","tag":"완전 신출"},{"id":15,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":15,"q":"리눅스 쉘 로그인 과정을 옳게 나열한 것은?","opts":["/etc/profile → /etc/bashrc → ~/.bashrc → ~/.bash_profile","/etc/profile → ~/.bagh_profile → /etc/bashrc → ~/.bashrc","/etc/bashrc → ~/.bashrc → /etc/profile → ~/.bash_profile","/etc/bashrc → /etc/profile → ~/.bashrc → ~/.bash_profile"],"ans":1,"exp":"설정에 필요한 파일이 있는 디렉토리에 먼저 접근해야 하므로 1,4번 중 하나인데, /etc/profile에 먼저 접근해야 하므로 답은 1번이다. 사람에 대해 파악할 때 프로필을 먼저 봐야 파악할 수 있는 것과 비슷하다고 연상하면 편하다.","tag":"완전 신출"},{"id":16,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":16,"q":"리눅스에서 stat() 함수에 대한 설명으로 옳은 것은?","opts":["리눅스의 프로세스, 메모리, 페이징, I/O 블록의 상태를 출력한다.","실시간으로 CPU, 메모리 사용량 등 시스템 자원 사용 현황과 프로세스 목록을 보여준다.","디렉토리나 파일의 상세 정보를 출력한다.","CPU 아키텍쳐, 코어 수, 스레드 수 등 CPU 상세 정보를 보여준다."],"ans":3,"exp":"1번은 vmstat함수, 2번은 top함수, 4번은 iscpu함수에 대한 설명이다.","tag":"완전 신출"},{"id":17,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":17,"q":"0~3V에서 3비트 A/D변환할 때, 1LSB는 약 몇 V인가?","opts":["0.125V","0.375V","0.429V","0.667V"],"ans":2,"exp":"일단 LSB는 여기서비트수에서 3비트이므로 가 된다.","tag":"2019년 26번 그대로"},{"id":18,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":18,"q":"리눅스 쉘의 종류로 옳지 않은 것은?","opts":["C 쉘","Bourne 쉘","A 쉘","Korn 쉘"],"ans":3,"exp":"","tag":"2016년 23번 기출 변형"},{"id":19,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":19,"q":"JTAG 레지스터에 속하지 않는 것은?","opts":["Identification register","boundary register","Bypass register","Instruction register"],"ans":2,"exp":"boundary register는 존재하지 않으나 boundary-scan register는 존재한다. 그 외에도 internal register가 있다.","tag":"완전 신출"},{"id":20,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":20,"q":"다음 C언어의 실행 결과로 옳은 것은?\n\n```c\n#include<stdio.h>\nint main(void){\n    printf(\"HelloWorld\\n\");\n    return 0;\n}\n# arm-linux-gcc -o hello hello.c\n```","opts":["화면에는 HelloWorld 메시지가 출력된다.","화면에는 아무런 메시지도 출력되지 않는다.","타겟에서 hello 프로그램을 실행한다.","프로그램 실행시 CPU에 오류 메시지가 발생된다."],"ans":2,"exp":"다음은 PC에서 작성한 C코드를 ARM 계열 타깃 보드에서 실행하기 위한 크로스 컴파일 환경을 구성하기 위한 테스트 컴파일을 위한 코드의 일부분이다. C언어를 모르면 두 번째 줄의 printf부분만 보고 1번으로 오답을 고를 수도 있는데, 소스코드에 오류가 없으므로 화면에는 아무런 메시지가 출력되지 않는다. 타겟에서 hello 프로그램을 실행하려면 호스트에서 컴파일된 프로그램을 타겟으로 복사하는 과정을 거쳐야 하므로 답은 2번이 된다.","tag":"완전 신출"},{"id":21,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":21,"q":"TCP/UDP 네트워크 67번 포트의 프로토콜로 옳은 것은?","opts":["LDAP","DHCP","POP3","IMAP4"],"ans":2,"exp":"LDAP는 389번 포트, POP3는 110번 포트, IMAP4는 993번 포트를 사용한다.","tag":"완전 신출"},{"id":22,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":22,"q":"리눅스 교차 개발 환경에 대한 설명으로 옳지 않은 것은?","opts":["HOST와 TARGET에서 사용하는 마이크로프로세서가 서로 다를 때 실행할 수 있는 환경이다.","다음 환경에서 사용하는 컴파일러는 네이티브 컴파일러라고도 한다.","툴 체인은 크로스 컴파일러, 크로스 어셈블러, 크로스 링커, 로케이터로 구성된다.","호스트에서 타켓에서 실행될 프로그램을 개발하는데 필요한 환경을 툴체인이라 한다."],"ans":2,"exp":"네이티브 컴파일러는 소프트웨어가 개발되는 환경과 실행되는 환경이 같을 때 사용하는 컴파일러로, 크로스 컴파일러가 개발,실행환경이 서로 다를 때 사용하는 컴파일러와 상반되므로 오답이다.","tag":"완전 신출"},{"id":23,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":23,"q":"다음 리눅스 명령어 실행 중 일반 사용자 계정인 user 계정으로 로그인하여 퍼미션 인증 결과 다음과 같은 실행 결과가 도출되고, 비밀번호를 변경할 수 없는 상태라고 한다. 파일 비밀번호 변경을 위해서 입력해야 하는 명령어로 옳은 것은?\n\n```\n[root@localhost tmp]# touch file1 file2\n-rwxrw-r-- 1 root root 0 2020년 11월 20 16:40 file1\n-rw-r-xr-x 1 root root 0 2020년 11월 20 16:40 file2\n```","opts":["chown 4764 file1 chown u+s file 2","chmod 764 file1 chmod u+s file 2","chmod 4764 file1 chmod u+s file 2","chown 764 file1 chown u+s file 2"],"ans":3,"exp":"세부 구문이나 조건의 정확도는 100% 장담까지는 못하나 인터넷 서칭하다가 매우 흡사한 구문이 있어 생각난 문제이다. 일단 4000번은 SetUID의 특별한 퍼미션에 해당하는 절대 표현 모드이므로 무조건 1,3번 중 하나가 답이다. 일반 퍼미션(764,655 등)으로는 비밀번호 수정 권한을 부여할 수가 없다. 또한, chown은 권한을 허가하는 명령어가 아닌 파일 또는 디렉토리의 소유자 그룹 변경 명령어이므로 3번이 답이 된다.","tag":"완전 신출"},{"id":24,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":24,"q":"Little-endian의 설명으로 옳은 것은?","opts":["2바이트 이상의 데이터 저장시 하위 바이트가 먼저 저장된다.","2바이트 이상의 데이터 저장시 상위 바이트가 먼저 저장된다.","4바이트 데이터 저장시 중간바이트가 먼저 저장된다.","4바이트 데이터 저장시 하위, 상위, 중간바이트 순으로 저장된다."],"ans":2,"exp":"","tag":"2013년 4회 16번 문제와 동일"},{"id":25,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":25,"q":"JK플립플롭을 다음 과 같이 연결하여 클록펄스를 인가하면 출력 Q의 동작 상태는?\n\n![문제 25 그림](images/img002.jpg)","opts":["toggle","reset","set","race"],"ans":1,"exp":"","tag":"2013년 4회 20번 문제 동일"},{"id":26,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":26,"q":"소프트웨어 공학에 대한 설명으로 가장 적합한 것은?","opts":["소프트웨어의 설계, 제작, 운영에 있어서 인간적인 요소를 배제한 프로그래밍 자체에    대한 공학적 연구를 의미한다.","소프트웨어의 공학적이고 기술적인 명함을 사회 경제적인 시각에서만 설명한다.","소프트웨어의 제작부터 운영까지 생산성을 높이기 위해 기술적, 인간적인 요소에 대한    방법론을 제시한다.","소프트웨어의 위기를 해결하기 위해서 현재 이미 해결된 문제들에 대해서 역사적    관점을 설명한다."],"ans":3,"exp":"","tag":"2013년 4회 77번 문제와 동일"},{"id":27,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year": 래스와 객체들을 분석 및 식별하고 클래스의 속성과 연산을 정의한다.\n- 클래스와 객체의 의미를 식별한다.\n- 클래스와 객체들의 관계를 식별한다.\n- 각 작업에 대한 다이어그램, 클래스 계층 정의, 클래스들의 클러스터링 작업을 수행한다.\n- 클래스와 객체를 구현한다.","opts":["Booch 방법","Wirfs-Brock 방법","Jacobson 방법","Coad와 Yourdon 방법"],"ans":1,"exp":"","tag":""},{"id":114,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":70,"q":"블랙 박스 검사에 대한 설명으로 옳지 않은 것은?","opts":["각 기능이 완전히 작동되는 것을 입증하는 검사이다.","동치 분할 검사는 논리적인 조건과 대응하는 행동을 간략히 표현할 수 있도록 하는 검사 사례 설계 기법이다.","인터페이스 결함, 성능 결함, 초기화와 종료 이상 등을 찾아 낸다.","경계값 분석은 입력의 경계값에서 발생하는 오류를 제거하기 위한 검사 기법이다."],"ans":1,"exp":"","tag":""},{"id":115,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":71,"q":"일반적인 기능의 로더에 가장 가까운 것은?","opts":["Compile And Go Loader","Direct Linking Loader","Absoulte Loader","Dynamic Loading Loader"],"ans":2,"exp":"","tag":""},{"id":116,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":72,"q":"프로토타이핑 모형에 대한 설명으로 옳지 않은 것은?","opts":["프로토타이핑 모형은 발주자나 개발자 모두에게 공동 참조 모델을 제공한다.","사용자의 요구사항을 충실히 반영할 수 있다.","최종 결과물이 만들어지는 소프트웨어 개발 완료 시에 최초로 오류 발견이 가능하다.","프로토타이핑 모형은 소프트웨어 생명주기에서 유지보수가 없어지고 개발 단계 안에서 유지보수가 이루어지는 것으로 볼 수 있다."],"ans":3,"exp":"","tag":""},{"id":117,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":73,"q":"LOC 기법에 의하여 예측된 총 라인 수가 25000 라인일 경우 개발에 투입될 프로그래머의 수가 5명이고, 프로그래머들의 평균 생산성이 월당 500라인일 때, 개발에 소요되는 시간은?","opts":["8개월","9개월","10개월","11개월\n① MPEG-5\n② MPEG-7\n③ MPEG-11\n④ MPEG-21"],"ans":3,"exp":"","tag":""},{"id":118,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":74,"q":"럼바우의 객체 지향 분석 기법에서 상태 다이어그램을 사용하여 시스템의 행위를 기술하는 모델링은?","opts":["object modeling","dynamic modeling","functional modeling","static modeling"],"ans":2,"exp":"","tag":""},{"id":119,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":75,"q":"소프트웨어 공학에 대한 설명으로 가장 적합한 것은?","opts":["소프트웨어의 설계, 제작, 운영에 있어서 인간적인 요소를 배제한 프로그래밍 자체에 대한 공학적 연구를 의미한다.","소프트웨어의 공학적이고 기술적인 영향을 사회 경제적인 시각에서만 설명한다.","소프트웨어의 제작부터 운영까지 생산성을 높이기 위해 기술적, 인간적인 요소에 대한 방법론을 제공한다.","소프트웨어의 위기를 해결하기 위해서 현재 이미 해결된 문제들에 대해서 역사적 관점을 설명한다."],"ans":3,"exp":"","tag":""},{"id":120,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":76,"q":"스택에 대한 설명으로 옳지 않은 것은?","opts":["리스트의 한쪽 끝으로만 자료의 삽입, 삭제 작업이 이루어지는 자료 구조이다.","스택으로 할당된 기억공간에 가장 마지막으로 삽입된 자료가 기억된 공간을 가리키는 요소를 top이라고 한다.","가장 먼저 삽입된 자료가 가장 먼저 삭제되는 FIFO 방식이다.","부프로그램 호출 시 복귀주소를 저장할 때 스택을 이용한다."],"ans":3,"exp":"","tag":""},{"id":121,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":77,"q":"선형 구조에 해당하는 자료구조를 모두 선택한 것은?\n\n> 가. 트리, 나. 그래프, 다. 스택, 라. 큐, 마. 데크","opts":["가, 나","다, 라, 마","가, 다, 라, 마","나, 다, 라, 마"],"ans":2,"exp":"","tag":""},{"id":122,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":78,"q":"어휘 분석의 주된 역할은 원시 프로그램을 하나의 긴 스트림으로 보고 원시 프로그램을 문자 단위로 스캐닝 하여 문법적으로 의미 있는 일련의 문자들로 분할해 내는 것을 말한다. 이때 분할된 문법적인 단위를 무엇이라고 하는가?","opts":["토큰","오토마타","BNF","모듈"],"ans":1,"exp":"","tag":""},{"id":123,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":1,"q":"인터럽트에 대한 설명 중 틀린 것은?","opts":["시스템의 예외 상태가 발생했을 때 일어난다.","컴퓨터 내부에 시스템 상태를 나타내는 PSW와 무관하다.","인터럽트는 소프트웨어 인터럽트와 하드웨어 인터럽트로 나눈다.","벡터 인터럽트 방식은 인터럽트를 내는 소스가 프로세스에게 분기에 대한 정보를 제공하는 방식이다."],"ans":2,"exp":"","tag":""},{"id":124,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":2,"q":"128M*8Bits 크기의 RAM을 4개 이용하여 메모리를 구성할 때, 그 베이스 주소를 0x20000000로 설정하였다면, 구성된 메모리 시스템의 마지막 주소로 옳은 것은?","opts":["0x20FFFFFF","0x2FFFFFFF","0x30FFFFFF","0x3FFFFFFF"],"ans":4,"exp":"","tag":""},{"id":125,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":3,"q":"ARM 프로세서 모드의 설명으로 틀린 것은?","opts":["프로세서 모드는 어떤 레지스터가 활성화 되고, CPSR(Current Program Status Register) 레지스터를 엑세스 할 수 있는 권리를 갖게 될지를 결정한다.","User and System 모드는 r13, r14를 같이 사용하지만 다른 모드는 r13(Stack Pointer)과 r14(Link Register)를 별도로 사용한다.","FIQ(Fast Interrupt Request) 모드는 빠른 인터럽트 처리를 위한 ARM 프로세서 모드의 하나이다.","CPSR은 ARM의 각 모드별로 존재한다."],"ans":4,"exp":"","tag":""},{"id":126,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":4,"q":"다음 [그림]의 회로 명칭은 무엇인가?\n\n![](images/img009.png)","opts":["3단 2진 계수기","MOD 6 계수기","6진 리셋형 계수기","MOD 5 계수기"],"ans":2,"exp":"","tag":""},{"id":127,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":5,"q":"다음 [그림]은 Verilog HDL을 이용하여 논리회로를 설계한 로직 다이어그램과 코드이다. 코드에서 (ㄱ), (ㄴ)에 들어갈 내용으로 옳은 것은?\n\n![](images/img010.png)\n\n> module and_or_inverter_unit(y_out, x_inp1, x_inp2, x_inp3, x_inp4);\n>    (ㄱ) x_inp1, x_inp2, x_inp3, x_inp4;\n>    Output y_out;\n>    (ㄴ) y1, y2;\n>    And (y1, x_inp1, x_inp2);\n>    And (y2, x_inp3, x_inp4);\n>    Nor (y_out, y1, y2);\n> endmodule","opts":["(ㄱ) output, (ㄴ) tri","(ㄱ) input, (ㄴ) tri","(ㄱ) input, (ㄴ) wire","(ㄱ) input, (ㄴ) reg"],"ans":3,"exp":"","tag":""},{"id":128,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":6,"q":"불 함수 AB^C^ + ABC^를 간략화 하면?","opts":["A^B","AC^","AC","AB"],"ans":2,"exp":"","tag":""},{"id":129,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":7,"q":"마이크로 컴퓨터에 내장된 타이머에 대한 설명 중 틀린 것은?","opts":["입력되는 펄스의 수를 세는 역할을 수행한다.","외부에서 발생되는 특정 사건의 발생 수를 헤아리는 용도로 사용된다.","자신이 셀 수 있는 용량의 입력 펄스의 수를 헤아릴 때 인터럽트를 발생 시킨다.","입력되는 클럭의 주파수에 따라 주파수 발생기로도 사용된다."],"ans":3,"exp":"","tag":""},{"id":130,"setKey":"y2014","setLabel":"2014년 기출","year": 드웨어","subjectNorm":"임베디드 하드웨어","num":8,"q":"캐시의 일관성(Coherency) 유지를 위한 프로토콜 중 캐시가 가지고 있는 공유 블록을 감시하고 갱신할 경우 다른 캐시에 방송(Broadcast) 하고 방송내용을 관찰할 수 있도록 버스를 감시하는 프로토콜은?","opts":["Snoopy 프로토콜","Directory 프로토콜","가상(Virtual) 프로토콜","소프트웨어 제어 프로토콜"],"ans":1,"exp":"","tag":""},{"id":367,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 1 과목 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":9,"q":"하드웨어를 구동하기 위한 필수요소인 전원에 대한 설명으로 틀린 것은?","opts":["어댑터는 220V 또는 110V의 교류를 입력받아 직류 24V, 12V, 8V 등으로 바꾸는 장치이다.","레귤레이터는 높은 전압을 입력으로 받아 원하는 전압으로 바꾸는 장치이다.","레귤레이터의 시리즈 방식은 원하는 전압보다 높은 전압이 들어오면 그 이상을 빛으로 방출하고 나머지 원하는 전압을 출력하는 방식이다.","레귤레이터의 스위칭 방식은 전압을 인가/비인가(On/OFF)의 반복과정을 거쳐 평균전압을 원하는 전압으로 만드는 방식이다."],"ans":3,"exp":"","tag":""},{"id":368,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 1 과목 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":10,"q":"캐시(Cache) 메모리에서 주소의 정보를 찾는 가장 빠른 매핑 방법은?","opts":["연관 메모리(Associative memory) 장치 방식","직접매핑(Direct mapping)","프로그램 매핑(Program Mapping)","해시매핑(Hash mapping)"],"ans":1,"exp":"","tag":""},{"id":369,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 1 과목 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":11,"q":"페이지 테이블에 의한 엑세스 방법에서 하나의 오퍼랜드나 명령어를 주 메모리로부터 가져오기 위해 주 메모리에서 연속적인 엑세스가 일어나는 것이 아닌 것은?","opts":["디렉토리 엔트리에 대한 엑세스","캐시 데이터에 대한 엑세스","페이지 테이블 엔트리에 대한 엑세스","오퍼랜드나 명령어에 대한 액세스"],"ans":2,"exp":"","tag":""},{"id":370,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 1 과목 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":12,"q":"다음의 회로는 어떤 게이트와 동일한가?\n\n![](images/img004.png)","opts":["NAND GATE","NOR GATE","XNOR GATE","XOR GATE"],"ans":1,"exp":"","tag":""},{"id":371,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 1 과목 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":13,"q":"프로세서의 성능을 나타내는 단위는?","opts":["LPI","CPS","MIPS","MMU"],"ans":3,"exp":"","tag":""},{"id":372,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 1 과목 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":14,"q":"설계회로의 인터페이스에 관한 정보를 기술하는 VHDL 프  과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":21,"q":"교차 디버깅 툴인 GDB에 대한 설명으로 가장 옳지 않은 것은?","opts":["소스레벨 디버깅 기능을 갖는다.","서버와 클라이언트의 두 개 부분으로 이루어져 있다.","프로그램에서 상태와 값들을 확인할 수 있다.","GDB는 General Debugger의 줄임말이다."],"ans":4,"exp":"","tag":""},{"id":380,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":22,"q":"NFS에 대한 설명으로 가장 옳지 않은 것은?","opts":["운영체제가 다른 컴퓨터의 파일 시스템을 이용하기 위한 파일공유가 목적이다.","UDP/TCP 프로토콜 환경에서 운영된다.","임베디드 시스템에서 제한적인 하드디스크 등 하드웨어 확장에 이용된다.","시리얼 포트를 통해 데이터가 전송된다."],"ans":4,"exp":"","tag":""},{"id":381,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":23,"q":"커널이 인터럽트 상태에서 메모리를 할당하기 위해서 사용하는 함수가 아닌 것은?","opts":["kmalloc()","kfree()","xmalloc()","free_pages()"],"ans":3,"exp":"","tag":""},{"id":382,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":24,"q":"리눅스 기반의 안드로이드가 포팅되어 있는 임베디드 시스템에서 기본적으로 지원되지 않는 표준 리눅스 명령어를 사용하려고 한다. 추가적으로 설치해야 하는 패키지는 무엇인가?","opts":["toolbox","adb","nfs","tftp"],"ans":1,"exp":"","tag":""},{"id":383,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":25,"q":"RAM DISK 이미지를 만드는 과정으로 틀린 것은?","opts":["특정 디렉토리에 필요한 파일을 넣고 fstool 프로그램을 이용하여 ext2 파일 포맷의 파일을 만든다.","만든 파일을 gzip 등으로 압축하고 flash의 특정 번지에 저장한다.","특정 번지를 커널이 부팅할 때 알려주면 압축된 이미지를 RAM으로 로딩하여 RAM DISK를 만든다.","이렇게 하면 한번 만들어진 RAM 디스크는 재부팅 시 기존의 자료를 그대로 보관한다."],"ans":4,"exp":"","tag":""},{"id":384,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":26,"q":"임베디드 시스템에 대한 설명으로 가장 옳은 것은?","opts":["특정 기능을 반복적으로 수행하기 위해 컴퓨터의 하드웨어와 소프트웨어가 결합된 고기능의 전자 제어시스템을 말한다.","각종 물품에 소형 칩인 RFID 태그를 부착해 주변 환경정보를 무선주파수로 전송 및 처리하는 비접속식 무선주파수 인식 시스템이다.","각종 반도체를 하나의 칩에 집적한 시스템을 말한다.","반도체, 광, 기계기술 등을 융합하여 마이크로 단위의 초소형 부품을 설계, 제작하고 응용하는 기술이다."],"ans":1,"exp":"","tag":""},{"id":385,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":27,"q":"RAM DISK 이미지에 대한 설명으로 가장 옳지 않은 것은?","opts":["RAM DISK는 Loop Device를 이용하여 이미지를 생성한다.","Loop device는 가상 블록 디바이스로 /dev 디렉터리 내에서 Loop device를 확인할 수 있다.","RAM Disk 이미지의 생성 순서는 File 생성→ 연결→포맷 순으로 진행된다.","포맷된 RAM Disk device는 마운트 없이 프로그램을 탑재한다."],"ans":4,"exp":"","tag":""},{"id":386,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":28,"q":"임베디드 시스템의 부팅 과정 중 가장 마지막에 수행되는 단계는?","opts":["ROM 영역 수행","루트 파일 시스템 검색/마운트","init 수행","커널 수행"],"ans":3,"exp":"","tag":""},{"id":387,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":29,"q":"임베디드 리눅스에서 입출력 방식과 데이터 단위에 따른 디바이스 드라이버 종류가 아닌 것은?","opts":["문자 디바이스 드라이버","블록 디바이스 드라이버","네트워크 디바이스 드라이버","시스템 디바이스 드라이버"],"ans":4,"exp":"","tag":""},{"id":388,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":30,"q":"디바이스 드라이버에 대한 설명 중 가장 옳지 않은 것은?","opts":["디바이스 드라이버는 I/O 주소 영역을 사용하거나 인터럽트 혹은 DMA를 사용한다.","/proc/ioports 파일은 현재 사용 중인 I/O를 나타낸다.","하드웨어의 디바이스 드라이버는 동일한 자원을 다른 목적으로 사용할 수 없다.","request_region() 함수는 I/O 영역을 등록하는 함수이다."],"ans":3,"exp":"","tag":""},{"id":389,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":31,"q":"Linux 시스템의 부팅 레벨 중 시스템을 재시작하기 위한 레벨은 어느 것인가?","opts":["init 0","init 1","init 5","init 6"],"ans":4,"exp":"","tag":""},{"id":390,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":32,"q":"주번호가 244, 부번호가 0인 문자 디바이스의 장치 파일인 test를 생성하기 위한 명령어로 옳은 것은?","opts":["mknod /sys/test b 244 0","mknod /sys/test c 244 0","mknod /dev/test b 244 0","mknod /dev/test c 244 0"],"ans":4,"exp":"","tag":""},{"id":391,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":33,"q":"TFTP에 대한 설명으로 가장 옳지 않은 것은?","opts":["파일을 전송하기 위한 간단한 파일전송 규 rm":"임베디드 하드웨어","num":9,"q":"-199를 Zone 10진 형식(언팩 형식)으로 올바르게 나타낸 것은?","opts":["F1F9C9","F1F9D9","F0001F1001C1001","F0001F1001D1001"],"ans":2,"exp":"","tag":""},{"id":448,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":10,"q":"MOD-10 존슨 카운터를 설계하기 위하여 필요한 D필립플롭의 개수는?","opts":["3개","4개","5개","6개"],"ans":3,"exp":"","tag":""},{"id":449,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":11,"q":"ADC에 대한 설명으로 틀린 것은?","opts":["전압을 비트 단위로 나눈 분해능을 해상도라 한다.","통상적으로 많이 사용되는 ADC는 10비트 이상이며, 변환시간은 수백 마이크로 초 이하이다.","이산적인 신호를 연속적인 신호로 나누는 것을 표본화(Sampling)이라 한다.","만약 10비트 분해능을 가졌다고 하면 2의 10승인 1024 단계의 전압을 표현할 수 있다."],"ans":3,"exp":"","tag":""},{"id":450,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":12,"q":"DC 5V 전압을 DC 3V 전압으로 낮추는 정전압 회로는 정해진 입력 전압보다 낮은 전압에서 구동되며, 반도체로 비례적인 출력을 갖게 되는 DC 전원으로, 대표적인 예로 사용되는 회로는 무엇인가?","opts":["저역통과필터","연산증폭기","스위칭전원장치","선형전압레귤레이터"],"ans":4,"exp":"","tag":""},{"id":451,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":13,"q":"다음 중 초음파 센서의 특징으로 틀린 것은?","opts":["검출 거리가 길다.","검출대상물에 제약이 따른다.","바람의 영향을 받는다.","응답속도가 빠르다."],"ans":null,"exp":"","tag":""},{"id":452,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":14,"q":"다음 RS플립플롭의 진리표에서 (A), (B)에 가장 적절한 값은?\n\n| S   R | Q(t+1) | 상태 |\n| --- | --- | --- |\n| 0   0 | Q(t) | 전상태 불변 |\n| 0   1 | 0 | (A) |\n| 1   0 | 1 | (B) |\n| 1   1 | x | 불능 |","opts":["(A) SET, (B) SET","(A) RESET, (B) SET","(A) SET, (B) RESET","(A) RESET, (B) RESET"],"ans":2,"exp":"","tag":""},{"id":453,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":15,"q":"3단계 명령어 파이프라인에서 해당되지 않는 단계는?","opts":["인출(Fetch)","해독(Decode)","데이터읽기(Memory)","실행(Execute)"],"ans":3, 8,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":22,"q":"교차개발 환경에 대한 설명 중 가장 옳지 않은 것은?","opts":["툴체인이라 부르는 크로스 개발 도구를 사용한다.","크로스 컴파일은 호스트 컴퓨터에서 코드를 작성하고 컴파일을 한다.","크로스 컴파일된 실행파일은 타깃 시스템에서 실행된다.","네이티브 컴파일과 같은 개념이다."],"ans":4,"exp":"","tag":""},{"id":461,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":23,"q":"Busybox의 특징에 대한 설명 중 틀린 것은?","opts":["정적으로 컴파일 및 링크해서 대상 시스템에 설치 시킬 때 동적 라이브러리 없이는 시스템 실행이 불가능하다.","Busybox의 개발자는 해당 패키지를 크로스 컴파일 환경에서 사용할 목적으로 개발하였다.","Busybox를 컴파일 할 때는 워크스테이션에 있는 크로스컴파일에 대한 prefix만 지정해주면 된다.","제한된 자원을 가진 임베디드 시스템 개발에 유용하다."],"ans":1,"exp":"","tag":""},{"id":462,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":24,"q":"다음 중 디바이스 드라이버에 대한 설명으로 틀린 것은?","opts":["디바이스 드라이버는 하드웨어 장치를 제어하는 소프트웨어의 한 종류이다.","디바이스 드라이버는 하드웨어 장치이다.","커널모드에서 실행된다.","스왑(Swap)되지 않는다."],"ans":3,"exp":"","tag":""},{"id":463,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":25,"q":"다음 중 전원관리 데몬(Daemon)은?","opts":["apmd","smb","lpd","atd"],"ans":1,"exp":"","tag":""},{"id":464,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":26,"q":"임베디드 CPU의 전원 관리에 대한 설명으로 틀린 것은?","opts":["임베디드용 프로세서들은 동적 주파수 조정과 동적 전압 조정 기능을 제공하지 않고 정격 전압, 주파수에서만 작동한다.","프로세서의 소비전력은 클럭 주파수에 직접적으로 비례한다.","프로세서의 전력 소비는 전압의 제곱에 직접적으로 비례한다.","CPU와 대부분의 주변 장치에 대한 전원이 꺼진 상태를 의미하며 최저의 전력을 소비하는 모드는 슬립 모드이다."],"ans":1,"exp":"","tag":""},{"id":465,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":27,"q":"shutdown 명령어에서 실제 종료하지 않고 모든 사용자에게 경고 메시지만을 보내는 옵션은?","opts":["-r","-f","-k","-c"],"ans":3,"exp":"","tag":""},{"id":466,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":28,"q":"리눅스 소프트웨어의 개발을 위해 필요한 툴체인의 구성요소가 아닌 것은?","opts":["컴파일러(Compiler)","라이브러리(Library)","ISP(In-System Programming)","유틸리티(Utility)"],"ans":3,"exp":"","tag":""},{"id":467,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":29,"q":"부트로더의 종류가 아닌 것은?","opts":["LILO","GRUB","BOOTLDR","COMMAND"],"ans":4,"exp":"","tag":""},{"id":468,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":30,"q":"시스템 내부에서 반드시 상호배제의 원리가 지켜져야 하는 공유 영역에 대하여 각 프로세스들이 접근하기 위해서 두 개의 P, V 연산을 통해 프로세스 사이의 동기를 유지하는 것은?","opts":["데드락(Deadlock)","세마포어(Semaphore)","인터럽트(Interrupt)","타이머(Timer)"],"ans":2,"exp":"","tag":""},{"id":469,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":31,"q":"리눅스 커널 소스를 타깃 시스템에 적합하게 설정하고 컴파일하여 생성된 커널 이미지를 타깃 시스템에 적재하는 과정은 무엇인가?","opts":["커널 빌드","커널 컴파일","커널 생성","커널 포팅"],"ans":4,"exp":"","tag":""},{"id":470,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":32,"q":"리눅스 커널의 주요 디렉토리 중 포팅할 수 있는 각 프로세서에 의존적인 기능들이 구현되어 있는 디렉토리는?","opts":["arch","fs","lib","ipc"],"ans":1,"exp":"","tag":""},{"id":471,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":33,"q":"네트워크 파일시스템(NFS)에 관한 설명으로 옳지 않은 것은?","opts":["호스트 시스템에서 작업한 것을 다운로드 과정 없이 타깃 시스템에서 이용할 수 있다.","장치 파일과 같은 특수 파일도 네트워크 파일시스템에 연결된 디렉터리에서 생성할 수 있다.","클라이언트 시스템의 리눅스 파일 시스템 위에서 호스트 시스템의 파일에 접근하고 실행하는 것이 가능하다.","램디스크 상에 올리기에 너무 큰 파일도 네트워크 파일시스템에서는 호스트의 기억 용량에 의존하기 때문에 쉽게 처리할 수 있다."],"ans":2,"exp":"","tag":""},{"id":472,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":34,"q":"리눅스 커널의 세부 기능으로 가장 옳지 않은 것은?","opts":["프로세스 관리","어플리케이션 목록 관리","메모리 관리","파일 시스템 관리"],"ans":2,"exp":"","tag":""},{"id":473,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":35,"q":"다음이 설명하는 것은?\n\n> 이것은 어셈블 019","setLabel":"2019년 기출","year":2019,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":17,"q":"다음 그림의 회로 명칭은 무엇인가?\n\n![](images/img035.png)","opts":["3단 2진 계수기","MOD 6 계수기","6진 리셋형 계수기","MOD 5 계수기"],"ans":2,"exp":"","tag":""},{"id":536,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":18,"q":"GPIO 에 대한 설명으로 틀린 것은?","opts":["Signed Integer로 정의된다.","특정 디바이스를 제어할 수 있다.","시스템에서 gpio-request()를 사용하여 할당한다.","다용도 입출력 포트를 소프트웨어와 연동시켜서 입출력을 한다."],"ans":1,"exp":"","tag":""},{"id":537,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":19,"q":"RAM과 ROM의 특징을 모두 가진 기억장치로 전원이 끊겨도 기억된 내용을 그대로 유지하는 비휘발성 기억 장치는?","opts":["PROM","DRAM","EPROM","Flash Memory"],"ans":4,"exp":"","tag":""},{"id":538,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":20,"q":"무선랜, 와이파이(Wi-Fi)라고 부르는 무선 네트워크에 사용되는 IEEE 표준 기술은?","opts":["IEEE 802.1","IEEE 802.3","IEEE 802.5","IEEE 802.11"],"ans":4,"exp":"","tag":""},{"id":539,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":21,"q":"임베디드 시스템에서 전력 소비가 가장 적은 것은?","opts":["LCD","CPU","Sound Card","Memory-Network Card"],"ans":4,"exp":"","tag":""},{"id":540,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":22,"q":"CPU의 전력 관리 중 슬립(Sleep) 모드에 대한 설명으로 가장 옳은 것은?","opts":["CPU와 대부분의 주변 장치에 대한 전원이 꺼진 상태로 최저의 전력을 소비하는 모드이다.","여러 프로세스 클럭들이 중지된 상태를 의미한다.","프로세서는 대부분의 시간을 사용자나 외부로부터 이벤트가 발생하기를 기다리는 상태이다.","타이머 인터럽트 처리와 같은 시스템이 피룡로 하는 최소한의 태스크만 동작하게 된다."],"ans":1,"exp":"","tag":""},{"id":541,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":23,"q":"네트워크 파일 시스템을 이용할 때 일반적인 장점이 아닌 것은?","opts":["호스트 시스템에서 작업한 것을 다운로드 과정 없이 타깃 시스템에서 사용할 수 있다.","클라이언트 시스템의 리눅스 파일시스템 위에서 호스트 시스템의 파일에 접근하고 실행하는 것이 가능하다.","장치 파일과 같은 특수 파일도 네트워크 파일 시스템에 연결된 디렉토리에서 생성할 수 있다.","램 디스크 상에 올리기에 너무 큰 파일도 네트워크 파일 시스템상에서는 호스트의 기억용량에 의존하기 때문에 쉽게 처리할 수 있다."],"ans":3,"exp":"","tag":""},{"id":542,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":24,"q":"문자 디바이스에 대한 설명으로 틀린 것은?","opts":["문자 디바이스는 파일 시스템에서 하나의 노드 형태로 존재한다.","데이터의 순차성을 지닌 하드웨어로서 버퍼 캐시를 사용한다.","버퍼를 통하지 않고 데이터를 직접 읽고 쓸 수 있는 장치이다.","데이터를 문자 단위 또는 연속적 바이트 흐름으로 전달하고 읽는다."],"ans":2,"exp":"","tag":""},{"id":543,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":25,"q":"블록 디바이스에 해당되지 않는 것은?","opts":["데이터에 의해 임의 접근은 불가능","효율성을 향상하기 위하여 버퍼를 이용","버퍼 캐시를 통해 임의 접근이 가능한 장치","하드디스크, 플로피 디스크, 램디스크, CD-ROM"],"ans":1,"exp":"","tag":""},{"id":544,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":26,"q":"0~3V 전압을 3비트 A/D 변환할 떄,  1LSB(Least Significant Bit)는 약 몇 V인가?","opts":["0.125","0.375","0.429","0.667"],"ans":2,"exp":"","tag":""},{"id":545,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":27,"q":"다음 중 커널에 대한 설명으로 틀린 것은?","opts":["운영체제에서 가장 핵심적인 역할인 자원을 관리한다.","커널은 프로세서, 메모리, 파일, 시스템, 메모리, 네트워크 등을 관리한다.","커널은 전부 c 코드로 작성되어 있다.","하드웨어의 추상화 기능을 제공한다."],"ans":3,"exp":"","tag":""},{"id":546,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":28,"q":"다음 중 타깃 시스템의 부팅과정에서 DMA의 역할에 대한 설명으로 틀린 것은?","opts":["부팅에 필요한 고속의 입출력에 사용된다.","시스템을 다시 부팅하거나 전원이 꺼지면 CPU를 초기화한다.","장치 제어기는 CPU의 간섭 없이 버퍼 저장소로부터 직접 주 메모리로 데이터 블록을 전송한다.","인터럽트가 바이트 단위가 아닌 오직 블록 단위로 생성되며, 이것은 장치의 성능을 향상시킨다."],"ans":2,"exp":"","tag":""},{"id":547,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":29,"q":"전원 관리표준 APM(Advanced Power Management)의 전원 상태의 정의가 맞지 않은 것은?","opts":["Full On: 컴퓨터 전원이 켜져 있고 절전 모드에 있는 장치가 없다.","APM Enabled: 컴퓨터의 전원이 켜져 있고 APM은 필요에 따라 장치 전원 관리를 제어하고 있다.","APM Standby: 대부분의 디바이스가 저전력 상태이고 CPU가 느려지거나 중지되고 시스템 상태가 저장된다.","APM Suspend: 대부분의 디바이스 전원이 켜져 있고 시스템 상태는 저장되지 않는다."],"ans":4,"exp":"","tag":""},{"id":548,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":30,"q":"다음의 임베디드 시스템 부팅 과정 중 가장 마지막에 수행되는 단계는?","opts":["init 수행","ROM 영역 수행","루트파일 시스템 검색 및 바운드","커널 수행"],"ans":1,"exp":"","tag":""},{"id":549,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":31,"q":"다음이 설명하고 있는 부트로더로 가장 적절한 것은?\n\n> ARM, PPC, MIPS 등 프로세스에 적용된 부트로더는 주로 ARM 프로세스용으로 많이 사용되고 있다.","opts":["uboot","LILO","GLUB","Eboot"],"ans":1,"exp":"","tag":""},{"id":550,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":32,"q":"리눅스 툴 체인(tool chain) 구성과 가장 거리가 먼 것은?","opts":["binutils","gcc","Qt","glibc"],"ans":3,"exp":"","tag":""},{"id":551,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":33,"q":"다음의 임베디드 시스템 개발을 위한 교차개발환경에 대한 설명으로 틀린 것은?","opts":["교차개발환경은 크게 Host 머신과 Target 머신, 터미널, 통신회선으로 구성된다.","Tool chain 및 Simulation Environment는 Target 머신의 구성요소이다.","통신회선으로는 serial cable, ethernet cable, JTAG cable 등이 사용된다.","터미널(Terminal)은 타깃 머신의 쉘이나 동작 상태를 보여 주거나 호스트 머신에서 사용자가 입력한 사항을 보여 준다."],"ans":2,"exp":"","tag":""},{"id":552,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":34,"q":"busybox에 대한 설명으로 틀린 것은?","opts":["쉘을 비롯하여 ls, mv, cp 등을 한데 묶어 하나의 파일로서 실행되도록 만들어준다.","각각을 직접 만들었을 때보다 실행파일의 크기가 현저히 작아진다.","저장 공간에 제약을 받는 임베디드 리눅스에서 많이 사용되고 있다.","리눅스의 모든 기능이 들어 있기 때문에 추가 설치가 전혀 필요 없다."],"ans":4,"exp":"","tag":""},{"id":553,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":35,"q":"명령어 수행시간이 10ns, 패치(Fetch)시간이 5ns, 명령어 준비 시간이 3ns이면 인스트럭션의 성능은 얼마인가?","opts":["0.1","0.5","1","1.25"],"ans":4,"exp":"","tag":""},{"id":554,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":36,"q":"커널의 메모리 할당에서 vmalloc과 kmalloc 함수의 차이점으로 옳은 것은?","opts":["vmalloc은 가상적, kmalloc은 물리적 연속 메모리를 할당한다.","vmalloc은 할당된 페이지 주소가 가상, 물리 모두 연속된 공간을 보장한다.","kmalloc은 할당된 페이지가 가상적으로만 연속된 공간을 보장한다.","vmalloc의 가상적 메모리 할당이 필요한 경우는 하드웨어 장치이다."],"ans":1,"exp":"","tag":""},{"id":555,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":37,"q":"다음의 디바이스 드라이버를 위한 메모리 할당 프로그램에서 크기와 함께 처리방식을 매개변수로 지정하는 함수 ㉮와 메모리 할당을 해제하는 함수 ㉯에 들어갈 함수를 순서대로 나열한 것은?\n\n```C++\n#include <linux/slab.h>\nchar *buff;\nbuff = ㉮(1024, GFP_KERNEL);\nif(buff != NULL)\n{\n  ...\n  ㉯(buff)\n}\nelse\n{\n  printk(\"memory error\\n\");\n}\n```","opts":["㉮ : malloc, ㉯ : free","㉮ : malloc, ㉯ : kfree","㉮ : kmalloc, ㉯ : kfree","㉮ : kmalloc, ㉯ : free"],"ans":3,"exp":"","tag":""},{"id":556,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":38,"q":"커널의 빌드 과정 중 커널에서 사용할 모듈을 빌드하는 명령은?","opts":["Make dep","Make clean","Make bzImage","Make modules"],"ans":4,"exp":"","tag":""},{"id":557,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":39,"q":"대상 제품에 부트로더를 탑재하는 방법이 아닌 것은?","opts":["전용의 디버깅 툴과 ICE 장비를 사용하여 플래시에 탑재한다.","PTOC 동글을 활용하여 플래시에 탑재한다.","롬라이터를 사용하여 프로그래밍 후 보드에 삽입한다.","기존에 탑재된 부트로더를 이용하여 탑재한다."],"ans":2,"exp":"","tag":""},{"id":558,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":40,"q":"리눅스 커널 모듈에 관련된 명령에 대한 설명으로 옳은 것은?","opts":["lsmod : 모듈을 커널에서 제거하는 명령이다.","insmod : 적재된 각각의 모듈명, 크기, 사용횟수, 다른 참조 모듈 등의 정보를 출력한다.","modinfo : 모듈 오브젝트 파일의 모듈 정보를 보여준다.","rmmod : 커널의 이름을 변경하는 명령이다."],"ans":3,"exp":"","tag":""},{"id":559,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 3 과목 : 임베디드 플랫폼","subjectNorm":" "y2021","setLabel":"2021년 기출","year":2021,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":36,"q":"다음 [보기]에서 JTAG의 각 신호에 대한 설명으로 옳은 것만 나열한 것은?\n\n> [보기]\n> ㄱ. TRST는 JTAG 인터페이스를 초기화 할 때 사용되는 리셋 입력신호이다.\n> ㄴ. TCK는 시스템의 클록과 동일한 JTAG 클록을 제공한다.\n> ㄷ. TMS는 JTAG 인터페이스의 상태를 설정할 수 있는 입력 신호이다.\n> ㄹ. TDI는 바운더리 스캔 레지스터나 명령어 레지스터에게 데이터를 공급하는 JTAG 데이터 출력신호이다.\n> ㅁ. TDO는 바운더리 스캔 체인으로부터 읽은 값을 출력하는 테스트 JTAG 출력신호이다.","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄹ, ㅁ","ㄱ, ㄷ, ㅁ"],"ans":4,"exp":"","tag":""},{"id":635,"setKey":"y2021","setLabel":"2021년 기출","year":2021,"subject":"제 3 과목 : 임베디드 플랫폼","subjectNorm":"임베디드 플랫폼","num":37,"q":"poll과 epoll의 차이점에서 대한 설명으로 틀린 것은?","opts":["epoll은 커널에서 지원하는 기능이다.","대용량 처리에서는 poll보다 epoll의 반응이 빠르다.","poll과 epoll은 POSIX 규약을 따르므로 서로 호환된다.","poll, epoll은 모두 시그널에 의해 인터럽트 될 수 있다."],"ans":3,"exp":"","tag":""},{"id":636,"setKey":"y2021","setLabel":"2021년 기출","year":2021,"subject":"제 3 과목 : 임베디드 플랫폼","subjectNorm":"임베디드 플랫폼","num":38,"q":"0.0.0/12 IP주소 범위 중에서 할당 가능한 마지막 IP주소는?","opts":["10.13.255.254","10.14.253.254","10.15.255.254","10.16.255.254"],"ans":3,"exp":"","tag":""},{"id":637,"setKey":"y2021","setLabel":"2021년 기출","year":2021,"subject":"제 3 과목 : 임베디드 플랫폼","subjectNorm":"임베디드 플랫폼","num":39,"q":"IP 192.57.30.224, 서브넷 마스크 255.255.255.0일 경우 네트워크 ID는 무엇인가?","opts":["192.57.30.0","192.58.30.0","192.58.29.0","192.57.29.0"],"ans":1,"exp":"","tag":""},{"id":638,"setKey":"y2021","setLabel":"2021년 기출","year":2021,"subject":"제 3 과목 : 임베디드 플랫폼","subjectNorm":"임베디드 플랫폼","num":40,"q":"메모리 장벽의 개념으로 틀린 것은?","opts":["멀티 프로세서 환경에서는 메모리 접근 순서를 바꿀 수 없다.","프로그램 실행 속도 향상을 위해 어셈블리 명령어 순서를 바꿀 수 있다.","메모리 장벽은 어떤 어셈블리 명령어도 통과할 수 없는 방화벽과 비슷하다.","메모리 장벽의 역할을 하는 어셈블리 명령어는 입출력 포트에 동작하는 모든 명령어가 포함된다."],"ans":1,"exp":"","tag":""},{"id":639,"setKey":"y2021","setLabel":"2021년 기출","year":2021,"subject":"제 3 과목 : 임베디드 플랫폼","subjectNorm":"임베디드 플랫폼","num":41,"q":"다음 [보기]와 같은 조건에서 TCP소켓에 send(fd, buf, 3000, 0)을 호출하였다. 헤더가 추가되어 실제 전송되는 패킷의 크기는?\n\n> ㄱ. fd는 블록킹 모드로 작동하고 있다.\n> ㄴ. TCP, IP헤더의 var ALL = DATA.questions, SETS = DATA.sets;
var CIRC = ['①','②','③','④'];

/* ---------- Tier-1: persistence & review features ---------- */
var QMAP={}; ALL.forEach(function(q){QMAP[q.id]=q;});
var LS={
  get:function(k){try{return JSON.parse(localStorage.getItem('cbt_'+k));}catch(e){return null;}},
  set:function(k,v){try{localStorage.setItem('cbt_'+k,JSON.stringify(v));}catch(e){}},
  del:function(k){try{localStorage.removeItem('cbt_'+k);}catch(e){}}
};
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

/* 진행상황 자동저장 / 이어풀기 */
function saveProgress(){
  if(!S||S.submitted)return;
  LS.set('progress',{ids:S.list.map(function(q){return q.id;}),answers:S.answers,idx:S.idx,mode:S.mode,label:S.label,start:S.start,kind:S.kind,perm:S.perm,limitSec:S.limitSec});
}
function clearProgress(){LS.del('progress');}
function resumeProgress(){
  var p=LS.get('progress'); if(!p||!p.ids)return;
  var list=p.ids.map(function(id){return QMAP[id];}).filter(Boolean);
  if(!list.length){clearProgress();renderHomeExtras();return;}
  S={list:list,answers:p.answers||{},idx:Math.min(p.idx||0,list.length-1),mode:p.mode||'exam',label:p.label,submitted:false,start:p.start||Date.now(),kind:p.kind,perm:p.perm,limitSec:p.limitSec};
  show('quiz'); renderQ(); startTimer();
}
function discardProgress(){if(confirm('진행 중인 풀이 기록을 삭제할까요?')){clearProgress();renderHomeExtras();}}

/* 오답노트 (누적) */
function markResult(q,correct){
  if(!q||!q.ans)return;
  var w=LS.get('wrong')||{};
  if(correct)delete w[q.id]; else w[q.id]=1;
  LS.set('wrong',w);
}
function startWrong(){
  var w=LS.get('wrong')||{};
  var list=Object.keys(w).map(function(id){return QMAP[id];}).filter(function(q){return q&&q.ans&&q.opts.length>=2;});
  if(!list.length){alert('오답노트가 비어 있습니다.\n문제를 풀면 틀린 문제가 자동으로 쌓입니다.');return;}
  beginQuiz(shuffle(list),'❌ 오답노트 복습 '+list.length+'문항',true,'wrong');
}

/* 북마크 */
function isBmk(id){var b=LS.get('bookmarks')||{};return !!b[id];}
function toggleBookmark(){
  if(!S)return; var q=S.list[S.idx]; var b=LS.get('bookmarks')||{};
  if(b[q.id])delete b[q.id]; else b[q.id]=1;
  LS.set('bookmarks',b); updBmkBtn(); renderOMR();

  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok,function(){fallbackCopy(txt,ok);});

    document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0,txt.length);

/* ---------- markdown ---------- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inlineMd(s){
  var out='', re=/!\[([^\]]*)\]\(([^)]+)\)/g, last=0, m;
  while((m=re.exec(s))){
    out += esc(s.slice(last,m.index));
    out += '<img alt="'+esc(m[1])+'" src="'+m[2]+'">';
    last = re.lastIndex;
  }
  out += esc(s.slice(last));
  return out;
}
function mdToHtml(md){
  if(!md) return '';
  var lines = md.replace(/\r/g,'').split('\n'), i=0, html='';
  while(i<lines.length){
    var line=lines[i];
    if(/^```/.test(line)){
      var lang=line.slice(3).trim(), buf=[]; i++;
      while(i<lines.length && !/^```/.test(lines[i])){buf.push(lines[i]);i++;}
      i++;
      html+='<pre><code>'+esc(buf.join('\n'))+'</code></pre>';
    } else if(/^\s*\|.*\|\s*$/.test(line)){
      var rows=[];
      while(i<lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){
        rows.push(lines[i].trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(function(c){return c.trim();}));
        i++;
      }
      var sep = rows.length>1 && rows[1].every(function(c){return /^-+$/.test(c.replace(/\s/g,''));});
      html+='<table>';
      rows.forEach(function(r,ri){
        if(sep && ri===1) return;
        var tag = (sep && ri===0)?'th':'td';
        html+='<tr>'+r.map(function(c){return '<'+tag+'>'+inlineMd(c)+'</'+tag+'>';}).join('')+'</tr>';
      });
      html+='</table>';
    } else if(/^\s*>/.test(line)){
      var buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){buf.push(lines[i].replace(/^\s*>\s?/,''));i++;}
      html+='<blockquote>'+buf.map(inlineMd).join('<br>')+'</blockquote>';
    } else if(/^\s*[-*]\s+/.test(line)){
      var buf=[];
      while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){buf.push(lines[i].replace(/^\s*[-*]\s+/,''));i++;}
      html+='<ul>'+buf.map(function(t){return '<li>'+inlineMd(t)+'</li>';}).join('')+'</ul>';
    } else if(line.trim()===''){
      i++;
    } else {
      var buf=[];
      while(i<lines.length && lines[i].trim()!=='' && !/^```|^\s*\||^\s*>|^\s*[-*]\s+/.test(lines[i])){
        buf.push(lines[i]); i++;
      }
      html+='<p>'+buf.map(inlineMd).join('<br>')+'</p>';
    }
  }
  return html;
}

function renderResults(){
  var gradable=S.list.filter(function(q){return q.ans && q.opts.length>=2;});
  gradable.forEach(function(q){
    var correct=S.answers[q.id]===q.ans;
    markResult(q, correct);
    if(S.mode==='exam' && S.answers[q.id]!=null) recordStat(q, correct);
  });
  var correct=gradable.filter(function(q){return S.answers[q.id]===q.ans;}).length;
  var pct = gradable.length? Math.round(correct/gradable.length*100):0;
  // per subject
  var subj={};
  gradable.forEach(function(q){
    var s=q.subjectNorm; subj[s]=subj[s]||{c:0,t:0};
    subj[s].t++; if(S.answers[q.id]===q.ans) subj[s].c++;
  });
  var subjKeys=Object.keys(subj);
  var anyFail=subjKeys.some(function(k){return subj[k].t>=5 && subj[k].c/subj[k].t<0.4;});
  var passed = pct>=60 && !anyFail;
  var sec=Math.floor((Date.now()-S.start)/1000);
  var mm=Math.floor(sec/60), ss=sec%60;
  var color = pct>=60?'var(--ok)':(pct>=40?'var(--warn)':'var(--bad)');
  var html='<div class="row" style="justify-content:space-between;align-items:flex-end">'+
    '<div><div class="muted">'+S.label+'</div><div class="score" style="color:'+color+'">'+pct+'점</div>'+
    '<div class="muted small">'+correct+' / '+gradable.length+' 정답 · 소요 '+mm+'분 '+ss+'초</div></div>'+
    '<div><span class="tag '+(passed?'pass':'fail')+'" style="font-size:15px;padding:6px 14px">'+
       (passed?'합격 예상':'불합격 예상')+'</span></div></div>'+
    '<div class="bar"><i style="width:'+pct+'%;background:'+color+'"></i></div>';
  if(subjKeys.length>1){
    html+='<div style="margin-top:16px"><b>과목별 결과</b> <span class="muted small">(과목 40% 미만 시 과락)</span>';
    subjKeys.forEach(function(k){
      var o=subj[k], p=Math.round(o.c/o.t*100), fail=o.t>=5&&p<40;
      html+='<div class="subjrow"><span>'+k+'</span><span class="row"><span class="muted small">'+o.c+'/'+o.t+'</span>'+
        '<b style="color:'+(p>=60?'var(--ok)':p>=40?'var(--warn)':'var(--bad)')+'">'+p+'%</b>'+
        (fail?'<span class="tag fail">과락</span>':'')+'</span></div>';
    });
    html+='</div>';
  }
  $('scoreCard').innerHTML=html;
  show('results'); renderReview();
  $('topMeta').innerHTML='<span>'+S.label+'</span><span>채점 완료</span>';
}
function renderReview(){
  var wrongOnly=$('wrongOnly').checked, box=$('review'); box.innerHTML='';
  S.list.forEach(function(q,k){
    var sel=S.answers[q.id], ok=(sel===q.ans);
    if(wrongOnly && (ok || !q.ans)) return;
    var d=document.createElement('div'); d.className='card'; d.style.margin='12px 0';
    var head='<div class="qhead"><span class="qno" style="font-size:16px">Q'+(k+1)+'</span>'+
      '<span class="row" style="gap:6px"><span class="chip">'+q.subjectNorm+' · '+q.setLabel+' '+q.num+'번'+
      (q.ans? (ok?' · <span style="color:var(--ok)">정답</span>':' · <span style="color:var(--bad)">오답</span>') : ' · <span class="muted">정답없음</span>')+
      '</span><button class="askbtn" onclick="copyAskId('+q.id+')" title="AI에 물어볼 질문 복사">🤖</button></span></div>';
    var body='<div class="qbody">'+mdToHtml(q.q)+'</div><div class="opts">';
    q.opts.forEach(function(t,oi){
      var n=oi+1, cls='opt';
      if(q.ans===n) cls+=' correct'; else if(sel===n) cls+=' wrong';
      body+='<div class="'+cls+'"><div class="num">'+CIRC[oi]+'</div><div>'+inlineMd(t)+
        (sel===n?' <span class="muted small">(내 선택)</span>':'')+'</div></div>';
    });
    body+='</div>';
    if(q.exp) body+='<div class="feedback show" style="background:var(--panel2)"><b>해설</b><div class="expl">'+esc(q.exp)+'</div></div>';
    d.innerHTML=head+body;
    box.appendChild(d);
  });
  if(!box.children.length) box.innerHTML='<div class="muted small" style="padding:10px">표시할 문제가 없습니다. 🎉</div>';
}

/* keyboard */
document.addEventListener('keydown',function(e){
  if($('quiz').classList.contains('hide')||!S||S.submitted) return;
  if(e.key==='ArrowLeft') move(-1);
  else if(e.key==='ArrowRight') move(1);
  else if(['1','2','3','4'].includes(e.key)){
    var q=S.list[S.idx];
    var p=Number(e.key)-1;
    var ord=(S.perm&&S.perm[q.id])?S.perm[q.id]:null;
    var origIdx=ord?ord[p]:p;
    if(origIdx!=null && q.opts.length>origIdx && !(S.mode==='practice'&&S.answers[q.id]!=null)){
      var n=origIdx+1;
      S.answers[q.id]=n;
      if(S.mode==='practice'){ markResult(q, n===q.ans); recordStat(q, n===q.ans); }
      renderQ(); updMeta();
    }
  }
});

applyTheme();
renderHome(); show('home');
</script>
</body>
</html>
