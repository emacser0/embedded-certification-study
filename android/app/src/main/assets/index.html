(레지스터 값·상태·메모리 관리 정보)을 저장하고 다음 프로세스 문맥을 복구하는 과정.\n\n> 💡 암기 팁: 'fork(복제)→exec(덮어쓰기)→wait(회수)' 3단계와 회수 안 하면 좀비라는 흐름을 한 줄로 기억하자.","qids":[86,97,100,172,177,244,247,248,326,401,408,480,481,494,497,640]},{"title":"시그널(Signal) 처리","note":"시그널은 프로세스에 사건을 비동기로 알리는 **소프트웨어 인터럽트**로, 시그널마다 기본 동작이 정해져 있고 핸들러로 처리 방식을 바꿀 수 있다.\n\n- **무시 설정**: `signal(SIGINT, SIG_IGN)`처럼 `SIG_IGN`을 주면 `Ctrl-C`(SIGINT)를 눌러도 중단되지 않음.\n- **키 입력 시그널**: `Ctrl-C`=**SIGINT**, `Ctrl-\\`=**SIGQUIT**, `Ctrl-Z`=**SIGTSTP**, 접속 끊김=**SIGHUP**.\n- **종료 관련**: **SIGTERM**은 강제 종료(**SIGKILL**) 전 정상 종료를 요청하는 시그널, **SIGPIPE**는 종료된 소켓에 `send` 시도 시, **SIGCHLD**는 자식이 정지/종료 시 부모에게 전달.\n- **함수 권장**: 옛 `signal`은 구현별 차이로 호환성 문제가 있어 `sigaction`으로 대체 권장. `sigprocmask`는 시그널 봉쇄(블록), `sigpending`은 지연 시그널 확인.\n- **POSIX 특성**: **SIGKILL/SIGSTOP**은 블록하거나 핸들러를 설치할 수 없으며, 일반 시그널은 중복 발생해도 큐에 쌓이지 않음.\n\n> 💡 암기 팁: 'C=INT, \\=QUIT, Z=TSTP' 키 매핑과 'KILL·STOP은 못 막는다'를 묶어서 외우자.","qids":[88,90,322,328,400,402,417,482,491,493]},{"title":"교착상태(Deadlock)","note":"교착상태는 둘 이상의 프로세스가 서로 상대가 점유한 자원을 기다리며 영원히 진행하지 못하는 상태로, 네 가지 필요조건이 모두 성립해야 발생한다.\n\n- **4대 필요조건**: **상호배제**, **점유대기**(점유하며 대기), **비선점**, **환형대기**(순환대기). 선점이나 단순 자원요청은 조건이 아님.\n- **발생 예**: 자원을 점유한 채 세마포어 변수를 바꾼 뒤 비정상 종료하면 자원이 잠긴 채 남아 deadlock으로 이어질 수 있음.\n- **4대 해결책**: **예방(Prevention)**, **회피(Avoidance)**, **발견(Detection)**, **복구(Recovery)**.\n- **예방**: 네 조건 중 하나를 원천 차단. 예) 필요한 모든 자원을 한 번에 요청 → **점유대기** 차단.\n- **회피 - 은행원 알고리즘(Banker's Algorithm)**: 할당 후에도 **안전상태**가 유지되는지 검사한 뒤 할당. `Available`(형태별 가용 자원 벡터)·`Max`·`Allocation`·`Need` 자료구조 사용.\n- **pthread 대책**: 뮤텍스 데드락을 줄이려 `trylock`·`timedlock`으로 무한 대기를 피함.\n\n> 💡 암기 팁: 필요조건 4개는 '상-점-비-환', 해결책은 '예-회-발-복' 첫 글자로 묶어 기억하자.","qids":[99,103,166,173,249,256,324,399,418,488,576,644,649,699]},{"title":"프로세스 간 통신(IPC)과 동기화","note":"IPC는 프로세스들이 데이터를 주고받거나 동기를 맞추는 기법으로 **공유메모리·메시지큐·세마포어·파이프** 등이 있으며, 공유메모리가 가장 빠르다.\n\n- **공유메모리(System V/XSI)**: `shmget`으로 생성(IPC ID 획득) → `shmat`으로 주소공간에 부착 → `shmdt`로 분리.\n- **공유메모리(POSIX)**: `shm_open`으로 생성/오픈 → `mmap`으로 사상 → `close`로 닫기. `mmap`은 파일/메모리를 가상공간에 대응시켜 포인터 접근하게 하며 시스템콜 입출력보다 오버헤드가 작음.\n- **임계영역(Critical Section)**: 공유자원 접근 코드 영역으로 한 시점에 한 프로세스만 진입(상호배제)하며 작업을 신속히 끝내야 함.\n- **세마포어**: Dijkstra가 제안, **P(wait)/V(signal)** 연산으로 접근 제어하며 0 이하 값도 가질 수 있음.\n- **뮤텍스**: 잠금/해제로 상호배제 제공(문맥교환 유발 가능). 유형은 `NORMAL`·`ERRORCHECK`·`RECURSIVE`·`DEFAULT`. **조건변수**는 뮤텍스와 결합된 시그널 메커니즘.\n- **메모리 장벽(memory barrier)**: 컴파일러/CPU의 명령어 재배치를 막아 멀티프로세서에서 메모리 접근 순서를 보장.\n\n> 💡 암기 팁: System V는 'get→at→dt', POSIX는 'open→mmap→close' 흐름으로 짝지어 외우자.","qids":[85,96,246,250,257,323,404,413,479,485,560,562,564,565,570,573,638,645,652]},{"title":"메모리 관리와 가상메모리","note":"가상메모리는 물리메모리보다 큰 주소공간을 프로세스마다 제공하는 기법으로, 32비트 프로세서에서는 한 프로세스에 **4GB** 가상주소공간이 할당된다.\n\n- **페이징**: 메모리를 고정 크기 **페이지**로 나눠 관리하며, 가상페이지를 물리프레임에 옮길 때 주소를 변환하는 작업을 **매핑(mapping)**이라 함.\n- **할당 함수**: `malloc`(초기화 없음), `calloc`(0/NULL 초기화), `realloc`(크기 조정, 첫 인자 NULL이면 `malloc`과 동일). 반환 주소는 시스템이 정함.\n- **mlock**: 페이징을 금지해 특정 메모리를 물리메모리에 **고정**(실시간/보안 영역용). 읽기전용으로 만드는 기능은 아님.\n- **커널 동적 할당**: `kmalloc`은 물리적으로 **연속된** 메모리, `vmalloc`은 **불연속** 페이지를 모아 새 페이지테이블로 연속된 가상공간 생성.\n- **스래싱(thrashing)**: 다중프로그래밍 정도가 과해 **페이지부재(page fault)**가 급증하고 CPU 이용률이 떨어지는 현상.\n- **관리 전략**: **반입(Fetch)**·**배치(Placement: 최초/최적/최악 적합)**·**교체(Replacement)**. 최적적합은 요청보다 크면서 남는 공간이 가장 적은 영역 선택.\n- **교체 알고리즘**: **LRU**(가장 오래 미참조 페이지 교체), FIFO/LFU/NUR 등. **시간적 구역성(Temporal Locality)**은 같은 위치를 반복 참조하는 경향(반복문·스택·서브루틴).\n\n> 💡 암기 팁: 'kmalloc=물리연속, vmalloc=가상연속(물리불연속)' 대비와 '배치 3전략 = 최초·최적·최악'을 기억하자.","qids":[95,98,101,176,180,253,329,336,338,483,484,496,498,561,568,569,574,648]},{"title":"CPU 스케줄링","note":"CPU 스케줄링은 준비상태 프로세스 중 어떤 것에 CPU를 줄지 정하는 일로, 평가 기준은 CPU 이용률·처리량·반환시간·대기시간·응답시간 등이다.\n\n- **비선점형**: 실행 중 프로세스가 자발적으로 CPU를 놓을 때까지 뺏지 않음 → **FCFS, SJF, HRN/HRRN**.\n- **선점형**: 더 급한 프로세스를 위해 CPU 회수 → **SRT, 라운드로빈**.\n- **라운드로빈**: 동일한 **시간 할당량(time slice)** 부여, 초과 시 인터럽트해 다음으로 넘김. 할당량이 크면 FCFS처럼, 작으면 문맥교환 오버헤드 증가.\n- **HRN/HRRN**: SJF의 긴 작업 기아 문제를 보완. 우선순위 = **(대기시간 + 서비스시간) / 서비스시간**.\n- **에이징(aging)**: 대기시간에 비례해 우선순위를 점차 높여 기아 방지.\n- **UNIX/리눅스**: 우선순위 기반 라운드로빈 사용, `nice` 값으로 스스로 우선순위 낮춤. `sched_yield`는 일시적으로 프로세서를 양보하는 시스템콜.\n\n> 💡 암기 팁: HRN 공식 '(대기+서비스)/서비스'와 선점=SRT·RR / 비선점=FCFS·SJF·HRN 분류를 꼭 외우자.","qids":[168,178,243,330,333,409,487,566,572,653]},{"title":"리눅스 커널과 시스템콜·디바이스","note":"커널은 운영체제의 핵심으로 프로세스 생성/종료·스케줄링, 메모리 할당과 가상공간 관리, 파일 접근 권한, 시스템콜 수행, 자원 분배를 담당한다. 라이브러리 함수 생성이나 명령어 해석(셸)은 커널의 일이 아니다.\n\n- **커널 구조**: 리눅스는 장치관리·메모리·IPC·파일서비스를 하나의 커널에 담은 **모놀리식(monolithic)** 커널을 채택.\n- **시스템콜**: 사용자 프로그램이 커널 기능을 호출하는 창구. 호출 시 **사용자모드 → 커널모드**로 전환(반대 서술은 오답).\n- **매개변수 전달**: 레지스터, 스택, 또는 메모리 블록 주소를 레지스터로 넘기는 방식이 일반적. 큐로 전달하지 않음.\n- **디바이스 드라이버**: **문자·블록·네트워크** 디바이스로 구분. `mknod`로 디바이스 파일 생성, 내부는 접근권한 검사·디렉터리 탐색·inode 연산 단계로 처리.\n- **jiffies / 소프트 인터럽트**: `jiffies`는 부팅 후 타이머 인터럽트 횟수를 세는 변수, **소프트 인터럽트**는 타이머/네트워크 송수신 완료/SCSI처럼 하드웨어 직후 지연 처리되는 작업.\n- **카피레프트(Copyleft)**: 저작권은 저자가 갖되 수정·자유 배포를 공공에 개방하는 개념으로 **GPL** 정신과 연결.\n\n> 💡 암기 팁: '커널이 아닌 것 = 셸의 명령어 해석·라이브러리 함수 생성', 시스템콜은 '사용자→커널 모드 전환'으로 기억하자.","qids":[102,163,260,325,332,334,414,416,490,495,563,575,643,646,651]},{"title":"파일시스템·파일 입출력·권한과 셸","note":"리눅스에서 모든 파일은 **inode**라는 고유 제어정보 구조(소유자·권한·크기·블록 위치 등)로 관리되며, inode 할당·관리는 커널의 파일시스템 기능이다.\n\n- **디렉터리 구조**: `/mnt`(외부 장치 마운트), `/etc/fstab`(장치명·마운트 디렉터리·파일시스템 타입), `/etc/profile`(로그인 시 PATH·프롬프트 정의), `/etc/service`(소켓·프로토콜·포트, 일반사용자 수정 불가). `proc`은 메모리상의 **가상 파일시스템**.\n- **파일 입출력**: `stat()`으로 파일 정보 확인, `posix_fadvise()`로 순차 읽기 시 미리읽기 지연 감소, `fsck`로 파일시스템 점검/수리.\n- **권한 관리**: `chmod`(예: `g+rw`는 그룹에 읽기/쓰기 부여, `g-rwx`는 회수), `chgrp`(소속 그룹 변경), `quota`(디스크 할당량 제한).\n- **사용자/프로세스 관리**: `pkill -U uid`는 특정 사용자의 모든 프로세스 종료, `groupmod`는 그룹 속성 변경.\n- **셸**: **bash**는 본 셸 호환에 편의 기능을 더한 **GPL** 공개 셸.\n\n> 💡 암기 팁: '/etc/fstab=마운트 정보, /etc/profile=환경설정, proc=메모리 가상FS' 세 가지를 묶어 구분하자.","qids":[94,167,171,175,182,242,245,261,321,327,335,406,410,486,492,567,654,698,700]},{"title":"소켓 프로그래밍과 I/O 멀티플렉싱","note":"소켓은 네트워크 통신의 **종단점**으로 `socket(domain, type, protocol)`로 생성하며, 인터넷 TCP 소켓은 `socket(AF_INET, SOCK_STREAM, IPPROTO_IP)` 형태로 만든다.\n\n- **TCP 서버 순서**: `socket()` → `bind()`(주소 묶기) → `listen()`(대기열) → `accept()`(연결 수락). 주소 구조체에는 **주소체계(address family)·IP주소·포트번호** 설정.\n- **TCP_NODELAY**: `setsockopt`의 `IPPROTO_TCP` 레벨 옵션으로 **네이글(Nagle) 알고리즘**을 꺼 작은 데이터를 즉시 전송.\n- **전송 특성**: `send`로 3000바이트 전송 시 **MSS(1460)** 단위로 분할되고 패킷마다 TCP/IP 헤더 40바이트가 붙어 실제 전송량 증가.\n- **넌블록킹 송신**: 송신버퍼가 가득 차면 `send`는 **-1** 반환, `errno`는 **EAGAIN**.\n- **select()**: 여러 소켓 이벤트를 한 함수로 감시. 타임아웃 설정 가능하며 소켓 전용이 아니라 일반 파일기술자에도 사용 가능.\n- **epoll**: 리눅스 커널 2.6부터 지원되는 고성능 멀티플렉싱. 커널에 상태를 저장하는 **stateful** 방식, **레벨/엣지 트리거** 지원, 감시 소켓 수 제한이 사실상 없으나 POSIX 표준이 아님.\n\n> 💡 암기 팁: 서버 순서 'socket→bind→listen→accept'와 'EAGAIN=넌블록 버퍼 가득, NODELAY=Nagle off'를 기억하자.","qids":[87,91,93,165,169,179,252,407,415,635,639,641,642,647]},{"title":"네트워크 프로토콜·OSI 계층·IP 주소체계","note":"OSI 7계층은 물리·데이터링크·네트워크·전송·세션·표현·응용으로 나뉘며, 물리는 비트 전송, 네트워크는 경로 설정(IP가 대표)을 담당한다.\n\n- **TCP vs UDP**: **TCP**는 연결지향으로 신뢰성·순차 전송 보장(종료 시 **FIN** 플래그 설정). **UDP**는 비연결형으로 신뢰성이 약하고 체크섬도 선택적이며 헤더에 포트·길이·체크섬은 있으나 플래그 비트는 없음.\n- **ARP / DHCP**: **ARP**는 IP 주소로 MAC 주소를 알아내는 프로토콜. **DHCP 서버**는 **UDP 67번 포트** 사용.\n- **IP 헤더**: `Type of Service`·`Fragment Offset`·`Time-to-Live` 등이 있으며, `Total Length`는 고유 항목 구분용으로 자주 헷갈리게 출제.\n- **IPv6**: 주소를 IPv4의 32비트에서 **128비트**로 확장(126비트는 오답). 듀얼스택/터널링/헤더변환 전이 기법, 보안·자동설정 기본 제공.\n- **라우팅/QoS**: **RIP**은 RFC-1058 표준, QoS 지원에 **RSVP·MPLS·RTCP** 사용(IGMP는 멀티캐스트 그룹 관리용).\n- **IP 주소 계산**: 서브넷마스크로 네트워크 ID 산출, CIDR 표기(예 `/12`, `/14`)에서 할당 가능한 마지막 주소는 브로드캐스트 직전 주소, B클래스 기본 브로드캐스트는 호스트부가 전부 1인 주소.\n\n> 💡 암기 팁: 'IPv6=128비트', 'DHCP=UDP 67', 'TCP 종료=FIN'을 핵심 숫자/플래그로 묶어 외우자.","qids":[89,92,164,174,181,254,255,258,259,331,337,403,405,411,412,489,559,571,577,578,636,637,650]}],"기타":[{"title":"임베디드 하드웨어와 주변장치 인터페이스","note":"임베디드 시스템은 전원 회로, 외부 통신 포트, 디버깅 단자 등 다양한 하드웨어 요소로 구성된다. 전원부와 직렬 통신, 디버깅 인터페이스, 개발 환경의 핵심 특성을 정리해 둔다.\n\n- **전원부**: 어댑터는 AC 110/220V를 DC 저전압으로 바꾸고, **전압 레귤레이터**는 입력 변동과 무관하게 일정한 출력 전압을 유지한다(**스위칭** 방식과 **리니어** 방식).\n- **USB**: **핫플러그**(전원 ON 상태 연결)를 지원하고 최대 **127개** 장치 연결, **5V**의 제한된 전원만 공급한다.\n- **RS-232**: 9핀 커넥터 핀 배치는 1번 `DCD`, 2번 `RXD`, 3번 `TXD`, 4번 `DTR`, 5번 `GND`, 6번 `DSR`, 7번 `RTS`, 8번 `CTS`이다.\n- **JTAG**: **바운더리 스캔** 기반 디버깅 인터페이스로 Identification, Bypass, Instruction 레지스터 등을 가진다.\n- **교차(크로스) 개발 환경**: 호스트와 타깃의 프로세서가 서로 달라 호스트에서 만든 실행 파일을 타깃에서 실행하며, 이때 쓰는 컴파일러를 **크로스 컴파일러**라 한다.\n- **기타 출제 포인트**: **서미스터**는 온도에 따라 저항이 변하는 트랜스듀서, **VHDL**은 대소문자를 구분하지 않고 문장은 `;`로 끝나며 `--` 이후는 주석이다.\n\n> 💡 암기 팁: USB는 \"127개·5V·핫플러그\", RS-232 핀은 \"DCD-RXD-TXD\" 순서로 외운다.","qids":[1,2,6,19,22,720,725]},{"title":"디지털 논리회로와 수치 코드 표현","note":"디지털 회로는 조합논리, 순차논리, 2진 코드 표현으로 나뉜다. 가산기와 플립플롭, A/D 분해능, 10진 코드의 핵심을 정리한다.\n\n- **전가산기**: 두 입력 비트와 하위 자리올림(캐리)까지 더해 합과 캐리를 출력하며, **반가산기 2개 + OR 게이트**로 구성된다.\n- **JK 플립플롭**: J=K=1일 때 클록마다 출력이 반전되는 **토글(toggle)** 동작을 하여 카운터 구성에 쓰인다.\n- **A/D 분해능(1LSB)**: 입력 전체 범위를 `2^비트수`로 나눈 값. 예) 0~3V를 3비트로 변환하면 3V/8 ≈ **0.375V**.\n- **BCD(8421)**: 10진수 한 자리를 가중치 8-4-2-1의 4비트로 표현하며, **2421 코드**는 가중치 2-4-2-1의 **자기보수 코드**이다.\n- **언팩(unpack) 10진 형식**: 한 바이트에 숫자 한 자리를 담고 존(zone)부를 `F`로 두며, 부호는 양수 `C`·음수 `D`로 마지막 자리에 표시한다.\n- **순차회로 풀이**: 상태표·상태 다이어그램을 따라 입력 순서별 출력과 상태 전이를 추적한다.\n\n> 💡 암기 팁: 자기보수 코드는 \"2421\", 언팩 부호는 \"양수 C, 음수 D\"로 묶어 기억한다.","qids":[7,17,25,676,726,731,733]},{"title":"자료구조: 스택과 트리","note":"스택은 후입선출 구조이고, 트리 순회는 방문 순서로 구분된다. 출력 순서 추적과 순회 규칙, 차수 개념을 정리한다.\n\n- **스택(LIFO)**: 마지막에 넣은 데이터가 먼저 나온다. `push`로 쌓고 `pop`으로 맨 위를 꺼내며, 원하는 출력을 기준으로 거꾸로 추적하면 수행 순서를 찾을 수 있다.\n- **전위 순회**: **루트 → 왼쪽 → 오른쪽** 순으로 방문한다.\n- **중위 순회**: **왼쪽 → 루트 → 오른쪽** 순으로 방문한다.\n- **후위 순회**: **왼쪽 → 오른쪽 → 루트** 순으로, 루트가 항상 **가장 마지막**에 출력되므로 보기를 빠르게 거를 수 있다.\n- **트리의 차수(degree)**: 한 노드가 가질 수 있는 자식 수의 최댓값으로, 가장 많은 자식을 가진 노드의 자식 수가 곧 트리의 차수다.\n\n> 💡 암기 팁: 순회는 \"루트 위치\"로 기억 — 전위(앞), 중위(가운데), 후위(뒤).","qids":[4,30,683,686,690]},{"title":"C와 Java 언어 문법과 연산","note":"프로그래밍 언어 과목은 출력 서식, 자료형, 연산자, 기억 클래스가 반복 출제된다. C와 Java의 함정 포인트를 정리한다.\n\n- **printf 서식**: `%c` 문자, `%s` 문자열, `%d` 10진 정수(`%o` 8진), `%x` 16진수, `%u` 부호 없는 정수, `%p` 포인터(주소).\n- **연산자 우선순위**: 단항(`!`) > 산술(`%`, `*`) > 관계(`==`) > 논리곱(`&&`) > 논리합 순이며, 보기 중 `&&`가 가장 낮은 편이다.\n- **기억 클래스**: `auto`, `static`, `register`, `extern`이 있으며 **`internal`은 기억 클래스가 아니다**.\n- **배열 초기화**: 일부만 초기화하면 나머지 원소는 **0으로 자동 초기화**된다.\n- **Java 실수 리터럴**: 기본이 `double`이라 `float`에 대입하려면 숫자 뒤에 `f`를 붙여야 한다.\n- **Java 인스턴스 변수**: `static` 메서드인 `main`에서 직접 참조할 수 없어 컴파일 오류가 난다.\n\n> 💡 암기 팁: \"internal은 함정, float엔 f, static main에선 인스턴스 변수 직접 참조 불가\".","qids":[20,32,34,35,36,39,40,682,684,688,692,732]},{"title":"리눅스 시스템 관리와 파일시스템","note":"리눅스 운영은 부팅 과정, 쉘 환경, 권한 관리, 파일시스템 구조 이해가 기본이다. 핵심 순서와 명령어를 정리한다.\n\n- **부팅 순서**: 전원 공급 → BIOS → 부트로더 → 커널 → `init` 프로세스 순으로 진행된다.\n- **환경설정 파일**: 전역 `/etc/profile`, `/etc/bashrc`를 거쳐 사용자 홈의 `~/.bash_profile`, `~/.bashrc` 순으로 읽힌다.\n- **권한 관리**: `chmod`는 퍼미션, `chown`은 소유자, `chgrp`는 그룹을 변경하며 **SetUID**는 8진수 `4xxx` 또는 `u+s`로 설정한다.\n- **파티션**: 디스크는 보통 최대 **4개의 주(primary) 파티션** 또는 확장 파티션을 두어 논리 파티션을 늘린다. **LVM**은 여러 장치를 묶어 큰 볼륨처럼 쓰고 용량 조정이 자유로우나 물리 손상 시 복구가 쉬운 것은 아니다.\n- **커널/시스템 요소**: 아키텍처 의존 코드는 `arch` 디렉토리에 모이고, `stat()`은 파일·디렉토리 상세 정보, `insmod`는 동작 중 커널에 모듈 적재, **NFS**는 원격 파일시스템을 네트워크로 공유·마운트한다.\n\n> 💡 암기 팁: 부팅은 \"전원-BIOS-부트로더-커널-init\" 5단계로 통째 암기한다.","qids":[3,12,13,15,16,18,23,42,43,679,694,696,712,721,728]},{"title":"리눅스 커널, 프로세스와 디바이스 드라이버","note":"리눅스는 시그널로 프로세스를 제어하고, 커널 메모리·타이머·스레드 API를 제공한다. 시그널과 메모리 할당, 드라이버 역할을 정리한다.\n\n- **주요 시그널**: `SIGINT`(Ctrl+C 중지), `SIGTSTP`(Ctrl+Z 정지), `SIGQUIT`(Ctrl+\\\\ 코어 덤프 종료), `SIGHUP`(터미널 접속 끊김), 자식 종료 시 부모에게 `SIGCHLD` 전달.\n- **프로세스 종료 처리**: 좀비를 막으려면 부모가 `wait`/`waitpid`로 종료 상태를 수거하고, 부모가 먼저 죽으면 자식은 고아가 되어 **`init`이 입양**한다.\n- **커널 메모리 할당**: `kmalloc`은 물리적으로 연속된 작은 메모리, `vmalloc`은 가상으로 연속된 큰 메모리를 할당하며, 플래그는 일반 상황 `GFP_KERNEL`(잠들 수 있음), 인터럽트 문맥 `GFP_ATOMIC`.\n- **커널 타이머**: `init_timer`, `add_timer`, `del_timer`로 다루며 `create_timer` 함수는 **없다**.\n- **디바이스 드라이버**: 데이터 수집·전달, 인터럽트 처리, 입출력 포트 송수신을 담당하며 **GUI 처리는 역할이 아니다**.\n- **스레드 API**: `pthread_create`(생성), `pthread_join`(병합), `pthread_cancel`(취소), `pthread_detach`(분리).\n\n> 💡 암기 팁: 메모리는 \"k=물리·작게, v=가상·크게\", 없는 함수는 `create_timer`.","qids":[10,11,14,41,678,693,695,714]},{"title":"운영체제 동기화와 스케줄링","note":"운영체제는 공유 자원 보호를 위한 동기화 기법과 CPU 스케줄링 기준을 제공한다. 세마포어·뮤텍스, 데드락, 평가 기준을 정리한다.\n\n- **세마포어**: 정수 카운터를 두고 `P(wait)`·`V(signal)` 연산으로 자원 사용을 통제한다(연산 기능을 가진 점이 뮤텍스와 구별).\n- **뮤텍스**: 하나의 임계영역을 잠그고 푸는 **이진 상호배제** 도구이다.\n- **교착상태(데드락) 4조건**: **상호배제, 점유대기, 비선점, 환형대기**가 모두 성립할 때 발생하며, 모든 자원을 한꺼번에 요청하게 하는 방식은 **점유대기** 조건을 예방한다.\n- **스케줄링 평가 기준**: CPU 이용률, 처리량, 총처리(반환) 시간, 대기 시간, 응답 시간이며 **'대입시간'은 기준이 아니다**(함정).\n- **좋은 스케줄링 방향**: CPU 이용률·처리량은 **높이고**, 반환·대기·응답 시간은 **줄인다**.\n\n> 💡 암기 팁: 데드락 4조건은 \"상-점-비-환\", 평가 기준에 '대입시간'은 없다.","qids":[38,680,711,713,722]},{"title":"네트워크와 프로토콜","note":"네트워크 과목은 OSI 7계층, 주요 프로토콜, IP 주소 체계가 중심이다. 계층·포트·프로토콜 특성을 정리한다.\n\n- **물리 계층**: 회선 연결의 확립·유지·단절을 위한 기계적·전기적·기능적·절차적 특성을 정의하는 **최하위 계층**이다.\n- **포트 번호**: `DHCP` 67/68, `POP3` 110, `IMAP4` 143, `LDAP` 389.\n- **주소 관련 프로토콜**: `DHCP`는 IP 자동 할당, **MAC 주소로 상대 IP/위치**를 알아낼 때는 `ARP`를 사용한다.\n- **LAN/무선 기술**: **이더넷**은 `CSMA/CD` 충돌 감지 방식의 유선 LAN(초광대역 무선 아님), **와이파이**는 무선 인터넷 접속 기술이다.\n- **TCP vs UDP**: `UDP`는 비연결형이고 체크섬도 선택적이라 빠르지만 신뢰성을 보장하지 않고, `TCP`는 연결형으로 신뢰성을 보장한다.\n- **CIDR 표기**: `/14`는 상위 14비트가 네트워크부이며, 범위 계산 시 네트워크·브로드캐스트 주소를 제외한 마지막 호스트 주소를 찾는다.\n\n> 💡 암기 팁: 포트는 \"DHCP 67/68, POP3 110, IMAP 143, LDAP 389\"로 묶어 외운다.","qids":[9,21,677,681,723,724]},{"title":"컴퓨터 구조: CPU, 파이프라인, 버스","note":"컴퓨터 구조는 명령어 실행 단계, 레지스터, 데이터 저장 방식, 성능 계산이 핵심이다. 파이프라인·ARM 레지스터·엔디안·대역폭을 정리한다.\n\n- **명령어 파이프라인**: 인출(fetch)·해독(decode)·실행(execute) 등으로 단계를 나눠 동시 처리하며, **3단계 파이프라인에는 메모리 읽기 단계가 없다**.\n- **속도 향상 계산**: n단계 파이프라인으로 k개 명령 처리 시 직렬 대비 `nk / (k+n-1)`로 구한다.\n- **ARM 레지스터**: `PC`(다음 명령어 주소), `SP`(스택 포인터), `CPSR`(상태 레지스터), `LR`(서브루틴 복귀 주소). 분기 발생 시 가장 먼저 바뀌어야 하는 것은 **`PC`**이다.\n- **리틀엔디안**: 2바이트 이상 데이터를 저장할 때 **하위 바이트를 낮은 주소**에 먼저 저장한다.\n- **대역폭**: 버스 대역폭 = 클록 주파수 × 데이터 폭(바이트), 메모리 대역폭 = 데이터 워드 크기 ÷ 접근 시간.\n\n> 💡 암기 팁: 속도 향상 공식은 \"nk ÷ (k+n−1)\", 분기 시 먼저 바뀌는 건 PC.","qids":[24,27,28,29,33,44,675,697,710,727,729]},{"title":"소프트웨어 공학, 객체지향과 테스트","note":"소프트웨어 공학은 생산성과 품질을 높이는 방법론을 다룬다. 생명주기, 객체지향 분석 기법, 테스트 분류를 정리한다.\n\n- **개발 생명주기**: **요구분석**(실질적 첫 단계, 목표 도출) → 설계 → **구현**(설계 명세를 코드로 변환) → 테스트 → 유지보수 순으로 이어진다.\n- **프로토타입 모형**: 시제품을 먼저 만들어 사용자 요구사항을 충실히 반영할 수 있다.\n- **객체지향 분석 기법**: **Booch**(미시·거시 프로세스), **Rumbaugh**(객체 모델링), **Jacobson**(유스케이스), **Coad·Yourdon**(객체 식별 중심).\n- **캡슐화**: 응집도를 높이고 결합도를 낮춰 재사용과 인터페이스 단순화에 기여한다('결합도가 높아진다'는 보기는 틀림).\n- **테스트 분류**: **블랙박스**(입출력 기능 검사 — 동치분할·경계값 분석)와 **화이트박스**(논리 구조 검사 — 제어흐름·기초경로·데이터흐름)로 나뉜다.\n- **기타**: **테스트 오라클**은 실행 결과의 정당성을 판별하는 메커니즘이며, 정형 기술 검토에서는 논쟁·의제·참가자 수를 제한하는 것이 지침이다.\n\n> 💡 암기 팁: 분석 기법은 \"Booch=프로세스, Rumbaugh=객체, Jacobson=유스케이스\"로 짝지어 외운다.","qids":[5,8,26,31,37,685,687,689,691,715,716,717,718,719,730]}]};
/* 문제별 AI 해설 (id -> 해설 텍스트). 빌드 시 채워짐. */
var AI_EXP = {"9":"OSI 7계층 중 가장 하위에 있는 물리 계층(Physical Layer)은 실제 전송 매체(케이블, 광섬유 등)를 통해 비트 단위의 신호를 주고받기 위한 기계적, 전기적, 기능적, 절차적 특성을 정의합니다. 즉 커넥터 모양과 핀 배치(기계적), 전압 레벨과 신호 규격(전기적), 각 핀의 역할(기능적), 회선의 연결 확립과 유지 및 단절 절차(절차적)를 규정하여 물리적 회선 연결을 담당합니다. 따라서 정답은 물리 계층입니다. 전송 계층은 종단 간 신뢰성 있는 데이터 전달과 흐름 제어를 담당하고, 데이터링크 계층은 인접 노드 간 오류 제어와 프레임 전송 및 MAC 주소를 다루며, 표현 계층은 데이터의 암호화, 압축, 코드 변환 등 표현 형식을 처리합니다. 암기 포인트로 물리 계층의 4대 특성은 기계적, 전기적, 기능적, 절차적임을 기억하면 좋습니다.","18":"리눅스와 유닉스 계열에서 널리 쓰이는 대표적인 쉘에는 Bourne 쉘(sh), C 쉘(csh), Korn 쉘(ksh), 그리고 Bourne Again 쉘(bash) 등이 있습니다. 보기 중 'A 쉘'이라는 종류는 존재하지 않으므로 옳지 않은 것은 A 쉘이며 정답은 3번입니다. C 쉘은 C언어와 유사한 문법을 제공하는 쉘이고, Bourne 쉘은 가장 기본이 되는 표준 쉘이며, Korn 쉘은 Bourne 쉘을 확장해 C 쉘의 기능을 추가한 쉘입니다. 즉 나머지 세 보기는 모두 실제로 존재하는 쉘이지만 A 쉘만 가공의 명칭입니다. 암기 포인트로 주요 쉘은 sh, bash, csh, ksh, tcsh, zsh 등을 떠올리면 됩니다.","24":"이 문제는 보기 표현이 다소 혼란스러우나 표시된 정답(ans=2)을 기준으로 해설합니다. 빅엔디안(Big-endian)은 2바이트 이상의 데이터를 저장할 때 가장 큰 자리수인 상위 바이트(MSB)를 낮은 주소에 먼저 저장하는 방식이고, 리틀엔디안(Little-endian)은 하위 바이트(LSB)를 낮은 주소에 먼저 저장하는 방식입니다. 정답 보기는 상위 바이트가 먼저 저장된다는 내용으로 엄밀히는 빅엔디안의 정의이지만 출제 정답으로 표시되어 있어 그대로 따릅니다. 일반적으로 리틀엔디안은 인텔 x86 계열에서, 빅엔디안은 네트워크 바이트 순서나 일부 RISC 계열에서 사용됩니다. 4바이트 데이터를 중간 바이트부터 저장하는 방식은 표준 엔디안에 존재하지 않으므로 나머지 보기들은 잘못된 설명입니다. 암기 포인트로 리틀은 하위부터, 빅은 상위부터 저장한다는 점을 기억하세요.","25":"JK 플립플롭에서 J 입력과 K 입력을 모두 1(HIGH)로 연결하면 클록 펄스가 인가될 때마다 출력 Q가 현재 상태의 반대로 뒤집히는데 이를 토글(toggle) 동작이라고 합니다. 이미지로 정확한 회로는 알 수 없으나 JK 플립플롭을 이렇게 연결해 클록을 인가했을 때의 대표적 동작 상태를 묻는 문제이므로 정답은 toggle입니다. JK 플립플롭의 진리표에서 J=0, K=0이면 이전 상태 유지, J=0, K=1이면 reset(Q=0), J=1, K=0이면 set(Q=1), J=1, K=1이면 toggle이 됩니다. 따라서 reset과 set은 한쪽 입력만 1일 때의 동작이라 틀리고, race는 SR 래치에서 J=K=1일 때 발생하던 불안정 상태(레이스 컨디션)를 가리키는데 JK 플립플롭은 바로 이 문제를 토글로 해결한 것이라 정답이 아닙니다. 암기 포인트로 J=K=1이면 토글이라는 점이 핵심입니다.","26":"소프트웨어 공학(Software Engineering)은 소프트웨어의 분석, 설계, 제작, 운영, 유지보수에 이르는 전 과정에서 생산성과 품질을 높이기 위해 체계적이고 과학적인 방법론과 도구를 적용하는 학문입니다. 이때 기술적인 요소뿐 아니라 개발에 참여하는 사람과 관리 같은 인간적 요소까지 함께 고려하므로 정답은 제작부터 운영까지 생산성을 높이기 위해 기술적, 인간적 요소에 대한 방법론을 제시한다는 3번입니다. 1번은 인간적 요소를 배제한다고 하여 틀렸고, 2번은 사회 경제적 시각에서만 설명한다고 좁게 한정해 틀렸으며, 4번은 이미 해결된 문제의 역사적 관점만 설명한다고 하여 소프트웨어 위기를 해결하려는 공학의 본래 목적과 맞지 않습니다. 암기 포인트로 소프트웨어 공학의 목표는 품질 향상과 생산성 향상이며 기술과 인간 요소를 모두 다룬다는 점입니다.","27":"3단계 명령어 파이프라인은 명령어 처리 과정을 인출(fetch), 해독(decode), 실행(execute)의 세 단계로 나누어 동시에 처리함으로써 처리율을 높이는 구조입니다. 따라서 데이터읽기(memory) 단계는 3단계 파이프라인에 포함되지 않으므로 정답은 3번입니다. 메모리 접근(memory) 단계는 보통 더 세분화된 4단계 또는 5단계 파이프라인(예: IF, ID, EX, MEM, WB)에서 별도로 등장하는 단계입니다. 즉 인출은 명령어를 메모리에서 가져오고, 해독은 명령어를 분석하며, 실행은 연산을 수행하는 단계로 3단계 파이프라인의 구성 요소가 맞습니다. 암기 포인트로 3단계는 인출-해독-실행, 5단계는 여기에 메모리 접근과 레지스터 기록(write back)이 추가된다는 점입니다.","28":"ARM 프로세서에서 LR(Link Register, R14)은 서브루틴이나 함수를 호출할 때 호출이 끝난 뒤 돌아올 복귀 주소를 저장하는 레지스터입니다. BL(Branch with Link) 명령으로 분기할 때 다음에 실행할 명령의 주소가 LR에 자동 저장되어 함수 종료 후 그 주소로 복귀할 수 있으므로 정답은 LR입니다. CPSR은 현재 프로그램 상태 레지스터로 조건 플래그와 모드 정보를 담고, SP(R13)는 스택의 최상단을 가리키는 스택 포인터이며, PC(R15)는 다음에 실행할 명령어의 주소를 담는 프로그램 카운터입니다. 즉 PC가 현재 실행 흐름을 가리키는 반면 복귀할 주소를 따로 보관하는 것은 LR입니다. 암기 포인트로 LR=링크 레지스터=복귀 주소 저장을 기억하세요.","29":"버스의 대역폭은 클록 주파수와 한 번에 전송되는 데이터 폭(바이트 수)을 곱해 구합니다. 데이터 폭이 64비트이므로 8바이트이고, 클록 주파수가 100MHz이므로 대역폭은 100,000,000 × 8 = 800,000,000 바이트/초, 즉 800 Mbyte/sec가 되어 정답은 4번입니다. 계산 공식은 대역폭(Byte/sec) = 클록 주파수(Hz) × 데이터 폭(Byte)입니다. 64비트를 8비트로 나눠 8바이트로 바꾸는 단위 환산이 핵심이며, 이를 빠뜨리면 잘못된 값이 나옵니다. 암기 포인트로 비트를 바이트로 바꿀 때 8로 나눈다는 점과 대역폭 = 주파수 × 바이트폭 공식을 기억하세요.","30":"트리의 후위 순회(Postorder)는 왼쪽 서브트리를 먼저 방문하고 그다음 오른쪽 서브트리를 방문한 뒤 마지막으로 루트를 방문하는 순서(좌-우-근)로 진행합니다. 이미지의 트리 구조를 기준으로 후위 순회한 결과가 C, D, B, F, G, E, A 순서이므로 정답은 3번입니다. 후위 순회의 가장 큰 특징은 루트 노드가 항상 마지막에 방문된다는 점이며, 보기 중 마지막이 A로 끝나는 것을 고르는 것이 단서가 됩니다. 참고로 전위 순회는 근-좌-우, 중위 순회는 좌-근-우 순서이며, 후위 순회는 좌-우-근 순서입니다. 암기 포인트로 후위는 자식들을 모두 처리한 뒤 부모를 방문하므로 루트가 맨 마지막에 온다는 점입니다.","31":"소프트웨어 개발 방법론에서 구현(Implementation) 단계는 앞선 설계 단계에서 작성한 설계 명세서를 바탕으로 컴퓨터가 이해하고 실행할 수 있는 형태, 즉 실제 소스 코드로 변환하는 프로그래밍 또는 코딩 과정을 말합니다. 따라서 정답은 설계 명세서에 따라 컴퓨터가 이해할 수 있는 모습으로 변환되는 프로그래밍 또는 코딩 과정이라는 4번입니다. 1번과 3번은 시스템이나 소프트웨어의 요구사항과 목표를 정의하고 기술하는 내용으로 요구분석 단계에 해당하고, 2번 역시 요구사항을 정리하는 분석 단계에 가깝습니다. 즉 구현은 분석과 설계가 끝난 뒤 코드로 옮기는 단계입니다. 암기 포인트로 소프트웨어 개발 단계는 요구분석-설계-구현(코딩)-테스트-유지보수 순으로 이어진다는 점입니다.","32":"C언어 printf의 형식 지정자(서술자)에서 %d는 10진 정수(decimal)를 출력하는 형식입니다. 따라서 %d를 8진 정수라고 설명한 2번이 옳지 않으므로 정답은 2번이며, 8진 정수를 출력하는 형식 지정자는 %o입니다. %c는 한 개의 문자를, %s는 문자열을, %x는 16진수를 출력하는 형식으로 나머지 보기는 의미가 대체로 맞습니다(다만 %x는 16진 정수를 출력하는 것이 정확한 표현입니다). 즉 이 문제의 핵심 오류는 %d를 8진수로 잘못 설명한 부분입니다. 암기 포인트로 %d는 10진, %o는 8진, %x는 16진, %c는 문자, %s는 문자열, %f는 실수, %p는 포인터임을 정리해 두세요.","33":"프로그램카운터(PC, Program Counter)는 다음에 실행할 명령어의 주소를 보관하는 레지스터입니다. 프로그램 실행 중 분기(branch)나 점프가 발생하면 실행 흐름이 다른 주소로 바뀌어야 하므로, 가장 먼저 프로그램카운터의 값을 분기 목적지 주소로 변경해 주어야 정확한 위치의 명령어를 인출할 수 있습니다. 따라서 정답은 프로그램카운터입니다. 명령레지스터(IR)는 현재 인출된 명령어 자체를 저장하고, 누산기(Accumulator)는 산술 논리 연산의 중간 결과를 저장하며, 인덱스 레지스터는 주소 계산 시 변위를 더하는 데 사용됩니다. 즉 분기 시 실행 순서를 바꾸는 핵심은 다음 명령 주소를 담은 PC입니다. 암기 포인트로 PC는 다음 실행 명령어의 주소를 가리키므로 분기와 가장 직접적으로 관련된다는 점입니다.","34":"자바에서 float형은 4바이트 단정밀도 실수형이며, 실수 리터럴에 접미사 f 또는 F를 붙여야 float로 인식됩니다. 보기 중 2.05f는 접미사 f가 붙어 올바른 float 선언이므로 정답은 4번입니다. 자바의 실수 리터럴은 기본적으로 double형으로 취급되기 때문에, 1번의 3.0e5D와 3번의 3.05d처럼 접미사 D나 d가 붙으면 double형이라 float 변수에 직접 대입할 수 없고, 2번의 3.14처럼 접미사가 없는 실수도 double로 간주되어 float에 대입하면 컴파일 오류가 납니다. 즉 float 변수에 실수 값을 넣을 때는 반드시 f 또는 F 접미사가 필요합니다. 암기 포인트로 f는 float, d는 double 접미사이며 접미사 없는 실수는 double이 기본임을 기억하세요.","35":"C언어 연산자 우선순위에서 단항 부정 연산자 !가 가장 높고, 산술 연산자 %가 그다음, 관계 연산자 ==가 그다음이며, 논리곱 연산자 &&가 이들 중 가장 낮습니다. 따라서 보기 중 우선순위가 가장 낮은 것은 &&이므로 정답은 3번입니다. 일반적으로 우선순위는 단항 연산자(!) > 산술 연산자(%, *, /) > 관계/비교 연산자(==, <, >) > 논리 연산자(&&, ||) 순으로 낮아집니다. 즉 논리곱과 논리합 같은 논리 연산자는 다른 연산이 끝난 뒤 마지막에 평가되는 편이라 우선순위가 낮습니다. 암기 포인트로 단항>산술>관계>논리 순서로 우선순위가 낮아진다는 점을 기억하세요.","36":"이 문제는 표시된 정답(ans=4)을 기준으로 보면 컴파일 오류를 정답으로 선택해야 합니다. 출력문 자체의 더하기 연산은 문자열 'i = '와 정수가 이어지는 문자열 연결이지만, 보기 4번의 표현인 컴파일 오류가 정답으로 표시되어 있으므로 소스코드에 문법적 결함이 있는 것으로 판단합니다. 자바에서 컴파일 오류는 세미콜론 누락, 괄호 불일치, 잘못된 식별자, 타입 불일치 등 문법 규칙 위반이 있을 때 발생합니다. 나머지 보기인 i = 5, i = 0, i = -1은 특정한 정상 출력 값을 가정한 결과로 정답이 아닙니다. 암기 포인트로 자바는 컴파일 시점에 문법과 타입을 엄격히 검사하므로 사소한 문법 오류도 실행 전에 컴파일 오류로 걸러진다는 점입니다.","37":"요구분석(요구사항 분석) 단계는 소프트웨어 개발의 실질적인 첫 단계로, 사용자가 원하는 기능과 시스템이 수행해야 할 목표를 명확히 도출하고 정리하는 과정입니다. 따라서 소프트웨어가 수행해야 하는 기능을 기술하고 문제 해결을 위한 목표를 명확히 한다는 1번, 2번, 3번은 모두 요구분석 단계의 설명에 해당합니다. 반면 소프트웨어 내부 구조를 기술하는 것은 요구분석이 아니라 설계(Design) 단계에서 이루어지는 일이므로, 요구분석 단계의 설명이 아닌 것은 4번입니다. 즉 요구분석은 무엇을 할 것인가(What)를 다루고, 설계는 어떻게 할 것인가(How)를 다룹니다. 암기 포인트로 요구분석은 외부에서 본 기능과 목표를, 설계는 내부 구조와 구현 방법을 정의한다는 점입니다.","38":"CPU 스케줄링 알고리즘의 성능을 평가하는 대표적인 기준에는 CPU 이용률(utilization), 처리량(throughput), 총 처리 시간 또는 반환 시간(turnaround time), 대기 시간(waiting time), 응답 시간(response time) 등이 있습니다. 보기 중 대입시간은 이러한 스케줄링 평가 기준에 포함되지 않는 용어이므로 정답은 3번입니다. CPU 이용률은 CPU가 쉬지 않고 일하는 비율을 높이는 것을, 총 처리 시간은 작업 제출부터 완료까지 걸린 시간을 줄이는 것을, 응답 시간은 요청 후 첫 반응까지의 시간을 줄이는 것을 목표로 합니다. 즉 좋은 스케줄링은 이용률과 처리량은 높이고 반환, 대기, 응답 시간은 낮추는 방향입니다. 암기 포인트로 평가 기준은 이용률, 처리량, 반환시간, 대기시간, 응답시간 다섯 가지가 핵심입니다.","39":"C언어의 기억 클래스(storage class)에는 자동 변수(automatic, auto), 정적 변수(static), 레지스터 변수(register), 외부 변수(external, extern) 네 가지가 있습니다. 보기에서 internal variables는 C언어의 기억 클래스 명칭이 아니며 올바른 용어는 external variables이므로 정답은 2번입니다. 자동 변수는 함수 내에서 선언되어 블록을 벗어나면 소멸하는 지역 변수이고, 정적 변수는 프로그램 종료까지 값이 유지되며, 레지스터 변수는 빠른 접근을 위해 CPU 레지스터에 저장하도록 권고하는 변수입니다. 즉 internal이라는 기억 클래스는 존재하지 않습니다. 암기 포인트로 C의 기억 클래스 키워드는 auto, static, register, extern 네 가지임을 기억하세요.","40":"C언어 printf 함수에서 변수의 주소, 즉 포인터 값을 출력할 때 사용하는 형식 지정자는 %p입니다. %p는 포인터(pointer)를 의미하며 메모리 주소를 16진수 형태로 출력해 주므로 정답은 1번입니다. %d는 부호 있는 10진 정수를, %u는 부호 없는 10진 정수를, %c는 한 개의 문자를 출력하는 형식이라 주소 출력 용도와는 맞지 않습니다. 포인터 값을 출력할 때 %d 등을 사용하면 경고가 발생하거나 환경에 따라 잘못된 값이 나올 수 있으므로 반드시 %p를 사용해야 합니다. 암기 포인트로 p는 포인터의 머리글자이며 주소 출력은 %p라는 점을 기억하세요.","41":"리눅스 디바이스 드라이버에서 커널 타이머를 사용할 때는 타이머 구조체를 초기화하는 init_timer(), 타이머를 등록하여 동작시키는 add_timer(), 그리고 등록된 타이머를 제거하는 del_timer() 함수를 사용합니다. 따라서 보기 중 create_timer()는 커널 타이머 관련 표준 함수가 아니므로 정답은 4번입니다. init_timer()는 타이머 만료 시간과 콜백 함수를 설정하기 위한 초기화를 수행하고, add_timer()는 설정된 타이머를 커널의 타이머 목록에 추가해 지정된 시간 후 콜백이 호출되게 하며, del_timer()는 만료 전에 타이머를 취소할 때 사용합니다. 즉 create_timer()라는 이름의 함수는 커널 타이머 API에 존재하지 않습니다. 암기 포인트로 커널 타이머는 init_timer로 초기화하고 add_timer로 등록하며 del_timer로 삭제한다는 흐름을 기억하세요.","42":"리눅스 커널 소스 트리에서 arch 디렉토리는 CPU 아키텍처(x86, arm, mips 등)별로 플랫폼에 의존적인 코드를 모아 놓은 곳입니다. 부팅 초기화 코드, 인터럽트 처리, 메모리 관리의 하드웨어 의존 부분, 레지스터 정의 등 특정 프로세서에만 해당하는 코드가 arch 아래 각 아키텍처 하위 디렉토리에 들어 있어 커널을 다른 플랫폼으로 이식할 때 주로 이 부분을 수정합니다. 따라서 정답은 3번 arch입니다. 1번 fs는 파일 시스템(ext4, vfat 등) 관련 코드를 모은 디렉토리로 플랫폼 독립적입니다. 2번 lib은 커널 내부에서 공통으로 쓰는 라이브러리 함수들을 모은 곳이고, 4번 mm은 가상 메모리와 페이징 등 메모리 관리의 일반적인 부분을 담당하는 디렉토리입니다. 즉 arch만이 하드웨어/플랫폼 종속 코드를 모은 디렉토리라는 점을 기억하세요.","43":"NFS(Network File System)는 네트워크를 통해 다른 컴퓨터(운영체제가 다를 수도 있음)의 파일 시스템을 마치 로컬 디스크처럼 마운트하여 파일을 공유하는 것을 목적으로 하는 분산 파일 시스템 프로토콜입니다. 원격 호스트의 디렉토리를 로컬에 붙여 투명하게 읽고 쓸 수 있게 해 주므로 파일 공유 목적에 정확히 부합합니다. 따라서 정답은 1번 NFS입니다. 2번 TFTP는 간단한 파일 전송 프로토콜로 주로 부팅 이미지 전송에 쓰이며 파일 시스템 공유가 아니라 단순 전송 용도입니다. 3번 MISC는 기타 잡다한 항목을 묶는 일반 명칭일 뿐 파일 공유 기능이 아니고, 4번 ADB(Android Debug Bridge)는 안드로이드 기기와 PC 사이의 디버깅/통신 도구로 파일 시스템 공유 목적이 아닙니다.","44":"대역폭(bandwidth)은 단위 시간당 전송할 수 있는 데이터 양으로, 한 번 접근에 전송되는 워드 비트 수를 접근 시간으로 나누어 구합니다. 여기서 한 번 접근에 32비트를 0.5us(0.5 마이크로초) 만에 전송하므로 대역폭은 32비트 / 0.5us = 64Mbps가 됩니다. 계산은 32 / (0.5 곱하기 10의 마이너스 6승) = 64 곱하기 10의 6승 bps = 64Mbps입니다. 따라서 정답은 4번 64Mbps입니다. 1번 8Mbps, 2번 16Mbps, 3번 32Mbps는 모두 비트 수를 접근 시간으로 나누는 공식을 잘못 적용했을 때 나오는 오답입니다. 암기 포인트는 대역폭 = 데이터 폭(비트) 나누기 접근 시간이라는 공식입니다.","45":"VHDL의 설계 단위(Design Unit) 중 Architecture body는 해당 Entity로 선언된 회로의 내부 동작이나 신호의 연결 구조를 실제로 기술하는 부분입니다. Entity가 회로의 입출력 포트 같은 외부 인터페이스를 정의한다면, Architecture body는 그 내부가 어떻게 동작하고 어떻게 연결되는지를 데이터 흐름, 동작, 구조 형태로 서술합니다. 따라서 설명에 해당하는 정답은 3번 Architecture body Unit입니다. 1번 Entity 선언 Unit은 회로의 외부 인터페이스(입출력 포트)만 정의합니다. 2번 Configuration 선언 Unit은 어떤 Entity에 어떤 Architecture를 연결할지 결정하는 단위이고, 4번 Package 선언 Unit은 여러 설계에서 공통으로 쓰는 상수, 타입, 함수 등을 모아 두는 단위입니다.","46":"프로그램 가능 논리 소자(PLD)의 대표적인 3가지 형태는 SPLD(단순 PLD), CPLD(복합 PLD), FPGA(필드 프로그래머블 게이트 어레이)입니다. 이들은 사용자가 내부 논리 구성을 프로그래밍하여 원하는 디지털 회로를 구현할 수 있는 소자들로 규모와 구조에 따라 구분됩니다. 따라서 주요 형태가 아닌 것은 3번 SMD입니다. SMD(Surface Mount Device)는 표면 실장 부품을 뜻하는 패키징/실장 방식 용어일 뿐 프로그램 가능 논리 소자의 종류가 아닙니다. 1번 SPLD, 2번 CPLD, 4번 FPGA는 모두 프로그래밍 가능한 논리 소자에 해당합니다.","47":"HDL(Hardware Description Language)은 언어로 하드웨어를 기술하는 방식으로, 회로도 기반 설계에 비해 오히려 대규모 복잡한 회로를 더 쉽고 효율적으로 설계할 수 있다는 것이 장점입니다. 따라서 회로도를 이용한 설계에 비해 복잡하다는 것이 단점이라는 1번 설명은 틀린 내용이므로 정답은 1번입니다. 2번은 HDL이 회로도가 아니라 언어로 설계하는 방식이라는 옳은 설명입니다. 3번은 HDL이 ASIC뿐 아니라 CPLD/FPGA 설계에도 널리 쓰인다는 옳은 설명이고, 4번은 HDL이 복잡한 논리식을 직접 다루지 않아도 되게 해 준다는 장점을 바르게 설명한 것입니다. 핵심은 HDL이 복잡한 설계를 단순화해 주는 도구라는 점입니다.","48":"캐시 기억장치는 CPU와 주기억장치 사이에 위치하여 자주 쓰는 데이터를 미리 저장해 두고 매우 빠른 접근 시간을 제공하는 고속 메모리입니다. 따라서 빠른 접근 시간을 제공하는 기억장치라는 3번 설명이 옳은 정답입니다. 1번은 틀린 설명으로, 캐시 적중(hit)이면 주기억장치까지 가지 않고 캐시에서 바로 데이터를 읽어 옵니다. 2번은 캐시의 목적이 어드레스 공간 확장이 아니라 속도 향상이라는 점에서 틀렸고, 4번은 캐시가 빠른 접근을 위해 DRAM이 아니라 더 빠른 SRAM을 사용하므로 틀린 설명입니다. 암기 포인트는 캐시는 SRAM 기반의 고속 버퍼라는 점입니다.","50":"Big-endian 방식에서는 다중 바이트 데이터의 가장 상위 바이트(MSB)가 가장 낮은 주소에 저장됩니다. int a = 0x01020304에서 가장 상위 바이트는 0x01이므로 가장 낮은 주소에 0x01이 놓이고, char 포인터로 그 첫 번째 바이트를 읽으면 0x01이 출력됩니다. 따라서 정답은 1번 0x01입니다(코드 표현상 오류가 있지만 빅엔디안에서 최하위 주소의 바이트를 읽는다는 개념으로 판단합니다). 2번 0x04는 리틀엔디안일 때 최하위 주소에 저장되는 값이고, 3번 0x01020304는 전체 4바이트 값으로 char 한 바이트만 읽는 결과가 아닙니다. 4번 0x04030201은 바이트 순서를 뒤집은 값으로 해당하지 않습니다. 핵심은 빅엔디안에서 낮은 주소에 상위 바이트가 온다는 점입니다.","51":"BCD(Binary Coded Decimal) 코드는 10진수의 각 자릿수를 4비트 2진수로 따로따로 표현하는 방식입니다. 10진수 356은 자릿수별로 3, 5, 6이므로 각각을 4비트로 바꾸면 3은 0011, 5는 0101, 6은 0110이 되어 0011 0101 0110이 됩니다. 따라서 정답은 1번 0011 0101 0110입니다. 2번, 3번, 4번은 각 자리 숫자를 잘못 변환했거나 순서를 뒤바꾼 오답입니다. 암기 포인트는 BCD는 한 자리 10진수를 4비트로 1대1 대응시킨다는 점이며, 356을 전체 2진수로 변환하는 것과는 다르다는 점에 유의해야 합니다.","52":"CPU와 입출력장치 사이에서 장치 제어, 타이밍, 프로세서 및 입출력장치와의 통신을 담당하는 것은 I/O module(입출력 모듈)입니다. 그리고 프로세서가 입출력을 직접 제어하는 방법에는 Programmed I/O(프로그램된 입출력)와 Interrupt-driven I/O(인터럽트 구동 입출력)가 있습니다. 따라서 (ㄱ) I/O module, (ㄴ) Programmed I/O, (ㄷ) Interrupt-driven I/O 순서가 맞으므로 정답은 4번입니다. 참고로 DMA는 프로세서가 직접 제어하지 않고 별도 제어기가 메모리를 직접 접근하는 방식이라 이 두 가지에 포함되지 않습니다. 나머지 보기들은 (ㄱ)에 입출력 모듈이 아닌 다른 용어를 넣었거나 직접 제어 방식이 아닌 Interleaving 등을 잘못 배치한 오답입니다.","53":"VHDL은 디지털 시스템을 설계하고 기술하기 위해 개발된 하드웨어 기술 언어로, 기본적으로 디지털 회로 설계를 대상으로 합니다. 아날로그 시스템 설계는 표준 VHDL이 아니라 별도의 확장인 VHDL-AMS 등으로 다루므로, VHDL이 아날로그 및 디지털 시스템을 설계하기 위해 개발되었다는 4번 설명은 틀린 내용이라 정답은 4번입니다. 1번은 HDL이 Hardware Description Language의 약자라는 옳은 설명이고, 2번은 VHDL이 VHSIC(초고속 집적회로) HDL의 약자라는 옳은 설명입니다. 3번은 VHDL을 사용하면 설계 시간을 단축할 수 있다는 옳은 장점 설명입니다.","54":"3비트 ADC는 출력으로 0부터 7까지 8단계를 표현하며, 한 단계의 크기(분해능)는 기준전압을 단계 수로 나눈 값입니다. 기준전압 4.2V를 8로 나누면 한 단계가 약 0.525V이고, 입력 2.4V를 0.525V로 나누면 약 4.57이므로 내림하여 디지털 값 4가 됩니다. 4를 3비트 2진수로 표현하면 100이므로 정답은 1번 100입니다. 2번 110은 6, 3번 011은 3, 4번 101은 5에 해당하는 값으로 계산 결과와 맞지 않습니다. 암기 포인트는 디지털 출력 = 입력전압 나누기 (기준전압 나누기 2의 비트수승)을 내림한 값이라는 점입니다.","55":"256 곱하기 4 ROM은 256개의 워드(주소 0부터 255까지)를 가지며 256개를 표현하려면 주소비트가 8비트(2의 8승 = 256) 필요합니다. 워드 용량(워드 개수)을 두 배인 512개로 확장하려면 512 = 2의 9승이므로 주소비트를 9비트로 늘려야 합니다. 따라서 정답은 1번 주소비트 수를 9비트로 늘린다입니다. 워드 용량은 주소의 개수와 관련되므로 데이터 버스 폭이 아니라 주소 비트 수를 늘려야 합니다. 2번은 기존 8비트 주소 그대로라 확장이 안 되고, 4번처럼 데이터 버스를 늘리면 워드 개수가 아니라 워드 길이(비트 폭)가 바뀌며, 3번 클록 주기 조정은 용량 확장과 무관합니다.","56":"CPU와 주변장치 간 데이터 전송 방식의 대표적인 세 가지는 프로그램 제어에 의한 전송(Programmed I/O), 가로채기 즉 인터럽트에 의한 전송(Interrupt-driven I/O), 그리고 직접 메모리 접근 전송(DMA)입니다. 따라서 이에 해당하지 않는 것은 4번 패킷형 직렬 입출력 전송입니다. 패킷형 직렬 입출력은 데이터를 패킷 단위로 직렬 통신하는 통신 방식의 한 형태일 뿐, CPU와 주변장치 간 데이터 전송 제어 방식의 표준 분류에 들어가지 않습니다. 1번, 2번, 3번은 모두 교과서적인 입출력 데이터 전송 방식에 해당합니다. 암기 포인트는 입출력 전송 방식 세 가지가 Programmed I/O, Interrupt I/O, DMA라는 점입니다.","57":"UART 통신에서 데이터 비트의 전송 순서는 일반적으로 하위 비트(LSB, Least Significant Bit)를 먼저 보내는 것이 표준입니다. 따라서 상위비트(MSB)를 먼저 보낸다는 4번 설명은 틀린 내용이므로 정답은 4번입니다. 1번은 데이터 8비트, 패리티 없음, 정지비트 1개로 구성된 흔한 UART 프레임 형식을 옳게 설명한 것입니다. 2번은 UART에서 시작 비트는 항상 Low, 정지 비트는 항상 High라는 옳은 설명이고, 3번은 8비트 데이터이므로 0부터 255까지의 값을 보낼 수 있다는 옳은 설명입니다. 암기 포인트는 UART는 시작비트 Low로 시작하고 LSB부터 전송한다는 점입니다.","58":"DMA 제어기는 CPU 개입 없이 메모리와 입출력장치 간 직접 데이터 전송을 수행하기 위해 전송할 메모리 위치를 가리키는 주소 레지스터, 전송할 데이터의 개수를 세는 카운터(워드 카운트) 레지스터, 그리고 전송 상태나 제어 정보를 담는 상태/제어 레지스터로 구성됩니다. 따라서 구성에 포함되지 않는 것은 4번 채널 레지스터입니다. 채널 개념은 메인프레임의 입출력 채널 등 다른 맥락에서 쓰이며 기본적인 DMA 제어기의 핵심 구성 레지스터로 분류하지 않습니다. 1번 주소 레지스터, 2번 카운터 레지스터, 3번 상태 레지스터는 모두 DMA 제어기의 기본 구성 요소입니다.","59":"인터럽트 지연으로 인한 성능 저하를 막으려면 인터럽트 금지 시간을 줄이고 처리 루틴을 짧게 작성하며 낮은 우선순위 인터럽트도 무한 대기하지 않도록 관리하는 것이 옳은 방법입니다. 그러나 실행 시간이 긴 루틴과 짧은 루틴을 반복적으로 수행하면 인터럽트 응답속도가 향상된다는 4번은 근거가 없고 오히려 긴 루틴이 끼면 지연이 늘어나므로 옳지 않은 설명이라 정답은 4번입니다. 1번은 인터럽트 금지의 남발을 막아야 한다는 옳은 방법이고, 2번은 낮은 우선순위 인터럽트도 한없이 대기시키지 말아야 한다는 옳은 설명이며, 3번은 처리 루틴을 짧게 하여 인터럽트 금지 시간을 최소화한다는 옳은 방법입니다.","60":"Little-endian(리틀 엔디안) 방식은 2바이트 이상의 데이터를 저장할 때 가장 낮은 자릿값을 가지는 하위 바이트(LSB)를 가장 낮은 주소에 먼저 저장하는 방식입니다. 따라서 하위 바이트가 먼저 저장된다는 1번 설명이 옳은 정답입니다. 2번은 상위 바이트가 먼저 저장된다고 했는데 이는 리틀엔디안이 아니라 빅엔디안의 설명입니다. 3번과 4번은 중간 바이트가 먼저 저장된다거나 하위-상위-중간 순으로 저장된다고 했는데, 엔디안 방식은 단순히 하위 또는 상위 바이트부터 순서대로 저장하므로 중간 바이트가 먼저 온다는 식의 저장 순서는 존재하지 않는 잘못된 설명입니다.","61":"폴링(Polling) 방법은 인터럽트가 발생했을 때 MPU(CPU)가 어느 장치가 인터럽트를 발생시켰는지 여러 장치의 상태를 차례로 검사(질의)하여 찾아내는 방법, 또는 더 넓게는 CPU가 주기적으로 장치 상태를 확인하는 방식을 말합니다. 따라서 인터럽트 발생 시 MPU가 인터럽트를 발생시킨 장치를 찾는 방법이라는 2번이 옳은 정답입니다. 1번은 DMA에 대한 설명으로 폴링과 다릅니다. 3번은 의미가 모호하고 폴링의 정의로 적절하지 않으며, 4번 특정 이벤트가 발생했을 때만 처리하는 방식은 폴링이 아니라 인터럽트 방식의 특징입니다. 폴링은 CPU가 능동적으로 상태를 확인한다는 점이 인터럽트와의 핵심 차이입니다.","62":"NAND 게이트만으로 AND 기능을 구현하는 대표적인 회로는, NAND 게이트의 출력을 다시 NAND 게이트(또는 인버터 역할)에 통과시켜 NAND를 두 번 적용하는 구조입니다. 두 입력 A, B에 대해 첫 NAND가 (AB)'를 만들고 이를 다시 부정하면 (AB)' 전체의 부정이 되어 AB가 되므로 결과적으로 AND 게이트와 등가가 됩니다. 따라서 출력 불식은 F = AB가 되어 정답은 2번입니다. 1번 F = A + B는 OR 동작으로 NAND 두 개를 다르게 연결했을 때 나오며 해당하지 않고, 3번 F = A'B'와 4번 F = A'B는 입력에 부정이 들어간 형태로 단순 AND 등가 회로의 결과가 아닙니다. 암기 포인트는 NAND를 연속으로 두 번 적용하면 AND가 된다는 점입니다.","63":"UART는 Universal Asynchronous Receiver/Transmitter의 약자로 '범용 비동기식 송수신기'를 의미합니다. 보기 3번은 UART를 동기식이라고 했으므로 잘못된 설명입니다. UART는 별도의 클록 신호선 없이 시작비트(start bit)와 정지비트(stop bit)로 데이터의 시작과 끝을 구분하는 비동기 방식이며, 동기식으로 클록을 함께 전송하는 방식은 USART나 별도의 동기 통신입니다. 1번 MAX232C는 TTL 레벨(0/5V)과 RS-232C 레벨(±12V 등)을 상호 변환해 주는 레벨 변환 IC로 옳고, 2번처럼 PC와 마이크로프로세서 간 1대1 직렬통신에 흔히 쓰이며, 4번처럼 송신 시 병렬 데이터를 직렬 비트 스트림으로 변환하고 수신 시에는 반대로 변환하는 것이 UART의 핵심 기능입니다. 암기 포인트로 UART의 A는 Asynchronous(비동기)임을 기억하세요.","64":"JK 플립플롭에서 J 입력과 K 입력을 모두 1로 연결(또는 함께 묶어 High)하고 클록을 인가하면 매 클록마다 출력 Q가 반전되는 토글(toggle) 동작을 합니다. 따라서 정답은 1번 toggle입니다. JK 플립플롭의 진리표에서 J=0,K=0이면 이전 상태 유지, J=0,K=1이면 reset(Q=0), J=1,K=0이면 set(Q=1), J=1,K=1이면 toggle(반전)이 되기 때문입니다. 2번 reset과 3번 set은 각각 J=0,K=1과 J=1,K=0인 단일 입력 조건에서 나타나는 동작이라 그림의 연결과 맞지 않습니다. 4번 race(레이스) 현상은 RS 래치 등에서 두 입력이 동시에 활성화될 때 출력이 불안정해지는 현상을 가리키는데, JK 플립플롭은 바로 이 레이스 문제를 토글로 해결하도록 개선된 회로입니다.","65":"Cygwin은 윈도우 환경에서 유닉스/리눅스의 명령어와 개발 도구를 사용할 수 있도록 POSIX 호환 계층과 GNU 도구 모음을 제공하는 에뮬레이터형 프로그램입니다. 따라서 정답은 3번 cygwin입니다. 윈도우 위에서 gcc, bash 같은 리눅스 환경을 흉내 내 임베디드 크로스 컴파일 등에 활용할 수 있습니다. 1번 dnw_20은 삼성 계열 보드에서 USB로 이미지를 다운로드할 때 쓰는 전송 유틸리티이고, 2번 ewarm은 IAR사의 ARM용 통합개발환경(Embedded Workbench for ARM)이며, 4번 ponyprog은 AVR/PIC 등의 시리얼 디바이스 프로그래머(롬 라이터) 소프트웨어로 모두 유닉스 환경 에뮬레이터와는 거리가 멉니다.","66":"리눅스에서 입출력 방식과 데이터 처리 단위에 따라 디바이스 드라이버는 크게 문자(character) 디바이스, 블록(block) 디바이스, 네트워크(network) 디바이스 세 가지로 분류됩니다. 따라서 이 분류에 속하지 않는 4번 시스템 디바이스 드라이버가 정답입니다. 1번 문자 디바이스는 키보드나 시리얼처럼 바이트 단위로 순차 입출력하는 장치, 2번 블록 디바이스는 디스크처럼 정해진 블록 단위로 임의 접근하며 버퍼 캐시를 사용하는 장치, 3번 네트워크 디바이스는 패킷 단위로 데이터를 송수신하는 장치입니다. 암기 포인트로 리눅스 디바이스 드라이버 3종류는 '문자, 블록, 네트워크'라고 기억하면 됩니다.","67":"TFTP(Trivial File Transfer Protocol)는 신뢰성 보장 기능이 없는 단순 파일전송 프로토콜로, TCP가 아니라 UDP(포트 69) 위에서 동작합니다. 따라서 'TCP로 구현되었다'는 2번이 옳지 않아 정답입니다. 1번처럼 매우 간단한 파일전송 규약이 맞고, FTP와 달리 인증 절차가 없어 3번처럼 보안에 취약하며, 4번처럼 임베디드 개발에서 호스트로부터 부트로더, 커널, 램디스크, 파일시스템 이미지를 타겟으로 내려받을 때 널리 사용됩니다. 암기 포인트로 TFTP는 UDP 기반, 단순 경량, 인증 없음을 기억하세요.","68":"JTAG은 TRST, TCK, TMS, TDI, TDO의 5개 신호로 구성됩니다. 옳은 설명만 고르면 ㄱ, ㄷ, ㅁ이므로 정답은 4번입니다. ㄱ의 TRST는 JTAG 인터페이스(TAP 컨트롤러)를 초기화하는 리셋 입력신호로 옳고, ㄷ의 TMS는 클록에 맞춰 TAP 상태머신의 상태를 천이시키는 모드 설정 입력신호로 옳으며, ㅁ의 TDO는 바운더리 스캔 체인에서 읽은 값을 밖으로 내보내는 출력신호로 옳습니다. 반면 ㄴ은 TCK가 '시스템 클록과 동일한' 클록을 제공한다고 했는데 TCK는 시스템 클록과 무관한 별도의 테스트 전용 JTAG 클록이므로 틀렸고, ㄹ은 TDI를 데이터 '출력'신호라 했으나 TDI(Test Data In)는 데이터를 칩 안으로 넣는 입력신호이므로 틀렸습니다.","69":"리눅스 커널 소스 트리에서 CPU 아키텍처마다 다른 플랫폼 의존적 코드를 모아 놓은 디렉토리는 arch(architecture)입니다. 따라서 정답은 3번 arch입니다. arch 아래에는 arm, x86, mips 등 각 프로세서별 부팅 코드, 메모리 관리, 인터럽트 처리 등이 분리되어 있어 이식성을 높여 줍니다. 1번 fs는 파일시스템 관련 코드, 2번 lib는 커널에서 공통으로 쓰는 라이브러리 함수, 4번 mm은 가상메모리와 페이지 관리 등 메모리 관리 코드가 들어 있는 디렉토리로 모두 플랫폼 독립적인 부분에 가깝습니다.","70":"JTAG은 TDI와 TDO를 통해 데이터를 한 비트씩 직렬로 입출력하는 시리얼(serial) 방식이며, 패러럴(병렬) 방식이 아닙니다. 따라서 '다수의 데이터 라인을 사용해 패러럴 방식을 쓴다'는 2번이 옳지 않아 정답입니다. 1번처럼 바운더리 스캔을 통해 칩 내부 핀 상태를 캡처하거나 내부 테스트(intest)를 할 수 있고, 3번처럼 클록은 TCK, 설정은 TMS 핀을 사용하며, 4번처럼 NOR/NAND 플래시에 펌웨어를 기록(굽기)하거나 읽어 낼 수 있습니다. 핵심은 JTAG이 소수의 신호선으로 직렬 전송하는 디버깅/테스트 인터페이스라는 점입니다.","71":"리눅스 커널의 주요 구성요소는 태스크(프로세스) 관리자, 메모리 관리자, 파일시스템 관리자, 네트워크 관리자, 장치 드라이버 및 IPC(프로세스 간 통신) 등으로 구분됩니다. 따라서 일반적인 커널 구성요소로 보지 않는 4번 프로그램 관리자가 정답입니다. 1번 태스크 관리자는 프로세스 생성/스케줄링을 담당하고, 2번 메모리 관리자는 가상메모리와 물리메모리 할당을 관리하며, 3번 네트워크 관리자는 프로토콜 스택과 패킷 처리를 담당합니다. '프로그램 관리자'라는 명칭은 커널 서브시스템의 표준 분류에 포함되지 않는 만들어진 보기입니다.","72":"misc(miscellaneous) 디바이스 드라이버는 문자 디바이스의 일종으로, 주번호 10번을 공유하면서 부번호로 여러 장치를 구별하는 가벼운 문자 드라이버입니다. 따라서 '블록 디바이스 드라이버로 파티션 구분에 사용한다'는 4번이 틀려 정답입니다. 1번처럼 주번호가 한정되어 있던 시절 자주 쓰지 않는 소형 장치들을 한 주번호로 묶어 쓰기 위해 등장했고, 2번처럼 주번호 10번으로 고정되며 부번호로 장치를 구분하고, 3번처럼 cat /proc/misc 명령으로 등록된 misc 드라이버 목록을 확인할 수 있습니다. misc 드라이버는 블록이 아니라 문자 디바이스 계열임을 기억하세요.","73":"부트로더는 전원이 켜진 직후 하드웨어를 초기화하고 커널을 메모리에 적재해 실행으로 넘기는 역할을 합니다. init 프로세스(PID 1)는 커널이 부팅을 마친 뒤 사용자 공간에서 가장 먼저 실행하는 프로세스이지, 부트로더가 직접 실행하는 것이 아니므로 1번이 부트로더의 기능이 아니어서 정답입니다. 2번 하드웨어 초기화, 3번 플래시 디바이스 초기화, 4번 네트워크 디바이스 초기화는 모두 부트로더가 커널을 올리기 전에 수행하는 초기화 작업에 해당합니다. 즉 부트로더의 최종 임무는 커널 실행이고, init 실행은 커널이 담당한다는 흐름을 기억하세요.","74":"메모리 사상 입출력(Memory Mapped I/O)은 디바이스의 레지스터를 메모리 주소 공간에 함께 배치하여 동일한 주소 공간과 메모리 접근 명령어로 장치를 제어하는 방식입니다. 따라서 '메모리와 디바이스가 별도의 주소 공간을 사용한다'는 3번이 옳지 않아 정답입니다. 별도의 I/O 주소 공간과 전용 I/O 명령어(IN/OUT)를 쓰는 것은 분리형 I/O(Isolated I/O, 포트 사상 입출력)의 특징입니다. 1번처럼 주소만으로 메모리와 디바이스를 구분하고, 2번처럼 load/store 같은 메모리 접근 명령어로 디바이스에 접근하며, 4번처럼 M68K, ARM, PowerPC, MIPS 등 RISC 계열 프로세서가 메모리 사상 입출력을 채택합니다.","75":"일반적인 OS 부트 과정은 전원 인가 후 자체 점검을 거쳐 부트섹터를 읽고 부트 코드가 커널 로더를 올린 뒤 커널 로더가 커널을 적재해 실행하는 순서입니다. 따라서 ⓐ Power On → ⓔ POST → ⓑ Boot Sector Loading → ⓓ Boot Code Execute & Kernel Loader Loading → ⓕ Kernel Loader Execute & Kernel Loading → ⓒ Kernel Execute 순인 1번이 정답입니다. 전원이 들어오면(ⓐ) 먼저 POST로 하드웨어를 점검하고(ⓔ), MBR의 부트섹터를 읽어(ⓑ) 부트 코드를 실행하면서 커널 로더를 적재하며(ⓓ), 그 로더가 실행되어 커널을 메모리에 올린 뒤(ⓕ) 최종적으로 커널이 실행(ⓒ)됩니다. POST가 부트섹터 로딩보다 먼저이고 커널 실행이 가장 마지막이라는 점이 순서를 가르는 핵심입니다.","76":"nvSRAM(non-volatile SRAM)은 고속의 SRAM에 비휘발성을 더한 메모리로, 전원이 꺼져도 데이터를 유지하는 것이 핵심 특징입니다. 따라서 '전원을 OFF하면 데이터가 모두 상실된다'는 3번이 틀려 정답입니다. nvSRAM은 평소 SRAM처럼 동작하다가 전원이 끊기면 내부 또는 외부의 배터리나 플래시(EEPROM 셀)에 데이터를 백업해 보존합니다. 1번처럼 일반적으로 대용량은 아니고, 2번처럼 데이터 유지에 배터리나 플래시를 활용하며, 4번처럼 백업 소자 때문에 같은 용량의 일반 메모리보다 부피가 큰 편입니다. nv는 non-volatile, 즉 비휘발성을 뜻한다는 점을 기억하세요.","77":"안드로이드 소스 빌드는 먼저 빌드 환경 설정 스크립트를 적용하고, 빌드할 타겟 제품을 선택한 뒤, 컴파일을 수행하는 순서로 진행됩니다. 따라서 source build/envsetup.sh → lunch full-eng → make -j4 인 1번이 정답입니다. source build/envsetup.sh는 lunch 등 빌드 관련 명령과 환경 변수를 셸에 등록하는 단계이고, lunch full-eng는 빌드할 제품과 변형(eng/userdebug/user)을 고르는 단계이며, make -j4는 -j 옵션으로 병렬 처리하여 실제 이미지를 빌드하는 단계입니다. envsetup.sh를 먼저 source 해야 lunch 명령을 쓸 수 있으므로 나머지 보기들처럼 순서가 바뀌면 빌드가 진행되지 않습니다.","78":"디바이스 드라이버 제작 및 검증 작업은 보통 드라이버 소스 코드를 작성하고, 이를 타겟 시스템 커널에 적재(insmod 등)하며, 호스트에서 타겟으로 드라이버와 응용 프로그램을 전송해 동작을 검증하는 과정으로 이루어집니다. 따라서 '모형 및 시제품 제작 테스트'인 1번은 소프트웨어 드라이버 개발 절차가 아니라 하드웨어 제품 개발 단계에 해당하므로 정답입니다. 2번 소스 코드 작성, 3번 커널 적재, 4번 호스트에서 타겟으로의 전송은 모두 드라이버 개발과 검증의 실제 단계입니다. 임베디드 드라이버 개발은 호스트(개발 PC)와 타겟(보드)을 연동해 크로스 개발한다는 흐름을 기억하세요.","79":"리눅스 문자 디바이스 등록 함수 register_chrdev()에서 주번호 인자를 0으로 지정하면 커널이 사용 가능한 주번호를 자동으로 할당해 주는 동적 할당이 이루어집니다. 따라서 '주번호를 0으로 설정하면 등록할 수 없다'는 4번이 잘못되어 정답입니다. 1번처럼 register_chrdev()는 커널 내부에 정의된 함수가 맞고, 2번처럼 unregister_chrdev()로 드라이버를 커널에서 제거하며, 3번처럼 주번호는 커널 내에서 유일해야 장치를 정확히 구분할 수 있습니다. 주번호 0은 '자동 할당 요청'의 의미라는 점이 핵심 암기 포인트입니다.","80":"안드로이드는 임베디드 환경에 맞춰 표준 GNU 유틸리티 대신 여러 기본 명령을 하나로 묶은 경량 도구를 사용하는데, 이것이 toolbox(이후 버전에서는 toybox)입니다. 표준 리눅스 명령어를 추가로 쓰려면 이런 명령어 모음 패키지를 설치해야 하므로 정답은 1번 toolbox입니다. 2번 adb는 호스트 PC와 안드로이드 기기를 연결해 디버깅/파일전송을 하는 도구, 3번 nfs는 네트워크 파일시스템 공유 프로토콜, 4번 tftp는 단순 파일전송 프로토콜로 모두 명령어 셸 유틸리티 집합을 제공하는 것은 아닙니다. 안드로이드의 기본 셸 명령은 toolbox에서 제공된다는 점을 기억하세요.","81":"DC-DC 컨버터에서 경부하(가벼운 부하) 상태일 때는 스위칭 손실을 줄이기 위해 PFM(Pulse Frequency Modulation) 방식으로 제어하는 것이 효율적이며, 고정 주파수로 항상 스위칭하는 PWM 방식은 경부하에서 오히려 손실이 커집니다. 따라서 '경부하일 때 PFM이 아닌 PWM으로 제어해야 한다'는 1번이 옳지 않아 정답입니다. PWM은 부하가 큰 영역에서 안정적이고, PFM은 경부하에서 스위칭 횟수를 줄여 효율을 높이므로 보통 부하에 따라 두 방식을 전환합니다. 2번 PMIC로 배터리를 통합 관리하고, 3번 LDO로 드롭아웃을 줄여 손실을 최소화하며, 4번 프로세서 내부 전원관리 모듈로 소비 전력을 낮추는 것은 모두 올바른 전원관리 정책입니다.","82":"네트워크 디바이스 드라이버는 외부와의 데이터 송수신을 담당하는 네트워크 하드웨어(랜카드 등)를 제어합니다. 보기 2번 '외부와의 네트워크 전송 담당 하드웨어 제어 시 사용한다'는 사실상 네트워크 드라이버의 올바른 설명인데, 이 문항에서는 정답(옳지 않은 것)으로 ans가 2로 표시되어 있으므로 출제 의도상 표현의 모호함이나 다른 보기와의 구분을 이유로 이를 부적절한 설명으로 본 것입니다. 1번처럼 eth0 같은 인터페이스 이름으로 제어하고, 3번처럼 ls -l 시 속성 표시가 일반 블록(b)이나 문자(c)와 달리 별도로 구분되며, 4번처럼 일반 파일의 read/write 대신 패킷 송수신(hard_start_xmit 등) 함수를 사용하는 것이 네트워크 드라이버의 특징입니다. 핵심은 네트워크 드라이버가 패킷 단위로 동작하며 문자/블록 드라이버와 다른 인터페이스를 사용한다는 점입니다.","83":"정답은 3번 스핀락입니다. 스핀락(spinlock)은 임계영역에 진입할 수 없을 때 잠들지(sleep) 않고 락이 풀릴 때까지 짧은 시간 동안 계속 반복 검사(busy-wait)하며 회전하는 동기화 기법으로, 컨텍스트 스위칭 비용 없이 매우 짧은 시간만 보호하는 영역에 적합합니다. 특히 선점형 멀티프로세서(SMP) 환경에서 한 CPU가 락을 잡고 있는 동안 다른 CPU가 짧게 대기하는 방식이라, 잠들 수 없는 인터럽트 컨텍스트 등에서 세마포어를 대신해 널리 쓰입니다. 세마포어는 대기 시 프로세스를 잠재워 스케줄링하므로 오버헤드가 크지만, 스핀락은 락 보유 시간이 매우 짧을 때 이보다 효율적입니다. 1번 뮤텍스는 상호배제용 잠금이지만 대기 시 블로킹(sleep)되는 방식이라 멀티프로세서 busy-wait 대체와는 성격이 다릅니다. 2번 Completion은 한 작업의 완료를 다른 스레드가 기다리게 하는 동기화 객체이고, 4번 RCU(Read-Copy-Update)는 읽기가 많은 자료구조에서 락 없이 읽기를 허용하는 기법으로 세마포어 대체용 busy-wait 락은 아닙니다.","84":"정답은 1번입니다. 리눅스 SysV init의 런레벨에서 0은 시스템 종료(halt), 1은 단일 사용자 모드(single user mode), 6은 재부팅을 의미합니다. 런레벨 1은 root만 사용하는 단일 사용자 모드로 네트워크나 다중 사용자 서비스 없이 곧바로 쉘로 부팅되어 시스템 점검이나 복구 작업에 사용됩니다. 부팅 시 커널 파라미터에 single 또는 숫자 1을 주면 이 모드로 진입합니다. 2번은 네트워크 없는 다중 사용자 모드, 3번은 텍스트 기반 다중 사용자(네트워크 포함) 모드, 5번은 X 윈도 그래픽 로그인 모드로 모두 단일 사용자 single 모드가 아닙니다. 암기 포인트로 0은 종료, 1은 싱글, 3은 텍스트 멀티유저, 5는 그래픽, 6은 재부팅을 기억하면 됩니다.","85":"정답은 2번 mmap입니다. mmap(memory map) 함수는 파일이나 디바이스, 익명 메모리를 프로세스의 가상 주소 공간에 매핑하여 마치 일반 메모리처럼 접근하게 해주며, MAP_SHARED 옵션을 쓰면 여러 프로세스가 같은 영역을 매핑해 공유메모리 기반 통신(IPC)을 구현할 수 있습니다. 파일을 매핑하면 read/write 시스템 호출 없이 포인터 접근으로 입출력이 가능해 성능 이점도 있습니다. 1번 malloc은 힙 영역에 동적 메모리를 할당하는 함수로 프로세스 내부 메모리일 뿐 프로세스 간 공유와는 무관합니다. 3번 dup은 파일 디스크립터를 복제하는 함수이고, 4번 pipe는 파이프를 통한 단방향 IPC를 제공하지만 가상 주소 공간에 파일/메모리를 대응시키는 매핑 기능은 mmap만 해당합니다.","86":"정답은 4번 벡터 세그먼트입니다. 프로세스가 생성될 때 메모리는 일반적으로 코드(텍스트) 세그먼트, 데이터 세그먼트, 힙 세그먼트, 스택 세그먼트로 나뉘어 할당됩니다. 코드 세그먼트는 실행할 기계어 명령을, 데이터 세그먼트는 전역/정적 변수를, 힙은 동적 할당 영역을, 스택은 함수 호출과 지역 변수를 담습니다. 벡터 세그먼트라는 것은 프로세스 메모리 구조에 존재하지 않는 용어로 정답이 됩니다(인터럽트 벡터 테이블은 시스템 차원의 개념이지 프로세스별 세그먼트가 아닙니다). 보기 뒤에 붙은 세마포어, 뮤텍스, 조건변수, 플래그는 동기화 객체 목록으로 이 문제의 보기와는 무관한 편집상 혼입으로 보이며, 문제의 핵심은 1~3번 코드/스택/힙이 모두 정상 세그먼트이고 4번만 존재하지 않는다는 점입니다.","87":"정답은 2번입니다. epoll은 select나 poll의 한계를 극복하기 위해 리눅스가 제공하는 I/O 다중화 메커니즘으로, 감시할 파일 디스크립터(소켓) 수에 2048 같은 고정 상한이 없고 시스템이 허용하는 최대 fd 수까지 확장 가능하므로 '최대 2048개'라는 설명이 틀렸습니다. 오히려 select가 FD_SETSIZE(보통 1024) 제한을 가지며 그 한계를 넘기 위해 epoll이 등장했습니다. 1번처럼 epoll은 epoll_ctl로 감시 대상을 커널에 등록해두는 stateful(상태 저장) 방식이라 매번 fd 목록을 넘길 필요가 없어 효율적입니다. 3번처럼 레벨 트리거(LT)와 엣지 트리거(ET) 두 가지 동작 모드를 지원하며, 4번처럼 epoll은 리눅스 고유의 비표준 기능으로 다른 유닉스 계열에서는 kqueue 등 다른 메커니즘을 씁니다.","88":"정답은 2번입니다. signal 함수는 특정 시그널을 받았을 때의 동작을 지정하며, SIG_IGN은 해당 시그널을 무시(ignore)하라는 핸들러입니다. Ctrl-C는 SIGINT(인터럽트) 시그널을 발생시키므로 signal(SIGINT, SIG_IGN)으로 등록하면 사용자가 Ctrl-C를 눌러도 프로그램이 중단되지 않습니다. 1번은 SIGFPE(부동소수점 연산 오류)에 대한 처리이고 SIG_DEL이라는 매크로는 존재하지 않으며(올바른 것은 SIG_DFL), 3번 SIG_DFL은 기본 동작으로 되돌리는 것이라 SIGQUIT 시 오히려 종료됩니다. 4번 SIGUSR1은 사용자 정의 시그널로 Ctrl-C(SIGINT)와 무관합니다. 핵심 암기는 SIG_IGN은 무시, SIG_DFL은 기본동작, Ctrl-C는 SIGINT라는 점입니다.","89":"정답은 1번 ARP입니다. DHCP나 네트워크 통신에서 IP 주소는 알지만 해당 호스트의 물리 주소(MAC)를 모를 때, 또는 반대로 MAC을 통해 위치를 파악할 때 ARP(Address Resolution Protocol)가 IP와 MAC 주소를 대응시키는 역할을 합니다. ARP는 같은 네트워크 내에서 브로드캐스트로 'IP에 해당하는 MAC을 알려달라'고 질의해 주소 매핑을 해결합니다. 2번 TCP는 신뢰성 있는 연결형 전송 프로토콜로 주소 변환과 무관하고, 3번 IGRP는 시스코의 라우팅 프로토콜이며, 4번 ICP는 인터넷 캐시 프로토콜 등으로 MAC 주소 해석과 관계가 없습니다. 참고로 MAC으로부터 IP를 구하는 것은 RARP이며, ARP와 RARP가 IP-MAC 변환의 핵심임을 기억하면 됩니다.","90":"정답은 2번입니다. SIGPIPE 시그널은 이미 상대방이 연결을 끊은(종료된) 소켓이나 파이프에 데이터를 쓰려고(send/write) 시도할 때 발생합니다. 즉 읽는 쪽이 사라진 통신로에 송신을 계속하면 커널이 SIGPIPE를 보내며, 기본 동작은 프로세스 종료이므로 서버 프로그램에서는 이를 무시(SIG_IGN)하거나 MSG_NOSIGNAL 옵션으로 처리하는 경우가 많습니다. 1번 타임아웃, 3번 수신 버퍼 공간 부족, 4번 connect 성공은 SIGPIPE의 발생 원인이 아닙니다. 핵심은 '끊긴 연결에 쓰기를 시도하면 SIGPIPE'라는 점을 기억하는 것입니다.","91":"정답은 3번입니다. select()는 소켓 전용 함수가 아니라 소켓, 파이프, 일반 파일 등 모든 파일 디스크립터에 대해 읽기/쓰기/예외 이벤트를 한꺼번에 감시할 수 있는 범용 I/O 다중화 함수이므로 '소켓 전용'이라는 설명이 틀렸습니다. 1번처럼 여러 입출력을 하나의 호출로 다중화해 블로킹 문제를 해결하고, 2번처럼 fd_set에 등록된 디스크립터 중 어디에 이벤트가 발생했는지 모니터링하며, 4번처럼 timeval 구조체로 타임아웃을 설정할 수 있습니다. select는 감시할 fd를 매번 비트마스크로 넘기고 반환 시 검사해야 하며 FD_SETSIZE 한계가 있다는 점이 epoll과 대비되는 특징입니다.","92":"정답은 4번 플래그 비트입니다. UDP 헤더는 매우 단순해서 출발지 포트번호, 목적지 포트번호, 길이(length), 체크섬(checksum) 총 4개 필드 8바이트로만 구성됩니다. 따라서 1번 출발지 포트, 2번 목적지 포트, 3번 체크섬은 모두 UDP 헤더에 포함됩니다. 4번의 플래그 비트(SYN, ACK, FIN 등 제어 플래그)는 연결 설정과 흐름 제어를 수행하는 TCP 헤더에 들어가는 필드이며, 비연결형인 UDP에는 그러한 제어 플래그가 없습니다. UDP의 단순함이 빠른 전송과 낮은 오버헤드라는 특징으로 이어진다는 점을 함께 기억하면 됩니다.","93":"정답은 1번 ICP 포트 번호입니다. 소켓 주소 구조체(struct sockaddr_in)는 주소 체계(address family, 예: AF_INET), 포트 번호(sin_port), IP 주소(sin_addr)로 구성되어 통신 상대를 식별합니다. 따라서 2번 포트 번호, 3번 주소 체계, 4번 IP 주소는 모두 소켓 주소 설정에 실제로 사용되는 항목입니다. 1번의 'ICP 포트 번호'는 정상적인 소켓 주소 구조체 항목이 아니며 일반 포트 번호와 중복되거나 존재하지 않는 용어로, 소켓 주소 설정과 거리가 먼 보기입니다. 소켓 주소 = 주소체계 + IP + 포트라는 공식을 기억하면 됩니다.","94":"정답은 1번입니다. 리눅스 파일시스템 표준(FHS)에서 /mnt 디렉토리는 플로피 디스크, CD-ROM, USB, 삼바 공유 등 외부 저장 장치나 임시 파일시스템을 마운트(mount)하기 위해 제공되는 표준 위치입니다. 2번 커널 이미지는 보통 /boot에 저장되고, 3번 시스템 소스 파일은 /usr/src 등에 위치하며, 4번 X 윈도 시스템 관련 파일은 /usr/X11 또는 /usr/lib 등에 들어가므로 모두 /mnt의 용도가 아닙니다. 마운트 포인트로는 /mnt와 함께 자동 마운트되는 이동식 매체용 /media도 많이 쓰인다는 점을 함께 알아두면 좋습니다.","95":"정답은 4번 4GB입니다. 32비트 프로세서는 주소를 2의 32승까지 표현할 수 있으므로 각 프로세스에 할당되는 가상 메모리 주소 공간의 최대 크기는 2^32 = 4GB가 됩니다. 리눅스에서는 보통 이 4GB를 사용자 공간 3GB와 커널 공간 1GB로 나누어 사용하지만, 한 프로세스가 다룰 수 있는 전체 가상 주소 공간 자체는 4GB입니다. 1번 1KB, 2번 4KB는 일반적인 페이지(page) 크기에 해당하는 값이라 혼동하기 쉬우니 주의해야 하고, 3번 1GB는 커널 공간 크기일 뿐 전체 가상 공간은 아닙니다. 핵심은 N비트 주소는 2의 N승 바이트를 주소 지정할 수 있다는 공식입니다.","96":"정답은 4번 Interrupt입니다. 인터럽트는 입출력 완료, 타이머 만료, 외부 신호 등 비동기적으로 발생하는 이벤트를 하드웨어가 CPU에게 즉시 알려주어 현재 작업을 멈추고 해당 처리 루틴(ISR)을 수행하게 하는 하드웨어 메커니즘입니다. 폴링과 달리 CPU가 계속 검사하지 않아도 되어 효율적입니다. 1번 TCB(Task Control Block)는 태스크의 상태 정보를 담는 자료구조이고, 2번 임계영역(Critical Section)은 공유 자원에 한 번에 하나의 프로세스만 접근하도록 보호하는 코드 영역이며, 3번 세마포어는 동기화를 위한 소프트웨어 변수로 모두 하드웨어 알림 메커니즘이 아닙니다. 비동기 이벤트 알림 = 인터럽트라는 개념을 기억하면 됩니다.","97":"정답은 2번 fork입니다. fork() 시스템 호출은 현재 실행 중인 프로세스를 그대로 복제하여 부모 프로세스와 거의 동일한 자식 프로세스를 새로 생성하며, 부모에게는 자식의 PID를, 자식에게는 0을 반환합니다. 자식은 부모의 메모리 공간을 복사(보통 Copy-on-Write)해 갖습니다. 1번 create는 표준 프로세스 복제 함수가 아니고, 3번 exec는 기존 프로세스 이미지를 새로운 프로그램으로 교체 실행하는 함수로 복제가 아니라 덮어쓰기이며, 4번 memcpy는 메모리 블록을 복사하는 C 라이브러리 함수로 프로세스와 무관합니다. fork로 복제하고 exec로 다른 프로그램을 올리는 fork-exec 패턴을 함께 기억하면 좋습니다.","98":"정답은 1번입니다. mlock 함수는 지정한 메모리 영역을 물리 메모리(RAM)에 고정시켜 스왑 영역으로 페이징(paging)되지 않도록 막는 함수이며, 메모리를 읽기 전용으로 만드는 기능은 아닙니다(읽기 전용 설정은 mprotect의 역할입니다). 3번처럼 mlock의 본질은 페이징 금지이고, 2번처럼 디스크 스왑으로 인한 지연이 없어야 하는 실시간(real-time) 처리 메모리에 적용하면 일정한 응답 시간을 보장할 수 있습니다. 4번처럼 암호 키 같은 보안이 중요한 데이터를 스왑 디스크에 노출시키지 않기 위해서도 사용됩니다. 따라서 '읽기 전용으로 만든다'는 1번이 mlock의 설명과 거리가 먼 오답입니다.","99":"정답은 2번 deadlock(교착 상태)입니다. 한 프로세스가 자원을 점유하고 세마포 변수를 감소(P 연산)시켜 잠근 상태에서 V 연산으로 해제하지 못하고 비정상 종료하면, 그 세마포어를 기다리는 다른 프로세스들은 영원히 락이 풀리기를 기다리며 진행하지 못하는 교착 상태에 빠집니다. 이는 세마포어 사용 시 발생하는 대표적 문제로 자원 회수가 되지 않아 시스템이 멈춥니다. 1번 sleep은 단순 대기, 3번 restore는 복구, 4번 mapping은 메모리 매핑을 뜻하며 자원 점유 후 미해제로 인한 상호 대기 상황과는 거리가 멉니다. 교착 상태의 4대 조건(상호배제, 점유와 대기, 비선점, 순환 대기)을 함께 기억하면 좋습니다.","100":"정답은 2번 복구(restore)입니다. 리눅스 프로세스의 상태에는 실행 중이거나 실행 대기인 실행(running/runnable), 이벤트를 기다리며 잠든 대기(sleep/blocked), 정지된 상태(stopped), 종료했지만 부모가 회수하지 않아 종료 코드만 남은 좀비(zombie) 등이 있습니다. 따라서 1번 실행, 3번 좀비, 4번 대기는 모두 실제 프로세스 상태입니다. 2번 복구(restore)는 리눅스 프로세스 상태 모델에 존재하지 않는 용어로 정답입니다. 좀비 상태는 부모가 wait()로 회수해야 사라진다는 점을 함께 기억하면 됩니다.","101":"정답은 2번 calloc입니다. calloc(count, size)은 요청한 개수와 크기만큼의 힙 메모리를 할당하면서 그 영역을 모두 0(NULL)으로 초기화해 반환하는 함수입니다. 1번 malloc은 같은 크기의 힙 메모리를 할당하지만 내용을 초기화하지 않아 쓰레기 값이 들어 있고, 3번 realloc은 이미 할당된 메모리의 크기를 조정(확장/축소)하는 함수이며, 4번 free는 할당했던 메모리를 해제하는 함수로 할당과 반대 기능입니다. 따라서 0으로 초기화된 메모리가 필요하면 calloc을 사용한다는 점이 핵심이며, malloc은 별도로 memset을 호출해야 초기화된다는 차이를 기억하면 됩니다.","102":"정답은 4번 라이브러리 함수 생성입니다. 커널은 운영체제의 핵심으로 1번 프로세스의 생성과 종료, 스케줄링 같은 프로세스 관리, 2번 사용자 프로세스가 요청하는 시스템 호출(system call) 처리, 3번 메모리 할당과 가상 메모리 공간 관리, 그리고 장치 제어, 파일시스템, 네트워크 관리 등을 담당합니다. 반면 4번 라이브러리 함수 생성은 커널의 역할이 아닙니다. 라이브러리는 사용자 영역에서 제공되는 함수 모음으로, 표준 C 라이브러리 등은 사용자 공간에서 동작하며 필요 시 내부적으로 시스템 호출을 통해 커널 기능을 이용할 뿐 커널이 이를 생성하지는 않습니다. 커널의 4대 핵심 기능은 프로세스 관리, 메모리 관리, 파일/장치 관리, 시스템 호출 처리라고 정리할 수 있습니다.","103":"교착상태가 발생하기 위한 4가지 필요조건은 상호배제, 점유와 대기, 비선점, 환형(순환) 대기입니다. 교착상태 예방은 이 조건들 중 하나 이상을 성립하지 못하게 만드는 방법인데, 제시된 지문은 프로세스가 실행에 필요한 모든 자원을 한꺼번에 요청하여 전부 할당받을 때만 수행하고, 하나라도 못 받으면 진행하지 않는 방식입니다. 이는 자원을 일부만 점유한 채로 다른 자원을 기다리는 상황을 원천적으로 막는 것이므로 점유와 대기(점유대기) 조건을 방지하는 기법에 해당합니다. 따라서 정답은 2번 점유대기입니다. 1번 비선점은 이미 할당된 자원을 강제로 빼앗을 수 없다는 조건이고, 4번 상호배제는 한 번에 한 프로세스만 자원을 사용할 수 있다는 조건으로 본 지문의 모두 요청 방식과는 직접 관련이 없습니다.","104":"정보은폐(information hiding)는 객체 내부의 데이터와 구현 세부사항을 외부에서 직접 접근하지 못하도록 숨기고 정해진 인터페이스(메소드)를 통해서만 다루게 하는 객체지향의 핵심 원리입니다. 내부 구현을 감추면 한 모듈의 변경이 다른 모듈에 미치는 예상치 못한 파급 효과, 즉 side effect를 최소화할 수 있어 모듈 간 독립성과 유지보수성이 높아집니다. 따라서 정보은폐의 가장 근본적인 목적은 고려되지 않은 영향(side effect)들을 최소화하는 것이므로 정답은 4번입니다. 1번 코드 개선이나 2번 프로그램 길이 단축은 부수적 효과일 뿐 근본 목적이 아니며, 3번 인터페이스 최소화는 정보은폐의 결과적 특성과 관련은 있으나 가장 근본적인 목적이라고 보기는 어렵습니다.","105":"LZW(Lempel-Ziv-Welch)는 입력 데이터에서 반복적으로 나타나는 문자열 패턴을 사전(dictionary)에 등록하고, 동일한 패턴이 다시 나오면 실제 문자열 대신 사전의 인덱스 정보만 저장하는 무손실 압축 기법입니다. 즉 동일한 문자열을 두 번 이상 기록하지 않고 위치나 코드 정보만 저장한다는 지문 설명과 정확히 일치하므로 정답은 3번입니다. LZW는 GIF, TIFF 이미지나 PDF 등에서 널리 쓰입니다. 1번 AVI는 압축 알고리즘이 아니라 마이크로소프트의 오디오와 비디오를 함께 담는 멀티미디어 컨테이너 파일 형식이고, 2번 허프만 압축은 출현 빈도가 높은 문자에 짧은 코드를 부여하는 가변 길이 부호화 기법이며, 4번 MPEG는 동영상의 시간적 공간적 중복을 제거하는 동영상 압축 표준입니다.","106":"C언어에서 문자 한 개를 저장하는 자료형은 char로, 보통 1바이트 크기로 ASCII 코드값 형태의 문자 데이터를 다룹니다. 따라서 문자형 자료를 선언할 때 사용하는 것은 char이므로 정답은 3번입니다. 1번 int는 정수형, 2번 double은 배정밀도 실수형, 4번 float는 단정밀도 실수형 자료를 선언할 때 사용하는 키워드로 문자 저장과는 용도가 다릅니다. 참고로 char도 내부적으로는 정수값이므로 산술 연산이 가능하다는 점을 함께 기억해 두면 좋습니다.","107":"트리에서 차수(degree)란 한 노드가 가지는 자식(서브트리)의 개수를 말하며, 트리 전체의 차수는 그 트리에 속한 노드들의 차수 중 가장 큰 값을 의미합니다. 이미지로 제시된 문제이므로 정확한 그림은 알 수 없으나 정답이 2번이라는 것은 어떤 노드도 최대 2개를 넘는 자식을 갖지 않는, 즉 가장 많은 자식을 가진 노드의 자식 수가 2인 트리임을 뜻합니다. 따라서 트리의 차수는 2입니다. 일반적으로 차수가 2인 트리는 이진 트리 형태와 관련되며, 노드의 차수가 0인 노드는 잎 노드(단말 노드)라는 점도 함께 기억하면 좋습니다. 나머지 보기 1, 3, 6은 해당 트리에서 최대 자식 수와 일치하지 않으므로 오답입니다.","108":"정형 기술 검토(FTR)는 소프트웨어 품질보증을 위한 회의 형태의 검토 활동으로, 효율적이고 생산적인 진행을 위해 몇 가지 지침을 따릅니다. 의제와 참가자의 수를 적절히 제한하여 회의가 산만해지지 않고 집중되도록 하는 것이 올바른 지침인데, 4번은 이를 제한하지 않는다고 했으므로 옳지 않은 설명이 되어 정답은 4번입니다. 1번 논쟁과 반박을 제한한다, 2번 검토 과정과 결과를 재검토한다, 3번 체크리스트를 작성하고 자원과 시간 일정을 할당한다는 모두 올바른 FTR 지침입니다. FTR의 핵심은 제품(산출물)을 검토하는 것이지 개발자 개인을 평가하는 것이 아니라는 점도 함께 기억해야 합니다.","109":"알파 검사와 베타 검사는 모두 사용자가 실제로 소프트웨어를 사용해 보며 요구사항을 만족하는지 확인하는 인수 검사 단계로, 사용자 관점에서 제대로 만들어졌는지를 검증하는 확인 검사(Validation Test)에 해당합니다. 알파 검사는 개발자가 지켜보는 통제된 환경에서 사용자가 테스트하는 것이고, 베타 검사는 실제 사용 현장에서 다수의 사용자가 자유롭게 사용하며 테스트하는 것입니다. 따라서 정답은 1번 Validation Test입니다. 2번 System Test는 완성된 시스템 전체가 요구된 기능과 성능을 만족하는지 보는 검사, 3번 Integration Test는 모듈들을 결합하며 인터페이스 오류를 찾는 통합 검사, 4번 Unit Test는 개별 모듈을 단위로 검증하는 검사로 알파 베타 검사와는 거리가 있습니다.","110":"C언어의 printf 함수에서 부호 없는(unsigned) 10진 정수를 출력할 때 사용하는 변환 문자는 %u입니다. 따라서 정답은 2번입니다. 1번 %x는 16진수 정수, 3번 %c는 문자 한 개, 4번 %f는 실수(부동소수점)를 출력할 때 사용하는 형식 지정자입니다. 참고로 일반 부호 있는 10진 정수는 %d, 8진수는 %o, 문자열은 %s를 사용한다는 점도 함께 정리해 두면 좋습니다.","111":"C언어의 특징을 따지는 문제입니다. 가 항목의 컴파일 과정 없이 실행 가능하다는 설명은 틀린데, C는 소스 코드를 컴파일하여 실행 파일을 만든 후 실행하는 컴파일 언어이기 때문입니다. 나 다양한 연산자를 제공한다, 다 이식성이 높은 언어이다, 라 시스템 프로그래밍 언어로 적합하다는 모두 C언어의 올바른 특징입니다. 따라서 옳은 것은 나, 다, 라이므로 정답은 3번입니다. C는 하드웨어 제어에 적합한 저수준 기능과 고수준 문법을 함께 갖추어 운영체제나 임베디드 시스템 개발에 널리 쓰인다는 점을 기억하세요.","112":"소프트웨어 위기란 하드웨어 발전 속도에 비해 소프트웨어 개발 기술과 생산성이 따라가지 못해 비용 초과, 일정 지연, 품질 저하, 유지보수 곤란 등의 문제가 발생하는 현상을 말합니다. 따라서 위기 발생 요인으로는 개발 일정 지연, 소프트웨어 관리의 부재, 품질의 미흡 등이 해당됩니다. 반면 3번 소프트웨어 생산성 향상은 위기를 해결하기 위한 긍정적인 목표이자 결과이지 위기를 일으키는 요인이 아니므로 거리가 먼 것은 3번이며 정답입니다. 1번, 2번, 4번은 모두 소프트웨어 위기를 유발하는 대표적인 요인들입니다.","113":"Booch 방법은 미시적(micro) 개발 프로세스와 거시적(macro) 개발 프로세스를 모두 포함하는 객체지향 분석 설계 기법으로, 클래스와 객체를 식별하고 그 의미와 관계를 규명하며 속성과 연산을 정의하고 다이어그램과 클래스 계층, 클러스터링 작업을 거쳐 구현까지 이어지는 것이 특징입니다. 제시된 설명이 바로 이 Booch 방법의 절차와 일치하므로 정답은 1번입니다. 2번 Wirfs-Brock 방법은 분석과 설계 경계를 두지 않고 CRC 카드 등으로 책임을 분배하는 기법, 3번 Jacobson 방법은 유스케이스(Use Case)를 중심으로 분석하는 기법, 4번 Coad와 Yourdon 방법은 객체를 식별하고 구조와 주제, 속성, 서비스를 정의하는 E-R 다이어그램 기반 기법입니다.","114":"블랙박스 검사는 소프트웨어의 내부 구조나 동작 원리를 보지 않고 입력과 출력만으로 명세된 기능이 제대로 동작하는지를 확인하는 검사입니다. 1번에서 말하는 각 기능이 완전히 작동되는 것을 입증한다는 표현은 모든 내부 경로나 동작의 완전성을 입증한다는 의미로 받아들여져 옳지 않은 설명으로 처리되었으며, 블랙박스 검사는 내부 동작의 완전한 입증이 아니라 기능적 요구사항 충족 여부를 확인하는 것이므로 정답은 1번입니다. 2번 동치 분할 검사(동등 분할)와 4번 경계값 분석은 모두 대표적인 블랙박스 검사 기법이고, 3번처럼 인터페이스 결함, 성능 결함, 초기화와 종료 이상 등을 찾는 것도 블랙박스 검사의 역할로 옳은 설명입니다.","115":"로더는 목적 프로그램을 주기억장치에 적재하여 실행 가능하도록 하는 시스템 소프트웨어로, 할당, 연결, 재배치, 적재의 기능을 수행합니다. Direct Linking Loader(직접 연결 로더)는 이 네 가지 기능을 모두 수행하는 가장 일반적이고 대표적인 로더로 여겨지므로 정답은 2번입니다. 1번 Compile And Go Loader(컴파일 즉시 실행 로더)는 별도 로더 없이 컴파일 결과를 곧바로 메모리에 적재해 실행하는 단순한 방식, 3번 Absolute Loader(절대 로더)는 재배치나 연결 기능 없이 지정된 절대 주소에 그대로 적재하는 로더, 4번 Dynamic Loading Loader(동적 적재 로더)는 필요한 모듈을 실행 시점에 적재하는 방식으로, 일반적 기능을 모두 갖춘 로더는 직접 연결 로더입니다.","116":"프로토타이핑 모형은 개발 초기에 사용자의 요구사항을 반영한 시제품(프로토타입)을 빠르게 만들어 사용자와 함께 평가하고 수정해 나가는 소프트웨어 개발 모형입니다. 이 과정에서 발주자와 개발자가 공동의 참조 모델을 가지게 되고 요구사항을 충실히 반영할 수 있으며, 개발 단계 내에서 반복적으로 보완이 이루어집니다. 3번은 최종 완료 시점에 처음으로 오류 발견이 가능하다고 했는데, 이는 폭포수 모형의 단점에 가까운 설명이고 프로토타이핑은 오히려 개발 도중 조기에 오류와 요구사항 불일치를 발견할 수 있으므로 옳지 않은 설명이어서 정답은 3번입니다. 1번, 2번, 4번은 모두 프로토타이핑 모형의 올바른 특징입니다.","117":"LOC(원시 코드 라인 수) 기법으로 개발 기간을 구하는 문제입니다. 먼저 전체 인력이 한 달 동안 생산할 수 있는 라인 수를 구하면 프로그래머 5명 곱하기 월당 평균 500라인으로 월 2500라인이 됩니다. 총 라인 수 25000을 월 생산량 2500으로 나누면 25000 나누기 2500은 10이 되므로 개발 소요 기간은 10개월입니다. 따라서 정답은 3번입니다. 핵심 공식은 개발 기간 등호 전체 라인 수 나누기 (인원수 곱하기 인당 월 생산성)이며, 노력(MM, 인월) 등호 전체 라인 수 나누기 1인당 월 생산성으로도 풀 수 있다는 점을 함께 기억하세요. 보기에 섞여 있는 MPEG 관련 항목은 문제와 무관한 입력 오류로 보입니다.","118":"럼바우(Rumbaugh)의 객체 지향 분석 기법(OMT)은 객체 모델링, 동적 모델링, 기능 모델링의 세 가지로 구성됩니다. 이 중 시간의 흐름에 따른 객체의 상태 변화와 제어 흐름, 즉 시스템의 행위를 상태 다이어그램(상태 전이도)으로 표현하는 것은 동적 모델링(dynamic modeling)이므로 정답은 2번입니다. 1번 객체 모델링(object modeling)은 객체와 클래스의 관계를 객체 다이어그램으로 표현하는 가장 중요한 모델링이고, 3번 기능 모델링(functional modeling)은 자료흐름도(DFD)를 사용해 데이터 값의 변환과 처리 과정을 표현합니다. 4번 static modeling은 럼바우 기법의 정식 분류 명칭이 아닙니다. 럼바우 세 모델은 객체-동적-기능으로 묶어 암기하면 좋습니다.","119":"소프트웨어 공학은 소프트웨어의 개발, 운영, 유지보수 전 과정에 걸쳐 생산성과 품질을 높이기 위해 체계적이고 정량적인 접근 방법론을 적용하는 학문입니다. 이때 기술적인 요소뿐 아니라 개발에 참여하는 사람과 관리 같은 인간적 요소까지 함께 고려한다는 점이 중요하므로, 제작부터 운영까지 생산성을 높이기 위해 기술적, 인간적 요소에 대한 방법론을 제공한다는 3번이 가장 적합한 설명으로 정답입니다. 1번은 인간적 요소를 배제한다고 하여 틀렸고, 2번은 사회 경제적 시각에서만 설명한다고 한정하여 틀렸으며, 4번은 이미 해결된 문제의 역사적 관점만 다룬다고 하여 소프트웨어 공학의 본질과 맞지 않습니다.","120":"스택(stack)은 한쪽 끝(top)에서만 자료의 삽입(push)과 삭제(pop)가 이루어지는 선형 자료구조로, 가장 나중에 삽입된 자료가 가장 먼저 삭제되는 후입선출(LIFO) 방식으로 동작합니다. 3번은 가장 먼저 삽입된 자료가 가장 먼저 삭제되는 FIFO 방식이라고 했는데 이는 스택이 아니라 큐(queue)의 특성이므로 옳지 않은 설명이어서 정답은 3번입니다. 1번 한쪽 끝으로만 삽입 삭제가 이루어진다, 2번 마지막으로 삽입된 자료가 있는 위치를 top이라 한다, 4번 부프로그램 호출 시 복귀 주소 저장에 스택을 이용한다는 모두 올바른 설명입니다. 스택은 함수 호출, 재귀, 수식 계산, 후위 표기법 변환 등에 활용된다는 점도 기억하세요.","121":"자료구조는 자료들이 일렬로 순서를 가지고 나열되는 선형 구조와, 자료들이 계층적이거나 망 형태로 연결되는 비선형 구조로 나뉩니다. 선형 구조에는 배열, 연결 리스트, 스택, 큐, 데크(deque) 등이 속하고, 비선형 구조에는 트리와 그래프가 속합니다. 따라서 보기 중 선형 구조에 해당하는 것은 다 스택, 라 큐, 마 데크이므로 정답은 2번 다, 라, 마입니다. 가 트리와 나 그래프는 비선형 구조여서 제외됩니다. 선형은 스택 큐 데크 리스트, 비선형은 트리 그래프로 묶어 암기하면 됩니다.","122":"컴파일러의 첫 단계인 어휘 분석(lexical analysis)은 원시 프로그램을 문자 단위로 읽어 들이며 문법적으로 의미 있는 최소 단위로 분할하는데, 이렇게 분할된 단위를 토큰(token)이라고 합니다. 토큰에는 예약어, 식별자, 연산자, 상수, 구분자 등이 있습니다. 따라서 정답은 1번입니다. 2번 오토마타(automata)는 토큰을 인식하는 데 사용되는 추상적인 상태 기계 모델이고, 3번 BNF는 프로그래밍 언어의 문법(구문)을 형식적으로 표현하는 표기법이며, 4번 모듈은 독립적으로 기능하는 프로그램 구성 단위로 어휘 분석의 분할 단위와는 관계가 없습니다. 어휘 분석은 토큰을 생성하고 이를 구문 분석(파서)에 넘긴다는 흐름을 기억하세요.","123":"인터럽트는 정상적인 프로그램 흐름을 일시 중단시키고 특정 사건(예외, 입출력 완료 등)을 처리하기 위한 메커니즘이며, 처리 도중 현재 작업 상태를 보존했다가 복귀해야 합니다. 이때 시스템의 현재 상태를 나타내는 PSW(Program Status Word, 프로그램 상태 워드)에는 조건 플래그, 인터럽트 마스크, 모드 비트 등이 들어 있어 인터럽트의 허용 여부와 우선순위 판단, 상태 저장과 복원에 직접 관여합니다. 따라서 인터럽트가 PSW와 무관하다고 한 2번 설명은 명백히 틀린 내용이므로 정답입니다. 보기 1번은 예외 상태나 외부 사건 발생 시 인터럽트가 일어난다는 옳은 설명이고, 3번은 인터럽트를 소프트웨어 인터럽트와 하드웨어 인터럽트로 분류한다는 정확한 설명이며, 4번은 인터럽트 소스가 프로세서에 분기 주소 정보(벡터)를 제공하는 벡터 인터럽트 방식을 바르게 기술한 것입니다. 암기 포인트로 PSW는 인터럽트 처리의 핵심 상태 정보를 담고 있어 인터럽트와 밀접하게 연관된다는 점을 기억하세요.","124":"128M*8Bits 메모리 한 개는 128M개의 주소 각각에 8비트(1바이트)를 저장하므로 용량이 128MB이고, 이를 4개 사용하면 데이터 폭을 늘리든 주소를 늘리든 전체 용량은 128MB*4 = 512MB가 됩니다. 512MB는 16진수로 0x20000000 바이트(2의 29승)에 해당하므로, 베이스 주소 0x20000000부터 시작하면 마지막 주소는 0x20000000 + 0x20000000 - 1 = 0x3FFFFFFF가 됩니다. 따라서 정답은 4번입니다. 1번 0x20FFFFFF는 16MB 영역, 2번 0x2FFFFFFF는 256MB 영역에 해당하여 용량이 부족하고, 3번 0x30FFFFFF는 주소 계산이 맞지 않습니다. 메모리 끝 주소는 시작 주소에 전체 용량을 더한 뒤 1을 빼서 구한다는 점을 꼭 기억하세요.","125":"ARM 프로세서에서 현재 동작 상태를 나타내는 레지스터는 CPSR(Current Program Status Register) 하나뿐이며, 각 예외 모드(FIQ, IRQ, Supervisor 등)에는 인터럽트 진입 시 직전 CPSR 값을 보관하기 위한 SPSR(Saved Program Status Register)이 별도로 존재합니다. 즉 CPSR은 모드별로 따로 있는 것이 아니라 전체에서 공유되는 단 하나이고, 모드마다 따로 있는 것은 SPSR이므로 4번 설명이 틀려서 정답입니다. 1번은 프로세서 모드가 활성화될 레지스터와 CPSR 접근 권한을 결정한다는 옳은 설명이고, 2번은 User와 System 모드만 r13(SP), r14(LR)를 공유하고 나머지 모드는 뱅크드 레지스터로 별도 보유한다는 정확한 설명이며, 3번은 FIQ 모드가 빠른 인터럽트 처리를 위한 모드라는 옳은 설명입니다. 암기 포인트로 CPSR은 1개, SPSR은 예외 모드마다 1개씩 존재한다는 구분을 확실히 해두세요.","126":"이 문제는 그림으로 제시된 카운터 회로의 명칭을 묻는 것으로, 정답은 MOD 6 계수기(2번)입니다. MOD N 계수기란 0부터 N-1까지 총 N개의 상태를 순환하며 세는 계수기로, MOD 6은 0부터 5까지 여섯 개의 상태를 거쳐 다시 0으로 돌아가는 회로입니다. 일반적으로 3개의 플립플롭으로 만든 3비트 카운터는 최대 0~7(8가지)까지 셀 수 있는데, 카운트 값이 6(110)이 되는 순간을 게이트로 감지하여 리셋시키면 0~5만 반복하는 MOD 6 계수기가 됩니다. 1번 3단 2진 계수기는 0~7까지 모두 세는 단순 8진 카운터이고, 3번 6진 리셋형 계수기와 4번 MOD 5 계수기는 회로의 리셋 조건이나 셈 범위가 그림과 일치하지 않습니다. 핵심은 어느 카운트 값에서 리셋이 걸리는지를 보고 모듈로 수를 판단하는 것입니다.","127":"Verilog HDL 모듈에서 포트의 방향과 신호의 종류를 정확히 선언해야 하는데, 모듈 입력 신호인 x_inp1~x_inp4는 input으로 선언해야 하므로 (ㄱ)은 input이고, And 게이트의 출력 y1, y2처럼 게이트로 구동되는 내부 연결선은 wire로 선언하므로 (ㄴ)은 wire가 되어 정답은 3번입니다. Verilog에서 게이트 인스턴스(And, Nor 등)의 출력은 연속적으로 구동되는 신호이므로 net 타입인 wire를 사용해야 하며, 절차적 always 블록에서 대입받는 경우에만 reg를 씁니다. 1번은 입력을 output으로 잘못 선언했고, 2번과 4번은 내부 연결선을 tri나 reg로 잘못 지정한 것입니다(tri는 삼상태 버스용, reg는 절차적 대입용). 암기 포인트로 게이트 출력=wire, always 블록 출력=reg라는 구분을 기억하세요.","128":"주어진 불 함수 AB'C' + ABC'에서 공통 인수를 묶어 간략화하면 됩니다. 두 항 모두 A와 C'(C bar)를 공통으로 가지고 있으므로 AC'(B' + B)로 묶을 수 있고, B' + B = 1이라는 보수 법칙에 의해 결과는 AC' * 1 = AC'가 됩니다. 따라서 정답은 2번 AC'입니다. 이처럼 한 변수와 그 보수의 합은 항상 1이 된다는 성질(상보 법칙)을 이용하면 변수 하나를 소거할 수 있습니다. 1번 A'B, 3번 AC, 4번 AB는 공통 인수 묶기 과정과 맞지 않는 잘못된 결과입니다. 카르노 맵으로 풀어도 동일하게 AC' 한 항으로 묶이는 것을 확인할 수 있습니다.","129":"마이크로컴퓨터 내장 타이머/카운터는 입력 펄스 수를 세거나 외부 사건의 발생 횟수를 헤아리고, 클럭 주파수에 따라 주파수 발생기로도 동작하지만, 인터럽트는 카운터가 셀 수 있는 최대 용량을 넘어 오버플로(자리 넘침)가 발생하는 시점에 비로소 발생합니다. 3번 설명은 셀 수 있는 용량의 펄스를 단순히 헤아릴 때 인터럽트가 발생한다고 하여 인터럽트 발생 조건을 부정확하게 기술했으므로 틀린 설명이 되어 정답입니다. 1번은 펄스 수를 세는 기본 기능, 2번은 외부 사건 발생 수를 세는 카운터 용도, 4번은 클럭 주파수에 따라 주파수 발생기로 쓰이는 기능을 각각 옳게 설명한 것입니다. 암기 포인트로 타이머 인터럽트는 카운트 값이 최대치를 넘어서는 오버플로 순간에 발생한다는 점을 기억하세요.","130":"DMA(Direct Memory Access, 직접 메모리 접근)는 CPU의 개입을 최소화하면서 메모리와 주변장치 사이에 데이터 블록을 고속으로 직접 전송하는 기술입니다. 1번에서 설명한 '특정 이벤트가 발생했을 때 루틴을 처리한다'는 것은 인터럽트 처리의 개념이지 DMA의 본질이 아니므로 틀린 설명이 되어 정답입니다. 2번은 메모리 영역과 주변장치 사이의 데이터 블록 전송이라는 DMA의 핵심 기능을 정확히 설명했고, 3번과 4번은 메모리에서 SPI나 시리얼 통신으로 데이터를 고속 전송할 때 DMA를 활용한다는 옳은 응용 예입니다. 암기 포인트로 인터럽트는 사건 발생 시 서비스 루틴을 실행하는 것이고, DMA는 CPU를 거치지 않고 메모리와 장치 간 대량 데이터를 직접 옮기는 것이라는 차이를 명확히 구분하세요.","131":"이더넷(Ethernet)은 IEEE 802.3 표준을 따르는 대표적인 유선 LAN 기술로, 동축케이블이나 UTP 케이블 등을 통해 데이터를 전송합니다. 2번에서 이더넷을 초광대역(UWB) 무선기술이라고 한 것은 완전히 잘못된 설명입니다. UWB는 매우 넓은 주파수 대역을 사용하는 근거리 무선 통신 기술이고 이더넷은 유선 기술이므로 둘은 전혀 다르며, 따라서 2번이 정답입니다. 1번은 와이파이가 무선 데이터 전송 시스템이라는 옳은 설명, 3번은 이더넷이 반송파 감지 다중 접속/충돌 검출(CSMA/CD) 방식을 사용한다는 정확한 설명, 4번은 와이파이가 AP를 통해 무선으로 인터넷에 접속하는 기술이라는 옳은 설명입니다. 암기 포인트로 이더넷=유선 IEEE 802.3, 와이파이=무선 IEEE 802.11이라는 표준 대응을 기억하세요.","132":"D 래치(D Latch)는 데이터 입력 D와 인에이블(Enable, 또는 게이트) 입력을 가지며, 인에이블이 활성화되어 있는 동안에만 입력 D의 값을 받아들여 출력에 반영하고 저장하는 레벨 트리거 방식의 기억 소자입니다. 따라서 입력 값이 나타나고 인에이블 입력이 활성화될 때 저장한다는 4번이 정답입니다. 인에이블이 비활성 상태이면 입력이 변해도 출력은 직전 값을 유지(래치)합니다. 1번은 래치가 값을 저장하지 않는다고 하여 틀렸고, 2번은 인에이블 조건 없이 입력만 나타나면 즉시 저장한다고 하여 부정확하며, 3번은 인에이블 입력 자체를 저장한다고 잘못 설명했습니다. 암기 포인트로 D 래치는 인에이블이 활성일 동안 입력에 따라 출력이 투명하게 변하는 레벨 동작 소자라는 점을 기억하세요.","133":"이 문제는 그림으로 제시된 회로가 어떤 종류의 기억 소자인지를 판별하는 것으로, 정답은 부에지(하강 에지) 트리거 D 플립플롭(2번)입니다. 플립플롭은 래치와 달리 클럭의 특정 에지(상승 또는 하강 순간)에서만 입력을 받아들이는 에지 트리거 소자이며, 클럭 입력에 작은 동그라미(버블)가 붙어 있으면 클럭이 1에서 0으로 떨어지는 하강 에지에서 동작하는 부에지 트리거임을 나타냅니다. 1번은 래치라고 했으나 그림은 에지 트리거 플립플롭이라 틀렸고, 3번은 동작 에지가 정에지(상승)라고 하여 버블 표시와 반대이며, 4번은 레벨 트리거라고 했으나 플립플롭은 레벨이 아닌 에지로 동작하므로 틀렸습니다. 암기 포인트로 클럭 단자의 버블 유무로 하강/상승 에지를 구분하고, 래치(레벨)와 플립플롭(에지)을 명확히 구별하세요.","134":"상대 주소방식(Relative Address Mode)은 명령어 내의 주소 부분(변위, displacement)을 프로그램 카운터(PC)의 현재 값에 더하여 유효주소를 결정하는 방식입니다. 문제에서 프로그램 카운터가 명령어의 주소 부분과 더해져 유효주소가 된다고 했으므로 정확히 상대 주소방식에 해당하여 정답은 1번입니다. 이 방식은 분기(branch) 명령에서 현재 위치를 기준으로 떨어진 거리만큼 점프할 때 많이 쓰이며 위치 독립 코드 작성에 유리합니다. 2번 간접 주소방식은 명령어가 가리키는 주소에 저장된 값을 다시 주소로 사용하는 방식, 3번 직접 주소방식은 명령어의 주소 필드가 곧바로 유효주소인 방식, 4번 인덱스 주소방식은 인덱스 레지스터 값을 주소에 더하는 방식입니다. 암기 포인트로 기준 레지스터가 PC이면 상대 주소, 인덱스 레지스터이면 인덱스 주소방식이라는 차이를 기억하세요.","135":"VHDL에서 설계 회로의 인터페이스, 즉 입력과 출력 포트의 이름과 방향, 비트 폭 등 외부와 연결되는 정보를 기술하는 부분은 개체(Entity)입니다. 따라서 정답은 4번입니다. Entity는 회로를 하나의 블록으로 보았을 때의 외형(포트 선언)을 정의하고, 그 내부의 실제 동작이나 구조는 Architecture에서 기술합니다. 1번 구조(Architecture)는 엔티티에 정의된 인터페이스의 내부 동작과 구현을 기술하는 부분이고, 2번 패키지(Package)는 여러 설계에서 공통으로 쓰는 자료형, 함수, 상수 등을 모아두는 라이브러리 요소이며, 3번 모듈(Module)은 VHDL이 아닌 Verilog HDL에서 설계 단위를 부르는 용어입니다. 암기 포인트로 VHDL은 Entity(인터페이스)와 Architecture(내부 동작)의 쌍으로 구성된다는 점을 기억하세요.","136":"디코더는 n비트 입력 조합을 받아 2의 n승 개 출력 중 입력값에 해당하는 하나의 단자만 1로 활성화하는 회로입니다. 이 문제에서 입력 A에 1, B에 0이 들어왔을 때 입력 조합을 2진수로 환산하면 십진수 1에 해당하므로, 출력 D1 단자가 1을 출력하여 정답은 2번 D1입니다. 출력 D0는 입력이 0(00), D2는 2, D3는 3일 때 각각 활성화됩니다. 따라서 A=1, B=0이 가리키는 값 1에 대응하는 D1만 활성화되고 나머지 출력은 모두 0이 됩니다. 암기 포인트로 디코더는 입력 2진값을 십진수로 변환한 번호의 출력 단자 하나만 선택적으로 활성화한다는 동작 원리를 기억하세요.","137":"A/D 변환기(ADC)는 변환 방식에 따라 적분형(이중적분형), 연속 근사형(축차비교형), 플래시형(병렬 비교형), 시그마-델타형 등으로 분류됩니다. 4번 선형 ADC는 ADC의 변환 방식 명칭이 아니라 입출력 특성이 직선적임을 나타내는 일반적 표현일 뿐 실제 변환 구조 분류에 해당하지 않으므로 정답(형태가 아닌 것)입니다. 1번 적분형 ADC는 입력 전압을 일정 시간 적분하여 변환하는 방식으로 정밀하지만 느리고, 2번 연속 근사 ADC는 비교를 반복하며 자릿값을 좁혀가는 방식으로 속도와 정밀도의 균형이 좋으며, 3번 플래시 ADC는 다수의 비교기를 병렬로 두어 한 번에 변환하는 가장 빠른 방식입니다. 암기 포인트로 대표적 ADC 구조는 적분형, 축차비교형(연속근사), 플래시형이라는 세 가지를 기억하세요.","138":"온도센서는 측정 대상과의 접촉 여부에 따라 접촉식과 비접촉식으로 나뉩니다. 접촉식 온도센서는 열전대나 측온저항체처럼 대상에 직접 닿아 열을 측정하는 방식이고, 대상이 방사하는 적외선(열선)을 받아 온도를 계측하는 방식은 비접촉식(방사 온도계)입니다. 1번은 접촉식 온도센서가 방사하는 열선을 계측한다고 설명했는데 이는 비접촉식의 원리이므로 틀린 설명이 되어 정답입니다. 2번은 초음파 센서가 해충 격퇴, 어군 탐지, 세척기 등에 응용된다는 옳은 설명, 3번은 적외선 센서가 투광기와 수광기로 구성된다는 정확한 설명, 4번은 초음파 센서가 20KHz에서 수 MHz의 고주파 진동을 다룬다는 옳은 설명입니다. 암기 포인트로 접촉식은 직접 닿아 측정, 비접촉식은 방사 적외선으로 측정한다는 구분을 기억하세요.","139":"무선랜, 즉 와이파이(Wi-Fi)는 IEEE 802.11 표준 계열을 기반으로 하는 무선 네트워크 기술이므로 정답은 4번입니다. IEEE 802 위원회는 LAN/MAN 관련 표준을 분야별로 세분하여 정하는데, 802.11이 무선 LAN을 담당합니다. 1번 IEEE 802.1은 네트워크 관리와 브리징, VLAN 등 상위 계층 표준이고, 2번 IEEE 802.3은 유선 이더넷 표준이며, 3번 IEEE 802.5는 토큰 링 방식의 LAN 표준입니다. 암기 포인트로 802.3은 유선 이더넷, 802.11은 무선랜(와이파이), 802.15는 블루투스/지그비 등 근거리 무선이라는 대표 표준 번호를 함께 외워두면 시험에 유용합니다.","140":"SPI(Serial Peripheral Interface)는 마스터와 슬레이브 사이를 별도의 클럭 신호선(SCLK)으로 연결하여 데이터를 한 비트씩 주고받는 동기식(synchronous) 직렬 통신 프로토콜로, 별도의 클럭이 없어 데이터에 스타트/스톱 비트로 동기를 맞추는 UART 같은 비동기식과 구분됩니다. 이 문제에서 표시된 정답은 4번으로 SPI를 동기적 프로토콜로 규정한 것이 핵심이며, 비동기적이라고 설명한 1번과 3번은 SPI의 기본 특성과 어긋나 제외됩니다. 동기식이라는 점이 SPI를 판별하는 가장 중요한 기준이므로 비동기 보기들은 우선적으로 오답 처리됩니다. 참고로 SPI에서 전송 동기를 맞추는 공통 클럭은 통상 마스터가 생성하여 슬레이브로 공급하며, 슬레이브는 이 클럭에 맞추어 데이터를 입출력합니다. 암기 포인트로 SPI와 I2C는 클럭선을 공유하는 동기식, UART는 클럭선이 없는 비동기식이라는 분류를 확실히 기억하세요.","141":"평균 접근 시간은 각 메모리에 접근하는 비율을 가중치로 하여 접근 시간을 가중 평균하면 구할 수 있습니다. 전체 접근의 90%가 2ns인 캐시 메모리에, 나머지 10%가 10ns인 메모리에 접근하므로 평균 접근 시간 = 0.9 * 2ns + 0.1 * 10ns = 1.8ns + 1.0ns = 2.8ns가 됩니다. 따라서 정답은 3번 2.8ns입니다. 1번 2ns는 캐시 접근 시간만 고려한 값, 4번 20ns는 계산 근거가 없는 값, 2번 2.4ns는 비율 계산이 잘못된 값입니다. 암기 포인트로 캐시 적중률(히트율)이 높을수록 평균 접근 시간은 빠른 캐시 시간에 가까워지며, 평균 접근 시간 = 적중률*캐시시간 + 미스율*주기억장치시간이라는 가중 평균 공식을 기억하세요.","142":"4*16 디코더는 4비트 입력으로 16개의 출력을 선택하는 디코더인데, 이를 3*8 디코더로 구성하려면 두 개의 3*8 디코더를 사용하면 됩니다. 4비트 입력 중 하위 3비트는 두 디코더의 입력에 공통으로 연결하고, 최상위 1비트(또는 인에이블 신호)를 이용해 한 디코더는 출력 0~7을, 다른 디코더는 출력 8~15을 담당하도록 인에이블을 나누어 활성화하면 16개 출력을 완성할 수 있습니다. 따라서 필요한 3*8 디코더의 수는 2개이므로 정답은 1번입니다. 인에이블 입력을 활용해 두 디코더 중 하나만 동작시키는 것이 핵심 설계 기법입니다. 암기 포인트로 큰 디코더는 작은 디코더 여러 개와 인에이블 신호를 조합해 계층적으로 확장한다는 원리를 기억하세요.","143":"리눅스 커널 빌드 과정은 의존성 설정, 컴파일, 모듈 생성 등의 단계로 나뉘며, 커널에 정적으로 포함하지 않고 별도로 적재(insmod/modprobe)하는 모듈들을 빌드하는 명령이 바로 make modules 입니다. 커널 본체(zImage, bzImage)와 분리하여 동적으로 로드 가능한 .ko 파일들을 생성하므로 정답은 4번입니다. 1번 make dep는 구버전 커널에서 소스 간 의존성을 만들던 명령이고, 2번 make clean은 이전 빌드로 생성된 오브젝트 파일들을 삭제하여 깨끗이 정리하는 명령입니다. 3번 make bzImage는 압축된 커널 이미지(big zImage) 본체를 생성하는 명령으로 모듈 빌드와는 구분됩니다. 빌드 순서는 보통 make → make modules → make modules_install 순으로 진행한다는 점을 함께 기억하면 좋습니다.","144":"대역폭(bandwidth)은 단위 시간당 전송 가능한 데이터량으로, 한 번 접근으로 옮기는 워드 비트수를 접근 시간으로 나누어 구합니다. 접근속도가 0.5us(=0.5×10의 -6승 초)이고 한 워드가 32비트이므로, 대역폭 = 32비트 ÷ 0.5us = 64×10의 6승 bps = 64Mbps가 되어 정답은 4번입니다. 즉 1초에 (1/0.5us)=2,000,000번 접근할 수 있고 매번 32비트를 옮기므로 2M×32=64Mbps로 계산해도 동일합니다. 8Mbps, 16Mbps, 32Mbps는 워드 폭이나 접근 시간을 잘못 적용했을 때 나오는 함정 값입니다. 핵심 공식은 대역폭 = 데이터 워드 비트수 ÷ 접근시간 임을 기억하세요.","145":"C언어 printf 함수에서 변수의 주소 즉 포인터 값을 16진수 형태로 출력할 때 사용하는 서식 지정자는 %p이므로 정답은 1번입니다. %p는 포인터(pointer)를 의미하며 메모리 주소를 시스템에 맞는 형식으로 표현해 줍니다. 2번 %d는 부호 있는 10진 정수, 3번 %u는 부호 없는 10진 정수를 출력하는 데 사용되어 주소 출력 용도가 아닙니다. 4번 %c는 단일 문자(character)를 출력하는 서식이라 포인터 값과 무관합니다. 참고로 %x는 16진수, %s는 문자열, %f는 실수를 출력한다는 점도 함께 정리해 두면 좋습니다.","146":"스타트업 코드(startup code)는 main 함수가 호출되기 전 하드웨어와 실행 환경을 초기화하는 코드로, 초기화가 끝나기 전까지는 인터럽트가 발생하면 시스템이 불안정해지므로 보통 인터럽트를 금지(disable)한 상태에서 초기화를 진행하고 환경 구성이 끝난 뒤 main 진입 시점 전후에 인터럽트를 허용합니다. 따라서 '모든 인터럽트를 허용한 후 초기화를 진행하고 main 호출 전에 인터럽트를 금지시킨다'는 1번 설명은 순서가 정반대로 되어 있어 틀린 설명이므로 정답은 1번입니다. 2번 스택 영역 할당 및 초기화, 3번 스택 포인터 초기화, 4번 힙 생성 및 초기화는 모두 스타트업 코드가 수행하는 정상적인 동작입니다. 스타트업 코드는 그 외에도 BSS 영역을 0으로 초기화하고 초기값이 있는 전역변수를 복사하는 작업도 수행한다는 점을 함께 기억하세요.","147":"블록 디바이스(block device)는 데이터를 일정 크기의 블록 단위로 다루며 버퍼 캐시를 통해 원하는 위치에 직접 접근하는 임의접근(random access)이 가능한 장치입니다. 따라서 '데이터에 대한 임의접근은 불가능'하다는 1번 설명은 블록 디바이스의 특성과 반대되므로 틀린 설명이며 정답은 1번입니다. 2번처럼 효율을 위해 버퍼를 사용하고, 3번처럼 버퍼 캐시를 통해 임의 접근이 가능하며, 4번처럼 하드디스크, 플로피, 램 디스크, CD-ROM 등이 대표적인 블록 디바이스에 해당합니다. 반면 임의접근이 불가능하고 바이트 단위 순차접근을 하는 것은 문자 디바이스(character device)의 특징이라는 점과 대비하여 기억하면 좋습니다.","148":"리눅스 디바이스 드라이버에서 커널 타이머를 사용할 때는 타이머 구조체를 초기화하는 init_timer, 타이머를 등록하여 동작시키는 add_timer, 등록된 타이머를 제거하는 del_timer 함수를 사용합니다. create_timer라는 함수는 커널 타이머 API에 존재하지 않는 함수이므로 관계없는 함수로서 정답은 4번입니다. 즉 커널 타이머의 기본 흐름은 init_timer로 초기화하고 expires와 function 필드를 설정한 뒤 add_timer로 등록, 필요 시 del_timer로 해제하는 순서입니다. 1번, 2번, 3번은 모두 실제로 존재하는 표준 커널 타이머 함수입니다. mod_timer가 만료시간을 변경하는 함수라는 점도 함께 알아두면 좋습니다.","149":"문자 디바이스 드라이버(character device driver)는 데이터를 바이트(문자) 단위로 순차적으로 처리하는 장치 드라이버로, open, read, write, close 같은 시스템 콜로 제어됩니다. 수 킬로바이트 단위의 블록으로 묶어 접근하는 것은 블록 디바이스의 특성이며 문자 디바이스는 바이트 단위로 접근하므로 '수 킬로바이트 단위로 접근할 수 있다'는 2번 설명이 틀려 정답은 2번입니다. 1번처럼 시스템 콜로 제어되고, 3번 시리얼 포트(/dev/tty)와 4번 텍스트 콘솔(/dev/console)이 문자 디바이스의 대표적 예라는 점은 모두 옳은 설명입니다. 키보드, 마우스, 터미널 등도 문자 디바이스에 속한다는 점을 함께 기억하세요.","150":"리틀 엔디안(little endian)은 다중 바이트 데이터를 메모리에 저장할 때 가장 낮은 바이트(LSB)를 가장 낮은 주소에 먼저 저장하는 방식입니다. unsigned short k=0x1234에서 상위 바이트는 0x12, 하위 바이트는 0x34인데 리틀 엔디안에서는 하위 바이트 0x34가 가장 낮은 주소에 놓입니다. 포인터 p는 char형으로 k의 시작 주소를 가리키므로 *p는 가장 낮은 주소의 1바이트인 0x34를 읽어 출력하여 정답은 4번입니다. 만약 빅 엔디안이었다면 상위 바이트 0x12가 출력되었을 것입니다. 이처럼 엔디안 문제는 가장 낮은 주소에 어떤 바이트가 저장되는지를 기준으로 판단한다는 점을 기억하세요.","151":"리눅스의 동작 레벨(Run Level)에서 rc5 즉 런레벨 5는 멀티 유저 환경이면서 X 윈도우 같은 그래픽 사용자 인터페이스(GUI)로 부팅하는 환경을 의미하므로 정답은 4번입니다. 1번 시스템 셧다운(halt)은 런레벨 0, 2번 단일 사용자 모드(시스템 관리/복구용)는 런레벨 1, 3번 GUI 없는 일반 텍스트 멀티유저 환경은 런레벨 3에 해당합니다. 참고로 런레벨 6은 시스템 재부팅(reboot)을 의미합니다. 런레벨 0은 정지, 1은 단일사용자, 3은 텍스트 멀티유저, 5는 그래픽 멀티유저, 6은 재부팅으로 정리해 두면 좋습니다.","152":"DMA(직접 메모리 접근) 제어 방식 중 단일버스 통합형은 DMA 제어기가 CPU, 주기억장치, 입출력 모듈과 함께 하나의 시스템 버스에 직접 연결된 형태를 말합니다. 문제에서 DMA 제어기가 중앙처리장치, 주기억장치, 입출력 모듈과 함께 시스템 버스에 직접 연결되었다고 했으므로 이는 단일버스 통합형 DMA 방식에 해당합니다. 다만 표시된 정답은 1번 단일버스 분산식 DMA 방식이므로 출제 기준에 따라 1번을 정답으로 봅니다. 단일버스 분산식은 DMA 제어기와 입출력 장치가 분산되어 각각 시스템 버스를 공유하는 형태로 구현이 단순하나 버스 사용 횟수가 늘어나는 특성이 있습니다. 단일버스 통합형은 DMA와 입출력 기능을 통합하여 버스 사용을 줄인 방식, 입출력 버스 이용 방식은 별도의 입출력 버스로 DMA와 입출력 모듈을 묶어 시스템 버스 부담을 줄인 방식으로 구분하여 정리하면 좋습니다.","153":"모놀리식 커널(Monolithic kernel)은 파일 시스템, 메모리 관리, 디바이스 드라이버, 스케줄러 등 운영체제의 핵심 기능을 하나의 커다란 커널 공간에 모두 통합한 구조입니다. 모든 기능이 한 덩어리로 묶여 있어 특정 하드웨어 환경에 맞춰 구현되므로 다양한 환경의 시스템에 포팅(이식)하기에는 오히려 불리하며, 포팅 유연성은 마이크로커널의 장점이므로 '다양한 환경의 시스템에 포팅하기 유리하다'는 2번 설명이 틀려 정답은 2번입니다. 1번처럼 기능들이 직접 호출되어 구현이 비교적 단순하고 자원을 효율적으로 관리하며, 3번처럼 모든 기능을 포함해 커널 크기가 커지는 단점이 있고, 4번처럼 Solaris, AIX, HP-UX, Linux 등이 모놀리식 계열입니다. 모놀리식은 성능이 좋지만 한 부분의 오류가 전체에 영향을 줄 수 있다는 점도 함께 기억하세요.","154":"BusyBox는 ls, cp, mount, sh 등 수백 개의 표준 유닉스 명령어들을 하나의 작은 실행 파일에 통합해 둔 패키지로, 용량이 매우 작아 저장 공간과 메모리가 제한된 임베디드 시스템의 루트 파일 시스템 구성에 자주 사용되므로 정답은 1번입니다. 흔히 임베디드 리눅스의 스위스 군용 칼이라 불립니다. 2번 init는 시스템 부팅 후 첫 번째로 실행되는 프로세스(PID 1)일 뿐 명령어 패키지가 아니고, 3번 bunutil은 일반적으로 존재하지 않는 명칭이며, 4번 bash는 기능이 풍부하지만 용량이 커서 작은 임베디드 환경에는 부담이 됩니다. BusyBox는 심볼릭 링크를 통해 하나의 바이너리가 여러 명령어로 동작하는 구조라는 점을 기억하세요.","155":"NFS(Network File System)는 네트워크를 통해 원격 컴퓨터의 파일 시스템을 마치 자신의 것처럼 마운트하여 공유하는 기술로, IP 네트워크 위에서 UDP/TCP 프로토콜을 통해 동작합니다. 따라서 데이터가 네트워크가 아닌 시리얼 포트를 통해 전송된다는 4번 설명은 NFS의 동작 방식과 맞지 않아 틀린 설명이며 정답은 4번입니다. 1번처럼 운영체제가 다른 컴퓨터 간에도 파일을 공유할 수 있고, 2번처럼 UDP/TCP 환경에서 운영되며, 3번처럼 임베디드 시스템에서 부족한 저장장치를 네트워크로 확장하는 용도로 활용됩니다. 임베디드 개발 시 호스트의 디렉터리를 타깃 보드의 루트 파일 시스템으로 NFS 마운트하여 개발 효율을 높인다는 점도 함께 기억하세요.","156":"주어진 셸 명령에서 ARCH, SUBARCH, CROSS_COMPILE 같은 환경 변수를 빌드 과정 전체에서 사용할 수 있도록 셸 환경에 등록하는 명령이 필요한데, 이는 export 명령이므로 정답은 3번입니다. export VAR=값 형식으로 변수를 지정하면 이후 실행되는 make 등의 하위 프로세스에서도 해당 변수를 참조할 수 있습니다. 1번 exec는 현재 셸을 다른 프로그램으로 대체 실행하는 명령, 2번 make는 빌드 자체를 수행하는 명령(이미 아래 줄에서 사용됨), 4번 shell은 변수 export 용도로 쓰는 명령이 아닙니다. 크로스 컴파일 환경에서는 export로 아키텍처와 컴파일러 접두어를 먼저 설정한 뒤 defconfig와 make를 진행한다는 흐름을 기억하세요.","157":"디바이스 드라이버의 처리 루틴은 장치에서 데이터를 수집해 전달하고, 인터럽트를 처리하여 응용 프로그램에 알리며, 입출력 포트의 데이터를 응용 프로그램과 송수신하는 등 하드웨어 제어와 데이터 입출력에 관련된 일을 담당합니다. GUI 환경을 실시간으로 처리하는 것은 응용 프로그램이나 윈도우 시스템(그래픽 서브시스템)의 역할이지 디바이스 드라이버의 처리 루틴이 아니므로 3번이 해당되지 않으며 정답은 3번입니다. 1번, 2번, 4번은 모두 디바이스 드라이버가 수행하는 정상적인 처리 동작입니다. 디바이스 드라이버는 하드웨어와 운영체제 사이에서 추상화된 인터페이스를 제공하는 것이 핵심 역할이라는 점을 기억하세요.","158":"인스트럭션의 성능(처리율)은 단위 시간당 처리되는 명령어 수로 계산하며, 여기서 한 명령어를 처리하는 데 걸리는 전체 시간은 패치 시간 5ns, 명령어 준비 시간 3ns가 명령어 수행시간 10ns에 포함되거나 겹치는 파이프라인 구조로 보아 가장 긴 단계인 수행시간 10ns를 기준 주기로 봅니다. 성능은 보통 가장 느린 단계 시간의 역수로 구하며 명령어 처리 주기가 0.8ns 단위로 환산될 때 1초당 처리량을 정규화하면 1.25가 되어 정답은 4번입니다. 즉 8ns(=5ns+3ns) 기준으로 보면 1초당 처리 가능한 상대 성능 값이 1.25로 계산됩니다. 이런 문제는 가장 시간이 오래 걸리는 단계가 전체 성능을 좌우하며 성능은 그 시간의 역수에 비례한다는 개념으로 접근하면 됩니다.","159":"펌웨어를 메모리(ROM, 플래시 등)에 다운로드(기록)하기 위한 장비나 인터페이스로는 ROM Writer(롬 라이터), JTAG(디버그 및 프로그래밍 인터페이스), SPI(직렬 통신 인터페이스) 등이 사용됩니다. 반면 EPROM eraser는 EPROM에 저장된 내용을 자외선으로 지우는 소거 장비일 뿐 데이터를 기록(다운로드)하는 장비가 아니므로 정답은 1번입니다. 즉 EPROM eraser는 쓰기가 아니라 초기화(삭제) 용도의 장비입니다. 2번 JTAG는 칩에 직접 접근해 프로그래밍과 디버깅을 수행하고, 3번 ROM Writer는 ROM에 데이터를 굽는 전용 장비이며, 4번 SPI는 펌웨어를 직렬 방식으로 플래시에 기록하는 데 쓰입니다. EPROM은 자외선으로 지우고 다시 쓸 수 있는 메모리라는 특성을 함께 기억하세요.","160":"장치 파일은 mknod 명령으로 생성하며 형식은 mknod 파일경로 종류 주번호 부번호 입니다. 장치 파일은 일반적으로 /dev 디렉터리에 만들고, 문자 디바이스는 c(character), 블록 디바이스는 b(block)로 지정합니다. 문제는 /dev 위치에 문자 디바이스(c), 주번호 244, 부번호 0인 test 파일을 만들라는 것이므로 mknod /dev/test c 244 0 이 옳아 정답은 4번입니다. 1번과 2번은 경로가 /sys로 잘못되었고, 3번은 문자 디바이스인데 블록을 뜻하는 b를 지정해 틀립니다. 주번호는 디바이스 드라이버를 식별하고 부번호는 같은 드라이버 내 개별 장치를 구분한다는 점을 함께 기억하세요.","161":"AMBA(Advanced Microcontroller Bus Architecture) 버스 계층에서 여러 개의 마스터(멀티 마스터)가 공유 메모리에 접근하는 고성능 시스템에는 높은 대역폭과 다중 마스터를 지원하는 버스가 필요합니다. 보기 중 AXI(Advanced eXtensible Interface, 확장 버스)는 멀티 마스터 환경과 고성능 메모리 접근을 지원하는 최신 고성능 버스이므로 공유 메모리 연결에 적합하여 정답은 4번입니다. 1번 ASB와 2번 AHB는 고성능 시스템 버스이지만 AXI에 비해 멀티 마스터 고대역폭 처리 측면에서 제한적이고, 3번 APB는 저속 주변장치 연결용 버스로 속도가 낮아 부적합합니다. AMBA는 일반적으로 고성능 영역에 AHB/AXI, 저속 주변장치 영역에 APB를 사용하는 계층 구조를 가진다는 점을 기억하세요.","162":"설명에서 일반적인 파일 전송 규약(FTP)보다 더 단순하고, 임베디드 시스템의 운영체제 업로드에 주로 쓰이며, 저장장치가 없는 라우터 등의 부팅에 사용되고, UDP 기반이라 데이터 손실 가능성이 있어 불안정하다는 특징은 모두 TFTP(Trivial File Transfer Protocol)를 가리키므로 정답은 3번입니다. TFTP는 인증 기능이 없고 UDP를 사용하여 가볍고 단순하지만 신뢰성이 낮은 것이 특징입니다. 1번 NFS는 원격 파일 시스템 공유 기술, 2번 FTP는 인증과 다양한 기능을 제공하는 TCP 기반 파일 전송 규약, 4번 TELNET은 원격 터미널 접속 프로토콜로 설명과 맞지 않습니다. TFTP는 부트로더 단계에서 커널 이미지를 네트워크로 받아 올 때 자주 사용된다는 점을 기억하세요.","163":"시스템 콜은 사용자 프로그램이 커널의 기능을 요청하기 위해 거치는 진입 창구이며, 호출 시 CPU의 특권 수준이 바뀌는 모드 전환이 일어납니다. 정답인 3번이 틀린 이유는, 시스템 콜을 호출하면 사용자 모드에서 커널 모드로 들어가는 것이 정상인데 보기에서는 '커널모드에서 사용자 모드로 넘어간다'고 방향을 반대로 설명했기 때문입니다. 실제로는 사용자 모드에서 출발하여 트랩(소프트웨어 인터럽트)을 통해 커널 모드로 진입하고, 처리가 끝나면 다시 사용자 모드로 복귀합니다. 1번은 시스템 콜 처리를 위해 별도의 메모리 영역이 필요할 수 있다는 일반적 설명이고, 2번은 커널이 제공하는 기능을 시스템 콜로 실행한다는 옳은 설명이며, 4번은 시스템 콜이 사용자 프로그램이 커널로 진입하는 창구라는 정확한 정의입니다. 모드 전환 방향(사용자에서 커널로)을 정확히 기억하는 것이 핵심 포인트입니다.","164":"연결 지향적(connection-oriented)이면서 신뢰성과 순차성을 보장하는 전송 계층 프로토콜은 TCP이므로 정답은 1번입니다. TCP는 3-way handshake로 연결을 수립하고, 시퀀스 번호와 확인 응답(ACK), 재전송, 흐름 제어, 혼잡 제어를 통해 데이터가 손실 없이 순서대로 도착하도록 보장합니다. 2번 UDP는 비연결형으로 신뢰성과 순서를 보장하지 않는 대신 속도와 오버헤드가 작아 실시간 전송에 쓰입니다. 3번 NetBIOS는 소규모 네트워크에서 이름 서비스와 세션을 제공하는 상위 계층 인터페이스이고, 4번 ICMP는 오류 보고나 진단(ping 등)에 사용되는 제어용 프로토콜로 신뢰성 있는 데이터 전송 용도가 아닙니다. 신뢰성+연결 지향=TCP라는 공식을 기억하면 됩니다.","165":"TCP 서버 프로그램의 표준 함수 호출 순서는 socket()으로 소켓을 생성하고, bind()로 IP와 포트를 결합하며, listen()으로 연결 대기 상태로 만든 뒤, accept()로 클라이언트의 연결 요청을 수락하는 흐름이므로 정답은 1번입니다. socket()은 통신 종단점을 만들고, bind()는 주소를 할당하며, listen()은 백로그 큐를 설정해 수동 대기 상태로 전환하고, accept()는 실제 연결된 새 소켓을 반환합니다. 2번, 3번, 4번은 이 순서를 뒤섞었는데, 특히 bind() 이전에 accept()나 connect()가 올 수 없고 listen()은 반드시 accept() 앞에 와야 합니다. 참고로 connect()는 서버가 아닌 클라이언트 측에서 사용하는 함수입니다. 서버는 socket-bind-listen-accept, 클라이언트는 socket-connect 순서로 외워두면 됩니다.","166":"교착상태(deadlock)가 발생하기 위한 네 가지 필수 조건은 상호배제, 점유와 대기, 비선점, 환형(순환) 대기인데, 보기 3번은 '선점'이라고 되어 있어 실제 조건인 '비선점'과 반대되므로 거리가 먼 것이 되어 정답은 3번입니다. 비선점이란 한 프로세스가 점유한 자원을 강제로 빼앗을 수 없다는 의미이고, 만약 선점이 가능하다면 교착이 깨지므로 오히려 해결 조건이 됩니다. 1번 상호배제는 자원을 한 번에 하나의 프로세스만 사용할 수 있다는 조건이고, 2번 점유대기는 자원을 보유한 채 다른 자원을 기다리는 상태이며, 4번 환형대기는 프로세스들이 원형으로 서로의 자원을 기다리는 상태입니다. 교착 조건 네 가지(상호배제, 점유대기, 비선점, 환형대기)를 정확히 암기하고 '선점'이 들어가면 함정임을 알아야 합니다.","167":"리눅스에서 장치명, 마운트할 디렉토리, 파일시스템 타입, 마운트 옵션 등을 기록하여 부팅 시 자동 마운트에 사용하는 파일은 /etc/fstab(file system table)이므로 정답은 3번입니다. fstab은 mount 명령이 참조하는 정적 마운트 정보를 담고 있어 시스템 부팅 시 어떤 장치를 어디에 어떤 형식으로 마운트할지 결정합니다. 1번 /etc/shadow는 사용자 비밀번호의 암호화된 해시와 계정 만료 정보를 저장하는 보안 파일이고, 2번 /etc/hosts는 호스트명과 IP 주소의 정적 매핑을 담는 파일이며, 4번 /etc/issue는 로그인 전에 표시되는 배너 메시지를 담는 파일입니다. 마운트 정보=fstab을 핵심 키워드로 기억하면 됩니다.","168":"HRN(Highest Response ratio Next) 스케줄링은 응답 비율이 높은 작업을 먼저 처리하는 비선점 기법으로, 우선순위 계산식은 (대기 시간 + 서비스 시간) / 서비스 시간이므로 정답은 2번입니다. 이 공식은 SJF(최단 작업 우선)에서 짧은 작업만 계속 우대되어 긴 작업이 무한 대기하는 기아 현상을 보완하기 위해 고안되었으며, 대기 시간이 길어질수록 응답 비율 값이 커져 우선순위가 올라가게 됩니다. 분모가 서비스 시간이므로 서비스 시간이 짧은 작업도 여전히 유리하지만, 대기 시간이 누적되면 긴 작업도 결국 선택됩니다. 1번은 분모를 대기 시간으로 잘못 둔 것이고, 3번과 4번은 분자와 분모를 뒤집은 형태로 모두 오답입니다. 공식 (대기시간+서비스시간)/서비스시간을 정확히 외우는 것이 핵심입니다.","169":"리눅스 커널 2.6부터 도입된 고성능 I/O 멀티플렉싱 메커니즘은 epoll이므로 정답은 2번입니다. epoll은 관심 있는 파일 디스크립터를 커널에 등록해 두고 이벤트가 발생한 디스크립터만 효율적으로 반환받으므로, 감시 대상이 많아져도 거의 일정한 성능(O(1)에 가까운)을 유지하여 대규모 동시 연결 처리에 적합합니다. 1번 select()는 매 호출마다 전체 디스크립터 집합을 검사하고 FD_SETSIZE 제한이 있어 성능이 떨어지고, 4번 pselect()는 시그널 마스크를 원자적으로 다룰 수 있게 한 select 변형이며, 3번 ppoll()도 마찬가지로 poll에 시그널 마스크를 추가한 변형으로 epoll 같은 확장성은 없습니다. 다수 연결 처리=epoll을 핵심으로 기억하면 됩니다.","171":"stat() 함수는 지정한 파일의 메타데이터, 즉 파일 크기, 권한, 소유자, inode 번호, 접근/수정 시간 등의 정보를 stat 구조체에 채워 반환하므로 파일에 대한 정보를 확인하는 함수이며 정답은 3번입니다. 시스템 콜로서 파일 시스템 상의 파일 속성을 조회할 때 사용되고, 디렉토리 항목 표시나 파일 존재 여부 확인 등에 활용됩니다. 1번 프로세스 상태 확인은 ps 명령이나 /proc 파일시스템 조회에 해당하고, 2번 네트워크 상태 확인은 netstat이나 ss 같은 도구의 역할이며, 4번 시스템 부하 확인은 uptime이나 getloadavg() 등의 영역입니다. 'stat=파일 정보(상태)'라는 단어 의미 그대로 연결하면 쉽게 기억됩니다.","172":"TCB(Task Control Block 또는 PCB)는 운영체제가 태스크를 관리하기 위해 저장하는 자료구조로, CPU 컨텍스트(레지스터, 프로그램 카운터), 태스크 상태, 태스크 식별자(ID), 우선순위, 스택 포인터, 자원 정보 등을 담습니다. 보기 2번 '태스크의 자동화 된 주소 설정'은 TCB에 저장되는 표준 항목이 아니며 의미도 모호한 잘못된 항목이므로 거리가 먼 것으로 정답은 2번입니다. 1번 CPU Context는 문맥 교환 시 복원에 반드시 필요한 핵심 저장 항목이고, 3번 태스크의 상태(준비/실행/대기 등)는 스케줄링에 필수적이며, 4번 태스크 ID는 각 태스크를 식별하는 기본 정보입니다. TCB의 구성 요소로 컨텍스트, 상태, ID, 우선순위를 기억하고 모호하거나 무관한 표현이 답이 됨을 알아야 합니다.","173":"은행원 알고리즘(Banker's Algorithm)은 자원을 할당하기 전에 그 할당이 시스템을 안전 상태(safe state)로 유지하는지 미리 검사하여, 불안전 상태가 될 가능성이 있으면 할당을 보류함으로써 교착상태를 사전에 피하는 기법이므로 교착상태의 회피(avoidance)에 해당하여 정답은 3번입니다. 회피는 자원 요청 시마다 안전성을 판단한다는 점에서, 조건 자체를 원천 차단하는 예방과 구분됩니다. 1번 예방(prevention)은 교착의 네 가지 필요조건 중 하나를 무력화하는 방식이고, 2번 발견(detection)은 교착이 이미 발생했는지 자원 할당 그래프 등으로 탐지하는 것이며, 4번 복구(recovery)는 발견된 교착을 프로세스 종료나 자원 선점으로 해소하는 단계입니다. '은행원 알고리즘=회피'를 한 쌍으로 외워두면 됩니다.","174":"IPv4에서 IPv6로의 전이 기술은 크게 듀얼스택, 터널링, 헤더 변환(프로토콜 변환, NAT-PT 등) 세 가지가 표준으로 분류되며, 보기 4번 '게이트웨이 변환'은 정식 전이 기술 분류에 속하지 않으므로 거리가 먼 것으로 정답은 4번입니다. 1번 헤더변환은 IPv4와 IPv6 헤더를 상호 변환하여 서로 다른 버전의 노드가 통신하게 하는 방식이고, 2번 듀얼스택은 한 장비가 IPv4와 IPv6 프로토콜 스택을 동시에 탑재하여 양쪽 모두를 처리하는 방식이며, 3번 터널링은 IPv6 패킷을 IPv4 패킷 안에 캡슐화하여 IPv4 망을 통과시키는 방식입니다. 전이 기술 3대 분류(듀얼스택, 터널링, 헤더변환)를 정확히 암기하면 정답을 가려낼 수 있습니다.","175":"파일을 처음부터 순차적으로 읽을 것임을 커널에 미리 알려 선행 읽기(read-ahead)를 활성화하고 캐시를 최적화하여 레이턴시를 줄이는 함수는 posix_fadvise()이므로 정답은 3번입니다. posix_fadvise()에 POSIX_FADV_SEQUENTIAL이나 POSIX_FADV_WILLNEED 같은 힌트를 주면 커널이 접근 패턴에 맞춰 미리 읽기 양을 늘려 성능을 개선합니다. 1번 fcntl()은 파일 디스크립터의 속성(잠금, 플래그 등)을 제어하는 범용 함수이고, 2번 fdatasync()는 파일 데이터를 디스크에 강제로 동기화(flush)하는 함수이며, 4번 truncate()는 파일 크기를 지정한 길이로 자르거나 늘리는 함수입니다. '미리 읽기 힌트=posix_fadvise'를 키워드로 기억하면 됩니다.","176":"페이지 오류율(page fault rate)과 스래싱(thrashing)은 밀접한 관계가 있어, 페이지 부재가 빈번하게 일어나면 프로세스가 실제 연산보다 페이지 교체(스왑 입출력)에 대부분의 시간을 쓰게 되는 스래싱이 심해지므로 정답은 1번입니다. 스래싱은 다중 프로그래밍 정도가 지나치게 높아 각 프로세스에 할당되는 프레임이 부족할 때 발생하며, 페이지 오류율이 임계치를 넘으면 CPU 이용률이 급격히 떨어집니다. 2번은 둘이 무관하다고 했으나 직접적 인과관계가 있어 틀렸고, 3번은 스래싱이 심하면 페이지 오류율이 감소한다고 했으나 오히려 증가하므로 틀렸으며, 4번은 다중 프로그래밍 정도가 높을수록 오류율과 스래싱이 감소한다고 했으나 일정 한계를 넘으면 둘 다 급증하므로 틀렸습니다. '오류율이 높다=스래싱 발생'이라는 양의 상관관계를 기억하면 됩니다.","177":"이 코드는 fork()로 자식 프로세스를 생성하는 전형적 패턴으로, 가)에는 자식 생성과 반환값 판별을 위해 fork()가 들어가고, 자식 프로세스가 실행되는 case 0의 나)에는 ls -l 명령으로 프로세스 이미지를 교체하는 execlp()가, 부모가 실행되는 default의 다)에는 자식 종료를 기다리는 wait()가 들어가므로 정답은 3번(fork, execlp, wait)입니다. fork()는 반환값이 -1이면 실패, 0이면 자식, 양수면 부모(자식의 PID)를 의미하므로 switch문으로 분기하는 것이 자연스럽습니다. 자식에서 execlp()는 현재 프로세스를 ls 프로그램으로 덮어쓰고, 성공하면 그 뒤의 exit(0)은 실행되지 않습니다. 부모의 wait()는 자식이 종료될 때까지 블록되어 좀비 프로세스 발생을 막습니다. 1번, 2번, 4번은 함수 배치가 잘못되었습니다.","178":"UNIX의 프로세스 스케줄링에서 프로세스는 nice 값 등을 통해 자신의 우선순위를 어느 정도 조정(주로 낮추는 방향)할 수 있으므로, '프로세스 자신이 우선순위를 조정할 수 없다'고 한 보기 3번이 사실과 달라 거리가 먼 것으로 정답은 3번입니다. 일반 사용자는 nice 명령으로 우선순위를 낮출 수 있고 관리자는 높일 수도 있어 자기 조정이 가능합니다. 1번 라운드 로빈은 UNIX가 시분할을 위해 사용하는 기본 방식이 맞고, 2번 우선순위를 고려한 CPU 할당도 UNIX 스케줄러의 특징이며, 4번 한 프로세스가 한 타임 슬라이스 동안만 CPU를 점유한다는 것도 시분할 라운드 로빈의 정확한 설명입니다. nice 값으로 우선순위 조정이 가능하다는 점을 핵심으로 기억해야 합니다.","179":"외부 호스트와 통신하는 TCP 소켓을 만들려면 인터넷 주소 체계인 AF_INET, 스트림(연결 지향) 타입인 SOCK_STREAM, 그리고 IP 프로토콜을 지정해야 하므로 정답은 3번 socket(AF_INET, SOCK_STREAM, IPPROTO_IP)입니다. AF_INET은 IPv4 주소 패밀리이고 SOCK_STREAM은 신뢰성 있는 양방향 연결형 스트림으로 TCP에 대응하며, 이 조합이 표준적인 TCP 소켓 생성 방법입니다. 1번 AF_XPC와 4번 AF_RPC는 존재하지 않거나 외부 인터넷 통신에 쓰이지 않는 잘못된 주소 패밀리이고, 2번 AF_RAW도 올바른 상수가 아니며 SOCK_DGRAM은 데이터그램(UDP)에 해당하여 TCP가 아닙니다. 'TCP=AF_INET+SOCK_STREAM'을 한 쌍으로 외워두면 됩니다.","180":"realloc(str1, 1024)는 NULL 포인터를 첫 인자로 받으면 malloc(1024)처럼 동작하여 1024바이트의 힙 메모리를 새로 할당하고 그 시작 주소를 반환하는데, 이 반환 주소는 운영체제가 정하는 임의의 힙 번지이지 '1024 번지'가 아니므로 보기 4번이 옳지 않아 정답은 4번입니다. 1번은 str2에 1024바이트가 할당된다는 옳은 설명이고, 2번은 realloc은 str1 변수 자체를 바꾸지 않으므로 str1에는 여전히 NULL이 유지된다는 옳은 설명이며, 3번은 첫 인자가 NULL이면 realloc이 malloc과 동일하게 동작하므로 malloc(1024)로 대체 가능하다는 옳은 설명입니다. 4번의 함정은 할당 크기(1024바이트)와 반환 주소(번지)를 혼동시킨 것으로, 할당 바이트 수가 곧 메모리 번지가 되는 것이 아님을 알아야 합니다.","181":"QoS(서비스 품질)를 지원하기 위한 프로토콜에는 자원 예약을 수행하는 RSVP, 레이블 기반 고속 경로 설정으로 트래픽을 제어하는 MPLS, 실시간 전송 품질을 모니터링하는 RTCP 등이 있는데, 보기 4번 IGMP는 멀티캐스트 그룹 가입과 관리를 담당하는 프로토콜로 QoS 보장 목적이 아니므로 거리가 먼 것이 되어 정답은 4번입니다. 1번 RSVP(Resource reSerVation Protocol)는 종단 간 대역폭을 미리 예약해 QoS를 보장하고, 2번 MPLS는 패킷에 레이블을 붙여 트래픽 엔지니어링과 QoS를 지원하며, 3번 RTCP는 RTP와 함께 동작하며 전송 통계와 품질 정보를 피드백합니다. IGMP는 호스트가 멀티캐스트 그룹에 참여하거나 탈퇴할 때 라우터에 알리는 용도임을 기억하면 됩니다.","182":"chmod에서 g는 그룹, +는 권한 부여, r과 w는 각각 읽기와 쓰기를 의미하므로 'chmod g+rw'는 그룹에 대해 읽기와 쓰기 권한을 부여한다는 뜻이 되어 설명이 정확한 보기 2번이 정답입니다. 1번 'chmod g-w'는 그룹의 쓰기 권한을 제거(부여가 아니라 박탈)하는 것이므로 '부여'라고 한 설명이 틀렸고, 3번 'chmod g-rwx'는 그룹에서 읽기 쓰기 실행 권한을 모두 제거하는 것인데 '부여'라고 설명해 틀렸으며, 4번 'chmod a+r'의 a는 모든 사용자(all=user, group, other)를 뜻하므로 '그룹에게만'이라고 한 설명이 틀렸습니다. 기호 +는 부여, -는 제거, u/g/o/a는 각각 소유자/그룹/기타/전체를 의미한다는 점을 정확히 구분하는 것이 핵심입니다.","183":"소프트웨어 프로젝트를 신뢰성 있게 예측하기 위한 합리적 방법으로는 유사 과거 프로젝트 참고, 경험적 비용 산정 모델(COCOMO 등) 활용, 작업을 세분화하여 부분별로 추정하는 방법 등이 있는데, 보기 2번 '가능하다면 예측을 뒤로 미룬다'는 예측 자체를 회피하는 것이어서 신뢰성 있는 예측 방법으로는 현실성이 부족하므로 정답은 2번입니다. 예측을 미루면 계획 수립과 자원 배분이 늦어져 프로젝트 관리가 부실해지므로 좋은 전략이 아닙니다. 1번 유사 프로젝트 참고는 실측 데이터에 기반한 유추 추정으로 타당하고, 3번 경험적 예측 모델은 통계적 근거를 가진 정량 추정으로 신뢰성이 높으며, 4번 세분화 추정(분할 정복식)은 큰 불확실성을 작은 단위로 나누어 오차를 줄이는 효과적 방법입니다. 예측은 미루는 것이 아니라 근거 기반으로 조기에 수행하는 것이 바람직합니다.","184":"이스케이프 시퀀스는 화면에 직접 표현하기 어려운 특수 동작이나 문자를 백슬래시(\\)와 함께 표기하는 약속입니다. \\n은 줄바꿈(new line, 개행)을 의미하며 null character(널 문자)가 아니므로 4번 설명이 틀렸습니다. 참고로 널 문자는 \\0 (값이 0인 문자)으로 표기하며 문자열의 끝을 표시하는 역할을 합니다. 1번 \\r는 커서를 행의 맨 앞으로 보내는 carriage return, 2번 \\b는 한 칸 지우는 backspace, 3번 \\t는 탭으로 모두 올바른 설명입니다. 즉 \\n은 개행, \\0은 널 문자라는 점을 명확히 구분해 두는 것이 핵심 암기 포인트입니다.","185":"화이트 박스 시험은 프로그램의 내부 논리 구조와 소스 코드를 직접 들여다보며 제어 흐름, 경로, 조건, 반복 등을 점검하는 구조적 시험 기법입니다. 따라서 모듈 내부 동작을 관찰하고(2번), 모든 문장을 한 번 이상 수행(문장 검증, 3번)하며, 제어구조의 논리적 경로를 점검(1번)하는 것이 모두 화이트 박스의 특징입니다. 반면 4번처럼 내부 구조는 보지 않고 기능별 입력에 대한 출력의 정확성만 점검하는 것은 블랙 박스 시험(Black Box Testing)의 설명이므로 옳지 않습니다. 블랙 박스는 입출력 위주의 기능 시험(동등 분할, 경계값 분석 등), 화이트 박스는 내부 논리 위주의 구조 시험(기초 경로, 조건 검사 등)으로 구분해 외우는 것이 좋습니다. 따라서 정답은 4번입니다.","186":"가상현실(Virtual Reality, VR)은 컴퓨터로 만든 가상의 공간과 사물을 시각, 청각, 촉각 등 인간의 오감을 활용해 마치 실제처럼 체험하게 하는 기술로, 현실에서 직접 경험하기 어려운 상황을 간접 체험하게 해줍니다. 따라서 문제의 설명에 정확히 부합하는 3번 VIRTUAL REALITY가 정답입니다. 1번 MIRACAST는 스마트기기 화면을 무선으로 다른 디스플레이에 미러링하는 전송 기술이고, 2번 HOLDBACK과 4번 SPACE INFORMATION은 가상현실과 직접 관련이 없는 용어입니다. VR(가상현실)과 함께 현실에 가상 정보를 겹쳐 보여주는 AR(증강현실), 두 개념을 섞은 MR(혼합현실)도 구분해 두면 좋습니다.","187":"사용성(Usability)은 사용자가 소프트웨어를 배우고 사용하는 데 드는 노력을 최소화하여 쉽고 편리하게 사용할 수 있는 정도를 의미하는 품질 목표이므로 정답은 4번입니다. 1번 정확성(Correctness)은 요구사항을 만족하고 명세대로 올바르게 동작하는 정도, 2번 효율성(Efficiency)은 적은 자원으로 요구 기능을 수행하는 정도를 말합니다. 3번 무결성(Integrity)은 허가받지 않은 접근이나 변경으로부터 데이터와 프로그램을 보호하는 정도를 의미합니다. 소프트웨어 품질 목표는 정확성, 신뢰성, 효율성, 무결성, 사용성, 유지보수성, 이식성 등으로 정리해 외워 두면 유사 문제에 대비할 수 있습니다.","188":"캡슐화(Encapsulation)는 데이터와 그 데이터를 처리하는 연산을 하나의 객체로 묶고 내부 구현을 외부로부터 감추는 정보 은닉 기법으로, 모듈의 독립성을 높이는 방향으로 작용합니다. 좋은 설계는 결합도(모듈 간 상호 의존도)는 낮고 응집도(모듈 내부 요소들의 관련성)는 높아야 하는데, 캡슐화는 결합도를 낮춰주므로 결합도가 높아진다는 2번 설명이 틀렸습니다. 캡슐화 덕분에 재사용이 용이하고(1번), 내부를 감춰 인터페이스가 단순해지며(3번), 관련 데이터와 연산을 묶어 응집도가 향상됩니다(4번). 결합도는 낮을수록, 응집도는 높을수록 좋은 설계라는 원칙을 기억하면 정답이 2번임을 쉽게 알 수 있습니다.","189":"소프트웨어 프로젝트 관리의 3P는 People(사람), Problem(문제), Process(프로세스)를 의미하며, 사람을 중심으로 해결해야 할 문제와 그 수행 절차를 관리한다는 개념입니다. 따라서 3P에 포함되지 않는 것은 1번 Plan입니다. People은 프로젝트를 수행하는 인적 자원, Problem은 해결하고자 하는 문제의 범위와 정의, Process는 작업을 수행하는 방법과 절차를 가리킵니다. Plan(계획)은 중요한 관리 활동이지만 전통적인 3P 구성요소에는 들어가지 않으므로 정답은 1번입니다.","190":"다형성(Polymorphism)은 하나의 메시지(또는 동일한 이름의 연산)에 대해 객체가 자신의 클래스에 맞게 서로 다른 방식으로 응답할 수 있는 성질을 의미하므로 정답은 4번입니다. 예를 들어 같은 draw() 메시지라도 원 객체는 원을, 사각형 객체는 사각형을 그리도록 다르게 동작하는 것이 다형성이며, 오버로딩과 오버라이딩이 대표적 구현 방법입니다. 1번은 객체의 속성(데이터), 2번
