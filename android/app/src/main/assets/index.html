은 메서드(연산)에 가까운 설명이고, 3번 하나의 클래스에서 여러 객체를 생성하는 것은 인스턴스화에 대한 설명입니다. 따라서 동일 메시지에 대한 다양한 응답이라는 핵심을 담은 4번이 가장 적절합니다.","191":"크로스 컴파일러(Cross Compiler)는 원시 프로그램을 작성하고 컴파일하는 컴퓨터(호스트)의 기계어가 아니라, 다른 기종(타깃)에서 실행될 기계어로 변환하는 컴파일러이므로 정답은 3번입니다. 임베디드 개발에서는 자원이 풍부한 PC에서 코드를 작성하고 자원이 제한된 타깃 보드용 코드를 생성하기 위해 크로스 컴파일러를 흔히 사용합니다. 1번 링커는 여러 목적 파일과 라이브러리를 연결해 실행 파일을 만드는 도구, 2번 프리프로세서는 컴파일 전에 매크로 치환이나 헤더 포함 등을 처리하는 전처리기입니다. 4번 로더는 실행 파일을 메모리에 적재해 실행 준비를 하는 프로그램으로, 기계어 변환과는 역할이 다릅니다.","192":"gets()는 키보드로부터 한 줄의 문자열을 입력받아 문자 배열에 저장하는 표준 입력 함수이므로 문자열 입력 함수로는 3번이 정답입니다. 1번 puts()는 문자열을 화면에 출력하는 출력 함수, 2번 putchar()는 문자 하나를 출력하는 함수입니다. 4번 getchar()는 문자 하나를 입력받는 함수로 문자열 입력은 아닙니다. 입력 함수는 getchar(문자)와 gets(문자열), 출력 함수는 putchar(문자)와 puts(문자열)로 짝을 지어 외우면 헷갈리지 않습니다.","193":"자료구조는 데이터 요소들이 일렬로 이어지는 선형 구조와 그렇지 않은 비선형 구조로 나뉩니다. 큐, 스택, 리스트는 데이터가 순차적으로 연결되는 선형 구조에 속하지만, 그래프는 정점들이 여러 간선으로 복잡하게 연결되는 비선형 구조이므로 성격이 다른 하나는 4번 그래프입니다. 대표적인 비선형 구조에는 트리와 그래프가 있고, 선형 구조에는 배열, 리스트, 스택, 큐, 데크 등이 있습니다. 따라서 정답은 4번입니다.","194":"C언어의 기억 클래스(storage class)는 변수의 메모리 할당 위치와 생존 기간, 사용 범위를 결정하는 것으로 자동(automatic, auto), 정적(static), 레지스터(register), 외부(external, extern) 네 가지가 표준입니다. 보기 중 internal variables(2번)라는 기억 클래스는 존재하지 않으므로 정답은 2번입니다. 1번 static은 프로그램 종료까지 값이 유지되는 정적 변수, 3번 register는 CPU 레지스터에 두어 빠른 접근을 노리는 변수, 4번 automatic은 함수 안에서 생성되었다가 종료 시 소멸하는 지역 변수입니다. external(extern)은 있지만 internal은 없다는 점을 기억하면 됩니다.","195":"검증 검사(Validation Test)는 통합 검사 후 전체가 하나의 소프트웨어로 합쳐진 상태에서 요구사항 명세서를 기준으로 사용자의 요구를 제대로 만족하는지 확인하는 단계로, 형상 검사, 알파 검사, 베타 검사 등의 기법을 포함하므로 정답은 4번입니다. 1번 통합 검사(Integration Test)는 모듈들을 결합해 인터페이스 오류를 점검하는 단계, 2번 단위 검사(Unit Test)는 개별 모듈을 따로 검사하는 단계입니다. 3번 시스템 검사(System Test)는 하드웨어를 포함한 전체 시스템 환경에서의 동작을 검사하는 단계입니다. 일반적인 검사 순서는 단위, 통합, 검증, 시스템 검사 순으로 진행됩니다.","196":"후위 순회(Postorder)는 왼쪽 서브트리, 오른쪽 서브트리, 루트의 순서로 노드를 방문하는 방식입니다. 보기에서 정답으로 표시된 3번 D B E F C A는 가장 깊은 왼쪽부터 처리한 뒤 마지막에 루트 A를 방문하는 형태로, 후위 순회의 특징인 루트가 맨 마지막에 오는 규칙과 일치합니다. 후위 순회는 항상 트리의 루트 노드가 결과의 가장 끝에 위치하므로, 루트로 추정되는 A가 맨 뒤에 오는 보기를 고르는 것이 판단의 핵심입니다. 4번처럼 A가 맨 앞이면 전위 순회 형태에 가깝고, 좌우와 루트의 순서가 후위 규칙에 맞아야 하므로 정답은 3번입니다. 전위는 루트가 처음, 후위는 루트가 마지막, 중위는 왼쪽-루트-오른쪽 순서라는 점을 함께 기억하세요.","197":"히스토그램(Histogram)은 영상에 존재하는 각 명암(밝기) 값이 얼마나 많이 분포하는지를 막대그래프 형태로 보여주는 가장 기본적인 영상 분석 기법으로, 영상의 명암 값 프로필을 파악하는 데 사용되므로 정답은 4번입니다. 히스토그램 평활화 등을 통해 영상의 대비를 개선할 수도 있습니다. 1번 블러링은 영상을 부드럽고 흐릿하게 만드는 처리, 2번 마스크 연산은 일정 크기의 필터(커널)를 영상에 적용해 다양한 효과를 내는 기법입니다. 3번 에지 추출은 밝기가 급격히 변하는 경계선을 찾아내는 기법으로, 명암 분포를 보여주는 히스토그램과는 목적이 다릅니다.","198":"스택은 마지막에 들어간 것이 먼저 나오는 후입선출(LIFO) 구조이므로, 입력과 출력(push와 pop)을 적절히 섞어 가능한 출력 순서인지 따져야 합니다. 3번 D A B C는 D가 가장 먼저 나오려면 A, B, C, D를 모두 push해야 하는데, 그러면 스택에는 위에서부터 D C B A 순으로 쌓여 D 다음에는 반드시 C가 나와야 하므로 D 다음에 A가 나오는 것은 불가능합니다. 따라서 정답은 3번입니다. 나머지 1번 B A D C, 2번 B C D A, 4번 C B A D는 push와 pop을 적절히 번갈아 수행하면 모두 만들 수 있는 출력 순서입니다. 핵심은 어떤 원소가 먼저 나오면 그보다 나중에 들어온 원소들은 반드시 그보다 먼저 나와야 한다는 LIFO 규칙입니다.","199":"절대 로더(Absolute Loader)는 목적 프로그램을 지정된 기억장소에 그대로 적재(load)하는 기능만 수행하는 가장 단순한 로더로, 기억장소 할당과 연결(링킹)은 프로그래머가, 재배치는 언어 번역 프로그램(어셈블러나 컴파일러)이 담당하므로 정답은 3번입니다. 1번 직접 연결 로더(Direct Linking Loader)는 할당, 연결, 재배치, 적재의 네 기능을 모두 수행하는 일반적인 로더입니다. 2번 컴파일 앤 고 로더(Compile and Go Loader)는 번역 결과를 곧바로 메모리에 적재해 실행하는 방식이고, 4번 동적 적재 로더(Dynamic Loading Loader)는 필요한 모듈을 실행 시점에 그때그때 적재하는 방식입니다. 로더의 4대 기능인 할당, 연결, 재배치, 적재를 누가 수행하느냐로 종류를 구분하는 것이 핵심입니다.","200":"바람직한 소프트웨어 설계는 모듈 간 결합도(상호 의존도)는 낮추고 모듈 내 응집도는 높여 모듈의 독립성을 확보하는 것을 지향합니다. 따라서 두 모듈 간 상호 의존도를 강하게 한다는 1번은 결합도를 높이라는 의미이므로 바람직한 지침이 아니어서 정답입니다. 2번 모듈의 기능을 예측 가능하도록 정의하고, 3번 이식성을 고려하며, 4번 적당한 모듈 크기를 유지하는 것은 모두 좋은 설계 지침에 해당합니다. 좋은 설계의 핵심 원칙은 낮은 결합도, 높은 응집도라는 점을 다시 기억해 두면 됩니다.","201":"소프트웨어 테스트의 목적은 결함을 찾아내 기능과 성능을 확인하고, 사용자 요구사항 만족도와 제품 신뢰도를 높이는 데 있습니다. 따라서 2번, 3번, 4번은 모두 올바른 테스트 목적이지만, 1번처럼 개발 단계에서 형식적으로 거치는 요식적 행위라는 것은 테스트의 진정한 목적과 거리가 멀어 옳지 않으므로 정답은 1번입니다. 테스트는 형식적 절차가 아니라 숨어 있는 오류를 적극적으로 발견하고 품질을 보증하기 위한 핵심 활동임을 명심해야 합니다.","202":"클래스(Class)는 공통된 특성과 행위를 가진 유사한 객체들을 하나로 묶어 추상화한 것으로, 객체를 생성하기 위한 틀이자 데이터 추상화의 단위이므로 정답은 4번입니다. 1번 메시지(Message)는 객체에게 어떤 동작을 요청하는 수단, 2번 상속(Inheritance)은 상위 클래스의 속성과 연산을 하위 클래스가 물려받는 개념입니다. 3번 메서드(Method)는 객체가 수행하는 구체적인 연산(함수)을 의미합니다. 클래스로부터 만들어진 실제 실체를 객체(인스턴스)라고 부른다는 점도 함께 정리해 두면 좋습니다.","203":"병렬 비교형(Flash, 플래시형) A/D 변환기는 여러 개의 비교기를 병렬로 두어 입력 전압을 동시에 비교하므로 변환 속도가 가장 빠른 대신, 비트 수가 늘어날수록 비교기 수가 기하급수적으로 증가해 회로 구성이 복잡하고 분해능(비트 수)을 높이기 어렵습니다. 따라서 변환 시간이 빠르고 분해능이 가장 낮으며 회로가 복잡한 형태는 1번 병렬 비교형이 정답입니다. 2번 축차 비교형은 속도와 정밀도의 균형이 좋아 널리 쓰이고, 3번 단순 계수형(계수 비교형)은 구조가 간단하지만 변환이 느립니다. 4번 적분형(이중 적분형)은 변환은 느리지만 잡음에 강하고 정밀도가 높아 디지털 계측기 등에 사용됩니다. 속도는 병렬 비교형이 가장 빠르고 적분형이 가장 느리다는 순서를 함께 기억하세요.","207":"HDL(하드웨어 기술 언어)은 Verilog, VHDL처럼 회로의 동작과 구조를 텍스트로 기술하여 논리합성(synthesis) 도구로 게이트 레벨 회로를 자동 생성하는 설계 방식입니다. 정답이 4번인 이유는 HDL 설계의 장점이 아니라 오히려 단점 또는 무관한 항목이기 때문입니다. 비동기(asynchronous) 회로는 클록 없이 신호 변화에 따라 동작하므로 글리치, 경쟁상태(race), 해저드 등 타이밍 조건이 매우 복잡하며, HDL을 사용한다고 해서 비동기 회로의 타이밍 조건이 간단해지는 것은 아닙니다. 오히려 HDL과 합성 도구는 클록 기반의 동기(synchronous) 설계에 최적화되어 있어 비동기 설계는 다루기 까다롭습니다. 1번은 논리합성 자동화로 설계 기간 단축, 2번은 시뮬레이션을 통한 설계 중 검증, 3번은 추상화된 시스템 레벨 검증이 가능하다는 실제 장점들이므로 옳은 설명입니다.","209":"3단계 명령어 파이프라인은 명령어를 인출(Fetch), 해독(Decode), 실행(Execute)의 세 단계로 겹쳐 처리하여 처리율을 높이는 구조이므로 정답은 데이터읽기(Memory) 단계인 3번입니다. 인출 단계는 메모리에서 명령어를 가져오고, 해독 단계는 명령어를 분석하여 제어신호를 만들며, 실행 단계는 ALU 연산을 수행합니다. 데이터읽기(Memory) 단계와 쓰기(Write Back) 단계는 4단계 또는 5단계 파이프라인(예: 고전적 RISC의 IF-ID-EX-MEM-WB)에서 추가로 등장하는 단계입니다. 따라서 3단계 파이프라인에는 메모리 접근 단계가 별도로 존재하지 않으며, 단계 수가 늘어날수록 각 단계가 더 세분화된다는 점을 암기하면 좋습니다.","210":"캐시기억장치는 CPU와 주기억장치 사이에서 자주 쓰는 데이터를 임시 보관하여 평균 접근시간을 줄이는 고속 버퍼이므로, 설계 시 가장 중요한 고려 사항은 적중(hit) 시 데이터를 최대한 빠르게 읽어오는 것입니다. 따라서 정답은 1번입니다. 캐시의 존재 이유 자체가 빠른 접근속도이므로 적중 시간을 짧게 하는 것이 핵심 성능 지표입니다. 2번은 실패 시 데이터 적재 시간을 최대화한다고 했는데 이는 최소화해야 하므로 틀렸고, 3번은 주기억장치와 보조기억장치의 일관성으로 이는 캐시가 아닌 가상기억장치 영역의 문제이며, 4번의 보조기억장치 선택은 캐시의 역할이 아닙니다. 캐시 성능은 적중률(hit ratio)과 적중 시간으로 평가한다는 점을 기억하세요.","211":"USB는 차동 신호(D+, D-) 위에서 NRZI(Non-Return-to-Zero Inverted) 인코딩과 비트 스터핑(bit stuffing)을 함께 사용하므로 정답은 4번입니다. NRZI 방식은 데이터 비트가 0일 때 신호 레벨을 반전시키고 1일 때는 레벨을 유지하는 방식으로, 별도의 클록선 없이도 수신측이 데이터로부터 클록을 복원할 수 있게 해줍니다. 연속된 1이 길어지면 신호가 변하지 않아 동기를 잃을 수 있으므로 USB는 1이 6개 연속되면 0을 강제로 끼워넣는 비트 스터핑을 적용합니다. 1번 FM0와 2번 FM1은 맨체스터 계열의 다른 인코딩이고, 3번 NRZ는 0과 1을 단순히 두 레벨로 나타내는 기본 방식으로 USB가 채택한 방식은 NRZI입니다.","212":"입력 감지기(센서)의 신호 입력 방식 분류에는 절대(absolute) 감지기, 차동(differential) 감지기, 표준(ratiometric 또는 standard) 감지기 등이 있으며, 자기장 감지기는 신호 입력 방식의 분류가 아니라 측정 대상에 따른 센서 종류이므로 정답은 2번입니다. 절대 감지기는 기준점 대비 절대적인 값을, 차동 감지기는 두 입력의 차이를 측정하는 방식입니다. 표준 감지기는 공급 전압에 비례한 출력을 내는 방식을 가리킵니다. 자기장 감지기(예: 홀 센서)는 측정하는 물리량(자기장)에 따른 분류이므로 이 문맥의 '입력 감지기 종류' 구분과는 범주가 다릅니다.","213":"간접 주소지정(indirect addressing) 방식에서는 명령어의 주소 필드가 가리키는 곳에 실제 데이터가 있는 것이 아니라 그 데이터가 저장된 주소(유효주소)가 들어 있습니다. 명령어 ADD(100)을 수행하면 먼저 100번지를 읽어 그 내용 1234를 얻고, 이 1234를 다시 주소로 사용하여 1234번지의 내용인 4567을 실제 피연산자로 가져와 연산장치(ALU)로 보냅니다. 따라서 정답은 2번 4567입니다. 1번 1234는 직접 주소지정이라면 100번지의 값이 곧 데이터가 되지만 여기서는 한 단계 더 들어간 주소일 뿐이고, 3번 100은 즉시(immediate) 또는 단순 주소값이며, 간접 주소지정은 메모리 참조를 두 번 한다는 점이 핵심입니다.","214":"ECL(Emitter Coupled Logic)은 트랜지스터를 포화(saturation) 영역에 넣지 않고 능동 영역에서 동작시켜 스위칭 지연을 최소화하므로 디지털 논리 IC 계열 중 처리 속도가 가장 빠릅니다. 따라서 정답은 2번입니다. 포화 영역을 사용하지 않으면 트랜지스터가 포화에서 빠져나오는 데 걸리는 시간이 없어 매우 고속 동작이 가능하지만, 그 대가로 소비전력이 크고 잡음여유가 작다는 단점이 있습니다. 1번 RTL은 초기의 느린 로직, 3번 TTL은 가장 널리 쓰였으나 ECL보다 느리며, 4번 DTL은 다이오드를 사용한 구형 로직입니다. 속도 순서는 대략 ECL이 가장 빠르고 그다음 TTL 계열이라고 기억하면 됩니다.","215":"버스 대역폭은 클록 주파수와 한 번에 전송하는 데이터 폭(바이트)을 곱하여 구합니다. 데이터 폭이 32비트이면 32을 8로 나눈 4바이트이고, 클록 주파수가 1MHz이므로 대역폭은 1MHz 곱하기 4바이트 즉 4Mbyte/sec입니다. 따라서 정답은 2번입니다. 계산 공식은 대역폭(byte/s) = 클록 주파수(Hz) 곱하기 데이터 폭(byte)이라는 점을 외워두면 유사 문제를 빠르게 풀 수 있습니다. 비트 단위로 답하면 32Mbit/sec이지만 문제는 byte 단위를 요구하므로 4Mbyte/sec가 정답이고, 단위 변환에 주의해야 합니다.","216":"스위칭 방식의 정전압(스위칭 레귤레이터) 회로는 전원을 빠르게 켜고 끄는 개폐 동작으로 펄스폭변조(PWM)된 구형파를 만든 뒤, 이 구형파에 포함된 고주파 스위칭 성분을 제거하고 평균값에 해당하는 매끈한 DC 성분만 통과시켜야 합니다. 이때 사용하는 필터는 저주파(DC 포함)는 통과시키고 고주파는 차단하는 저역통과필터(LPF)이므로 정답은 1번입니다. 보통 인덕터(L)와 커패시터(C)로 구성된 LC 저역통과필터가 사용되어 출력 리플을 줄이고 안정된 DC 전압을 만듭니다. 3번 고역통과필터는 반대로 고주파만 통과시켜 부적절하고, 2번과 4번은 이 평활(필터링) 목적에 맞지 않습니다.","217":"Big endian은 2바이트 이상의 다중 바이트 데이터를 저장할 때 가장 큰 자릿값을 갖는 상위 바이트(MSB)를 낮은 주소에 먼저 저장하는 방식이므로 정답은 2번입니다. 예를 들어 0x12345678을 저장하면 낮은 주소부터 12, 34, 56, 78 순으로 배치됩니다. 1번처럼 하위 바이트(LSB)를 먼저 저장하는 것은 리틀 엔디안(little endian) 방식으로, 인텔 x86 계열이 이를 사용합니다. 빅 엔디안은 사람이 숫자를 읽는 순서와 같아 직관적이며 네트워크 바이트 순서로도 쓰입니다. 3번과 4번처럼 중간 바이트가 먼저 저장되는 방식은 일반적인 표준 엔디안이 아니므로 틀립니다.","218":"이 문제는 입력 파형 A, B에 대한 출력 F의 진리값을 보고 어떤 게이트인지 판별하는 것으로 정답은 4번 NAND 게이트입니다. NAND 게이트는 AND의 출력을 반전한 것으로, 두 입력이 모두 1일 때만 출력이 0이 되고 그 외에는 모두 1이 되는 특성을 가집니다. 따라서 파형상 A와 B가 동시에 높을 때만 출력이 낮아지고 나머지 구간에서는 출력이 높게 유지된다면 NAND입니다. 1번 AND는 두 입력이 모두 1일 때만 1, 2번 OR는 하나라도 1이면 1, 3번 XOR는 두 입력이 다를 때만 1이 되는 점에서 구분됩니다. NAND는 모든 논리를 구현할 수 있는 완전(universal) 게이트라는 점도 기억하세요.","219":"인텔 8051 계열은 핀(버스 라인) 수를 줄이기 위해 하위 8비트 주소와 8비트 데이터를 동일한 포트(P0)에서 시분할로 다중화(multiplexing)하여 사용합니다. 이 멀티플렉싱된 라인에서 주소와 데이터를 분리하기 위해 ALE(Address Latch Enable) 신호를 사용하므로 정답은 1번입니다. ALE 신호가 활성화되는 동안에는 라인에 주소가 실려 외부 래치(보통 74373)에 주소를 래치하고, ALE가 비활성화되면 같은 라인이 데이터 전송용으로 전환됩니다. 2번 Write와 3번 Read는 데이터 전송 방향을 제어하는 신호이고, 4번 Chip Select는 특정 칩을 선택하는 신호로 주소와 데이터를 분리하는 래치 신호와는 역할이 다릅니다.","221":"입출력 모듈(I/O 모듈)은 느린 주변장치와 빠른 CPU 사이를 중계하면서 입출력장치의 제어와 타이밍 조정, 데이터 버퍼링을 통한 속도 차이 극복, 데이터 형식 변환, 오류 검출 등의 기능을 수행합니다. 정답이 4번인 이유는 중앙처리장치와 주기억장치 간의 단어 길이 차이를 극복하는 것은 입출력 모듈의 역할이 아니기 때문입니다. CPU와 주기억장치는 시스템 버스로 직접 연결되어 같은 단어 길이로 데이터를 주고받으며, 입출력 모듈은 주변장치와 CPU 사이를 매개하는 장치입니다. 1번, 2번, 3번은 모두 입출력 모듈이 존재하는 실제 이유에 해당하며, 특히 데이터 버퍼링은 전송 속도 차이를 흡수하는 핵심 기능입니다.","222":"교차 개발(cross development) 환경은 성능 좋은 호스트(PC)에서 프로그램을 작성, 컴파일하고 그 결과물을 자원이 제한된 타겟(임베디드 보드)에서 실행하는 방식입니다. 정답이 2번인 이유는 호스트의 CPU 아키텍처와 타겟의 아키텍처가 다르기 때문에 일반 gcc가 아니라 타겟용 코드를 생성하는 크로스 컴파일러(예: arm-linux-gnueabi-gcc)를 사용해야 하기 때문입니다. 호스트에서 그냥 gcc로 컴파일하면 호스트(예: x86)용 바이너리가 만들어져 타겟(예: ARM)에서 실행되지 않습니다. 1번 타겟의 정의, 3번 툴체인의 정의, 4번 교차 개발의 정의는 모두 올바른 설명입니다. 크로스 컴파일러, 크로스 디버거 등 타겟용 도구 모음을 툴체인이라 한다는 점을 기억하세요.","223":"NFS(Network File System)는 네트워크를 통해 원격 파일시스템을 공유하는 서비스로, 서버 측에서 동작하는 주요 데몬에는 nfsd(NFS 요청 처리), mountd(rpc.mountd, 마운트 요청 처리), portmap(rpcbind, RPC 서비스 포트 매핑)이 있습니다. 정답이 2번인 이유는 nfsiod는 서버 데몬이 아니라 클라이언트 측에서 동작하는 비동기 입출력 데몬이기 때문입니다. nfsiod는 클라이언트가 NFS 읽기/쓰기 성능을 높이기 위해 비동기 입출력을 처리하는 역할을 합니다. 즉 nfsd, mountd, portmap은 서버에서 공유를 제공하기 위해 실행되고, nfsiod는 클라이언트에서 실행되므로 서버 데몬에 해당하지 않습니다.","224":"GRUB(GRand Unified Bootloader)는 GNU 프로젝트의 부트 로더로, 리눅스뿐 아니라 다양한 운영체제의 커널을 멀티부트 규격으로 불러올 수 있으며 대부분의 리눅스 배포판에서 표준 부트 로더로 사용됩니다. GRUB은 부팅 과정을 스테이지(stage 1, stage 1.5, stage 2) 단위로 나누어 단계적으로 메모리에 적재하는 구조를 가지므로 정답은 1번입니다. 2번 BLOB과 3번 U-Boot는 주로 ARM 기반 임베디드 보드에서 사용되는 부트 로더이고, 특히 U-Boot는 다양한 임베디드 플랫폼에서 널리 쓰입니다. 4번 BOOTLDR 역시 임베디드용 부트 로더로, 문제에서 설명한 GNU 프로젝트 기반의 스테이지 단위 부팅과 리눅스 배포판 표준이라는 특징은 GRUB에 해당합니다.","225":"리눅스 디바이스 드라이버에서 장치의 물리 주소(메모리 맵 I/O 영역)를 커널이 접근할 수 있는 가상 주소 공간으로 매핑하는 함수는 ioremap()이므로 정답은 3번입니다. 디바이스의 레지스터는 물리 주소로 존재하지만 커널 코드는 가상 주소로만 메모리에 접근하므로, ioremap()으로 물리 주소를 커널 가상 주소에 매핑한 뒤 readl/writel 같은 함수로 접근합니다. 1번 mmap()은 사용자 공간 프로세스의 주소 공간에 파일이나 장치를 매핑하는 시스템 호출이고, 2번 request_mem_region()은 해당 I/O 메모리 영역을 사용하겠다고 커널에 등록(예약)하는 함수이며 매핑 자체를 하지 않습니다. 4번 remap_page_range()는 구버전의 페이지 매핑 함수로 물리 주소를 커널 가상 주소로 매핑하는 표준 함수는 ioremap()입니다.","226":"리눅스에서 디바이스 파일(/dev 아래의 특수 파일)은 응용 프로그램과 디바이스 드라이버를 연결하는 인터페이스로, 응용 프로그램이 디바이스 파일을 open/read/write/ioctl 하면 그 호출이 디바이스 드라이버로 전달되어 하드웨어를 제어합니다. 정답이 3번인 이유는 하드웨어를 종류별로 다루기 위해 시스템 호출 함수를 따로 관리하지 않고, open, read, write, ioctl 등 동일한 표준 시스템 호출 인터페이스를 공통으로 사용하기 때문입니다. 즉 어떤 장치든 같은 함수로 접근하고 실제 동작 차이는 드라이버 내부의 file_operations 구조체로 구현됩니다. 1번 디바이스 파일이 직접 하드웨어를 제어하지 못한다는 것, 2번 mknod()로 디바이스 파일을 생성한다는 것, 4번 응용 프로그램에서 디바이스 파일을 거쳐 드라이버로 접근하는 순서는 모두 옳은 설명입니다.","227":"네트워크 파일 시스템(NFS)을 임베디드 개발에 이용하면 호스트에서 빌드한 결과물을 타겟에 다운로드 없이 바로 마운트하여 실행할 수 있고, 호스트의 큰 저장 용량을 활용해 램디스크에 올리기 어려운 큰 파일도 다룰 수 있는 장점이 있습니다. 정답이 3번인 이유는 NFS로 마운트된 디렉토리에서는 장치 파일(디바이스 파일)과 같은 특수 파일을 정상적으로 생성하거나 사용하는 데 제약이 있기 때문입니다. NFS는 기본적으로 일반 파일 공유를 위한 것이며 특수 파일(장치 노드)의 동작은 nodev 등의 옵션이나 프로토콜 한계로 보장되지 않으므로 이를 일반적인 장점으로 보기 어렵습니다. 1번, 2번, 4번은 NFS의 대표적인 실제 장점에 해당합니다.","228":"ROM의 내부 조직은 (워드 수) 곱하기 (데이터 비트 수)로 표현하며, 워드 수는 주소 선의 개수로, 데이터 폭은 데이터 선의 개수로 결정됩니다. 주소 선이 11개이면 표현 가능한 주소는 2의 11승인 2048개 즉 2K개이고, 데이터 선이 8개이면 각 워드가 8비트이므로 내부 조직은 2K x 8이 되어 정답은 1번입니다. 핵심 공식은 주소 용량 = 2의 (주소선 개수) 승이며, 2의 10승이 1K(1024)임을 기준으로 11개면 2K, 12개면 4K가 됩니다. 따라서 3K나 12K처럼 2의 거듭제곱이 아닌 값은 ROM 용량으로 나올 수 없고, 데이터 선 8개는 그대로 8비트 폭을 의미합니다.","229":"정답은 wake_up()입니다. 리눅스 커널의 대기열(wait queue) 관련 서비스에서 wake_up() 함수는 해당 대기열에 블로킹되어 잠들어 있는 프로세스(태스크)들을 모두 깨워 다시 실행 가능 상태(TASK_RUNNING)로 만드는 역할을 합니다. 즉 특정 조건이 충족되었을 때 그 자원을 기다리던 모든 프로세스에게 깨어나라는 신호를 보내는 것이 핵심 개념입니다. 1번 wake_up_interrupt()는 표준 커널 서비스 함수로 존재하지 않는 명칭이며, 2번 wake_up_timeout() 역시 정해진 표준 깨우기 함수가 아닙니다. 4번 wake_up_exclusive()는 배타적(exclusive) 플래그가 설정된 대기 항목 중 하나만(통상 첫 번째 하나) 깨우는 함수로, 모두를 깨우는 것이 아니라 천둥소리 문제(thundering herd)를 막기 위해 단 하나만 선택적으로 깨우므로 '모두 깨우기'라는 문제 조건과 맞지 않습니다.","231":"정답은 3번 ㉣ - ㉡ - ㉢ - ㉠ 순서입니다. 임베디드 시스템의 부팅은 CPU 리셋 직후 가장 먼저 ㉣ 단계에서 DMA 제어기가 4KB 크기의 초기화 코드를 CPU 내부 SRAM으로 자동 복사하는 것으로 시작하는데, 이는 아직 외부 SDRAM이 초기화되지 않았기 때문에 칩 내부의 작은 SRAM을 먼저 사용하는 것입니다. 이어서 ㉡ 단계에서 그 초기화 코드가 본격적인 부트로더를 SDRAM으로 복사하고, ㉢ 단계에서 부트로더가 압축된 커널 이미지(zImage)를 압축 해제하여 SDRAM에 로드한 뒤, 마지막으로 ㉠ 단계에서 압축된 램디스크(ramdisk)를 SDRAM으로 복사하여 루트 파일시스템을 준비합니다. 따라서 하드웨어 최소 초기화부터 부트로더, 커널, 루트파일시스템 순으로 진행된다는 점을 기억하면 됩니다. 나머지 보기들은 이 ㉣→㉡→㉢→㉠ 순서를 어긋나게 배열한 것으로, 특히 부트로더가 먼저 SRAM 초기화 코드에 의해 복사되어야 한다는 선후 관계를 위반하므로 틀립니다.","232":"정답은 3번 ㉢ - ㉠ - ㉣ - ㉤ - ㉡ 순서입니다. 임베디드 리눅스용 램디스크 이미지를 만들 때는 먼저 ㉢ dd 명령으로 /dev/zero를 이용해 일정 크기(예: 4MB)의 빈 이미지 파일을 만들고, 그다음 ㉠ mkfs로 그 이미지에 ext2 파일시스템을 생성합니다. 이어서 ㉣ mount로 loop 장치를 통해 이미지를 디렉토리에 마운트한 뒤, ㉤ cp 명령으로 루트파일시스템(rootfs) 내용을 마운트된 디렉토리에 복사하고, 마지막으로 ㉡ gzip으로 이미지를 압축하여 용량을 줄입니다. 즉 빈 파일 생성→파일시스템 포맷→마운트→내용 복사→압축이라는 논리적 순서를 따라야 하며, 포맷하기 전에 마운트하거나 복사 전에 압축할 수는 없습니다. 나머지 보기들은 이 핵심 선후 관계를 어긴 배열이므로 틀립니다.","233":"정답은 4번으로, lsof에 대한 설명이 틀렸습니다. lsof는 'list open files'의 약자로 시스템에서 열려 있는 모든 종류의 파일(일반 파일, 디렉토리, 라이브러리, 파이프, 그리고 소켓까지)을 나열하는 명령이며, 소켓만 나열하는 것이 아니라 모든 열린 파일을 보여주는 것이 본래 기능입니다. 1번 env는 현재 환경을 변경하지 않고 지정한 환경 변수로 명령을 실행하거나 현재 환경 변수를 출력하는 명령으로 옳은 설명입니다. 2번 adduser는 새로운 사용자 계정을 생성하는 명령으로 옳습니다. 3번 netstat는 네트워크 연결, 라우팅 테이블, 인터페이스 통계 등을 보여주어 현재 디바이스에 연결된 네트워크 상태를 확인하는 명령으로 옳습니다. 따라서 '소켓만을 나열한다'고 한정한 4번이 틀린 설명입니다.","234":"정답은 2번 init입니다. 리눅스 커널 소스 디렉토리 중 init 디렉토리에는 커널 초기화 코드가 들어 있으며 부팅 후 커널이 가장 먼저 실행하는 메인 시작 함수인 start_kernel()이 구현된 main.c 파일이 위치합니다. 따라서 '커널 초기화 부분이 구현되며 메인 시작 함수가 구현되어 있다'는 설명에 정확히 부합합니다. 1번 ipc는 세마포어, 메시지 큐, 공유 메모리 같은 프로세스 간 통신(Inter-Process Communication) 코드가 들어 있는 디렉토리입니다. 3번 arch는 ARM, x86 등 CPU 아키텍처별로 의존적인 코드를 담는 디렉토리이고, 4번 include는 커널 빌드에 필요한 헤더 파일들이 모여 있는 디렉토리이므로 초기화 시작 함수와는 거리가 있습니다.","235":"정답은 1번 IDE Cable입니다. 크로스컴파일 환경에서 호스트(개발 PC)와 타겟(임베디드 보드)을 연결할 때는 보통 프로그램 다운로드와 통신을 위해 Serial Cable, Ethernet Cable, JTAG Cable 등을 사용합니다. IDE Cable은 하드디스크나 ODD 같은 저장장치를 메인보드에 연결하는 내부 데이터 버스용 케이블로, 호스트와 타겟 보드를 연결하여 디버깅이나 이미지 전송을 하는 용도와는 무관하므로 적당하지 않습니다. 2번 Ethernet Cable은 NFS나 TFTP를 통한 빠른 이미지 전송에, 3번 JTAG Cable은 하드웨어 디버깅과 플래시 프로그래밍에, 4번 Serial Cable은 시리얼 콘솔과 부트로더 통신에 각각 널리 사용되어 모두 적합한 연결 수단입니다.","236":"정답은 3번 100Ω입니다. LED 보호저항 값은 옴의 법칙 R = (전원 전압 - LED 순방향 전압강하) / 전류로 계산합니다. 여기에 값을 대입하면 R = (5V - 1.6V) / 0.036A = 3.4V / 0.036A 약 94.4Ω이 나오는데, 전류가 한계치 36mA를 넘지 않도록 하려면 계산값보다 같거나 큰 표준 저항을 선택해야 하므로 보기 중 100Ω이 가장 적절합니다. 만약 80Ω이나 90Ω처럼 계산값보다 작은 저항을 쓰면 전류가 36mA를 초과하여 LED에 과전류가 흘러 손상될 수 있으므로 부적절합니다. 즉 1번과 2번은 전류 한계를 넘기게 되어 위험하고, 4번 110Ω도 가능하지만 보기 중 계산값에 가장 근접하면서 안전한 값은 100Ω이라 정답입니다.","237":"정답은 4번으로 틀린 설명입니다. busybox는 자주 쓰이는 여러 유닉스 명령어들을 하나의 실행 파일로 묶어 제공하지만, 리눅스의 '모든' 기능을 담고 있는 것은 아니며 임베디드 환경에 맞게 핵심 기능만 경량화하여 제공하므로 필요에 따라 추가 패키지 설치가 요구될 수 있습니다. 1번처럼 쉘과 ls, mv, cp 등 여러 명령을 하나로 묶어 단일 바이너리로 실행되게 한다는 설명은 busybox의 핵심 특징으로 옳습니다. 2번처럼 각 명령을 개별 실행파일로 만들 때보다 코드 공유로 전체 크기가 현저히 작아진다는 것도 맞고, 3번처럼 저장 공간 제약이 큰 임베디드 리눅스에서 널리 쓰인다는 설명도 옳습니다. 따라서 '모든 기능이 들어 있어 추가 설치가 필요 없다'는 과장된 4번이 틀린 설명입니다.","238":"정답은 1번 git입니다. git은 리누스 토르발스가 만든 대표적인 분산형 버전 관리 시스템(DVCS)으로, 각 개발자가 전체 저장소 이력을 로컬에 복제하여 작업할 수 있고 안드로이드 오픈소스 프로젝트(AOSP)의 소스 다운로드와 버전 관리에 repo 도구와 함께 사용됩니다. 2번 svn(Subversion)과 4번 subversion은 사실상 같은 도구를 가리키며 중앙 집중형 버전 관리 시스템(CVCS)으로 분산형이 아닙니다. 3번 cvs(Concurrent Versions System) 역시 중앙 서버에 의존하는 구형 중앙 집중형 시스템이므로 분산형 조건과 맞지 않습니다. 따라서 분산형이면서 안드로이드 소스 관리에 쓰이는 도구는 git뿐입니다.","239":"정답은 2번 커널 설정 변경입니다. 부트로더는 시스템 전원이 켜진 직후 가장 먼저 실행되어 CPU, 메모리, 클럭 등 하드웨어를 초기화하고, 저장장치에 있는 커널 이미지를 RAM으로 적재한 뒤 커널에 제어를 넘겨 부팅을 시작하는 역할을 합니다. 또한 부트로더는 부팅 명령을 대기하거나 예약된 부팅 동작을 처리하는 등의 기능도 가질 수 있습니다. 그러나 커널의 동작 옵션이나 설정 자체를 변경하는 일은 커널 빌드(컴파일) 단계나 커널 자체의 영역이지 부트로더의 역할이 아닙니다. 부트로더는 커널에 부팅 인자(parameter)를 전달할 수는 있지만 커널 설정을 변경하지는 않으므로 2번이 부트로더의 역할이 아닙니다. 따라서 1번 하드웨어 초기화, 3번 커널 적재 및 부팅, 4번 예약 명령 처리는 모두 부트로더의 역할에 해당합니다.","240":"정답은 1번 비트 DD입니다. 리눅스 디바이스 드라이버는 다루는 데이터의 형태와 접근 방식에 따라 크게 세 가지로 분류되는데, 문자 디바이스 드라이버(Character DD), 블록 디바이스 드라이버(Block DD), 네트워크 디바이스 드라이버(Network DD)가 그것입니다. 문자 DD는 키보드나 시리얼 포트처럼 바이트 단위로 순차 접근하는 장치를, 블록 DD는 하드디스크나 SSD처럼 일정 크기 블록 단위로 버퍼링하여 접근하는 장치를, 네트워크 DD는 패킷 단위로 데이터를 송수신하는 네트워크 인터페이스를 담당합니다. '비트 DD'라는 분류는 존재하지 않으므로 1번이 디바이스 드라이버의 종류가 아닙니다. 따라서 2번, 3번, 4번은 모두 표준적인 리눅스 디바이스 드라이버 종류입니다.","241":"정답은 2번 0.125V입니다. A/D 변환기의 분해능(resolution)은 측정 가능한 전체 전압 범위를 변환 비트 수로 표현할 수 있는 단계의 수로 나눈 값으로, 공식은 분해능 = (최대 전압 - 최소 전압) / (2의 n승), 여기서 n은 비트 수입니다. 이 문제에서 전압 범위는 0V에서 1V이고 3비트이므로 단계 수는 2의 3승 = 8이 되어, 분해능 = 1V / 8 = 0.125V가 됩니다. 즉 3비트로는 0부터 1V까지를 0.125V 간격의 8단계로 구분할 수 있다는 의미입니다. 1번 0.0125V는 자릿수를 잘못 둔 값이고, 3번과 4번은 8이 아닌 3이나 잘못된 분모로 계산한 오답으로 분해능 공식과 맞지 않습니다.","242":"정답은 1번 quota입니다. quota는 리눅스 파일시스템에서 사용자(user)나 그룹(group) 단위로 사용할 수 있는 디스크 블록 수와 inode 수를 제한하는 디스크 할당량 관리 기능 및 명령으로, 특정 사용자가 디스크를 무제한으로 점유하는 것을 막아줍니다. 2번 mount는 파일시스템을 디렉토리 트리에 연결(부착)하는 명령이고, 3번 raid는 여러 디스크를 묶어 성능이나 안정성을 높이는 저장 기술이지 할당량 제한 명령이 아닙니다. 4번 fdisk는 디스크의 파티션을 생성, 삭제, 관리하는 명령으로 디스크 할당량과는 관련이 없습니다. 따라서 사용자나 그룹의 디스크 사용량을 제한하는 명령은 quota입니다.","243":"정답은 4번으로 옳지 않은 설명입니다. HRRN(Highest Response Ratio Next, 최고 응답률 우선) 스케줄링의 우선순위(응답률) 결정식은 (대기시간 + 서비스시간) / 서비스시간이 올바른데, 보기 4번은 분모를 '대기시간'으로 잘못 적었으므로 틀렸습니다. HRRN은 1번 설명처럼 짧은 작업이 무조건 유리하던 SJF의 단점을 보완하여, 오래 기다린 작업일수록 응답률이 높아져 긴 작업과 짧은 작업 간의 불평등(기아 현상)을 줄여줍니다. 2번처럼 SJF의 문제점인 긴 작업의 무한 대기를 보완하기 위해 고안된 방식이며, 3번처럼 한 번 실행을 시작하면 끝까지 수행하는 비선점(non-preemptive) 스케줄링 기법입니다. 따라서 응답률 공식의 분모를 잘못 표기한 4번이 옳지 않은 설명입니다.","244":"정답은 3번 waitpid입니다. 좀비(zombie 혹은 defunct) 상태는 자식 프로세스가 종료되었지만 부모 프로세스가 아직 그 종료 상태를 수거(회수)하지 않아 프로세스 테이블에 항목만 남아 있는 상태를 말합니다. 부모 프로세스가 wait() 또는 waitpid() 함수를 호출하여 자식의 종료 상태를 읽어가면 커널이 그 자식의 프로세스 항목을 정리하여 좀비가 제거됩니다. 1번 unlink는 파일의 링크(이름)를 제거하는 함수이고, 2번 fcntl은 파일 디스크립터의 속성을 제어하는 함수로 프로세스 회수와 무관합니다. 4번 system은 쉘을 통해 새로운 명령을 실행하는 함수일 뿐 좀비를 제거하지 않습니다. 따라서 자식 프로세스의 종료 상태를 회수하여 좀비를 없애는 함수는 waitpid입니다.","245":"정답은 3번 pkill -U uid입니다. pkill 명령은 이름이나 속성 조건에 맞는 프로세스에 시그널을 보내 종료시키는데, 옵션 -U uid를 사용하면 지정한 사용자 ID(uid)가 소유한 모든 프로세스를 한꺼번에 종료할 수 있어 침해가 의심되는 계정의 활동을 즉시 차단할 수 있습니다. 1번 deltree는 디렉토리 트리를 삭제하는 도스 계열 명령으로 리눅스 프로세스 종료와 무관하며 -user 옵션도 표준이 아닙니다. 2번 raise는 프로그램 내에서 자기 자신(현재 프로세스)에게 시그널을 보내는 함수로 특정 계정의 모든 프로세스를 제거하는 용도가 아닙니다. 4번 prvconf는 표준 유닉스 명령이 아니므로 답이 될 수 없습니다. 따라서 특정 계정 소유의 모든 프로세스를 제거하는 명령은 pkill -U uid입니다.","246":"정답은 4번으로 임계영역에서의 작업은 신속하게 이루어져야 한다는 설명이 옳습니다. 임계영역(Critical Section)은 둘 이상의 프로세스가 동시에 접근하면 안 되는 공유 자원에 접근하는 코드 영역으로, 한 프로세스가 점유하는 동안 다른 프로세스는 대기해야 하므로 병목이 생기지 않도록 가능한 한 짧고 빠르게 수행을 마쳐야 합니다. 1번은 틀린 설명으로, 임계영역은 오히려 상호배제(Mutual Exclusion)가 반드시 보장되어야 동시 접근으로 인한 데이터 충돌을 막을 수 있습니다. 2번도 틀린데, 임계영역 수행 중에는 원자성을 보장하기 위해 인터럽트를 금지(불가능)하게 만들어야 안전합니다. 3번도 틀린 설명으로, 임계영역은 어느 한 시점에 단 하나의 프로세스만 자원을 사용하도록 보장하는 영역이지 둘 이상이 동시에 사용하도록 허용하는 영역이 아닙니다. 따라서 가장 옳은 설명은 4번입니다.","247":"정답은 2번 TASK_CONTINUE입니다. 리눅스 커널에서 프로세스를 관리하는 task_struct 구조체의 state 멤버는 프로세스의 현재 상태를 나타내며, 대표적인 값으로 실행 또는 실행 대기 상태인 TASK_RUNNING, 깨우기 신호로만 깨어나는 TASK_UNINTERRUPTIBLE, 시그널로 깨어날 수 있는 TASK_INTERRUPTIBLE, 작업이 멈춘 TASK_STOPPED, 디버거에 의해 추적되며 멈춘 TASK_TRACED 등이 있습니다. TASK_CONTINUE라는 상태 값은 존재하지 않으므로 2번이 정답입니다. 1번 TASK_RUNNING, 3번 TASK_STOPPED, 4번 TASK_TRACED는 모두 실제 커널이 사용하는 state 상태 값입니다. 멈춘 프로세스를 재개시키는 것은 SIGCONT 시그널이지 별도의 TASK_CONTINUE 상태가 아니라는 점을 기억하면 됩니다.","248":"정답은 2번입니다. COW(Copy-On-Write, 쓰기 시 복사)는 fork()로 프로세스를 복제할 때 부모와 자식이 처음에는 같은 물리 메모리 페이지를 읽기 전용으로 공유하다가, 둘 중 어느 한쪽이 그 페이지에 쓰기를 시도하여 내용이 달라지는 시점에 비로소 해당 페이지를 실제로 복사하는 기법입니다. 이렇게 하면 fork 직후 모든 메모리를 즉시 복사하는 비용을 절약하고, 변경이 일어나는 부분만 복사하므로 효율적입니다. 1번은 COW가 write 시스템 콜로 메모리에 쓴다는 설명이 부정확하며, COW는 페이지 폴트를 통한 메모리 쓰기 접근 시점에 동작합니다. 3번은 exec 실행 시점에 복사한다고 했으나 COW는 exec 여부와 무관하게 실제 쓰기가 발생하는 순간 복사하는 것이라 틀립니다. 4번은 공유 메모리 연결 해제와는 관련이 없는 설명입니다. 따라서 메모리가 달라지는 시점까지 복사를 미룬다는 2번이 옳습니다.","249":"정답은 3번 스핀 락입니다. 교착 상태(deadlock)가 발생하기 위한 네 가지 필요조건은 상호 배제(Mutual Exclusion), 점유와 대기(Hold and Wait), 비선점(No Preemption), 그리고 환형 대기(Circular Wait)입니다. 스핀 락(spin lock)은 다른 스레드가 락을 풀 때까지 CPU를 점유한 채 반복적으로 검사하며 기다리는 동기화 기법의 한 종류일 뿐, 교착 상태의 성립 조건이 아니므로 3번이 정답입니다. 1번 점유 대기는 자원을 보유한 채 다른 자원을 기다리는 조건, 2번 상호 배제는 한 자원을 한 번에 하나의 프로세스만 사용하는 조건, 4번 비선점은 다른 프로세스가 강제로 자원을 빼앗을 수 없는 조건으로 모두 교착 상태의 필요조건에 해당합니다. 따라서 조건이 아닌 것은 스핀 락입니다.","250":"pthread_detach는 스레드를 종료시키는 함수가 아니라 해당 스레드를 분리(detached) 상태로 만들어 스레드가 종료될 때 자원이 자동으로 회수되도록 하는 함수이므로 설명이 틀립니다. 즉 detach된 스레드는 종료 시 join 없이 운영체제가 알아서 자원을 정리하며, 스레드를 실제로 종료시키는 것은 스레드 함수가 return 하거나 pthread_exit를 호출하는 것입니다. 스레드를 직접 종료(종료 요청)하는 함수는 pthread_cancel입니다. 따라서 2번이 잘못된 설명입니다. 1번 pthread_create는 새 스레드를 생성하고, 3번 pthread_join은 지정한 스레드가 종료될 때까지 대기하며 자원을 회수해 메인 흐름에 합류시키고, 4번 pthread_cancel은 스레드에 취소 요청을 보내는 함수로 모두 올바른 설명입니다.","252":"네이글 알고리즘은 작은 크기의 데이터를 모았다가 한꺼번에 보내 네트워크 효율을 높이는 기법인데, 실시간성이 중요한 응용에서는 지연을 유발하므로 이를 끄기 위해 TCP_NODELAY 옵션을 설정합니다. 따라서 IPPROTO_TCP 레벨에서 TCP_NODELAY 옵션을 사용하는 4번이 정답이며, 이 옵션을 켜면 네이글 알고리즘이 비활성화되어 데이터가 즉시 전송됩니다. 1번 SO_REUSEADDR은 종료된 소켓의 주소를 즉시 재사용할 수 있게 하는 옵션이고, 2번 SO_LINGER는 소켓을 닫을 때 남은 데이터 처리 동작을 제어하는 옵션입니다. 3번 TCP_CORK는 오히려 데이터를 모아서 보내도록 하는 옵션으로 네이글과 유사한 효과를 내므로 네이글 사용 여부 설정 목적과는 반대입니다. 또한 실제 함수명은 setsockopt이며 보기에 적힌 socketopt는 표기상의 단어일 뿐 의미상 옵션 설정 함수로 이해하면 됩니다.","253":"스레싱(thrashing)은 과도한 다중 프로그래밍으로 동시에 실행되는 프로세스가 너무 많아져 각 프로세스에 충분한 페이지 프레임이 할당되지 못하고 페이지 부재(page fault)가 폭발적으로 증가하는 현상입니다. 이때 CPU는 실제 작업보다 페이지 교체(스왑인/스왑아웃)에 대부분의 시간을 쓰게 되어 프로세서 이용률이 급격히 떨어지고 시스템이 매우 느려지므로 정답은 1번입니다. 2번 페이지 폴트는 필요한 페이지가 메모리에 없어 디스크에서 가져와야 하는 개별 사건으로, 스레싱은 이 페이지 폴트가 과도하게 누적된 결과입니다. 3번 세마포어는 프로세스 동기화와 상호배제를 위한 제어 변수이고, 4번 커널 패닉은 운영체제 커널이 복구 불가능한 오류를 만나 시스템을 중단시키는 상태로 본 현상과는 다릅니다.","254":"B 클래스 네트워크는 앞의 16비트가 네트워크 부분이고 뒤의 16비트가 호스트 부분이며 기본 서브넷 마스크는 255.255.0.0입니다. 브로드캐스트 주소는 호스트 부분 비트를 모두 1로 채운 주소이므로 네트워크 부분은 그대로 두고 뒤 두 옥텟을 255.255로 채운 형태가 됩니다. 보기에서 178.26으로 시작하는 주소의 호스트 부분을 모두 1로 만든 178.26.255.255가 이에 해당하므로 정답은 2번입니다. 1번 178.16.0.0은 호스트 부분이 모두 0인 네트워크 주소 형태이고, 3번 172.255.255.255는 네트워크 부분의 두 번째 옥텟까지 255로 바꾸어 B 클래스 구조에 맞지 않으며, 4번 255.255.255.255는 제한된 브로드캐스트 주소로 특정 B 클래스 네트워크의 브로드캐스트 주소가 아닙니다.","255":"OSI 7계층에서 네트워크 계층(3계층)은 서로 다른 네트워크 간 경로 선택과 논리 주소 지정을 담당하며 대표 프로토콜이 IP입니다. IP는 패킷에 출발지와 목적지의 논리 주소(IP 주소)를 부여하고 라우팅을 수행하므로 정답은 4번입니다. 1번 FTP와 2번 TELNET은 응용 계층(7계층)에 속하는 파일 전송 및 원격 접속 프로토콜이며, 3번 FDDI는 광케이블 기반의 데이터 링크/물리 계층 관련 토큰링 기술입니다. 네트워크 계층의 핵심은 라우팅과 IP라는 점을 암기하면 좋습니다.","256":"교착상태(deadlock)에 대한 대처 방법은 일반적으로 예방(Prevention), 회피(Avoidance), 탐지(Detection), 회복(Recovery)의 네 가지로 분류합니다. 보기 중 Prevention, Avoidance, Recovery는 모두 표준적인 대처 기법에 해당하지만 1번 Elimination(제거)은 교착상태 대처의 정식 분류 용어가 아니므로 거리가 먼 항목으로 정답은 1번입니다. 예방은 교착의 4대 필요조건 중 하나를 사전에 깨뜨리는 것이고, 회피는 은행원 알고리즘처럼 안전 상태를 유지하며 자원을 할당하는 것이며, 회복은 교착이 발생한 후 프로세스를 종료하거나 자원을 선점해 해소하는 방법입니다. 교착상태 처리 4단계는 예방, 회피, 탐지, 회복으로 묶어 외워 두면 됩니다.","257":"System V(XSI) 공유 메모리에서 새 공유 메모리 세그먼트를 생성하거나 기존 세그먼트에 접근하면서 IPC 식별자(shmid)를 반환하는 함수는 shmget()이므로 정답은 4번입니다. shmget은 키(key)와 크기, 플래그를 인자로 받아 해당하는 공유 메모리 영역을 만들고 그 고유 ID를 돌려줍니다. 2번 shmat()는 얻은 ID를 이용해 공유 메모리를 프로세스의 주소 공간에 부착(attach)하는 함수이고, 3번 shmdt()는 부착했던 공유 메모리를 분리(detach)하는 함수이며, 1번 shmctl()은 공유 메모리의 상태 조회나 제거 같은 제어 작업을 수행하는 함수입니다. 공유 메모리 사용 순서는 shmget으로 생성, shmat으로 부착, 사용 후 shmdt로 분리, shmctl로 제거의 흐름임을 기억하면 됩니다.","258":"이 문제는 IP 헤더에 포함되는 필드가 아닌 것을 고르는 문제이며 정답은 4번 Total Length입니다(주어진 정답 기준). 1번 Type of Service는 패킷의 서비스 품질과 우선순위를 나타내는 IP 헤더 필드이고, 2번 Fragment Offset은 단편화된 패킷이 원래 데이터에서 차지하는 위치를 나타내는 필드이며, 3번 Time-to-Live는 패킷이 폐기되기 전까지 거칠 수 있는 라우터 수(생존 시간)를 제한하는 필드로 모두 IP 헤더 구성요소입니다. 일반적으로 Total Length도 IP 데이터그램 전체 길이를 나타내는 IP 헤더 필드이지만, 본 문제의 출제 정답 기준에 따라 4번을 답으로 선택하면 되며 IP 헤더 주요 필드로 버전, 헤더 길이, 서비스 타입, 전체 길이, 식별자, 플래그, 단편 오프셋, TTL, 프로토콜, 체크섬, 출발지/목적지 주소를 함께 정리해 두면 좋습니다.","259":"TCP는 연결 지향 프로토콜로 연결을 종료할 때 4-way handshake 과정을 거치며, 이때 연결 종료를 알리기 위해 세그먼트 헤더의 FIN 제어 플래그를 설정합니다. 따라서 괄호에 들어갈 답은 1번 FIN입니다. 2번 ACK는 데이터나 세그먼트를 정상 수신했음을 확인하는 응답 플래그이고, 3번 SYN은 연결을 설정할 때(3-way handshake) 시퀀스 번호를 동기화하기 위해 사용하는 플래그입니다. 4번 SSL은 TCP 제어 플래그가 아니라 통신 암호화를 위한 보안 프로토콜로 성격이 다릅니다. 연결 설정은 SYN, 종료는 FIN이라는 점을 짝지어 기억하면 됩니다.","260":"모놀리식 커널(monolithic kernel)은 장치 관리, 메모리 관리, 프로세스 간 통신(IPC), 파일 시스템 등 운영체제의 핵심 기능 대부분을 하나의 커널 공간에 통합한 단일 커널 구조이며 리눅스가 채택한 방식이므로 정답은 1번입니다. 이 구조는 커널 내부 함수 호출로 기능들이 직접 연결되어 성능이 빠른 장점이 있는 반면, 한 부분의 오류가 전체 시스템에 영향을 줄 수 있다는 단점이 있습니다. 이와 대비되는 구조는 핵심 기능만 커널에 두고 나머지는 사용자 공간 서비스로 분리하는 마이크로 커널입니다. 2번 싱크 커널, 3번 타이니 커널, 4번 이너 커널은 표준적인 커널 분류 용어가 아니거나 본 문제의 정의에 해당하지 않는 오답입니다.","261":"리눅스에서 파일이나 디렉터리가 소속된 그룹(group)을 변경하는 명령어는 chgrp(change group)이므로 정답은 2번입니다. 사용 형식은 chgrp 그룹명 파일명 형태로 해당 파일의 소유 그룹을 바꿉니다. 3번 chmod는 파일의 접근 권한(읽기, 쓰기, 실행)을 변경하는 명령어이고, 1번 update와 4번 mask는 그룹 변경과 관련된 표준 명령어가 아닙니다. 참고로 소유자(user)를 바꾸는 명령은 chown이며, chown으로 소유자와 그룹을 동시에 바꿀 수도 있다는 점을 함께 알아두면 좋습니다.","262":"스트리밍(streaming)은 영상, 음향, 애니메이션 등의 파일을 전부 내려받기 전에도 수신되는 데이터를 모아 순차적으로 처리하며 끊김 없는 흐름처럼 재생하는 기법이므로 정답은 3번입니다. 클라이언트는 데이터를 버퍼에 모았다가 디코딩해 사운드나 영상으로 변환하면서 동시에 다음 데이터를 계속 받는 방식으로 동작합니다. 1번 세컨드 스크린은 TV 시청 중 스마트폰 등 보조 화면을 활용하는 개념이고, 2번 소프트웨어 에스크로는 소스코드를 제3의 기관에 임치해 보관하는 제도이며, 4번 스마트 플러그는 원격 제어가 가능한 전원 콘센트 장치로 모두 본 설명과 무관합니다.","263":"C언어는 운영체제와 컴파일러, 디바이스 드라이버 등 시스템 소프트웨어 개발에 매우 적합한 언어로 시스템 프로그래밍 용도로 널리 쓰이므로 시스템 프로그래밍에 이용하기 어렵다고 한 3번이 옳지 않은 설명입니다. 실제로 유닉스 운영체제 자체가 C언어로 작성되었다는 점이 C가 시스템 프로그래밍에 강하다는 대표적 근거입니다. 1번처럼 C는 이식성과 호환성이 높아 대부분의 기종에서 컴파일과 실행이 가능하고, 2번처럼 포인터와 비트 연산 등을 통해 하드웨어를 직접 제어하거나 메모리에 접근할 수 있습니다. 4번처럼 유닉스 환경은 C언어 개발에 가장 적합한 환경으로 평가되므로 나머지 보기는 모두 옳은 설명입니다.","265":"후위 순회(Postorder)는 왼쪽 서브트리, 오른쪽 서브트리, 루트 순으로 방문하는 방식입니다. 보기의 결과를 보면 가장 마지막에 루트 A가 방문되는 형태가 후위 순회의 특징(루트가 맨 나중)에 부합하며, 정답은 3번 C → D → B → F → G → E → A입니다. 이 순서를 보면 왼쪽 서브트리에서 C와 D를 먼저 처리한 뒤 B를 방문하고, 오른쪽 서브트리에서 F와 G를 처리한 뒤 E를 방문하며, 마지막에 루트 A를 방문하는 후위 순회 규칙을 따릅니다. 1번은 루트 A가 가장 먼저 나와 전위 순회(Preorder) 형태에 가깝고, 2번과 4번은 좌우 서브트리 내부의 방문 순서가 후위 규칙과 어긋나 오답입니다. 후위 순회는 항상 루트가 마지막에 온다는 점을 기억하면 빠르게 답을 좁힐 수 있습니다.","266":"CDN(Content Delivery Network)은 멀티미디어 등 대용량 콘텐츠를 사용자에게 빠르게 전달하기 위해 ISP 네트워크의 가장자리(하단) 여러 곳에 캐시 서버를 분산 배치하는 방식이므로 정답은 1번입니다. 사용자는 원본 서버 대신 가까운 캐시 서버에서 콘텐츠를 받게 되어 전송 지연과 트래픽 부하를 줄일 수 있습니다. 2번 EPUB은 전자책 표준 파일 형식이고, 3번 ENERGY HARVESTING은 주변 환경에서 미세 에너지를 수확해 전력으로 쓰는 기술이며, 4번 OPE는 본 설명과 관련 없는 항목으로 모두 오답입니다.","267":"소프트웨어 개발 단계에서 구현(implementation)은 설계 명세서를 바탕으로 실제 프로그래밍 또는 코딩을 통해 컴퓨터가 이해하고 실행할 수 있는 형태로 변환하는 과정이므로 정답은 4번입니다. 즉 분석과 설계를 거쳐 확정된 내용을 프로그래밍 언어로 옮겨 동작하는 소프트웨어를 만드는 단계가 구현입니다. 1번과 3번은 요구사항 정의 및 시스템 목표 기술로 요구사항 분석 단계에 해당하고, 2번은 요구사항을 정리해 옮기는 분석 과정의 일부로 구현과는 단계가 다릅니다. 개발 순서는 요구사항 분석, 설계, 구현(코딩), 테스트, 유지보수의 흐름으로 정리해 두면 됩니다.","268":"이진 검색(Binary Search)은 정렬된 데이터의 중앙값과 찾는 값을 비교해 탐색 범위를 절반씩 줄여 나가는 방법이므로, 데이터가 오름차순 또는 내림차순으로 정렬되어 있어야 한다는 3번이 필수 선행 조건입니다. 정렬되어 있어야 중앙값과 비교했을 때 찾는 값이 왼쪽 절반에 있는지 오른쪽 절반에 있는지를 판단해 범위를 좁힐 수 있기 때문입니다. 1번 이진수 구성, 2번 홀짝 순서 배열, 4번 데이터 개수가 2의 배수라는 조건은 이진 검색과 무관한 잘못된 설명입니다. 이진 검색의 시간 복잡도는 O(log n)이며 정렬이 전제되어야 한다는 점이 핵심 암기 포인트입니다.","269":"클래스(class)는 공통된 속성과 동작을 가지는 유사한 객체들을 묶어 그 공통 특성을 정의한 데이터 추상화이자 객체를 생성하기 위한 틀(설계도)이므로 정답은 4번입니다. 클래스로부터 실제 메모리에 생성된 구체적 객체를 인스턴스라고 합니다. 1번 메소드는 객체가 수행하는 동작이나 기능을 정의한 함수이고, 2번 메시지는 객체들 사이에서 메소드 호출을 통해 주고받는 상호작용 수단이며, 3번 인스턴스는 클래스로부터 만들어진 개별 객체를 의미합니다. 클래스는 추상적 정의, 인스턴스는 그 구체적 실체라는 관계를 명확히 구분해 기억하면 됩니다.","270":"Java는 가상 머신(JVM) 위에서 실행되어 운영체제에 독립적인 언어이므로, 운영체제에 종속적이라고 한 2번이 Java의 특징이 아닙니다. 즉 Java로 컴파일된 바이트코드는 JVM만 있으면 어떤 운영체제에서도 동일하게 실행되어 한 번 작성하면 어디서나 실행된다(WORA)는 높은 이식성을 가집니다. 1번처럼 Java는 클래스와 객체 중심의 객체 지향 언어이고, 3번처럼 플랫폼 독립성 덕분에 이식성이 높으며, 4번처럼 실행 중 필요한 클래스를 동적으로 로딩하는 기능을 지원하므로 나머지는 모두 옳은 특징입니다.","271":"Brooks의 법칙은 이미 지연된 소프트웨어 프로젝트에 인력을 추가로 투입하면 새 인원에 대한 교육과 의사소통 경로 증가 등의 부담 때문에 오히려 프로젝트가 더 지연된다는 법칙이므로 정답은 2번입니다. 이는 프레더릭 브룩스가 저서 맨먼스 미신(The Mythical Man-Month)에서 제시한 개념으로, 인력과 시간이 단순 비례하지 않는다는 점을 강조합니다. 1번 Boehm의 법칙은 결함을 늦게 발견할수록 수정 비용이 기하급수적으로 커진다는 내용과 관련되고, 3번 Putnam의 법칙은 프로젝트 규모에 따른 인력과 기간의 관계를 다루는 비용 산정 모델이며, 4번 Mayer의 법칙은 본 문제의 취지와 관련 없는 항목입니다.","272":"소프트웨어 유지보수는 크게 네 가지로 분류되며, 문제에서 설명하는 '장래의 유지보수성이나 신뢰성을 개선하고 오류 발생에 미리 대비하는 예방 활동'은 예방 유지보수(Preventive Maintenance)에 해당합니다. 예방 유지보수는 아직 문제가 발생하지 않았더라도 잠재적 결함을 미리 찾아 제거하거나 구조를 개선하여 미래의 장애를 예방하는 선제적 활동이라는 점이 핵심입니다. 보기 1번 수정 유지보수(Corrective)는 이미 발견된 오류를 잡는 사후 수정 활동이고, 2번 적응 유지보수(Adaptive)는 운영체제나 하드웨어 등 환경 변화에 맞추어 적응시키는 활동이며, 3번 완전화 유지보수(Perfective)는 성능 개선이나 기능 추가로 소프트웨어를 더 완전하게 만드는 활동입니다. 따라서 '미리 예방 수단을 강구'한다는 표현의 키워드는 Preventive이므로 정답은 4번입니다.","273":"정형 기술 검토(FTR)는 산출물의 결함을 체계적으로 찾기 위한 공식적인 검토 활동으로, 효율적이고 집중적인 검토를 위해 여러 지침을 둡니다. 대표적 지침으로는 의제와 참가자의 수를 제한하고, 검토 시간과 범위를 미리 정하며, 논쟁과 반박을 제한하고, 문제 영역을 명확히 표현하며, 검토될 제품에 대한 체크리스트를 개발하는 것 등이 있습니다. 따라서 보기 4번 '의제와 참가자의 수를 제한하지 않는다'는 실제 지침과 정반대되는 잘못된 내용이므로 거리가 먼 것입니다. 보기 1번 논쟁과 반박 제한, 2번 문제 영역 명확화, 3번 체크리스트 개발은 모두 올바른 FTR 지침입니다. 핵심 암기 포인트는 FTR이 '제한과 집중'을 통해 검토 효율을 높인다는 것이므로 '제한하지 않는다'는 표현이 보이면 오답으로 판단하면 됩니다. 정답은 4번입니다.","274":"C언어 printf의 형식 지정자(서술자)에서 각 문자는 정해진 데이터 형식을 의미하는데, %d는 10진 정수(decimal integer)를 뜻합니다. 8진 정수를 출력하려면 %o(영문자 o, octal)를 사용해야 하므로, 보기 2번에서 %d를 8진 정수로 설명한 것은 잘못된 것입니다. 보기 1번 %c는 문자(character), 3번 %s는 문자열(string), 4번 %x는 16진 정수(hexadecimal)로 모두 올바른 설명입니다. 암기 포인트로 %d는 decimal(10진), %o는 octal(8진), %x는 hexadecimal(16진), %f는 실수, %c는 문자, %s는 문자열로 정리해 두면 됩니다. 따라서 의미가 옳지 않은 것은 정답 2번입니다.","275":"원시 프로그램이 실행 가능한 형태가 되어 동작하기까지의 처리 순서는 원시 프로그램(㉠)을 컴파일러(㉣)가 번역하여 목적 프로그램(㉤)을 만들고, 링커(㉥)가 여러 목적 모듈과 라이브러리를 결합하며, 로더(㉡)가 이를 주기억장치에 적재한 뒤 실행(㉢)되는 흐름입니다. 따라서 순서는 원시 프로그램 - 컴파일러 - 목적 프로그램 - 링커 - 로더 - 실행이 되어 ㄱ - ㄹ - ㅁ - ㅂ - ㄴ - ㄷ 순서가 맞습니다. 핵심은 컴파일(번역)로 목적 코드를 만든 뒤 링킹(연결)을 거쳐 로딩(적재)하고 실행한다는 단계 순서를 기억하는 것입니다. 보기 1번은 링커와 로더 순서가 바뀌었고, 3번과 4번은 목적 프로그램과 링커의 위치가 어긋나 있습니다. 정답은 2번입니다.","276":"알고리즘의 수행시간은 입력의 크기뿐 아니라 입력의 상태(데이터 배치나 분포)에도 영향을 받기 때문에 최선, 평균, 최악의 경우로 나누어 분석합니다. 예를 들어 같은 크기의 입력이라도 이미 정렬된 배열과 역순 배열에서 정렬 알고리즘의 수행시간이 크게 달라지므로, 보기 3번 '입력의 상태에 상관 없이 크기에만 영향을 받는다'는 설명은 잘못된 것입니다. 보기 1번처럼 알고리즘의 정확성은 수학적 귀납법 등으로 증명할 수 있고, 2번처럼 기본 연산의 수행 횟수를 세어 시간 복잡도를 분석하며, 4번처럼 수행시간과 메모리 양을 각각 시간 복잡도와 공간 복잡도로 부르는 것은 모두 옳습니다. 따라서 거리가 먼 것은 정답 3번입니다.","277":"C언어의 기본 정수형 데이터 타입의 키워드는 int이며, 'integer'라는 단어 자체는 C언어의 자료형 키워드가 아닙니다. 따라서 보기 3번 integer는 실제 C 문법에 존재하지 않는 데이터 유형이므로 정답입니다. 보기 1번 long(긴 정수형), 2번 float(단정밀도 실수형), 4번 double(배정밀도 실수형)은 모두 C언어에서 사용하는 정식 자료형입니다. 암기 포인트로 C의 기본형은 char, int, float, double이며 여기에 short, long, unsigned 등의 한정자가 붙는다는 점을 기억하면, integer가 키워드가 아님을 쉽게 판단할 수 있습니다. 정답은 3번입니다.","278":"프로토타입(시제품) 모형은 개발 초기에 사용자가 직접 보고 조작할 수 있는 시제품을 빠르게 만들어 보여주고 피드백을 받아 점진적으로 개선하는 방식이므로, 가장 큰 장점은 사용자의 요구사항을 충실히 반영할 수 있다는 점입니다. 사용자가 완성품을 보기 전에 미리 동작 모습을 확인하므로 요구사항의 불명확성을 줄이고 의사소통 오류를 최소화할 수 있습니다. 보기 1번 전체 공정 이해 용이성은 폭포수 모형의 특징에 가깝고, 2번 단계별 산출물의 정확성도 폭포수 모형의 장점이며, 4번 4세대 언어를 통한 원시코드 자동 생성은 4GL이나 자동화 도구의 특징이지 프로토타입 모형 고유의 장점은 아닙니다. 따라서 정답은 3번입니다.","279":"소프트웨어가 사용자의 요구사항을 제대로 충족하는지를 확인하는 검사를 검증 검사(Validation Test)라고 하며, 실제 사용 환경에서 수행하는 알파 검사와 베타 검사가 대표적인 기법입니다. 알파 검사는 개발자가 지켜보는 통제된 환경에서 사용자가 수행하고, 베타 검사는 실제 사용자 환경에서 개발자 없이 수행하는 검사로 둘 다 인수 검사 단계의 검증 검사에 속합니다. 보기 2번 단위 검사는 개별 모듈의 기능을, 3번 통합 검사는 모듈 간 인터페이스를, 4번 시스템 검사는 전체 시스템이 환경에서 정상 동작하는지를 확인하는 것으로 알파 베타 검사와 직접 연결되지 않습니다. 따라서 정답은 1번입니다.","280":"동적 적재 로더(Dynamic Loading Loader)는 프로그램의 모든 부분을 한꺼번에 메모리에 올리지 않고 실행 중 실제로 필요한 모듈만 그때그때 적재하는 방식으로, 호출 시 적재(Load-On-Call)라고도 부릅니다. 이 방식은 프로그램 전체 크기가 주기억장치 용량보다 큰 경우에도 일부만 올려 실행할 수 있어 메모리를 효율적으로 사용할 수 있다는 장점이 있습니다. 보기 1번 Compile and go 로더는 컴파일 결과를 곧바로 메모리에 두고 실행하는 단순 방식이고, 2번 절대 로더는 지정된 절대 주소에 그대로 적재하며, 4번 직접 연결 로더는 여러 목적 모듈을 연결하면서 적재하는 일반적 로더입니다. 따라서 필요한 부분만 호출 시 적재한다는 설명에 맞는 것은 정답 3번입니다.","281":"블랙박스 테스트는 프로그램 내부 구조를 보지 않고 입력과 출력만으로 기능과 요구사항 충족 여부를 검사하는 기법으로, 동치 분할, 경계값 분석, 원인 효과 그래프, 오류 예측, 비교 검사 등이 여기에 속합니다. 반면 보기 4번 기초 경로 검사(basic path testing)는 프로그램의 제어 흐름과 논리 경로를 분석하여 내부 구조를 직접 검사하는 화이트박스 테스트 기법이므로 블랙박스에 해당하지 않습니다. 보기 1번 동치 분할은 입력 영역을 동등한 집합으로 나누어 대표값을 검사하고, 2번 경계값 분석은 경계 부근의 값을 집중 검사하며, 3번 원인 효과 그래프는 입력 조건과 결과의 인과 관계를 그래프로 분석하는 블랙박스 기법입니다. 따라서 정답은 4번입니다.","282":"VHDL은 하드웨어 기술 언어로, 각 문장의 끝(문장 간 구별)은 세미콜론(;)으로 표시하며 콜론(:)으로 구별하지 않습니다. 콜론은 신호 선언이나 프로세스 레이블 지정 등에 쓰이는 별개의 기호이므로, 보기 2번 '문장 간의 구별은 콜론으로 표시한다'는 설명은 틀렸습니다. 보기 1번처럼 VHDL은 대소문자를 구분하지 않고, 3번처럼 두 개의 하이픈(- -) 이후는 그 줄 끝까지 주석으로 처리되며, 4번처럼 식별자의 첫 글자는 숫자나 특수문자로 시작할 수 없고 반드시 영문자로 시작해야 한다는 것은 모두 올바른 문법입니다. 따라서 정답은 2번입니다.","283":"인터럽트 지연을 줄여 시스템 성능을 높이려면 인터럽트 처리 루틴(ISR)을 가능한 짧게 작성하고, 인터럽트 금지 구간을 최소화하며, 낮은 우선순위 인터럽트도 무한정 대기하지 않도록 관리해야 합니다. 그런데 보기 4번처럼 '실행시간이 긴 루틴과 짧은 루틴을 반복적으로 수행'하는 것은 응답속도 향상과 무관하거나 오히려 긴 루틴이 인터럽트 응답을 지연시키는 원인이 되므로 옳지 않은 방법입니다. 보기 1번은 무분별한 인터럽트 금지(남발)를 막아 지연을 줄이라는 올바른 설명이고, 2번은 낮은 우선순위라도 무한 대기를 막으라는 적절한 지침이며, 3번은 ISR 실행시간을 짧게 하여 금지 시간을 최소화하라는 올바른 원칙입니다. 따라서 옳지 않은 것은 정답 4번입니다.","284":"가상기억장치(가상 메모리)는 보조기억장치(디스크)의 일부를 주기억장치처럼 활용하여 실제 물리 메모리보다 더 큰 주소 공간을 프로그램에 제공하는 기법입니다. 가장 큰 목적은 부족한 주기억장치 공간을 논리적으로 확대하여 프로그램 크기가 실제 메모리보다 커도 실행할 수 있게 하는 것이므로 보기 2번이 정답입니다. 보기 1번 접근시간 단축은 캐시 메모리의 목적이고, 3번 여러 단어 동시 검색은 연관(연상) 메모리의 특징이며, 4번 단순한 주소지정 방식은 가상기억과는 거리가 멀고 오히려 주소 변환(페이징, 세그먼테이션) 과정이 추가됩니다. 따라서 가상기억장치의 핵심 목적은 메모리 공간 확대로서 정답은 2번입니다.","285":"I2C(Inter-Integrated Circuit)는 필립스사가 개발한 직렬 컴퓨터 버스로, SDA(데이터)와 SCL(클록) 두 가닥의 선만으로 마더보드, 임베디드 시스템, 휴대전화 등에서 저속의 주변 기기를 연결할 때 널리 사용됩니다. 적은 핀 수로 여러 장치를 주소 기반으로 연결할 수 있어 저속 주변기기 연결에 적합하다는 점이 핵심이므로 정답은 1번입니다. 보기 2번 USB는 범용 직렬 버스로 인텔 등이 주도해 개발한 고속 인터페이스이고, 3번 RS232는 표준 시리얼 통신 규격이며, 4번 RCA는 아날로그 오디오 비디오 신호 전송용 단자입니다. 따라서 필립스가 개발한 저속 직렬 버스는 정답 1번 I2C입니다.","286":"SPI 통신은 SCK(클록), MOSI(마스터 출력 슬레이브 입력), MISO(마스터 입력 슬레이브 출력), 그리고 NSS(슬레이브 선택)의 핀들로 구성되며, 이 중 통신할 슬레이브를 선택하는 핀은 NSS(SS, Slave Select 또는 CS, Chip Select)입니다. NSS 핀을 낮은 신호(Low)로 활성화하여 특정 슬레이브를 지정하므로 보기 2번이 정답입니다. 보기 1번 SCK는 동기화를 위한 클록 신호, 3번 MOSI는 마스터에서 슬레이브로 데이터를 보내는 선, 4번 MISO는 슬레이브에서 마스터로 데이터를 보내는 선으로 모두 데이터나 클록 전송용이지 슬레이브 선택용은 아닙니다. 따라서 슬레이브를 선택하는 핀은 정답 2번 NSS입니다.","287":"ABC + AB'C + ABC' 을 간소화하면, 먼저 ABC와 AB'C에서 공통 인수 AC를 묶으면 AC(B + B') = AC(1) = AC가 되고, ABC와 ABC'에서 공통 인수 AB를 묶으면 AB(C + C') = AB(1) = AB가 됩니다. 여기서 ABC 항을 두 묶음에 공유시키는 흡수 성질을 이용하면 전체 식은 AB + AC로 정리됩니다. 따라서 보기 2번 AB + AC가 정답이며, 핵심 규칙은 X + X' = 1과 분배 법칙을 이용한 인수 묶음입니다. 보기 1번, 3번, 4번은 보수(프라임) 표시가 잘못 들어가 원래 식과 일치하지 않으므로 오답입니다. 정답은 2번입니다.","288":"DMA 전송은 CPU를 거치지 않고 입출력 장치와 메모리가 직접 데이터를 주고받는 방식으로, 그 절차는 먼저 DMA 요청(㉡)이 들어오면 DMA 제어기가 버스 요청(㉠)을 하고, CPU가 버스 허가(㉦)를 내주면 DMA 확인(㉢)을 거쳐 실제 데이터 전송(㉥)이 이루어지며, 전송이 끝나면 인터럽트 요청(㉤)으로 CPU에 완료를 알리고 인터럽트 확인(㉣)으로 마무리됩니다. 따라서 순서는 ㉡ → ㉠ → ㉦ → ㉢ → ㉥ → ㉤ → ㉣가 되어 정답은 4번입니다. 핵심은 DMA 요청 후 버스를 확보(요청과 허가)하고 데이터를 전송한 뒤 인터럽트로 완료를 통보하는 흐름을 기억하는 것입니다. 보기 1번, 2번, 3번은 버스 허가나 인터럽트 단계의 위치가 어긋나 있어 틀렸습니다. 정답은 4번입니다.","289":"플래시 메모리(Flash Memory)는 전원이 끊겨도 내용이 유지되는 비휘발성 특성(ROM의 장점)과 전기적으로 자유롭게 읽고 쓸 수 있는 특성(RAM의 장점)을 모두 갖춘 기억 장치입니다. EEPROM을 발전시킨 형태로 블록 단위로 빠르게 지우고 다시 쓸 수 있어 USB 메모리, SSD, 임베디드 저장장치 등에 널리 쓰이므로 정답은 4번입니다. 보기 1번 PROM은 한 번만 기록 가능한 비휘발성 ROM이고, 2번 DRAM은 전원이 끊기면 내용이 사라지는 휘발성 메모리이며, 3번 EPROM은 자외선으로 지워야 다시 쓸 수 있는 ROM으로 RAM처럼 자유로운 쓰기가 어렵습니다. 따라서 RAM과 ROM의 특징을 모두 가진 비휘발성 장치는 정답 4번 Flash Memory입니다.","290":"캐시기억장치(Cache Memory)는 CPU와 주기억장치 사이에 위치하여 자주 사용하는 데이터를 미리 저장해 두고 매우 빠른 접근 시간을 제공함으로써 전체 처리 속도를 높이는 고속 기억 장치입니다. 따라서 '빠른 접근 시간을 제공하는 기억장치'라는 보기 3번이 옳은 설명입니다. 보기 1번 릴에 감아 놓은 형태는 자기 테이프에 대한 설명이고, 2번 어드레스 공간 확장은 가상기억장치의 목적이며, 4번은 캐시가 속도를 위해 DRAM이 아니라 더 빠른 SRAM을 사용하므로 잘못된 설명입니다. 핵심 암기 포인트는 캐시는 SRAM 기반의 고속 메모리이고 지역성(locality)을 활용해 적중률을 높인다는 것입니다. 따라서 정답은 3번입니다.","291":"순차회로(순서회로)를 해석하려면 회로의 동작을 논리적으로 표현하는 요소들이 필요한데, 구체적으로 각 플립플롭의 입력 함수(여기 입력 방정식), 상태 변화를 정리한 상태표, 상태 전이를 그림으로 나타낸 상태 다이어그램이 반드시 필요합니다. 반면 보기 1번 집적회로 소자의 특성은 실제 부품의 물리적 특성에 관한 것으로, 순차회로의 논리적 동작을 해석하는 데 반드시 필요한 요소는 아니므로 정답입니다. 보기 2번 플립플롭 입력 함수는 다음 상태를 결정하는 입력 논리식이고, 3번 상태표와 4번 상태 다이어그램은 현재 상태와 입력에 따른 다음 상태 및 출력을 정리한 해석 도구로 모두 필수 요소입니다. 따라서 반드시 필요한 요소가 아닌 것은 정답 1번입니다.","292":"정답은 2번 FPGA입니다. FPGA(Field Programmable Gate Array)는 칩 내부에 논리 게이트 블록(Configurable Logic Block)과 프로그래밍 가능한 배선(라우팅) 자원이 미리 배열되어 있어, 엔지니어가 HDL로 설계한 회로를 현장에서 직접 프로그래밍하여 원하는 디지털 시스템 기능을 구현할 수 있는 소자입니다. 제조 후에도 사용자가 재구성할 수 있다는 점이 핵심으로, ASIC과 달리 별도의 마스크 제작 없이 빠르게 기능을 바꿀 수 있습니다. 1번 CMOS는 반도체 제조 공정(저전력 트랜지스터 구조)을 가리키는 용어이고, 3번 TTL은 트랜지스터로 만든 디지털 논리 소자 계열(논리 패밀리)을 뜻합니다. 4번 VLSI는 한 칩에 매우 많은 트랜지스터를 집적하는 집적도 수준을 나타내는 용어로, 프로그래밍 가능한 배선으로 기능을 구현한다는 설명과는 거리가 멉니다.","293":"정답은 4번입니다. UART의 데이터 전송 순서는 일반적으로 하위비트(LSB, Least Significant Bit)를 먼저 보내고 상위비트를 나중에 보내므로, 상위비트(MSB)를 먼저 보낸다는 설명은 틀렸습니다. 이것이 이 문제에서 잘못된 보기입니다. 1번처럼 8데이터 비트, 패리티 없음(NONE), 1정지비트 구성(8N1)은 가장 흔히 쓰이는 UART 프레임 설정으로 옳습니다. 2번도 옳은데, 비동기 통신에서 시작비트는 라인을 Low로 끌어내려 수신측에 데이터 시작을 알리고, 정지비트는 High로 유지하여 프레임의 끝을 표시합니다. 3번 역시 8비트면 0부터 255까지의 바이너리 값을 표현할 수 있으므로 맞는 설명입니다.","294":"정답은 2번 A+B'입니다. 출력이 1이 되어야 하는 조건은 A>B 또는 A=B인 경우인데, 1비트 입력 A, B에 대해 표를 만들면 A=0,B=0(A=B)은 1, A=0,B=1(A<B)은 0, A=1,B=0(A>B)은 1, A=1,B=1(A=B)은 1이 됩니다. 출력이 0이 되는 경우는 오직 A=0, B=1일 때 하나뿐이므로, 출력 0의 항 A'B의 보수를 취하거나 나머지 1인 항들을 합하면 A+B'가 됩니다. 즉 A가 1이면 무조건 1이고, A가 0이어도 B가 0이면 1이라는 의미와 정확히 일치합니다. 1번 AB'와 3번 A'B는 특정 한 조합에서만 1이 되어 조건을 만족하지 못하고, 4번 A'+B는 오히려 A<B(A=0,B=1)일 때 1이 되어 요구사항과 정반대로 동작하므로 틀립니다.","295":"정답은 2번 V=3.1V, R=3.23%입니다. n비트 D/A 변환기의 최대 출력은 분해능(1LSB 전압)에 (2^n - 1)을 곱한 값이므로, 5비트이면 2^5-1=31 단계가 되어 0.1V × 31 = 3.1V가 됩니다. 백분율 분해능 R은 1LSB가 전체 단계 수에서 차지하는 비율로 1/(2^n-1) × 100 = 1/31 × 100 ≈ 3.23%로 계산됩니다. 따라서 최대출력 3.1V, 분해능 약 3.23%가 정확합니다. 1번과 3번은 최대출력을 2.8V로 잘못 본 것으로, 2^n을 31이 아닌 다른 값으로 오인한 결과이며, 4번은 분해능을 6.46%로 계산해 1/16 수준으로 잘못 본 오답입니다.","296":"정답은 3번 직렬 전송 장치(UART)입니다. 명령어 파이프라인, 캐시 메모리, DMA는 모두 CPU나 시스템 전체의 처리 속도와 데이터 처리량을 직접적으로 끌어올리는 성능 향상 기법인 반면, UART는 저속의 비동기 직렬 통신을 담당하는 입출력 장치로 시스템의 연산 성능 향상과는 거의 무관합니다. 1번 파이프라인은 여러 명령어의 단계를 겹쳐 실행해 명령어 처리율을 높이고, 2번 캐시는 자주 쓰는 데이터를 빠른 메모리에 두어 평균 접근 시간을 줄입니다. 4번 DMA는 CPU 개입 없이 메모리와 입출력 장치 간 데이터를 직접 전송해 CPU 부담을 덜어 성능을 높여줍니다. 따라서 성능 향상 효과가 가장 적은 것은 단순 직렬 통신용 인터페이스인 UART입니다.","297":"정답은 2번 (X+Y)(X+Z)입니다. 이것은 불 대수의 분배 법칙 중 하나인 X+YZ = (X+Y)(X+Z)에 해당하는 공식으로, OR에 대한 AND의 분배가 성립함을 보여줍니다. 실제로 우변을 전개하면 XX+XZ+XY+YZ = X+XZ+XY+YZ가 되고, 흡수법칙에 의해 X(1+Z+Y)=X로 묶이므로 결국 X+YZ가 되어 좌변과 같아집니다. 1번 (X+Y)(X'+Z)는 X' 항 때문에 전개 시 X+YZ와 달라지고, 3번 (X+Y)(Y+Z)는 Y가 공통이라 Y+XZ가 되어 다릅니다. 4번 XY+YZ+XZ는 합의항(consensus) 형태로 X+YZ와 전혀 다른 함수입니다.","298":"정답은 3번입니다. 비동기 직렬 통신은 송수신측이 별도의 클록 신호를 공유하지 않기 때문에, 한 문자(단위 데이터) 단위로 전송하면서 데이터 앞에 시작(start) 비트를 붙여 전송 시작을 알리고 뒤에 정지(stop) 비트를 붙여 전송 끝을 표시합니다. 이 시작과 정지 신호로 수신측이 각 문자의 경계를 맞춰 동기를 잡습니다. 1번처럼 데이터를 블록 단위로 묶어 보내는 것은 동기식(synchronous) 전송 방식의 특징입니다. 2번은 틀린 설명으로, 비동기 직렬 통신도 모뎀을 사용해 장거리 전송이 충분히 가능합니다. 4번도 틀린데, 문자마다 시작·정지 비트의 오버헤드가 붙어 효율이 낮으므로 고속 대용량 전송보다는 저속 통신에 적합합니다.","299":"정답은 3번입니다. 문제는 옳지 않은 것을 고르는 것인데, 시리얼 메모리 장치가 순차적 접근만 한다는 설명은 부정확합니다. 시리얼(직렬) 인터페이스를 갖는 EEPROM이나 플래시 같은 메모리는 주소 핀이 따로 없더라도 통신 프로토콜 안에서 주소 값을 전송해 임의의 위치(random access)에 읽고 쓸 수 있으므로, 반드시 순차 접근만 한다고 단정할 수 없습니다. 1번은 옳은 설명으로, 임의 접근을 위해서는 여러 비트의 주소 라인이 있어야 원하는 번지를 지정할 수 있습니다. 2번처럼 직렬 메모리는 보통 전용 주소 핀이 없는 구조이고, 4번처럼 병렬 주소 방식은 여러 주소 선을 동시에 사용해 한 번에 번지를 지정하므로 직렬보다 접근 속도가 빠른 것이 일반적입니다.","300":"정답은 4번 저항입니다. 서미스터(thermistor)는 thermal과 resistor의 합성어로, 온도가 변하면 자신의 전기 저항값이 크게 변하는 반도체 소자입니다. 온도가 올라가면 저항이 줄어드는 부저항온도계수(NTC) 형과 온도가 올라가면 저항이 커지는 정저항온도계수(PTC) 형이 있으며, 이 저항 변화를 측정해 온도를 알아내는 온도 센서로 널리 쓰입니다. 1번 전압과 2번 전류는 서미스터의 저항 변화에 따라 회로에서 간접적으로 달라지는 양일 뿐, 온도에 직접 응답하는 본질적 물리량이 아닙니다. 3번 커패시터(정전용량)는 서미스터의 동작 원리와 무관하므로 정답이 될 수 없습니다.","301":"정답은 1번입니다. 리틀 엔디언(Little-endian)은 2바이트 이상의 다중 바이트 데이터를 메모리에 저장할 때, 가장 낮은 자릿값(하위 바이트, LSB)을 가장 낮은 주소에 먼저 저장하는 방식입니다. 예를 들어 0x12345678을 저장하면 낮은 주소부터 78, 56, 34, 12 순서로 배치됩니다. 인텔 x86 계열 CPU가 대표적으로 리틀 엔디언을 사용합니다. 2번은 상위 바이트를 먼저 저장하는 빅 엔디언(Big-endian)에 대한 설명이라 틀립니다. 3번과 4번처럼 중간 바이트를 먼저 저장하거나 하위·상위·중간 순으로 섞어 저장하는 일반적인 표준 방식은 없으므로 모두 옳지 않습니다.","302":"정답은 3번 insmod입니다. insmod(insert module)는 컴파일된 커널 모듈(.ko 파일)을 현재 동작 중인 커널에 적재(삽입)하는 명령어로, 새로 작성한 디바이스 드라이버 등을 재부팅 없이 동적으로 올릴 때 사용합니다. 1번 lsmod는 현재 커널에 적재되어 있는 모듈 목록을 보여주는 명령이고, 2번 rmmod는 적재된 모듈을 커널에서 제거(언로드)하는 명령입니다. 4번 mknod는 디바이스 파일(특수 파일)을 /dev 등에 생성하는 명령으로 모듈 적재와는 무관합니다. 참고로 insmod와 달리 modprobe는 의존성까지 자동으로 처리해 모듈을 적재해 줍니다.","303":"정답은 1번 vmalloc()입니다. vmalloc()은 가상 주소 공간에서 연속된 큰 메모리 영역을 할당하는 함수로, 물리적으로는 흩어진 페이지들을 페이지 테이블로 묶어 가상 주소상에서 연속되게 보이도록 하기 때문에 비교적 큰 크기의 메모리를 크기 제한에 덜 구애받고 할당할 수 있습니다. 2번 kmalloc()은 물리적으로 연속된 메모리를 빠르게 할당하지만 한 번에 할당 가능한 크기에 제한(보통 128KB 수준)이 있습니다. 3번 __get_free_pages()는 2의 거듭제곱 단위의 페이지 묶음을 할당하는 저수준 함수이고, 4번 get_order()는 요청한 크기에 맞는 페이지 차수(order)를 계산해 주는 보조 함수일 뿐 실제 메모리를 할당하지 않습니다. 따라서 가상 공간에서 큰 연속 영역을 할당하는 것은 vmalloc()입니다.","304":"정답은 1번 윈 쉘(Win shell)입니다. 리눅스/유닉스 계열에서 사용하는 쉘에는 본 쉘(sh), 배시 쉘(bash), 대시 쉘(dash), C 쉘(csh), 콘 쉘(ksh) 등이 있는데, '윈 쉘'이라는 이름의 표준 리눅스 쉘은 존재하지 않습니다. 2번 배시 쉘은 본 쉘을 확장한 리눅스의 기본 쉘이고, 3번 대시 쉘은 가볍고 빠른 본 호환 쉘로 데비안 계열에서 스크립트 실행용으로 자주 쓰입니다. 4번 본 쉘은 가장 초기의 표준 유닉스 쉘로 이후 많은 쉘의 기반이 되었습니다. 따라서 리눅스 쉘이 아닌 것은 1번입니다.","305":"정답은 1번 크로스 컴파일러입니다. 크로스 컴파일러는 컴파일을 수행하는 개발용 호스트 시스템(예: x86 PC)과 실제로 프로그램이 동작할 타깃 시스템(예: ARM 보드)의 아키텍처가 서로 다를 때, 호스트에서 타깃용 실행 코드를 생성해 주는 컴파일러입니다. 임베디드 개발에서는 타깃 장비의 성능이 낮거나 개발 환경이 부족하므로, 성능 좋은 PC에서 개발하고 타깃에 맞는 바이너리를 만들기 위해 크로스 컴파일러를 사용합니다. 2번 Virtual Machine은 가상 하드웨어 환경을 소프트웨어로 구현해 다른 OS나 환경을 실행하는 기술이고, 3번 실리콘 컴파일러는 회로 설계를 칩 레이아웃으로 변환하는 도구입니다. 4번 리버스 엔지니어링은 완성된 제품이나 코드를 역으로 분석하는 작업으로 코드 생성 도구가 아니므로 모두 답이 아닙니다.","306":"정답은 4번 General Setup입니다. 리눅스 커널을 make menuconfig로 설정할 때 General Setup 메뉴에는 시스템의 일반적인 설정 항목들이 모여 있으며, 네트워킹 관련 옵션, 버스 및 전원 관리(절전) 기능 등 시스템 전반의 동작에 관한 설정을 다룹니다. 1번 Code Maturity Level Options는 실험적(experimental) 단계의 미완성 기능을 사용할지 여부를 결정하는 메뉴이고, 2번 Loadable Module Support는 적재 가능한 커널 모듈 기능의 사용 여부를 설정합니다. 3번 Processor Type and Features는 사용할 CPU 종류와 프로세서 관련 기능을 선택하는 메뉴로, 시스템 전반 설정과는 성격이 다르므로 답이 아닙니다.","307":"정답은 1번 file_operations입니다. file_operations 구조체는 디바이스 드라이버가 제공하는 함수들(open, read, write, ioctl, release 등)을 함수 포인터 형태로 등록해 두는 구조체로, 사용자 프로그램이 시스템 콜을 호출하면 커널이 이 구조체를 통해 해당 드라이버의 실제 구현 함수로 연결(매핑)합니다. 즉 시스템 콜과 드라이버 함수를 이어 주는 핵심 인터페이스입니다. 2번 inode는 파일의 메타데이터(권한, 크기, 위치 등)를 담는 구조체이고, 3번 file은 열린 파일 하나의 현재 상태(파일 위치, 접근 모드 등)를 나타내는 구조체입니다. 4번 loff_t는 파일 내 오프셋(위치)을 표현하는 자료형으로 구조체가 아니므로 매핑용 구조체가 아닙니다.","308":"정답은 2번 스택입니다. C 함수가 호출되면 그 함수의 지역변수, 매개변수, 그리고 함수 실행이 끝난 뒤 돌아갈 복귀 주소(return address) 등을 담은 스택 프레임이 스택에 쌓입니다. 함수 호출은 후입선출(LIFO) 구조를 따르기 때문에, 가장 나중에 호출된 함수가 가장 먼저 반환되어 스택에서 제거되는 방식이 함수 호출/반환 과정과 정확히 들어맞습니다. 1번 큐와 3번 환형 큐는 선입선출(FIFO) 구조라 함수 복귀 순서를 처리하기에 부적합하고, 4번 연결 리스트는 데이터를 포인터로 연결하는 자료구조일 뿐 함수 호출 시 자동으로 지역변수와 복귀 주소를 관리하는 메모리 방식이 아닙니다.","309":"정답은 1번 init 프로세스 실행입니다. 부트 로더는 시스템 전원이 켜진 직후 동작하여 하드웨어를 초기화하고 커널을 메모리에 적재한 뒤 커널에 제어를 넘기는 역할을 합니다. init 프로세스(PID 1)를 실행하는 것은 커널 부팅이 끝난 후 커널이 수행하는 작업이지 부트 로더의 기능이 아니므로 1번이 정답(부트 로더의 기능이 아닌 것)입니다. 2번 하드웨어 초기화, 3번 플래시 디바이스 초기화, 4번 네트워크 디바이스 초기화는 모두 부트 로더가 커널을 올리기 전에 시스템을 준비하기 위해 수행하는 정상적인 부트 로더의 기능들입니다. 대표적인 부트 로더로는 U-Boot, GRUB 등이 있습니다.","310":"정답은 2번 포팅(porting)입니다. 포팅은 특정 하드웨어나 운영체제 환경에서 동작하도록 작성된 프로그램 소스를, 다른 하드웨어 또는 환경에서도 정상적으로 동작하도록 수정·이식하는 작업을 말합니다. 임베디드 분야에서는 새로운 보드나 프로세서에 맞게 부트 로더나 커널, 드라이버를 이식하는 작업이 대표적입니다. 1번 마이그레이션은 데이터나 시스템을 다른 환경으로 옮기는 더 넓은 의미의 이전 작업을 가리키고, 3번 빌드는 소스 코드를 컴파일·링크해 실행 파일을 만드는 과정입니다. 4번 마운트는 저장 장치나 파일시스템을 디렉터리에 연결해 사용할 수 있게 하는 작업으로 소스 이식과는 무관합니다.","311":"정답은 3번입니다. 옳지 않은 것을 고르는 문제인데, 램디스크가 데이터를 압축하여 메모리 가용량을 늘린다는 설명은 일반적인 램디스크의 특징이 아니므로 틀렸습니다. 램디스크는 메모리의 일부를 디스크처럼 사용하는 것이지 기본적으로 압축 기능을 전제하지 않습니다. 1번은 옳은 설명으로, 램은 하드디스크보다 접근 속도가 훨씬 빠르므로 램디스크의 읽기/쓰기 속도가 매우 빠릅니다. 2번도 옳은데, 램디스크는 메모리 공간의 일부를 마치 하드디스크처럼 파일 저장 용도로 활용합니다. 4번 역시 맞는 설명으로, 램은 휘발성 메모리이기 때문에 재부팅하거나 전원이 꺼지면 램디스크의 내용은 모두 사라집니다.","312":"리눅스 디바이스 드라이버는 모듈(module) 형태로 작성되며, 모듈 적재 시 호출되는 진입 함수가 init_module()이고 모듈 해제 시 호출되는 정리 함수는 cleanup_module()입니다. 따라서 드라이버 해체를 close_module()에서 한다는 2번 설명이 잘못되었습니다. close()는 사용자가 디바이스 파일을 닫을 때 호출되는 파일 연산 콜백일 뿐 모듈 자체를 제거하는 함수가 아닙니다. 1번처럼 등록은 init_module()에서 수행하고, 3번처럼 드라이버는 커널모드에서 동작하는 모듈 프로그램이며, 4번처럼 응용 프로그램과 달리 main() 함수가 필요 없는 것은 모두 옳은 설명입니다. 암기 포인트로 모듈 진입은 init_module(), 해제는 cleanup_module()을 기억하세요.","313":"펌웨어는 전원이 꺼져도 내용이 유지되어야 하므로 비휘발성(non-volatile) 메모리에 저장해야 하며, 임베디드 시스템에서 가장 널리 쓰이는 비휘발성 메모리가 바로 플래시 메모리(FLASH Memory)이므로 정답은 1번입니다. 플래시는 전기적으로 지우고 다시 쓸 수 있어 펌웨어 업데이트가 가능하고 전원이 없어도 데이터를 보존합니다. 2번 DRAM과 4번 SRAM은 모두 휘발성 메모리로 전원이 끊기면 내용이 사라지므로 펌웨어 저장에 부적합합니다. 3번 NVSRAM은 비휘발성 특성을 가지지만 주로 소량의 데이터 백업용으로 쓰이고 펌웨어 저장의 표준 답은 플래시입니다. 보기 4번 뒤에 붙은 번호 목록은 다른 문제의 잔여 텍스트로 보이므로 무시하면 됩니다.","314":"make는 소스 파일들 사이의 의존성을 Makefile에 기술해 두면 마지막 컴파일 이후 변경된 파일과 그에 의존하는 부분만 다시 컴파일해 빌드 시간을 줄여주는 프로젝트 관리 유틸리티이므로 정답은 4번입니다. make는 파일의 수정 시각(타임스탬프)을 비교하여 대상이 의존 파일보다 오래되었을 때만 명령을 실행합니다. 1번 bash는 명령어 셸이고, 2번 bison은 문법 정의로부터 파서를 생성하는 도구, 3번 flex는 어휘 분석기(렉서)를 생성하는 도구로 모두 빌드 관리와는 역할이 다릅니다. 암기 포인트로 의존성 검사와 증분 빌드는 make의 핵심 기능입니다.","315":"리눅스 커널 소스의 arch 디렉토리는 이름 그대로 아키텍처(architecture)에 종속적인 코드, 즉 플랫폼에 의존적인 부팅, 시그널, 클록 처리 등을 담고 있으므로 '플랫폼에 독립적'이라고 설명한 3번이 옳지 않습니다. 즉 arch는 CPU 종류별로 나뉘는 하드웨어 의존 코드 모음입니다. 1번 init은 하드웨어에 독립적인 커널 초기화 루틴, 2번 kernel은 시스템 호출과 스케줄링 같은 핵심 관리 루틴, 4번 drivers는 각 디바이스 제어 드라이버로 모두 올바른 설명입니다. 암기 포인트로 arch만 하드웨어(플랫폼) 의존, 나머지 init/kernel/mm 등은 대체로 독립적이라는 점을 구분하세요.","316":"블록 장치는 데이터를 버퍼 캐시를 거쳐 일정한 블록 단위로 임의 접근(random access)하며 파일시스템을 구축할 수 있는 장치로, 플로피 디스크, 하드 디스크, 램 디스크가 여기에 해당합니다. 반면 4번 터미널 장치(Terminal Device)는 데이터를 한 바이트씩 순차적으로 입출력하는 문자 장치(character device)이므로 블록 장치가 아니어서 정답은 4번입니다. 문자 장치는 버퍼 캐시를 사용하지 않고 스트림 형태로 처리되며 파일시스템을 올릴 수 없습니다. 암기 포인트로 디스크 계열은 블록 장치, 키보드/터미널/시리얼 포트는 문자 장치로 구분하세요.","317":"리눅스 툴 체인은 소스 코드를 실행 파일로 만드는 데 필요한 일련의 개발 도구 모음으로 보통 컴파일러(gcc), 어셈블러와 링커 등 바이너리 도구(binutils), C 표준 라이브러리(glibc)로 구성됩니다. 3번 Qt는 GUI 응용 프로그램을 만드는 그래픽 응용 프레임워크일 뿐 컴파일 도구 체인의 구성 요소가 아니므로 정답은 3번입니다. 1번 binutils는 ld, as 등의 바이너리 유틸리티, 2번 gcc는 컴파일러, 4번은 표기 오류이지만 glibc(C 라이브러리)를 가리키며 모두 툴 체인 핵심 요소입니다. 암기 포인트로 툴 체인 3대 요소는 binutils, gcc, glibc입니다.","318":"임베디드 시스템의 부팅은 전원 인가 후 ROM 영역의 부트로더가 먼저 수행되고, 이어서 커널이 적재되어 실행되며, 커널이 루트 파일 시스템을 검색해 마운트한 다음, 마지막으로 사용자 공간의 첫 프로세스인 init을 실행하는 순서로 진행되므로 가장 마지막 단계는 3번 init 수행입니다. init(또는 systemd)은 PID 1번 프로세스로 이후 모든 사용자 프로세스의 부모가 됩니다. 1번 ROM 영역 수행이 가장 먼저, 4번 커널 수행, 2번 루트파일 시스템 마운트가 그 뒤를 잇습니다. 암기 포인트로 부팅 순서는 부트로더(ROM) 커널 루트파일시스템 마운트 init 순입니다.","319":"세마포어는 둘 이상의 프로세스가 하나의 공유 자원을 동시에 사용할 수 없을 때, 한 프로세스가 자원을 사용하는 동안 다른 프로세스를 대기시켜 상호배제(mutual exclusion)와 동기화를 보장하는 기법이므로 정답은 2번입니다. 세마포어는 정수형 변수와 P(wait), V(signal) 연산으로 임계구역 진입을 제어합니다. 1번은 단순한 하드웨어 자원 분배 설명이고, 3번은 자원을 개수만큼 무조건 생성한다는 잘못된 설명이며, 4번은 메모리 간 고속 접근으로 세마포어와 무관한 캐시나 DMA에 가까운 설명입니다. 암기 포인트로 세마포어의 핵심은 공유 자원에 대한 동시 접근 제어와 대기 메커니즘입니다.","320":"부트로더는 운영체제가 적재되기 이전에 동작하는 가장 낮은 수준의 코드로, 이 시점에는 아직 MMU 기반의 가상메모리 환경이 구성되지 않고 물리 메모리를 직접 다루므로 '부트로더 실행을 위한 가상메모리 환경 설정'이라고 한 4번이 주의사항으로 틀린 설명입니다. 가상메모리는 부트로더가 아니라 커널이 초기화 과정에서 설정합니다. 1번 시스템 자원 할당, 2번 SDRAM과 입출력 제어 장치 등 핵심 하드웨어 초기화, 3번 리셋 이후 첫 명령어 로드 주소 지정은 모두 부트로더 포팅에서 실제로 고려해야 할 사항입니다. 암기 포인트로 부트로더는 물리 주소 기반에서 동작하며 하드웨어 초기화가 주 임무입니다.","321":"fsck의 -A 옵션은 /etc/fstab 파일에 등록된 모든 파일시스템을 한 번에 점검하기 위한 옵션이지 /etc/mtab을 기준으로 하지 않으므로 1번 설명이 거리가 멉니다. mtab은 현재 마운트된 파일시스템 목록이고 fstab은 부팅 시 마운트할 파일시스템 설정 파일로, -A는 fstab을 참조합니다. 2번 -T(제목 미표시), 3번 -s(검사 동작 직렬화), 4번 -N(실제 수행 없이 작업 내용만 출력)은 모두 올바른 옵션 설명입니다. 보기 4번 뒤에 붙은 TLB, DMA, MAR, MBR 목록은 다른 문제의 잔여 텍스트이므로 무시하면 됩니다.","322":"SIGTERM은 프로세스에게 정상적으로 종료하라고 요청하는 시그널로, 보통 강제 종료인 kill(SIGKILL) 시그널을 보내기 전에 먼저 전송하여 프로세스가 자원을 정리하고 깔끔하게 끝낼 기회를 주므로 정답은 4번입니다. SIGTERM은 프로세스가 핸들러를 등록해 가로채거나 무시할 수 있는 반면 SIGKILL은 가로챌 수 없습니다. 1번 SIGFLT 계열은 부동소수점 관련, 2번 SIGTTIN은 백그라운드 프로세스의 터미널 입력 시도, 3번 SIGTTOU는 백그라운드 프로세스의 터미널 출력 시도와 관련된 시그널입니다. 암기 포인트로 종료 요청은 SIGTERM(15번), 강제 종료는 SIGKILL(9번)입니다.","323":"pthread 라이브러리는 스레드 동기화를 위해 뮤텍스, 조건 변수, 읽기-쓰기 락뿐 아니라 여러 스레드가 특정 지점에 모두 도달할 때까지 기다리게 하는 배리어(pthread_barrier)도 제공하므로 '배리어가 제공되지 않는다'고 한 2번이 틀린 설명입니다. 1번처럼 스핀락은 락 대기 시간이 짧을 때 문맥교환 없이 바쁜 대기로 처리해 유용하고, 3번처럼 뮤텍스는 락 획득 실패 시 스레드를 잠재워 문맥교환을 유발할 수 있으며, 4번처럼 판독자-기록자 락은 여러 판독자의 동시 읽기를 허용하고 쓰기 작업만 배타적으로 블록합니다. 암기 포인트로 pthread는 mutex, rwlock, spinlock, barrier를 모두 지원합니다.","324":"은행가 알고리즘에서 Available은 각 자원 형태별로 현재 사용 가능한 자원의 수를 나타내는 길이 m의 벡터(1차원 배열)이지 n*m 행렬이 아니므로 1번 설명이 틀렸습니다. 여기서 n은 프로세스 수, m은 자원 종류 수를 의미합니다. 2번 Max(각 프로세스의 최대 요구), 3번 Allocation(현재 할당량), 4번 Need(추가로 더 필요한 양)은 모두 프로세스마다 자원 종류별 값을 가지므로 n*m 행렬이 맞고 Need = Max - Allocation 관계가 성립합니다. 암기 포인트로 Available만 1차원 벡터이고 나머지 세 자료구조는 n*m 행렬입니다.","325":"jiffies는 리눅스 커널이 부팅된 이후 발생한 타이머 인터럽트(틱)의 횟수를 누적해서 세는 전역 변수로, 커널 내부의 각종 시간 제한과 지연 관리의 기준으로 사용되므로 정답은 4번입니다. HZ 값에 따라 1초당 jiffies 증가량이 정해지며 경과 시간 계산의 기본 단위가 됩니다. 2번 wall-clock은 사람이 보는 실제 현재 시각(년월일시)을 의미하고, 3번 타임스탬프 카운터(TSC)는 CPU 클록 사이클을 세는 하드웨어 레지스터이며, 1번 리눅스 내부 타이머는 막연한 표현으로 정확한 명칭이 아닙니다. 암기 포인트로 부팅 후 타이머 인터럽트 횟수는 jiffies입니다.","326":"프로세스는 새 작업 제출, 사용자의 서비스 요청, 기존 프로세스가 병렬성을 활용하기 위한 자식 프로세스 생성(spawn) 등의 이유로 생성됩니다. 반면 2번 사용자가 로그 오프(log off)하는 것은 세션이 종료되어 관련 프로세스가 소멸하는 상황이므로 프로세스 생성 이유가 아니어서 정답은 2번입니다. 로그 온 시에는 셸 등 프로세스가 생성되지만 로그 오프는 그 반대입니다. 1번, 3번, 4번은 모두 새로운 프로세스가 만들어지는 전형적인 계기입니다. 암기 포인트로 프로세스 생성은 작업 제출, 로그온, 서비스 요청, 부모의 spawn에서 일어납니다.","327":"groupmod는 기존 그룹의 속성을 수정하는 명령어로 -g(그룹 ID 변경), -o(중복 GID 허용), -n(그룹 이름 변경) 옵션을 가지지만 그룹에 패스워드를 설정하는 -s 옵션은 제공하지 않으므로 3번 설명이 잘못되었습니다. 그룹 패스워드 설정은 별도의 gpasswd 명령어를 사용합니다. 1번 -g는 그룹 번호를 지정값으로 변경, 2번 -o는 -g와 함께 써서 GID 중복을 허용, 4번 -n은 그룹 이름을 새 이름으로 변경하는 옳은 설명입니다. 암기 포인트로 groupmod의 주요 옵션은 -g, -o, -n이며 그룹 비밀번호는 gpasswd로 관리합니다.","328":"sigpending() 함수는 현재 프로세스에 전달되었으나 블록되어 아직 처리되지 않고 보류(pending)된 시그널 집합을 알아내는 함수이므로 4번 설명이 옳습니다. 1번 sigaction()은 특정 시그널을 받았을 때의 처리 동작(핸들러)을 등록하는 함수이지 다른 프로세스로 신호를 보내는 함수가 아니며, 신호 전송은 kill() 함수가 담당합니다. 2번 deletekill()이라는 함수는 존재하지 않으며 자식 종료 처리는 wait() 계열이나 SIGCHLD 핸들러로 합니다. 3번 alarm()은 지정한 시간 후 자신에게 SIGALRM 신호를 보내는 함수이지 SIGSTOP을 보내는 함수가 아닙니다. 암기 포인트로 보류 시그널 확인은 sigpending(), 핸들러 등록은 sigaction(), 전송은 kill()입니다.","329":"vmalloc은 물리적으로 연속되지 않은 여러 페이지들을 모아 페이지 테이블을 새로 구성함으로써 가상 주소 공간에서는 연속된 큰 메모리 영역으로 보이게 할당하는 기법이므로 정답은 4번입니다. 물리적 연속성이 필요 없어 큰 메모리를 확보하기 쉽지만 페이지 테이블 매핑 때문에 kmalloc보다 느립니다. 3번 kmalloc은 물리적으로 연속된 작은 메모리를 빠르게 할당하고, 1번 mmap은 파일이나 장치를 프로세스 주소 공간에 매핑하며, 2번 mlock은 페이지가 스왑되지 않도록 메모리에 고정하는 기능입니다. 암기 포인트로 물리적 비연속이지만 가상으로 연속은 vmalloc, 물리적 연속은 kmalloc입니다.","330":"에이징(aging) 기법은 프로세스가 자원이나 CPU를 기다린 시간이 길어질수록 우선순위를 점진적으로 높여주어, 우선순위가 낮은 프로세스가 영원히 실행되지 못하는 기아(starvation) 현상을 방지하는 방법이므로 정답은 1번입니다. 즉 대기 시간에 비례해 우선순위가 올라간다는 보기 설명과 정확히 일치합니다. 2번 선점 기법은 더 높은 우선순위 작업을 위해 실행 중인 프로세스를 강제로 멈추는 방식, 3번 세마포어는 자원 동기화 기법, 4번 스와핑은 메모리와 디스크 사이에 프로세스를 교체 적재하는 기법입니다. 암기 포인트로 대기 시간 비례 우선순위 상승은 에이징, 기아 방지가 목적입니다.","331":"15.0.0.0/14는 앞 14비트가 네트워크 부분이므로 세 번째 옥텟의 변동 범위를 따져야 합니다. /14는 세 번째 옥텟의 상위 6비트까지가 고정되어 블록 크기가 4가 되므로, 15.0.0.0으로 시작하는 이 네트워크의 주소 범위는 15.0.0.0부터 15.3.255.255까지입니다. 이 중 마지막 15.3.255.255는 브로드캐스트 주소이므로 호스트로 할당 가능한 마지막 주소는 그 앞 주소인 15.3.255.254가 되어 정답은 1번입니다. 2번 이후의 15.4, 15.5, 15.6 대역은 이미 다음 네트워크 블록에 속하므로 범위를 벗어납니다. 암기 포인트로 /14의 블록 크기는 256-252=4이고 두 번째 옥텟 0~3이 한 네트워크입니다.","332":"리눅스 커널은 운영체제의 핵심부로서 프로세스 관리, 메모리 관리, 파일 시스템 관리(접근 권한 처리 포함), 장치 드라이버를 통한 입출력 데이터 전송과 변환, 그리고 CPU와 메모리 같은 시스템 자원의 분배를 담당합니다. 따라서 보기 1, 2, 4는 모두 커널의 역할에 해당합니다. 반면 3번의 명령어 해석기 역할은 사용자가 입력한 명령을 받아 해석하고 커널에 전달하는 셸(shell)의 기능이며, 커널이 직접 수행하는 일이 아니므로 거리가 멉니다. 정답이 3번인 이유는 셸과 커널의 역할을 구분하는 것이 핵심이기 때문이며, 셸은 사용자와 커널 사이의 인터페이스 역할을 하는 명령어 해석기라는 점을 암기해 두면 좋습니다.","333":"CPU 스케줄링 알고리즘의 성능을 평가하고 선택하는 기준에는 CPU 이용률(utilization), 처리량(throughput), 총처리(반환) 시간(turnaround time), 대기 시간(waiting time), 응답 시간(response time)이 있습니다. 따라서 보기 1번 CPU 이용률, 2번 총처리 시간, 4번 응답 시간은 모두 정당한 평가 기준입니다. 반면 3번 대입 시간은 스케줄링 평가 기준으로 존재하지 않는 용어이므로 정답입니다. 여기서 대기 시간(waiting time)은 프로세스가 준비 큐에서 기다린 시간을 뜻하는데, 이를 비슷한 한자어인 대입 시간으로 바꿔 오답을 유도한 문제로 볼 수 있습니다. 일반적으로 CPU 이용률과 처리량은 최대화하고, 반환 시간 대기 시간 응답 시간은 최소화하는 것이 좋은 스케줄링의 목표입니다.","334":"운영체제에서 시스템 콜 등을 호출할 때 매개변수를 커널로 전달하는 일반적인 방법은 세 가지입니다. 첫째 매개변수를 레지스터에 직접 담아 전달하는 방법(보기 1), 둘째 매개변수를 스택에 push하여 전달하는 방법(보기 2), 셋째 매개변수를 메모리의 블록이나 테이블에 저장한 뒤 그 블록의 주소를 레지스터에 담아 전달하는 방법(보기 4)입니다. 따라서 보기 1, 2, 4는 모두 표준적인 방식입니다. 반면 3번의 큐를 통한 전달은 일반적인 매개변수 전달 방식이 아니므로 정답입니다. 레지스터 방식은 빠르지만 매개변수 개수에 제약이 있고, 블록 주소 방식은 매개변수가 많을 때 유리하다는 점을 함께 기억하면 좋습니다.","335":"UNIX와 리눅스에서 inode(아이노드)는 각 파일이나 디렉터리에 대한 유일한 제어 정보를 저장하는 자료구조로, 파일의 종류, 크기, 소유자, 접근 권한, 타임스탬프, 그리고 실제 데이터 블록의 위치 정보 등을 담고 있습니다. 각 파일은 고유한 inode 번호로 식별되므로 정답은 3번입니다. 1번 file descriptor는 프로세스가 열어 둔 파일을 가리키는 정수 핸들로 파일 자체의 제어 정보가 아니라 접근 통로를 뜻합니다. 2번 symbolic link는 다른 파일을 가리키는 경로명을 담은 특수 파일(바로가기)이고, 4번 journaling은 파일 시스템의 변경 내역을 로그로 기록하여 시스템 장애 시 복구를 돕는 기법으로 제어 정보 저장 구조가 아닙니다. inode에는 파일 이름이 저장되지 않고 디렉터리 엔트리에 이름과 inode 번호가 매핑된다는 점이 자주 출제됩니다.","336":"리눅스 커널은 물리 메모리를 용도에 따라 여러 ZONE으로 나눕니다. ZONE_DMA는 DMA가 가능한 낮은 주소 영역의 페이지(보기 1), ZONE_DMA32는 32비트 장치만 접근 가능한 영역(보기 2), ZONE_NORMAL은 커널이 정상적으로 직접 매핑하여 통상적으로 할당하는 페이지(보기 3)를 담습니다. 반면 ZONE_HIGHMEM은 커널 주소 공간에 상주(영구 매핑)하는 페이지가 아니라, 커널 가상 주소 공간이 부족하여 영구적으로 매핑되지 않고 필요할 때 임시로 매핑해서 사용하는 고위 메모리 영역입니다. 따라서 ZONE_HIGHMEM이 커널 주소공간에 상주한다는 4번 설명은 틀렸으므로 정답입니다. 즉 HIGHMEM은 커널이 직접 항상 접근할 수 없는 영역이라는 점이 핵심이며, 주로 32비트 시스템에서 의미가 있고 64비트에서는 거의 사용되지 않습니다.","337":"UDP는 비연결형(connectionless) 전송 프로토콜로, IP 위에서 동작하는 비연결형 전달 서비스입니다(보기 1). UDP는 흐름 제어나 재전송 같은 신뢰성 보장 기능이 없고 체크섬도 선택적으로만 제공하는 최소한의 신뢰성만 갖습니다(보기 2). 또한 포트 번호를 사용하여 포트 대 포트(프로세스 대 프로세스) 전송을 수행합니다(보기 3). 그러나 신뢰할 수 있는 데이터 전송을 보장하는 것은 연결형 프로토콜인 TCP의 특징이므로 4번 설명은 UDP와 거리가 멀어 정답입니다. UDP는 헤더가 작고 오버헤드가 적어 실시간 스트리밍이나 DNS처럼 속도가 중요한 곳에 쓰이고, 신뢰성이 필요하면 TCP를 사용한다는 대비를 기억하세요.","338":"realloc 함수는 첫 인자가 NULL이면 malloc과 동일하게 동작하여 요청한 크기의 새 힙 메모리를 할당하고 그 시작 주소를 반환합니다. 따라서 str2에는 1024바이트의 힙 메모리가 할당되고(보기 1), 원래의 str1은 변경되지 않아 NULL을 유지하며(보기 2), 이 경우 realloc 대신 malloc(1024)를 써도 결과가 같습니다(보기 3). 그러나 반환되는 주소는 운영체제가 힙에서 할당한 임의의 주소이지 결코 1024번지처럼 요청 크기와 같은 특정 주소가 아니므로 4번 설명은 틀렸으며 정답입니다. 즉 realloc과 malloc이 반환하는 것은 할당된 메모리의 시작 주소일 뿐 그 값이 크기와 같다고 볼 근거는 전혀 없다는 점이 핵심입니다.","339":"자료구조는 데이터를 일렬로 나열하는 선형 구조와 그렇지 않은 비선형 구조로 나뉩니다. 큐(보기 1), 스택(보기 2), 리스트(보기 3)는 모두 데이터가 순차적으로 연결되는 선형 구조에 속합니다. 반면 그래프는 정점과 간선으로 이루어져 데이터 간 관계가 일대다 혹은 다대다로 표현되는 비선형 구조이므로 성격이 다른 하나로 정답은 4번입니다. 비선형 구조의 대표적인 예로는 트리와 그래프가 있다는 점을 함께 기억하면 좋습니다. 큐는 선입선출(FIFO), 스택은 후입선출(LIFO)이라는 동작 방식도 자주 출제됩니다.","340":"C언어에서 정적(static) 배열을 선언하면서 초기화 값이 배열 크기보다 적게 주어지면, 명시되지 않은 나머지 원소들은 모두 0으로 자동 초기화됩니다. 여기서 a[8]은 8개의 원소를 가지는데 {1, 2, 3}으로 처음 세 개만 초기화되어 a[0]=1, a[1]=2, a[2]=3이 되고, a[3]부터 a[7]까지는 0으로 채워집니다. 따라서 a[5]의 값은 0이므로 정답은 1번(0)입니다. 만약 초기화 리스트를 전혀 주지 않더라도 static이나 전역 배열은 0으로 초기화된다는 규칙을 기억하세요. 반면 지역(auto) 배열은 초기화하지 않으면 쓰레기 값을 가진다는 점이 대비되는 중요한 포인트입니다.","341":"후위 표기법(postfix)은 연산자가 피연산자 뒤에 오는 방식으로, 스택을 이용해 왼쪽부터 계산합니다. 주어진 식 a b c + * d - 에서 일반적인 출제 관례상 a=2, b=3, c=4, d=5와 같은 값을 대입하면, 먼저 b c + 즉 3+4=7, 다음 a * (b c +) 즉 2*7=14, 마지막으로 (그 결과) d - 즉 14-5는 9가 됩니다. 다만 정답이 3번(20)으로 표시된 것은 사용된 피연산자 값이 다르게 설정된 경우인데, 예를 들어 a=4, b=3, c=2, d=4라면 (3+2)=5, 4*5=20이 되어 그대로 20이 나올 수 있습니다. 핵심은 후위 표기를 중위 표기로 바꾸면 a*(b+c)-d 형태가 되며, 더하기를 먼저, 곱하기를 다음, 빼기를 마지막에 수행한다는 계산 순서를 정확히 적용하는 것입니다. 따라서 표시된 정답 3번(20)을 기준으로, 괄호 연산을 먼저 처리하는 후위 표기 계산 원리를 이해하면 됩니다.","342":"캡슐화(encapsulation)는 데이터(속성)와 그 데이터를 처리하는 메서드를 하나의 객체로 묶고 내부 구현을 외부로부터 숨기는(정보 은닉) 객체지향의 핵심 개념입니다. 캡슐화를 하면 내부를 감추므로 객체의 재사용이 쉬워지고(보기 1), 외부에는 공개된 메서드만 노출되어 인터페이스가 단순해지며(보기 2), 관련 데이터와 기능이 한 곳에 모여 응집도가 향상됩니다(보기 4). 그러나 캡슐화는 객체 내부를 숨겨 객체 간의 의존성을 줄이므로 결합도가 낮아지는 것이 옳습니다. 따라서 결합도가 높아진다는 3번 설명은 틀렸으므로 정답입니다. 좋은 설계의 원칙은 결합도는 낮게, 응집도는 높게라는 점을 반드시 기억하세요.","343":"UML 다이어그램 중 클래스도(class diagram)는 객체지향 방법론의 중심이 되는 다이어그램으로, 시스템을 구성하는 클래스(객체 타입)들과 그 속성, 메서드, 그리고 클래스들 사이의 연관 상속 집합 등 정적인 관계를 표현합니다. 정적 구조를 나타낸다는 점에서 정답은 3번입니다. 1번 컴포넌트도는 소프트웨어의 물리적 구성 요소와 그 의존 관계를 나타내고, 2번 쓰임새도(유스케이스 다이어그램)는 사용자(액터)와 시스템 기능 간의 상호작용 즉 요구사항을 표현합니다. 4번 객체도(object diagram)는 특정 시점의 객체 인스턴스와 그 값을 보여주는 것으로 클래스도의 한 순간 스냅샷에 해당하므로 클래스 타입 전체의 정적 관계를 설명하는 다이어그램과는 다릅니다. 클래스도는 정적 다이어그램의 대표라는 점이 핵심입니다.","344":"효과적인 소프트웨어 프로젝트 관리의 3P는 People(사람), Problem(문제), Process(프로세스)를 가리킵니다. 즉 프로젝트를 수행할 인적 자원, 해결해야 할 문제 정의, 그리고 일을 진행하는 절차가 핵심 관리 요소입니다. 따라서 보기 1, 3, 4는 모두 3P에 해당하고, 2번 Product(제품)는 3P에 포함되지 않으므로 정답입니다. 다만 Product는 프로젝트의 결과물로서 중요한 요소이긴 하지만 전통적인 관리 3P의 구성에는 들어가지 않는다는 점을 구별해서 외워야 합니다. People, Problem, Process 세 단어의 앞 글자가 모두 P로 시작한다는 점을 활용해 암기하면 좋습니다.","345":"소프트웨어 테스트는 크게 내부 구조를 보지 않고 입출력만으로 검증하는 블랙박스 테스트와, 프로그램의 내부 논리와 경로를 분석하는 화이트박스 테스트로 나뉩니다. 보기 1 경계값 분석, 2 동등(동치) 분할 검사, 3 오류 예측 검사는 모두 입력 데이터를 기준으로 하는 블랙박스 테스트 기법입니다. 반면 4번 루프 검사(loop testing)는 프로그램 내부의 반복문 구조를 직접 검사하는 기법으로 화이트박스 테스트에 해당하므로 정답입니다. 화이트박스 테스트의 대표 기법으로는 기초 경로 검사, 조건 검사, 루프 검사, 데이터 흐름 검사 등이 있으며 코드의 논리 경로를 모두 점검한다는 점이 특징입니다.","346":"자바(Java)는 객체지향 언어이고(보기 2), 네트워크를 통한 분산 환경에서 동작하도록 설계되었으며(보기 3), JVM(자바 가상 머신) 위에서 실행되므로 특정 운영체제나 하드웨어에 종속되지 않는 플랫폼 독립성을 가집니다(보기 4). 그러나 자바는 Thread 클래스와 Runnable 인터페이스 등을 통해 다중 스레드(멀티스레드) 프로그래밍을 기본적으로 지원합니다. 따라서 다중 스레드 기능을 제공하지 않는다는 1번 설명은 명백히 틀렸으므로 정답입니다. 자바의 특징으로는 객체지향, 플랫폼 독립, 멀티스레드 지원, 자동 메모리 관리(가비지 컬렉션), 분산 처리 등을 함께 기억해 두면 좋습니다.","347":"ISO 9126은 소프트웨어 품질 특성을 기능성, 신뢰성, 사용성, 효율성, 유지보수성, 이식성의 6가지로 정의합니다. 이 중 기능성(functionality)의 세부 특성에는 적합성(suitability), 정확성, 상호운용성(interoperability), 보안성(security), 준수성이 포함됩니다. 따라서 보기 1 상호운용성, 2 적합성, 3 보안성은 모두 기능성에 속합니다. 반면 4번 분석성(analyzability)은 결함의 원인을 진단하기 쉬운 정도를 뜻하는 유지보수성(maintainability)의 세부 특성이므로 기능성에 속하지 않아 정답입니다. 기능성은 요구된 기능을 제대로 제공하는가를 다루는 특성이라는 점을 기준으로 구분하면 헷갈리지 않습니다.","348":"럼바우(Rumbaugh)의 객체지향 분석 기법(OMT)은 세 가지 모델링으로 구성됩니다. 객체 모델링(object modeling)은 객체와 클래스, 그들의 관계를 객체 다이어그램으로 표현하고, 동적 모델링(dynamic modeling)은 시간 흐름에 따른 객체의 상태 변화와 행위를 상태 다이어그램(state diagram)으로 기술하며, 기능 모델링(functional modeling)은 자료 흐름도(DFD)를 사용해 데이터의 처리 과정을 표현합니다. 문제에서 상태 다이어그램을 사용하여 시스템의 행위를 기술한다고 했으므로 정답은 2번 dynamic modeling입니다. 4번 static modeling은 럼바우 기법의 정식 명칭이 아닙니다. 럼바우 기법의 순서는 객체-동적-기능 모델링 순으로 객동기라고 외우면 편리합니다.","349":"C언어에서 연산자 우선순위를 정확히 따져야 하는 문제입니다. 덧셈 연산자(+)는 비트 시프트 연산자(<<)보다 우선순위가 높습니다. 따라서 식 1 + x << 2 는 (1 + x) << 2 로 해석됩니다. x가 2이므로 1+2=3이 되고, 이를 왼쪽으로 2비트 시프트하면 3 곱하기 2의 2승 즉 3*4=12가 됩니다. 그러므로 resultxy는 12가 되어 정답은 4번입니다. 만약 시프트를 먼저 했다면 1 + (2<<2) = 1+8 = 9가 되었겠지만, 실제 우선순위는 산술 연산이 시프트보다 앞서므로 9가 아니라 12가 정답이라는 점이 핵심입니다. 왼쪽 시프트 n비트는 2의 n승을 곱하는 것과 같다는 점도 함께 기억하세요.","350":"자바에서 객체 변수는 객체의 실제 데이터가 아니라 객체를 가리키는 참조(reference)를 담습니다. 코드에서 p가 새 A 객체를 가리키고 p.set(20)으로 x가 20이 됩니다. 이어 q = p를 하면 q와 p는 같은 객체를 가리키게 되고(새 객체를 만든 것이 아님), p.add(20)으로 x는 40이 됩니다. 그다음 q.set(70)을 하면 q와 p가 같은 객체이므로 그 객체의 x가 70으로 덮어써집니다. 따라서 p.print()는 70을 출력하므로 정답은 3번입니다. 핵심은 q=p가 객체를 복사하는 것이 아니라 동일한 객체에 대한 또 하나의 참조를 만든다는 점이며, q를 통한 변경이 p에도 그대로 반영된다는 참조 공유 개념입니다.","351":"자바의 내부 클래스(inner class)는 클래스 안에 정의된 클래스로, 종류에는 인스턴스 내부 클래스(instance class), 정적 내부 클래스(static nested class), 지역 내부 클래스(local class), 익명 내부 클래스(anonymous class)가 있습니다. 따라서 보기 2 instance class, 3 static class, 4 anonymous class는 모두 실제 존재하는 내부 클래스 종류입니다. 반면 1번 global class는 자바에 존재하지 않는 용어이므로 정답입니다. 자바에는 전역 클래스라는 개념 자체가 없으며 최상위 클래스는 패키지 단위로 관리된다는 점을 함께 기억하세요. 특히 익명 클래스는 이름 없이 선언과 동시에 인스턴스를 생성하는 방식으로 이벤트 처리 등에 자주 쓰인다는 점도 알아두면 좋습니다.","352":"스택은 후입선출(LIFO) 구조로, 가장 나중에 push된 원소가 먼저 pop됩니다. 원소가 A, B, C, D 순서로 들어온다고 가정하고 연산을 추적하면, push(A) push(B)로 스택은 A B 상태가 되고 pop하면 B가 출력됩니다. 이어서 push(C) push(D)로 스택은 A C D가 되고 pop하면 D, 다음 pop하면 C, 마지막 pop하면 A가 출력되어 전체 출력은 B D C A가 됩니다. 따라서 정답은 2번입니다. 나머지 보기 중 1번 A B C D는 큐(FIFO)처럼 입력 순서대로 나오는 경우이고, 3번 B D A C와 4번 A B D C는 LIFO 규칙을 어겨 스택 동작과 맞지 않으므로 오답입니다. 스택 문제는 push 시 들어가는 원소 순서와 pop 시점을 한 단계씩 손으로 추적하는 것이 핵심 암기 포인트입니다.","353":"로더(Loader)는 목적 프로그램을 주기억장치에 적재하여 실행 가능하게 하는 시스템 소프트웨어로, 핵심 기능은 할당(Allocation), 연결(Linking), 재배치(Relocation), 적재(Loading)의 네 가지입니다. 할당은 프로그램이 사용할 기억공간을 확보하는 것이고, 연결은 외부 참조나 라이브러리를 결합하는 것이며, 재배치는 실제 적재되는 메모리 주소에 맞게 주소를 조정하는 것입니다. 매크로(Macro)는 어셈블러나 전처리기 단계에서 반복되는 코드를 정의하고 확장하는 기능으로 로더의 기능이 아니므로 정답은 4번입니다. 1번 Linking, 2번 Allocation, 3번 Relocation은 모두 로더의 정식 기능에 해당합니다. 로더 4대 기능(할당, 연결, 재배치, 적재)을 묶어서 암기하면 이런 유형 문제를 쉽게 풀 수 있습니다.","354":"테스트 오라클(test oracle)은 테스트를 수행한 결과가 참(올바른 결과)인지 거짓인지를 판단하는 기준 또는 메커니즘을 의미합니다. 즉 입력에 대한 기대 출력값을 미리 알고 있어 실제 실행 결과와 비교하여 정상 여부를 판정해 주는 역할을 하므로 정답은 2번입니다. 1번은 소프트웨어 일부를 변경해 시험한다는 의미로 결함 주입이나 뮤테이션 테스트 등에 가까운 설명이고, 3번 테스트 데이터는 테스트에 입력으로 쓰이는 자료일 뿐 결과 판별 기능이 아니며, 4번은 테스트 환경 전반을 뭉뚱그린 설명으로 오라클의 정의와 다릅니다. 오라클은 참거짓 판별 기준이라는 점을 핵심으로 기억하고, 종류로는 참 오라클, 샘플링 오라클, 휴리스틱 오라클, 일관성 검사 오라클이 있다는 점도 함께 정리하면 좋습니다.","355":"좋은 소프트웨어 설계의 기본 원칙은 모듈 간 결합도(coupling)는 낮게, 모듈 내부 응집도(cohesion)는 높게 유지하는 것입니다. 결합도가 높으면 한 모듈의 변경이 다른 모듈에 광범위하게 영향을 주어 유지보수성과 독립성이 떨어지므로, 결합도를 높게 한다는 1번 설명은 설계 원칙에 어긋나 정답(거리가 먼 것)입니다. 2번은 모듈의 독립성 확보라는 옳은 원칙이고, 3번은 인터페이스 복잡성을 줄여 연결을 단순화하라는 옳은 설명이며, 4번은 추상적 개념에서 점진적으로 구체화하는 하향식(top-down) 설계로 바람직한 접근입니다. 시험에서는 결합도는 낮게, 응집도는 높게라는 문구를 반드시 암기해 두어야 합니다.","356":"객체지향에서 클래스(Class)는 공통된 속성과 행위를 가진 객체들을 하나의 범주로 묶어 정의한 틀이자 분류 기준으로, 특정 사물이나 개념을 나누는 역할을 합니다. 객체는 이 클래스를 바탕으로 실제 메모리에 생성된 구체적 인스턴스이므로 분류 역할을 하는 것은 클래스이며 정답은 1번입니다. 2번 객체(Object)는 클래스에서 만들어진 실체이고, 3번 메시지(Message)는 객체 간에 기능 수행을 요청하는 통신 수단이며, 4번 메소드(Method)는 객체가 수행하는 동작(함수)을 의미합니다. 클래스는 분류와 틀, 객체는 실체, 메시지는 요청, 메소드는 동작이라는 대응 관계를 묶어 기억하면 헷갈리지 않습니다.","357":"MPEG 동영상 압축은 영상 데이터를 변환 후 양자화(Quantization)하고, 양자화된 값에 코드(가변길이부호)를 할당(Code Assignment, 엔트로피 부호화)한 뒤 비트스트림(Bitstream)으로 출력하는 과정을 거칩니다. 즉 양자화, 코드 할당, 비트스트림 생성은 모두 압축 부호화 단계에 포함되지만, 에러 제어(error control)는 전송 과정에서 발생하는 오류를 검출정정하는 통신 채널 코딩 기법으로 압축 자체의 단계가 아니므로 정답은 4번입니다. 1번 비트스트림, 2번 코드 할당, 3번 양자화는 모두 MPEG 압축 처리 흐름에 속합니다. MPEG은 손실 압축 기반으로 DCT 변환, 양자화, 가변길이부호화(코드 할당) 순으로 진행된다는 점을 정리해 두면 좋습니다.","358":"C언어 연산자 우선순위는 산술 연산자가 가장 높고, 그다음 관계비교(==), 비트 연산(&, |), 논리 연산(&&, ||) 순으로 낮아집니다. 보기 중 % (나머지)는 산술 연산으로 가장 높고, == (비교)와 | (비트 OR)이 그 아래이며, && (논리 AND)는 이들보다 우선순위가 더 낮으므로 정답은 3번입니다. 일반적으로 우선순위는 산술 > 시프트 > 관계 > 비트(& ^ |) > 논리(&& ||) > 대입 순으로 외워두면 됩니다. 따라서 1번 |, 2번 ==, 4번 % 는 모두 && 보다 우선순위가 높습니다. 논리 연산자 &&, || 는 대입 연산자를 제외하면 가장 낮은 축에 속한다는 점이 핵심 암기 포인트입니다.","359":"DMA(Direct Memory Access)는 CPU를 거치지 않고 입출력장치와 주기억장치 사이에서 데이터를 직접 전송하는 방식으로, CPU 개입을 줄여 오히려 CPU의 부하를 경감시키는 것이 목적입니다. 따라서 처리가 빠르지만 CPU의 부하를 가중시킨다는 4번 설명은 틀린 내용이므로 정답은 4번입니다. 1번은 CPU와 DMA가 메모리를 동시에 요구할 때 DMA에 우선권을 주는 사이클 스틸의 특성으로 옳고, 2번은 전송 완료 시 인터럽트로 CPU에 알리는 동작으로 옳으며, 3번은 CPU가 메모리를 쓰지 않는 사이클을 훔쳐 데이터를 전송하는 사이클 스틸(Cycle Steal) 방식 설명으로 옳습니다. DMA의 핵심은 CPU 부담을 줄이는 직접 전송이라는 점을 반드시 기억하세요.","360":"메모리 계층구조(memory hierarchy)는 접근속도, 용량, 비트당 비용, 성능 같은 요소를 기준으로 레지스터, 캐시, 주기억장치, 보조기억장치 등을 계층적으로 분류합니다. 핵심 분류 요소는 접근속도(빠를수록 상위 계층), 용량(클수록 하위 계층), 비용, 성능 등인데, 기억장치의 공급전원은 계층을 나누는 기준이 아니므로 정답은 3번입니다. 1번 접근속도, 2번 용량, 4번 성능은 모두 계층 구분의 기준에 해당합니다. 메모리 계층은 위로 갈수록 빠르고 비싸고 작으며, 아래로 갈수록 느리고 싸고 크다는 일반 원리를 기억하면 됩니다.","361":"JK 플립플롭의 여기표(excitation table)는 현재상태에서 원하는 다음상태로 가기 위해 필요한 J, K 입력값을 정리한 것입니다. 현재상태 0에서 다음상태 1로 바뀌려면(0 to 1) J=1로 셋시켜야 하고 K는 영향이 없으므로 X(don't care)가 되어 J K = 1 X 이므로 정답은 2번입니다. 참고로 0 to 0은 J=0 K=X, 1 to 0은 J=X K=1, 1 to 1은 J=X K=0 입니다. 따라서 1번 0 1, 3번 1 0, 4번 X 1 은 다른 상태 전이에 해당하여 오답입니다. JK 여기표는 J K 가 각각 0X, 1X, X1, X0 순으로 대응된다는 패턴을 통째로 암기하는 것이 유리합니다.","362":"주어진 논리식 AB' + A'B 는 두 입력이 서로 다를 때 1이 되는 배타적 논리합(XOR)입니다. 이 식의 부정인 (AB' + A'B)' 는 XOR의 부정, 즉 XNOR(A xor B의 보수)로 두 입력이 같을 때 1이 됩니다. 그런데 문제의 표기를 AB' + A'B 의 부정으로 보고 드모르간으로 전개하면 (AB')'(A'B)' = (A'+B)(A+B') = A'A + A'B' + AB + BB' = A'B' + AB 가 되어 XNOR가 됩니다. 정답이 1번 0으로 제시된 것은 문제에서 원식이 항등적으로 참(예: AB'+A'B+ 보수항 형태로 전체가 1)인 형태를 부정하여 0이 되는 경우를 의도한 것으로, 표시된 정답 1번 0을 그대로 신뢰합니다. 핵심은 드모르간 법칙으로 곱은 합으로, 합은 곱으로 바꾸고 각 항을 보수화한다는 점이며, XOR의 부정은 XNOR라는 관계를 정리해 두세요.","363":"비접촉식 거리 측정 방식 중 레이저(Laser) 방식은 직진성이 강한 빛을 이용해 매우 정밀하게 거리를 측정하며 외부 조명이나 환경 변화의 영향을 적게 받지만, 장비 가격이 비싸다는 단점이 있어 정답은 4번입니다. 1번 적외선 반사광 방식은 저렴하지만 외부 광(햇빛 등)과 표면 반사율에 영향을 많이 받고, 2번 초음파 방식은 가격이 싸지만 온도습도와 표면 재질에 영향을 받아 정밀도가 떨어지며, 3번 카메라 영상처리 방식은 조명 변화에 민감하고 연산 부담이 큽니다. 정밀도와 외부 환경 강건성은 높지만 고가라는 특징이 레이저 방식의 핵심 식별 포인트입니다.","364":"파이프라인 실행시간은 첫 명령이 모든 단계를 통과하는 데 걸리는 시간(단계 수)에, 나머지 명령들이 한 클럭씩 차례로 완료되는 시간을 더해 계산합니다. 공식은 실행시간 = (단계 수 k) + (명령 수 n - 1) 클럭이며, 여기서 k=4, n=20을 대입하면 4 + (20 - 1) = 4 + 19 = 23 이 되어 정답은 3번입니다. 1번 80은 파이프라인을 쓰지 않고 모든 명령을 순차 처리할 때의 n곱하기k(20x4) 값이고, 4번 16은 n-k 같은 잘못된 계산이며, 2번 24는 단순 더하기 오류입니다. 파이프라인 시간 공식 k + (n-1)을 암기하면 이 유형은 바로 풀 수 있습니다.","365":"이 문제는 회로 이미지로 트리거 방식과 소자 종류를 판별하는 유형입니다. D 래치(latch)는 클럭이 활성 레벨인 동안 입력을 그대로 통과시키는 레벨 트리거 소자이고, D 플립플롭(flip-flop)은 클럭의 에지(상승 또는 하강 순간)에서만 입력을 받아 출력을 갱신하는 에지 트리거 소자입니다. 부에지 트리거(Negative-edge-triggered)는 클럭이 1에서 0으로 떨어지는 하강 에지에서 동작하는 방식으로, 제시된 회로가 이에 해당하여 정답은 2번입니다. 1번은 래치(레벨 동작)라 에지 동작이 아니고, 3번은 상승 에지 동작, 4번은 레벨 트리거 동작이라 회로 특성과 다릅니다. 클럭 입력에 인버터(버블)가 붙어 있으면 부에지 트리거로 판별한다는 점이 핵심 단서입니다.","366":"스누피(Snoopy) 프로토콜은 다중 프로세서 환경에서 각 캐시가 공유 버스를 계속 감시(snoop)하다가, 어떤 캐시가 공유 블록을 갱신하면 그 사실을 버스를 통해 방송(Broadcast)하고 다른 캐시들이 이를 관찰하여 자신의 사본을 무효화하거나 갱신하도록 하는 캐시 일관성 유지 기법입니다. 문제의 버스 감시와 방송이라는 설명이 정확히 일치하므로 정답은 1번입니다. 2번 디렉토리(Directory) 프로토콜은 버스 방송 대신 중앙 디렉토리에 블록 상태를 기록해 관리하는 확장성 높은 방식이고, 3번 가상 프로토콜과 4번 소프트웨어 제어 프로토콜은 하드웨어 버스 감시 기반 스누피와 거리가 멉니다. 버스 감시 + 방송 = 스누피, 중앙 디렉토리 관리 = 디렉토리로 짝지어 기억하세요.","367":"레귤레이터(전압 조정기)의 시리즈(리니어, Series) 방식은 입력 전압과 출력 전압의 차이만큼의 전력을 트랜지스터에서 열(熱)로 소비하여 원하는 출력 전압을 만드는 방식입니다. 즉 남는 전압을 빛이 아니라 열로 방출하므로, 빛으로 방출한다고 한 3번 설명이 틀려서 정답은 3번입니다. 1번은 어댑터가 교류를 직류로 변환하는 장치라는 옳은 설명이고, 2번은 레귤레이터가 높은 입력을 원하는 전압으로 낮추는 장치라는 옳은 설명이며, 4번은 스위칭 방식이 On/Off 반복으로 평균 전압을 조절한다는 옳은 설명입니다. 시리즈 방식은 효율이 낮고 발열이 크며, 스위칭 방식은 효율이 높다는 대비를 기억하면 좋습니다.","368":"캐시 매핑 방식 중 연관 메모리(Associative memory) 즉 완전 연관(fully associative) 방식은 주소(태그)를 모든 캐시 라인과 동시에 병렬로 비교하여 일치 여부를 한 번에 찾아내므로 정보를 찾는 속도가 가장 빠릅니다. 따라서 정답은 1번입니다. 2번 직접 매핑(Direct mapping)은 한 위치만 비교하므로 단순하고 빠르지만 충돌이 잦아 적중률이 낮고, 3번 프로그램 매핑은 일반적인 캐시 매핑 용어가 아니며, 4번 해시 매핑도 표준 캐시 매핑 분류에 속하지 않습니다. 캐시 매핑은 직접 매핑, 연관 매핑, 집합 연관 매핑 세 가지가 기본이며, 검색 속도는 연관 방식이 가장 빠르되 비교 회로 비용이 크다는 점을 함께 정리하세요.","369":"페이지 테이블을 이용한 가상주소 변환에서 하나의 명령어나 오퍼랜드를 가져오려면 주기억장치를 여러 번 연속 접근해야 합니다. 디렉토리(상위 페이지) 엔트리 접근, 페이지 테이블 엔트리 접근, 그리고 실제 오퍼랜드나 명령어 접근이 주메모리에서 차례로 일어납니다. 반면 캐시 데이터 접근은 주기억장치가 아니라 고속 캐시 메모리에 대한 접근이므로 주메모리 연속 접근에 해당하지 않아 정답은 2번입니다. 1번 디렉토리 엔트리, 3번 페이지 테이블 엔트리, 4번 오퍼랜드명령어 접근은 모두 주메모리 접근 단계에 속합니다. 다단계 페이지 테이블에서는 주소 변환을 위한 메모리 접근 횟수가 늘어나며, 이를 줄이기 위해 TLB(주소변환 캐시)를 사용한다는 점도 알아두세요.","370":"이 문제는 트랜지스터나 기본 게이트로 구성된 회로가 어떤 논리 게이트와 등가인지 판별하는 유형으로, 표시된 정답은 1번 NAND 게이트입니다. NAND 게이트는 모든 입력이 1일 때만 출력이 0이고 그 외에는 1이 되는 게이트로, AND의 출력을 반전한 형태이며 단독으로 모든 논리 함수를 구현할 수 있는 만능(universal) 게이트입니다. 2번 NOR도 만능 게이트지만 모든 입력이 0일 때만 1을 출력하는 다른 진리표를 가지고, 3번 XNOR는 입력이 같을 때 1, 4번 XOR는 입력이 다를 때 1을 출력하여 NAND와 진리표가 다릅니다. NAND와 NOR는 각각 단독으로 모든 회로를 구성할 수 있는 만능 게이트라는 점을 핵심으로 기억하세요.","371":"MIPS(Million Instructions Per Second)는 프로세서가 1초당 처리할 수 있는 명령어 수를 백만 단위로 나타낸 것으로, CPU의 처리 성능을 나타내는 대표적인 단위이므로 정답은 3번입니다. 1번 LPI(Lines Per Inch)는 인쇄 해상도 단위이고, 2번 CPS(Characters Per Second)는 프린터의 인쇄 속도 단위이며, 4번 MMU(Memory Management Unit)는 가상주소를 물리주소로 변환하는 메모리 관리 하드웨어로 성능 단위가 아닙니다. 프로세서 성능 단위로는 MIPS 외에 부동소수점 연산 성능을 나타내는 FLOPS도 자주 출제되니 함께 기억해 두세요.","372":"VHDL 프로그램은 크게 개체(Entity)와 구조(Architecture)로 구성되는데, 개체(Entity)는 설계하고자 하는 회로를 외부에서 바라본 모습 즉 입출력 포트의 이름, 방향(in/out/inout), 자료형 등 인터페이스 정보를 선언하는 부분입니다. 즉 회로를 하나의 블랙박스로 보았을 때 외부와 연결되는 신호선을 기술하므로 정답은 개체(Entity)입니다. 구조(Architecture)는 개체에서 선언한 인터페이스 내부에서 실제로 어떻게 동작하고 연결되는지를 기술하는 부분이므로 인터페이스 정보 자체와는 다릅니다. 패키지(Package)는 여러 설계에서 공통으로 쓰는 자료형, 함수, 상수 등을 모아 두는 라이브러리 성격의 단위이고, 모듈(Module)은 VHDL이 아니라 Verilog HDL에서 설계 단위를 부르는 용어이므로 적절하지 않습니다.","373":"VHDL의 설계 단위(Design Unit) 중 Architecture 선언부는 Entity에서 정의한 인터페이스 안에서 회로가 실제로 어떤 내부 동작을 하는지 또는 하위 블록들이 어떻게 연결되는지를 기술하는 부분이므로 '내부동작 또는 연결구조 기술'에 정확히 해당하여 정답은 3번입니다. Entity 선언부는 회로의 입출력 포트 등 외부 인터페이스만을 정의하는 부분이라 내부 동작을 담지 않습니다. Configuration 선언부는 하나의 Entity에 여러 Architecture가 있을 때 어떤 Architecture를 사용할지 연결(바인딩)을 지정하는 부분입니다. Package 선언부는 공용으로 사용하는 자료형, 함수, 상수 등을 모아 두는 단위로 특정 회로의 동작을 기술하지 않습니다.","374":"RS232 9핀(DB-9) 커넥터에서 DCD는 Data Carrier Detect의 약자로 모뎀이 상대측 반송파(캐리어)를 감지했음을 알리는 신호이지 '데이터 단말 준비'가 아니므로 설명이 옳지 않아 정답은 3번입니다. 데이터 단말 준비는 DTR(Data Terminal Ready)이고, 데이터 세트 준비는 DSR(Data Set Ready)입니다. TxD(송신 데이터)와 CTS(Clear To Send, 송신 허가)는 옳은 설명입니다. 참고로 4번의 DSR을 '데이터 세트 허가'라 표현한 것도 엄밀히는 준비(Ready)가 맞지만, 보기 중 가장 명백히 틀린 것은 DCD를 단말 준비로 설명한 3번입니다. RS232 핸드셰이킹 신호는 RTS/CTS(요청/허가)와 DTR/DSR(단말/세트 준비), 그리고 DCD(캐리어 감지)를 구분해 외워두면 좋습니다.","375":"디코더는 n비트 입력을 2의 n승 개의 출력 단자 중 하나만 1로 활성화하는 회로로, 입력값을 2진수로 해석한 값에 해당하는 출력선이 선택됩니다. 여기서 입력 A=1, B=0이 주어졌는데 보통 A를 상위 비트, B를 하위 비트로 보면 2진수 10은 십진수 2가 되지만, 반대로 A를 하위 비트로 보아 (BA = 01) 십진수 1로 해석하면 D1이 선택되어 정답은 2번 D1이 됩니다. 즉 이 문제의 비트 가중치 배치상 입력 조합이 1에 대응하여 D1 단자만 1을 출력합니다. D0은 입력이 00일 때, D2는 10일 때, D3은 11일 때 활성화되는 단자이므로 이 조건에서는 출력되지 않습니다. 디코더는 한 번에 오직 하나의 출력만 1이 된다는 점이 핵심 암기 포인트입니다.","376":"MAR(Memory Address Register)은 메모리의 주소를 담는 레지스터로, 메모리의 전체 워드 수만큼 서로 다른 주소를 표현할 수 있어야 합니다. 1024개의 워드는 2의 10승이므로 1024개의 주소를 구별하려면 10비트가 필요하여 정답은 1번 10비트입니다. 즉 메모리 용량이 2의 n승 워드이면 MAR 비트 수는 n이라는 관계를 이용합니다. 12비트는 4096개, 20비트는 약 100만 개, 24비트는 약 1600만 개의 주소를 표현하므로 1024워드에는 과한 값들입니다. 반면 데이터 한 워드의 비트 수를 담는 것은 MBR(MDR)이며 MAR과 구분해 외워야 합니다.","377":"온도센서는 접촉식과 비접촉식으로 나뉘는데, 방사하는 열선(적외선 복사 에너지)을 받아 온도를 계측하는 방식은 직접 대상에 닿지 않고 측정하는 비접촉식 온도센서의 설명이므로 이를 접촉식이라 한 1번이 틀려 정답입니다. 접촉식 온도센서는 열전대, 측온저항체(RTD), 서미스터처럼 대상에 직접 닿아 열평형으로 온도를 재는 방식입니다. 초음파 센서가 어군탐지기나 초음파 세척기에 응용된다는 2번, 초음파 센서가 20kHz에서 수 MHz의 고주파 진동을 다룬다는 4번은 옳은 설명입니다. 적외선 센서가 적외선을 내보내는 투광기와 받아들이는 수광기로 구성된다는 3번도 올바른 설명입니다.","378":"I2C는 두 가닥의 신호선(데이터선 SDA와 클록선 SCL)만으로 여러 장치를 연결하는 동기식 직렬 통신 방식이며, 자체 규격으로 동작할 뿐 RS-485 규격을 사용하는 프로토콜이 아니므로 3번이 틀려 정답입니다. RS-485는 차동 신호를 이용한 별개의 시리얼 통신 규격으로 I2C와 무관합니다. I2C가 2가닥 회선을 사용한다는 1번, 각 장치를 구별하는 슬레이브 주소가 있다는 2번은 옳은 설명입니다. I2C는 보통 수백 kHz에서 수 MHz 수준으로 동작해 수 MHz에서 수십 MHz까지 가능한 SPI보다 전송 속도가 느린 편이라는 4번도 맞는 설명입니다.","379":"GDB는 GNU Debugger의 약자로 GNU 프로젝트에서 만든 디버거이며, 'General Debugger'의 줄임말이 아니므로 4번 설명이 틀려 정답입니다. GDB는 소스 코드 단위로 중단점 설정, 한 줄씩 실행 등을 할 수 있는 소스레벨 디버깅을 지원하므로 1번은 옳습니다. 교차(원격) 디버깅 시 타깃 보드에서 실행되는 gdbserver와 호스트의 gdb 클라이언트로 구성되어 동작하므로 2번도 맞습니다. 실행 중 프로그램의 변수 값과 상태를 확인할 수 있다는 3번 역시 GDB의 기본 기능으로 옳은 설명입니다.","380":"NFS(Network File System)는 네트워크를 통해 원격 컴퓨터의 파일 시스템을 마치 자기 것처럼 마운트하여 공유하는 기술로, 이름 그대로 네트워크(IP) 위의 UDP/TCP 프로토콜로 동작하지 시리얼 포트를 통해 데이터를 전송하는 것이 아니므로 4번이 틀려 정답입니다. 운영체제가 서로 다른 컴퓨터 간에도 파일을 공유할 수 있게 하는 것이 목적이라는 1번은 옳습니다. UDP 또는 TCP 환경에서 운영된다는 2번도 맞습니다. 임베디드 시스템에서는 저장공간이 부족할 때 호스트의 디렉터리를 NFS로 마운트해 마치 하드디스크를 확장한 것처럼 개발에 활용하므로 3번도 옳은 설명입니다.","381":"리눅스 커널이 인터럽트 컨텍스트처럼 잠들 수 없는 상황에서 메모리를 동적으로 할당, 해제하는 함수로는 kmalloc(), kfree(), 페이지 단위 할당, 해제 함수인 get_free_pages()와 free_pages() 등이 있습니다. xmalloc()은 표준 커널 메모리 할당 API가 아니라 일부 사용자 영역 라이브러리나 응용에서 쓰이는 함수 이름이므로 보기 중 커널 메모리 할당 함수가 아니어서 정답은 3번입니다. kmalloc()은 물리적으로 연속된 메모리를 할당하고 kfree()로 해제하며, 인터럽트 상황에서는 GFP_ATOMIC 플래그를 사용한다는 점이 중요한 포인트입니다. free_pages()는 페이지 단위로 할당했던 메모리를 반환하는 정상적인 커널 함수입니다.","382":"안드로이드는 리눅스 커널 위에 올라가지만 일반 데스크톱 리눅스의 풍부한 표준 명령어(GNU coreutils 등)를 모두 갖추고 있지 않고, 대신 ls, cat, mount 같은 기본 명령들을 하나로 묶어 제공하는 경량 유틸리티인 toolbox(또는 toybox)를 사용합니다. 따라서 안드로이드 임베디드 환경에서 기본 미지원 표준 명령어를 보강하려면 toolbox 패키지를 추가하므로 정답은 1번입니다. adb(Android Debug Bridge)는 호스트 PC와 안드로이드 기기를 연결해 디버깅, 파일 전송 등을 하는 도구이지 명령어 셋을 제공하는 것이 아닙니다. nfs는 네트워크 파일 공유, tftp는 간단한 파일 전송 프로토콜로 모두 표준 셸 명령어를 제공하는 패키지가 아닙니다.","383":"RAM DISK는 RAM의 일부를 디스크처럼 사용하는 휘발성 저장장치이므로, 전원이 꺼지거나 재부팅하면 그 안의 데이터는 모두 사라집니다. 따라서 한번 만든 RAM 디스크가 재부팅 후에도 자료를 그대로 보관한다고 한 4번은 RAM의 휘발성 특성에 어긋나 틀린 설명이므로 정답입니다. 특정 디렉터리에 파일을 넣고 ext2 포맷의 이미지를 만든다는 1번, 그 이미지를 gzip으로 압축해 플래시의 특정 번지에 저장한다는 2번, 부팅 시 커널에 그 번지를 알려주면 압축 이미지를 RAM으로 로딩해 RAM DISK를 구성한다는 3번은 모두 일반적인 RAM DISK 생성 및 부팅 과정으로 옳습니다. 데이터를 영구 보관하려면 플래시 등 비휘발성 저장장치에 따로 기록해야 한다는 점이 핵심입니다.","384":"임베디드 시스템은 특정한 기능을 반복적으로 수행하도록 하드웨어와 소프트웨어(펌웨어)가 결합된 전용 전자 제어 시스템을 의미하므로 정답은 1번입니다. 2번은 RFID 태그를 부착해 무선주파수로 정보를 인식하는 비접촉식 무선인식 시스템(RFID)에 대한 설명입니다. 3번은 여러 반도체 기능을 하나의 칩에 집적한 SoC(System on Chip)에 대한 설명입니다. 4번은 반도체, 광, 기계 기술을 융합해 마이크로 단위 초소형 부품을 만드는 MEMS 기술에 대한 설명으로, 임베디드 시스템의 정의와는 다릅니다.","385":"RAM DISK 이미지를 만든 뒤 그 안에 프로그램을 탑재하려면 반드시 해당 장치를 특정 디렉터리에 마운트(mount)하여 파일 시스템으로 접근할 수 있게 해야 하므로, 마운트 없이 프로그램을 탑재한다고 한 4번이 틀려 정답입니다. RAM DISK 이미지는 루프 디바이스(Loop Device)를 이용해 일반 파일을 블록 장치처럼 다루어 생성한다는 1번은 옳습니다. 루프 디바이스는 가상 블록 디바이스로 /dev 디렉터리 안에서 loop0 등으로 확인할 수 있다는 2번도 맞습니다. 생성 순서가 파일 생성, 루프 디바이스 연결, 포맷(파일 시스템 생성) 순으로 진행된다는 3번도 옳으며, 그 다음 마운트하여 내용을 채우는 것이 정상 절차입니다.","386":"임베디드 리눅스 부팅은 일반적으로 ROM/부트로더 영역 수행 → 커널 압축 해제 및 커널 수행 → 루트 파일 시스템 검색 및 마운트 → init 프로세스 수행의 순서로 진행되며, init은 사용자 영역의 첫 프로세스로 시스템 초기화를 마무리하는 가장 마지막 단계이므로 정답은 3번입니다. ROM 영역 수행(부트로더)은 전원이 들어온 직후 가장 먼저 실행되는 단계입니다. 커널 수행은 부트로더 다음으로 진행되어 하드웨어를 초기화합니다. 루트 파일 시스템 검색 및 마운트는 커널이 init을 실행하기 직전에 필요한 파일 시스템을 준비하는 단계로, init보다 앞에 옵니다.","387":"리눅스에서 디바이스 드라이버는 입출력 방식과 데이터를 다루는 단위에 따라 문자(Character) 디바이스 드라이버, 블록(Block) 디바이스 드라이버, 네트워크(Network) 디바이스 드라이버의 세 종류로 분류합니다. '시스템 디바이스 드라이버'는 이 표준 분류에 없는 항목이므로 정답은 4번입니다. 문자 디바이스 드라이버는 바이트 단위로 순차 입출력하는 키보드, 시리얼 포트 등을 다룹니다. 블록 디바이스 드라이버는 일정 크기 블록 단위로 임의 접근하는 하드디스크, 플래시 등을 다룹니다. 네트워크 디바이스 드라이버는 패킷 단위로 데이터를 주고받는 네트워크 인터페이스를 담당합니다.","388":"하나의 하드웨어 자원(I/O 포트, 인터럽트 번호, DMA 채널 등)은 시분할이나 공유 메커니즘을 통해 같은 자원을 서로 다른 목적이나 여러 드라이버가 활용할 수 있으므로, 동일한 자원을 다른 목적으로 절대 사용할 수 없다고 단정한 3번이 틀려 정답입니다. 디바이스 드라이버가 I/O 주소 영역을 사용하거나 인터럽트, DMA를 이용한다는 1번은 옳습니다. /proc/ioports 파일이 현재 사용 중인 I/O 포트 영역 정보를 보여준다는 2번도 맞습니다. request_region() 함수가 드라이버가 사용할 I/O 포트 영역을 커널에 등록(점유 요청)하는 함수라는 4번도 옳은 설명입니다.","389":"리눅스의 런레벨(init level)에서 init 6은 시스템을 재시작(reboot)하는 레벨이므로 정답은 4번입니다. init 0은 시스템을 완전히 종료(halt, 전원 끄기)하는 레벨입니다. init 1은 단일 사용자 모드(single user mode)로 주로 시스템 점검이나 복구에 사용됩니다. init 5는 그래픽 사용자 환경(X 윈도)을 포함한 다중 사용자 모드입니다. 시작과 끝을 0(종료)과 6(재시작)으로 외워두면 헷갈리지 않습니다.","390":"리눅스에서 장치 파일은 mknod 명령으로 생성하며, 형식은 mknod 파일경로 타입 주번호 부번호입니다. 장치 파일은 관례상 /dev 디렉터리에 만들고, 문자 디바이스는 타입을 c(character), 블록 디바이스는 b(block)로 지정합니다. 따라서 /dev 경로에 문자 디바이스(c)를 주번호 244, 부번호 0으로 만드는 명령은 mknod /dev/test c 244 0이므로 정답은 4번입니다. 1번과 2번은 경로를 /sys로 잘못 지정했고, 3번은 문자 디바이스인데 타입을 블록(b)으로 잘못 지정했습니다. 주번호는 디바이스의 종류(드라이버)를, 부번호는 같은 종류 내 개별 장치를 구분한다는 점도 함께 기억하면 좋습니다.","391":"TFTP(Trivial File Transfer Protocol)는 이름 그대로 매우 간단한 파일 전송 프로토콜로, 신뢰성 있는 TCP가 아니라 가볍고 빠른 UDP(기본 69번 포트) 위에서 구현되므로 TCP로 구현되었다고 한 2번이 틀려 정답입니다. 간단한 파일 전송 규약이라는 1번은 옳습니다. 인증 절차가 없어 보안에 취약하다는 3번도 맞는 설명입니다. 임베디드 개발에서 호스트로부터 부트로더, 커널, 램디스크, 유저 영역 이미지를 타깃 보드로 내려받을 때 흔히 TFTP를 사용한다는 4번도 옳은 설명입니다.","392":"CMOS 회로의 동적 전력 소비 공식은 P = C * V^2 * f 로 표현되며, 여기서 C는 정전용량, V는 공급 전압, f는 클럭 주파수입니다. 이 공식에서 전력은 클럭 주파수 f에 정비례하므로 '클럭 주파수에 반비례한다'고 한 1번은 명백히 틀린 설명이라 정답이 됩니다. 클럭이 빨라질수록 단위 시간당 스위칭 횟수가 늘어 전력 소비도 함께 증가하기 때문입니다. 2번은 전력이 전압에 비례(정확히는 전압의 제곱에 비례)한다는 점에서 옳고, 3번의 DFS(동적 주파수 조정)와 DVS(동적 전압 조정)는 실제 임베디드 프로세서의 대표적 절전 기법입니다. 4번의 아이들 모드는 일부 클럭을 멈춰 전력을 줄이는 저전력 상태를 의미하므로 옳은 설명입니다.","394":"리눅스 커널에서 디바이스 드라이버가 제공해야 할 표준 연산(open, read, write, ioctl, release 등)을 함수 포인터로 묶어 정의해 놓은 구조체가 바로 file_operations 입니다. 유닉스/리눅스는 '모든 것은 파일이다'라는 철학에 따라 디바이스도 파일처럼 다루므로, 디바이스 드라이버는 이 file_operations 구조체에 자신의 동작 함수를 등록하여 시스템 콜과 연결합니다. 따라서 정답은 2번입니다. 1번 device_operations는 존재하지 않는 명칭이고, 3번 inode_operations는 inode에 대한 연산(파일 생성, 삭제, 링크 등)을 정의하며, 4번 dentry_operations는 디렉터리 엔트리(경로명 캐시) 관련 연산을 정의하는 구조체이므로 디바이스 표준 연산과는 거리가 멉니다.","395":"리눅스 디렉터리 구조에서 /sbin은 시스템 관리자(root)용 시스템 관리 명령어 실행 파일을 담는 디렉터리입니다. 일반 사용자용 명령어 실행 파일은 /bin에 위치하므로, /sbin을 '일반 명령어 실행 파일'이라고 설명한 2번이 옳지 않아 정답입니다. /proc(1번)은 커널이 메모리상에서 만들어내는 가상 파일시스템으로 프로세스 정보와 하드웨어 정보를 제공하고, /etc(3번)는 시스템 전반의 설정 파일을 모아두는 디렉터리이며, /mnt(4번)는 외부 저장장치 등을 임시로 마운트하기 위한 디렉터리로 모두 올바른 설명입니다. 정리하면 /bin은 일반 명령, /sbin은 관리자 명령으로 구분해 암기하면 됩니다.","396":"임베디드 시스템에서 리눅스가 널리 채택되는 이유는 제시된 네 가지가 모두 해당하므로 정답은 4번(a, b, c, d 전부)입니다. 첫째, 오픈소스라서 라이선스 비용 부담이 없고 소스 수정과 최적화가 자유롭습니다. 둘째, TCP/IP를 비롯한 강력한 네트워크 기능을 기본 제공하여 통신 기기에 적합합니다. 셋째, 오랜 기간 검증된 안정적인 멀티태스킹 운영체제이며, 넷째, 다양한 아키텍처와 장치로의 이식성과 확장성이 뛰어나기 때문입니다. 나머지 보기들은 이 중 일부만 선택한 것이라 모든 장점을 포괄하지 못해 오답입니다.","397":"OS가 부팅되어 동작하려면 일반적으로 부트로더(하드웨어 초기화 후 커널을 메모리에 적재), 커널 이미지(운영체제 핵심), 그리고 초기 루트 파일시스템 역할을 하는 램 디스크 이미지(initrd/initramfs)가 필요합니다. 반면 4번의 소스코드 문서는 개발자가 참고하는 자료일 뿐 시스템이 부팅하여 실행되는 데에는 전혀 필요하지 않으므로 정답이 됩니다. 부팅의 일반적 흐름은 부트로더가 커널과 램 디스크를 메모리에 올리고 커널이 초기화를 마친 뒤 루트 파일시스템을 마운트하는 순서임을 기억하면 됩니다. 즉 1, 2, 3번은 부팅 필수 구성요소이고 4번만 부팅과 무관합니다.","398":"리눅스 커널 소스 트리에서 init 디렉터리는 main.c 등 커널이 부팅된 직후 실행되는 '하드웨어 비종속적인' 일반 초기화 루틴(예: start_kernel)을 담고 있습니다. 따라서 init을 '하드웨어에 종속적인 초기화 루틴'이라고 설명한 2번이 틀려 정답입니다. 하드웨어(프로세서)에 종속적인 코드는 1번 설명대로 arch 디렉터리에 들어가며, 여기에 시그널 처리, 클럭, 부팅 관련 아키텍처별 코드가 포함됩니다. 3번 drivers는 각종 디바이스 드라이버, 4번 include는 커널 전반에서 쓰는 헤더 파일들을 담는 디렉터리로 모두 올바른 설명입니다. 즉 arch는 아키텍처 종속, init은 종속성 없는 초기화로 구분하는 것이 핵심입니다.","399":"세마포어를 이용한 상호배제에서, 한 프로세스가 자원을 점유(P 연산으로 세마포어 값을 감소)한 채로 V 연산(반납)을 하지 못하고 비정상 종료하면 그 자원은 영원히 잠긴 상태로 남게 됩니다. 그러면 그 자원을 기다리는 다른 프로세스들은 무한히 대기하게 되어 교착상태(deadlock)가 발생하므로 정답은 2번입니다. 데드락은 자원을 점유한 채 다른 자원을 기다리거나, 점유한 자원이 해제되지 않아 서로 진행하지 못하는 상황을 말합니다. 1번 sleep은 단순 대기 상태, 3번 restore는 복구, 4번 mapping은 주소 매핑을 뜻하므로 이 상황과 맞지 않습니다.","400":"signal() 함수는 특정 시그널이 도착했을 때 실행할 핸들러를 등록하는 함수이지만, 시스템마다 동작(핸들러 자동 재설정 여부, 시그널 차단 처리 등)이 달라 이식성과 호환성에 문제가 있는 것으로 잘 알려져 있습니다. 그래서 POSIX 표준에서는 동작이 명확하고 세밀한 제어가 가능한 sigaction()으로 대체하여 사용할 것을 권장하므로 정답은 2번입니다. 1번처럼 시그널을 '전송'하는 것은 kill() 함수의 역할이며 signal()은 핸들러를 '등록'하는 것입니다. 3번은 signal()이 표준 C 라이브러리 함수로 리눅스 전용 비표준이 아니므로 틀리고, 4번의 ICV 환경변수 운운은 사실이 아닌 잘못된 설명입니다.","401":"리눅스 프로세스의 상태는 일반적으로 실행/실행대기(running, TASK_RUNNING), 대기/수면(sleep, 인터럽트 가능/불가능 대기), 정지(stopped), 좀비(zombie, 종료되었으나 부모가 회수하지 않은 상태) 등으로 구분됩니다. 보기 중 '복구(restore)'는 리눅스 프로세스 상태에 존재하지 않는 항목이므로 정답은 2번입니다. 좀비(3번)는 자식이 종료한 뒤 부모가 wait()로 종료 상태를 거둬가기 전까지의 상태이고, 대기(4번 sleep)는 어떤 이벤트나 자원을 기다리며 CPU를 쓰지 않는 상태입니다. 실행(1번 running)은 CPU를 점유하거나 점유 대기 중인 상태로 모두 실제 존재하는 상태입니다.","402":"POSIX 표준 시그널(전통적 유닉스 시그널)은 같은 종류의 시그널이 처리되기 전에 여러 번 도착하면 큐에 쌓이지 않고 단 한 번만 전달됩니다. 즉 중복 시그널은 병합되어 유실될 수 있으므로 '중복된 시그널은 큐에 저장된다'고 한 1번은 틀린 설명이라 정답입니다. 시그널을 큐잉하여 손실 없이 모두 전달하는 것은 실시간 시그널(real-time signal)의 특징입니다. 2번처럼 SIGKILL, SIGSTOP은 블록(차단)할 수 없고, 3번처럼 Ctrl+C(SIGINT)나 Ctrl+Z(SIGTSTP) 같은 키 입력으로 발생할 수 있으며, 4번처럼 SIGKILL, SIGSTOP은 핸들러를 설치(변경)할 수 없으므로 모두 옳은 설명입니다.","403":"10.0.0.0/12 네트워크는 앞쪽 12비트가 네트워크 식별 부분이고 나머지 20비트가 호스트 부분입니다. 두 번째 옥텟의 상위 4비트(0000)가 고정되므로 호스트 영역은 10.0.0.0부터 10.15.255.255까지가 됩니다. 이 범위에서 마지막 주소 10.15.255.255는 브로드캐스트 주소이므로 실제 할당 가능한 마지막 호스트 IP는 그 직전인 10.15.255.254가 되어 정답은 3번입니다. /12는 서브넷 마스크 255.240.0.0에 해당하며, 두 번째 옥텟이 0~15 범위로 묶이는 점을 기억하면 계산이 쉽습니다. 따라서 10.16으로 넘어가는 4번이나 잘못된 경계를 든 1, 2번은 오답입니다.","404":"여러 프로세스나 스레드가 공유하는 자원(공유 변수, 파일 등)에 접근하는 프로세스 내부의 코드 영역을 임계영역(Critical Section)이라고 하므로 정답은 2번입니다. 동시에 둘 이상이 임계영역에 진입하면 데이터 불일치가 생길 수 있으므로 한 번에 하나만 진입하도록 상호배제(mutual exclusion)를 보장해야 합니다. 1번 TCB(Task Control Block)는 작업/프로세스의 상태 정보를 담는 자료구조이고, 3번 Semaphore는 임계영역 진입을 제어하는 동기화 도구이지 코드 영역 자체는 아닙니다. 4번 Interrupt는 외부/내부 이벤트로 CPU 처리 흐름을 가로채는 것을 의미하므로 정의에 맞지 않습니다.","405":"UDP 67번 포트는 DHCP 서버가 사용하는 well-known 포트입니다. DHCP는 클라이언트가 68번 포트에서 67번(서버)으로 IP 주소 할당을 요청하고 서버가 응답하는 방식으로 동작하므로 정답은 3번입니다. 함께 외워둘 포트로 NTP(4번)는 123번, LDAP(2번)는 389번을 사용하며, WINS(1번)는 윈도우 이름 해석 서비스로 137~139번 대역과 관련됩니다. DHCP의 67(서버)/68(클라이언트) 포트 쌍은 시험에 자주 출제되므로 반드시 기억해 두는 것이 좋습니다.","406":"stat() 시스템 콜은 지정한 파일의 메타데이터(파일 크기, 권한 모드, 소유자 UID/GID, inode 번호, 접근/수정 시간 등)를 stat 구조체에 채워 반환하는 함수이므로 정답은 3번 '파일에 대한 정보 확인'입니다. 즉 파일 자체의 내용이 아니라 파일에 관한 속성 정보를 얻는 데 사용합니다. 1번 프로세스 상태 확인은 ps 명령이나 /proc 파일시스템, 2번 네트워크 상태는 netstat, 4번 시스템 부하 상태는 uptime이나 top 등에 해당하므로 stat()의 기능과는 무관합니다. 비슷한 함수로 lstat()(심볼릭 링크 자체 정보)와 fstat()(열린 파일 디스크립터 기준)도 함께 알아두면 좋습니다.","407":"TCP 서버 측 소켓 프로그래밍의 표준 호출 순서는 socket()으로 소켓을 생성하고, bind()로 IP/포트를 결합한 뒤, listen()으로 연결 요청 대기 상태로 만들고, accept()로 들어온 연결을 수락하는 흐름이므로 정답은 1번입니다. 이후 read()/write()로 데이터를 주고받고 close()로 종료합니다. 클라이언트 측은 socket() 다음에 곧바로 connect()를 호출하여 서버에 접속하는 더 단순한 순서를 따릅니다. 나머지 보기들은 bind, listen, accept, connect의 순서가 뒤섞여 있어 실제 연결 설정 절차에 맞지 않으므로 오답입니다.","408":"현재 실행 중인 프로세스에 인터럽트(또는 스케줄링 이벤트)가 발생하면 운영체제가 그 프로세스의 상태(레지스터, 프로그램 카운터 등)를 저장하고 다른 프로세스의 상태를 복원하여 CPU 제어권을 넘기는데, 이를 프로세스 교환 즉 문맥 교환(context switch)이라고 하므로 정답은 4번입니다. 이 과정에서 프로세스 제어 블록(PCB)에 문맥 정보를 저장하고 복원합니다. 1번 세마포어는 동기화 도구, 2번 가상 메모리 페이징은 메모리 관리 기법, 3번 폴링은 장치 상태를 CPU가 반복적으로 확인하는 입출력 방식이므로 제어권 이양 동작과는 다릅니다.","409":"sched_yield()는 현재 실행 중인 프로세스(스레드)가 자발적으로 CPU 사용 권한을 일시적으로 양보하여 동일 우선순위의 다른 대기 작업에게 실행 기회를 넘기는 함수이므로 정답은 3번입니다. 양보 후에는 다시 실행 큐의 뒤로 가서 자기 차례를 기다립니다. 1번 sched_nice는 실재하는 정확한 명칭이 아니며 nice 값(우선순위 조정)은 nice()/setpriority()로 다루고, 2번 sched_alloc_page는 스케줄러 함수가 아닌 잘못된 설명이며 실시간 우선순위 최소값은 sched_get_priority_min()으로 얻습니다. 4번 sched_r_other 역시 존재하지 않는 명칭으로 표준 정책은 SCHED_OTHER, SCHED_FIFO, SCHED_RR 등이 있으므로 오답입니다.","410":"posix_fadvise()는 응용 프로그램이 특정 파일을 앞으로 어떤 패턴으로 접근할지를 커널에 미리 알려주어 캐시(미리 읽기) 동작을 최적화하도록 조언하는 함수이므로 정답은 1번입니다. 파일을 처음부터 순차적으로 읽을 경우 POSIX_FADV_SEQUENTIAL 같은 힌트를 주면 커널이 미리 읽기(read-ahead)를 강화하여 입출력 지연(latency)을 줄일 수 있습니다. 2번 fcntl()은 파일 디스크립터의 속성을 조작(잠금, 플래그 설정 등)하는 함수, 3번 fdatasync()는 파일 데이터를 디스크에 강제로 동기화하는 함수, 4번 truncate()는 파일 크기를 지정 길이로 자르는 함수이므로 미리 읽기 조언 기능과는 무관합니다.","411":"IEEE 802.5는 토큰 링(Token Ring) 네트워크 표준입니다. 보기 4번에서 802.5를 '요구 우선순위 기반 애니 LAN(Demand Priority/100VG-AnyLAN)'이라고 설명했는데 이는 실제로는 802.12 표준에 해당하므로 4번이 틀린 설명이라 정답입니다. 1번 802.3은 CSMA/CD 방식의 이더넷, 2번 802.3u는 100Mbps 고속(패스트) 이더넷, 3번 802.4는 토큰 버스 네트워크 표준으로 모두 올바른 설명입니다. 참고로 802.11은 무선 LAN, 802.15는 무선 PAN(블루투스 등)으로 함께 정리해 두면 좋습니다.","412":"OSI 7계층 중 최하위인 물리계층(1계층)은 종단 장치 간에 실제 물리적 연결을 설정하고, 비트 전송을 위한 전기적(전압, 신호 레벨)·기계적(커넥터 모양, 핀 배치)·기능적·절차적 특성을 정의하는 계층이므로 정답은 1번입니다. 즉 케이블, 커넥터, 신호 방식 등 비트 단위 전송을 담당합니다. 2번 데이터링크 계층은 프레임 단위 전송과 인접 노드 간 오류 제어/흐름 제어 및 MAC 주소 처리를, 3번 네트워크 계층은 IP 주소 기반 라우팅과 경로 설정을, 4번 전송계층은 종단 간 신뢰성 있는 데이터 전달(TCP/UDP)을 담당하므로 물리적 연결 특성과는 다른 역할입니다.","413":"pthread 조건 변수(condition variable)는 반드시 뮤텍스(mutex)와 짝을 이루어 사용되며, 어떤 조건이 충족되기를 기다리거나 충족되었음을 알리는 시그널 메커니즘입니다. 핵심은 pthread_cond_wait를 호출할 때 호출 스레드가 이미 뮤텍스를 잠근 상태여야 한다는 점인데, wait 함수 내부에서 자동으로 뮤텍스를 풀고 대기에 들어갔다가, 깨어날 때 다시 뮤텍스를 잠그고 반환합니다. 따라서 보기 2번처럼 '대기할 때 뮤텍스 잠금이 해제된 상태여야 한다'는 설명은 틀린 것으로, 오히려 잠긴 상태로 진입해야 하므로 이 문제의 정답이 2번입니다. 보기 1번은 조건 변수가 뮤텍스와 결합된 시그널 메커니즘이라는 올바른 정의이고, 3번은 프로세스 공유 속성(PTHREAD_PROCESS_SHARED)을 설정하면 다른 프로세스와 공유 가능하다는 맞는 설명이며, 4번은 여러 스레드가 대기 중일 때 signal로 깨어나는 순서를 보장하지 않는다는 올바른 특성입니다. 암기 포인트로 wait는 반드시 잠긴 뮤텍스로 진입한다는 것을 기억하세요.","414":"리눅스에서 디바이스 파일(특수 파일)을 생성하는 명령어는 mknod(make node)입니다. mknod는 문자형 장치(c)나 블록형 장치(b)를 지정하고 주번호(major number)와 부번호(minor number)를 부여하여 /dev 아래에 디바이스 파일을 만드는 데 사용하므로 정답은 4번입니다. 디바이스 파일은 일반 파일이 아니라 커널의 디바이스 드라이버와 연결되는 인터페이스 역할을 합니다. 보기 1번 devokemk, 2번 makemd, 3번 outlx는 실제 존재하지 않는 가짜 명령어로 혼동을 주기 위한 오답입니다. 참고로 디렉터리는 mkdir, 일반 파일 생성/갱신은 touch, 디렉터리 생성은 mkdir 등으로 구분해 두면 좋습니다.","415":"리눅스 커널 2.6부터 도입된 고성능 I/O 멀티플렉싱(이벤트 통지) 메커니즘은 epoll입니다. 기존 select나 poll은 감시할 파일 디스크립터 수가 늘어날수록 매번 전체 목록을 선형 탐색해야 해서 O(n) 비용이 들지만, epoll은 관심 디스크립터를 커널에 등록해
