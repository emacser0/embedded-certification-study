두고 준비된 것만 통지받아 대규모 동시 접속에서도 효율적이므로 정답은 2번입니다. epoll_create, epoll_ctl, epoll_wait의 세 함수로 구성되는 점을 기억하세요. 보기 1번 xmultiplex는 존재하지 않는 함수이고, 3번 fcntl은 파일 디스크립터의 속성(논블로킹 설정 등)을 제어하는 함수이며, 4번 getaddrinfo는 호스트명을 IP 주소로 변환하는 네트워크 주소 변환 함수로 I/O 멀티플렉싱과는 무관합니다.","416":"커널(kernel)은 운영체제의 핵심으로 프로세스 관리(생성, 종료, 스케줄링), 메모리 관리(할당과 가상 메모리 공간 관리), 시스템 호출 처리, 장치 및 파일 시스템 관리 등을 담당합니다. 따라서 보기 1번 프로세스 관리, 2번 사용자 프로세스의 시스템 호출 수행, 3번 메모리 할당 및 가상 공간 관리는 모두 커널의 정당한 역할입니다. 반면 라이브러리 함수를 생성하는 것은 커널의 역할이 아니라 사용자 영역(user space)에서 개발자나 컴파일러, 링커가 담당하는 일이므로 가장 거리가 먼 것은 4번입니다. 라이브러리는 응용 프로그램이 공통적으로 쓰는 함수를 모아둔 것으로 커널과는 별개의 사용자 공간 구성요소임을 기억하세요.","417":"SIGCHLD 시그널은 자식 프로세스가 종료되거나 정지(중단)되었을 때 커널이 부모 프로세스에게 보내는 시그널이므로 정답은 3번입니다. 부모는 이 시그널을 받아 wait나 waitpid로 자식의 종료 상태를 수거하여 좀비 프로세스를 정리할 수 있습니다. 보기 1번은 SIGCHLD에도 signal이나 sigaction으로 핸들러를 설치할 수 있으므로 틀렸고, 2번은 좀비는 자식이 종료된 뒤 부모가 wait로 거두지 않을 때 생기는 것이지 단순히 SIGCHLD를 무시한다고 항상 좀비가 생기는 것은 아니며 오히려 SIG_IGN으로 설정하면 좀비를 막을 수도 있어 틀린 설명입니다. 4번은 wait나 waitpid를 쓰는 것과 무관하게 자식 종료 시 SIGCHLD는 발생하므로 틀렸습니다. 핵심 암기 포인트는 SIGCHLD는 자식의 종료/정지 시 부모에게 전달된다는 것입니다.","418":"은행원 알고리즘(Banker's Algorithm)은 다익스트라가 제안한 것으로, 자원을 할당하기 전에 시스템이 안전 상태(safe state)를 유지할 수 있는지 미리 검사하여 교착상태에 빠질 가능성이 있으면 할당을 보류하는 방식입니다. 이는 교착상태가 발생하지 않도록 사전에 피해 가는 회피(avoidance) 기법에 해당하므로 정답은 3번입니다. 보기 1번 예방(prevention)은 교착상태의 네 가지 필요조건(상호배제, 점유와 대기, 비선점, 환형 대기) 중 하나를 원천적으로 제거하는 방법이고, 2번 발견(detection)은 교착상태 발생 여부를 자원 할당 그래프 등으로 탐지하는 것이며, 4번 복구(recovery)는 발견된 교착상태를 프로세스 종료나 자원 선점으로 해소하는 방법입니다. 은행원 알고리즘은 회피 기법의 대표 예라는 점을 반드시 기억하세요.","419":"이진 트리(binary tree)에서 루트를 레벨 1로 볼 때 레벨 i에서 가질 수 있는 최대 노드 수는 2의 (i-1)제곱입니다. 루트는 레벨 1에서 1개(2의 0제곱), 다음 레벨은 2개, 그다음은 4개로 매 레벨마다 두 배씩 늘어나므로 일반식은 2^(i-1)이 되어 정답은 4번입니다. 보기 2번 2^i는 루트를 레벨 0으로 두는 다른 규약일 때의 식이지만 이 문제의 보기 구성과 표준 정답 기준에서는 2^(i-1)이 맞습니다. 보기 1번 2^i+1, 3번 i+1은 이진 트리의 노드 증가 규칙과 맞지 않는 식입니다. 참고로 높이가 h인 포화 이진 트리의 전체 노드 수는 2^h - 1개라는 공식도 함께 외워 두면 유용합니다.","420":"요구사항 분석 단계에서 사용하는 대표적 분석 모델에는 시스템의 구조와 객체를 표현하는 객체 모델, 시간에 따른 상태 변화와 흐름을 표현하는 동적 모델, 데이터 변환과 처리 흐름을 표현하는 기능 모델이 있습니다. 이들은 럼바우(Rumbaugh)의 OMT 분석에서 객체 모델, 동적 모델, 기능 모델로 정리되므로 보기 1, 3, 4번은 모두 요구사항 모델에 해당합니다. 반면 리스크 모델(위험 모델)은 요구사항 분석 모델이 아니라 프로젝트 관리나 위험 분석 단계에서 다루는 별개의 개념이므로 해당하지 않는 것은 2번입니다. OMT 3대 모델인 객체, 동적, 기능 모델을 묶어서 암기하면 이런 문제에 강해집니다.","421":"자바에서 상속받은 부모 클래스를 참조하는 super, 객체의 타입을 검사하는 instanceof, switch문에서 기본 분기를 지정하는 default는 모두 자바의 예약어(키워드)입니다. 반면 인터페이스를 구현할 때 사용하는 올바른 키워드는 implements이지 implement가 아니므로, 키워드가 아닌 것은 3번 implement입니다. 즉 implement는 마지막 s가 빠진 잘못된 형태로 자바 키워드 목록에 존재하지 않습니다. 자바에서 클래스 상속은 extends, 인터페이스 구현은 implements를 쓴다는 철자를 정확히 기억하는 것이 함정 회피의 핵심입니다.","422":"소프트웨어 위기(software crisis)는 하드웨어 발전 속도에 비해 소프트웨어 개발이 따라가지 못해 생기는 여러 문제를 말하며, 개발 일정 지연, 관리 부재, 품질 미흡, 비용 초과, 유지보수 곤란 등이 그 발생 요인입니다. 따라서 보기 1번 개발 일정 지연, 2번 소프트웨어 관리 부재, 4번 소프트웨어 품질의 미흡은 모두 위기를 유발하는 부정적 요인입니다. 그러나 소프트웨어 생산성 향상은 오히려 위기를 해소하고 개선하는 긍정적 결과이므로 위기 발생 요인과 거리가 먼 것은 3번입니다. 위기의 요인은 모두 부정적인 항목이라는 점에 착안하면 긍정적 표현인 보기를 골라낼 수 있습니다.","423":"화이트박스 검사(white box testing)는 프로그램의 내부 논리 구조와 소스 코드를 들여다보고 경로와 조건을 검증하는 기법으로, 기초 경로 검사(basis path testing), 데이터 흐름 검사, 루프 검사, 조건 검사 등이 여기에 속합니다. 따라서 보기 1번, 3번, 4번은 모두 화이트박스 기법입니다. 반면 오류 예측 검사(error guessing)는 테스터의 경험과 직관으로 오류가 있을 만한 부분을 추정해 입력하는 기법으로 내부 구조를 보지 않는 블랙박스 검사에 속하므로 해당하지 않는 것은 2번입니다. 블랙박스 기법에는 동등 분할, 경곗값 분석, 원인-결과 그래프, 오류 예측 등이 있다는 점을 함께 정리해 두세요.","424":"스택(stack)은 후입선출(LIFO) 구조이며 Top은 가장 마지막에 입력된(꼭대기) 데이터를 가리킵니다. 삭제(pop) 연산은 먼저 Top이 가리키는 데이터를 꺼내고(Remove Stack(Top)), 그다음 Top을 하나 감소시켜(Top=Top-1) 새로운 꼭대기를 가리키게 하는 순서가 올바르므로 정답은 3번입니다. 보기 1번은 Top을 증가시키고 데이터를 넣는 삽입(push) 연산이라 삭제가 아니며, 2번은 Top을 갑자기 n-1로 설정하는 잘못된 동작입니다. 4번은 Top을 먼저 감소시킨 뒤 Top+1 위치를 제거한다는 순서로, 동일 위치를 다루지만 표준적인 pop의 자연스러운 순서(제거 후 감소)와 다르게 표현되어 정답으로 보지 않습니다. 삭제는 제거 후 Top 감소, 삽입은 Top 증가 후 저장이라는 순서를 명확히 구분하는 것이 핵심입니다.","427":"베타 테스팅(beta testing)은 개발이 거의 완료된 소프트웨어를 실제 사용자에게 배포하여, 통제되지 않은 실제 환경에서 사용해 보게 하고 그 피드백을 수집하여 사용자 인터페이스와 품질을 향상시키는 인수 테스트 방법입니다. 따라서 사용자 피드백을 얻어 개선하는 최적의 방법이라는 보기 1번이 정답입니다. 베타 테스트는 개발자가 함께 통제하는 환경에서 수행하는 알파 테스트와 대비되며, 알파는 개발사 내부, 베타는 외부 실사용자 환경이라는 점을 기억하세요. 보기 2번은 단순히 저렴한 비용의 품질보증 방법이라는 부정확한 설명이고, 3번은 결함 수정 평균시간(MTTR 유사 개념)으로 베타 테스트의 정의가 아니며, 4번은 단위 시간당 컴파일 오류 수로 베타 테스팅과 전혀 무관한 척도입니다.","428":"알고리즘의 수행 시간을 빅오 표기법으로 비교할 때 입력 크기 n이 커질수록 증가율이 낮은 것이 더 효율적입니다. 일반적인 증가율 순서는 O(1) < O(log n) < O(n) < O(n log n) < O(n제곱) < O(n세제곱) < O(n네제곱) < O(2의 n제곱)이므로, 보기 중에서는 O(n log₂n)이 가장 느리게 증가하여 가장 효율적입니다. 따라서 정답은 2번입니다. 보기 3번 O(n²), 4번 O(n³), 1번 O(n⁴)는 모두 다항식 차수가 높아질수록 비효율적이며, 특히 1번 O(n⁴)가 가장 비효율적입니다. 빅오 비교에서는 차수가 낮고 로그가 붙을수록 빠르다는 기본 순서를 외워 두면 즉시 답을 고를 수 있습니다.","429":"C언어가 기본으로 제공하는 자료형에는 문자형 char, 정수형 int, 실수형 float와 double 등이 있습니다. 따라서 보기 1번 char, 2번 float, 3번 int는 모두 C언어의 정식 데이터형입니다. 그러나 real이라는 자료형은 C언어에 존재하지 않으며, 이는 파스칼(Pascal)이나 포트란 같은 다른 언어에서 실수를 나타낼 때 쓰는 키워드이므로 C언어 자료형이 아닌 것은 4번입니다. C에서 실수는 float(단정밀도)와 double(배정밀도)로 표현한다는 점을 기억하면 real을 함정으로 걸러낼 수 있습니다.","430":"자료구조는 데이터가 한 줄로 순차적으로 연결되는 선형 구조와, 계층이나 망 형태로 연결되는 비선형 구조로 나뉩니다. 선형 구조에는 배열, 연결 리스트, 스택, 큐, 데크(deque)가 속하고, 비선형 구조에는 트리와 그래프가 속합니다. 따라서 보기 중 선형 구조는 다(스택), 라(큐), 마(데크)이고 가(트리)와 나(그래프)는 비선형 구조이므로 정답은 2번 '다, 라, 마'입니다. 보기 3번과 4번은 비선형인 트리나 그래프를 포함해 틀렸고, 1번은 비선형만 묶었습니다. 스택, 큐, 데크, 리스트는 선형, 트리와 그래프는 비선형이라는 분류를 확실히 외워 두세요.","431":"나선형 모델(spiral model)은 보엠(Boehm)이 제안한 것으로, 계획 수립, 위험 분석, 개발 및 검증, 고객 평가의 네 단계를 나선을 돌듯 반복하면서 점진적으로 시스템을 완성해 가는 모델이며 위험 분석을 강조하고 대규모 시스템 개발에 적합합니다. 보기 2번(진화 단계마다 계획, 위험분석, 개발, 평가를 거침), 3번(대규모 시스템에 적합), 4번(비선형적이고 반복적으로 진행)은 모두 나선형 모델의 올바른 특징입니다. 그러나 보기 1번은 'Grady가 제안한 폭포수 모델의 일종'이라고 했는데, 나선형 모델은 보엠이 제안했고 폭포수 모델이 아니라 반복적 모델이므로 틀린 설명이며 정답은 1번입니다. 나선형 모델의 핵심 키워드는 보엠, 위험 분석, 반복, 대규모라는 점을 기억하세요.","432":"컴파일러의 처리 과정은 크게 어휘 분석, 구문 분석, 의미 분석, 중간 코드 생성, 최적화, 목적 코드 생성 순으로 진행됩니다. 이 중 소스 프로그램의 문자열을 읽어 문법적으로 의미 있는 최소 단위인 토큰(token)으로 분리하는 단계는 어휘 분석(lexical analysis) 단계이므로 정답은 3번입니다. 보기 2번 구문 분석(syntax analysis)은 어휘 분석이 만든 토큰들을 문법 규칙에 따라 파스 트리로 구성하는 단계이고, 1번 코드 생성은 목적 코드를 만드는 단계, 4번 최적화는 코드의 효율을 높이는 단계입니다. 토큰 분리는 어휘 분석, 토큰의 구조 검사는 구문 분석으로 구분하는 것이 핵심입니다.","433":"객체지향에서 추상화(abstraction)는 복잡한 대상에서 핵심만 뽑아 단순화하는 개념으로, 그 종류로는 무엇을 하는지에 초점을 두는 기능(과정) 추상화, 제어 흐름의 세부를 감추는 제어 추상화, 데이터의 표현을 감추고 연산만 제공하는 자료(데이터) 추상화가 대표적입니다. 따라서 보기 1번 기능 추상화, 2번 제어 추상화, 4번 자료 추상화는 모두 추상화의 종류에 해당합니다. 반면 상속(inheritance)은 객체지향의 또 다른 독립적인 특징이지 추상화의 한 종류가 아니므로 해당하지 않는 것은 3번 상속 추상화입니다. 추상화의 종류는 기능, 제어, 자료 세 가지로 묶어 외우고 상속은 별개의 특성임을 구분하세요.","434":"원천 부호화(source coding, 음성 부호화)는 신호의 통계적 특성이나 발생 모델을 이용해 데이터를 효율적으로 압축하는 방식으로, 대표적으로 차분 펄스부호변조 DPCM, 델타 변조 DM, 선형 예측 부호화 LPC 등이 있습니다. 따라서 보기 2번 DPCM, 3번 DM, 4번 LPC는 모두 원천 부호화 방식에 해당합니다. 반면 보기 1번 KM은 음성 원천 부호화 기법으로 존재하지 않는 항목이라 해당하지 않으므로 정답은 1번입니다. 원천 부호화의 대표 기법으로 PCM 계열의 DPCM, ADPCM, DM과 보코더 계열의 LPC를 묶어서 기억해 두면 좋습니다.","435":"정답은 4번 구성요소도(Component Diagram)입니다. 구성요소도는 시스템을 구성하는 물리적 컴포넌트(실행 파일, 라이브러리, DLL, 소스 모듈 등)와 그들 사이의 의존 관계를 표현하는 다이어그램으로, 논리적 설계 모델을 실제 구현 단위인 물리적 모델로 재배치하여 개발자 관점에서 시스템 구조를 바라볼 때 사용합니다. UML 다이어그램은 크게 구조 다이어그램과 행위 다이어그램으로 나뉘는데, 컴포넌트도와 배치도는 물리적 구조를 표현하는 대표적인 구조 다이어그램입니다. 1번 순서도는 객체 간 메시지를 시간 순서대로 표현하는 행위(동적) 다이어그램이라 물리적 배치와 무관합니다. 2번 클래스도는 클래스와 속성, 메서드, 관계를 표현하는 논리적 정적 구조 다이어그램이고, 3번 상태도는 객체의 상태 변화를 표현하는 행위 다이어그램이라 모두 물리적 재배치 목적과는 거리가 멉니다.","436":"정답은 3번 D, A, B, C입니다. 스택은 LIFO(Last In First Out, 후입선출) 구조로, 가장 나중에 push된 자료가 가장 먼저 pop됩니다. D가 가장 먼저 출력되려면 A, B, C, D를 모두 push한 상태여야 하는데 이때 스택 top은 D이고 그 아래로 C, B, A 순서이므로, D 다음에는 반드시 C, B, A 순서로만 나와야 합니다. 따라서 D 다음에 A가 나오는 D, A, B, C는 절대 불가능합니다. 1번 B,A,D,C는 (A push B push, B A pop, C push D push, D C pop)으로 가능하고, 2번 B,C,D,A는 push A, push B, pop B, push C, pop C, push D, pop D, pop A로 가능하며, 4번 C,B,A,D는 A B C push 후 C B A pop, 이어 D push pop으로 모두 만들 수 있습니다.","437":"정답은 4번 internal입니다. Java의 접근제어자(access modifier)는 public, protected, default(아무것도 안 붙인 package-private), private 네 가지로, 클래스나 멤버의 접근 범위를 제어합니다. private는 같은 클래스 내부에서만, default는 같은 패키지 내에서만, protected는 같은 패키지와 상속받은 자식 클래스에서, public은 어디서나 접근 가능합니다. internal은 Java가 아니라 C# 언어의 접근제어자로 같은 어셈블리 내에서 접근을 허용하는 키워드이므로 Java에는 존재하지 않습니다. 따라서 1, 2, 3번은 모두 Java 접근제어자이고 4번만 해당하지 않습니다.","438":"정답은 3번 Method입니다. 객체지향에서 메서드(Method)는 객체가 메시지를 받았을 때 실행해야 할 구체적인 동작이나 연산을 정의한 것으로, 객체의 행위(behavior)를 구현하는 함수에 해당합니다. 객체는 속성(데이터)과 메서드(연산)로 구성되며, 외부에서 메시지를 보내면 해당 메서드가 호출되어 처리됩니다. 1번 Entity는 실세계의 개체나 데이터 모델에서의 개체를 의미하고, 4번 Class는 같은 속성과 메서드를 가진 객체들을 정의한 틀(설계도)이지 연산 자체는 아닙니다. 2번 Softer는 객체지향 용어가 아닌 무의미한 보기입니다.","439":"정답은 3번 폴링(Polling) 방식입니다. 폴링 방식은 CPU가 각 장치의 인터럽트 요청 플래그를 소프트웨어적으로 차례대로 검사하여 어느 장치가 인터럽트를 요청했는지 원인을 판별하는 방법으로, 구현이 간단하지만 검사 순서에 따라 우선순위가 정해지고 장치가 많으면 속도가 느립니다. 2번 데이지체인 방식은 장치들을 직렬로 연결하고 인터럽트 인식 신호를 순차 전달하여 하드웨어적으로 우선순위를 정하는 벡터 인터럽트 방식입니다. 1번 스트로브 방식은 비동기 데이터 전송에서 타이밍 제어 신호를 사용하는 방식이고, 4번 하드웨어 방식은 폴링과 대비되는 벡터 인터럽트(하드웨어로 원인 식별)를 가리키는 포괄적 표현입니다. 따라서 플래그를 순차 검사한다는 설명에 정확히 부합하는 것은 폴링입니다.","440":"정답은 2번 입력 3개, 출력 2개입니다. 전가산기(Full Adder)는 두 비트 A, B와 아래 자리에서 올라온 자리올림 입력 Cin까지 합하여 더하는 회로이므로 입력이 3개이고, 결과로 합(Sum)과 자리올림 출력(Carry out) 2개를 내보내므로 출력이 2개입니다. 이에 비해 반가산기(Half Adder)는 입력 2개(A, B), 출력 2개(Sum, Carry)로 자리올림 입력을 받지 못합니다. 1번은 반가산기의 구성이며, 3번과 4번은 전가산기의 실제 입출력 개수와 맞지 않습니다. 전가산기 Sum = A XOR B XOR Cin, Carry = AB + Cin(A XOR B)라는 식도 함께 기억해 두면 좋습니다.","441":"정답은 3번 Chip Select입니다. 칩 선택(Chip Select, CS) 단자는 공통 버스에 여러 장치(메모리, 주변장치 등)가 연결되어 있을 때 그 중 특정 장치 하나만 활성화하여 버스를 사용하도록 선택하는 신호로, 동시에 여러 장치가 버스에 데이터를 실어 충돌이 일어나는 것을 방지합니다. 보통 주소 디코더의 출력으로 각 칩의 CS가 제어되며, 선택되지 않은 칩은 출력이 고임피던스(하이 임피던스) 상태가 되어 버스에서 분리됩니다. 1번 Regulator는 전압을 일정하게 유지하는 정전압 소자이고, 2번 PAL과 4번 FPGA는 논리 회로를 구성하는 프로그래머블 논리 소자라 버스 충돌 방지용 선택 단자와는 무관합니다.","442":"정답은 2번 0110(2)입니다. 4비트 ADC는 입력 전압 범위를 2의 4승인 16단계로 나누므로, 분해능(1단계 크기)은 3V를 16으로 나눈 약 0.1875V입니다. 입력 1.2V를 분해능으로 나누면 1.2 / 0.1875 = 6.4가 되고, ADC는 소수를 버려 정수 6단계로 변환하므로 출력은 6에 해당하는 이진수 0110이 됩니다. 따라서 1번 0101(5), 3번 0111(7), 4번 1001(9)은 계산값 6과 맞지 않습니다. ADC 출력 = (입력전압 / 기준전압) × 2의 n승 식으로 계산하며 소수점은 버린다는 점을 기억하면 됩니다.","443":"정답은 2번 59.5ns입니다. 캐시 메모리의 평균 메모리 접근 시간은 적중률을 가중치로 한 가중평균으로 구하며, Ta = (히트율 × 캐시 접근시간) + (미스율 × 주메모리 접근시간)으로 계산합니다. 문제에서 히트율 Ph가 95%이므로 미스율은 5%이고, 캐시 접근시간 Tc가 10ns, 주메모리 접근시간은 1μs(1000ns)로 보면 Ta = 0.95 × 10 + 0.05 × 1000 = 9.5 + 50 = 59.5ns가 됩니다. 따라서 1번 40.5ns, 3번 950.5ns, 4번 949.5ns는 적중률과 미스율을 잘못 적용한 값입니다. 핵심은 적중 시에는 캐시 시간만, 실패 시에는 주메모리 시간을 더해 가중평균을 낸다는 점입니다.","444":"정답은 3번 10000100입니다. AND 연산은 두 비트가 모두 1일 때만 결과가 1이 되는 논리곱이므로, 각 자리를 위아래로 비교하여 계산합니다. A는 11010100, B는 10101100이고 자리별로 AND하면 1과1=1, 1과0=0, 0과1=0, 1과0=0, 0과1=0, 1과1=1, 0과0=0, 0과0=0이 되어 결과는 10000100입니다. 1번 00000000은 모두 0이 되는 경우이고, 2번 11111100은 OR 연산 결과에 가까우며, 4번 11111111은 두 값이 모두 1일 때만 나오는 결과라 맞지 않습니다. AND는 마스킹(특정 비트 추출), OR는 비트 설정에 쓰인다는 점도 함께 알아두면 좋습니다.","445":"정답은 4번 'CPSR은 ARM의 각 모드별로 존재한다'로, 이것이 틀린 설명입니다. CPSR(Current Program Status Register)은 현재 프로세서 상태를 나타내는 레지스터로 시스템 전체에 하나만 존재하며, 각 모드별로 별도로 존재하는 것은 SPSR(Saved Program Status Register)입니다. 즉 예외나 인터럽트가 발생하면 현재 CPSR 값이 해당 모드의 SPSR에 저장되어 복귀 시 복원되는데, 이 SPSR이 모드별로 존재하는 것이지 CPSR은 공유됩니다. 1번은 프로세서 모드의 역할을 옳게 설명했고, 2번은 User/System 모드가 r13, r14를 공유하고 다른 모드는 뱅크드 레지스터로 별도 사용한다는 옳은 설명이며, 3번 FIQ 모드가 빠른 인터럽트 처리를 위한 모드라는 것도 맞습니다.","446":"정답은 1번 가속도 센서입니다. 가속도 센서는 물체가 힘을 받아 속도가 변할 때 내부에 있는 작은 질량(질량체)이 관성에 의해 상대적으로 위치가 변하는 것을 감지하여 가속도를 측정하는 센서로, 스마트폰의 기울기 감지나 자동차 에어백 등에 사용됩니다. 관성과 질량의 위치 변화를 이용한다는 설명이 정확히 가속도 센서의 동작 원리입니다. 2번 광 센서는 빛의 세기를, 3번 온도 센서는 온도 변화를, 4번 피에조 센서는 압력이나 진동에 의한 압전 효과로 전압을 발생시키는 원리를 이용하므로 관성에 의한 질량 위치 변화와는 무관합니다.","447":"정답은 2번 F1F9D9입니다. Zone 10진(언팩) 형식은 각 십진 숫자를 1바이트로 표현하되 상위 4비트(존 비트)를 F로 채우고 하위 4비트에 숫자를 넣으며, 맨 마지막 바이트의 존 부분에는 부호를 표시합니다. 양수는 C, 음수는 D, 부호 없음은 F로 나타내므로 -199에서 숫자 1, 9, 9는 각각 F1, F9로 표현하되 마지막 자리 9는 음수 부호 D를 붙여 D9가 됩니다. 따라서 -199는 F1 F9 D9가 됩니다. 1번 F1F9C9는 마지막에 양수 부호 C를 써서 +199를 나타내므로 틀렸고, 3번과 4번은 자리 표현 형식 자체가 언팩 형식과 맞지 않습니다.","448":"정답은 3번 5개입니다. 존슨 카운터(Johnson counter)는 시프트 레지스터의 마지막 출력을 반전시켜 첫 입력으로 되먹임하는 구조로, 사용한 플립플롭이 n개이면 2n개의 상태를 순환하는 MOD-2n 카운터가 됩니다. 따라서 MOD-10 존슨 카운터를 만들려면 2n = 10에서 n = 5, 즉 D 플립플롭 5개가 필요합니다. 참고로 같은 개수의 플립플롭으로 링 카운터는 n개 상태, 존슨 카운터는 2n개 상태를 표현하므로 존슨 카운터가 두 배 효율적입니다. 그러므로 3개나 4개로는 MOD-10을 만들 수 없고 6개는 MOD-12가 되어 과다합니다.","449":"정답은 3번 '이산적인 신호를 연속적인 신호로 나누는 것을 표본화라 한다'로, 이것이 틀린 설명입니다. 표본화(Sampling)는 반대로 시간적으로 연속인 아날로그 신호를 일정 간격으로 떼어내 이산적인 신호로 만드는 과정이며, ADC는 연속 신호를 디지털로 바꾸는 장치이므로 연속을 이산으로 변환하는 것이 맞습니다. 1번은 전압을 비트 단위로 나눈 분해능을 해상도라 부른다는 옳은 설명이고, 2번은 실제 ADC가 흔히 10비트 이상이며 변환시간이 빠르다는 일반적 특성이며, 4번은 10비트면 2의 10승인 1024단계를 표현한다는 정확한 계산입니다. 따라서 표본화의 방향을 거꾸로 설명한 3번이 오답입니다.","450":"정답은 4번 선형전압레귤레이터입니다. 선형전압레귤레이터(Linear Voltage Regulator)는 입력 전압보다 낮은 출력 전압을 만드는 강압용 정전압 회로로, 내부 반도체(트랜지스터)가 가변 저항처럼 동작하며 남는 전압을 열로 소비해 일정한 출력 전압을 유지합니다. 따라서 입력 전압이 출력 전압보다 항상 높아야 하고 비례적인 출력 특성을 가지며 5V를 3V로 낮추는 예에 정확히 해당합니다. 1번 저역통과필터는 고주파 성분을 제거하는 필터이고, 2번 연산증폭기는 신호를 증폭하는 소자이며, 3번 스위칭전원장치는 반도체를 빠르게 온오프하여 효율을 높이는 방식으로 선형 레귤레이터와는 동작 원리가 다릅니다.","452":"정답은 2번 (A) RESET, (B) SET입니다. RS 플립플롭에서 S(Set)와 R(Reset) 입력에 따라 출력 Q가 결정되는데, S=0, R=1일 때는 출력 Q가 0으로 떨어지므로 이를 리셋(RESET) 상태라 하고, S=1, R=0일 때는 출력 Q가 1로 올라가므로 세트(SET) 상태라 합니다. 따라서 (A)는 출력이 0이 되는 RESET, (B)는 출력이 1이 되는 SET입니다. S=0, R=0은 이전 상태를 유지하고 S=1, R=1은 두 출력이 모두 0이 되는 모순 상태라 사용 금지(불능)입니다. 그러므로 1, 3, 4번처럼 SET과 RESET을 바꾸거나 같게 놓은 보기는 진리표와 맞지 않습니다.","453":"정답은 3번 데이터읽기(Memory)입니다. 가장 기본적인 3단계 명령어 파이프라인은 명령어 인출(Fetch), 해독(Decode), 실행(Execute)의 세 단계로 구성되며, 메모리 접근(Memory) 단계는 여기에 포함되지 않습니다. 메모리 단계와 레지스터 쓰기(Write Back) 단계가 추가되면 보통 4단계 또는 5단계 파이프라인이 되는데, 대표적인 5단계 파이프라인은 IF, ID, EX, MEM, WB로 구성됩니다. 따라서 1번 인출, 2번 해독, 4번 실행은 3단계 파이프라인의 구성 단계이고 3번 메모리 단계만 해당하지 않습니다. 파이프라인은 여러 명령어를 단계별로 겹쳐 처리하여 처리량을 높이는 기법입니다.","454":"정답은 1번 A + C'입니다. 카르노 맵(Karnaugh map)은 진리표의 1들을 인접한 셀끼리 2의 거듭제곱 단위(1, 2, 4, 8개)로 묶어 논리식을 간소화하는 도구로, 묶음이 클수록 변수가 소거되어 식이 간단해집니다. 이 문제의 맵을 묶으면 한 그룹에서 A 변수만 남고 다른 그룹에서 C의 보수(C')만 남아 두 항의 합인 A + C'로 정리됩니다. 보기 2번 A+B, 3번 A+BC, 4번 A+B'C는 맵의 묶음에서 도출되는 항과 일치하지 않습니다. 카르노 맵은 인접한 셀들이 한 변수만 다르도록 그레이 코드 순서로 배치된다는 점, 그리고 1을 빠짐없이 가장 크게 묶어야 한다는 점을 기억하면 됩니다.","456":"정답은 4번 채널 레지스터(channel register)입니다. DMA(Direct Memory Access) 제어기는 CPU 개입 없이 주변장치와 메모리 사이에 직접 데이터를 전송하기 위한 장치로, 전송할 메모리 주소를 담는 주소 레지스터(address register), 전송할 데이터 개수(바이트 수)를 세는 카운터 레지스터(counter register), 그리고 전송 방향과 진행 상태 등을 나타내는 상태/제어 레지스터(state register)로 구성됩니다. 채널 레지스터는 DMA 제어기의 기본 구성 요소로 분류되지 않으므로 정답입니다. DMA 동작은 전송이 끝나면 인터럽트로 CPU에 알리며, CPU가 다른 작업을 하는 동안 대용량 데이터를 빠르게 옮길 수 있어 시스템 효율을 높입니다.","457":"ARM 프로세서는 7가지 동작 모드를 가지며 각 모드는 표준 약어로 표기됩니다. Undefined Instruction(미정의 명령어) 모드의 올바른 약어는 UDI가 아니라 UND이므로 4번이 잘못 짝지어진 보기입니다. ARM의 주요 모드와 약어는 User(USR), FIQ(Fast Interrupt Request), IRQ(Interrupt Request), Supervisor(SVC), Abort(ABT), Undefined(UND), System(SYS)으로 정리됩니다. 1번 Supervisor-SVC, 2번 Abort-ABT, 3번 IRQ는 모두 표준 약어와 정확히 일치하므로 옳습니다. 시험에서는 UND를 UDI로 바꾸어 출제하는 함정이 자주 나오므로 미정의 명령어 모드의 약어는 UND임을 반드시 기억해야 합니다.","458":"데이터시트(datasheet)는 부품의 전기적 특성, 핀 배치, 동작 조건, 응용 회로 등을 정리한 기술 문서입니다. 데이터시트에는 제조사 이름, 핀 접속 다이어그램, 검증(응용)회로 등이 포함되지만 프로그래밍 언어의 입출력 지시어(I/O 지시어)는 소프트웨어 코딩 요소이지 부품 데이터시트의 항목이 아니므로 2번이 정답입니다. 1번 제조사 이름은 제품 식별을 위해 필수적으로 기재됩니다. 3번 핀 접속 다이어그램은 각 핀의 기능과 배치를 보여주는 핵심 정보입니다. 4번 검증 회로는 부품을 실제로 어떻게 연결해 사용하는지 보여주는 응용 예시 회로로 데이터시트에 흔히 포함됩니다.","459":"BLOB(Boot Loader Object)은 임베디드 리눅스에서 사용되는 부트로더로, 타깃 보드를 초기화하고 커널 이미지와 램디스크를 다운로드하여 운영체제를 부팅하는 역할을 합니다. 커널 이미지나 램디스크 같은 이미지를 호스트에서 타깃으로 받을 때는 직렬 통신(시리얼)이나 네트워크를 통해 다운로드하는 것이 일반적이며 병렬 통신으로 한다는 설명은 옳지 않으므로 3번이 정답입니다. 1번처럼 타깃 초기화 후 미니컴 등을 통한 CLI 접근을 제공하는 것은 맞습니다. 2번 운영체제 부팅 및 통신 인터페이스를 통한 접근, 4번 플래시 메모리 퓨징과 커널 인수 전달 기능도 부트로더의 전형적인 기능으로 옳은 설명입니다. 부트로더의 기본 통신 방식이 시리얼 또는 네트워크임을 기억하면 됩니다.","460":"교차개발(크로스 개발) 환경은 호스트 컴퓨터에서 코드를 작성하고 컴파일하여 생성한 실행파일을 호스트와 다른 아키텍처를 가진 타깃 시스템에서 실행하는 방식입니다. 반면 네이티브 컴파일은 컴파일하는 시스템과 실행하는 시스템의 아키텍처가 동일한 경우를 말하므로 교차개발과는 정반대 개념입니다. 따라서 네이티브 컴파일과 같은 개념이라고 한 4번이 옳지 않은 설명입니다. 1번 툴체인이라 부르는 크로스 개발 도구 사용, 2번 호스트에서 작성하고 컴파일, 3번 타깃에서 실행은 모두 교차개발의 정확한 특징입니다. 임베디드 환경은 자원이 제한적이어서 성능 좋은 호스트에서 개발하는 크로스 개발을 주로 사용한다는 점을 함께 기억하세요.","461":"Busybox는 여러 유닉스 명령어를 하나의 작은 실행파일로 묶은 도구로, 자원이 제한된 임베디드 시스템에 적합합니다. 일반적으로 Busybox는 정적(static)으로 컴파일 및 링크하여 동적 라이브러리 없이도 단독 실행이 가능하도록 만드는데, 1번은 동적 라이브러리 없이는 실행이 불가능하다고 했으므로 정적 링크의 장점을 정반대로 설명한 틀린 보기입니다. 2번처럼 개발자가 크로스 컴파일 환경 사용을 목적으로 개발한 것은 맞습니다. 3번 크로스컴파일 prefix만 지정하면 컴파일이 되는 점, 4번 제한된 자원의 임베디드 시스템에 유용한 점도 옳은 설명입니다. 정적 링크는 라이브러리를 실행파일 안에 포함시켜 외부 의존성을 없앤다는 점이 핵심 암기 포인트입니다.","462":"디바이스 드라이버는 하드웨어 장치를 제어하기 위한 소프트웨어로, 운영체제 커널과 하드웨어 사이에서 통신을 담당합니다. 디바이스 드라이버는 어디까지나 소프트웨어이지 하드웨어 장치 그 자체가 아니므로 2번이 틀린 설명입니다. 1번처럼 하드웨어를 제어하는 소프트웨어의 한 종류라는 정의는 정확합니다. 3번 커널모드에서 실행된다는 점, 4번 스왑(swap) 대상이 되지 않아 항상 메모리에 상주한다는 점도 디바이스 드라이버의 올바른 특징입니다. 드라이버는 소프트웨어이며 커널 영역에서 동작한다는 두 가지를 함께 기억하면 헷갈리지 않습니다.","463":"리눅스의 데몬은 백그라운드에서 특정 서비스를 담당하는 프로세스이며, 전원 관리를 담당하는 데몬은 apmd(Advanced Power Management Daemon)입니다. 따라서 1번이 정답입니다. 2번 smb는 삼바(Samba) 관련으로 윈도우와의 파일 및 프린터 공유 서비스를 담당합니다. 3번 lpd는 Line Printer Daemon으로 프린터 출력(인쇄) 서비스를 담당합니다. 4번 atd는 at 명령으로 예약된 작업을 정해진 시간에 한 번 실행하는 스케줄링 데몬입니다. 데몬 이름의 의미를 연상하면 apmd가 Advanced Power Management로 전원관리임을 쉽게 떠올릴 수 있습니다.","464":"임베디드용 프로세서들은 배터리 수명과 발열 관리를 위해 동적 주파수 조정(DFS)과 동적 전압 조정(DVS) 기능을 적극적으로 제공하므로, 이런 기능 없이 정격 전압과 주파수에서만 작동한다고 한 1번이 틀린 설명입니다. 2번 소비전력이 클럭 주파수에 비례한다는 것과 3번 전력 소비가 전압의 제곱에 비례한다는 것은 동적 전력 공식 P=CV²f에 근거한 올바른 설명입니다. 4번 CPU와 대부분의 주변장치 전원이 꺼져 최저 전력을 소비하는 모드가 슬립 모드라는 설명도 맞습니다. 전력 공식에서 전압을 낮추는 것이 제곱으로 효과가 크기 때문에 동적 전압 조정이 전력 절감에 매우 중요하다는 점을 기억하세요.","465":"shutdown 명령어의 옵션 중 -k는 실제로 시스템을 종료하지 않고 모든 사용자에게 종료 경고 메시지만 보내는 옵션이므로 3번이 정답입니다. 1번 -r은 reboot로 종료 후 재부팅을 수행합니다. 2번 -f는 fast로 재부팅 시 파일시스템 검사(fsck)를 생략합니다. 4번 -c는 cancel로 진행 중인 shutdown 예약을 취소합니다. -k의 k를 가짜(kidding) 종료로 연상하면 실제 종료 없이 경고만 보낸다는 의미를 외우기 쉽습니다.","466":"툴체인(toolchain)은 소스코드를 실행파일로 만드는 데 필요한 개발 도구의 모음으로, 컴파일러, 어셈블러, 링커, 라이브러리, 디버거, 각종 유틸리티 등으로 구성됩니다. ISP(In-System Programming)는 보드에 장착된 상태에서 마이크로컨트롤러의 플래시 메모리에 프로그램을 직접 써넣는 하드웨어 프로그래밍 기법이지 소프트웨어 빌드를 위한 툴체인 구성요소가 아니므로 3번이 정답입니다. 1번 컴파일러, 2번 라이브러리, 4번 유틸리티는 모두 툴체인의 핵심 구성요소입니다. 툴체인은 빌드 도구의 집합이고 ISP는 프로그래밍(다운로드) 방식이라는 구분이 핵심입니다.","467":"부트로더는 운영체제 커널이 메모리에 적재되어 실행되도록 준비하는 프로그램으로, 대표적으로 LILO, GRUB, BOOTLDR, U-Boot, BLOB 등이 있습니다. COMMAND는 부트로더가 아니라 일반적인 명령어를 의미하는 단어이므로 4번이 정답입니다. 1번 LILO(LInux LOader)는 초기 리눅스의 대표 부트로더입니다. 2번 GRUB(GRand Unified Bootloader)는 현재 리눅스에서 가장 널리 쓰이는 부트로더입니다. 3번 BOOTLDR은 임베디드 환경에서 쓰이는 부트로더의 하나입니다. 부트로더의 이름들을 묶어서 외우고 일반 단어인 COMMAND를 구별하면 됩니다.","468":"세마포어(Semaphore)는 공유 자원에 대한 상호배제(mutual exclusion)와 프로세스 간 동기화를 위해 사용되는 동기화 기법으로, 자원 획득 시 P 연산(wait, 감소)과 자원 반납 시 V 연산(signal, 증가) 두 가지 연산으로 동작하므로 2번이 정답입니다. 1번 데드락(교착상태)은 두 개 이상의 프로세스가 서로의 자원을 기다리며 무한 대기에 빠진 상태로 동기화 도구가 아닙니다. 3번 인터럽트는 CPU에 비동기적으로 발생하는 사건을 알리는 신호입니다. 4번 타이머는 일정 시간 경과를 측정하는 장치입니다. P연산과 V연산이라는 키워드가 나오면 세마포어임을 바로 떠올리세요.","469":"커널 포팅(porting)은 리눅스 커널 소스를 특정 타깃 시스템의 하드웨어 환경에 맞게 설정하고 컴파일하여, 생성된 커널 이미지를 그 타깃 시스템에 적재(탑재)하는 전체 과정을 말하므로 4번이 정답입니다. 1번 커널 빌드와 2번 커널 컴파일은 소스를 실행 가능한 이미지로 만드는 단계로 포팅 과정의 일부에 해당하지만 타깃 적재까지 포함하는 전체 의미는 아닙니다. 3번 커널 생성은 정식 용어가 아닙니다. 포팅은 특정 하드웨어에 맞게 이식한다는 의미가 핵심이며 설정, 컴파일, 적재를 모두 아우르는 가장 포괄적인 개념입니다.","470":"리눅스 커널 소스의 arch 디렉토리는 architecture의 약자로, 각 프로세서(CPU) 아키텍처에 의존적인 기능들이 구현되어 있어 새로운 프로세서로 포팅할 때 핵심이 되는 디렉토리이므로 1번이 정답입니다. 2번 fs는 file system으로 다양한 파일시스템 관련 코드가 들어 있습니다. 3번 lib는 커널 내부에서 사용하는 공통 라이브러리 함수들이 모여 있습니다. 4번 ipc는 프로세스 간 통신(Inter-Process Communication) 관련 코드가 구현되어 있습니다. 프로세서 의존적, 아키텍처별 코드라는 키워드가 나오면 arch를 떠올리면 됩니다.","471":"NFS(Network File System)는 네트워크를 통해 호스트의 파일시스템을 타깃에서 마운트하여 다운로드 없이 직접 접근하고 실행할 수 있게 해주는 시스템입니다. 그러나 장치 파일(디바이스 파일)과 같은 특수 파일은 실제 하드웨어와 직접 연관되므로 NFS로 연결된 원격 디렉터리에서 정상적으로 생성하거나 사용하는 데 제약이 있어, 특수 파일도 자유롭게 생성할 수 있다고 한 2번이 옳지 않은 설명입니다. 1번 다운로드 과정 없이 타깃에서 이용 가능, 3번 클라이언트 파일시스템 위에서 호스트 파일에 접근 및 실행, 4번 큰 파일도 호스트 용량에 의존해 처리 가능하다는 점은 모두 NFS의 올바른 장점입니다. NFS는 개발 단계에서 호스트와 타깃이 파일을 공유하는 데 매우 편리하다는 점이 핵심입니다.","472":"리눅스 커널의 주요 기능은 프로세스 관리, 메모리 관리, 파일 시스템 관리, 디바이스(장치) 관리, 네트워크 관리 등 시스템 자원을 직접 다루는 핵심 역할들입니다. 어플리케이션 목록 관리는 사용자 응용프로그램 차원의 관리 업무로 커널의 세부 기능이 아니므로 2번이 정답입니다. 1번 프로세스 관리는 프로세스 생성, 스케줄링, 종료를 담당하는 커널의 핵심 기능입니다. 3번 메모리 관리는 물리 및 가상 메모리 할당과 회수를 담당합니다. 4번 파일 시스템 관리는 파일의 저장과 접근을 제어합니다. 커널은 하드웨어 자원과 직결된 저수준 관리를 담당한다는 관점에서 응용프로그램 목록 관리가 예외임을 알 수 있습니다.","473":"스타트업 코드(startup code)는 보통 어셈블리어로 작성된 초기화 코드 블록으로, 프로세서 리셋 직후 스택 설정, 메모리 초기화, 변수 영역 준비 등을 수행한 뒤 main 함수로 진입하게 합니다. 이 코드는 자동으로 포함되지 않으므로 개발자가 직접 조합하여 링커를 통해 해당 오브젝트 파일을 실행파일에 포함시켜야 하므로 3번이 정답입니다. 1번 와치독 타이머는 시스템 오류 시 자동 리셋을 위한 하드웨어 타이머입니다. 2번 멀티플렉서는 여러 입력 중 하나를 선택해 출력하는 회로입니다. 4번 부트스트랩은 시스템을 처음 기동시키는 부팅 과정 자체를 가리키는 개념으로 어셈블리 블록을 직접 링크한다는 설명과는 다릅니다. 어셈블리로 작성, 링커로 직접 포함이라는 키워드가 스타트업 코드를 가리킵니다.","474":"DO_BUFFER_IO 방식은 응용 프로그램의 입출력 버퍼와 커널 입출력 관리자의 버퍼를 동기화하는 버퍼링 방식으로, 응용 프로그램이 보낸 데이터를 입출력 관리자에 동일한 버퍼로 복사하여 디바이스 드라이버가 그 버퍼를 통해 데이터를 주고받습니다. MDL(Memory Descriptor List) 구조체를 이용해 버퍼를 관리하는 것은 DO_BUFFER_IO가 아니라 Direct I/O(DO_DIRECT_IO) 방식의 특징이므로 4번이 옳지 않은 설명입니다. 1번 응용과 커널 버퍼를 동기화하는 방식, 2번 똑같은 버퍼를 만들어 복사하는 동작, 3번 드라이버가 관리자 버퍼를 통해 데이터를 주고받는 점은 모두 Buffered I/O의 올바른 설명입니다. Buffered I/O는 복사 방식, Direct I/O는 MDL을 이용한 직접 매핑 방식이라는 구분이 핵심입니다.","475":"JTAG는 경계 스캔(boundary scan)을 기반으로 칩 내부 상태를 확인하고 디버깅하는 표준 인터페이스로, 보통 CPU의 실행을 멈춘 상태(중단점에서 정지)에서 레지스터, 메모리, 스택 등의 값을 확인합니다. CPU가 정상 동작 중일 때 실시간으로 값을 확인한다는 1번은 JTAG의 일반적 동작 방식과 맞지 않아 틀린 설명입니다. 2번 전역변수 및 지역변수 값 확인, 3번 태스크 스택을 열어 실행된 함수와 값 확인, 4번 브레이크포인트 지정과 스텝 단위 실행으로 소스 라인 실행 여부 확인은 모두 JTAG 디버거의 대표적 기능입니다. JTAG는 실행을 멈추고 내부를 들여다보는 디버깅 도구라는 점을 기억하세요.","476":"리눅스 디바이스 드라이버에서 module_init()은 모듈이 커널에 적재(insmod)될 때 호출되는 초기화 함수로, 이 안에서 request_region() 등을 통해 커널로부터 I/O 자원을 할당받고 드라이버를 초기화하는 작업을 수행하므로 2번이 정답입니다. 1번 release()는 디바이스 사용이 끝나 파일을 닫을 때 호출되어 자원을 해제합니다. 3번 open()은 응용 프로그램이 디바이스 파일을 열 때 호출되어 장치 사용을 준비합니다. 4번 module_exit()는 모듈이 제거(rmmod)될 때 호출되어 할당받았던 자원을 반납하는 정리 작업을 합니다. module_init은 등록 및 초기화, module_exit은 해제 및 정리라는 짝을 이루어 기억하면 됩니다.","477":"DMA(Direct Memory Access)는 CPU의 개입 없이 입출력 장치와 주기억장치 사이에서 직접 데이터를 전송하는 방식으로, 대량의 데이터를 블록 단위로 전송하고 한 블록의 전송이 끝나면 CPU에게 인터럽트를 발생시킵니다. 따라서 1번처럼 인터럽트가 바이트 단위로 매번 생성된다는 설명은 틀렸으며, 만약 바이트 단위로 인터럽트가 발생한다면 CPU 부담이 커서 DMA의 이점이 사라집니다. 2번은 디스크 같은 고속 입출력 장치에 주로 사용된다는 점에서 옳고, 3번은 장치제어기가 CPU 간섭 없이 버퍼와 주기억장치 사이에서 직접 전송한다는 DMA의 핵심 정의로 옳습니다. 4번은 DMA가 다른 버스 방식보다 메모리 속도에 근접한 빠른 전송이 가능하다는 설명으로 옳습니다. 정리하면 DMA는 블록 단위 전송과 전송 완료 시점의 인터럽트를 특징으로 한다는 점을 기억하면 됩니다.","478":"make menuconfig는 리눅스 커널이나 빌드 시스템에서 텍스트 기반의 메뉴 형태 설정 화면을 띄워 주는 명령으로, 이 메뉴 UI를 그리기 위해 터미널 화면 제어 라이브러리인 ncurses(libncurses)가 반드시 필요합니다. 따라서 정답은 2번이며, ncurses가 설치되지 않으면 menuconfig 실행 시 라이브러리 오류가 발생합니다. 1번 ffmpeg는 오디오와 비디오 인코딩 및 디코딩 라이브러리로 멀티미디어 처리에 쓰이고, 3번 opencl은 GPU 등을 활용한 병렬 연산용 프레임워크입니다. 4번 OSS(Open Sound System)는 유닉스 계열의 사운드 처리 인터페이스로 menuconfig와 무관합니다. 텍스트 메뉴 설정은 ncurses라는 점을 암기 포인트로 기억하세요.","479":"mmap()은 파일을 프로세스의 가상 메모리 공간에 직접 대응시켜 포인터로 접근하게 해 주는 방식으로, read와 write 같은 시스템 호출을 매번 호출하지 않고 메모리 접근만으로 파일을 다루므로 오히려 오버헤드가 작습니다. 따라서 오버헤드가 크다고 한 3번이 거리가 먼(틀린) 설명이며 정답입니다. 1번은 여러 프로세스가 같은 파일을 메모리에 매핑해 공유할 수 있다는 점에서 옳고, 2번은 매핑된 영역을 포인터로 접근하므로 사용이 편리하다는 점에서 옳습니다. 4번은 메모리에 가한 변경이 파일과 자동으로 동기화되어 관리가 편리하다는 점에서 옳습니다. 핵심은 mmap이 시스템 호출 횟수를 줄여 오버헤드를 낮춘다는 점입니다.","480":"TCB(Task Control Block)는 운영체제가 각 태스크를 관리하기 위해 유지하는 자료구조로, 태스크의 ID, 현재 상태(실행, 준비, 대기 등), CPU 컨텍스트(레지스터와 프로그램 카운터 값), 우선순위, 스택 포인터 등을 저장합니다. 따라서 1번 CPU Context, 3번 태스크 상태, 4번 태스크 ID는 모두 TCB의 정당한 구성 요소입니다. 반면 2번의 '태스크의 자동화된 주소 설정'은 정의가 모호하고 TCB가 관리하는 항목이 아니므로 거리가 먼 보기로 정답이 됩니다. TCB는 문맥 교환 시 태스크의 실행 상태를 저장하고 복원하는 데 사용된다는 점을 기억하면 됩니다.","481":"문맥 교환(Context Switch)은 현재 실행 중인 프로세스의 상태(문맥)를 PCB에 저장하고 다음에 실행될 프로세스의 상태를 복원하는 과정이며, 문맥에는 CPU 레지스터 값, 프로세스 상태, 메모리 관리 정보 등이 포함됩니다. 따라서 1번, 2번, 3번은 모두 옳은 설명입니다. 그러나 인터럽트가 발생하면 현재 실행 중인 작업의 문맥을 저장하고 인터럽트 서비스 루틴으로 전환했다가 복귀해야 하므로 문맥 교환(또는 그에 준하는 상태 저장과 복원)이 수반됩니다. 따라서 인터럽트 처리가 문맥 교환 없이 가능하다고 한 4번이 거리가 먼 설명으로 정답입니다.","482":"sigprocmask는 프로세스의 시그널 마스크(차단할 시그널 집합)를 설정하거나 조회하는 시스템 호출로, 특정 시그널을 봉쇄(blocking)하여 임계 구역 등에서 방해받지 않도록 보호할 때 사용합니다. 따라서 시그널을 봉쇄하는 호출은 1번 sigprocmask가 정답입니다. 2번 sigaction은 특정 시그널이 발생했을 때 실행할 핸들러를 등록하는 함수이고, 3번 sigsetjmp는 시그널 마스크까지 포함해 실행 위치를 저장하는 비지역 점프용 함수입니다. 4번 sleep은 지정한 시간 동안 프로세스 실행을 중지시키는 함수로 시그널 봉쇄와는 무관합니다. 시그널 차단은 sigprocmask라는 점을 기억하세요.","483":"mlock 함수는 지정한 메모리 영역을 물리 메모리에 고정(lock)시켜 스왑 영역으로 페이징되지 않도록 하는 기능으로, 페이지 폴트로 인한 지연을 막아 실시간 처리나 보안이 중요한 데이터에 사용됩니다. 그러나 mlock은 페이징만 금지할 뿐 메모리를 읽기 전용으로 만들지는 않으므로, 1번 '읽기 전용으로 만든다'는 거리가 먼 설명으로 정답입니다. 메모리 보호 속성(읽기 전용 등)은 mprotect 함수가 담당합니다. 2번은 실시간 처리에 적용한다는 점, 3번은 페이징을 금지한다는 핵심 기능, 4번은 보안이 중요한 메모리(스왑되어 디스크에 노출되는 것을 방지)에 적용한다는 점에서 모두 옳습니다.","484":"페이지 오류율(Page Fault Rate)은 요청한 페이지가 주기억장치에 없어 디스크에서 가져와야 하는 비율을 뜻하고, 스래싱(Thrashing)은 페이지 교체가 지나치게 빈번해 CPU가 실제 작업보다 페이지 교체에 더 많은 시간을 쓰는 현상입니다. 페이지 오류가 많이 발생할수록 그만큼 페이지 교체가 잦아져 스래싱이 심해지므로, 페이지 오류율이 크면 스래싱이 많이 발생한다는 1번이 옳은 설명으로 정답입니다. 2번은 둘이 밀접한 관계가 있으므로 틀리고, 3번은 스래싱이 심하면 오히려 오류율이 증가하므로 틀립니다. 4번은 다중 프로그래밍 정도가 일정 수준을 넘으면 오류율과 스래싱이 급증하므로 감소한다는 설명은 틀립니다.","485":"세마포어(Semaphore)는 Dijkstra가 제안한 동기화 도구로, 공유 자원에 대한 접근을 제어하기 위해 사용되며 P연산(wait, 자원 획득)과 V연산(signal, 자원 반납) 두 가지 원자적 연산으로 접근합니다. 세마포어 변수는 사용 가능한 자원의 수를 나타내며 음수 값도 가질 수 있는데, 음수일 경우 그만큼의 프로세스가 대기 중임을 의미합니다. 따라서 '양의 정수 값만 가질 수 있다'고 한 2번이 틀린 설명으로 정답입니다. 1번은 자원 접근 제어라는 목적, 3번은 P와 V 연산, 4번은 Dijkstra 제안이라는 점에서 모두 옳은 설명입니다. 참고로 0과 1만 가지는 것은 이진 세마포어이며 일반 세마포어는 그렇지 않습니다.","486":"리눅스에서 부착된 장치명, 마운트할 디렉토리(마운트 포인트), 파일시스템 타입, 마운트 옵션 등을 기록해 부팅 시 자동 마운트에 사용하는 파일은 /etc/fstab(file system table)이므로 정답은 3번입니다. 1번 /etc/shadow는 사용자 계정의 암호화된 비밀번호와 만료 정보를 저장하는 파일이고, 2번 /etc/hosts는 호스트 이름과 IP 주소의 정적 매핑을 담은 파일입니다. 4번 /etc/issue는 로그인 전에 출력되는 안내 메시지(배너)를 담은 파일입니다. 마운트 정보는 fstab이라는 점을 암기하면 됩니다.","487":"선점(Preemptive) 스케줄링은 실행 중인 프로세스가 끝나기 전에도 운영체제가 강제로 CPU를 빼앗아 다른 프로세스에 할당할 수 있는 방식으로, 보기 중에서는 SRT(Shortest Remaining Time)가 이에 해당하여 정답은 4번입니다. SRT는 SJF의 선점형 버전으로 더 짧은 잔여 시간을 가진 프로세스가 도착하면 즉시 교체합니다. 1번 FCFS(First Come First Served), 2번 SJF(Shortest Job First), 3번 HRN(Highest Response ratio Next)은 모두 비선점(Non-preemptive) 방식입니다. 대표적 선점형으로는 SRT, 라운드로빈, 다단계 큐 등이 있다는 점을 기억하세요.","488":"교착 상태(Deadlock)가 발생하기 위한 네 가지 필요조건은 상호 배제(Mutual Exclusion), 점유 및 대기(Hold and Wait), 비선점(No Preemption), 순환 대기(Circular Wait)입니다. 따라서 보기에서 '선점'은 조건이 아니며 오히려 '비선점'이 조건이므로 3번이 정답입니다. 즉 자원을 강제로 빼앗을 수 없어야(비선점) 교착이 발생하며, 선점이 가능하면 교착을 예방할 수 있습니다. 1번 상호 배제는 한 번에 한 프로세스만 자원을 사용하는 조건, 2번 점유 및 대기는 자원을 가진 채 다른 자원을 기다리는 조건, 4번 순환 대기는 프로세스들이 원형으로 자원을 기다리는 조건으로 모두 옳습니다.","489":"UDP 헤더는 매우 단순하여 출발지 포트번호, 목적지 포트번호, 길이(Length), 체크섬(Checksum)의 네 가지 필드만으로 구성됩니다. 따라서 1번, 2번, 3번은 모두 UDP 헤더에 포함되는 내용입니다. 반면 4번의 플래그 비트(SYN, ACK, FIN 등)는 연결 제어를 수행하는 TCP 헤더의 구성 요소이므로, UDP 헤더에 들어가지 않는 4번이 정답입니다. UDP는 비연결형이라 순서번호, 확인응답번호, 플래그 같은 연결 관리용 필드가 없다는 점이 TCP와의 핵심 차이입니다.","490":"카피레프트(Copyleft)는 저작권(Copyright)에 대비되는 개념으로, 저작물의 소유권은 저자가 갖되 그것을 자유롭게 사용, 수정, 재배포할 수 있도록 허용하고 그 파생물도 동일한 자유를 유지하도록 하자는 개념입니다. 따라서 정답은 2번이며, 대표적으로 GNU GPL 라이선스가 카피레프트를 구현합니다. 1번 비공개 소프트웨어, 3번 정보 독점, 4번 유료 소프트웨어는 모두 자유로운 공유를 지향하는 카피레프트의 취지와 정반대 개념입니다. 카피레프트는 자유의 확산을 보장하는 라이선스 철학이라는 점을 기억하세요.","491":"키보드에서 Ctrl-C를 누르면 SIGINT(인터럽트 시그널)가 발생하여 프로그램이 중단됩니다. 이를 무시하려면 signal 함수로 SIGINT에 대한 처리를 SIG_IGN(무시)으로 지정해야 하므로 정답은 2번 signal(SIGINT, SIG_IGN)입니다. 1번 SIGFPE는 부동소수점 연산 오류(0으로 나누기 등)에 대한 시그널이고 SIG_DFL은 기본 동작이라 무시가 아닙니다. 3번 SIGQUIT는 Ctrl-\\에 해당하며 SIG_DFL은 기본 동작입니다. 4번 SIGUSR1은 사용자 정의 시그널로 Ctrl-C와 무관합니다. SIG_IGN은 시그널 무시, SIG_DFL은 기본 처리라는 점을 구분해 기억하세요.","492":"유닉스와 리눅스에서 모든 사용자가 로그인할 때마다 시스템 전역적으로 자동 실행되어 PATH 변수, 프롬프트(PS1), 기본 환경 변수 등을 설정해 주는 파일은 /etc/profile이므로 정답은 2번입니다. 1번 /etc/resolv.conf는 DNS 서버 주소 등 이름 해석 정보를 담은 파일이고, 3번 /etc/passwd는 사용자 계정 정보(사용자명, UID, 홈 디렉토리, 셸 등)를 담은 파일입니다. 4번 /etc/aliases는 메일 별칭(메일 전달 규칙)을 정의하는 파일입니다. 시스템 전역 로그인 환경 설정은 /etc/profile, 개인별 설정은 홈 디렉토리의 .profile이나 .bashrc라는 점을 함께 기억하세요.","493":"유닉스 시그널 중 SIGHUP(Hangup)은 터미널 연결이 끊기거나 제어 프로세스가 종료될 때 발생하는 시그널로, 키보드 Ctrl-S와는 관계가 없습니다. Ctrl-S는 화면 출력을 일시 정지시키는 흐름 제어(XOFF) 기능일 뿐 SIGHUP을 발생시키지 않으므로 3번이 틀린 설명으로 정답입니다. 1번 SIGINT는 Ctrl-C, 2번 SIGQUIT는 Ctrl-\\, 4번 SIGTSTP는 Ctrl-Z(프로세스 일시 중지)로 모두 올바른 매핑입니다. 주요 단축키와 시그널 대응 관계를 정확히 외워 두면 좋습니다.","494":"프로세스가 생성될 때 메모리에는 코드(텍스트) 세그먼트, 데이터 세그먼트, 힙 세그먼트, 스택 세그먼트가 할당됩니다. 코드 세그먼트는 실행할 명령어를, 데이터 세그먼트는 전역 변수와 정적 변수를, 힙은 동적 할당 영역을, 스택은 지역 변수와 함수 호출 정보를 담습니다. 따라서 1번 코드, 2번 스택, 3번 힙은 모두 정당한 세그먼트이며, '프레임 세그먼트'라는 것은 표준 메모리 구조에 존재하지 않으므로 4번이 정답입니다. 참고로 스택 안의 함수 호출 단위를 스택 프레임이라 부르지만 이는 별도의 세그먼트가 아닙니다.","495":"리눅스 디바이스 드라이버는 데이터 처리 방식에 따라 크게 세 가지로 분류되는데, 바이트 단위로 순차 처리하는 문자 디바이스(character), 블록 단위로 임의 접근하는 블록 디바이스(block), 그리고 네트워크 패킷을 다루는 네트워크 디바이스(network)입니다. 따라서 1번, 2번, 3번은 모두 정당한 분류이며, '제어 디바이스'라는 종류는 표준 분류에 존재하지 않으므로 4번이 정답입니다. 문자 디바이스는 키보드나 마우스, 블록 디바이스는 하드디스크나 SSD, 네트워크 디바이스는 이더넷 카드가 대표적인 예입니다.","496":"최적 적합(Best-fit)은 프로그램을 수용할 수 있는 빈 공간(가용 분할) 중에서 크기가 가장 작은(가장 잘 맞는) 곳에 할당하여 내부 단편화를 최소화하는 기법입니다. 15K 크기의 프로그램을 넣을 수 있는 영역들 중에서 15K보다 크면서 남는 공간이 가장 적은 곳을 선택하게 되며, 문제의 메모리 상태표에서 그 조건에 가장 부합하는 곳이 D 영역이므로 정답은 2번입니다. 최초 적합(First-fit)은 위에서부터 처음 맞는 곳, 최악 적합(Worst-fit)은 가장 큰 곳에 할당한다는 점과 비교해 기억하면 좋습니다. 이미지로 제시된 구체적 수치는 D 영역이 15K를 담을 수 있는 가장 작은 가용 공간이라는 전제에서 답이 결정됩니다.","497":"정답은 2번 fork입니다. fork() 함수는 유닉스/리눅스 계열 운영체제에서 현재 실행 중인 프로세스(부모)를 그대로 복제하여 자식 프로세스를 생성하는 시스템 호출로, 부모의 코드, 데이터, 힙, 스택 등의 주소 공간을 복사한 새 프로세스를 만들어냅니다. fork()는 호출 후 부모에게는 자식의 PID를, 자식에게는 0을 반환하여 두 프로세스를 구분할 수 있게 해주는 것이 핵심 암기 포인트입니다. 1번 create는 일반적인 생성 의미의 단어일 뿐 프로세스 복제 표준 함수가 아닙니다. 3번 exec는 현재 프로세스의 메모리 이미지를 새로운 프로그램으로 덮어쓰며 교체하는 함수로 복제가 아니라 변신에 해당하며 보통 fork 이후 자식에서 호출됩니다. 4번 memcpy는 메모리 블록의 내용을 다른 위치로 복사하는 표준 라이브러리 함수로 프로세스와는 무관합니다.","498":"정답은 2번 calloc입니다. calloc(개수, 크기) 함수는 힙 영역에 지정한 크기의 메모리를 할당한 뒤 그 영역을 모두 0(NULL)으로 초기화해주는 것이 가장 큰 특징입니다. 반면 malloc은 메모리를 할당하지만 초기화하지 않아 쓰레기값이 남아 있다는 점에서 calloc과 구별되며 이는 시험 단골 비교 포인트입니다. 1번 munlock은 메모리를 잠금 해제(페이징 허용)하는 함수로 할당과 무관합니다. 3번 realloc은 이미 할당된 메모리의 크기를 재조정(확장/축소)하는 함수이며 초기화 기능은 없습니다. 4번 free는 할당했던 힙 메모리를 운영체제에 반환(해제)하는 함수입니다.","499":"정답은 4번 125입니다. 표본화 주기는 표본화 주파수의 역수로 구하므로 주기 T = 1 / f 입니다. 표본화 주파수가 8KHz = 8000Hz이므로 주기 T = 1 / 8000초 = 0.000125초이며 이를 마이크로초 단위로 환산하면 125us가 됩니다. 즉 1초에 8000번 표본을 채취하므로 한 표본 사이의 시간 간격이 125us라는 의미입니다. 1번 8, 2번 80, 3번 100은 단순 환산 오류로 1/8000을 잘못 계산하거나 단위 변환을 틀린 값에 해당하며, PCM에서 주파수와 주기는 역수 관계라는 공식만 정확히 적용하면 125us가 도출됩니다.","500":"정답은 2번입니다. 트리의 차수(degree of tree)란 트리 내 모든 노드들이 가진 자식 노드 수(노드의 차수) 중에서 가장 큰 값을 의미합니다. 이미지로 제시된 트리에서 어떤 노드가 최대 2개의 자식을 가지는 구조라면 그 트리의 차수는 2가 됩니다. 노드의 차수는 그 노드에 직접 연결된 자식의 개수이고, 트리의 차수는 그 최댓값임을 구분하는 것이 핵심입니다. 보기 중 1, 3, 6은 특정 노드의 차수나 전체 노드 수 등을 혼동한 값일 수 있으며, 제시된 그림 기준으로 자식이 가장 많은 노드의 자식 수가 2이므로 정답은 2입니다.","501":"정답은 4번 기능 검증 기준입니다. 화이트박스 테스트는 프로그램의 내부 논리 구조와 소스 코드를 직접 들여다보며 검증하는 기법으로, 문장(구문) 검증, 분기(조건) 검증, 경로 검증 등 코드의 흐름을 기준으로 삼습니다. 따라서 1번 문장 검증, 2번 경로 검증, 3번 조건 검증은 모두 화이트박스 테스트의 정당한 검증 기준에 해당합니다. 반면 4번 기능 검증은 내부 구조를 보지 않고 입력에 대한 출력이 명세대로 나오는지를 확인하는 블랙박스 테스트의 기준이므로 화이트박스와는 거리가 멉니다. 화이트박스는 내부 코드 중심, 블랙박스는 기능/명세 중심이라는 대비를 기억하면 쉽게 구분할 수 있습니다.","502":"정답은 2번 Durability Diagram입니다. UML(Unified Modeling Language)에는 정해진 다이어그램들이 있는데, 크게 구조 다이어그램과 행위 다이어그램으로 나뉩니다. 1번 Use Case Diagram(유스케이스), 3번 Class Diagram(클래스), 4번 State Diagram(상태)은 모두 UML의 정식 다이어그램에 해당합니다. 2번 Durability Diagram은 UML에 존재하지 않는 가짜 이름으로, durability(지속성/내구성)는 데이터베이스 트랜잭션의 ACID 속성에서 쓰이는 용어이지 UML 다이어그램이 아닙니다. UML 대표 다이어그램으로 유스케이스, 클래스, 시퀀스, 상태, 활동 다이어그램 등을 묶어 기억해 두면 좋습니다.","503":"정답은 3번 (!(A && B))입니다. 이것은 드모르간의 법칙(De Morgan's law)을 적용한 문제로, (NOT A) OR (NOT B)는 NOT (A AND B)와 논리적으로 동등합니다. 즉 (!A) || (!B) = !(A && B)가 성립하며, 두 명제 중 하나라도 거짓이면 전체가 참이 되는 동일한 진리값을 가집니다. 1번 (!(A || B))는 드모르간 법칙에 의해 (!A) && (!B)와 같으므로 원식과 다릅니다. 2번 (!A) && (!B)는 OR이 아닌 AND이므로 원식과 다른 결과를 냅니다. 4번 true는 A, B 값에 따라 결과가 달라지므로 항상 참이 아니어서 틀립니다. 드모르간 법칙 두 가지(부정의 분배 시 AND와 OR이 서로 바뀜)를 암기하면 됩니다.","504":"정답은 3번 D B E F C A입니다. 후위 순회(postorder)는 왼쪽 서브트리, 오른쪽 서브트리, 루트 순서로 방문하는 방식으로, 자식들을 먼저 처리한 뒤 마지막에 루트를 방문하는 것이 특징입니다. 제시된 트리에서 후위 순회를 적용하면 가장 깊은 왼쪽부터 자식들이 먼저 출력되고 루트인 A가 가장 마지막에 나오게 되어 D B E F C A가 됩니다. 후위 순회의 핵심은 루트가 항상 마지막에 방문된다는 점으로, 보기 중 마지막 글자가 A인 것을 우선 후보로 좁힐 수 있습니다. 1번과 4번은 루트 A가 맨 앞이나 중간에 와서 전위/잘못된 순회이고, 2번은 중위 순회(왼쪽-루트-오른쪽) 결과에 가까워 후위와 다릅니다.","505":"정답은 2번 Method(메소드)입니다. 객체지향에서 메소드는 객체가 수행해야 할 구체적인 동작이나 연산을 정의한 함수로, 객체의 행위(behavior)를 구현하는 부분입니다. 객체는 속성(데이터)과 메소드(연산)로 구성되는데, 그 중 실제로 무엇을 어떻게 처리할지를 코드로 정의한 것이 바로 메소드입니다. 1번 Class는 같은 속성과 메소드를 가진 객체들을 생성하기 위한 틀(설계도)로 연산 자체의 정의가 아닙니다. 3번 Public은 멤버의 접근 범위를 지정하는 접근 제한자입니다. 4번 Reliability(신뢰성)는 소프트웨어 품질 특성의 하나로 객체의 연산 정의와는 무관합니다.","506":"정답은 3번 B C D A입니다. 스택은 후입선출(LIFO) 구조로 가장 마지막에 push된 자료가 먼저 pop됩니다. 연산을 순서대로 따라가면 push A(스택 A), push B(스택 A B), pop(B 출력, 스택 A), push C(스택 A C), pop(C 출력, 스택 A), push D(스택 A D), pop(D 출력, 스택 A), pop(A 출력)이 되어 출력 순서는 B, C, D, A가 됩니다. 핵심은 매 pop 연산이 항상 스택의 맨 위(top) 원소를 꺼낸다는 점을 정확히 추적하는 것입니다. 나머지 보기들은 push/pop 시점에서 top 원소를 잘못 판단한 결과로, 특히 마지막에 남아 가장 늦게 나오는 A의 위치를 틀리기 쉽습니다.","507":"정답은 1번입니다. 1번 설명인 삽입과 삭제가 리스트의 양쪽 끝단에서 모두 발생하는 자료구조는 큐가 아니라 데크(Deque, double-ended queue)에 대한 설명이므로 큐와 거리가 멉니다. 큐는 한쪽 끝(rear)에서 삽입하고 반대쪽 끝(front)에서만 삭제가 일어나는 구조입니다. 2번 선입선출(FIFO) 방식으로 먼저 들어온 데이터가 먼저 나가는 것은 큐의 정확한 정의입니다. 3번 운영체제의 작업 스케줄링(JOB 스케줄링)이나 버퍼 등에 큐가 사용되는 것은 맞는 설명입니다. 4번 큐는 삽입을 관리하는 Rear와 삭제를 관리하는 Front 두 포인터를 사용한다는 것도 옳은 설명입니다.","508":"정답은 3번 허프만 코딩 기법입니다. 허프만 코딩(Huffman coding)은 통계적(엔트로피) 부호화의 대표적 방식으로, 데이터의 출현 빈도를 분석하여 자주 나오는 데이터에는 짧은 비트의 코드를, 드물게 나오는 데이터에는 긴 비트의 코드를 할당함으로써 전체 데이터 크기를 줄이는 무손실 압축 기법입니다. 빈도 기반 가변 길이 부호화라는 점이 핵심 암기 포인트입니다. 1번 색참조 기법은 색상 팔레트를 이용한 이미지 표현 방식이고, 2번 거리벡터 기법은 네트워크 라우팅 알고리즘에 쓰이는 용어입니다. 4번 와이어 프레임 모델링은 3차원 물체를 선으로 표현하는 컴퓨터 그래픽스 기법으로 데이터 압축과 무관합니다.","509":"정답은 1번 토큰입니다. 컴파일러의 어휘 분석(lexical analysis) 단계는 원시 프로그램을 문자 단위로 스캐닝하여 문법적으로 의미 있는 최소 단위로 분할하는데, 이 분할된 단위를 토큰(token)이라고 부릅니다. 토큰은 식별자, 키워드, 연산자, 상수, 구분 기호 등 언어 문법에서 의미를 갖는 가장 작은 단위입니다. 2번 오토마타는 토큰을 인식하기 위한 상태 기계 이론적 모델로 토큰 자체가 아닙니다. 3번 BNF는 프로그래밍 언어의 문법(구문)을 형식적으로 표기하는 표기법입니다. 4번 모듈은 프로그램을 기능 단위로 나눈 큰 구성 요소로 어휘 단위와는 차원이 다릅니다.","510":"정답은 2번 51, 53입니다. 첫 번째 printf에서 a++는 후위 증가 연산자로, 현재 값 51을 먼저 출력에 사용한 뒤 a를 52로 증가시킵니다. 따라서 첫 출력은 51이고 이후 a는 52가 됩니다. 두 번째 printf에서 ++a는 전위 증가 연산자로, a를 먼저 53으로 증가시킨 뒤 그 값을 출력하므로 53이 출력됩니다. 후위 증가(a++)는 값을 사용한 후 증가, 전위 증가(++a)는 증가한 후 값을 사용한다는 차이가 핵심입니다. 결과적으로 51 다음에 53이 출력되어 정답은 2번이며, 나머지 보기들은 두 증가 연산자의 적용 시점을 혼동한 값입니다.","511":"정답은 4번 super입니다. 자바에서 super 키워드는 하위(자식) 클래스가 자신이 상속받은 상위(부모) 클래스의 멤버 변수나 메소드, 생성자를 참조하거나 호출할 때 사용합니다. 예를 들어 super.메소드명()으로 부모의 메소드를 호출하거나 super()로 부모 생성자를 호출할 수 있습니다. 참고로 같은 객체 자신을 가리킬 때는 this를 사용하므로 super와 this를 짝으로 기억하면 좋습니다. 1번 uni, 2번 out, 3번 li는 자바의 상속 참조용 예약어가 아닌 의미 없는 단어들로 모두 틀린 보기입니다.","512":"정답은 4번 히스토그램입니다. 영상처리에서 히스토그램은 영상 내 각 명암값(밝기 레벨)이 몇 개의 화소에 나타나는지를 막대그래프 형태로 보여주는 가장 기본적인 분석 기법으로, 영상의 밝기 분포 즉 명암값 프로필을 한눈에 파악할 수 있게 해줍니다. 히스토그램 평활화나 스트레칭 같은 명암 대비 개선의 기초가 되는 개념입니다. 1번 블러링은 영상을 흐리게 하여 잡음을 줄이는 처리이고, 2번 마스크 연산은 작은 행렬(커널)을 이용한 영역 기반 화소 연산입니다. 3번 에지 추출은 명암이 급격히 변하는 경계선을 찾아내는 기법으로 명암 분포 표시와는 목적이 다릅니다.","513":"정답은 3번 char입니다. C언어에서 문자(character) 자료형을 선언할 때는 char를 사용하며, char는 1바이트 크기로 하나의 문자나 작은 정수를 저장합니다. 문자열은 char 배열(char str[])이나 char 포인터로 표현하므로 문자/문자열 처리의 기본이 char형입니다. 1번 int는 정수형, 2번 double은 배정밀도 실수형, 4번 float은 단정밀도 실수형으로 모두 숫자를 저장하는 자료형이며 문자 선언에는 사용하지 않습니다. 자료형별 용도와 크기(char 1바이트, int 보통 4바이트, float 4바이트, double 8바이트)를 함께 정리해 두면 좋습니다.","514":"정답은 4번 Compile 오류 발생입니다. 이 코드는 char string1[]; 처럼 크기도 초기값도 없이 배열을 선언했는데, C에서 배열은 선언 시 크기나 초기화 목록이 반드시 필요하므로 이 자체가 컴파일 오류를 일으킵니다. 또한 string1 = string2; 처럼 배열 이름에 다른 배열을 직접 대입하는 것도 불가능한데, 배열명은 상수 포인터로서 대입의 좌변이 될 수 없기 때문입니다. 문자열 복사는 strcpy 함수를 써야 하며 = 연산자로는 복사되지 않는다는 점이 중요한 학습 포인트입니다. 따라서 정상 실행되어 S나 Second, econd가 출력되는 1, 2, 3번은 모두 성립할 수 없고 컴파일 단계에서 오류가 나므로 4번이 정답입니다.","516":"정답은 4번 virtual입니다. 자바의 접근 제한자(접근 제어자)는 멤버의 접근 범위를 지정하는 키워드로 public(어디서나 접근 가능), protected(같은 패키지 및 상속받은 자식 클래스에서 접근 가능), default(같은 패키지 내에서만 접근 가능), private(같은 클래스 내에서만 접근 가능) 네 가지가 있습니다. 1번 public, 2번 protected, 3번 private는 모두 정식 접근 제한자입니다. 4번 virtual은 C++에서 가상 함수를 선언할 때 쓰는 키워드로 자바에는 존재하지 않으며 접근 제한자도 아닙니다. 자바는 메소드 오버라이딩이 기본적으로 가능하므로 virtual 키워드가 필요 없다는 점도 함께 기억하면 좋습니다.","517":"정답은 4번 실행 분석 도구입니다. 정적 분석(static analysis) 도구는 프로그램을 실제로 실행하지 않고 소스 코드 자체를 분석하여 결함, 코딩 표준 위반, 구조적 문제 등을 찾아내는 도구입니다. 1번 코드 분석 도구, 2번 데이터 분석 도구, 3번 순서(흐름) 검사 도구는 모두 코드를 실행하지 않고 정적으로 점검하는 정적 분석 도구에 해당합니다. 반면 4번 실행 분석 도구는 프로그램을 실제로 실행시키면서 동작과 결과를 관찰하는 동적 분석(dynamic analysis) 도구이므로 정적 분석 도구가 아닙니다. 정적은 실행하지 않고 코드 검사, 동적은 실행하며 검사라는 구분이 핵심 암기 포인트입니다.","518":"C언어 이스케이프 시퀀스에서 \\n은 줄바꿈(new line, line feed)을 의미하며 null character가 아닙니다. null character(널 문자)는 \\0으로 표기하고 문자열의 끝을 나타내는 아스키 값 0인 문자이므로, \\n을 null character로 설명한 4번은 틀린 설명입니다. 따라서 옳지 않은 것을 고르는 문제에서 정답은 4번입니다. 1번의 \\r는 carriage return(커서를 줄 맨 앞으로 복귀)으로 옳고, 2번의 \\b는 backspace(한 칸 뒤로 이동), 3번의 \\t는 tab(수평 탭)으로 모두 올바른 설명입니다. 암기 포인트로 \\n은 개행, \\r는 복귀, \\t는 탭, \\b는 백스페이스, \\0은 널 문자임을 구분해 두면 좋습니다.","519":"ARM 명령어는 기본적으로 32비트 폭을 갖는데, 이를 16비트로 압축하여 코드 밀도를 높이고 16비트 버스 환경에서도 효율적으로 동작하도록 만든 명령어 세트가 THUMB입니다. THUMB 명령어는 코드 크기를 줄여 메모리 사용량과 비용을 절감할 수 있어 임베디드 시스템에 적합하며, 정답은 4번입니다. 1번 FIQ(Fast Interrupt Request)와 2번 IRQ(Interrupt Request)는 ARM의 인터럽트 처리 모드를 가리키는 용어로 명령어 세트와 무관합니다. 3번 MMU(Memory Management Unit)는 가상 주소를 물리 주소로 변환하고 메모리를 보호하는 하드웨어 장치입니다. 따라서 16비트로 압축한 명령어 세트는 THUMB이 맞습니다.","520":"프로그램카운터(PC)는 다음에 실행할 명령어의 주소를 저장하는 레지스터로, 분기(Jump)가 발생하면 실행 흐름이 다른 주소로 옮겨지므로 PC의 값을 목적지 주소로 가장 먼저 변경해야 합니다. 분기 명령은 결국 PC에 새로운 주소를 적재하여 실행 위치를 바꾸는 동작이므로 정답은 2번입니다. 1번 명령 레지스터(IR)는 현재 인출된 명령어를 저장하는 레지스터이고, 3번 누산기(Accumulator)는 산술논리연산의 결과를 임시 저장하는 레지스터입니다. 4번 인덱스 레지스터는 주소 계산 시 변위(오프셋)를 더하는 용도로 사용됩니다. 분기 동작의 핵심은 PC 변경이라는 점을 기억하세요.","521":"VHDL에서 문장과 문장의 구별, 즉 문장의 끝을 나타내는 기호는 콜론(:)이 아니라 세미콜론(;)입니다. 콜론은 신호 이름과 자료형을 구분하거나 레이블을 붙일 때 사용하므로, 문장 구별을 콜론으로 한다고 설명한 2번이 틀린 설명입니다. 따라서 정답은 2번입니다. 1번처럼 VHDL은 대소문자를 구분하지 않으며, 3번처럼 두 개의 하이픈(- -) 이후부터 그 줄 끝까지는 주석으로 처리됩니다. 4번처럼 식별자(이름)의 첫 문자로 숫자나 특수문자를 쓸 수 없고 반드시 알파벳으로 시작해야 한다는 규칙도 옳습니다.","522":"가상기억장치(virtual memory)는 보조기억장치(디스크 등)의 일부를 주기억장치처럼 활용하여, 실제 물리적 메모리보다 더 큰 주소 공간을 프로그램에 제공하는 기법입니다. 즉 부족한 메모리 공간을 논리적으로 확대하는 것이 가장 큰 목적이므로 정답은 2번입니다. 1번 접근시간 단축은 캐시 메모리의 목적이며, 가상기억은 오히려 디스크 접근 때문에 속도가 느려질 수 있습니다. 3번 동시에 여러 단어를 탐색하는 것은 연상기억장치(CAM)의 특징이고, 4번 단순한 주소지정은 가상기억의 목적과 거리가 멉니다. 가상기억은 페이징이나 세그멘테이션 기법으로 구현된다는 점도 함께 알아두세요.","523":"Memory mapped I/O(메모리 맵 입출력)는 주기억장치의 주소 공간 일부를 I/O 장치의 레지스터에 할당하여, 메모리를 읽고 쓰는 것과 동일한 명령어로 입출력 장치를 제어하는 방식입니다. 별도의 I/O 전용 명령어 없이 일반 메모리 접근 명령으로 장치를 다룰 수 있다는 점이 핵심이므로 정답은 3번입니다. 2번과 4번처럼 입출력 전용 주소 공간과 전용 명령어를 사용하는 방식은 Isolated I/O(포트 맵 입출력)에 해당하므로 틀립니다. 1번 I2C, SPI는 시리얼 통신 버스의 종류로 메모리 맵 I/O 개념과 직접 관련이 없습니다. 메모리 맵 방식은 주소 공간을 메모리와 I/O가 공유한다는 점을 기억하세요.","524":"더하기, 빼기, 루프(반복) 명령만 있어도 곱셈은 같은 수를 여러 번 더하는 반복 연산으로 구현할 수 있습니다. 예를 들어 7*2는 7을 2번 더하면 14가 되므로, 더하기를 루프로 반복 처리하여 곱셈 결과를 구할 수 있다는 4번이 옳은 설명입니다. 따라서 정답은 4번입니다. 3번의 7/2 나눗셈도 빼기를 반복하여 몫과 나머지를 구할 수 있으나, 이 보기는 몫만 알 수 있다고 한정 짓는 표현 외에 전체적으로 4번이 더 명확한 정답입니다. 1번처럼 변수 값이 2개로만 제한되지 않으며, 2번처럼 빼기와 비교를 통해 특정 패턴 값을 찾는 연산도 가능하므로 틀립니다. 기본 산술과 반복만으로 모든 사칙연산을 구현할 수 있다는 점이 핵심입니다.","525":"UART는 시리얼 통신에서 데이터를 전송할 때 일반적으로 최하위 비트(LSB, Least Significant Bit)를 먼저 보내는 방식을 사용합니다. 따라서 상위비트(MSB)를 먼저 보낸다고 설명한 4번은 틀린 설명이므로 정답은 4번입니다. 1번처럼 8데이터 비트, 패리티 없음(NONE), 1정지비트는 흔히 쓰는 8N1 설정으로 옳습니다. 2번처럼 시작 비트는 항상 Low(0), 정지 비트는 항상 High(1)로 라인 상태를 표시하며, 3번처럼 8비트 데이터는 0부터 255까지의 값을 표현할 수 있어 옳습니다. UART는 LSB 먼저 전송한다는 점을 반드시 기억하세요.","526":"데이지 체인(Daisy Chain) 방식은 여러 장치가 인터럽트를 요청했을 때 우선순위를 정하기 위해, 인터럽트 확인(Acknowledge) 신호를 장치들이 직렬(체인) 형태로 연결하여 순차적으로 전달하는 하드웨어 우선순위 방식입니다. CPU가 보낸 인터럽트 확인 신호가 가장 가까운 장치부터 차례로 전달되며 자신이 요청한 장치에서 멈추므로, 체인으로 연결되는 신호는 인터럽트 확인 신호이고 정답은 4번입니다. 1번 주소 버스와 2번 데이터 버스는 모든 장치가 공통으로 연결되는 버스이지 체인 구조가 아닙니다. 3번 인터럽트 요청 신호는 장치들이 CPU로 보내는 신호로, 데이지 체인에서 체인을 따라 전달되는 것은 요청이 아니라 확인 신호입니다. 데이지 체인은 물리적 연결 위치가 곧 우선순위가 된다는 특징이 있습니다.","527":"서미스터(thermistor)는 온도(thermal)와 저항(resistor)의 합성어로, 온도가 변하면 저항값이 변하는 특성을 가진 온도 감지용 트랜스듀서입니다. 온도 변화에 응답하여 변하는 물리량은 저항이므로 정답은 3번입니다. 일반적으로 NTC 서미스터는 온도가 오르면 저항이 감소하고, PTC 서미스터는 온도가 오르면 저항이 증가합니다. 1번 전압, 2번 전류, 4번 커패시터(정전용량)는 서미스터가 직접 온도에 따라 변화시키는 양이 아닙니다. 서미스터는 저항 변화를 측정하여 온도를 알아내는 소자라는 점을 기억하세요.","529":"8421 코드는 일반적인 BCD 코드로 각 비트의 가중치가 8,4,2,1이고, 2421 코드는 가중치가 2,4,2,1인 자보수(self-complementing) 코드입니다. 10진수 7을 8421로 나타내면 0111(4+2+1=7)이고, 2421 코드로 나타내면 1101(2+4+0+1=7)이 되어 두 표현이 모두 올바른 3번이 정답입니다. 1번은 3의 2421코드를 0010(=2)로 잘못 적었고(올바른 값은 0011), 2번은 5의 8421코드를 0111(=7)로 잘못 적었으며(올바른 값은 0101), 4번은 9의 2421코드를 1110(=2+4+1=7로 오류)으로 잘못 표기했습니다(9의 2421코드는 1111). 가중치를 곱해 합이 해당 10진수가 되는지 확인하면 정답을 검증할 수 있습니다.","530":"이더넷(Ethernet)은 유선 LAN(근거리 통신망)의 대표적인 표준 기술이지 초광대역(UWB) 무선 기술이 아닙니다. 따라서 이더넷을 대표적인 UWB 무선기술이라고 설명한 2번이 틀린 설명이며 정답은 2번입니다. 1번처럼 와이파이는 무선으로 데이터를 전송하는 시스템을 가리키는 말로 옳고, 3번처럼 이더넷은 CSMA/CD(반송파 감지 다중접속/충돌 검출) 방식으로 매체 접근을 제어하는 것이 맞습니다. 4번처럼 와이파이는 초고속 인터넷망에 AP(무선접속장치)를 설치해 여러 단말이 무선으로 인터넷에 접속하는 기술로 옳습니다. UWB는 매우 넓은 주파수 대역을 사용하는 근거리 무선기술로 이더넷과는 다른 개념입니다.","532":"임베디드 소프트웨어 플랫폼을 규모별로 분류할 때 보통 표준형, 마이크로형, 나노형 등으로 나누는데, 스마트형은 규모(크기) 기준의 분류에 포함되지 않습니다. 따라서 규모별 종류가 아닌 것을 고르면 정답은 3번 스마트형입니다. 1번 표준형은 비교적 자원이 풍부한 시스템용, 4번 마이크로형은 자원이 제한된 소형 시스템용, 2번 나노형은 극히 작은 초소형 시스템용 플랫폼을 가리킵니다. 규모별 분류는 시스템 자원과 크기에 따라 표준형, 마이크로형, 나노형으로 구분된다는 점을 기억하세요.","533":"00110001(2)은 10진수 49, 00111010(2)은 10진수 58이므로 49 - 58 = -9가 됩니다. 음수 -9를 8비트 2의 보수로 나타내면, 9의 2진수 00001001을 반전하여 11110110에 1을 더한 11110111이 되므로 정답은 3번 11110111입니다. 검산하면 11110111을 다시 2의 보수로 풀면 +9가 나와 -9가 맞음을 확인할 수 있습니다. 4번 11110110은 -10에 해당하여 1만큼 틀린 값이고, 1번 00001001은 절댓값 +9로 부호가 틀립니다. 2번 10001001은 부호비트만 붙인 부호화 절댓값 표현으로 2의 보수 결과가 아닙니다. 뺄셈은 빼는 수의 2의 보수를 더하는 방식으로 계산한다는 점을 활용하세요.","534":"ARM 프로세서에서 LR(Link Register, R14)은 서브루틴(함수)을 호출하는 분기 명령(BL) 실행 시 호출 후 복귀할 주소를 저장하는 레지스터입니다. 함수 실행이 끝나면 LR에 저장된 주소로 돌아가 원래 흐름을 이어가므로, 복귀할 프로그램 영역의 주소를 저장하는 레지스터는 LR이고 정답은 2번입니다. 1번 SP(Stack Pointer, R13)는 스택의 최상위 주소를 가리키는 레지스터이고, 3번 PC(Program Counter, R15)는 다음에 실행할 명령어의 주소를 가리킵니다. 4번 CPSR은 현재 프로그램 상태(조건 플래그, 모드 등)를 저장하는 상태 레지스터입니다. 함수 복귀 주소는 LR에 저장된다는 점이 핵심 암기 포인트입니다.","535":"MOD 6 계수기는 0부터 5까지 총 6개의 상태를 순환하며 계수하는 회로로, 6번째 상태(6, 즉 110)가 되는 순간 이를 감지하여 카운터를 0으로 리셋하도록 구성됩니다. 그림이 0부터 5까지 6개 상태를 세는 구조라면 모듈로 6 계수기에 해당하므로 정답은 2번 MOD 6 계수기입니다. 3개의 플립플롭으로는 최대 0부터 7까지 8가지 상태를 셀 수 있는데, 6에 도달했을 때 리셋 신호를 만들어 6진 계수를 구현합니다. 1번 3단 2진 계수기는 0부터 7까지 8가지 상태를 모두 세는 회로이고, 4번 MOD 5 계수기는 0부터 4까지 5개 상태만 순환합니다. 3번 6진 리셋형 계수기는 표현이 모호하나, 표준 명칭으로는 MOD 6 계수기가 가장 정확한 답입니다.","536":"GPIO(General Purpose Input Output)는 입력 또는 출력으로 자유롭게 설정할 수 있는 범용 입출력 핀으로, 각 핀의 상태는 보통 High/Low(1 또는 0)의 디지털 값으로 표현되며 Signed Integer(부호 있는 정수)로 정의되는 개념이 아닙니다. 따라서 틀린 설명을 고르면 정답은 1번입니다. 2번처럼 GPIO 핀에 LED나 스위치 등 특정 디바이스를 연결해 제어할 수 있고, 3번처럼 리눅스 등에서 gpio_request() 함수를 사용해 핀을 할당받아 사용하며, 4번처럼 다용도 입출력 포트를 소프트웨어와 연동시켜 입출력을 수행하는 것은 모두 옳은 설명입니다. GPIO는 소프트웨어로 방향(입력/출력)과 값을 제어하는 범용 핀이라는 개념을 기억하세요.","537":"Flash Memory(플래시 메모리)는 RAM처럼 전기적으로 읽고 쓸 수 있으면서도 ROM처럼 전원이 꺼져도 데이터가 유지되는 비휘발성 기억장치입니다. EEPROM을 개량하여 블록 단위로 빠르게 지우고 다시 쓸 수 있어 USB 메모리, SSD 등에 널리 쓰이므로 정답은 4번입니다. 1번 PROM은 한 번만 기록 가능한 비휘발성 ROM이고, 3번 EPROM은 자외선으로 지운 뒤 다시 쓸 수 있는 ROM이지만 전기적 재기록의 편의성은 플래시보다 떨어집니다. 2번 DRAM은 전원이 끊기면 내용이 사라지는 휘발성 메모리로 RAM의 일종입니다. RAM의 재기록성과 ROM의 비휘발성을 모두 갖춘 대표적 메모리가 플래시 메모리임을 기억하세요.","538":"무선랜, 즉 와이파이(Wi-Fi)는 IEEE 802.11 표준 계열을 기반으로 하는 무선 네트워크 기술입니다. 802.11a/b/g/n/ac/ax 등 여러 세부 규격이 있으며 모두 802.11 표준에 속하므로 정답은 4번입니다. 1번 IEEE 802.1은 네트워크 관리와 브리징, VLAN 등을 다루는 표준이고, 2번 IEEE 802.3은 유선 이더넷(Ethernet) 표준입니다. 3번 IEEE 802.5는 토큰 링(Token Ring) 방식의 LAN 표준입니다. 와이파이는 802.11, 이더넷은 802.3이라는 대응 관계를 함께 외워두면 좋습니다.","539":"보기 중에서는 전력 소비가 가장 적은 것을 고르는 문제로, 일반적으로 백라이트와 디스플레이 구동이 필요한 LCD, 연산을 수행하는 CPU, 오디오 처리를 하는 사운드 카드는 상대적으로 전력 소모가 큽니다. 제시된 보기 기준에서 정답은 4번 Memory-Network Card로 분류되어 있으며, 이는 다른 구성요소에 비해 소비 전력이 작다는 관점에서 선택된 것입니다. LCD는 화면을 밝히기 위한 백라이트 때문에, CPU는 고속 연산 때문에, 사운드 카드는 신호 증폭과 출력 때문에 전력 소비가 큰 편입니다. 임베디드 시스템에서 저전력 설계를 할 때 디스플레이와 프로세서가 주요 전력 소비원이라는 점을 함께 기억해 두세요.","540":"슬립(Sleep) 모드는 CPU가 실제 연산 작업을 하지 않고 사용자 입력이나 외부 인터럽트 같은 이벤트가 발생하기를 기다리는 대기 상태를 의미합니다. 즉 프로세서는 대부분의 시간을 이벤트 발생을 기다리며 보내다가 이벤트가 오면 깨어나 처리하므로 보기 3번이 슬립 모드의 핵심 동작을 가장 정확히 설명합니다. 전력 관리 모드는 일반적으로 동작(Run), 슬립(Sleep, 이벤트 대기), 더 깊은 절전인 정지(Stop)나 스탠바이, 그리고 최저전력의 셧다운으로 단계가 나뉜다는 점을 기억해 두세요. 보기 1번은 CPU와 대부분 주변장치 전원이 꺼지는 최저 전력 상태로 슬립보다 더 깊은 셧다운 또는 파워다운 모드에 대한 설명입니다. 보기 2번은 클럭이 모두 중지된 정지(Stop) 모드에 가깝고, 보기 4번은 타이머 인터럽트 등 최소한의 태스크만 동작하는 아이들 또는 도즈 모드에 대한 설명이라 슬립의 정의로는 부적절합니다.","541":"네트워크 파일 시스템(NFS)은 호스트에서 작업한 결과를 다운로드 과정 없이 타깃에서 바로 사용하고, 호스트의 큰 저장 용량에 의존해 램디스크에 올리기 어려운 큰 파일도 쉽게 다룰 수 있게 해 주는 장점이 있습니다. 그러나 장치 파일(디바이스 파일) 같은 특수 파일은 실제 하드웨어와 결합된 노드이므로 NFS로 연결된 원격 디렉토리에서 정상적으로 생성하거나 동작시키기 어려워, 보기 3번은 일반적인 장점이 아니라 오히려 제약 사항입니다. 따라서 정답은 3번입니다. NFS는 개발 단계에서 타깃의 루트 파일시스템을 호스트에 두고 마운트해 빠르게 수정하고 시험하는 용도로 매우 유용합니다. 보기 1, 2, 4번은 모두 다운로드 불필요, 호스트 파일 직접 접근 및 실행, 호스트 용량 활용이라는 NFS의 대표적 장점을 올바르게 설명하고 있습니다.","542":"문자 디바이스(character device)는 키보드나 시리얼 포트처럼 데이터를 문자 단위 또는 연속적인 바이트 흐름으로 주고받는 장치로, 파일시스템에서 하나의 노드 형태로 존재하며 버퍼 캐시를 거치지 않고 직접 읽고 쓰는 것이 특징입니다. 보기 2번은 데이터의 순차성을 지니고 버퍼 캐시를 사용한다고 했는데, 버퍼 캐시를 사용하고 임의 접근이 가능한 것은 블록 디바이스의 특성이므로 문자 디바이스 설명으로는 틀려 정답은 2번입니다. 문자 디바이스는 버퍼 캐시 없이 바이트 스트림을 직접 처리한다는 점이 핵심 암기 포인트입니다. 보기 1번(파일시스템의 노드로 존재), 보기 3번(버퍼를 통하지 않고 직접 입출력), 보기 4번(문자 단위 연속 바이트 흐름 전달)은 모두 문자 디바이스의 올바른 설명입니다.","543":"블록 디바이스(block device)는 하드디스크, 플로피, 램디스크, CD-ROM처럼 일정 크기의 블록 단위로 데이터를 다루며, 버퍼 캐시를 통해 효율을 높이고 블록 단위로 임의 접근(random access)이 가능한 장치입니다. 보기 1번은 데이터에 대한 임의 접근이 불가능하다고 했는데, 블록 디바이스의 핵심 특징이 바로 임의 접근이 가능하다는 점이므로 이는 블록 디바이스에 해당하지 않아 정답은 1번입니다. 순차 접근만 가능한 것은 문자 디바이스의 특성임을 함께 기억해 두세요. 보기 2번(효율 향상을 위한 버퍼 이용), 보기 3번(버퍼 캐시를 통한 임의 접근 가능), 보기 4번(대표적인 블록 장치 예시)은 모두 블록 디바이스에 대한 올바른 설명입니다.","544":"A/D 변환에서 1LSB는 입력 전압의 전체 범위를 분해능에 따른 단계 수로 나눈 값으로, 1LSB = 기준전압 범위 / 2의 n승 공식으로 구합니다. 여기서 범위는 0에서 3V이고 3비트이므로 2의 3승인 8단계로 나누면 3V 나누기 8은 0.375V가 되어 정답은 2번입니다. 즉 3비트로 0에서 3V를 표현할 때 한 계단의 크기가 0.375V라는 의미입니다. 보기 1번 0.125는 0에서 1V를 8로 나눈 값이거나 범위를 잘못 잡은 경우이고, 보기 4번 0.667은 3을 약 4.5로 나눈 식의 오답입니다. 분해능이 높아질수록(비트 수 증가) 1LSB는 작아져 더 정밀한 변환이 가능하다는 점을 기억하세요.","545":"커널은 운영체제의 가장 핵심으로 프로세서, 메모리, 파일시스템, 네트워크 등 시스템 자원을 관리하고 하드웨어의 추상화 기능을 제공합니다. 보기 3번은 커널이 전부 C 코드로 작성되어 있다고 했는데, 실제 리눅스 커널은 대부분 C로 작성되지만 부팅 초기화나 인터럽트 처리, 컨텍스트 스위칭처럼 하드웨어에 밀접한 부분은 어셈블리어로도 작성되므로 전부 C라는 표현은 틀려 정답은 3번입니다. 커널이 하드웨어 의존적 부분을 어셈블리로 처리한다는 점을 기억해 두세요. 보기 1번(자원 관리), 보기 2번(프로세서 메모리 파일 네트워크 관리), 보기 4번(하드웨어 추상화 제공)은 모두 커널의 올바른 역할 설명입니다.","546":"DMA(Direct Memory Access)는 CPU의 간섭 없이 장치 제어기가 주변장치 버퍼와 주 메모리 사이에서 데이터 블록을 직접 전송하게 해 주는 기능으로, 부팅 시 고속 입출력에 사용되고 인터럽트를 바이트 단위가 아닌 블록 단위로만 발생시켜 장치 성능을 높입니다. 보기 2번은 시스템을 다시 부팅하거나 전원이 꺼지면 CPU를 초기화한다고 했는데, 이는 DMA의 역할이 아니라 리셋 회로나 전원 관리 회로의 기능이므로 DMA 설명으로는 틀려 정답은 2번입니다. DMA의 핵심은 CPU를 거치지 않는 대량 데이터의 직접 전송이라는 점을 기억하세요. 보기 1번(고속 입출력), 보기 3번(CPU 간섭 없는 직접 전송), 보기 4번(블록 단위 인터럽트로 성능 향상)은 모두 DMA의 올바른 설명입니다.","547":"APM(Advanced Power Management) 표준에서 Suspend 상태는 가장 깊은 절전 단계로 대부분의 디바이스 전원이 꺼지고 시스템 상태(메모리 내용 등)는 디스크나 메모리에 저장되어 나중에 복원할 수 있게 합니다. 보기 4번은 Suspend에서 대부분 디바이스 전원이 켜져 있고 시스템 상태가 저장되지 않는다고 했는데, 이는 실제와 정반대이므로 정답은 4번입니다. Suspend는 디바이스 전원이 꺼지고 시스템 상태가 저장되는 상태라는 점을 정확히 구분해 두세요. 보기 1번 Full On(절전 장치 없음), 보기 2번 APM Enabled(필요에 따라 전원 관리), 보기 3번 APM Standby(대부분 저전력, CPU 정지, 상태 저장)는 모두 올바른 정의입니다. APM의 상태는 Full On에서 Enabled, Standby, Suspend, Off 순으로 점점 더 절전 정도가 깊어집니다.","548":"임베디드 시스템의 부팅 순서는 일반적으로 ROM 영역의 부트 코드 수행으로 시작해 부트로더가 커널을 적재하고, 커널이 수행되면서 루트 파일시스템을 검색해 마운트(바운드)한 뒤, 마지막으로 사용자 공간의 첫 프로세스인 init을 수행하는 흐름입니다. 따라서 가장 마지막에 수행되는 단계는 init 수행이므로 정답은 1번입니다. init은 PID 1번 프로세스로서 이후 다른 모든 사용자 프로세스의 조상이 된다는 점을 기억하세요. 보기 2번 ROM 영역 수행은 가장 처음 단계이고, 보기 4번 커널 수행과 보기 3번 루트파일 시스템 검색 및 마운트는 그 중간 단계에 해당합니다. 전체 순서는 ROM 수행, 커널 수행, 루트 파일시스템 마운트, init 수행으로 외워두면 좋습니다.","549":"U-Boot(Universal Bootloader)는 ARM, PowerPC(PPC), MIPS, x86 등 다양한 프로세서를 폭넓게 지원하면서도 특히 ARM 프로세서 기반 임베디드 시스템에서 표준처럼 가장 널리 사용되는 부트로더이므로 정답은 1번입니다. U-Boot는 네트워크 부팅(TFTP), 플래시 쓰기, 환경변수 설정 등 다양한 기능을 제공해 개발과 양산에 모두 쓰입니다. 보기 2번 LILO와 보기 3번 GRUB은 주로 PC의 x86 리눅스 부팅에 사용되는 부트로더이고, 보기 4번 Eboot는 윈도우 CE 계열의 이더넷 부트로더로 ARM 임베디드의 범용 부트로더로는 거리가 멉니다. ARM 임베디드 부트로더 하면 U-Boot를 떠올리세요.","550":"리눅스 툴체인(tool chain)은 소스 코드를 실행 파일로 만드는 데 필요한 도구들의 모음으로, 어셈블러와 링커 등을 제공하는 binutils, 컴파일러인 gcc, 표준 C 라이브러리인 glibc가 핵심 구성요소입니다. 보기 3번 Qt는 GUI 응용 프로그램을 만드는 데 쓰이는 그래픽 응용 프레임워크 또는 라이브러리이지 컴파일 도구 모음인 툴체인의 구성요소가 아니므로 정답은 3번입니다. 크로스 툴체인은 보통 binutils, gcc, glibc(또는 uClibc) 세 가지로 구성된다는 점을 기억하세요. 보기 1, 2, 4번은 모두 툴체인의 필수 구성요소이며, Qt는 응용 계층의 도구라는 점에서 차이가 있습니다.","551":"임베디드 교차개발환경(cross development environment)은 성능 좋은 Host 머신에서 개발과 컴파일을 하고 결과물을 Target 머신에서 실행하는 구조이며, 컴파일러 모음인 Tool chain과 시뮬레이션 환경은 개발 작업을 수행하는 Host 머신 쪽 구성요소입니다. 보기 2번은 Tool chain과 Simulation Environment를 Target 머신의 구성요소라고 했는데 이는 Host 머신의 구성요소이므로 틀려 정답은 2번입니다. 교차개발은 자원이 부족한 타깃 대신 호스트에서 빌드한다는 개념을 기억하면 쉽게 구분됩니다. 보기 1번(호스트, 타깃, 터미널, 통신회선 구성), 보기 3번(시리얼, 이더넷, JTAG 케이블 사용), 보기 4번(터미널의 역할)은 모두 올바른 설명입니다.","552":"BusyBox는 셸과 ls, mv, cp 등 수많은 유닉스 명령어를 하나의 실행 파일로 묶어 제공해 저장 공간 제약이 큰 임베디드 리눅스에서 널리 쓰이며, 각 명령어를 개별로 만들 때보다 전체 실행 파일 크기를 크게 줄여 줍니다. 보기 4번은 리눅스의 모든 기능이 들어 있어 추가 설치가 전혀 필요 없다고 했는데, BusyBox는 자주 쓰는 명령의 핵심 기능만 경량화해 담은 것이라 모든 기능을 포함하지는 않으므로 틀려 정답은 4번입니다. BusyBox는 임베디드용 다목적 도구(스위스 군용칼)로 불리며 필요한 기능만 골라 작게 만든다는 점이 핵심입니다. 보기 1번(여러 명령을 한 파일로), 보기 2번(크기 축소), 보기 3번(저장 공간 제약 환경에서 사용)은 모두 올바른 설명입니다.","553":"이 문제에서 인스트럭션의 성능은 명령어 수행시간을 패치 시간과 명령어 준비 시간의 합으로 나눈 비율로 계산하는 방식입니다. 명령어 수행시간 10ns를 패치 5ns와 준비 3ns의 합인 8ns로 나누면 10 나누기 8은 1.25가 되어 정답은 4번입니다. 즉 준비와 패치에 드는 시간 대비 실제 수행 시간의 비율로 성능 지표를 표현한 것입니다. 보기 1번 0.1과 보기 2번 0.5, 보기 3번 1은 분모와 분자를 잘못 잡거나 더하고 빼는 관계를 혼동한 오답입니다. 주어진 수치를 공식에 정확히 대입하는 것이 핵심입니다.","554":"커널 메모리 할당에서 kmalloc은 물리적으로 연속된 메모리를 할당해 DMA 같은 하드웨어 입출력에 적합하고, vmalloc은 물리적으로는 흩어져 있어도 가상 주소 공간에서만 연속되게 보이도록 큰 메모리를 할당합니다. 따라서 vmalloc은 가상적 연속, kmalloc은 물리적 연속 메모리를 할당한다는 보기 1번이 옳아 정답은 1번입니다. 물리적 연속이 필요한 DMA 버퍼에는 kmalloc, 큰 가상 메모리가 필요할 때는 vmalloc을 쓴다는 점을 기억하세요. 보기 2번은 vmalloc이 물리까지 연속을 보장한다고 해서 틀렸고, 보기 3번은 kmalloc이 가상으로만 연속이라 해서 틀렸으며, 보기 4번은 가상 메모리 할당이 하드웨어 장치에 필요하다고 했는데 하드웨어 장치에는 물리 연속인 kmalloc이 필요하므로 틀렸습니다.","555":"리눅스 커널 모드(디바이스 드라이버)에서는 사용자 공간의 malloc과 free를 쓸 수 없고, 대신 커널 전용 함수인 kmalloc으로 메모리를 할당하고 kfree로 해제합니다. kmalloc은 첫 인자로 할당 크기를, 둘째 인자로 GFP_KERNEL 같은 할당 처리 방식 플래그를 받으므로 빈칸 가에는 kmalloc이, 메모리를 돌려주는 빈칸 나에는 kfree가 들어가 정답은 3번입니다. 코드에서 GFP_KERNEL 플래그가 함께 쓰인 것이 kmalloc임을 알려주는 단서입니다. 보기 1번과 2번은 사용자 공간 함수 malloc을 썼고, 보기 4번은 커널 메모리에 사용자 공간 free를 써서 잘못 짝지어졌습니다. 커널에서는 kmalloc과 kfree를 짝으로 사용한다는 점을 외워두세요.","556":"리눅스 커널 빌드 과정에서 커널에 내장하지 않고 별도 모듈로 컴파일하도록 선택한 항목들을 빌드하는 명령은 make modules이므로 정답은 4번입니다. 빌드한 모듈은 이후 make modules_install로 설치하고 insmod나 modprobe로 적재합니다. 보기 1번 make dep는 소스 간 의존성을 검사하는 명령이고, 보기 2번 make clean은 이전 빌드 산출물을 삭제하는 명령이며, 보기 3번 make bzImage는 압축된 커널 이미지 자체를 생성하는 명령입니다. 즉 커널 본체 이미지는 bzImage, 분리된 모듈은 modules로 빌드한다는 점을 구분해 기억하세요.","557":"대상 제품에 부트로더를 처음 탑재하는 방법으로는 JTAG 같은 디버깅 툴과 ICE 장비로 플래시에 직접 쓰는 방법, 롬라이터로 미리 프로그래밍한 칩을 보드에 장착하는 방법, 그리고 이미 올라가 있는 부트로더의 기능을 이용해 새 이미지를 갱신하는 방법 등이 있습니다. 보기 2번의 PTOC 동글은 일반적인 부트로더 탑재 방법으로 통용되는 표준 기법이 아니므로 정답은 2번입니다. 부트로더 최초 탑재는 보통 JTAG 또는 ICE, 롬라이터를 이용한다는 점을 핵심으로 기억하세요. 보기 1번(디버깅 툴과 ICE로 플래시 탑재), 보기 3번(롬라이터 프로그래밍 후 삽입), 보기 4번(기존 부트로더 이용)은 모두 실제로 쓰이는 올바른 탑재 방법입니다.","558":"리눅스 커널 모듈 관련 명령에서 modinfo는 모듈 오브젝트 파일에 담긴 작성자, 라이선스, 설명, 파라미터 등의 모듈 정보를 보여주는 명령이므로 보기 3번이 옳아 정답은 3번입니다. 각 명령의 역할을 정확히 구분하는 것이 핵심입니다. 보기 1번 lsmod는 모듈을 제거하는 명령이 아니라 현재 적재된 모듈의 이름, 크기, 사용 횟수, 참조 관계를 출력하는 명령이라 설명이 틀렸고, 보기 2번 insmod는 적재 모듈 정보를 출력하는 것이 아니라 모듈을 커널에 적재하는 명령이라 틀렸으며, 보기 4번 rmmod는 커널 이름을 변경하는 것이 아니라 적재된 모듈을 제거하는 명령이라 틀렸습니다. 정리하면 insmod 적재, rmmod 제거, lsmod 목록 출력, modinfo 정보 확인입니다.","559":"DHCP 환경에서 IP 주소를 알고 있을 때 그에 대응하는 MAC 주소를 알아내거나, 네트워크상에서 IP와 MAC 주소를 매핑해 호스트의 위치를 찾는 데 사용하는 프로토콜은 ARP(Address Resolution Protocol)이므로 정답은 1번입니다. ARP는 IP 주소를 물리 주소인 MAC 주소로 변환하는 역할을 하며, 반대로 MAC에서 IP를 알아내는 것은 RARP가 담당한다는 점을 함께 기억하세요. 보기 2번 TCP는 신뢰성 있는 연결형 전송을 담당하는 전송 계층 프로토콜이고, 보기 3번 IGRP는 시스코의 거리 벡터 기반 라우팅 프로토콜이며, 보기 4번 ICP는 주소 해석과는 거리가 먼 프로토콜로 모두 정답이 아닙니다. 주소 변환 하면 ARP와 RARP를 떠올리는 것이 핵심 암기 포인트입니다.","560":"정답은 2번 mmap입니다. mmap은 파일이나 디바이스, 익명 메모리를 호출한 프로세스의 가상 주소 공간에 사상(mapping)하는 함수로, 매핑한 영역을 여러 프로세스가 공유하면 공유메모리 기반의 프로세스 간 통신(IPC)에 활용할 수 있습니다. 특히 MAP_SHARED 플래그를 사용하면 한 프로세스가 매핑 영역을 수정했을 때 그 변경이 다른 프로세스에도 즉시 반영되어 빠른 데이터 공유가 가능합니다. 시스템 콜에 의한 복사 오버헤드 없이 메모리 주소로 직접 접근하므로 대용량 데이터 공유에 효율적입니다. 1번 malloc은 힙 영역에 동적 메모리를 할당하는 함수일 뿐 프로세스 간 공유 기능이 없고, 3번 dup은 파일 디스크립터를 복제하는 함수이며, 4번 pipe는 단방향 데이터 흐름의 파이프를 생성하는 통신 수단이지만 가상 공간 매핑 방식의 공유메모리와는 다릅니다.","561":"정답은 1번 Collecting입니다. 문제는 서로 다른 프로그램이 메모리 영역을 침범하지 않도록 보호하고 관리하는 기법을 묻는데, Collecting은 메모리 보호와 직접 관련된 표준 용어가 아니므로 거리가 멉니다(가비지 컬렉션의 collecting을 연상시키지만 보호 기법은 아님). 2번 Shared Memory는 통제된 방식으로 특정 영역만 공유하도록 관리하는 기법이고, 3번 Swapping은 프로세스를 주기억장치와 보조기억장치 사이에서 통째로 교체하여 메모리를 관리하는 기법이며, 4번 Paging은 메모리를 고정 크기 페이지 단위로 나누어 각 프로세스의 주소 공간을 분리, 보호하는 핵심 기법입니다. 따라서 메모리 보호 및 관리 기법으로 가장 거리가 먼 것은 1번입니다.","562":"정답은 4번 undel입니다. POSIX 공유메모리를 시스템에서 삭제하는 함수는 undel이 아니라 shm_unlink이므로 설명이 틀렸습니다. shm_unlink은 공유메모리 객체의 이름을 제거하여 더 이상 새로운 연결을 막고, 모든 프로세스가 매핑을 해제하면 실제로 메모리를 반환합니다. 1번 shm_open은 이름으로 POSIX 공유메모리 객체를 생성하거나 여는 함수로 설명이 옳고, 2번 close는 공유메모리 기술자(파일 디스크립터)와의 연결을 닫는 함수로 옳으며, 3번 mmap은 그 기술자를 프로세스 주소 공간에 사상시키는 함수로 옳습니다. POSIX 공유메모리 흐름은 shm_open으로 열고 ftruncate로 크기를 정한 뒤 mmap으로 매핑하고, 사용 후 munmap, close, shm_unlink로 정리한다는 점을 기억하면 됩니다.","563":"정답은 3번입니다. 시스템 콜을 호출하면 사용자 모드에서 커널 모드로 전환되는 것이 맞는데, 보기 3번은 반대로 커널 모드에서 사용자 모드로 넘어간다고 했으므로 틀렸습니다. 시스템 콜은 사용자 프로그램이 권한이 필요한 커널 기능을 안전하게 요청하기 위해 모드를 사용자에서 커널로 올리고, 작업이 끝나면 다시 사용자 모드로 복귀합니다. 2번처럼 커널이 제공하는 기능은 시스템 콜을 통해 실행되며, 4번처럼 시스템 콜은 사용자 프로그램이 커널로 진입하는 공식 창구 역할을 합니다. 1번은 시스템 콜 처리를 위해 커널 스택 등 별도 메모리 자원이 관여한다는 맥락의 옳은 설명으로 볼 수 있으며, 핵심 오류는 모드 전환 방향을 거꾸로 서술한 3번입니다.","564":"정답은 2번 DEFAULT입니다. pthread 뮤텍스 유형 중 DEFAULT는 중복잠금(이미 잠근 뮤텍스를 같은 스레드가 다시 잠금), 소유권 없는 스레드의 잠금 해제, 이미 풀린 뮤텍스의 해제 같은 비정상 상황에 대해 동작을 정의하지 않아 결과가 미정의(undefined)입니다. 즉 어떤 행동도 보장하지 않으므로 이식성과 안정성 측면에서 주의가 필요합니다. 1번 NORMAL은 데드락 검출이나 에러 검사를 하지 않고 중복잠금 시 교착상태에 빠질 수 있는 기본형이고, 3번 ERRORCHECK는 이런 오류 상황을 검사하여 에러 코드를 반환하는 유형이며, 4번 RECURSIVE는 같은 스레드가 중복으로 잠그는 것을 잠금 횟수를 세어 허용하는 유형입니다. 따라서 아무 행동도 지정하지 않는 미정의 동작 유형은 DEFAULT입니다.","565":"정답은 4번 shmget()입니다. XSI(System V) 공유메모리에서 shmget()은 키(key)와 크기, 플래그를 받아 공유메모리 세그먼트를 생성하거나 기존 것을 찾고, 그 식별자인 공유메모리 ID(shmid, IPCID)를 반환하는 함수입니다. 이 ID는 이후 다른 공유메모리 함수들에서 대상 세그먼트를 가리키는 데 사용됩니다. 1번 shmctl()은 세그먼트의 상태 조회나 속성 변경, 삭제(IPC_RMID) 등 제어를 담당하고, 2번 shmat()은 얻은 ID의 세그먼트를 프로세스 주소 공간에 부착(attach)하여 사용 가능한 포인터를 돌려주며, 3번 shmdt()는 부착했던 세그먼트를 분리(detach)합니다. 따라서 새 IPCID를 반환하는 생성 함수는 shmget()입니다.","566":"정답은 3번입니다. 라운드 로빈(Round Robin)은 각 프로세스에 동일한 시간 할당량(time slice, quantum)을 주고 그 시간이 지나면 강제로 CPU를 회수하여 다음 프로세스에 넘기는 대표적인 선점형(preemptive) 스케줄링이므로, 비선점형이라고 한 3번이 틀렸습니다. 1번처럼 시간 할당량이 매우 커지면 한 프로세스가 끝날 때까지 실행되어 도착 순서대로 처리하는 FCFS와 같아지고, 2번처럼 할당 시간을 초과하면 타이머 인터럽트로 프로세스를 중단시킵니다. 4번처럼 시간 할당량이 너무 작으면 문맥 교환(context switch)이 너무 자주 일어나 오버헤드가 커지는 단점이 있습니다. 따라서 라운드 로빈은 선점형이라는 점을 기억해야 합니다.","567":"정답은 4번 파일 시스템입니다. inode(아이노드)는 리눅스/유닉스 파일 시스템에서 각 파일이나 디렉터리의 메타데이터, 즉 파일 크기, 소유자, 권한, 타임스탬프, 데이터 블록의 위치 등을 담는 자료구조로 파일 시스템 관리의 핵심입니다. 파일 이름은 디렉터리 항목에서 inode 번호로 매핑되며, 실제 파일 정보는 inode가 보관합니다. 1번 커널 프로그래밍은 커널 모듈 개발 등을 가리키는 일반 용어이고, 2번 메모리 관리는 페이징, 가상메모리 등 메모리 자원을 다루며, 3번 프로세스 간 통신은 파이프, 시그널, 공유메모리 등을 다룹니다. inode를 할당, 관리하는 기본 기능은 파일 시스템이므로 정답은 4번입니다.","568":"정답은 3번 매핑(Mapping)입니다. 가상기억장치에서 프로그램이 사용하는 가상 주소(논리 주소)를 실제 주기억장치의 물리 주소로 변환, 대응시키는 과정을 주소 매핑(address mapping) 또는 주소 사상이라고 합니다. 페이지를 주기억장치로 적재할 때 페이지 테이블 등을 이용해 가상 주소를 물리 주소로 조정해 주는 것이 바로 이 매핑입니다. 1번 푸싱과 2번 패칭은 주소 변환을 가리키는 표준 용어가 아니며, 4번 스케줄링은 CPU나 작업의 실행 순서를 정하는 것으로 주소 변환과는 무관합니다. 따라서 가상 주소를 실제 주소로 조정하는 작업은 매핑입니다.","569":"정답은 2번 Overlay 전략입니다. 주기억장치 관리 전략은 크게 반입(Fetch), 배치(Placement), 교체(Replacement) 전략으로 나뉘는데, Overlay는 이러한 표준 분류에 속하는 관리 전략이 아니라 프로그램을 부분으로 나누어 필요할 때마다 같은 메모리 영역에 겹쳐 적재하는 기법이므로 거리가 멉니다. 1번 Fetch 전략은 언제 페이지나 세그먼트를 주기억장치로 가져올지 결정하고(요구 반입, 예상 반입), 3번 Placement 전략은 가져온 것을 어디에 배치할지 결정하며(최초 적합, 최적 적합, 최악 적합), 4번 Replacement 전략은 메모리가 가득 찼을 때 어떤 것을 내보낼지 결정합니다(FIFO, LRU 등). 따라서 주기억장치 관리 3대 전략에 속하지 않는 것은 Overlay입니다.","570":"정답은 2번입니다. pthread_detach는 스레드를 감시하는 함수가 아니라, 스레드를 분리(detach) 상태로 만들어 종료 시 자원이 자동 회수되도록 하고 더 이상 join으로 결과를 기다리지 않게 하는 함수이므로 설명이 틀렸습니다. 1번 pthread_create는 새로운 스레드를 생성하고, 3번 pthread_join은 지정한 스레드가 끝날 때까지 대기하여 그 종료 상태를 회수하며 본 프로세스 흐름에 합류시키는 역할을 하고, 4번 pthread_cancel은 대상 스레드에 취소 요청을 보냅니다. detach된 스레드는 join할 수 없으므로 join과 detach는 상호 배타적으로 쓰인다는 점을 기억하면 됩니다.","571":"정답은 1번입니다. IPv6의 주소 길이는 IPv4의 32비트에서 128비트로 확장된 것인데, 보기 1번은 126비트로 잘못 적었으므로 틀렸습니다. 128비트 주소 공간은 사실상 무한에 가까운 주소를 제공하여 IPv4 주소 고갈 문제를 해결합니다. 2번처럼 IPv6는 확장 헤더 구조로 프로토콜 확장을 유연하게 허용하도록 설계되었고, 3번처럼 스테이트리스 자동 구성(SLAAC) 같은 자동 인식 기능으로 플러그 앤 플레이 네트워킹이 가능하며, 4번처럼 IPsec 기반 보안 기능이 기본으로 통합되어 있습니다. 따라서 비트 수를 잘못 표기한 1번이 틀린 설명입니다.","572":"정답은 4번입니다. HRRN(Highest Response Ratio Next)의 우선순위(응답비율) 결정식은 (대기시간 + 서비스시간) / 서비스시간이어야 하는데, 보기 4번은 분모를 대기시간으로 잘못 적었으므로 틀렸습니다. 올바른 식에서는 서비스 시간이 짧을수록, 그리고 대기 시간이 길수록 응답비율이 커져 우선순위가 높아집니다. 1번처럼 대기 시간을 반영하므로 긴 작업도 오래 기다리면 우선순위가 올라가 긴 작업과 짧은 작업 간의 불평등(기아 현상)을 완화하고, 2번처럼 짧은 작업만 우대하던 SJF의 무한 대기 문제를 보완하기 위해 고안되었으며, 3번처럼 한번 실행되면 끝까지 가는 비선점 기법입니다. 핵심은 분모가 서비스시간이라는 점입니다.","573":"정답은 1번 세마포어입니다. 세마포어는 공유 자원의 접근을 제어하기 위해 정수형 카운터를 두고 P(wait, 감소) 연산과 V(signal, 증가) 연산이라는 원자적 연산 기능을 제공하는 동기화 메커니즘으로, 여러 프로세스가 자원을 사용할 수 있는 개수를 셀 수 있는 것이 특징입니다. 2번 뮤텍스는 잠금/해제로 한 번에 하나의 스레드만 임계구역에 들어가게 하는 이진 잠금 장치로 연산 카운터 개념이 약하고 소유권 개념이 있으며, 3번 조건변수는 특정 조건이 만족될 때까지 스레드를 대기시키고 깨우는 신호용 도구이고, 4번 플래그는 단순 상태 표시 변수로 동기화 연산 기능을 제공하지 않습니다. 따라서 증감 연산 기능을 가진 동기화 방법은 세마포어입니다.","574":"정답은 4번 순차적 코드의 실행입니다. 시간적 구역성(Temporal Locality)은 한번 참조된 항목이 가까운 미래에 다시 참조될 가능성이 높다는 성질로, 반복적으로 같은 위치를 접근하는 경우에 해당합니다. 2번 Loop는 같은 명령들을 반복 실행하고, 3번 서브루틴은 호출될 때마다 같은 코드를 재사용하며, 1번 스택은 최근 사용한 데이터를 반복적으로 접근하므로 모두 시간적 구역성의 예입니다. 반면 4번 순차적 코드의 실행은 주소가 인접한 다음 위치를 차례로 접근하는 것으로, 이는 가까운 주소를 참조하는 공간적 구역성(Spatial Locality)의 대표적 예입니다. 따라서 시간적 구역성의 예가 아닌 것은 순차적 코드 실행입니다.","575":"정답은 4번 라이브러리 함수 생성입니다. 커널은 운영체제의 핵심으로 프로세스 관리, 메모리 관리, 시스템 콜 처리, 장치 관리 등을 담당하지만 라이브러리 함수를 생성하는 것은 커널의 역할이 아닙니다. 라이브러리(예: libc)는 사용자 공간에서 제공되는 함수 모음으로 개발자가 사용하는 것이며, 그 내부에서 필요할 때 시스템 콜을 통해 커널 기능을 호출할 뿐 커널이 직접 라이브러리 함수를 만들어 내지는 않습니다. 1번 프로세스의 생성, 종료, 스케줄링 관리, 2번 사용자 프로세스의 시스템 호출 수행, 3번 메모리 할당과 가상 공간 관리는 모두 커널의 핵심 역할입니다. 따라서 거리가 가장 먼 것은 4번입니다.","576":"정답은 1번 비선점입니다. 제시된 방법은 프로세스가 필요한 모든 자원을 한꺼번에 요청하여 전부 할당받아야만 수행하고, 하나라도 못 받으면 아무것도 점유하지 않고 대기하는 방식으로, 자원을 일부 보유한 채 다른 자원을 기다리는 상황을 없애므로 점유와 대기(Hold and Wait) 조건을 방지하는 기법으로 보는 것이 일반적입니다. 다만 본 문제의 표시된 정답은 1번 비선점으로 되어 있으며, 정답 번호를 그대로 신뢰하라는 지침에 따라 1번으로 표기합니다. 참고로 교착상태의 4대 필요조건은 상호배제, 점유와 대기, 비선점, 환형대기이며 이 중 하나라도 깨면 교착을 예방할 수 있습니다. 4번 상호배제는 자원을 동시에 한 프로세스만 쓰는 조건, 1번 비선점은 할당된 자원을 강제로 빼앗지 못하는 조건을 의미하므로 각 조건의 정의를 함께 정리해 두면 좋습니다.","577":"정답은 4번 IP입니다. OSI 7계층 중 네트워크 계층(3계층)은 서로 다른 네트워크 간에 패킷을 목적지까지 전달하는 경로 설정과 논리 주소 지정을 담당하며, 그 대표 프로토콜이 IP(Internet Protocol)입니다. IP는 IP 주소를 기반으로 라우팅을 수행합니다. 1번 FTP와 2번 TELNET은 응용 계층(7계층)에서 동작하는 파일 전송 및 원격 접속 프로토콜이고, 3번 FDDI는 광섬유 기반의 토큰 링 방식 LAN 기술로 데이터링크 및 물리 계층(1, 2계층)에 해당합니다. 따라서 네트워크 계층 프로토콜은 IP입니다.","578":"정답은 1번 RIP입니다. RIP(Routing Information Protocol)는 RFC 1058로 표준화된 거리 벡터 방식의 내부 게이트웨이 라우팅 프로토콜로, 홉 수(hop count)를 메트릭으로 사용하며 최대 15홉까지만 도달 가능하고 주기적으로 라우팅 테이블 전체를 교환합니다. 2번 OSPF는 링크 상태(Link State) 방식의 라우팅 프로토콜로 RFC 2328 등에 정의되어 대규모 망에서 효율적이고, 3번 IGRP는 시스코가 개발한 독자적 거리 벡터 프로토콜이며, 4번 HELLO는 지연 시간을 메트릭으로 쓰던 초기 라우팅 프로토콜입니다. 따라서 RFC 1058 표준 라우팅 프로토콜은 RIP입니다.","579":"정답은 4번 float f = 2.05f; 입니다. 자바에서 부동소수점 리터럴은 기본적으로 double 타입으로 취급되기 때문에 float 변수에 소수 리터럴을 직접 대입하려면 반드시 f 또는 F 접미사를 붙여 float임을 명시해야 합니다. 4번은 2.05f처럼 f 접미사가 붙어 올바른 float 선언입니다. 1번 3.0e5D는 D 접미사가 double을 의미하므로 float에 직접 대입할 수 없고, 2번 3.14는 접미사가 없어 double로 해석되어 float에 대입 시 컴파일 오류가 나며, 3번 3.05d 역시 d 접미사로 double이므로 float에 대입할 수 없습니다. 따라서 float를 올바르게 선언한 것은 f 접미사를 사용한 4번입니다.","580":"프로토타이핑 모델은 최종 결과물을 만들기 전에 시제품(프로토타입)을 빠르게 만들어 사용자에게 보여주고 피드백을 받아가며 요구사항을 구체화하는 개발 방식입니다. 따라서 1번의 '개발 단계에서 오류 수정이 불가하므로 유지 보수 비용이 많이 발생한다'는 설명은 프로토타이핑의 특성과 정반대이며, 오히려 시제품을 통해 초기에 오류와 요구사항 오해를 발견하고 수정할 수 있어 틀린 설명입니다. 2번처럼 의뢰자가 미리 모형을 볼 수 있고, 3번처럼 발주자와 개발자에게 공통의 참조 모델을 제공하며, 4번처럼 시제품을 통해 사용자 요구사항을 도출할 수 있는 것이 프로토타이핑의 핵심 장점입니다. 즉 정답은 프로토타이핑의 장점을 거꾸로 서술한 1번입니다. 암기 포인트로 프로토타이핑은 요구사항이 불명확할 때 반복적으로 시제품을 만들어 요구를 확정하는 모델이라는 점을 기억하세요.","581":"객체지향에서 클래스(class)는 공통된 속성과 행위를 가진 유사한 객체들을 묶어 하나의 틀로 정의한 것으로, 데이터 추상화의 단위이자 객체를 생성하는 설계도 역할을 합니다. 따라서 '하나 이상의 유사한 객체들을 묶어 공통된 특성을 표현한 데이터 추상화'에 해당하는 것은 4번 class입니다. 1번 message는 객체 간에 메서드를 호출하기 위해 주고받는 신호(요청)를 의미하고, 2번 inheritance(상속)는 상위 클래스의 속성과 메서드를 하위 클래스가 물려받는 개념입니다. 3번 method는 객체가 수행하는 동작을 정의한 함수를 뜻합니다. 클래스는 추상화이고 그것을 실제 메모리에 생성한 실체가 객체(인스턴스)라는 관계를 기억하면 구분이 쉽습니다.","582":"시스템 검사(System Test)는 단위 검사와 통합 검사가 모두 끝난 후 전체 소프트웨어를 하나로 통합한 상태에서 요구사항 명세서를 기준으로 시스템 전체가 요구를 만족하는지 확인하는 단계입니다. 형상검사, 알파검사, 베타검사 등 실제 운영 환경 수준의 검증 기법이 여기에 포함되므로 정답은 3번 SYSTEM TEST입니다. 1번 통합 검사(Integration Test)는 모듈들을 결합하면서 인터페이스 오류를 찾는 단계이고, 2번 단위 검사(Unit Test)는 개별 모듈을 독립적으로 검증하는 가장 작은 단위의 검사입니다. 4번 확인 검사(Validation Test)는 사용자 요구를 제대로 충족했는지 확인하는 검사로 의미가 비슷하지만, 알파/베타/형상검사를 포함하며 전체 통합 후 명세서 기반으로 진행한다는 문제의 서술은 시스템 검사를 가리킵니다. 검사 순서는 단위 검사, 통합 검사, 시스템 검사, 인수(확인) 검사 순으로 진행된다는 점을 함께 기억하세요.","583":"C언어 연산자 우선순위는 산술 연산자가 가장 높고, 비교(관계) 연산자, 논리 연산자, 대입 연산자 순으로 낮아집니다. 보기 중 4번 % (나머지 산술 연산자)가 가장 높고, 그다음 2번 == (관계 연산자), 1번 ! (단항 논리 부정)도 관계 연산자보다 높은 우선순위를 가지며, 3번 && (논리 AND)는 이들 모두보다 우선순위가 낮습니다. 따라서 우선순위가 가장 낮은 것은 3번 &&입니다. 정리하면 ! 와 % 같은 단항/산술 연산자가 가장 먼저 평가되고, == 같은 관계 연산자가 그다음, && 같은 논리 연산자가 가장 나중에 평가됩니다. 암기 요령으로 산술 > 관계 > 논리 > 대입 순서를 기억하면 됩니다.","584":"로더(Loader)는 목적 프로그램을 주기억장치에 적재하여 실행 가능하게 만드는 시스템 소프트웨어로, 대표적인 종류에는 Compile and Go Loader, Absolute Loader(절대 로더), Relative(Relocating) Loader(재배치 로더), 그리고 Linking Loader(연결 로더)가 있습니다. 보기 중 2번 Indirect Linking Loader는 존재하지 않는 명칭이므로 정답은 2번입니다. 1번 Compile and Go는 번역 결과를 바로 메모리에 적재해 실행하는 방식이고, 3번 Absolute Loader는 지정된 절대 주소에 그대로 적재하는 방식, 4번 Relative Loader는 적재 시 재배치가 가능한 로더입니다. 로더의 기본 기능은 할당(Allocation), 연결(Linking), 재배치(Relocation), 적재(Loading) 네 가지라는 점을 함께 기억하세요.","585":"JAVA에서 wait(), notify(), notifyAll() 메서드는 스레드 간 동기화를 위해 사용되며, 이 메서드들은 모든 클래스의 최상위 부모인 java.lang.Object 클래스에 정의되어 있습니다. 모든 객체가 모니터(monitor)를 가질 수 있도록 Object에 정의되어 있으므로 정답은 2번 java.lang.Object입니다. 1번 java.title.Thread, 3번 java.moni.Object, 4번 java.this.Thread는 모두 실제 존재하지 않는 잘못된 패키지/클래스 이름입니다. Thread 클래스가 아니라 Object 클래스에 정의되어 있다는 점이 핵심 함정이며, synchronized 블록 안에서만 이들 메서드를 호출해야 한다는 점도 함께 기억하세요.","586":"영상(비디오) 압축의 국제 표준화 방식에는 MPEG 계열과 H.26x 계열이 있으며, 보기 중 4번 H.264(MPEG-4 AVC)가 대표적인 영상 압축 표준입니다. 1번 AC-3는 돌비 디지털로 알려진 오디오 압축 방식이고, 2번 MPEG1 audio/layer3는 우리가 흔히 MP3라 부르는 오디오 압축 방식, 3번 MUSICAM은 MPEG 오디오의 기반이 된 오디오 부호화 방식입니다. 즉 1, 2, 3번은 모두 오디오(음성) 압축이고 4번만 영상 압축이므로 정답은 4번입니다. H.264는 높은 압축률과 화질로 인터넷 스트리밍과 방송에 널리 쓰인다는 점을 기억하세요.","587":"C++에서 함수를 호출하면 함수에 전달되는 매개변수(parameter)와 함수 내부에서 선언된 지역(자동) 변수는 스택(stack) 영역에 저장되며, 함수가 종료되면 자동으로 소멸합니다. 따라서 정답은 3번 스택입니다. 1번 스키마 영역은 데이터베이스 구조를 정의하는 개념으로 메모리 영역과 무관하고, 2번 정적 데이터 구역은 static 변수나 전역 변수가 저장되는 곳입니다. 4번 프로세스 제어 블록(PCB)은 운영체제가 프로세스 상태 정보를 관리하기 위한 자료구조입니다. 메모리 구조에서 지역변수와 매개변수는 스택, 동적할당은 힙, 전역/정적 변수는 데이터 영역, 코드는 코드(텍스트) 영역에 저장된다는 점을 정리해 두면 좋습니다.","588":"UML에서 클래스 다이어그램(클래스도)은 시스템을 구성하는 클래스(객체 타입)들과 그들 사이의 연관, 상속, 집합 등 정적인 관계를 표현하는 가장 핵심적인 구조 다이어그램으로, 객체지향 분석/설계의 중심이 됩니다. 따라서 정답은 3번 클래스도입니다. 1번 컴포넌트도는 소프트웨어의 물리적 구성요소와 그 의존관계를 나타내고, 2번 쓰임새도(유스케이스 다이어그램)는 사용자와 시스템 기능 간의 상호작용을 표현합니다. 4번 객체도는 특정 시점의 객체 인스턴스와 그 관계를 보여주는 다이어그램으로 클래스도의 한 스냅샷에 해당합니다. 정적 관계를 클래스 타입 수준에서 표현하는 것은 클래스도라는 점이 핵심입니다.","589":"트리에서 차수(degree)란 한 노드가 가진 자식 노드(가지)의 개수를 말하며, 트리 전체의 차수는 그 트리에 속한 노드들 중 가장 큰 차수 값을 의미합니다. 이 문제는 이미지로 트리가 제시되어 있어 정확한 구조는 보이지 않지만, 정답이 1번(2)인 것으로 보아 어떤 노드도 최대 2개를 넘는 자식을 갖지 않는 이진 트리 형태임을 알 수 있습니다. 따라서 트리의 차수는 가장 많은 자식을 가진 노드의 자식 수인 2이며 정답은 1번입니다. 참고로 노드의 차수(자식 수)와 트리의 차수(노드 차수의 최댓값)를 구분하고, 자식이 없는 노드(단말/잎 노드)의 차수는 0이라는 점을 기억하세요.","590":"JAVA는 1990년대 중반 썬 마이크로시스템즈의 제임스 고슬링(James Gosling)이 개발한 객체지향 프로그래밍 언어입니다. 따라서 3번 '데니스 리치가 개발하였다'는 설명은 틀렸으며 정답은 3번입니다. 데니스 리치(Dennis Ritchie)는 C언어를 개발한 인물입니다. 1번처럼 자바는 안드로이드 앱 개발의 주요 언어로 사용되고, 2번처럼 객체지향 언어이며, 4번처럼 유니코드를 지원하여 다양한 언어의 문자를 처리할 수 있는 것은 모두 옳은 설명입니다. 자바는 고슬링, C는 리치라는 개발자 이름을 함께 외워두면 좋습니다.","591":"이진 트리의 전위 순회(Preorder)는 루트를 먼저 방문하고 그다음 왼쪽 서브트리, 마지막에 오른쪽 서브트리를 방문하는 방식으로, 결과는 전위 표기법(prefix) 형태가 됩니다. 보기 중 2번 +-*AB/CD*EF만이 연산자가 피연산자보다 앞에 오는 전위 표기 형태이므로 정답은 2번입니다. 1번 AB*CD/-EF*+ 는 연산자가 뒤에 오는 후위 표기법(postfix, Postorder 결과)이고, 3번과 4번은 연산자가 피연산자 사이에 오는 중위 표기법(infix, Inorder 결과) 형태입니다. 순회 방식별로 전위는 prefix, 중위는 infix, 후위는 postfix 표현이 나온다는 대응을 기억하면 빠르게 답을 고를 수 있습니다.","592":"큐(Queue)는 먼저 들어온 데이터가 먼저 나가는 선입선출(FIFO) 구조로, 리스트의 뒤쪽(rear)에서 데이터를 삽입하고 앞쪽(front)에서 데이터를 제거합니다. 따라서 3번이 큐를 정확히 설명한 옳은 보기입니다. 1번 인터럽트 처리와 서브루틴 호출, 2번 LIFO(후입선출) 방식은 모두 스택(Stack)에 대한 설명이고, 4번 양쪽 끝에서 삽입과 삭제가 모두 가능한 자료구조는 데크(Deque)에 대한 설명입니다. 큐는 FIFO, 스택은 LIFO라는 대비를 기억하고, 큐의 대표적 응용으로 작업 스케줄링과 버퍼 관리가 있다는 점도 함께 알아두세요.","593":"이 코드에서 변수 i는 클래스의 인스턴스 멤버 변수(instance variable)인데, main 메서드는 static 메서드입니다. static 메서드에서는 객체를 생성하지 않은 상태에서 인스턴스 멤버를 직접 참조할 수 없으므로, static이 아닌 멤버 i를 static main에서 사용하면 'non-static variable cannot be referenced from a static context'라는 컴파일 오류가 발생합니다. 따라서 정답은 4번 Compile 오류입니다. 1번, 2번, 3번처럼 어떤 값이 출력되려면 i가 static 변수이거나 객체를 생성해 접근해야 하지만 코드는 그렇지 않습니다. static 메서드에서는 static 멤버만 직접 접근할 수 있다는 규칙이 핵심 포인트입니다.","594":"테스트 오라클(test oracle)이란 테스트를 수행한 후 그 실행 결과가 올바른지(기대한 정답과 일치하는지)를 판별해 주는 메커니즘 또는 기준을 의미합니다. 따라서 정답은 2번 '테스트 실행 결과가 올바른 결과인지를 판별할 수 있는 메커니즘'입니다. 1번은 소프트웨어 일부 기능만 시험하기 위한 변경으로 테스트 스텁/드라이버 등과 관련된 설명이고, 3번 테스트에 사용되는 데이터는 테스트 데이터(테스트 케이스의 입력값)에 대한 설명입니다. 4번 테스트 수행에 필요한 모든 것은 테스트 환경 또는 테스트웨어에 가까운 설명입니다. 오라클은 참값(정답)을 알려주어 합격/불합격을 판정하는 역할이라는 점을 기억하세요.","595":"C언어에서 static int a[8] = {1, 2, 3}; 처럼 배열 크기보다 적은 수의 초기값을 지정하면, 명시한 a[0]=1, a[1]=2, a[2]=3 이후 나머지 원소(a[3]부터 a[7]까지)는 모두 0으로 자동 초기화됩니다. 따라서 a[5]는 명시되지 않은 위치이므로 값이 0이며 정답은 1번입니다. 특히 static으로 선언된 배열은 초기값을 주지 않아도 0으로 초기화되는 성질이 있어 더욱 확실하게 0이 됩니다. 배열 일부만 초기화하면 나머지는 0으로 채워진다는 C언어의 규칙을 기억하면 됩니다.","596":"화이트 박스 테스트는 프로그램 내부의 논리 구조와 소스 코드를 직접 들여다보며 제어 흐름, 분기, 반복 등 논리적 경로를 검증하는 구조 기반 테스트입니다. 따라서 1번(제어구조 점검), 2번(모듈 내부 작동 관찰), 3번(모든 문장을 한 번 이상 수행) 모두 화이트 박스 테스트의 옳은 설명입니다. 반면 4번 '각 기능별로 정보영역을 정해 입력에 대한 출력의 정확성을 점검'하는 것은 내부 구조를 보지 않고 입출력 위주로 검사하는 블랙 박스 테스트에 대한 설명이므로 틀린 보기이고 정답은 4번입니다. 화이트 박스는 내부 구조 기반(구문/분기/경로 커버리지), 블랙 박스는 입출력 기능 기반(동등 분할/경계값 분석)이라는 대비를 기억하세요.","597":"브룩스의 법칙(Brooks' Law)은 '지연되는 소프트웨어 프로젝트에 인력을 추가로 투입하면 오히려 프로젝트가 더 늦어진다'는 유명한 법칙으로, 새 인원의 교육 비용과 의사소통 경로 증가로 인한 부담 때문에 발생합니다. 따라서 정답은 2번 Brooks의 법칙입니다. 1번 Boehm의 법칙은 소프트웨어 결함은 늦게 발견될수록 수정 비용이 기하급수적으로 증가한다는 것과 COCOMO 비용 산정 모델로 잘 알려져 있고, 3번 Putnam의 법칙은 프로젝트 규모와 노력, 기간 간의 관계를 다루는 SLIM 모델과 관련됩니다. 4번 Mayer의 법칙은 이 맥락의 표준 법칙이 아닙니다. '말기 인력 추가는 더 늦어진다'는 핵심 문구로 브룩스를 떠올리면 됩니다.","598":"요구분석(요구사항 분석) 단계는 소프트웨어 개발의 실질적 첫 단계로, 사용자가 무엇을 원하는지, 즉 소프트웨어가 수행해야 할 기능과 해결할 목표를 명확히 도출하고 기술하는 단계입니다. 따라서 1번, 2번, 3번은 모두 요구분석 단계의 옳은 설명입니다. 반면 4번 '소프트웨어의 내부 구조를 기술하는 단계'는 요구를 어떻게 구현할지를 정하는 설계(design) 단계에 대한 설명이므로 요구분석 단계의 설명이 아니며 정답은 4번입니다. 요구분석은 무엇(What)을 만들지, 설계는 어떻게(How) 만들지를 다룬다는 구분을 기억하면 됩니다.","599":"교차 개발 환경(Cross Development Environment)이란 소프트웨어를 개발하는 시스템(호스트)과 실제로 그 소프트웨어가 실행될 시스템(타깃)이 서로 다른 개발 방식을 말합니다. 임베디드 시스템은 자체 자원(메모리, 처리 능력 등)이 제한적이어서 PC 같은 성능 좋은 호스트에서 개발/컴파일한 뒤 타깃 보드로 옮겨 실행하므로 일반적으로 교차 개발 환경이 필요하며 정답은 3번입니다. 1번 네트워크 개발 환경, 2번 정적 개발 환경, 4번 동적 개발 환경은 이 정의에 해당하는 표준 용어가 아닙니다. 교차 컴파일러(cross compiler)는 호스트에서 동작하지만 타깃 CPU용 실행 코드를 생성한다는 점을 함께 기억하세요.","600":"NRZI(Non-Return-to-Zero-Inverted)는 데이터 비트가 0일 때 신호 레벨을 반전(toggle)시키고, 비트가 1일 때는 레벨을 유지하는 부호화 방식입니다. USB는 이 NRZI 방식을 사용하며, 추가로 1이 6개 연속되면 비트 스터핑을 적용하지만 본 문제 길이에서는 단순 인코딩만 적용됩니다. 데이터 1001100011을 비트마다 적용하면 1이면 유지, 0이면 반전이 되어 초기 레벨에서 시작해 차례로 변환한 결과가 1001100010이 되므로 정답은 3번입니다. 핵심 암기 포인트는 '0에서 천이(반전), 1에서 유지'이며 이는 멘체스터/NRZ-L과 구분해서 기억해야 합니다. 보기 1번 1001100011은 원본 데이터를 그대로 둔 것이고, 2번 0110011100은 0과 1의 규칙을 거꾸로 적용한 오류이며, 4번 1011101000은 천이 규칙을 잘못 누적한 값으로 모두 틀립니다.","602":"N개의 입력 중 하나를 선택하는 멀티플렉서(선택기)에서 필요한 제어(선택) 입력의 비트 수는 log2(N)으로 계산합니다. 입력이 4개이므로 log2(4) = 2가 되어 제어 입력 Z는 2비트가 필요하며 정답은 2번입니다. 2비트로는 00, 01, 10, 11의 네 가지 조합을 표현할 수 있어 4개 입력을 각각 지정할 수 있습니다. 일반적으로 2의 n승 개의 입력을 선택하려면 n개의 선택선이 필요하다는 공식을 기억하면 됩니다. 보기 1번 1비트는 2개 입력만, 3번 3비트는 8개 입력, 4번 4비트는 16개 입력 선택에 해당하므로 4개 입력에는 맞지 않습니다.","603":"인터럽트 우선순위는 시스템의 안정성과 데이터 보존에 치명적인 사건일수록 높게 부여되며, 일반적으로 정전(전원 이상)이 가장 높은 우선순위를 가집니다. 정전은 전원이 끊기기 전에 데이터를 보존하고 안전하게 종료하는 처리를 즉시 해야 하므로 다른 어떤 인터럽트보다 먼저 처리되어야 하기 때문에 정답은 2번입니다. 인터럽트 우선순위는 통상 정전(전원), 기계고장, 외부, 입출력, 프로그램체크, SVC(슈퍼바이저 콜) 순으로 낮아집니다. 보기 1번 SVC는 소프트웨어가 운영체제 서비스를 요청하는 것으로 우선순위가 가장 낮은 편이고, 3번 기계고장은 정전 다음으로 높으며, 4번 프로그램 체크는 명령어 실행 오류로 우선순위가 더 낮아 모두 정전보다 아래입니다.","604":"7 세그먼트 디스플레이로 10진수를 표시하려면 보통 BCD(2진화 10진수) 코드를 입력으로 받아 7개의 LED 세그먼트(a부터 g)를 구동합니다. 따라서 입력은 0부터 9까지를 표현하는 BCD 코드이므로 4비트가 필요하고, 출력은 7개의 세그먼트를 각각 켜고 끄기 위해 7개가 필요하므로 정답은 1번입니다. 즉 BCD-to-7세그먼트 디코더는 4입력 7출력 구조를 가집니다. 보기 2번은 입력과 출력을 정반대로 설명한 오류이고, 3번은 숫자 표시를 위해 여러 세그먼트가 동시에 켜져야 하므로(예: 8은 7개 모두 켜짐) 틀리며, 4번은 각 세그먼트 출력 논리식이 4개의 BCD 입력 변수로 표현되므로 7비트 논리식이라는 설명은 틀립니다.","605":"USB의 차동 신호 전송에서 논리 1과 0은 D+와 D- 두 신호선의 전압 차이로 구분되며, 일반적으로 풀스피드 기준 차동 전압 200mV를 임계값으로 사용합니다. 논리 값 1(차동 1, J 상태)은 D-에 대한 D+ 전압이 200mV를 초과할 때 결정되므로 정답은 4번입니다. 반대로 D+에 대한 D-가 200mV 초과면 논리 0(K 상태)이 됩니다. USB는 이렇게 두 선의 전압 차로 신호를 판별해 잡음에 강한 차동 전송을 구현합니다. 보기 1번과 2번은 D+에 대한 D-의 전압을 기준으로 해서 극성이 반대이고, 3번은 임계값을 100mV로 잘못 적은 것이라 모두 틀립니다.","606":"GPIO(General Purpose Input Output)는 범용 디지털 입출력 핀으로, 입력으로 설정하면 외부 장치의 상태를 폴링하거나 인터럽트로 받아들이고, 출력으로 설정하면 On/Off 신호를 내보낼 수 있습니다. 그러나 GPIO는 본질적으로 디지털 신호(High/Low)만 다루므로 연속적인 아날로그 신호의 레벨을 직접 읽어 디지털로 변환하는 기능은 수행할 수 없으며, 이는 별도의 ADC(아날로그-디지털 변환기)가 담당하므로 정답은 4번입니다. 보기 1번은 입력핀으로 데이터를 폴링 방식으로 읽는 일반적 사용이고, 2번은 출력핀으로 장치를 제어하는 기능이며, 3번은 인터럽트 입력으로 사용하는 기능으로 모두 GPIO로 가능한 동작입니다.","607":"반가산기(half adder)는 두 비트 A, B를 더해 합(Sum)과 자리올림(Carry)을 출력하는 회로입니다. 합은 두 입력이 서로 다를 때만 1이 되므로 XOR 게이트로 구현하고, 자리올림은 두 입력이 모두 1일 때만 1이 되므로 AND 게이트로 구현합니다. 문제에서 X가 합(Sum) 경로, Y가 캐리(Carry) 경로에 해당하므로 X=XOR, Y=AND가 되어 정답은 3번입니다. 즉 Sum = A XOR B, Carry = A AND B라는 공식을 기억하면 됩니다. 보기 1번은 합을 OR로 잘못 본 것이고, 2번은 합과 캐리 위치를 뒤바꾼 것이며, 4번은 합을 XNOR로 잘못 본 것이라 모두 틀립니다.","608":"CPU가 하나의 명령어를 처리하는 기본 사이클은 인출(Fetch), 해독(Decode), 실행(Execute)으로 이루어지며, 더 세분하면 명령어를 메모리에서 가져오고(A), 그 명령어를 해석한 뒤(B), 필요한 오퍼랜드(피연산자)를 가져와(C), 실제 연산을 실행(D)하는 순서입니다. 따라서 A 명령어 가져오기 → B 명령어 해석 → C 오퍼랜드 가져오기 → D 실행 순서가 되어 정답은 1번입니다. 반드시 명령어를 먼저 인출해야 무엇을 할지 해독할 수 있고, 해독 후에야 어떤 데이터가 필요한지 알아 오퍼랜드를 가져올 수 있다는 논리적 흐름을 기억하면 됩니다. 보기 2, 3, 4번은 모두 인출 이전에 해석이나 오퍼랜드 인출, 실행이 오는 잘못된 순서입니다.","609":"전가산기(full adder)는 입력 비트 x, y와 하위에서 올라온 캐리 z(Cin)를 더하여 합(S)과 자리올림(Carry, Cout)을 출력합니다. 캐리 출력의 논리식은 C = xy + (x XOR y)z 형태로 표현되는데, 이는 두 입력이 모두 1이거나(xy), 두 입력 중 하나가 1이면서 입력 캐리가 1일 때(x XOR y)z 자리올림이 발생함을 의미하므로 정답은 3번입니다. 동일하게 C = xy + yz + xz로도 표현할 수 있습니다. 보기 1번은 캐리가 아니라 합(Sum = x XOR y XOR z)을 불완전하게 적은 것이고, 2번 xyzxyz와 4번 xyz는 세 입력이 모두 1일 때만 캐리가 발생한다는 잘못된 식이라 틀립니다.","610":"C Type 열전대(텅스텐-레늄, 텅스텐 써모커플)는 매우 높은 온도 측정에 적합한 센서로, 약 0도에서 2300도 이상의 초고온 영역을 측정하는 데 사용됩니다. 따라서 'C Type이 -200도에서 -100도의 저온에 적합하다'는 설명은 완전히 반대로 서술한 것이므로 가장 옳지 않은 보기이며 정답은 4번입니다. 저온 측정에는 오히려 T Type이나 E Type 등이 적합합니다. 보기 1번 R Type이 B Type보다 내열성과 기계적 강도가 약하다는 설명, 2번 PT100과 K, J, E, T, B, R, S, C Type이 존재한다는 설명, 3번 N Type이 K Type 개량형으로 규소 첨가로 내열성을 높였다는 설명은 모두 올바른 내용입니다.","611":"Verilog HDL의 모델링 수준 중 행위 레벨 모델링(Behavioral Level Modeling)은 회로의 내부 게이트 구조를 명시하지 않고 입출력의 동작(기능)을 가장 추상적으로 기술하는 방식으로, 알고리즘 수준에서 아키텍처를 평가할 때 사용하며 if, case, for 같은 제어문을 써서 C 프로그래밍 언어와 매우 유사하게 작성합니다. 따라서 정답은 4번입니다. 추상화 수준은 행위 레벨(가장 높음), 데이터 플로우 레벨, 게이트 레벨(가장 낮음) 순으로 구체화됩니다. 보기 1번 게이트 레벨은 AND, OR 등 실제 게이트와 연결로 기술하는 가장 낮은 수준이고, 2번 데이터 플로우는 assign 문으로 신호 흐름을 기술하는 중간 수준이며, 3번 구조적 프로시저는 행위 모델링의 일부 개념일 뿐 상위 추상화 전체를 지칭하는 정확한 용어가 아닙니다.","612":"CPU 칩의 핀 수를 줄여 소형화하기 위해 하나의 물리적 핀을 여러 기능으로 번갈아 사용하도록 하는 기법을 핀 멀티플렉싱(Pin Multiplexing)이라고 하며, GPIO 핀을 상황에 따라 GPIO, UART, SPI 등 여러 기능 중 하나로 선택해 사용하게 해 줍니다. 따라서 정답은 1번입니다. 이는 한정된 핀 자원을 효율적으로 활용하는 핵심 설계 기법입니다. 보기 2번 팬-아웃은 한 출력이 구동할 수 있는 입력 부하 수를 의미하고, 3번 오픈-드레인은 출력단 구조 방식이며, 4번 풀-업은 핀을 일정 전압으로 유지하기 위한 저항 연결 방식으로 모두 핀 다기능화와는 다른 개념입니다.","613":"제시된 Verilog 코드 assign f = s ? x : y는 선택 신호 s가 1이면 출력 f에 x를, s가 0이면 y를 전달하는 조건 연산이며, 이는 두 입력 중 하나를 한 개의 선택선으로 고르는 2x1 멀티플렉서(2to1 MUX)의 동작과 정확히 일치하므로 정답은 3번입니다. 멀티플렉서는 여러 입력 중 선택선 값에 따라 하나를 출력으로 내보내는 회로입니다. 보기 1번 인코더는 여러 입력 중 활성화된 하나를 코드로 변환하고, 2번 디코더는 코드를 여러 출력 중 하나로 해독하며, 4번 4x1 멀티플렉서는 입력 4개와 선택선 2개가 필요하므로 입력 x, y와 선택선 s 하나만 있는 이 코드와는 맞지 않습니다.","614":"간접 주소지정 방식(Indirect Addressing)은 명령어의 오퍼랜드가 실제 데이터를 직접 가리키는 것이 아니라, 데이터가 저장된 주소(유효 주소)를 담고 있는 메모리 위치를 가리키고, 그 위치에 들어 있는 주소를 따라가 최종 데이터에 접근하는 방식입니다. 즉 오퍼랜드가 가리키는 곳에 다시 주소가 들어 있어 한 단계 더 거쳐 데이터를 찾으므로 정답은 1번입니다. 메모리 접근이 두 번 필요해 속도는 느리지만 주소 지정 범위가 넓어지는 특징이 있습니다. 보기 2번 상태 주소지정은 일반적 용어가 아니고, 3번 인덱스 주소지정은 베이스 주소에 인덱스 레지스터 값을 더해 유효주소를 구하며, 4번 즉시 주소지정은 오퍼랜드 자체가 데이터인 방식으로 모두 설명과 다릅니다.","615":"NFS(Network File System)는 네트워크를 통해 원격 컴퓨터의 파일 시스템을 마치 로컬처럼 공유하고 접근하게 해 주는 분산 파일 시스템으로, TCP/IP 프로토콜 위에서 동작합니다. 따라서 데이터가 시리얼 포트를 통해 전송된다는 4번 설명은 틀린 것이며 정답은 4번입니다. NFS는 시리얼 포트가 아니라 네트워크(이더넷 등 TCP/IP)를 통해 동작합니다. 보기 1번은 운영체제가 다른 이기종 컴퓨터끼리도 파일을 공유할 수 있다는 올바른 설명이고, 2번은 TCP/IP 기반이라는 정확한 설명이며, 3번은 하드디스크가 제한적인 임베디드 시스템에서 원격 저장공간을 마운트해 하드웨어 확장처럼 활용한다는 옳은 설명입니다.","616":"퓨징(Fusing)은 임베디드 시스템의 비휘발성 저장장치(플래시 메모리 등)에 시스템 구동에 필요한 이미지를 굽는(쓰는) 작업으로, 일반적으로 부트로더, 커널 이미지, 루트 파일 시스템이 그 대상입니다. 응용 프로그램은 보통 루트 파일 시스템 안에 포함되거나 시스템이 부팅된 후 별도로 설치/실행되는 것이라 독립적인 퓨징 대상으로 보지 않으므로 정답은 4번입니다. 즉 부팅에 필수인 세 가지 구성요소(부트로더, 커널, 루트파일시스템)를 먼저 플래시에 굽는 것이 핵심입니다. 보기 1, 2, 3번은 모두 시스템을 기동하기 위해 반드시 저장장치에 퓨징해야 하는 필수 이미지입니다.","617":"GRUB(GRand Unified Bootloader)은 GNU 프로젝트의 부트로더로 다양한 운영체제의 커널을 불러올 수 있으며, 대부분의 리눅스 배포판에서 표준으로 사용되고 스테이지(Stage 1, 1.5, 2) 단위로 부팅 과정이 단계적으로 구성되는 것이 특징이므로 정답은 1번입니다. 멀티부팅을 지원해 여러 OS를 메뉴에서 선택할 수 있는 점도 GRUB의 대표적 기능입니다. 보기 2번 BLOB와 4번 BOOTLDR는 특정 임베디드 보드용 부트로더이고, 3번 U-Boot(Das U-Boot)는 임베디드 ARM 계열에서 널리 쓰이는 부트로더이지만 GNU 프로젝트의 스테이지 기반 리눅스 배포판 표준 부트로더라는 설명에는 GRUB이 가장 정확히 부합합니다.","618":"DVFS(Dynamic Voltage and Frequency Scaling)는 CPU와 주변장치의 전압과 동작 주파수를 작업 부하에 따라 동적으로 낮추어 소비 전력을 줄이는 절전 기술입니다. 그런데 주파수를 낮추면 단위 시간당 처리할 수 있는 명령어 수는 감소하지(처리 속도가 느려지지) 증가하지 않으므로 '전압과 주파수를 낮추면 처리 명령어가 증가한다'는 2번 설명은 틀린 것이며 정답은 2번입니다. 즉 성능과 전력 사이의 트레이드오프 관계를 이해해야 합니다. 보기 1번은 전압과 주파수를 낮춰 전력을 줄인다는 정확한 정의이고, 3번은 전력 감소가 발열 감소로 이어진다는 옳은 설명이며, 4번은 발열량에 따라 패시브/액티브 냉각 방식과 비용이 달라진다는 올바른 설명입니다.","619":"리눅스의 런레벨(run level)에서 1번은 단일 사용자 모드(single user mode)로, 네트워크나 다중 사용자 서비스 없이 root 권한의 쉘로 바로 부팅되어 주로 시스템 복구나 점검에 사용됩니다. 따라서 single user mode로 쉘에 바로 부팅하는 런레벨은 1번이 정답입니다. 런레벨 0은 시스템 종료(halt), 6은 재부팅(reboot)이라는 점도 함께 기억하면 좋습니다. 보기 2번은 NFS 없는 다중 사용자 모드, 3번은 네트워크를 포함한 텍스트 기반 다중 사용자 모드, 5번은 그래픽(X윈도우) 다중 사용자 모드를 의미하므로 단일 사용자 모드와는 다릅니다.","620":"동작 중인 리눅스 커널에 새로 작성한 커널 모듈(.ko 파일)을 적재(load)할 때 사용하는 명령어는 insmod(insert module)이므로 정답은 3번입니다. insmod는 지정한 모듈 파일을 실행 중인 커널 공간에 삽입하여 기능을 추가합니다. 보기 1번 lsmod는 현재 적재되어 있는 모듈 목록을 보여주는 명령이고, 2번 rmmod는 적재된 모듈을 제거(remove)하는 명령이며, 4번 mknod는 장치 파일(디바이스 노드)을 생성하는 명령으로 모듈 적재와는 무관합니다. 참고로 의존성까지 자동 처리해 모듈을 적재하려면 modprobe를 사용한다는 점도 함께 알아두면 좋습니다.","621":"정답은 1번 kill_proc()입니다. 디바이스 드라이버는 커널 공간에서 동작하면서 특정 사용자 프로세스에게 비동기적인 사건(예: 인터럽트 발생, 데이터 도착)을 알릴 때 시그널을 보내는데, 커널 내부에서 프로세스에게 시그널을 전달하는 함수가 바로 kill_proc()입니다. 이름은 'kill'이지만 실제로는 프로세스를 죽이는 것이 아니라 사용자가 등록한 시그널 번호를 해당 프로세스로 전달하는 역할을 합니다. 사용자 프로세스는 signal()이나 sigaction()으로 핸들러를 등록해 두고 드라이버가 보낸 시그널을 받아 처리합니다. 2번 put_user()는 커널 공간의 데이터를 사용자 공간으로 복사하는 함수이고, 3번 get_user()는 반대로 사용자 공간의 값을 커널로 가져오는 함수이며, 4번 mknod()는 디바이스 파일(노드)을 생성하는 명령/함수로 시그널 전달과는 무관합니다.","622":"정답은 1번 %p입니다. printf 계열 함수에서 %p는 포인터(주소) 값을 출력하기 위한 변환 형식 지정자로, 변수의 메모리 주소를 보통 16진수 형태로 표현해 줍니다. 포인터 변수나 &연산자로 얻은 주소를 출력할 때 %p를 사용하며, 시스템에 따라 0x 접두어와 함께 16진수로 표시됩니다. 2번 %d는 부호 있는 10진 정수, 3번 %u는 부호 없는 10진 정수, 4번 %c는 문자 하나를 출력하는 형식이므로 주소 출력 용도와는 다릅니다. 암기 포인트로 정수는 %d, 부호없음 %u, 문자 %c, 문자열 %s, 실수 %f, 16진수 %x, 주소(포인터) %p로 구분해 두면 됩니다.","623":"정답은 1번 git입니다. git은 리누스 토발즈가 리눅스 커널 개발을 위해 만든 대표적인 분산형 버전 관리 시스템(DVCS)으로, 각 개발자의 로컬에 전체 저장소 이력 사본을 두고 작업한 뒤 서로 병합할 수 있어 중앙 서버 없이도 버전 관리가 가능합니다. 실제로 리눅스 커널 소스의 다운로드와 버전 관리에 git이 사용됩니다. 2번 svn(Subversion)과 4번 subversion은 같은 것으로 중앙 집중형(CVCS) 시스템이고, 3번 cvs 역시 중앙 집중형 방식이라 분산형이 아닙니다. 분산형은 git, Mercurial 등이고 중앙 집중형은 CVS, SVN이라는 구분을 기억하면 됩니다.","624":"정답은 1번으로, 틀린 설명을 고르는 문제입니다. '프로세서의 전력 소비는 클럭 주파수에 반비례한다'는 잘못된 서술이며, 실제로는 소비 전력이 클럭 주파수에 비례합니다. 동적 전력은 대략 P가 정전용량 C, 전압 V의 제곱, 주파수 f에 비례하는 P=CV제곱f 관계를 따르므로 주파수가 높아지면 전력 소비도 증가합니다. 2번처럼 전압의 제곱에 비례한다는 설명은 이 공식에 부합해 옳고, 3번처럼 임베디드 프로세서가 동적 주파수 조정(DFS)과 동적 전압 조정(DVS) 기능을 제공한다는 것도 맞으며, 4번 아이들 모드에서 여러 클럭이 중지된다는 설명도 옳습니다. 따라서 반비례라고 한 1번이 틀린 보기입니다.","625":"정답은 3번 kconfig입니다. 리눅스 커널의 빌드 설정 메뉴(make menuconfig 등)는 각 디렉터리에 있는 Kconfig 파일들을 참조하여 구성되며, Kconfig에는 어떤 설정 항목을 메뉴에 표시할지, 의존 관계와 도움말이 정의되어 있습니다. 사용자가 menuconfig로 선택한 결과는 .config 파일로 저장되고, 이것이 빌드 시 반영됩니다. 1번 config(.config)는 설정 결과가 저장되는 파일이고, 2번 autoconf.h는 .config를 기반으로 자동 생성되어 소스에서 참조하는 헤더 파일이며, 4번 makefile은 실제 컴파일 규칙을 담은 파일로 메뉴 구성의 근거 파일은 아닙니다. 따라서 설정 메뉴 구성의 참조 파일은 Kconfig입니다.","626":"정답은 2번입니다. 교차개발(Cross Development) 환경에서 이더넷 허브는 한 대의 허브를 중심으로 여러 대의 컴퓨터와 네트워크 장비를 연결하는 장치라는 설명이 옳습니다. 1번은 틀렸는데, 컴파일한 실행 이미지가 실제로 수행되는 대상은 호스트가 아니라 타겟 시스템이므로 설명이 뒤바뀌어 있습니다. 3번도 틀렸으며, 컴파일러, 디버거, 에디터 등 개발 환경을 제공하는 쪽은 타겟이 아니라 호스트 시스템입니다. 4번은 RS232를 JTAG 디버깅 통신 모드라고 했으나 RS232는 시리얼 통신 규격이고 JTAG는 별도의 디버깅 인터페이스이므로 잘못된 설명입니다. 교차개발은 성능 좋은 호스트에서 개발하고 자원이 제한된 타겟에서 실행한다는 개념을 기억하면 됩니다.","627":"정답은 1번 toolbox입니다. 안드로이드는 리눅스 커널 기반이지만 일반 데스크톱 리눅스의 GNU 표준 명령어 세트가 그대로 들어있지 않으며, 대신 여러 기본 명령을 하나로 묶은 toolbox(또는 후속의 toybox)라는 경량 유틸리티를 사용합니다. 따라서 ls, cat 같은 표준 리눅스 명령어가 부족할 때 toolbox 패키지를 통해 기본 명령들을 제공받습니다. 2번 adb는 호스트와 안드로이드 기기를 연결해 디버깅과 파일 전송을 하는 도구이고, 3번 nfs는 네트워크 파일 시스템, 4번 tftp는 간이 파일 전송 프로토콜로 모두 표준 명령어 집합을 보충하는 용도와는 거리가 멉니다. 안드로이드의 기본 명령 묶음은 toolbox라는 점이 핵심입니다.","628":"정답은 2번 트랩(Trap)입니다. 트랩은 현재 실행 중인 프로그램이 스스로 일으키는 소프트웨어적인 사건(예: 0으로 나누기, 시스템 호출 요청, 페이지 폴트 등)을 운영체제에 알리는 동기적 메커니즘으로, 일종의 소프트웨어 인터럽트이자 조건 전달점 역할을 합니다. 외부 하드웨어가 비동기적으로 일으키는 인터럽트와 달리 트랩은 프로그램 실행 흐름 내부에서 발생합니다. 1번 시스템 호출은 트랩을 이용해 커널 서비스를 요청하는 행위로 트랩의 한 사용 예에 가깝지만 메커니즘 자체를 지칭하는 정확한 용어는 트랩입니다. 3번 세그먼테이션은 메모리를 논리적 단위로 분할 관리하는 기법이고, 4번 분기는 프로그램 제어 흐름을 다른 곳으로 옮기는 명령이므로 사건 알림 메커니즘과는 다릅니다.","629":"정답은 4번 시스템 진단 기능입니다. 셸(Shell)은 사용자와 커널 사이에서 명령을 받아 해석하고 실행시키는 인터페이스로서, 1번 명령어 해석기(command interpreter) 기능, 2번 셸 스크립트를 통한 프로그래밍 기능, 3번 환경변수와 프로파일을 통한 사용자 환경설정 기능을 핵심 역할로 가집니다. 반면 시스템 진단(하드웨어 점검, 자원 상태 분석 등)은 셸 자체의 기본 기능이 아니라 별도의 진단 도구나 유틸리티가 담당하는 영역입니다. 셸의 3대 기능을 명령 해석, 프로그래밍, 환경 설정으로 묶어 외워두면 이런 유형의 문제를 쉽게 해결할 수 있습니다. 따라서 셸의 기능이 아닌 것은 시스템 진단 기능입니다.","630":"정답은 4번입니다. JTAG는 바운더리 스캔(Boundary Scan) 기술을 기반으로 한 디버깅 및 테스트 인터페이스로, 1번처럼 칩 내부 회로의 배선과 소자의 전기적 연결 상태를 점검하고, 2번처럼 디바이스 사이의 연결 상태를 검사하며, 3번처럼 플래시 메모리에 펌웨어 데이터를 기록(프로그래밍)하는 용도로 사용됩니다. 그러나 4번 '메모리에 기록된 데이터를 실행한다'는 JTAG의 기능 설명으로 잘못되었는데, 프로그램의 실제 실행은 CPU(프로세서)가 수행하는 것이지 JTAG 인터페이스가 코드를 실행하는 것이 아니기 때문입니다. JTAG는 디버깅 시 실행을 멈추거나 단계 실행을 제어할 수는 있어도 그 자체가 코드 실행 주체는 아닙니다. 따라서 잘못 설명한 것은 4번입니다.","631":"정답은 2번 스트림(스트림)입니다. 리눅스가 제공하는 대표적인 프로세스 간 통신(IPC) 방식에는 시그널(Signal), 파이프(Pipe)와 명명된 파이프(FIFO), 메시지 큐, 공유 메모리, 세마포어, 소켓(Socket) 등이 있습니다. 1번 시그널, 3번 파이프, 4번 소켓은 모두 리눅스의 IPC 메커니즘에 해당하지만, 2번 스트림은 리눅스 표준 IPC 방식으로 분류되지 않습니다. 스트림은 본래 System V 계열 유닉스의 STREAMS 입출력 프레임워크를 가리키는 용어로 리눅스의 기본 IPC 목록에는 포함되지 않습니다. 따라서 IPC 방식이 아닌 것은 스트림입니다.","632":"정답은 4번입니다. misc(miscellaneous) 디바이스 드라이버는 1번 설명처럼 리눅스 2.4 시절 주번호(major number) 자원이 한정되어 있어서, 별도의 주번호를 일일이 할당받기 어려운 단순한 문자 장치들을 위해 사용됩니다. 2번처럼 misc 드라이버는 주번호가 10번으로 고정되어 있고 서로 다른 장치는 부번호(minor number)로 구분하며, 3번처럼 cat /proc/misc 명령으로 등록된 misc 장치 목록을 확인할 수 있습니다. 그러나 4번 '블록 디바이스 드라이버로 파티션 구분에서 사용한다'는 틀린 설명인데, misc 디바이스는 본질적으로 문자(character) 디바이스 드라이버의 한 형태이지 블록 디바이스나 파티션 관리용이 아니기 때문입니다. 따라서 틀린 것은 4번입니다.","633":"정답은 4번입니다. 리눅스 커널 모듈(LKM)의 장점은 1번처럼 자주 쓰지 않는 기능을 항상 메모리에 상주시키지 않아도 되고, 2번처럼 필요할 때만 insmod/modprobe로 동적으로 적재해 커널의 일부로 사용하고 불필요하면 rmmod로 제거할 수 있으며, 3번처럼 기능을 분리해 확장성과 재사용성을 높일 수 있다는 점입니다. 모듈의 핵심 이점은 바로 커널을 재컴파일하거나 재부팅하지 않고도 기능을 추가/제거할 수 있다는 것입니다. 그런데 4번 '새로 생성된 커널은 다시 부팅해야 된다'는 모듈의 장점이 아니라 오히려 모듈을 쓰지 않을 때의 불편함에 해당하므로 장점으로 볼 수 없습니다. 따라서 모듈의 장점이 아닌 것은 4번입니다.","634":"정답은 4번(ㄱ, ㄷ, ㅁ)입니다. ㄱ은 옳은데 TRST는 JTAG 인터페이스를 초기화하는 리셋 입력 신호(Test Reset)가 맞습니다. ㄷ도 옳으며 TMS(Test Mode Select)는 TAP 컨트롤러의 상태(스테이트 머신)를 전환하는 입력 신호입니다. ㅁ도 옳은데 TDO(Test Data Out)는 바운더리 스캔 체인에서 읽은 값을 밖으로 내보내는 테스트 데이터 출력 신호입니다. 반면 ㄴ은 틀렸는데, TCK(Test Clock)는 JTAG 전용 테스트 클록을 제공하는 것이지 시스템 클록과 동일한 클록을 주는 것이 아닙니다. ㄹ도 틀렸는데, TDI(Test Data In)는 데이터를 공급하는 입력 신호이지 출력 신호가 아닙니다. 따라서 옳은 것만 묶으면 ㄱ, ㄷ, ㅁ인 4번이 정답입니다.","635":"정답은 3번으로, 틀린 설명을 고르는 문제입니다. poll과 epoll은 여러 파일 디스크립터의 입출력 준비 상태를 감시하는 다중화(multiplexing) 메커니즘인데, '둘 다 POSIX 규약을 따르므로 서로 호환된다'는 설명은 잘못되었습니다. poll은 POSIX 표준 함수이지만 epoll은 리눅스 고유(리눅스 전용) 기능으로 POSIX 표준이 아니며 다른 유닉스 계열과 호환되지 않습니다. 1번처럼 epoll은 리눅스 커널이 지원하는 기능이 맞고, 2번처럼 감시 대상 fd가 많은 대용량 처리에서는 매번 전체를 순회하는 poll보다 이벤트 기반인 epoll이 훨씬 빠르며, 4번처럼 두 호출 모두 블로킹 중 시그널에 의해 인터럽트될 수 있습니다. 따라서 호환된다고 한 3번이 틀린 설명입니다.","636":"정답은 3번 10.15.255.254입니다. 문제의 10.0.0.0/12 네트워크는 앞 12비트가 네트워크 부분이므로, 10.0.0.0의 두 번째 옥텟(8비트 중 상위 4비트)까지가 고정되고 나머지가 호스트 영역이 됩니다. 두 번째 옥텟의 상위 4비트가 0000으로 고정되면 두 번째 옥텟은 0부터 15까지 변할 수 있어, 주소 범위는 10.0.0.0 ~ 10.15.255.255가 됩니다. 이 블록에서 마지막 주소 10.15.255.255는 브로드캐스트 주소이므로 실제로 호스트에 할당 가능한 마지막 IP는 그보다 하나 작은 10.15.255.254입니다. 따라서 정답은 10.15.255.254이며, 나머지 보기들은 범위의 끝값이 아니거나 잘못 계산된 값입니다.","637":"정답은 1번 192.57.30.0입니다. 네트워크 ID는 IP 주소와 서브넷 마스크를 비트 단위 AND 연산하여 구합니다. 서브넷 마스크가 255.255.255.0이므로 앞 세 옥텟은 그대로 유지되고 마지막 옥텟은 0이 됩니다. 따라서 192.57.30.224에서 마지막 옥텟 224를 0으로 만든 192.57.30.0이 네트워크 ID가 됩니다. 2번과 3번은 두 번째 옥텟을 임의로 58로 바꿔 틀렸고, 4번은 세 번째 옥텟을 29로 잘못 바꾼 값이므로 모두 오답입니다. 마스크에서 255인 부분은 주소를 그대로 두고 0인 부분만 0으로 만든다는 원리를 기억하면 됩니다.","638":"정답은 1번으로, 틀린 설명을 고르는 문제입니다. '멀티 프로세서 환경에서는 메모리 접근 순서를 바꿀 수 없다'는 잘못된 서술인데, 실제로는 컴파일러 최적화나 CPU의 비순차 실행(out-of-order)으로 인해 메모리 접근 순서가 재배열될 수 있고, 바로 이런 재배열을 막기 위해 메모리 장벽(memory barrier)이 필요한 것입니다. 2번처럼 성능 향상을 위해 명령어 순서가 바뀔 수 있다는 점이 메모리 장벽이 존재하는 이유이고, 3번처럼 메모리 장벽은 어떤 명령어도 그 경계를 넘어 재배치되지 못하게 하는 방화벽 같은 역할을 하며, 4번처럼 입출력 포트에 작용하는 명령어들은 순서가 보장되어야 하므로 장벽 역할을 합니다. 따라서 순서를 바꿀 수 없다고 단정한 1번이 틀린 설명입니다.","639":"정답은 2번 3120입니다. TCP의 MSS(Maximum Segment Size)가 1460이므로 한 세그먼트의 페이로드는 최대 1460바이트까지 담을 수 있어, 3000바이트의 데이터는 1460 + 1460 + 80으로 나뉘어 세 개의 세그먼트로 전송됩니다. 옵션 필드를 쓰지 않으면 TCP 헤더 20바이트와 IP 헤더 20바이트, 합쳐서 세그먼트당 40바이트의 헤더가 붙습니다. 따라서 실제 전송되는 총 바이트는 데이터 3000바이트에 세 세그먼트 각각의 헤더 40바이트씩 총 120바이트를 더한 3120바이트가 됩니다. 계산식은 3000 + (40 x 3) = 3120으로, 세그먼트가 몇 개로 쪼개지는지를 먼저 따진 뒤 헤더를 곱해 더하는 것이 핵심입니다.","640":"정답은 4번입니다. 프로세스 메모리는 크게 텍스트(코드), 데이터, 힙, 스택 영역으로 나뉘는데, 힙(Heap) 영역은 malloc, calloc, new 같은 메모리 할당 함수를 통해 프로그램 실행 중 동적으로 생성되는 저장 공간이 위치하는 곳입니다. 1번 전역변수와 정적변수가 존재하는 곳은 데이터(BSS 포함) 영역에 대한 설명이고, 2번 프로그램의 실행 코드가 저장되는 곳은 텍스트(코드) 영역에 대한 설명이며, 3번 함수의 리턴 주소와 지역(로컬 자동)변수가 저장되는 곳은 스택 영역에 대한 설명입니다. 힙은 낮은 주소에서 높은 주소로 자라고 스택은 반대로 자란다는 점도 함께 기억하면 좋습니다. 따라서 힙 영역을 올바르게 설명한 것은 4번입니다.","641":"TCP_NODELAY 옵션은 네이글(Nagle) 알고리즘을 비활성화하기 위해 사용하는 소켓 옵션입니다. 네이글 알고리즘은 작은 크기의 데이터를 모아 한 번에 보내 네트워크 패킷 수를 줄이려는 기법인데, 이 때문에 작은 데이터를 즉시 보내지 못하고 지연이 생길 수 있습니다. 코드에서 sockopt 값을 1로 설정해 TCP_NODELAY를 켜면 네이글 알고리즘이 적용되지 않아 작은 데이터도 즉시 전송됩니다. 따라서 정답
