<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>임베디드기사 필기 CBT</title>
<style>
  :root{
    --bg:#f1f5f9; --panel:#ffffff; --panel2:#f8fafc; --line:#e2e8f0;
    --txt:#1e293b; --muted:#64748b; --accent:#2563eb; --accent2:#1d4ed8;
    --ok:#16a34a; --bad:#dc2626; --warn:#d97706; --chip:#f1f5f9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:"Malgun Gothic","맑은 고딕",system-ui,-apple-system,sans-serif;line-height:1.6}
  a{color:var(--accent)}
  .wrap{max-width:980px;margin:0 auto;padding:16px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20}
  header.top h1{font-size:17px;margin:0;cursor:pointer}
  .top .meta{font-size:13px;color:var(--muted);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:9px 14px;
    font-size:14px;cursor:pointer;font-weight:600}
  .btn:hover{background:var(--accent2)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .btn.ok{background:var(--ok)} .btn.warn{background:var(--warn);color:#1a1a1a}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .setcard{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;
    cursor:pointer;transition:.15s}
  .setcard:hover{border-color:var(--accent);transform:translateY(-2px)}
  .setcard .t{font-weight:700;font-size:15px}
  .setcard .s{color:var(--muted);font-size:12px;margin-top:6px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .muted{color:var(--muted)} .small{font-size:13px}
  .chip{display:inline-block;background:var(--chip);border:1px solid var(--line);
    border-radius:999px;padding:2px 10px;font-size:12px;color:var(--muted)}
  /* question */
  .qhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
  .qno{font-size:20px;font-weight:800}
  .qbody{font-size:16px;margin:6px 0 14px}
  .qbody img{max-width:100%;background:#fff;border-radius:8px;margin:8px 0;display:block}
  .qbody pre{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:12px;
    overflow:auto;font-size:13px;color:#0f172a}
  .qbody code{font-family:Consolas,monospace}
  .qbody table{border-collapse:collapse;margin:8px 0;font-size:14px;width:auto}
  .qbody th,.qbody td{border:1px solid var(--line);padding:6px 10px;text-align:center}
  .qbody th{background:var(--panel2)}
  .qbody blockquote{margin:8px 0;padding:8px 14px;border-left:3px solid var(--accent);
    background:var(--panel2);border-radius:0 8px 8px 0}
  .qbody ul{margin:8px 0;padding-left:22px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;cursor:pointer;background:var(--panel2);transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt .num{flex:0 0 26px;height:26px;border-radius:50%;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .opt.sel{border-color:var(--accent);background:#dbeafe}
  .opt.sel .num{background:var(--accent);color:#fff;border-color:var(--accent)}
  .opt.correct{border-color:var(--ok);background:#dcfce7}
  .opt.correct .num{background:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:#fee2e2}
  .opt.wrong .num{background:var(--bad);color:#fff}
  .feedback{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:14px;display:none}
  .feedback.show{display:block}
  .feedback.good{background:#dcfce7;border:1px solid var(--ok)}
  .feedback.bad{background:#fee2e2;border:1px solid var(--bad)}
  .expl{margin-top:8px;color:#475569;font-size:13.5px;white-space:pre-wrap}
  /* omr */
  .omr{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .omr .cell{aspect-ratio:1;border:1px solid var(--line);border-radius:7px;background:var(--panel2);
    display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;font-weight:600}
  .omr .cell:hover{border-color:var(--accent)}
  .omr .cell.answered{background:var(--accent);color:#fff;border-color:var(--accent)}
  .omr .cell.cur{outline:2px solid #0f172a;outline-offset:1px}
  .omr .cell.ok{background:var(--ok);color:#fff;border-color:var(--ok)}
  .omr .cell.no{background:var(--bad);color:#fff;border-color:var(--bad)}
  .omr .cell.flag::after{content:"";position:relative}
  .navbtns{display:flex;justify-content:space-between;gap:10px;margin-top:16px}
  /* results */
  .score{font-size:42px;font-weight:900}
  .bar{height:10px;background:var(--panel2);border-radius:999px;overflow:hidden;margin-top:6px}
  .bar>i{display:block;height:100%}
  .subjrow{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:10px 0;border-bottom:1px solid var(--line)}
  .tag{font-size:11px;padding:1px 8px;border-radius:6px}
  .tag.pass{background:#dcfce7;color:var(--ok)} .tag.fail{background:#fee2e2;color:var(--bad)}
  .hide{display:none!important}
  .toggle{display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
  .toggle input{width:16px;height:16px}
  footer{color:var(--muted);font-size:12px;text-align:center;padding:24px}
  @media(max-width:600px){.omr{grid-template-columns:repeat(6,1fr)}}
  /* --- Tier 1 additions --- */
  #themeBtn{padding:7px 10px;font-size:15px;line-height:1}
  .bmk{background:none;border:0;font-size:22px;line-height:1;cursor:pointer;color:#94a3b8;padding:0 2px}
  .bmk.on{color:#f59e0b}
  .askbtn{background:none;border:0;font-size:18px;line-height:1;cursor:pointer;padding:0 2px;opacity:.85}
  .askbtn:hover{opacity:1}
  .askmenu{position:absolute;z-index:70;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.2);padding:6px;min-width:172px}
  .askmenu-h{font-size:11px;color:var(--muted);padding:6px 10px 4px}
  .askmenu button{display:block;width:100%;text-align:left;background:none;border:0;color:var(--txt);
    padding:9px 12px;border-radius:7px;font-size:14px;cursor:pointer}
  .askmenu button:hover{background:var(--panel2)}
  .askmenu-sep{height:1px;background:var(--line);margin:4px 0}
  .concept-title{font-size:21px;font-weight:800;margin:8px 0 4px}
  .concept-note{margin:6px 0}
  .concept-list .setcard .t{font-size:14px}
  /* 리치 노트/해설 렌더링 */
  .exp-h{font-weight:800;margin-bottom:6px;color:var(--txt)}
  .mdnote{white-space:normal;color:var(--txt);font-size:14.5px;line-height:1.8}
  .concept-note.mdnote{font-size:15px}
  .mdnote p{margin:0 0 10px}
  .mdnote p:last-child{margin-bottom:0}
  .mdnote ul{margin:8px 0;padding-left:20px}
  .mdnote li{margin:4px 0}
  .mdnote strong{color:var(--accent2);font-weight:700}
  .mdnote code{background:var(--chip);border:1px solid var(--line);padding:1px 5px;border-radius:5px;
    font-family:Consolas,monospace;font-size:.92em}
  .mdnote .md-h{font-weight:800;font-size:1.02em;margin:14px 0 6px;color:var(--txt)}
  .mdnote blockquote{margin:12px 0 2px;padding:10px 14px;background:var(--panel2);
    border-left:3px solid var(--warn);border-radius:0 8px 8px 0}
  html.dark .mdnote strong{color:#93c5fd}
  .btn.small{padding:6px 11px;font-size:13px}
  #updBar{position:fixed;left:0;right:0;bottom:0;z-index:60;background:var(--accent);color:#fff;
    padding:12px 16px;display:none;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;
    box-shadow:0 -4px 18px rgba(0,0,0,.2);font-size:14px}
  #updBar.show{display:flex}
  #updBar .btn{background:#fff;color:var(--accent);padding:7px 14px}
  #updBar .btn.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.6)}
  #updBar .muted{color:#dbeafe;font-size:12px}
  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:#0f172a;color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;
    opacity:0;pointer-events:none;transition:.2s;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.25)}
  #toast.show{opacity:.96;transform:translateX(-50%) translateY(0)}
  .card.resume{border-color:var(--accent);background:linear-gradient(0deg,var(--panel),var(--panel))}
  .omr .cell.flag{position:relative}
  .omr .cell.flag::after{content:"";position:absolute;top:3px;right:3px;width:6px;height:6px;
    border-radius:50%;background:#f59e0b;box-shadow:0 0 0 1px var(--panel)}
  /* dark theme */
  html.dark{
    --bg:#0f172a; --panel:#1e293b; --panel2:#172033; --line:#334155;
    --txt:#e2e8f0; --muted:#94a3b8; --accent:#3b82f6; --accent2:#2563eb;
    --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b; --chip:#0b1220;
  }
  html.dark .opt.sel{background:#1e3a5f}
  html.dark .opt.correct{background:#14331f}
  html.dark .opt.wrong{background:#3b1717}
  html.dark .feedback.good{background:#14331f}
  html.dark .feedback.bad{background:#3b1717}
  html.dark .qbody pre,html.dark .qbody code{background:#0b1220;color:#e2e8f0}
  html.dark .qbody img{background:#e2e8f0}
  html.dark .tag.pass{background:#14331f} html.dark .tag.fail{background:#3b1717}
</style>
</head>
<body>
<header class="top">
  <h1 onclick="goHome()">📘 임베디드기사 필기 CBT</h1>
  <div class="meta" id="topMeta"></div>
  <button class="btn ghost" id="themeBtn" onclick="toggleTheme()" title="다크 모드 전환">🌙</button>
</header>

<div class="wrap">
  <!-- HOME -->
  <section id="home">
    <div id="resumeBox"></div>
    <div id="studyHomeBox"></div>
    <div id="reviewBox"></div>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div><b>회차를 선택하세요</b> <span class="muted small">— 연도별 기출 / 2025 복원본</span></div>
        <label class="toggle small"><input type="checkbox" id="practiceMode" checked> 연습 모드(즉시 정답 확인)</label>
      </div>
      <div class="row small" style="gap:18px;margin-top:10px;flex-wrap:wrap">
        <label class="toggle"><input type="checkbox" id="shuffleOpts"> 보기 순서 섞기</label>
        <label class="toggle">⏱ 실전 제한시간
          <select id="timeLimit" style="padding:5px 8px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);color:var(--txt)">
            <option value="0">없음</option><option value="30">30분</option><option value="60">60분</option><option value="90">90분</option><option value="120">120분</option>
          </select>
        </label>
        <span class="muted" style="font-size:12px">제한시간은 실전 모드(연습 해제)에서 적용</span>
      </div>
      <div class="grid" id="setGrid" style="margin-top:14px"></div>
    </div>
    <div id="tier2Box"></div>
    <div class="card">
      <b>🎲 랜덤 모의고사</b>
      <div class="muted small" style="margin:6px 0 12px">전체 문제에서 무작위로 출제 (정답이 있는 문제만)</div>
      <div class="row">
        <button class="btn" onclick="startRandom(20)">20문항</button>
        <button class="btn" onclick="startRandom(40)">40문항</button>
        <button class="btn" onclick="startRandom(80)">80문항</button>
      </div>
    </div>
    <div class="card small muted" id="statBox"></div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hide">
    <div class="card">
      <div class="qhead">
        <span class="qno" id="qNo"></span>
        <span class="row" style="gap:8px">
          <span class="chip" id="qSubj"></span>
          <button class="askbtn" id="askBtn" onclick="openAskMenu(event)" title="AI에게 질문 (GPT/Gemini/Claude)">🤖</button>
          <button class="bmk" id="bmkBtn" onclick="toggleBookmark()" title="북마크 추가/해제">☆</button>
        </span>
      </div>
      <div class="qbody" id="qBody"></div>
      <div class="opts" id="qOpts"></div>
      <div class="feedback" id="qFeed"></div>
      <div class="navbtns">
        <button class="btn ghost" id="prevBtn" onclick="move(-1)">◀ 이전</button>
        <div class="row">
          <button class="btn ghost" onclick="clearAns()">선택해제</button>
          <button class="btn ghost" onclick="goHome()">나가기</button>
        </div>
        <button class="btn" id="nextBtn" onclick="move(1)">다음 ▶</button>
      </div>
    </div>
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:10px">
        <b>답안지(OMR)</b>
        <button class="btn warn" onclick="submitQuiz()">제출 / 채점</button>
      </div>
      <div class="omr" id="omr"></div>
    </div>
  </section>

  <!-- STUDY (개념 학습) -->
  <section id="study" class="hide">
    <div id="studyBox"></div>
  </section>

  <!-- RESULTS -->
  <section id="results" class="hide">
    <div class="card" id="scoreCard"></div>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <b>📑 문제 리뷰</b>
        <label class="toggle small"><input type="checkbox" id="wrongOnly" onchange="renderReview()"> 틀린 문제만</label>
      </div>
      <div id="review"></div>
    </div>
    <div id="studyNextWrap" class="row" style="justify-content:center;margin:4px 0"></div>
    <div class="row" style="justify-content:center;margin:10px 0;gap:10px">
      <button class="btn warn" onclick="retryWrong()">🔁 틀린 문제만 다시 풀기</button>
      <button class="btn" onclick="goHome()">처음으로</button>
    </div>
  </section>
</div>
<footer>임베디드기사 필기 CBT · 데이터: 연도별 기출 + 2025 복원본 · 로컬 전용</footer>

<script>
var DATA = {"questions":[{"id":1,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":1,"q":"임베디드 하드웨어 전원에 대한 설명으로 옳지 않은 것은?","opts":["OS는 시스템 부하에 따라 idle모드와 sleep모드로 변경한다.","어댑터는 AC 110V 혹은 220V의 전원을 DC 8, 11, 22V등의 가정용 저전압으로     변환하는 장치이다.","전압 레귤레이터는 ON/OFF 과정을 통해 일정한 평균전압을 일정 범위 내 원하는     전압으로 변환하는 기능을 수행한다.","리눅스가 지원하는 전원 관리 표준은 APM과 ACPI가 있다."],"ans":3,"exp":"선후관계가 반전되었다. 레귤레이터는 일정 범위 내 DC 전압을 일정한 DC전압으로 변환하는 장치이다.","tag":"완전 신출"},{"id":2,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":2,"q":"USB에 관한 설명으로 옳지 않은 것은?","opts":["접지되는 부분의 마모로 인식에 한계가 존재한다.","핫 플러그를 지원하여 컴퓨터에 전원이 켜져 있는 상태에서도 바로 연결할 수 있다.","USB는 64개의 주변 기기를 지원하며 자체 220V 전원을 공급할 수 있다.","USB 3.0버전은 최대 5Gbps의 속도를 지원한다."],"ans":3,"exp":"USB는 명칭 그대로 직렬 포트이므로 이론상 한 PC에 127개까지만 인식이 가능하다. 또한, 상식적으로 생각해봐도 USB가 220V의 전원을 공급한다면 USB만으로도 컴퓨터가 부팅이 가능한데 이건 말이 안된다. USB는 +5V의 전원을 공급한다.","tag":"완전 신출"},{"id":3,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":3,"q":"리눅스의 물리적 공간을 논리적으로 나눌 때 최대 몇 개의 파티션으로 나눌 수 있는가?","opts":["12개","5개","1개","10개"],"ans":1,"exp":"리눅스는 프라이머리 3개, 확장파티션 1개, 논리파티션 12개로 총 16개의 파티션으로 나눌 수 있다.","tag":"완전 신출"},{"id":4,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":4,"q":"A,B,C,D의 데이터를 C,D,A,B 순서대로 결과값을 얻고자 할 때 push와 pop을 수행한 순서로 옳은 것은?","opts":["pop-pop-push-push-pop-pop-push-push","pop-pop-push-push-pop-push-pop-push","push-push-pop-pop-push-push-pop-pop","push-push-pop-pop-push-pop-push-pop"],"ans":3,"exp":"일단, C,D를 얻기 위해서는 A를 PUSH하고 B를 PUSH하므로 1,2번은 소거되고, A,B가 남은 상태에서 1번 PUSH하면 B,A가 되고, 여기서 다시 PUSH하면 A,B가 되므로 3번이 정답이다.","tag":"기출변형"},{"id":5,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":5,"q":"다음 설명에 해당하는 객체 지향 분석 방법으로 옳은 것은?\n\n- 문제를 정의한다.(요구사항 분석)\n- 비공식 전략을 개발한다.(문제 해결을 위해 무엇을 행하여야 하는가?)\n- 전략을 공식화한다.\n- 설계가 모두 이루어질 때까지 문제 정의, 비공식 전략 개발, 전략의 공식화를 반복 적용한다.\n- 클래스와 객체를 구현한다.\n- 프로그램의 구성요소는 명세 부분과 외부로부터 감추어진 부분(사각형)으로 표시한다.\n- 구름 모양은 개별 구분 또는 정의되지 않은 구현 상세를 나타낸다.\n- 둥근 사각형은 자료 객체, 직사각형은 객체 연산을 나타낸다.\n- 미시적, 거시적 프로세스를 모두 사용하는 분석하는 방법이다.","opts":["Coad와 Yourdon의 객체 지향 분석","Booch의 객체 지향 분석","Rambaugh의 객체 지향 분석","Jacobson의 객체 지향 분석"],"ans":2,"exp":"성안당 2013 임베디드기사 p.416의 설명을 보기로 그대로 전부 주고 맞추라는 식으로 기출보다 상당히 심화버전의 문제이다. 이 문제가 있다는 것은 다른 객체지향 분석에 대한 문제도 문제은행에 있다는 반증이니 1,3,4번 선지에 대한 특징도 전부 정리해야 할 것이다.","tag":"2013년 70번 기출 심화 응용"},{"id":6,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":6,"q":"RS-232의 PIN 번호의 기능과 표기에 관한 연결로 옳지 않은 것은?\n\n| 핀 | 단자명 | 기능 | 표기 |\n|---|---|---|---|\n| 1 | DATA CARRIER DETECT | 데이터 캐리어 검출 | DCD |\n| 2 | RECEIVED DATA | 수신 데이터 | RXD |\n| 3 | TRANSMITTED DATA | 송신 데이터 | TXD |\n| 4 | DATA TERMINAL READY | 데이터 단말 준비 | DTR |\n| 5 | SIGNAL GROUND | 신호용 접지 | GND |\n| 6 | DATA SET READY | 데이터 세트 허가 | DSR |\n| 7 | REQUEST TO SEND | 송신 요구 | RTS |\n| 8 | CLEAR TO SEND | 송신 허가 | CTS |\n| 9 | RING INDICATOR | 벨울림 검출 | RI |","opts":["데이터 단말 준비-DCD","송신 데이터-TXD","데이터 세트 허가-DSR","송신 허가-CTS"],"ans":1,"exp":"RS232 9핀 신호체계는 다음과 같다. 즉, DCD는 데이터 단말 준비가 아닌 데이터 캐리어 검출에 해당한다.","tag":"완전 신출"},{"id":7,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":7,"q":"다음 논리회로의 명칭은 무엇인가?\n\n![문제 7 그림](images/img001.jpg)","opts":["기수 패리티 발생 회로","비교기","병렬 가감산기","전가산기"],"ans":3,"exp":"인터넷에 비슷한 사진 자체부터가 아예 없어서 직접 그렸다. 정확한 복원을 위해 깔끔하지 못하게 그렸으니 양해의 말씀을... 각설하고 해설하면, 얼핏보면 비교기 같이 보이나, 비교기는 F3부분 B부분에 NOT게이트가 하나 더 붙어야 하고, F4가 없어야 한다. 잘 보면 반가산기와 반감산기를 병렬로 연결한 형태임을 알 수 있다. 전가산기야 다들 잘 알테니 설명은 생략하고, 기수 패리티 발생회로와 우수 패리티 발생회로는 사진을 보고 필히 숙지할 것!","tag":"완전 신출"},{"id":8,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":8,"q":"블랙 박스 테스트에 대한 설명으로 옳지 않은 것은?","opts":["기초적 모델 관점과 데이터, 입출력 위주의 검사 방법으로, 기능검사이다.","경계값 검사는 경계 근처의 입력값의 오류 가능성을 테스트 하는 방법이다.","원시 프로그램과 상관없이 결과만 옳으면 검사를 통과하는 방법이다.","프로그램 원시 코드의 논리적 구조를 커버하도록 테스트 케이스를 설계한다."],"ans":4,"exp":"4번은 화이트박스 테스트에 대한 설명이다. 기존에는 검사 방법으로 옳지 않은 문제를 고르는 문제였으나, 설명을 주고 옳지 않은 것을 고르는 문제가 문제은행에 추가된 것으로 보아 각 테스트에 대한 특징을 모두 숙지해야 할 것으로 생각된다.","tag":"22년 기출 변형"},{"id":9,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":9,"q":"OSI-7계층에서 실제 회선의 연결을 확립, 유지, 단절하기 위한 기계적, 전기적, 기능적, 절차적 특성을 정의하는 계층은?","opts":["물리 계층","전송 계층","데이터링크 계층","표현 계층"],"ans":1,"exp":"","tag":"완전 신출-하지만 쉬운 편"},{"id":10,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":10,"q":"유닉스 표준 시그널에서 시그널의 명칭과 발생 및 용도를 짝지은 것으로 옳지 않은 것은?","opts":["SIGTSTP는 CTRL+Z로 생성하여 터미널을 정지시키는 문자이다.","SIGHUP는 터미널에서 접속이 끊겼을 때 CTRL+Q로 프로세스를 재시작한다.","SIGINT는 CTRL+C로 실행을 중지시키는 문자이다.","SIGQUIT는 CTRL+⧹로 종료 요청과 함께 코어 덤프를 생성한다."],"ans":2,"exp":"SIGHUP는 Hangup 시그널로 전화선이 끊어졌을 때 발생한다. 즉, 디폴트 액션은 종료를 취하며, 변화된 내용을 적용하기 위해 재시작할 때 사용하며, 입력 명령어는 따로 존재하지 않는다. 또한, CTRL+Q라는 단축키는 존재하지도 않는다.","tag":"완전 신출"},{"id":11,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":11,"q":"리눅스의 SIGCHLD 시그널에 대한 설명으로 옳지 않은 것은?","opts":["자식 프로세스가 좀비가 되는 것을 막기 위해서 wait 또는 waitpid 함수를 사용한다.","자식 프로세스가 종료될 경우 종료 상태를 부모 프로세스에게 보내지 않는다.","자식 프로세스가 종료되면 SIGCHLD_HANDLER함수를 통해 시그널 핸들러를 수행한다.","자식보다 부모가 먼저 종료될 경우 데몬 프로세스가 새로운 부모 프로세스가 되어    고아 프로세스가 작업을 마치고 종료될 수 있도록 한다."],"ans":2,"exp":"자식 프로세스가 종료될 경우 종료 상태를 부모에게 자동으로 보낸다. 이것이 SIGCHLD 시그널이다. 하지만, 자식 프로세스에 발생한 결함은 부모에게 전파되지 않는다. 반면, 스레드에서는 자식 스레드에 결함 발생시 부모 스레드로 전파된다.","tag":"완전 신출"},{"id":12,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":12,"q":"다음의 리눅스 부팅과정 5단계 순서를 옳게 나열한 것은?\n\n- ㄱ. 시스템 전원 공급\n- ㄴ. 커널 단계\n- ㄷ. BIOS 단계\n- ㄹ. 부트로드 단계\n- ㅁ. init 프로세스 단계","opts":["ㄱ → ㄴ → ㄷ → ㄹ → ㅁ","ㄱ → ㄹ → ㄷ → ㅁ → ㄴ","ㄱ → ㄷ → ㄹ → ㄴ → ㅁ","ㄱ → ㅁ → ㄹ → ㄴ → ㄷ"],"ans":3,"exp":"일단, init가 맨 마지막에 수행됨을 안다면 1,3번만 남게 된다. 그리고 커널도 부트로드와 바이오스 과정을 모두 거쳐야 실행될 수 있으므로 답은 3번이 된다.","tag":"완전 신출"},{"id":13,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":13,"q":"LVM(Logical Volume Management)에 대한 설명으로 옳지 않은 것은?","opts":["작은 용량의 저장 장치를 하나의 장치처럼 사용하는 기능을 제공한다.","여러 장치를 묶어서 하나의 장치로 표현될 때 사용한다.","합쳐진 하나의 디바이스 사이즈 조정이 자유롭다.","볼륨이 깨지거나 운영 체제가 손상되더라도 자료 복구가 용이하다."],"ans":4,"exp":"LVM은 서로 다른 디바이스를 하나로 묶어서 직관적으로 저장 장치에 접근할 수 있도록 하는 장점이 있으나, 볼륨이 깨지거나 운영 체제가 손상되는 경우 자료 복구가 어렵다는 단점이 존재한다. 이러한 LVM의 단점을 보완하기 위해 현재는 RAID방식을 더 많이 사용한다.","tag":"완전 신출"},{"id":14,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":14,"q":"동적 메모리를 할당하는 함수와 일반적인 커널 메모리를 의미하는 플래그를 옳게 짝지은 것은?","opts":["vmalloc – GFP_KERNEL","kmalloc – GFP_KERNEL","vmalloc – GFP_ATOMIC","kmalloc – GFP_ATOMIC"],"ans":2,"exp":"동적 메모리를 할당하는 함수는 kmalloc으로 2,4번 중 하나인데, 일반적인 커널 메모리라고 하였으므로 GFP_KERNEL이 된다. GFP_ATOMIC은 GFP_KERNEL 플래그 사용시 Sleep모드에 빠질 경우 사용하는 긴급상황용 메모리이다.","tag":"완전 신출"},{"id":15,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":15,"q":"리눅스 쉘 로그인 과정을 옳게 나열한 것은?","opts":["/etc/profile → /etc/bashrc → ~/.bashrc → ~/.bash_profile","/etc/profile → ~/.bagh_profile → /etc/bashrc → ~/.bashrc","/etc/bashrc → ~/.bashrc → /etc/profile → ~/.bash_profile","/etc/bashrc → /etc/profile → ~/.bashrc → ~/.bash_profile"],"ans":1,"exp":"설정에 필요한 파일이 있는 디렉토리에 먼저 접근해야 하므로 1,4번 중 하나인데, /etc/profile에 먼저 접근해야 하므로 답은 1번이다. 사람에 대해 파악할 때 프로필을 먼저 봐야 파악할 수 있는 것과 비슷하다고 연상하면 편하다.","tag":"완전 신출"},{"id":16,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":16,"q":"리눅스에서 stat() 함수에 대한 설명으로 옳은 것은?","opts":["리눅스의 프로세스, 메모리, 페이징, I/O 블록의 상태를 출력한다.","실시간으로 CPU, 메모리 사용량 등 시스템 자원 사용 현황과 프로세스 목록을 보여준다.","디렉토리나 파일의 상세 정보를 출력한다.","CPU 아키텍쳐, 코어 수, 스레드 수 등 CPU 상세 정보를 보여준다."],"ans":3,"exp":"1번은 vmstat함수, 2번은 top함수, 4번은 iscpu함수에 대한 설명이다.","tag":"완전 신출"},{"id":17,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":17,"q":"0~3V에서 3비트 A/D변환할 때, 1LSB는 약 몇 V인가?","opts":["0.125V","0.375V","0.429V","0.667V"],"ans":2,"exp":"일단 LSB는 여기서비트수에서 3비트이므로 가 된다.","tag":"2019년 26번 그대로"},{"id":18,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":18,"q":"리눅스 쉘의 종류로 옳지 않은 것은?","opts":["C 쉘","Bourne 쉘","A 쉘","Korn 쉘"],"ans":3,"exp":"","tag":"2016년 23번 기출 변형"},{"id":19,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":19,"q":"JTAG 레지스터에 속하지 않는 것은?","opts":["Identification register","boundary register","Bypass register","Instruction register"],"ans":2,"exp":"boundary register는 존재하지 않으나 boundary-scan register는 존재한다. 그 외에도 internal register가 있다.","tag":"완전 신출"},{"id":20,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":20,"q":"다음 C언어의 실행 결과로 옳은 것은?\n\n```c\n#include<stdio.h>\nint main(void){\n    printf(\"HelloWorld\\n\");\n    return 0;\n}\n# arm-linux-gcc -o hello hello.c\n```","opts":["화면에는 HelloWorld 메시지가 출력된다.","화면에는 아무런 메시지도 출력되지 않는다.","타겟에서 hello 프로그램을 실행한다.","프로그램 실행시 CPU에 오류 메시지가 발생된다."],"ans":2,"exp":"다음은 PC에서 작성한 C코드를 ARM 계열 타깃 보드에서 실행하기 위한 크로스 컴파일 환경을 구성하기 위한 테스트 컴파일을 위한 코드의 일부분이다. C언어를 모르면 두 번째 줄의 printf부분만 보고 1번으로 오답을 고를 수도 있는데, 소스코드에 오류가 없으므로 화면에는 아무런 메시지가 출력되지 않는다. 타겟에서 hello 프로그램을 실행하려면 호스트에서 컴파일된 프로그램을 타겟으로 복사하는 과정을 거쳐야 하므로 답은 2번이 된다.","tag":"완전 신출"},{"id":21,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":21,"q":"TCP/UDP 네트워크 67번 포트의 프로토콜로 옳은 것은?","opts":["LDAP","DHCP","POP3","IMAP4"],"ans":2,"exp":"LDAP는 389번 포트, POP3는 110번 포트, IMAP4는 993번 포트를 사용한다.","tag":"완전 신출"},{"id":22,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":22,"q":"리눅스 교차 개발 환경에 대한 설명으로 옳지 않은 것은?","opts":["HOST와 TARGET에서 사용하는 마이크로프로세서가 서로 다를 때 실행할 수 있는 환경이다.","다음 환경에서 사용하는 컴파일러는 네이티브 컴파일러라고도 한다.","툴 체인은 크로스 컴파일러, 크로스 어셈블러, 크로스 링커, 로케이터로 구성된다.","호스트에서 타켓에서 실행될 프로그램을 개발하는데 필요한 환경을 툴체인이라 한다."],"ans":2,"exp":"네이티브 컴파일러는 소프트웨어가 개발되는 환경과 실행되는 환경이 같을 때 사용하는 컴파일러로, 크로스 컴파일러가 개발,실행환경이 서로 다를 때 사용하는 컴파일러와 상반되므로 오답이다.","tag":"완전 신출"},{"id":23,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":23,"q":"다음 리눅스 명령어 실행 중 일반 사용자 계정인 user 계정으로 로그인하여 퍼미션 인증 결과 다음과 같은 실행 결과가 도출되고, 비밀번호를 변경할 수 없는 상태라고 한다. 파일 비밀번호 변경을 위해서 입력해야 하는 명령어로 옳은 것은?\n\n```\n[root@localhost tmp]# touch file1 file2\n-rwxrw-r-- 1 root root 0 2020년 11월 20 16:40 file1\n-rw-r-xr-x 1 root root 0 2020년 11월 20 16:40 file2\n```","opts":["chown 4764 file1 chown u+s file 2","chmod 764 file1 chmod u+s file 2","chmod 4764 file1 chmod u+s file 2","chown 764 file1 chown u+s file 2"],"ans":3,"exp":"세부 구문이나 조건의 정확도는 100% 장담까지는 못하나 인터넷 서칭하다가 매우 흡사한 구문이 있어 생각난 문제이다. 일단 4000번은 SetUID의 특별한 퍼미션에 해당하는 절대 표현 모드이므로 무조건 1,3번 중 하나가 답이다. 일반 퍼미션(764,655 등)으로는 비밀번호 수정 권한을 부여할 수가 없다. 또한, chown은 권한을 허가하는 명령어가 아닌 파일 또는 디렉토리의 소유자 그룹 변경 명령어이므로 3번이 답이 된다.","tag":"완전 신출"},{"id":24,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":24,"q":"Little-endian의 설명으로 옳은 것은?","opts":["2바이트 이상의 데이터 저장시 하위 바이트가 먼저 저장된다.","2바이트 이상의 데이터 저장시 상위 바이트가 먼저 저장된다.","4바이트 데이터 저장시 중간바이트가 먼저 저장된다.","4바이트 데이터 저장시 하위, 상위, 중간바이트 순으로 저장된다."],"ans":2,"exp":"","tag":"2013년 4회 16번 문제와 동일"},{"id":25,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":25,"q":"JK플립플롭을 다음 과 같이 연결하여 클록펄스를 인가하면 출력 Q의 동작 상태는?\n\n![문제 25 그림](images/img002.jpg)","opts":["toggle","reset","set","race"],"ans":1,"exp":"","tag":"2013년 4회 20번 문제 동일"},{"id":26,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year":2025,"subject":"","subjectNorm":"기타","num":26,"q":"소프트웨어 공학에 대한 설명으로 가장 적합한 것은?","opts":["소프트웨어의 설계, 제작, 운영에 있어서 인간적인 요소를 배제한 프로그래밍 자체에    대한 공학적 연구를 의미한다.","소프트웨어의 공학적이고 기술적인 명함을 사회 경제적인 시각에서만 설명한다.","소프트웨어의 제작부터 운영까지 생산성을 높이기 위해 기술적, 인간적인 요소에 대한    방법론을 제시한다.","소프트웨어의 위기를 해결하기 위해서 현재 이미 해결된 문제들에 대해서 역사적    관점을 설명한다."],"ans":3,"exp":"","tag":"2013년 4회 77번 문제와 동일"},{"id":27,"setKey":"pdf2025","setLabel":"2025 복원 (PDF)","year": 래스와 객체들을 분석 및 식별하고 클래스의 속성과 연산을 정의한다.\n- 클래스와 객체의 의미를 식별한다.\n- 클래스와 객체들의 관계를 식별한다.\n- 각 작업에 대한 다이어그램, 클래스 계층 정의, 클래스들의 클러스터링 작업을 수행한다.\n- 클래스와 객체를 구현한다.","opts":["Booch 방법","Wirfs-Brock 방법","Jacobson 방법","Coad와 Yourdon 방법"],"ans":1,"exp":"","tag":""},{"id":114,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":70,"q":"블랙 박스 검사에 대한 설명으로 옳지 않은 것은?","opts":["각 기능이 완전히 작동되는 것을 입증하는 검사이다.","동치 분할 검사는 논리적인 조건과 대응하는 행동을 간략히 표현할 수 있도록 하는 검사 사례 설계 기법이다.","인터페이스 결함, 성능 결함, 초기화와 종료 이상 등을 찾아 낸다.","경계값 분석은 입력의 경계값에서 발생하는 오류를 제거하기 위한 검사 기법이다."],"ans":1,"exp":"","tag":""},{"id":115,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":71,"q":"일반적인 기능의 로더에 가장 가까운 것은?","opts":["Compile And Go Loader","Direct Linking Loader","Absoulte Loader","Dynamic Loading Loader"],"ans":2,"exp":"","tag":""},{"id":116,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":72,"q":"프로토타이핑 모형에 대한 설명으로 옳지 않은 것은?","opts":["프로토타이핑 모형은 발주자나 개발자 모두에게 공동 참조 모델을 제공한다.","사용자의 요구사항을 충실히 반영할 수 있다.","최종 결과물이 만들어지는 소프트웨어 개발 완료 시에 최초로 오류 발견이 가능하다.","프로토타이핑 모형은 소프트웨어 생명주기에서 유지보수가 없어지고 개발 단계 안에서 유지보수가 이루어지는 것으로 볼 수 있다."],"ans":3,"exp":"","tag":""},{"id":117,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":73,"q":"LOC 기법에 의하여 예측된 총 라인 수가 25000 라인일 경우 개발에 투입될 프로그래머의 수가 5명이고, 프로그래머들의 평균 생산성이 월당 500라인일 때, 개발에 소요되는 시간은?","opts":["8개월","9개월","10개월","11개월\n① MPEG-5\n② MPEG-7\n③ MPEG-11\n④ MPEG-21"],"ans":3,"exp":"","tag":""},{"id":118,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":74,"q":"럼바우의 객체 지향 분석 기법에서 상태 다이어그램을 사용하여 시스템의 행위를 기술하는 모델링은?","opts":["object modeling","dynamic modeling","functional modeling","static modeling"],"ans":2,"exp":"","tag":""},{"id":119,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":75,"q":"소프트웨어 공학에 대한 설명으로 가장 적합한 것은?","opts":["소프트웨어의 설계, 제작, 운영에 있어서 인간적인 요소를 배제한 프로그래밍 자체에 대한 공학적 연구를 의미한다.","소프트웨어의 공학적이고 기술적인 영향을 사회 경제적인 시각에서만 설명한다.","소프트웨어의 제작부터 운영까지 생산성을 높이기 위해 기술적, 인간적인 요소에 대한 방법론을 제공한다.","소프트웨어의 위기를 해결하기 위해서 현재 이미 해결된 문제들에 대해서 역사적 관점을 설명한다."],"ans":3,"exp":"","tag":""},{"id":120,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":76,"q":"스택에 대한 설명으로 옳지 않은 것은?","opts":["리스트의 한쪽 끝으로만 자료의 삽입, 삭제 작업이 이루어지는 자료 구조이다.","스택으로 할당된 기억공간에 가장 마지막으로 삽입된 자료가 기억된 공간을 가리키는 요소를 top이라고 한다.","가장 먼저 삽입된 자료가 가장 먼저 삭제되는 FIFO 방식이다.","부프로그램 호출 시 복귀주소를 저장할 때 스택을 이용한다."],"ans":3,"exp":"","tag":""},{"id":121,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":77,"q":"선형 구조에 해당하는 자료구조를 모두 선택한 것은?\n\n> 가. 트리, 나. 그래프, 다. 스택, 라. 큐, 마. 데크","opts":["가, 나","다, 라, 마","가, 다, 라, 마","나, 다, 라, 마"],"ans":2,"exp":"","tag":""},{"id":122,"setKey":"y2013","setLabel":"2013년 기출","year":2013,"subject":"제 4 과목 : 임베디드 소프트웨어","subjectNorm":"임베디드 소프트웨어","num":78,"q":"어휘 분석의 주된 역할은 원시 프로그램을 하나의 긴 스트림으로 보고 원시 프로그램을 문자 단위로 스캐닝 하여 문법적으로 의미 있는 일련의 문자들로 분할해 내는 것을 말한다. 이때 분할된 문법적인 단위를 무엇이라고 하는가?","opts":["토큰","오토마타","BNF","모듈"],"ans":1,"exp":"","tag":""},{"id":123,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":1,"q":"인터럽트에 대한 설명 중 틀린 것은?","opts":["시스템의 예외 상태가 발생했을 때 일어난다.","컴퓨터 내부에 시스템 상태를 나타내는 PSW와 무관하다.","인터럽트는 소프트웨어 인터럽트와 하드웨어 인터럽트로 나눈다.","벡터 인터럽트 방식은 인터럽트를 내는 소스가 프로세스에게 분기에 대한 정보를 제공하는 방식이다."],"ans":2,"exp":"","tag":""},{"id":124,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":2,"q":"128M*8Bits 크기의 RAM을 4개 이용하여 메모리를 구성할 때, 그 베이스 주소를 0x20000000로 설정하였다면, 구성된 메모리 시스템의 마지막 주소로 옳은 것은?","opts":["0x20FFFFFF","0x2FFFFFFF","0x30FFFFFF","0x3FFFFFFF"],"ans":4,"exp":"","tag":""},{"id":125,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":3,"q":"ARM 프로세서 모드의 설명으로 틀린 것은?","opts":["프로세서 모드는 어떤 레지스터가 활성화 되고, CPSR(Current Program Status Register) 레지스터를 엑세스 할 수 있는 권리를 갖게 될지를 결정한다.","User and System 모드는 r13, r14를 같이 사용하지만 다른 모드는 r13(Stack Pointer)과 r14(Link Register)를 별도로 사용한다.","FIQ(Fast Interrupt Request) 모드는 빠른 인터럽트 처리를 위한 ARM 프로세서 모드의 하나이다.","CPSR은 ARM의 각 모드별로 존재한다."],"ans":4,"exp":"","tag":""},{"id":126,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":4,"q":"다음 [그림]의 회로 명칭은 무엇인가?\n\n![](images/img009.png)","opts":["3단 2진 계수기","MOD 6 계수기","6진 리셋형 계수기","MOD 5 계수기"],"ans":2,"exp":"","tag":""},{"id":127,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":5,"q":"다음 [그림]은 Verilog HDL을 이용하여 논리회로를 설계한 로직 다이어그램과 코드이다. 코드에서 (ㄱ), (ㄴ)에 들어갈 내용으로 옳은 것은?\n\n![](images/img010.png)\n\n> module and_or_inverter_unit(y_out, x_inp1, x_inp2, x_inp3, x_inp4);\n>    (ㄱ) x_inp1, x_inp2, x_inp3, x_inp4;\n>    Output y_out;\n>    (ㄴ) y1, y2;\n>    And (y1, x_inp1, x_inp2);\n>    And (y2, x_inp3, x_inp4);\n>    Nor (y_out, y1, y2);\n> endmodule","opts":["(ㄱ) output, (ㄴ) tri","(ㄱ) input, (ㄴ) tri","(ㄱ) input, (ㄴ) wire","(ㄱ) input, (ㄴ) reg"],"ans":3,"exp":"","tag":""},{"id":128,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":6,"q":"불 함수 AB^C^ + ABC^를 간략화 하면?","opts":["A^B","AC^","AC","AB"],"ans":2,"exp":"","tag":""},{"id":129,"setKey":"y2014","setLabel":"2014년 기출","year":2014,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":7,"q":"마이크로 컴퓨터에 내장된 타이머에 대한 설명 중 틀린 것은?","opts":["입력되는 펄스의 수를 세는 역할을 수행한다.","외부에서 발생되는 특정 사건의 발생 수를 헤아리는 용도로 사용된다.","자신이 셀 수 있는 용량의 입력 펄스의 수를 헤아릴 때 인터럽트를 발생 시킨다.","입력되는 클럭의 주파수에 따라 주파수 발생기로도 사용된다."],"ans":3,"exp":"","tag":""},{"id":130,"setKey":"y2014","setLabel":"2014년 기출","year": 드웨어","subjectNorm":"임베디드 하드웨어","num":8,"q":"캐시의 일관성(Coherency) 유지를 위한 프로토콜 중 캐시가 가지고 있는 공유 블록을 감시하고 갱신할 경우 다른 캐시에 방송(Broadcast) 하고 방송내용을 관찰할 수 있도록 버스를 감시하는 프로토콜은?","opts":["Snoopy 프로토콜","Directory 프로토콜","가상(Virtual) 프로토콜","소프트웨어 제어 프로토콜"],"ans":1,"exp":"","tag":""},{"id":367,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 1 과목 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":9,"q":"하드웨어를 구동하기 위한 필수요소인 전원에 대한 설명으로 틀린 것은?","opts":["어댑터는 220V 또는 110V의 교류를 입력받아 직류 24V, 12V, 8V 등으로 바꾸는 장치이다.","레귤레이터는 높은 전압을 입력으로 받아 원하는 전압으로 바꾸는 장치이다.","레귤레이터의 시리즈 방식은 원하는 전압보다 높은 전압이 들어오면 그 이상을 빛으로 방출하고 나머지 원하는 전압을 출력하는 방식이다.","레귤레이터의 스위칭 방식은 전압을 인가/비인가(On/OFF)의 반복과정을 거쳐 평균전압을 원하는 전압으로 만드는 방식이다."],"ans":3,"exp":"","tag":""},{"id":368,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 1 과목 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":10,"q":"캐시(Cache) 메모리에서 주소의 정보를 찾는 가장 빠른 매핑 방법은?","opts":["연관 메모리(Associative memory) 장치 방식","직접매핑(Direct mapping)","프로그램 매핑(Program Mapping)","해시매핑(Hash mapping)"],"ans":1,"exp":"","tag":""},{"id":369,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 1 과목 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":11,"q":"페이지 테이블에 의한 엑세스 방법에서 하나의 오퍼랜드나 명령어를 주 메모리로부터 가져오기 위해 주 메모리에서 연속적인 엑세스가 일어나는 것이 아닌 것은?","opts":["디렉토리 엔트리에 대한 엑세스","캐시 데이터에 대한 엑세스","페이지 테이블 엔트리에 대한 엑세스","오퍼랜드나 명령어에 대한 액세스"],"ans":2,"exp":"","tag":""},{"id":370,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 1 과목 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":12,"q":"다음의 회로는 어떤 게이트와 동일한가?\n\n![](images/img004.png)","opts":["NAND GATE","NOR GATE","XNOR GATE","XOR GATE"],"ans":1,"exp":"","tag":""},{"id":371,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 1 과목 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":13,"q":"프로세서의 성능을 나타내는 단위는?","opts":["LPI","CPS","MIPS","MMU"],"ans":3,"exp":"","tag":""},{"id":372,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 1 과목 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":14,"q":"설계회로의 인터페이스에 관한 정보를 기술하는 VHDL 프  과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":21,"q":"교차 디버깅 툴인 GDB에 대한 설명으로 가장 옳지 않은 것은?","opts":["소스레벨 디버깅 기능을 갖는다.","서버와 클라이언트의 두 개 부분으로 이루어져 있다.","프로그램에서 상태와 값들을 확인할 수 있다.","GDB는 General Debugger의 줄임말이다."],"ans":4,"exp":"","tag":""},{"id":380,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":22,"q":"NFS에 대한 설명으로 가장 옳지 않은 것은?","opts":["운영체제가 다른 컴퓨터의 파일 시스템을 이용하기 위한 파일공유가 목적이다.","UDP/TCP 프로토콜 환경에서 운영된다.","임베디드 시스템에서 제한적인 하드디스크 등 하드웨어 확장에 이용된다.","시리얼 포트를 통해 데이터가 전송된다."],"ans":4,"exp":"","tag":""},{"id":381,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":23,"q":"커널이 인터럽트 상태에서 메모리를 할당하기 위해서 사용하는 함수가 아닌 것은?","opts":["kmalloc()","kfree()","xmalloc()","free_pages()"],"ans":3,"exp":"","tag":""},{"id":382,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":24,"q":"리눅스 기반의 안드로이드가 포팅되어 있는 임베디드 시스템에서 기본적으로 지원되지 않는 표준 리눅스 명령어를 사용하려고 한다. 추가적으로 설치해야 하는 패키지는 무엇인가?","opts":["toolbox","adb","nfs","tftp"],"ans":1,"exp":"","tag":""},{"id":383,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":25,"q":"RAM DISK 이미지를 만드는 과정으로 틀린 것은?","opts":["특정 디렉토리에 필요한 파일을 넣고 fstool 프로그램을 이용하여 ext2 파일 포맷의 파일을 만든다.","만든 파일을 gzip 등으로 압축하고 flash의 특정 번지에 저장한다.","특정 번지를 커널이 부팅할 때 알려주면 압축된 이미지를 RAM으로 로딩하여 RAM DISK를 만든다.","이렇게 하면 한번 만들어진 RAM 디스크는 재부팅 시 기존의 자료를 그대로 보관한다."],"ans":4,"exp":"","tag":""},{"id":384,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":26,"q":"임베디드 시스템에 대한 설명으로 가장 옳은 것은?","opts":["특정 기능을 반복적으로 수행하기 위해 컴퓨터의 하드웨어와 소프트웨어가 결합된 고기능의 전자 제어시스템을 말한다.","각종 물품에 소형 칩인 RFID 태그를 부착해 주변 환경정보를 무선주파수로 전송 및 처리하는 비접속식 무선주파수 인식 시스템이다.","각종 반도체를 하나의 칩에 집적한 시스템을 말한다.","반도체, 광, 기계기술 등을 융합하여 마이크로 단위의 초소형 부품을 설계, 제작하고 응용하는 기술이다."],"ans":1,"exp":"","tag":""},{"id":385,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":27,"q":"RAM DISK 이미지에 대한 설명으로 가장 옳지 않은 것은?","opts":["RAM DISK는 Loop Device를 이용하여 이미지를 생성한다.","Loop device는 가상 블록 디바이스로 /dev 디렉터리 내에서 Loop device를 확인할 수 있다.","RAM Disk 이미지의 생성 순서는 File 생성→ 연결→포맷 순으로 진행된다.","포맷된 RAM Disk device는 마운트 없이 프로그램을 탑재한다."],"ans":4,"exp":"","tag":""},{"id":386,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":28,"q":"임베디드 시스템의 부팅 과정 중 가장 마지막에 수행되는 단계는?","opts":["ROM 영역 수행","루트 파일 시스템 검색/마운트","init 수행","커널 수행"],"ans":3,"exp":"","tag":""},{"id":387,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":29,"q":"임베디드 리눅스에서 입출력 방식과 데이터 단위에 따른 디바이스 드라이버 종류가 아닌 것은?","opts":["문자 디바이스 드라이버","블록 디바이스 드라이버","네트워크 디바이스 드라이버","시스템 디바이스 드라이버"],"ans":4,"exp":"","tag":""},{"id":388,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":30,"q":"디바이스 드라이버에 대한 설명 중 가장 옳지 않은 것은?","opts":["디바이스 드라이버는 I/O 주소 영역을 사용하거나 인터럽트 혹은 DMA를 사용한다.","/proc/ioports 파일은 현재 사용 중인 I/O를 나타낸다.","하드웨어의 디바이스 드라이버는 동일한 자원을 다른 목적으로 사용할 수 없다.","request_region() 함수는 I/O 영역을 등록하는 함수이다."],"ans":3,"exp":"","tag":""},{"id":389,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":31,"q":"Linux 시스템의 부팅 레벨 중 시스템을 재시작하기 위한 레벨은 어느 것인가?","opts":["init 0","init 1","init 5","init 6"],"ans":4,"exp":"","tag":""},{"id":390,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":32,"q":"주번호가 244, 부번호가 0인 문자 디바이스의 장치 파일인 test를 생성하기 위한 명령어로 옳은 것은?","opts":["mknod /sys/test b 244 0","mknod /sys/test c 244 0","mknod /dev/test b 244 0","mknod /dev/test c 244 0"],"ans":4,"exp":"","tag":""},{"id":391,"setKey":"y2017","setLabel":"2017년 기출","year":2017,"subject":"제 2 과목 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":33,"q":"TFTP에 대한 설명으로 가장 옳지 않은 것은?","opts":["파일을 전송하기 위한 간단한 파일전송 규 rm":"임베디드 하드웨어","num":9,"q":"-199를 Zone 10진 형식(언팩 형식)으로 올바르게 나타낸 것은?","opts":["F1F9C9","F1F9D9","F0001F1001C1001","F0001F1001D1001"],"ans":2,"exp":"","tag":""},{"id":448,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":10,"q":"MOD-10 존슨 카운터를 설계하기 위하여 필요한 D필립플롭의 개수는?","opts":["3개","4개","5개","6개"],"ans":3,"exp":"","tag":""},{"id":449,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":11,"q":"ADC에 대한 설명으로 틀린 것은?","opts":["전압을 비트 단위로 나눈 분해능을 해상도라 한다.","통상적으로 많이 사용되는 ADC는 10비트 이상이며, 변환시간은 수백 마이크로 초 이하이다.","이산적인 신호를 연속적인 신호로 나누는 것을 표본화(Sampling)이라 한다.","만약 10비트 분해능을 가졌다고 하면 2의 10승인 1024 단계의 전압을 표현할 수 있다."],"ans":3,"exp":"","tag":""},{"id":450,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":12,"q":"DC 5V 전압을 DC 3V 전압으로 낮추는 정전압 회로는 정해진 입력 전압보다 낮은 전압에서 구동되며, 반도체로 비례적인 출력을 갖게 되는 DC 전원으로, 대표적인 예로 사용되는 회로는 무엇인가?","opts":["저역통과필터","연산증폭기","스위칭전원장치","선형전압레귤레이터"],"ans":4,"exp":"","tag":""},{"id":451,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":13,"q":"다음 중 초음파 센서의 특징으로 틀린 것은?","opts":["검출 거리가 길다.","검출대상물에 제약이 따른다.","바람의 영향을 받는다.","응답속도가 빠르다."],"ans":null,"exp":"","tag":""},{"id":452,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":14,"q":"다음 RS플립플롭의 진리표에서 (A), (B)에 가장 적절한 값은?\n\n| S   R | Q(t+1) | 상태 |\n| --- | --- | --- |\n| 0   0 | Q(t) | 전상태 불변 |\n| 0   1 | 0 | (A) |\n| 1   0 | 1 | (B) |\n| 1   1 | x | 불능 |","opts":["(A) SET, (B) SET","(A) RESET, (B) SET","(A) SET, (B) RESET","(A) RESET, (B) RESET"],"ans":2,"exp":"","tag":""},{"id":453,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":15,"q":"3단계 명령어 파이프라인에서 해당되지 않는 단계는?","opts":["인출(Fetch)","해독(Decode)","데이터읽기(Memory)","실행(Execute)"],"ans":3, 8,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":22,"q":"교차개발 환경에 대한 설명 중 가장 옳지 않은 것은?","opts":["툴체인이라 부르는 크로스 개발 도구를 사용한다.","크로스 컴파일은 호스트 컴퓨터에서 코드를 작성하고 컴파일을 한다.","크로스 컴파일된 실행파일은 타깃 시스템에서 실행된다.","네이티브 컴파일과 같은 개념이다."],"ans":4,"exp":"","tag":""},{"id":461,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":23,"q":"Busybox의 특징에 대한 설명 중 틀린 것은?","opts":["정적으로 컴파일 및 링크해서 대상 시스템에 설치 시킬 때 동적 라이브러리 없이는 시스템 실행이 불가능하다.","Busybox의 개발자는 해당 패키지를 크로스 컴파일 환경에서 사용할 목적으로 개발하였다.","Busybox를 컴파일 할 때는 워크스테이션에 있는 크로스컴파일에 대한 prefix만 지정해주면 된다.","제한된 자원을 가진 임베디드 시스템 개발에 유용하다."],"ans":1,"exp":"","tag":""},{"id":462,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":24,"q":"다음 중 디바이스 드라이버에 대한 설명으로 틀린 것은?","opts":["디바이스 드라이버는 하드웨어 장치를 제어하는 소프트웨어의 한 종류이다.","디바이스 드라이버는 하드웨어 장치이다.","커널모드에서 실행된다.","스왑(Swap)되지 않는다."],"ans":3,"exp":"","tag":""},{"id":463,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":25,"q":"다음 중 전원관리 데몬(Daemon)은?","opts":["apmd","smb","lpd","atd"],"ans":1,"exp":"","tag":""},{"id":464,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":26,"q":"임베디드 CPU의 전원 관리에 대한 설명으로 틀린 것은?","opts":["임베디드용 프로세서들은 동적 주파수 조정과 동적 전압 조정 기능을 제공하지 않고 정격 전압, 주파수에서만 작동한다.","프로세서의 소비전력은 클럭 주파수에 직접적으로 비례한다.","프로세서의 전력 소비는 전압의 제곱에 직접적으로 비례한다.","CPU와 대부분의 주변 장치에 대한 전원이 꺼진 상태를 의미하며 최저의 전력을 소비하는 모드는 슬립 모드이다."],"ans":1,"exp":"","tag":""},{"id":465,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":27,"q":"shutdown 명령어에서 실제 종료하지 않고 모든 사용자에게 경고 메시지만을 보내는 옵션은?","opts":["-r","-f","-k","-c"],"ans":3,"exp":"","tag":""},{"id":466,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":28,"q":"리눅스 소프트웨어의 개발을 위해 필요한 툴체인의 구성요소가 아닌 것은?","opts":["컴파일러(Compiler)","라이브러리(Library)","ISP(In-System Programming)","유틸리티(Utility)"],"ans":3,"exp":"","tag":""},{"id":467,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":29,"q":"부트로더의 종류가 아닌 것은?","opts":["LILO","GRUB","BOOTLDR","COMMAND"],"ans":4,"exp":"","tag":""},{"id":468,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":30,"q":"시스템 내부에서 반드시 상호배제의 원리가 지켜져야 하는 공유 영역에 대하여 각 프로세스들이 접근하기 위해서 두 개의 P, V 연산을 통해 프로세스 사이의 동기를 유지하는 것은?","opts":["데드락(Deadlock)","세마포어(Semaphore)","인터럽트(Interrupt)","타이머(Timer)"],"ans":2,"exp":"","tag":""},{"id":469,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":31,"q":"리눅스 커널 소스를 타깃 시스템에 적합하게 설정하고 컴파일하여 생성된 커널 이미지를 타깃 시스템에 적재하는 과정은 무엇인가?","opts":["커널 빌드","커널 컴파일","커널 생성","커널 포팅"],"ans":4,"exp":"","tag":""},{"id":470,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":32,"q":"리눅스 커널의 주요 디렉토리 중 포팅할 수 있는 각 프로세서에 의존적인 기능들이 구현되어 있는 디렉토리는?","opts":["arch","fs","lib","ipc"],"ans":1,"exp":"","tag":""},{"id":471,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":33,"q":"네트워크 파일시스템(NFS)에 관한 설명으로 옳지 않은 것은?","opts":["호스트 시스템에서 작업한 것을 다운로드 과정 없이 타깃 시스템에서 이용할 수 있다.","장치 파일과 같은 특수 파일도 네트워크 파일시스템에 연결된 디렉터리에서 생성할 수 있다.","클라이언트 시스템의 리눅스 파일 시스템 위에서 호스트 시스템의 파일에 접근하고 실행하는 것이 가능하다.","램디스크 상에 올리기에 너무 큰 파일도 네트워크 파일시스템에서는 호스트의 기억 용량에 의존하기 때문에 쉽게 처리할 수 있다."],"ans":2,"exp":"","tag":""},{"id":472,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":34,"q":"리눅스 커널의 세부 기능으로 가장 옳지 않은 것은?","opts":["프로세스 관리","어플리케이션 목록 관리","메모리 관리","파일 시스템 관리"],"ans":2,"exp":"","tag":""},{"id":473,"setKey":"y2018","setLabel":"2018년 기출","year":2018,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":35,"q":"다음이 설명하는 것은?\n\n> 이것은 어셈블 019","setLabel":"2019년 기출","year":2019,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":17,"q":"다음 그림의 회로 명칭은 무엇인가?\n\n![](images/img035.png)","opts":["3단 2진 계수기","MOD 6 계수기","6진 리셋형 계수기","MOD 5 계수기"],"ans":2,"exp":"","tag":""},{"id":536,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":18,"q":"GPIO 에 대한 설명으로 틀린 것은?","opts":["Signed Integer로 정의된다.","특정 디바이스를 제어할 수 있다.","시스템에서 gpio-request()를 사용하여 할당한다.","다용도 입출력 포트를 소프트웨어와 연동시켜서 입출력을 한다."],"ans":1,"exp":"","tag":""},{"id":537,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":19,"q":"RAM과 ROM의 특징을 모두 가진 기억장치로 전원이 끊겨도 기억된 내용을 그대로 유지하는 비휘발성 기억 장치는?","opts":["PROM","DRAM","EPROM","Flash Memory"],"ans":4,"exp":"","tag":""},{"id":538,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 1 과목 : 임베디드 하드웨어","subjectNorm":"임베디드 하드웨어","num":20,"q":"무선랜, 와이파이(Wi-Fi)라고 부르는 무선 네트워크에 사용되는 IEEE 표준 기술은?","opts":["IEEE 802.1","IEEE 802.3","IEEE 802.5","IEEE 802.11"],"ans":4,"exp":"","tag":""},{"id":539,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":21,"q":"임베디드 시스템에서 전력 소비가 가장 적은 것은?","opts":["LCD","CPU","Sound Card","Memory-Network Card"],"ans":4,"exp":"","tag":""},{"id":540,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":22,"q":"CPU의 전력 관리 중 슬립(Sleep) 모드에 대한 설명으로 가장 옳은 것은?","opts":["CPU와 대부분의 주변 장치에 대한 전원이 꺼진 상태로 최저의 전력을 소비하는 모드이다.","여러 프로세스 클럭들이 중지된 상태를 의미한다.","프로세서는 대부분의 시간을 사용자나 외부로부터 이벤트가 발생하기를 기다리는 상태이다.","타이머 인터럽트 처리와 같은 시스템이 피룡로 하는 최소한의 태스크만 동작하게 된다."],"ans":1,"exp":"","tag":""},{"id":541,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":23,"q":"네트워크 파일 시스템을 이용할 때 일반적인 장점이 아닌 것은?","opts":["호스트 시스템에서 작업한 것을 다운로드 과정 없이 타깃 시스템에서 사용할 수 있다.","클라이언트 시스템의 리눅스 파일시스템 위에서 호스트 시스템의 파일에 접근하고 실행하는 것이 가능하다.","장치 파일과 같은 특수 파일도 네트워크 파일 시스템에 연결된 디렉토리에서 생성할 수 있다.","램 디스크 상에 올리기에 너무 큰 파일도 네트워크 파일 시스템상에서는 호스트의 기억용량에 의존하기 때문에 쉽게 처리할 수 있다."],"ans":3,"exp":"","tag":""},{"id":542,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":24,"q":"문자 디바이스에 대한 설명으로 틀린 것은?","opts":["문자 디바이스는 파일 시스템에서 하나의 노드 형태로 존재한다.","데이터의 순차성을 지닌 하드웨어로서 버퍼 캐시를 사용한다.","버퍼를 통하지 않고 데이터를 직접 읽고 쓸 수 있는 장치이다.","데이터를 문자 단위 또는 연속적 바이트 흐름으로 전달하고 읽는다."],"ans":2,"exp":"","tag":""},{"id":543,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":25,"q":"블록 디바이스에 해당되지 않는 것은?","opts":["데이터에 의해 임의 접근은 불가능","효율성을 향상하기 위하여 버퍼를 이용","버퍼 캐시를 통해 임의 접근이 가능한 장치","하드디스크, 플로피 디스크, 램디스크, CD-ROM"],"ans":1,"exp":"","tag":""},{"id":544,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":26,"q":"0~3V 전압을 3비트 A/D 변환할 떄,  1LSB(Least Significant Bit)는 약 몇 V인가?","opts":["0.125","0.375","0.429","0.667"],"ans":2,"exp":"","tag":""},{"id":545,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":27,"q":"다음 중 커널에 대한 설명으로 틀린 것은?","opts":["운영체제에서 가장 핵심적인 역할인 자원을 관리한다.","커널은 프로세서, 메모리, 파일, 시스템, 메모리, 네트워크 등을 관리한다.","커널은 전부 c 코드로 작성되어 있다.","하드웨어의 추상화 기능을 제공한다."],"ans":3,"exp":"","tag":""},{"id":546,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":28,"q":"다음 중 타깃 시스템의 부팅과정에서 DMA의 역할에 대한 설명으로 틀린 것은?","opts":["부팅에 필요한 고속의 입출력에 사용된다.","시스템을 다시 부팅하거나 전원이 꺼지면 CPU를 초기화한다.","장치 제어기는 CPU의 간섭 없이 버퍼 저장소로부터 직접 주 메모리로 데이터 블록을 전송한다.","인터럽트가 바이트 단위가 아닌 오직 블록 단위로 생성되며, 이것은 장치의 성능을 향상시킨다."],"ans":2,"exp":"","tag":""},{"id":547,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":29,"q":"전원 관리표준 APM(Advanced Power Management)의 전원 상태의 정의가 맞지 않은 것은?","opts":["Full On: 컴퓨터 전원이 켜져 있고 절전 모드에 있는 장치가 없다.","APM Enabled: 컴퓨터의 전원이 켜져 있고 APM은 필요에 따라 장치 전원 관리를 제어하고 있다.","APM Standby: 대부분의 디바이스가 저전력 상태이고 CPU가 느려지거나 중지되고 시스템 상태가 저장된다.","APM Suspend: 대부분의 디바이스 전원이 켜져 있고 시스템 상태는 저장되지 않는다."],"ans":4,"exp":"","tag":""},{"id":548,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":30,"q":"다음의 임베디드 시스템 부팅 과정 중 가장 마지막에 수행되는 단계는?","opts":["init 수행","ROM 영역 수행","루트파일 시스템 검색 및 바운드","커널 수행"],"ans":1,"exp":"","tag":""},{"id":549,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":31,"q":"다음이 설명하고 있는 부트로더로 가장 적절한 것은?\n\n> ARM, PPC, MIPS 등 프로세스에 적용된 부트로더는 주로 ARM 프로세스용으로 많이 사용되고 있다.","opts":["uboot","LILO","GLUB","Eboot"],"ans":1,"exp":"","tag":""},{"id":550,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":32,"q":"리눅스 툴 체인(tool chain) 구성과 가장 거리가 먼 것은?","opts":["binutils","gcc","Qt","glibc"],"ans":3,"exp":"","tag":""},{"id":551,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":33,"q":"다음의 임베디드 시스템 개발을 위한 교차개발환경에 대한 설명으로 틀린 것은?","opts":["교차개발환경은 크게 Host 머신과 Target 머신, 터미널, 통신회선으로 구성된다.","Tool chain 및 Simulation Environment는 Target 머신의 구성요소이다.","통신회선으로는 serial cable, ethernet cable, JTAG cable 등이 사용된다.","터미널(Terminal)은 타깃 머신의 쉘이나 동작 상태를 보여 주거나 호스트 머신에서 사용자가 입력한 사항을 보여 준다."],"ans":2,"exp":"","tag":""},{"id":552,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":34,"q":"busybox에 대한 설명으로 틀린 것은?","opts":["쉘을 비롯하여 ls, mv, cp 등을 한데 묶어 하나의 파일로서 실행되도록 만들어준다.","각각을 직접 만들었을 때보다 실행파일의 크기가 현저히 작아진다.","저장 공간에 제약을 받는 임베디드 리눅스에서 많이 사용되고 있다.","리눅스의 모든 기능이 들어 있기 때문에 추가 설치가 전혀 필요 없다."],"ans":4,"exp":"","tag":""},{"id":553,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":35,"q":"명령어 수행시간이 10ns, 패치(Fetch)시간이 5ns, 명령어 준비 시간이 3ns이면 인스트럭션의 성능은 얼마인가?","opts":["0.1","0.5","1","1.25"],"ans":4,"exp":"","tag":""},{"id":554,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":36,"q":"커널의 메모리 할당에서 vmalloc과 kmalloc 함수의 차이점으로 옳은 것은?","opts":["vmalloc은 가상적, kmalloc은 물리적 연속 메모리를 할당한다.","vmalloc은 할당된 페이지 주소가 가상, 물리 모두 연속된 공간을 보장한다.","kmalloc은 할당된 페이지가 가상적으로만 연속된 공간을 보장한다.","vmalloc의 가상적 메모리 할당이 필요한 경우는 하드웨어 장치이다."],"ans":1,"exp":"","tag":""},{"id":555,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":37,"q":"다음의 디바이스 드라이버를 위한 메모리 할당 프로그램에서 크기와 함께 처리방식을 매개변수로 지정하는 함수 ㉮와 메모리 할당을 해제하는 함수 ㉯에 들어갈 함수를 순서대로 나열한 것은?\n\n```C++\n#include <linux/slab.h>\nchar *buff;\nbuff = ㉮(1024, GFP_KERNEL);\nif(buff != NULL)\n{\n  ...\n  ㉯(buff)\n}\nelse\n{\n  printk(\"memory error\\n\");\n}\n```","opts":["㉮ : malloc, ㉯ : free","㉮ : malloc, ㉯ : kfree","㉮ : kmalloc, ㉯ : kfree","㉮ : kmalloc, ㉯ : free"],"ans":3,"exp":"","tag":""},{"id":556,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":38,"q":"커널의 빌드 과정 중 커널에서 사용할 모듈을 빌드하는 명령은?","opts":["Make dep","Make clean","Make bzImage","Make modules"],"ans":4,"exp":"","tag":""},{"id":557,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":39,"q":"대상 제품에 부트로더를 탑재하는 방법이 아닌 것은?","opts":["전용의 디버깅 툴과 ICE 장비를 사용하여 플래시에 탑재한다.","PTOC 동글을 활용하여 플래시에 탑재한다.","롬라이터를 사용하여 프로그래밍 후 보드에 삽입한다.","기존에 탑재된 부트로더를 이용하여 탑재한다."],"ans":2,"exp":"","tag":""},{"id":558,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":40,"q":"리눅스 커널 모듈에 관련된 명령에 대한 설명으로 옳은 것은?","opts":["lsmod : 모듈을 커널에서 제거하는 명령이다.","insmod : 적재된 각각의 모듈명, 크기, 사용횟수, 다른 참조 모듈 등의 정보를 출력한다.","modinfo : 모듈 오브젝트 파일의 모듈 정보를 보여준다.","rmmod : 커널의 이름을 변경하는 명령이다."],"ans":3,"exp":"","tag":""},{"id":559,"setKey":"y2019","setLabel":"2019년 기출","year":2019,"subject":"제 3 과목 : 임베디드 플랫폼","subjectNorm":" "y2021","setLabel":"2021년 기출","year":2021,"subject":"제 2 과목 : 임베디드 펌웨어","subjectNorm":"임베디드 펌웨어","num":36,"q":"다음 [보기]에서 JTAG의 각 신호에 대한 설명으로 옳은 것만 나열한 것은?\n\n> [보기]\n> ㄱ. TRST는 JTAG 인터페이스를 초기화 할 때 사용되는 리셋 입력신호이다.\n> ㄴ. TCK는 시스템의 클록과 동일한 JTAG 클록을 제공한다.\n> ㄷ. TMS는 JTAG 인터페이스의 상태를 설정할 수 있는 입력 신호이다.\n> ㄹ. TDI는 바운더리 스캔 레지스터나 명령어 레지스터에게 데이터를 공급하는 JTAG 데이터 출력신호이다.\n> ㅁ. TDO는 바운더리 스캔 체인으로부터 읽은 값을 출력하는 테스트 JTAG 출력신호이다.","opts":["ㄱ, ㄴ, ㄷ","ㄱ, ㄷ, ㄹ","ㄱ, ㄹ, ㅁ","ㄱ, ㄷ, ㅁ"],"ans":4,"exp":"","tag":""},{"id":635,"setKey":"y2021","setLabel":"2021년 기출","year":2021,"subject":"제 3 과목 : 임베디드 플랫폼","subjectNorm":"임베디드 플랫폼","num":37,"q":"poll과 epoll의 차이점에서 대한 설명으로 틀린 것은?","opts":["epoll은 커널에서 지원하는 기능이다.","대용량 처리에서는 poll보다 epoll의 반응이 빠르다.","poll과 epoll은 POSIX 규약을 따르므로 서로 호환된다.","poll, epoll은 모두 시그널에 의해 인터럽트 될 수 있다."],"ans":3,"exp":"","tag":""},{"id":636,"setKey":"y2021","setLabel":"2021년 기출","year":2021,"subject":"제 3 과목 : 임베디드 플랫폼","subjectNorm":"임베디드 플랫폼","num":38,"q":"0.0.0/12 IP주소 범위 중에서 할당 가능한 마지막 IP주소는?","opts":["10.13.255.254","10.14.253.254","10.15.255.254","10.16.255.254"],"ans":3,"exp":"","tag":""},{"id":637,"setKey":"y2021","setLabel":"2021년 기출","year":2021,"subject":"제 3 과목 : 임베디드 플랫폼","subjectNorm":"임베디드 플랫폼","num":39,"q":"IP 192.57.30.224, 서브넷 마스크 255.255.255.0일 경우 네트워크 ID는 무엇인가?","opts":["192.57.30.0","192.58.30.0","192.58.29.0","192.57.29.0"],"ans":1,"exp":"","tag":""},{"id":638,"setKey":"y2021","setLabel":"2021년 기출","year":2021,"subject":"제 3 과목 : 임베디드 플랫폼","subjectNorm":"임베디드 플랫폼","num":40,"q":"메모리 장벽의 개념으로 틀린 것은?","opts":["멀티 프로세서 환경에서는 메모리 접근 순서를 바꿀 수 없다.","프로그램 실행 속도 향상을 위해 어셈블리 명령어 순서를 바꿀 수 있다.","메모리 장벽은 어떤 어셈블리 명령어도 통과할 수 없는 방화벽과 비슷하다.","메모리 장벽의 역할을 하는 어셈블리 명령어는 입출력 포트에 동작하는 모든 명령어가 포함된다."],"ans":1,"exp":"","tag":""},{"id":639,"setKey":"y2021","setLabel":"2021년 기출","year":2021,"subject":"제 3 과목 : 임베디드 플랫폼","subjectNorm":"임베디드 플랫폼","num":41,"q":"다음 [보기]와 같은 조건에서 TCP소켓에 send(fd, buf, 3000, 0)을 호출하였다. 헤더가 추가되어 실제 전송되는 패킷의 크기는?\n\n> ㄱ. fd는 블록킹 모드로 작동하고 있다.\n> ㄴ. TCP, IP헤더의 var CONCEPTS = {"임베디드 하드웨어":[{"title":"HDL 설계 언어와 PLD/FPGA","note":"**HDL**(Hardware Description Language)은 회로도가 아니라 텍스트 언어로 하드웨어를 기술하는 방법으로, 대표 언어로 **VHDL**과 **Verilog HDL**이 있다. 복잡한 논리식 작성에서 해방되고 설계 시간을 단축하며 시뮬레이션 검증이 가능하고 ASIC뿐 아니라 CPLD/FPGA에도 폭넓게 적용된다.\n\n- **VHDL**은 Very High Speed IC HDL의 약자로 대소문자를 구분하지 않으며, `--` 이후는 주석이고 식별자 첫 글자에 숫자나 특수문자를 쓸 수 없다.\n- VHDL의 설계 단위는 **Entity**(입출력 핀 등 외부 인터페이스 정의), **Architecture**(회로 내부 동작·연결 구조 기술), **Package**, **Configuration**으로 구성된다.\n- Verilog는 포트를 `input`/`output`으로 선언하고, 내부 연결선은 `wire`, 값을 저장하는 신호는 `reg`로 선언한다.\n- Verilog의 **행위 레벨 모델링**은 C언어와 유사하게 추상화 수준이 높아 아키텍처 평가에 쓰인다.\n- **PLD**(프로그래머블 논리소자)의 3대 형태는 **SPLD**, **CPLD**, **FPGA**이며, **SMD**는 표면실장 방식일 뿐 PLD가 아니다.\n- **FPGA**는 칩 내부에 배열된 게이트 어레이를 프로그램 가능한 배선으로 연결해 원하는 기능을 구현한다.\n\n> 💡 암기 팁: Entity는 인터페이스(겉모습), Architecture는 내부 동작(속내용)으로 짝짓고, `wire`는 연결선·`reg`는 저장용으로 구분하자.","qids":[45,46,47,53,127,135,207,282,292,372,373,521,611,613]},{"title":"불 대수와 논리 게이트 간소화","note":"**불 대수**(Boolean Algebra)는 논리식을 다루는 수학으로, 디지털 회로를 간단히 줄이는 핵심 도구이다. 기본 정리와 카르노 맵을 이용해 불필요한 항을 제거한다.\n\n- **분배법칙** `X+YZ=(X+Y)(X+Z)`, **흡수법칙** `X+XY=X`는 기본 간소화 도구이다.\n- **드모르간 정리** `(A+B)'=A'B'`, `(AB)'=A'+B'`는 반드시 외워야 한다.\n- 공통 항으로 묶으면 식이 줄어드는데, `ABC+AB'C`는 `AC(B+B')`처럼 **보수 합이 1**이 되는 성질을 이용한다.\n- **카르노 맵**(K-map)은 진리표의 1을 인접한 2의 거듭제곱 묶음으로 묶어 사라지는 변수를 제거하는 시각적 간소화 기법이다.\n- 기본 게이트는 AND·OR·NOT·NAND·NOR·XOR·XNOR이며, **NAND와 NOR**은 모든 게이트를 만들 수 있는 **만능(universal) 게이트**다.\n- 출력이 1인 경우만 곱항으로 적어 합으로 묶는 **SOP** 방식으로 논리식을 유도한다.\n\n> 💡 암기 팁: 드모르간과 분배법칙만 정확히 알면 대부분의 간소화 문제가 풀린다.","qids":[62,128,218,287,294,297,362,370,454,703]},{"title":"조합논리회로 (디코더, 멀티플렉서, 가산기)","note":"**조합논리회로**는 현재 입력만으로 출력이 결정되는 회로로, 디코더·인코더·멀티플렉서·가산기가 대표적이다. 입출력 개수는 로그·거듭제곱 공식으로 빠르게 계산할 수 있다.\n\n- **디코더**는 n비트 입력을 받아 `2^n`개 출력 중 하나만 1로 만든다. `4x16` 디코더는 `3x8` 디코더 2개로 구성할 수 있다.\n- **멀티플렉서**(MUX)는 여러 입력 중 하나를 선택해 출력하며, 입력이 4개면 선택 제어선은 2비트가 필요하다. Verilog `assign f=s?x:y`는 `2x1` MUX를 의미한다.\n- **반가산기**(half adder)는 두 비트를 더해 합(`Sum=XOR`)과 자리올림(`Carry=AND`)을 만들어 입력 2개·출력 2개이다.\n- **전가산기**(full adder)는 아래 자리 캐리까지 받아 입력 3개·출력 2개이며, 캐리식은 `C=XY+(X xor Y)Z`이다.\n- **7세그먼트 디스플레이** 구동 회로는 BCD 4비트를 입력받아 7개 LED 출력을 만드는 디코더 형태로 설계한다.\n- 공식: 선택 제어선 비트 수는 `log2(입력 개수)`, 디코더 출력 수는 `2^(입력 비트)`이다.\n\n> 💡 암기 팁: 가산기는 \"합은 XOR, 캐리는 AND\"를 먼저 떠올리자.","qids":[136,142,375,440,602,604,607,609]},{"title":"순차논리회로 (플립플롭, 래치, 카운터)","note":"**순차논리회로**는 현재 입력뿐 아니라 과거 상태(기억)에 따라 출력이 정해지는 회로로, **플립플롭**과 **래치**가 기본 소자이다. 두 소자의 트리거 방식 차이가 핵심이다.\n\n- **래치**는 인에이블이 활성인 동안 레벨에 반응해 입력을 저장하는 **레벨 트리거**, **플립플롭**은 클록의 상승/하강 에지 순간에만 저장하는 **에지 트리거**다.\n- **D 플립플롭**은 인에이블/에지에서 `D` 값을 그대로 저장하며, 정에지/부에지 트리거로 구분된다.\n- **JK 플립플롭**은 `J=K=1`일 때 출력이 반전(**toggle**)되며, 여기표에서 0→1은 `J=1,K=X`, 1→0은 `J=X,K=1`이다.\n- **RS 플립플롭**은 `S=1,R=0`이면 SET(1), `S=0,R=1`이면 RESET(0), `S=R=1`은 불능 상태다.\n- **카운터**는 클록 펄스를 세며, **MOD-N** 카운터는 N개 상태를 순환한다. **존슨 카운터**는 N비트로 `2N`개 상태를 만들어 MOD-10 존슨 카운터는 D 플립플롭 5개가 필요하다.\n- 순차회로 해석에는 **입력함수·상태표·상태 다이어그램**이 필요하며, 소자의 물리적 특성은 해석 요소가 아니다.\n\n> 💡 암기 팁: \"래치는 레벨, 플립플롭은 에지, JK의 11은 토글\"만 잡으면 된다.","qids":[64,126,132,133,291,361,365,448,452,535]},{"title":"수의 표현과 엔디안","note":"컴퓨터는 데이터를 2진수로 저장하며, 표현 방식과 바이트 순서를 정확히 이해해야 한다. 특히 **엔디안**과 **BCD/존 형식**이 자주 출제된다.\n\n- **빅엔디안**(Big-endian)은 최상위 바이트(**MSB**)를 낮은 주소에 먼저, **리틀엔디안**(Little-endian)은 최하위 바이트(**LSB**)를 낮은 주소에 먼저 저장한다.\n- 예: `0x01020304`를 빅엔디안에 저장하면 가장 낮은 주소에서 `0x01`을 읽는다.\n- **BCD 코드**는 10진수 한 자리를 4비트로 표현해 `356`은 `0011 0101 0110`이 되며, `2421` 같은 가중치 코드는 자리 가중치를 더해 값을 맞춘다.\n- **존(Zone) 10진(언팩) 형식**은 각 숫자를 1바이트로 표현하고 부호는 마지막 자리 상위 니블에 두며, 양수는 `C`·음수는 `D`를 쓴다(예: `-199`는 `F1 F9 D9`).\n- 2진수 뺄셈은 **보수 덧셈** 또는 직접 계산으로 처리하고, 비트 **AND** 연산은 두 비트가 모두 1일 때만 1이 된다.\n\n> 💡 암기 팁: \"빅은 큰(상위)것 먼저, 리틀은 작은(하위)것 먼저\"로 외우고, BCD는 4비트씩 끊어 읽자.","qids":[50,51,60,217,301,444,447,529,533,706]},{"title":"기억장치 계층구조와 캐시 메모리","note":"기억장치는 속도·용량·가격을 기준으로 **레지스터-캐시-주기억장치-보조기억장치**의 계층 구조를 이루며, 위로 갈수록 빠르지만 작고 비싸다(공급 전원은 분류 기준이 아니다).\n\n- **캐시 메모리**는 CPU와 주기억장치 사이에서 빠른 **SRAM**을 써서 접근 시간을 줄이며, **적중**(hit)이면 캐시에서, **실패**(miss)면 주기억장치에서 가져온다.\n- 평균 접근 시간 = `(적중률 x 캐시 시간) + (실패율 x 주기억 시간)`이며, 적중 시 읽는 시간을 최소화하는 것이 설계 핵심이다.\n- 캐시 매핑 방식은 **직접 매핑·연관 매핑·집합연관 매핑**이 있고, **연관 메모리** 방식이 가장 빠르게 주소를 찾는다.\n- 멀티프로세서의 **캐시 일관성**(coherency) 유지를 위해 버스를 감시하며 갱신을 브로드캐스트하는 방식이 **Snoopy 프로토콜**이다.\n- **가상기억장치**(virtual memory)는 보조기억장치를 이용해 부족한 메모리 공간을 확대하는 것이 주목적이다.\n- **플래시 메모리**는 RAM처럼 읽고 쓰면서 ROM처럼 전원이 꺼져도 내용이 유지되는 **비휘발성** 기억장치이다.\n\n> 💡 암기 팁: `N`워드 메모리는 `log2(N)`비트 주소, 빠른 순서는 \"레지스터>캐시>주기억>보조기억\"으로 외우자.","qids":[48,55,124,141,210,284,289,290,360,366,368,369,376,443,522,537]},{"title":"CPU 구조와 명령어, 주소지정, 파이프라인, ARM","note":"**CPU**는 명령어를 **Fetch-Decode-오퍼랜드 인출-Execute** 순서로 처리하며, 분기가 일어나면 다음 실행 주소를 담는 **프로그램 카운터(PC)**가 가장 먼저 바뀐다.\n\n- **1-주소 방식**은 연산 결과를 **누산기**(accumulator)에 저장하고, 덧셈·뺄셈 반복(루프)만으로 곱셈·나눗셈을 구현할 수 있다.\n- **상대 주소**는 `PC + 주소부`로 유효주소를 만들고, **간접 주소**는 오퍼랜드가 가리키는 주소의 값을 다시 찾아간다(예: `ADD(100)`에서 100→1234, 1234→4567이면 4567 사용).\n- **파이프라인**은 명령어 처리를 여러 단계로 겹쳐 실행하는 기법으로, 3단계는 인출-해독-실행이며 총 실행시간 = `(단계수 + 명령수 - 1) x 클록`이다(20명령 4단계면 23).\n- 프로세서 성능 단위는 **MIPS**(초당 백만 명령)이다.\n- **ARM**은 User/System 모드가 `r13`,`r14`를 공유하지만 다른 모드는 별도 `r13`(SP)·`r14`(LR)를 가지며, **CPSR**은 전 모드 공용이고 각 모드에 **SPSR**이 따로 있다.\n- **THUMB**은 16비트 압축 명령어 세트, **DVFS**는 전압·주파수를 함께 조절해 소비전력을 줄이는 기술, **메모리 맵 입출력**은 주기억 영역을 I/O 레지스터에 매핑하는 방식이다.\n\n> 💡 암기 팁: 파이프라인 실행시간 공식 `(단계+명령-1)`과 \"분기 시 PC가 먼저 바뀐다\"를 기억하자.","qids":[125,134,209,213,364,371,445,453,457,519,520,523,524,534,608,614,702,704]},{"title":"입출력 방식과 인터럽트, DMA, 폴링","note":"CPU와 주변장치 간 데이터 전송 방식은 크게 **프로그램 I/O·인터럽트 구동 I/O·DMA** 세 가지이며, 입출력 모듈은 장치 제어·타이밍 조정·버퍼링·속도차 극복을 담당한다.\n\n- **폴링**(polling)은 CPU가 각 장치의 플래그를 차례로 검사해 인터럽트를 낸 장치를 찾는 방식이다.\n- **인터럽트**는 예외 상황 시 CPU 흐름을 중단시키며 소프트웨어/하드웨어로 나뉘고, **벡터 인터럽트**는 소스가 분기 정보를 직접 제공한다.\n- 인터럽트는 시스템 상태 레지스터(**PSW**)와 밀접하며, **지연을 줄이려면** 처리 루틴을 짧게 작성하고 인터럽트 금지 남발을 막아야 한다.\n- **DMA**(직접 메모리 접근)는 CPU를 거치지 않고 메모리-주변장치 간 블록을 고속 전송하며, **사이클 스틸** 기법을 쓰고 전송 후 인터럽트로 알리며 경합 시 우선권을 가진다.\n- DMA 제어기는 **주소 카운터·상태 레지스터**로 구성되고(채널 레지스터는 미포함), 전송은 `DMA요청→버스요청→버스허가→데이터전송→인터럽트요청` 순이다.\n- **데이지 체인**은 인터럽트 확인 신호를 체인으로 연결하며, **GPIO**는 다용도 입출력 포트로 On/Off·폴링·인터럽트 입력은 가능하나 아날로그를 직접 변환하지는 못한다.\n\n> 💡 암기 팁: DMA 전송 순서 \"DMA요청→버스요청→허가→전송→인터럽트\"를 흐름으로 외우자.","qids":[52,56,58,59,61,123,129,130,221,283,288,296,359,439,456,526,603,536,606,612]},{"title":"직렬 통신과 버스 인터페이스","note":"임베디드 시스템은 **UART·SPI·I2C·USB** 등 다양한 직렬 통신 인터페이스를 사용한다. 각 프로토콜의 신호선과 특징을 구분하는 것이 핵심이다.\n\n- **UART**는 비동기 직렬 통신으로 **시작 비트(Low)**와 **정지 비트(High)**로 데이터를 감싸 보내며 보통 **LSB부터** 전송하고, `MAX232` 같은 레벨 변환 IC로 PC와 1대1 연결한다.\n- **SPI**는 마스터가 만든 공통 클록을 참조하는 동기 프로토콜로 `SCK`·`MOSI`·`MISO`·`NSS` 핀을 쓰며 **I2C보다 빠르다**.\n- **I2C**는 필립스가 개발한 2가닥(`SDA`,`SCL`) 버스로 각 장치에 주소가 있어 다중 장치를 연결하며 저속 주변기기에 적합하다(RS-485 아님).\n- **USB**는 **NRZI 인코딩**을 사용하고 `D+`가 `D-`보다 200mV 초과로 높을 때 논리 1이 되며, NRZI는 비트가 0이면 신호 반전·1이면 유지한다.\n- 버스 대역폭 = `클록 주파수 x 데이터 폭(바이트)`이다(예: `1MHz x 32비트 = 4MB/s`). 8051은 **ALE 신호**로 다중화된 주소·데이터 버스를 분리한다.\n- 네트워크에서 **이더넷**은 **CSMA/CD** 방식의 유선 기술, **와이파이**는 **IEEE 802.11** 무선랜이다.\n\n> 💡 암기 팁: \"I2C=2선(SDA·SCL)·다중장치, SPI=4선·고속\"으로 짝지어 외우자.","qids":[57,63,131,139,140,211,215,219,285,286,293,298,299,374,378,441,525,530,538,600,605,707]},{"title":"센서, ADC/DAC, 전원과 개발환경","note":"임베디드 시스템은 아날로그 신호를 다루기 위해 **센서**와 **ADC/DAC**를 사용하며, 전원부와 개발환경 특성도 함께 익혀야 한다.\n\n- **ADC**는 연속 신호를 표본화·양자화하며 비트 수가 **분해능**을 결정해 N비트면 `2^N` 단계를 표현한다(출력 = 입력전압 / 분해능).\n- ADC 종류 중 **병렬 비교형(플래시)**은 가장 빠르지만 회로가 복잡하고 분해능이 낮으며, 그 외 **축차 비교(연속 근사)형·적분형**이 있다(선형 ADC는 없음).\n- **DAC** 최대 출력전압 = `분해능 x (2^N - 1)`, 백분율 분해능 = `1 / 단계 수`이다.\n- 센서: **접촉식 온도센서**는 직접 닿아 측정, **서미스터**는 온도에 따라 저항 변화, **가속도 센서**는 관성에 의한 질량 위치 변화 이용, 비접촉 거리 측정은 **레이저**가 가장 정밀하다.\n- 전원부: **어댑터**는 교류→직류 변환, **선형(시리즈) 레귤레이터**는 남는 전압을 열로 방출, **스위칭 방식**은 On/Off 반복 후 저역통과필터로 평활한다.\n- **LED 보호저항** = `(총전압 - 순방향전압강하) / 전류`(옴의 법칙). **ECL**이 가장 빠른 디지털 IC, **교차 개발**(cross development)은 실행 시스템과 개발 시스템이 다른 환경이다.\n\n> 💡 암기 팁: \"플래시 ADC=최고속, ECL=최고속 IC\"로 묶고, 분해능은 `2^N`을 떠올리자.","qids":[54,137,138,203,212,216,295,300,363,367,377,442,446,449,450,458,214,527,532,599,610,709]}],"임베디드 펌웨어":[{"title":"디바이스 드라이버 개념과 종류(문자/블록/네트워크/misc)","note":"디바이스 드라이버는 하드웨어 장치를 운영체제가 제어할 수 있도록 추상화해 주는 **커널 모드 소프트웨어**이다. 리눅스에서는 입출력 방식과 데이터 단위에 따라 **문자(character)**, **블록(block)**, **네트워크(network)** 드라이버로 나뉜다.\n\n- **문자 디바이스**: 바이트 단위로 순차적 입출력을 하고 **버퍼 캐시를 거치지 않음** (예: 시리얼 포트 `/dev/ttyS0`, 콘솔).\n- **블록 디바이스**: 일정 크기의 블록 단위로 접근하며 **버퍼 캐시**를 통해 **임의 접근**이 가능 (예: 하드디스크, 플로피, 램디스크, CD-ROM). 단, 터미널은 블록 장치가 아님.\n- **네트워크 디바이스**: `eth0`처럼 인터페이스로 제어되고 `read`/`write` 대신 **패킷 송수신 함수**를 사용하며 속성은 `n`으로 표시.\n- **misc 드라이버**: 주번호가 **10번으로 고정**되고 부번호로 장치를 구분하며 `cat /proc/misc`로 목록 확인.\n- **접근 순서**: 응용 프로그램 → 디바이스 파일 → 디바이스 드라이버 순으로 접근. ('시스템 디바이스 드라이버' 분류는 존재하지 않음에 주의.)\n\n> 💡 암기 팁: '문자는 순차+버퍼 없음, 블록은 임의접근+버퍼 캐시, 네트워크는 패킷'으로 묶어 기억.","qids":[66,72,82,147,149,157,226,240,316,387,388,462,474,542,543,632]},{"title":"디바이스 드라이버 구현과 커널 함수","note":"디바이스 드라이버는 `main()` 없이 `init_module()`(`module_init`)에서 등록하고 `cleanup_module()`(`module_exit`)에서 해제하는 **모듈 프로그램**이다. 시스템 콜과 드라이버 함수를 연결하는 핵심 구조체는 `file_operations`이다.\n\n- **등록/해제**: 문자 드라이버는 `register_chrdev()`로 등록, `unregister_chrdev()`로 해제. **주번호(major number)**는 커널 내 유일해야 하며 `0`을 주면 커널이 **동적 할당**.\n- **장치 파일 생성**: `mknod` 명령(또는 `mknod()` 함수)으로 만들며 문자는 `c`, 블록은 `b` 지정 (예: `mknod /dev/test c 244 0`).\n- **메모리 할당**: `kmalloc()`(물리적 연속, 크기 제한)와 `vmalloc()`(가상적 연속, 대용량)로 나뉘고 해제는 각각 `kfree()`, `vfree()`. 인터럽트 컨텍스트에서는 잠들 수 없어 `GFP_ATOMIC` 사용. (`xmalloc`은 존재하지 않음.)\n- **주소 매핑/IO**: 물리 주소를 커널 가상 주소로 매핑할 때 `ioremap()`, I/O 영역 등록에 `request_region()`.\n- **타이머/깨우기**: 커널 타이머는 `init_timer()`, `add_timer()`, `del_timer()` (`create_timer()`는 없음). 블로킹 프로세스를 모두 깨울 때 `wake_up()`, 사용자 프로세스에 시그널을 보낼 때 `kill_proc()`.\n\n> 💡 암기 팁: '연속이면 kmalloc, 큰 거면 vmalloc, 함수 연결은 file_operations, 가짜는 xmalloc/create_timer'.","qids":[78,79,148,160,225,229,303,307,312,381,390,394,476,554,555,621]},{"title":"리눅스 커널 구조와 운영체제 기초(동기화/IPC)","note":"리눅스 커널은 **프로세스(태스크)·메모리·파일 시스템·네트워크 관리와 디바이스 제어**를 담당하며 하드웨어 추상화를 제공한다. 대부분 C로 작성되지만 일부는 어셈블리로 작성되므로 '전부 C'는 틀린 설명이다.\n\n- **소스 트리**: `arch`(프로세서 의존 코드: 부팅·시그널·클록), `init`(하드웨어 독립적 초기화), `kernel`(핵심 시스템 호출), `mm`(메모리), `fs`(파일시스템), `drivers`, `include`, `ipc`, `lib` 등. 특히 **`arch`가 플랫폼 의존적**이라는 점이 단골 출제.\n- **모놀리식 커널**: 모든 기능이 하나의 커널에 포함돼 구현이 간단하고 자원 관리가 효율적이나 크기가 커지고 포팅에 불리 (리눅스·솔라리스·AIX·HP-UX).\n- **모듈**: 필요할 때 **동적 적재/제거**가 가능해 확장성·재사용성이 높고 **재부팅 불필요**.\n- **동기화**: 임계 영역 보호에 **세마포어**가 `P(wait)`·`V(signal)` 연산으로 동기 유지, 선점형 다중 프로세서의 짧은 임계 구역에는 **스핀락** 사용.\n- **트랩/IPC**: 실행 중 프로그램의 소프트웨어적 사건을 알리는 것이 **트랩(trap)**. **IPC**에는 시그널·파이프·소켓·메시지 큐·공유 메모리가 있으나 '스트림'은 표준 IPC가 아님.\n\n> 💡 암기 팁: '플랫폼 의존은 arch, 짧은 임계구역은 스핀락, IPC에 스트림은 함정'.","qids":[69,71,153,234,315,384,396,398,470,472,545,633,83,319,468,628,631]},{"title":"커널 빌드, 안드로이드 빌드와 버전 관리","note":"커널 빌드는 소스를 타깃에 맞게 **설정(configure)→컴파일→이미지 생성→타깃 적재(포팅)**하는 과정이다. **`make`**는 변경된 부분만 다시 컴파일하는 프로젝트 관리 유틸리티이다.\n\n- **설정 단계**: `make menuconfig`는 텍스트 메뉴 UI를 제공하며 **`ncurses` 라이브러리**가 필요하고 메뉴 구성은 **`Kconfig`** 참조 (General Setup에서 네트워킹·버스·절전 설정).\n- **빌드 명령**: `make dep`(의존성), `make clean`(정리), `make bzImage`/`make zImage`(커널 이미지), `make modules`(모듈만 빌드).\n- **모듈 관리**: 적재 `insmod`, 제거 `rmmod`, 목록 `lsmod`, 정보 확인 `modinfo`.\n- **안드로이드 빌드**: `source build/envsetup.sh`로 환경 설정 → `lunch`로 타깃 선택 → `make -j`로 빌드. 커널 빌드 시 `export ARCH=arm`, `export CROSS_COMPILE` 등 환경 변수 지정.\n- **기타**: 기본 미제공 표준 리눅스 명령은 **`toolbox`** 패키지로 추가, 분산형 버전 관리에는 **`git`** 사용.\n\n> 💡 암기 팁: 'menuconfig=ncurses+Kconfig, 올림 insmod·뺌 rmmod·봄 lsmod, 안드로이드는 envsetup→lunch→make'.","qids":[77,80,143,156,238,302,306,310,314,382,469,478,556,558,620,623,625,627]},{"title":"부트로더와 부팅 과정, 램디스크","note":"부트로더는 전원 인가 후 **하드웨어를 초기화**하고 **커널 이미지를 메모리에 적재해 부팅**하며 커널에 인수를 전달한다. (init 프로세스 실행이나 '커널 설정 변경'은 부트로더의 역할이 아님.)\n\n- **종류**: `GRUB`·`LILO`(주로 x86, GRUB은 스테이지 단위 부팅), `U-Boot`·`BLOB`·`BOOTLDR`(주로 ARM 임베디드). 'COMMAND'는 부트로더가 아님.\n- **부팅 순서**: Power On → POST → 부트섹터 로딩 → 부트 코드 실행·커널 로더 적재 → 커널 로더 실행·커널 적재 → 커널 실행. **가장 마지막 단계는 `init` 프로세스 실행** (ROM→커널→루트FS 마운트→init).\n- **스타트업 코드**: 어셈블리로 작성된 블록으로 스택 포인터·스택·힙을 초기화하지만 `main()` 호출 전에 **인터럽트를 모두 허용하지는 않음**.\n- **램디스크**: 메모리를 디스크처럼 쓰는 **휘발성** 장치. `dd`로 빈 파일 생성 → `mkfs`로 ext2 포맷 → 루프 디바이스 마운트 → 파일 복사 → `gzip` 압축 순. 재부팅하면 내용 소멸 ('압축으로 가용량을 늘린다'는 틀림).\n- **퓨징 대상**: 부트로더·커널 이미지·루트 파일 시스템 (응용 프로그램과 소스코드 문서는 보통 제외).\n\n> 💡 암기 팁: '부팅의 끝은 init, 램디스크는 휘발성, x86은 GRUB/LILO·ARM은 U-Boot/BLOB'.","qids":[73,75,146,224,231,232,239,309,311,318,320,383,385,386,397,459,467,473,548,549,557,616,617,708]},{"title":"교차개발 환경, 툴체인과 JTAG 디버깅","note":"교차(크로스) 개발 환경은 **성능 좋은 호스트에서 작성·컴파일**하고 **제한된 타깃에서 실행**하는 방식으로 네이티브 컴파일과는 다른 개념이다.\n\n- **통신 회선**: 시리얼(RS232)·이더넷·**JTAG 케이블**이 쓰이며 IDE 케이블은 부적합.\n- **툴체인**: 크로스 컴파일 도구 모임으로 컴파일러(`gcc`)·`binutils`·표준 라이브러리(`glibc`)·유틸리티로 구성. Qt나 ISP는 구성요소가 아님.\n- **관련 도구**: 타깃 전용 코드를 만드는 것이 **크로스 컴파일러**, 윈도우에서 유닉스/리눅스 환경을 에뮬레이션하는 것이 **`cygwin`**.\n- **교차 디버깅**: **GDB**(GNU Debugger)가 서버(`gdbserver`)와 클라이언트로 나뉘어 소스 레벨 디버깅·변수/상태 확인 가능.\n- **JTAG**: **바운더리 스캔 기반 직렬(시리얼) 방식** 인터페이스로 `TCK`(클록)·`TMS`(상태)·`TDI`(입력)·`TDO`(출력)·`TRST`(리셋) 신호로 구성. 동작 중 변수·스택 확인과 브레이크포인트·스텝 실행이 가능하나 기록 데이터를 직접 실행하는 기능은 없음 (병렬 방식이라는 설명은 틀림).\n- **다운로드 장비**: JTAG·ROM 라이터·SPI 등 (EPROM eraser는 다운로드 장비가 아님).\n\n> 💡 암기 팁: 'GDB=GNU 디버거, JTAG은 직렬(병렬 아님)+바운더리 스캔, 툴체인 4종(gcc·binutils·glibc·유틸)'.","qids":[65,68,70,159,222,235,305,317,379,460,466,475,550,551,626,630,634]},{"title":"네트워크 파일 전송(TFTP)과 네트워크 파일 시스템(NFS)","note":"**TFTP**는 가볍지만 불안정한 전송용, **NFS**는 원격 파일 공유용이라는 차이를 핵심으로 기억한다.\n\n- **TFTP(Trivial File Transfer Protocol)**: FTP보다 단순하며 **UDP(69번 포트)**로 구현되어 데이터 손실 가능성이 있고 보안에 취약 ('TCP로 구현'은 대표적 오답).\n- **TFTP 용도**: 저장 장치가 없는 라우터 부팅이나 임베디드 시스템에 부트로더·커널·램디스크·유저 이미지를 올릴 때 사용.\n- **NFS(Network File System)**: OS가 다른 원격 컴퓨터의 파일 시스템을 네트워크로 공유. **UDP/TCP(TCP/IP)** 환경에서 동작 ('시리얼 포트로 전송'은 틀림).\n- **NFS 장점**: 다운로드 과정 없이 타깃에서 호스트 파일을 바로 접근·실행하고, 큰 파일도 호스트 용량에 의존해 처리해 **제한된 하드디스크를 확장**하는 효과. 단, **장치 파일 같은 특수 파일은 생성 불가**(함정).\n- **NFS 데몬**: 서버 측은 `nfsd`·`mountd`·`portmap`, **`nfsiod`는 클라이언트 측**이므로 서버 데몬 문제에서 제외.\n\n> 💡 암기 팁: 'TFTP=UDP 69번(가볍고 불안정), NFS=원격 공유지만 특수 파일 못 만듦, nfsiod는 클라이언트'.","qids":[67,155,162,223,227,380,391,471,541,615]},{"title":"리눅스 쉘, 명령어, 런레벨, 파일시스템과 busybox","note":"리눅스 쉘은 **명령어 해석기**이자 프로그래밍·환경 설정 기능을 제공하며 본 쉘(`sh`)·배시(`bash`)·대시(`dash`) 등이 있다('윈 쉘'은 존재하지 않음).\n\n- **런레벨**: `0`(종료/halt), `1`(단일 사용자 모드), `3`(텍스트 멀티유저), `5`(GUI 멀티유저), `6`(재부팅). 0과 6, 1과 5의 의미를 정확히 구분.\n- **주요 명령**: `env`(환경 변수 출력), `adduser`(계정 생성), `netstat`(연결 목록), `lsof`(열린 모든 파일, 소켓만이 아님), `shutdown`(`-r` 재시작, `-c` 취소, `-k` 종료 없이 경고만).\n- **표준 디렉토리**: `/proc`(프로세스·하드웨어 정보), `/etc`(설정), `/mnt`(마운트 지점), `/bin`(일반 명령), `/sbin`(**시스템 관리자용 명령**). `/sbin`을 '일반 명령어'라 하면 틀림.\n- **busybox**: `ls`·`mv`·`cp` 등 다수 유틸리티와 쉘을 **하나의 실행 파일로 묶어 크기를 줄이는** 도구로 임베디드 루트 파일 시스템에 활용. 모든 기능을 포함하진 않아 필요 기능은 추가해야 함.\n- **busybox 빌드**: 크로스 컴파일 prefix만 지정하면 빌드되고 보통 **정적 컴파일**해 동적 라이브러리 없이도 동작 ('동적 라이브러리 없으면 실행 불가'는 틀림).\n\n> 💡 암기 팁: '0=종료/6=재부팅, /sbin은 관리자용, busybox는 하나로 묶어 정적 컴파일'.","qids":[84,151,154,233,237,304,389,395,461,465,552,619,629]},{"title":"임베디드 시스템 전원 관리","note":"임베디드 전력 관리는 배터리 수명과 발열을 좌우하는 핵심 주제이다. 소비 전력은 **클럭 주파수에 비례**하고 **공급 전압의 제곱에 비례**하므로 전압·주파수를 함께 낮추는 **DVFS(동적 전압 주파수 조정)**로 전력과 발열을 줄인다.\n\n- **전력 특성**: 전압·주파수를 낮추면 같은 시간에 처리하는 명령 수는 줄어든다. 대부분 임베디드 프로세서가 동적 조정을 지원하므로 '정격에서만 동작'은 틀림.\n- **CPU 절전 모드**: **아이들(idle)**은 여러 클럭이 멈추고 이벤트 대기(최소 태스크 동작), **슬립(sleep)**은 CPU·주변 장치 전원이 꺼져 최저 전력 소비.\n- **APM 상태**: Full On → APM Enabled → **APM Standby**(대부분 장치 저전력, CPU 정지, 상태 저장) → **APM Suspend**(상태 저장 후 대부분 장치 전원 차단). 'Suspend에서 전원 켜짐+상태 미저장'은 오답.\n- **전원 관리 부품**: 데몬은 `apmd`, 효율적 관리를 위해 **PMIC**와 저손실 **LDO 레귤레이터** 사용, 경부하에서는 DC-DC를 PWM이 아닌 **PFM** 방식으로 제어.\n- **소비 전력**: LCD와 CPU 등이 전력 소비가 크며, 상대적으로 적은 항목을 묻는 문제가 자주 출제.\n\n> 💡 암기 팁: '전력은 V²에 비례, idle은 대기·sleep은 차단, 경부하는 PFM'.","qids":[81,392,463,464,539,540,547,618,624]},{"title":"컴퓨터 구조와 하드웨어 기초 계산","note":"이 영역은 컴퓨터 구조와 **하드웨어 기초 계산** 문제가 모인 곳으로, 대역폭·성능·분해능·저항·엔디안 계산이 핵심이다.\n\n- **대역폭/성능**: 메모리 대역폭 = 데이터 워드 폭 ÷ 접근 시간 (예: `32bit / 0.5us = 64Mbps`). 명령어 처리율은 **가장 긴 단계 기준** (수행 10ns·패치 5ns·준비 3ns이면 약 1.25 수준).\n- **A/D 분해능(1LSB)**: 전압 범위 ÷ `2^n` (예: 0~1V·3비트 → `1/8 = 0.125V`, 0~3V → `3/8 = 0.375V`). 주소선 `n`개는 `2^n` 워드 → 주소선 11·데이터선 8 ROM은 **2K x 8** 구조.\n- **LED 보호 저항**: (전원전압 − 순방향전압) ÷ 전류 (예: `(5−1.6)/0.036 ≈ 100Ω`).\n- **엔디안**: **리틀 엔디안**은 하위 바이트를 낮은 주소에 저장 → `0x1234`를 `char` 포인터로 첫 바이트 읽으면 `0x34`.\n- **DMA/버스**: **DMA**는 CPU 개입 없이 **블록 단위**로 전송하고 블록 단위 인터럽트 발생 ('바이트 단위 인터럽트'는 틀림). 멀티 마스터 공유 메모리는 AMBA의 고성능 버스(`AHB`/`AXI`)에 연결. 지역 변수·복귀 주소는 **스택** 사용, 포인터 출력 형식 지정자는 `%p`.\n- **펌웨어 저장**: 전원이 꺼져도 유지되는 **비휘발성 메모리**인 플래시(또는 `nvSRAM`)에 저장. `nvSRAM`은 배터리/플래시로 데이터를 유지.\n\n> 💡 암기 팁: '대역폭=폭/시간, 성능은 가장 긴 단계, 1LSB=범위/2^n, 리틀=하위가 낮은 주소, DMA는 블록 단위'.","qids":[74,76,144,145,150,152,158,161,228,236,241,308,313,477,544,546,553,622]}],"임베디드 소프트웨어":[{"title":"C언어 기초 문법과 자료형, 입출력","note":"C언어는 시스템 프로그래밍에 적합하고 이식성이 높으며 하드웨어 제어가 가능한 **절차적 언어**로, 반드시 **컴파일** 과정을 거쳐 실행된다.\n\n- **기본 자료형**: 정수형 `int`/`long`, 실수형 `float`/`double`, 문자형 `char` (단, `integer`나 `real`은 C의 자료형이 아님).\n- **기억 클래스**는 자동(`auto`), 정적(`static`), 레지스터(`register`), 외부(`extern`) 네 가지이며 `internal`은 기억 클래스가 아니다.\n- **printf 변환 문자**: 정수 `%d`, 부호 없는 10진수 `%u`, 8진수 `%o`, 16진수 `%x`, 문자 `%c`, 문자열 `%s`, 실수 `%f` (`%d`를 8진수로 착각하지 말 것).\n- **입출력 함수**: 문자열 입력 `gets`, 한 문자 입력 `getchar`, 문자열 출력 `puts`, 한 문자 출력 `putchar`.\n- **이스케이프 시퀀스**: 줄바꿈 `\\n`, 복귀 `\\r`, 백스페이스 `\\b`, 탭 `\\t`이며 **널 문자**는 `\\0`이다(`\\n`을 널 문자로 적은 보기는 함정).\n- **배열 부분 초기화**: `static int a[8]={1,2,3}`처럼 일부만 초기화하면 나머지 원소는 0으로 자동 초기화되어 `a[5]`는 0이며, 미초기화 배열에 문자열 대입 등 문법 오류가 있으면 **컴파일 오류**가 난다.\n\n> 💡 암기 팁: 자료형 종류, `printf` 서술자, 이스케이프 의미, 기억 클래스 네 가지를 표로 묶어 외우면 함정 보기를 피할 수 있다.","qids":[106,110,111,184,192,194,263,274,277,340,429,513,514,518,595]},{"title":"C와 C++ 연산자, 포인터, 코드 해석","note":"C/C++ 코드 결과 문제는 **연산자 우선순위와 결합 방향**, 그리고 **포인터 동작**을 정확히 알아야 풀 수 있다.\n\n- **우선순위 순서**: 산술(`*`,`/`,`%`) > 시프트(`<<`,`>>`) > 관계(`==`) > 비트(`&`,`|`) > 논리(`&&`,`||`)이므로 `1+x<<2`는 `(1+x)<<2`로 계산된다. 가장 우선순위가 낮은 연산자는 보통 `&&`/`||`이다.\n- **단축 평가(short circuit)**: `&&`/`||`은 앞 조건에서 결과가 정해지면 뒤를 평가하지 않으므로 증감연산자가 섞이면 변수 값 변화에 주의한다.\n- **증감 연산자**: 후위 `a++`는 현재 값을 쓴 뒤 증가, 전위 `++a`는 먼저 증가한 뒤 사용한다.\n- **드모르간 법칙**: `(!A)||(!B)`는 `!(A&&B)`와 같다.\n- **포인터 구분**: `int *p=a`일 때 `*(p+3)`은 네 번째 원소 값, `*p+3`은 첫 원소 값에 3을 더한 값으로 서로 다르다.\n- C++에서 함수의 **매개변수와 자동변수(auto variable)**는 **스택 영역**에 저장된다.\n\n> 💡 암기 팁: 우선순위와 포인터 연산은 머리로 외우기보다 손으로 한 단계씩 직접 계산하는 연습이 정답률을 올린다.","qids":[349,358,503,510,583,587,658,667,670,673,701]},{"title":"Java와 C++ 언어의 특징","note":"**자바(Java)**는 **JVM** 위에서 동작하는 객체지향 언어로 이식성이 높고 **플랫폼 독립적**이며 동적 로딩, 다중 스레드, 유니코드, 분산 환경을 지원한다(운영체제에 종속적이지 않음).\n\n- **창시자**: 자바는 **제임스 고슬링**, C언어는 **데니스 리치**가 만들었으므로 혼동하지 않는다.\n- **접근 제어자**: `public`, `protected`, `default`, `private` 네 가지이며 `internal`/`virtual`은 자바 접근 제어자가 아니다.\n- **키워드**: 상위 클래스 멤버 참조는 `super`, 그 외 `instanceof`/`default` 등은 키워드이지만 `implement`는 키워드가 아니다(올바른 키워드는 `implements`).\n- **내부 클래스**: `instance`, `static`, `local`, `anonymous` 네 종류이며 `global class`는 없다.\n- **초기화**: 실수형 리터럴 기본은 `double`이라 float에는 접미사 `f`를 붙여 `float f=2.05f`로 쓰고, 멤버 변수는 0/`null`로 자동 초기화되지만 **지역 변수**는 초기화 없이 쓰면 컴파일 오류가 난다. `notifyAll`/`wait`는 `java.lang.Object`에 정의되어 있다.\n- **C++ 비교**: 순수 가상 함수는 `virtual int f()=0`으로 선언하며, **생성자**는 반환값이 없고 오버로딩 가능, **소멸자**는 매개변수가 없고 오버로딩 불가능하다.\n\n> 💡 암기 팁: 자바는 접근 제어자 4개, 내부 클래스 4종, 창시자(고슬링)를, C++는 생성자/소멸자 오버로딩 가부를 한 묶음으로 외운다.","qids":[270,346,350,351,421,437,511,516,579,585,590,593,655,657,672,674,705]},{"title":"객체지향 개념과 분석 설계, UML","note":"객체지향의 핵심 개념은 **클래스, 객체, 메시지, 메소드, 캡슐화, 상속, 다형성, 추상화**이며, 각 개념의 정의와 목적을 정확히 구분하는 것이 관건이다.\n\n- **클래스/메소드**: 클래스는 유사 객체의 공통 특성을 묶은 데이터 추상화의 틀이고, 메소드는 객체가 메시지를 받아 실행할 구체적 연산이다.\n- **캡슐화**: 데이터와 연산을 묶고 내부를 숨겨 재사용성과 **응집도는 높이고 결합도는 낮춘다**(결합도가 높아진다는 보기는 오답).\n- **정보은폐/다형성**: 정보은폐의 근본 목적은 **부작용(side effect) 최소화**이고, 다형성은 하나의 메시지에 객체마다 다르게 응답하는 능력이다.\n- **추상화 종류**: 기능 추상화, 제어 추상화, 자료 추상화이며 **상속 추상화는 포함되지 않는다**.\n- **분석 방법**: **부치(Booch)**는 미시적·거시적 프로세스를 모두 포함하고, **럼바우(Rumbaugh)**는 객체 모델링·동적 모델링(상태 다이어그램)·기능 모델링으로 나뉜다.\n- **UML**: **클래스도**는 정적 구조·관계를 나타내는 중심 다이어그램, **컴포넌트도**는 논리 모델을 물리 모델로 재배치할 때 사용하며 유스케이스도·상태도는 있으나 `Durability Diagram`은 존재하지 않는다.\n\n> 💡 암기 팁: 캡슐화는 '응집도↑ 결합도↓', 추상화는 '기능·제어·자료 3종', 럼바우는 '객체·동적·기능'으로 운율처럼 외운다.","qids":[104,113,118,188,190,202,269,342,343,348,356,420,433,435,438,502,505,581,588,666,671]},{"title":"선형 자료구조 - 스택, 큐, 리스트","note":"**선형 구조**는 자료가 일렬로 연결된 구조로 스택·큐·데크·리스트가 해당하며, 트리와 그래프는 **비선형 구조**이다.\n\n- **스택(Stack)**: 한쪽 끝(top)에서만 삽입(`push`)·삭제(`pop`)하는 **후입선출(LIFO)** 구조로, 부프로그램 호출 시 복귀주소 저장에 쓰인다. 입력 `A B C D`에서 `D A B C` 같은 출력은 불가능하다.\n- **큐(Queue)**: rear에서 삽입, front에서 삭제하는 **선입선출(FIFO)** 구조로 작업 스케줄링에 쓰인다.\n- **데크(Deque)**: 양쪽 끝에서 삽입·삭제가 모두 가능한 구조이다.\n- **후위 표기법(postfix)**: 스택으로 계산하며 연산자를 만나면 위의 두 값을 꺼내 계산한다(예: `a b c + * d -`는 `a*(b+c)-d`).\n- **중위→후위 변환**: 우선순위에 따라 연산자를 뒤로 보낸다(`A+B*C/D`는 `ABC*D/+`).\n- **원형 연결 리스트**: 마지막 노드가 처음을 가리켜 **널 포인터가 존재하지 않는다**.\n\n> 💡 암기 팁: '스택=LIFO·top 하나', '큐=FIFO·front/rear', '데크=양쪽 모두'로 삽입/삭제 위치를 짝지어 외운다.","qids":[120,121,193,198,339,341,352,424,430,436,506,507,592,664,669]},{"title":"비선형 자료구조와 알고리즘 - 트리, 그래프","note":"트리와 그래프는 **비선형 자료구조**이며, 순회 순서·노드 수 공식·정렬 전제·빅오 비교가 자주 출제된다.\n\n- **트리 차수/노드 수**: 차수(degree)는 한 노드의 자식 수 최댓값이고, 이진 트리 레벨 `i`의 최대 노드 수는 `2^(i-1)`이다.\n- **순회**: 전위(preorder)는 루트-왼쪽-오른쪽, 중위(inorder)는 왼쪽-루트-오른쪽, 후위(postorder)는 왼쪽-오른쪽-루트이며, 수식 트리를 후위 순회하면 후위 표기식이 나온다.\n- **그래프/탐색**: n개 정점을 모두 연결하는 최소 간선 수는 `n-1`개(트리 형태), **DFS**는 갈 수 있는 데까지 내려갔다가 막히면 되돌아오는 방식이다.\n- **이진 검색(binary search)**: 데이터가 **오름차순 또는 내림차순으로 정렬**되어 있어야만 적용 가능하다.\n- **복잡도**: 수행 시간은 **시간 복잡도**, 메모리는 **공간 복잡도**이며 수행 시간은 입력 크기뿐 아니라 입력 상태에도 영향을 받는다.\n- **빅오 효율**: `O(nlogn)`이 `O(n^2)`·`O(n^3)`·`O(n^4)`보다 빠르다.\n\n> 💡 암기 팁: 순회는 '루트 위치(전·중·후)', 레벨 노드 수는 `2^(i-1)`, 빅오는 'nlogn이 거듭제곱보다 빠르다'로 콕 집어 기억한다.","qids":[107,196,265,268,276,419,428,500,504,589,591,661,663]},{"title":"언어 번역 과정과 로더","note":"프로그램은 **원시-컴파일러-목적-링커-로더-실행** 순으로 처리되며, 컴파일러가 번역한 목적 모듈을 링커가 연결하고 로더가 주기억장치에 적재해 실행한다.\n\n- **컴파일 단계**: 어휘 분석(스캐너)이 문자 단위로 읽어 최소 단위인 **토큰**으로 분리하고, 이어서 구문 분석 → 최적화 → 코드 생성이 진행된다.\n- **크로스 컴파일러**: 작성한 컴퓨터와 **다른 기종**에서 실행될 기계어로 변환하며 임베디드 개발에 자주 쓰인다.\n- **로더의 기능**: 할당(allocation), 연결(linking), 재배치(relocation), 적재(loading)이며 **매크로(macro)는 로더 기능이 아니다**.\n- **Compile and Go**: 컴파일 후 즉시 실행하는 방식.\n- **절대 로더(Absolute Loader)**: 적재만 하고 할당은 프로그래머, 재배치는 번역기가 담당한다. **직접 연결 로더(Direct Linking Loader)**가 가장 널리 쓰인다.\n- **동적 적재 로더(Dynamic Loading Loader)**: 호출 시 적재(Load-on-Call)라고도 하며 프로그램이 주기억장치보다 클 때 유리하다.\n\n> 💡 암기 팁: 로더 기능 4종은 '할·연·재·적', 함정은 '매크로 아님'. 로더별로 할당·재배치 담당 주체를 표로 비교한다.","qids":[115,122,191,199,275,280,353,432,509,584]},{"title":"멀티미디어와 영상처리, 데이터 압축","note":"멀티미디어 압축은 크게 **무손실 통계적 부호화**와 **손실 부호화**로 나뉘며, 대표 기법과 표준, 표본화 주기 계산이 핵심이다.\n\n- **통계적 부호화**: **허프만(Huffman)**은 빈도가 높은 데이터에 짧은 비트를 할당하고, **LZW**는 사전에 등록한 정보만 저장해 반복을 줄인다.\n- **MPEG 압축 과정**: 양자화, 코드 할당, 비트스트림 생성 등이 포함되며 **에러 제어는 압축 과정에 속하지 않는다**.\n- **원천(소스) 부호화**: `DPCM`, `DM`(델타 변조), `LPC` 등이 있고, 대표 영상 압축 표준은 **H.264**이다. 영상의 명암값 분포를 보여 주는 기본 기법은 **히스토그램**이다.\n- **표본화 주기**: PCM에서 표본화 주파수가 8KHz면 주기는 역수인 **125마이크로초**이다(주기 = 1 / 주파수).\n- **전송 서비스 용어**: 받으면서 동시에 재생하면 **스트리밍**, 캐시 서버를 ISP 망 하단에 분산 배치하면 **CDN**, 오감으로 가상 상황을 체험하면 **가상현실(VR)**이다.\n\n> 💡 암기 팁: '허프만=빈도 기반 가변 길이', 'H.264=영상 표준', '8KHz→125μs(역수)'를 묶어 외운다.","qids":[105,186,197,262,266,357,434,499,508,512,586]},{"title":"소프트웨어 생명주기와 설계, 프로젝트 관리","note":"소프트웨어 공학은 개발부터 운영·유지까지 **생산성과 품질**을 높이기 위한 방법론을 다루며, 일정 지연·관리 부재·품질 미흡은 위기 요인이지만 **생산성 향상은 위기 요인이 아니다**.\n\n- **생명주기 순서**: 요구분석 → 설계 → 구현 → 시험 → 유지보수. 요구분석은 기능·목표를 명확히 하는 실질적 첫 단계이고, 구현은 설계 명세를 코드로 변환하는 단계이며 내부 구조 기술은 **설계 단계**에 속한다.\n- **프로토타입 모형**: 시제품으로 사용자 요구를 반영하고 공동 참조 모델을 제공하며 오류를 **조기에** 발견한다(최종에서 처음 오류를 본다는 설명은 오답).\n- **나선형 모형**: **보엠(Boehm)**이 제안, '계획수립-위험분석-개발-평가'를 반복하며 대규모 시스템에 적합하다(폭포수의 일종이라는 설명은 오답).\n- **좋은 설계**: 결합도는 낮게, **응집도는 높게**, 모듈 크기는 적당히, 이식성 고려, 상위→하위 구체화.\n- **프로젝트 관리 3P**: **People, Problem, Process** (`Plan`/`Product`는 3P가 아님).\n- **비용 산정**: LOC 기법은 '총 라인 ÷ (인원 × 1인당 생산성)'으로 기간 산정(예: 25000라인 ÷ (5명 × 월 500라인) = 10개월), **브룩스 법칙**은 지연된 프로젝트 말기 인력 추가는 더 지연시킨다고 본다. 일정 도구로 임계경로를 보는 **CPM**, 막대그래프 **간트 차트**가 있으며 간트 차트는 작업 경로 표시가 어렵다.\n\n> 💡 암기 팁: 'PSP가 아니라 3P=People·Problem·Process', '나선형=보엠·위험분석', '브룩스=말기 인력 추가는 독'으로 기억한다.","qids":[112,116,119,200,267,278,355,422,431,580,598,660,665,117,183,189,271,344,597,662,668]},{"title":"소프트웨어 품질과 테스트, 유지보수","note":"소프트웨어 테스트의 목적은 **오류를 찾아 신뢰도와 요구 만족도를 높이는 것**이며 형식적 행위가 아니다. 화이트박스·블랙박스의 기법 구분이 핵심이다.\n\n- **화이트박스 검사**: 내부 논리·제어 구조를 보는 구조적 시험으로 **기초 경로 검사, 데이터 흐름 검사, 루프 검사, 조건 검사** 등이 있다(오류 예측·기능 검증은 화이트박스가 아님).\n- **블랙박스 검사**: 내부 구조를 모른 채 기능·입출력을 보는 시험으로 **동치 분할, 경계값 분석, 원인-효과 그래프, 오류 예측 검사** 등이 있다(기초 경로 검사는 블랙박스가 아님).\n- **검사 단계**: 단위 → 통합 → 시스템 → 검증(인수). 사용자 요구 충족에 중점을 두고 **알파·베타 검사**를 수행하는 것은 **검증 검사(Validation Test)**이며 베타 검사는 실사용자 피드백 방식이다.\n- **테스트 도구**: **테스트 오라클**은 결과의 정당성을 판별하는 메커니즘이고, 정적 분석 도구에는 코드·데이터·순서 검사 도구가 있다(실행 분석은 동적 도구).\n- **품질/ISO 9126**: 사용 용이성 **Usability**, 정확성, 효율성, 무결성 등이 있고 기능성에는 적합성·상호운용성·보안성이 속하며 **분석성은 유지보수성**에 속한다.\n- **검토/유지보수**: 정형 기술 검토는 논쟁을 제한하고 체크리스트·의제·참가자 수를 **제한**한다(제한하지 않는다는 설명은 오답). 유지보수는 **수정(corrective)·적응(adaptive)·완전화(perfective)·예방(preventive)**으로 나뉘며 예방 유지보수는 장래 신뢰성 개선과 오류 대비 활동이다.\n\n> 💡 암기 팁: '화이트=기초경로/루프(내부)', '블랙=경계값/동치분할(기능)'로 짝짓고, 유지보수 4종은 '수·적·완·예'로 외운다.","qids":[108,187,272,273,347,659,109,114,185,195,201,279,281,345,354,423,427,501,517,582,594,596,656]}],"임베디드 플랫폼":[{"title":"프로세스 생성과 제어","note":"프로세스는 실행 중인 프로그램으로, 메모리상에서 코드(텍스트)/데이터/힙/스택의 네 영역으로 구분된다. 리눅스에서는 `fork`로 부모를 복제하고 `exec`로 새 이미지를 덮어쓰며 `wait`로 자식 종료를 회수한다.\n\n- **메모리 4영역**: **코드**(실행 명령), **데이터**(전역/정적 변수), **힙**(`malloc` 등 동적 할당), **스택**(리턴주소·지역변수). 벡터/프레임 세그먼트는 존재하지 않음.\n- **fork/exec/wait**: `fork`는 부모를 복제해 자식 생성, `exec` 계열(`execlp` 등)은 다른 프로그램 이미지로 덮어쓰기, `wait`/`waitpid`는 자식 종료 대기·회수.\n- **COW(Copy-On-Write)**: `fork`는 효율을 위해 자식이 메모리에 쓰기를 시작하는 시점까지 실제 복사를 미룬다.\n- **좀비(zombie, defunct)**: 자식이 종료됐는데 부모가 회수하지 않으면 남는 상태이며 `waitpid`로 제거한다.\n- **task_struct / TCB**: 리눅스 커널의 `task_struct`가 상태(`TASK_RUNNING`, `TASK_STOPPED`, `TASK_TRACED` 등)·ID·CPU 컨텍스트를 관리하며 이것이 곧 **TCB(Task Control Block)**에 해당.\n- **문맥교환**: 현재 프로세스의 문맥
