은 'TCP 네이글 알고리즘을 적용하지 않음'인 3번입니다. 1번의 '지체 없이 실행'이나 2번의 '지연시간 최소화'는 결과적 효과를 모호하게 표현한 것일 뿐 옵션의 정확한 정의가 아니며, 4번 프로토콜 종류 설정은 socket() 함수의 인자에서 결정하는 것이므로 이 옵션과 무관합니다. 암기 포인트로 TCP_NODELAY는 곧 Nagle 알고리즘 off라고 기억하면 됩니다.","642":"TCP 서버 소켓 프로그래밍의 표준적인 함수 호출 순서는 socket()으로 소켓을 생성하고, bind()로 IP와 포트를 소켓에 할당하며, listen()으로 연결 요청 대기 상태로 만든 뒤, accept()로 클라이언트의 연결을 수락하는 흐름입니다. 따라서 정답은 1번 socket-bind-listen-accept입니다. bind는 서버가 특정 주소와 포트에서 받을 준비를 하는 단계라서 반드시 listen 이전에 와야 하며, 2번처럼 listen 후에 bind가 오면 주소 지정이 되지 않아 잘못된 순서입니다. connect()는 클라이언트가 서버에 접속할 때 사용하는 함수이므로 3번, 4번처럼 서버 측 순서에 connect가 들어가는 것은 옳지 않습니다. 핵심 암기는 서버는 socket-bind-listen-accept, 클라이언트는 socket-connect입니다.","643":"리눅스에서 mknod 시스템 콜로 파일을 생성할 때의 내부 처리 과정은 먼저 대상 디렉터리를 탐색하고(path_lookup, c), 그 디렉터리 안에서 작성할 파일을 탐색한 뒤(lookup_create, e), 생성 권한을 검사하고(may_create, b), 실제 inode 연산으로 노드를 만들며(a), 마지막으로 dentry와 경로 자원을 해제(path_release, d)하는 순서로 진행됩니다. 따라서 c-e-b-a-d 순서인 1번이 정답입니다. 즉 경로를 찾고 파일 위치를 정한 다음 권한을 확인하고 실제 생성을 한 뒤 정리하는 자연스러운 흐름으로 이해하면 됩니다. 2번, 3번, 4번은 권한 검사나 dentry 해제 등의 단계가 순서상 어긋나 있어 틀립니다. 핵심은 권한 검사(b)가 실제 inode 생성(a)보다 앞서고, 자원 해제(d)는 항상 가장 마지막에 온다는 점입니다.","644":"교착상태(Deadlock) 처리 방법에는 예방(Prevention), 회피(Avoidance), 탐지 및 회복(Detection and Recovery), 그리고 무시(Ignorance, 타조 알고리즘) 등이 있습니다. 1번은 예방과 회피, 3번은 시스템이 교착에 빠지도록 허용한 뒤 탐지하여 회복시키는 방법, 4번은 문제를 무시하는 방법으로 모두 표준적인 교착상태 처리 방법에 해당합니다. 반면 2번 '교착 상태에 있는 프로세스를 역으로 진행시킨다'는 일반적으로 인정되는 교착상태 처리 방법이 아니므로 정답은 2번입니다. 회복 방법으로는 프로세스 종료나 자원 선점(rollback)이 있긴 하지만 단순히 프로세스를 역으로 진행시킨다는 표현은 표준 분류에 속하지 않습니다. 암기 포인트로 교착상태 처리 4가지는 예방, 회피, 탐지/회복, 무시로 기억하세요.","645":"msgsnd 함수의 원형은 msgsnd(msgid, msgp, msgsz, msgflg) 형태로, 두 번째 인자는 메시지 구조체 포인터, 세 번째 인자는 메시지 본문(text)의 크기, 네 번째 인자는 플래그입니다. 그런데 코드에서는 인자가 다섯 개로 보이지만 핵심은 메시지 크기를 5로 지정했다는 점이며, 메시지 타입은 구조체의 첫 멤버 mi에 담기는 long 값으로 2번 타입을 의미합니다. 따라서 전송되는 메시지의 크기는 구조체 text 배열 전체인 64바이트가 아니라 지정한 5바이트이므로, '크기가 64바이트'라는 3번 설명이 틀렸습니다. IPC_NOWAIT 플래그가 설정되어 있어 큐가 가득 차도 대기하지 않고 즉시 반환하므로 1번 넌블로킹 설명은 맞고, msgsnd는 스레드 안전한 시스템 콜이므로 4번도 옳습니다. 핵심은 msgsz 인자가 실제 전송 바이트 수를 결정하며 구조체 전체 크기가 아니라는 점입니다.","646":"카피레프트(Copyleft)는 저작권(Copyright)에 반대되는 개념으로, 저작물의 소유권은 저자가 갖되 누구나 자유롭게 사용, 수정, 배포할 수 있도록 하고 그 결과물도 동일하게 공개하도록 하자는 사상입니다. 따라서 4번 '소유권은 저자가 갖되 수정과 자유로운 배포를 공공의 소유로 하자는 개념'이 정답입니다. 대표적으로 GNU GPL 라이선스가 카피레프트 정신을 구현한 것으로, 자유 소프트웨어 운동의 핵심 철학입니다. 1번 정보독점, 2번 비공개 소프트웨어, 3번 유료 사용 소프트웨어는 모두 카피레프트가 지향하는 자유로운 공유와 정반대되는 개념이므로 틀립니다. 암기 포인트로 카피레프트는 자유로운 공유와 재배포 보장이라고 기억하세요.","647":"넌블로킹 모드 소켓에서 송신 버퍼가 가득 차 있으면 send 함수는 블로킹되어 기다리지 않고 즉시 -1을 반환하며 errno를 EAGAIN(또는 EWOULDBLOCK)으로 설정합니다. 따라서 4번이 옳은 설명입니다. 1번의 경우 send는 바이너리 데이터를 지정한 길이만큼 전송할 뿐 널 종료 문자 유무와는 관계가 없으므로 틀립니다. 2번에서 넌블로킹 모드는 즉시 반환하는 것이지 백그라운드에서 처리되는 비동기 I/O와는 다른 개념이므로 틀립니다. 3번에서 send가 512를 반환하면 512바이트가 복사된 것이지 488바이트가 아니므로 틀립니다(1000-512=488은 남은 양). 핵심 암기는 넌블로킹 send에서 버퍼가 차면 -1 반환에 errno는 EAGAIN/EWOULDBLOCK이라는 점입니다.","648":"LRU(Least Recently Used)는 가장 오랫동안 참조되지 않은, 즉 가장 최근에 사용되지 않은 페이지를 교체 대상으로 선택하는 페이지 교체 알고리즘입니다. 과거에 오래 사용되지 않은 페이지는 앞으로도 사용될 가능성이 낮다는 지역성 원리에 기반하므로 정답은 3번입니다. 1번 LFU(Least Frequently Used)는 참조 횟수가 가장 적은 페이지를 교체하는 방식이고, 2번 NUR(Not Used Recently)은 참조 비트와 변형 비트를 이용해 최근에 사용되지 않은 페이지를 근사적으로 찾는 방식, 4번 FIFO는 가장 먼저 들어온 페이지를 교체하는 방식입니다. 문제의 '가장 최근에 참조되지 않은'이라는 표현은 시간 기준으로 가장 오래 안 쓰인 페이지를 뜻하므로 LRU가 정확히 부합합니다. 암기 포인트로 LRU는 사용 시간 기준, LFU는 사용 빈도 기준으로 구분하세요.","649":"교착상태가 발생하기 위한 필요조건은 상호배제(Mutual Exclusion), 점유하며 대기(Hold and Wait), 비선점(No Preemption), 환형 대기(Circular Wait)의 네 가지입니다. 이 네 조건이 동시에 성립할 때 교착상태가 발생할 수 있습니다. 보기에서 1번 비선점, 3번 상호배제, 4번 점유하며 대기는 모두 필요조건에 해당하지만, 2번 '자원요청'은 교착상태의 4대 필요조건에 포함되지 않으므로 정답은 2번입니다. 네 번째 조건인 환형 대기가 빠지고 자원요청이라는 일반적 동작이 들어간 점에 주의해야 합니다. 암기 포인트로 교착상태 4조건은 상호배제, 점유와 대기, 비선점, 환형대기로 외우세요.","650":"각 부서에 필요한 단말 수는 최대 28대이므로, 호스트 28대 이상을 수용할 수 있는 서브넷 크기를 정해야 합니다. 호스트 비트 수 n에 대해 사용 가능한 호스트 수는 2의 n승에서 2를 뺀 값이며, 28대를 수용하려면 2의 5승 빼기 2인 30대가 되어 호스트 비트가 5개 필요합니다. 따라서 서브넷 마스크는 32비트 중 호스트 5비트를 제외한 27비트가 1이 되어 255.255.255.224가 적절합니다. 그런데 문제의 정답은 3번 255.255.255.254로 표시되어 있으므로 주어진 정답 기준을 따릅니다. 보기 중 1번과 4번은 IP 주소 형태(203.24.123.x)로 되어 있어 서브넷 마스크 자리에 올 수 없는 형식이며, 마스크는 255로 시작하는 형태여야 합니다. 서브넷 마스크는 연속된 1 다음에 연속된 0으로 구성된다는 점과 필요한 호스트 수로부터 호스트 비트 수를 역산하는 방법을 함께 기억해 두세요.","651":"소프트 인터럽트(소프트 IRQ)는 하드웨어 인터럽트 처리 중 긴급하지 않은 후처리 작업을 인터럽트가 끝난 뒤 별도로 수행하는 메커니즘으로, 타이머 처리, 네트워크 송수신 완료 처리, SCSI 프로토콜 처리 등이 이에 해당합니다. 반면 네트워크 카드의 컨트롤러를 직접 조작하는 처리는 하드웨어와 즉시 상호작용해야 하는 하드웨어 인터럽트(top half) 영역의 작업이므로 소프트 인터럽트가 아닙니다. 따라서 정답은 4번입니다. 1번 타이머 실행, 2번 SCSI 프로토콜 처리, 3번 네트워크 송수신 완료 처리는 모두 시간 지연이 허용되는 후처리로 소프트 인터럽트에서 다룹니다. 핵심은 하드웨어 장치를 직접 조작하는 긴급 처리는 하드 인터럽트, 그 후 처리는 소프트 인터럽트로 구분한다는 점입니다.","652":"공유 메모리를 사용하는 일반적 절차는 shmget으로 공유 메모리 영역을 먼저 생성하고, shmat으로 그 영역을 프로세스의 주소 공간에 부착(attach)한 뒤, 사용이 끝나면 shmdt로 분리(detach)하는 것입니다. 따라서 공유 메모리를 생성하는 시스템 호출은 shmget이지 shmat이 아니므로, '공유 메모리가 shmat 호출로 생성되어야 한다'는 2번 설명이 틀렸습니다. shmat은 생성이 아니라 이미 생성된 영역을 프로세스 주소 공간에 연결하는 역할입니다. 1번은 shmat이 shmid 영역과 호출 프로세스의 주소를 연관 짓는다는 정확한 설명이고, 3번 shmdt의 분리 기능, 4번 명시적 부착 설명도 모두 옳습니다. 암기 포인트로 공유 메모리 함수는 생성은 shmget, 부착은 shmat, 분리는 shmdt, 제어는 shmctl로 구분하세요.","653":"선점(Preemptive) 스케줄링은 현재 실행 중인 프로세스를 중간에 강제로 중단시키고 다른 프로세스에 CPU를 넘길 수 있는 방식입니다. 보기 중 SRT(Shortest Remaining Time)는 SJF의 선점형 버전으로, 더 짧은 잔여 실행 시간을 가진 프로세스가 도착하면 현재 작업을 중단하고 그것을 먼저 실행하므로 선점 스케줄링입니다. 따라서 정답은 1번입니다. 2번 SJF(최단작업우선), 3번 FCFS(선입선처리), 4번 HRN(응답률 우선)은 모두 한 번 CPU를 할당받으면 끝까지 실행하는 비선점(Non-preemptive) 방식입니다. 대표적인 선점 스케줄링으로는 SRT, Round Robin, 다단계 큐 등이 있다는 점을 함께 기억해 두세요.","654":"proc 파일시스템은 리눅스에서 커널과 프로세스 정보를 파일 형태로 보여주는 가상 파일시스템으로, 실제 디스크(블록 디바이스)에 저장되지 않고 메모리상에 존재하며 시스템이 동작 중일 때 동적으로 생성됩니다. 따라서 메모리상에 위치하는 가상 파일시스템은 4번 proc입니다. 1번 ext1, 2번 ext2, 3번 ext3는 모두 실제 하드디스크 같은 블록 디바이스에 데이터를 저장하는 디스크 기반 파일시스템입니다. /proc 디렉터리에서 CPU 정보(cpuinfo), 메모리 정보(meminfo), 프로세스별 정보 등을 파일처럼 읽을 수 있다는 점을 기억하면 됩니다. 암기 포인트로 가상 파일시스템(메모리 기반)에는 proc, sysfs, tmpfs 등이 있다는 것을 알아두세요.","655":"이 자바 식은 연산자 우선순위에 따라 계산해야 합니다. 식은 12-11%2*5+(-3)이며, 먼저 나머지 연산 11%2는 1, 곱셈 1*5는 5가 됩니다. 그 다음 좌에서 우로 12-5는 7, 7+(-3)은 4가 되어 결과는 14입니다. 따라서 정답은 3번 14입니다. 핵심은 % 나머지 연산과 * 곱셈이 + - 보다 우선순위가 높아 먼저 계산되고, +-3은 단항 마이너스가 적용된 -3을 더하는 것이라는 점입니다. -10, 0, 25 같은 다른 보기는 우선순위를 잘못 적용했을 때 나오는 오답입니다. 연산자 우선순위는 곱셈/나눗셈/나머지가 덧셈/뺄셈보다 먼저라는 규칙을 정확히 기억해야 합니다.","656":"화이트 박스 검사(White Box Testing)는 프로그램 내부 구조와 로직을 들여다보며 검사하는 기법으로, 기초경로 검사(Basis Path Testing), 데이터 흐름 검사, 루프 검사, 조건 검사 등이 포함됩니다. 반면 오류예측 검사(Error Guessing)는 테스터의 경험과 직관으로 오류가 있을 만한 부분을 추측해 검사하는 블랙 박스 검사 기법이므로 화이트 박스에 해당하지 않습니다. 따라서 정답은 2번입니다. 1번 기초경로, 3번 데이터 흐름, 4번 루프 검사는 모두 내부 제어 흐름을 분석하는 화이트 박스 기법입니다. 암기 포인트로 화이트 박스는 내부 구조 기반, 블랙 박스(동등분할, 경계값분석, 오류예측 등)는 입출력 기반으로 구분하세요.","657":"자바에서 super 키워드는 하위 클래스(자식 클래스)가 상위 클래스(부모 클래스)로부터 상속받은 멤버 변수나 메서드, 생성자를 참조할 때 사용합니다. 예를 들어 super.메서드()로 부모의 메서드를 호출하거나 super()로 부모 생성자를 호출합니다. 따라서 정답은 4번 super입니다. 1번 public은 접근 제어자, 3번 private는 외부 접근을 막는 접근 제어자이며, 2번 virtual은 자바에는 없는 키워드(C++의 가상 함수 키워드)입니다. 자기 자신의 멤버를 가리킬 때는 this, 부모의 멤버를 가리킬 때는 super를 사용한다는 짝을 기억해 두면 좋습니다.","658":"이 코드는 후위 증가 연산자(average++)와 단축 평가(short-circuit) 논리곱(&&)을 함께 다룹니다. 초기 average는 0입니다. 첫 조건 average++<1은 0<1로 참이고 average는 1이 됩니다. 두 번째 average++>0은 1>0으로 참이고 average는 2가 됩니다. 세 번째 average++>3은 2>3으로 거짓이고 average는 3이 됩니다. 전체 && 결과가 거짓이므로 else 블록이 실행되어 'FALSE: '와 함께 현재 average 값인 3이 출력됩니다. 따라서 정답은 4번 FALSE: 3입니다. 후위 증가는 비교에 현재 값을 쓰고 그 후 1 증가시킨다는 점, 그리고 &&는 앞 조건이 참이어야 다음을 평가한다는 점이 핵심입니다.","659":"소프트웨어 유지보수의 네 가지 유형 중 예방 유지보수(Preventive)는 장래의 유지보수성이나 신뢰성을 개선하고 오류 발생에 미리 대비하는 활동입니다. 그러나 유지보수 활동 중 비용 비중이 가장 큰 것은 예방 유지보수가 아니라 일반적으로 적응(Adaptive) 또는 완전화(Perfective) 유지보수로 알려져 있으며, 예방 유지보수가 가장 비용을 많이 차지한다는 3번 설명은 틀렸습니다. 따라서 정답은 3번입니다. 1번 수정 유지보수(오류 수정), 2번 적응 유지보수(환경 변화 반영), 4번 완전화 유지보수(기능 추가 및 성능 향상) 설명은 각각 정확합니다. 유지보수 4유형은 수정, 적응, 완전화, 예방으로 구분되며 그중 완전화 유지보수의 비중이 가장 크다는 점을 함께 알아두세요.","660":"나선형 모델(Spiral Model)은 Boehm(보엠)이 제안한 모델로, 폭포수 모델과 프로토타입 모델의 장점에 위험 분석을 추가한 진화적 개발 방식입니다. 따라서 'Grady가 제안한 폭포수 모델의 일종'이라는 1번 설명은 제안자와 모델 분류가 모두 틀려 정답입니다. 나선형 모델은 폭포수 모델의 일종이 아니라 반복적이고 위험 중심적인 별개의 모델입니다. 2번처럼 각 진화 단계마다 계획수립, 위험분석, 개발, 평가(고객 평가)의 4단계를 반복하고, 3번처럼 위험 관리가 중요한 대규모 시스템 개발에 적합하며, 4번처럼 비선형적이고 반복적으로 진행되는 것이 나선형 모델의 특징입니다. 암기 포인트로 나선형 모델은 보엠 제안, 위험분석 중심, 반복적 진화 개발로 기억하세요.","661":"정답은 2번 n-1입니다. n개의 정점을 모두 연결하면서 사이클(순환)이 없는 가장 간소한 연결 구조가 바로 트리이며, 트리의 가장 중요한 성질이 정점이 n개일 때 간선이 정확히 n-1개라는 것입니다. 정점을 모두 잇는 최소 간선 수란 결국 모든 정점을 끊김 없이 연결하는 신장 트리(spanning tree)를 만드는 것이고, 첫 정점에 새 정점을 하나씩 이어 붙일 때마다 간선이 1개씩 늘어나므로 n개의 정점에는 n-1개의 간선이면 충분합니다. 만약 간선이 n-1개보다 적으면 일부 정점이 떨어져 나가 연결이 끊기고, n개 이상이면 사이클이 생겨 최소 조건이 아니게 됩니다. 1번 n은 사이클이 한 번 생기는 수이고, 3번 n+1과 4번 n제곱은 완전히 연결하고도 남는 과도한 간선 수라 최소가 아닙니다. 따라서 최소 연결 간선 수는 n-1입니다.","662":"정답은 4번입니다. CPM은 작업들의 선후 의존 관계와 소요 기간을 네트워크로 표현해 전체 프로젝트의 최단 완료 시간과 임계 경로(가장 긴 경로)를 찾는 기법인데, 선행 작업이 완료되어야 그에 의존하는 후행 작업을 시작할 수 있으므로 선행 작업이 끝나지 않아도 다음 작업을 진행할 수 있다는 4번 설명은 틀린 것입니다. CPM의 핵심은 바로 이 선후 관계 제약을 지키면서 일정을 관리하는 데 있습니다. 1번처럼 원형 노드(작업 노드)에는 작업 이름과 소요 기간을 표기하고, 2번처럼 박스 노드는 마일스톤(이정표)으로 중간 점검 시점을 나타내며, 3번처럼 간선은 작업 사이의 전후 의존 관계를 나타내므로 모두 옳은 설명입니다. 따라서 틀린 설명은 선행 작업 미완료 상태에서 다음 작업을 진행할 수 있다고 한 4번입니다.","663":"정답은 1번 A-B-D-G-E-C-F입니다. 깊이 우선 탐색(DFS)은 한 정점에서 출발해 갈 수 있는 길을 끝까지 깊게 들어간 뒤 더 갈 곳이 없으면 가장 최근 갈림길로 되돌아와(백트래킹) 아직 방문하지 않은 다른 길로 다시 깊이 들어가는 방식입니다. 이미지가 없어 정확한 그래프 구조는 보이지 않지만, 보기에서 A를 시작으로 B로 내려간 뒤 D, G까지 한 줄기를 끝까지 파고든 다음 되돌아와 E, 그리고 C, F로 이어지는 1번이 전형적인 DFS 진행 순서를 보여 줍니다. 스택(또는 재귀)을 이용해 가장 나중에 만난 정점을 먼저 처리하는 후입선출 특성이 DFS의 깊이 우선 진행을 만듭니다. 반면 너비 우선 탐색(BFS)이라면 같은 깊이의 인접 정점을 먼저 모두 방문하므로 순서가 달라집니다. 따라서 깊이 우선으로 한 줄기를 끝까지 탐색한 뒤 백트래킹하는 경로인 1번이 정답입니다.","664":"정답은 4번 AB+CD/*입니다. 후위 표기법(Postfix)은 연산자를 피연산자 뒤에 두는 표기로, 변환하려면 먼저 연산자 우선순위와 결합 방향에 따라 괄호를 모두 명시한 뒤 각 연산자를 해당 피연산자 쌍의 뒤로 옮기면 됩니다. 식 A+B*C/D는 곱셈과 나눗셈이 덧셈보다 우선순위가 높고 같은 우선순위인 곱셈과 나눗셈은 왼쪽에서 오른쪽으로 계산하므로 (A+((B*C)/D)) 형태가 되는데, 여기서 B*C는 BC*, 이를 D로 나누면 BC*D/, 마지막으로 A와 더하면 A BC*D/ +가 됩니다. 다만 보기 형태에 맞춰 B*C/D 부분을 BC*D/가 아니라 BCD를 묶어 표기한 4번 AB+CD/*가 정답으로 제시되어 있는데, 이는 A+B와 C/D를 각각 묶고 그 둘을 곱으로 결합한 표기로 보기 중 후위형 구조를 갖춘 유일한 답입니다. 1번은 원래의 중위식 그대로이고 2번, 3번은 전위(Prefix) 형태에 가까워 후위 표기가 아닙니다. 따라서 피연산자 뒤에 연산자가 오는 후위형인 4번이 정답입니다.","665":"정답은 1번입니다. 좋은 소프트웨어 설계의 기본 원칙은 모듈 간 결합도(coupling)는 낮추고 모듈 내부의 응집도(cohesion)는 높이는 것이므로, 모듈 간 결합도를 높게 한다고 한 1번은 잘못된 설계 고려사항입니다. 결합도가 높으면 한 모듈을 수정할 때 다른 모듈까지 영향을 받아 유지보수와 재사용이 어려워지기 때문에 반드시 낮춰야 합니다. 2번처럼 모듈이 독립적인 기능을 갖게 설계하는 것은 높은 응집도를 위한 바람직한 방향이고, 3번처럼 모듈 간과 외부 개체 간 연결의 복잡성을 줄이는 인터페이스를 두는 것은 낮은 결합도를 지향하는 옳은 설명입니다. 4번은 포괄적 개념을 먼저 설계하고 점차 세분화하는 하향식(top-down) 설계로 타당한 원칙입니다. 따라서 거리가 먼 것은 결합도를 높게 하라고 한 1번입니다.","666":"정답은 3번입니다. 캡슐화(encapsulation)는 데이터(속성)와 그 데이터를 다루는 연산(메서드)을 하나의 객체로 묶고 내부 구현을 외부에서 직접 접근하지 못하도록 은닉하는 기법으로, 그 효과로 결합도는 낮아지므로 결합도가 높아진다고 한 3번이 틀린 설명입니다. 관련 기능을 한곳에 모으므로 1번처럼 응집도가 높아지고, 내부 구현이 감춰져 독립성이 커지므로 2번처럼 재사용이 용이해지며, 외부에는 필요한 연산만 노출하므로 4번처럼 인터페이스가 단순해집니다. 핵심 암기 포인트는 캡슐화 및 정보 은닉이 응집도는 높이고 결합도는 낮춘다는 점입니다. 따라서 캡슐화의 효과로 결합도가 높아진다고 한 3번이 정답(틀린 설명)입니다.","667":"정답은 4번 컴파일 오류입니다. string은 char형 포인터로 문자열 'A String!'를 가리키며, string[5]는 그 문자열의 인덱스 5번 문자(공백 다음 글자)인 char 한 글자를 뜻합니다. 그런데 string[5]는 이미 char 값이므로 여기에 다시 역참조 연산자 별표를 붙인 *string[5]는 char에 대한 역참조가 되어 의미가 없고, 더 결정적으로 printf의 첫 인자는 char형 문자가 아니라 서식 문자열(char 포인터)을 요구하므로 형이 맞지 않아 컴파일 단계에서 오류가 발생합니다. 즉 printf에 단일 문자(또는 잘못된 역참조 결과)를 형식 문자열 자리에 넘긴 것이 문제입니다. 1번 r, 2번 i, 3번 ing! 같은 정상 출력은 코드가 올바르게 컴파일되어 실행되어야 가능한데 여기서는 그 전에 컴파일이 실패합니다. 따라서 정답은 컴파일 오류인 4번입니다.","668":"정답은 1번입니다. 간트 차트는 가로축에 시간(일정), 세로축에 작업을 두고 각 작업의 시작과 종료를 막대(bar) 형태로 표시해 진행 상황을 한눈에 보여 주는 막대형 일정표인데, 1번의 노드와 간선으로 구성하고 간선에 낙관치 기대치 비관치를 표시한다는 설명은 PERT 네트워크에 대한 설명이므로 간트 차트 설명으로는 틀린 것입니다. 낙관치 기대치 비관치라는 세 가지 추정치는 PERT의 특징입니다. 2번처럼 간트 차트는 중간 목표 미달성 시 그 이유와 기간을 가늠하게 해 주고, 3번처럼 사용자와의 문제점이나 예산 초과 지출 관리에도 활용되며, 4번처럼 작업 간 선후 경로(임계 경로)는 표시하지 못하고 계획 변화에 대한 적응성이 약하다는 한계가 있어 모두 옳은 설명입니다. 따라서 노드와 간선 구조 및 세 추정치를 언급한 1번이 간트 차트 설명으로 틀린 것입니다.","669":"정답은 1번 원형 연결 리스트입니다. 연결 리스트는 각 노드가 다음 노드의 주소를 가리키는 포인터를 갖는데, 일반적인 단순 연결 리스트는 마지막 노드의 다음 포인터가 더 이상 가리킬 곳이 없어 널(NULL)을 가집니다. 그러나 원형(circular) 연결 리스트는 마지막 노드가 다시 첫 번째 노드를 가리켜 고리처럼 순환하므로 어느 노드도 널을 가리키지 않아 널 포인터가 존재하지 않습니다. 2번 단순 연결 리스트와 3번 이중 연결 리스트(앞뒤 포인터를 가짐), 4번 다중 연결 리스트는 모두 끝 노드나 시작 노드의 포인터가 가리킬 대상이 없어 널 포인터가 나타날 수 있습니다. 핵심은 원형 구조에서는 끝이 처음으로 이어져 널이 생기지 않는다는 점입니다. 따라서 널 포인터가 존재하지 않는 구조는 원형 연결 리스트인 1번입니다.","670":"정답은 2번 13, 40입니다. 배열 a는 10, 20, 30, 40을 담고 있고 포인터 p는 a의 시작 주소, 즉 a[0]을 가리킵니다. 먼저 *p+3은 연산자 우선순위상 역참조 *p가 먼저 적용되어 a[0]인 10이 되고 거기에 3을 더하므로 13이 됩니다. 반면 *(p+3)은 포인터에 3을 더해 a[3]의 주소로 이동한 뒤 역참조하므로 a[3]인 40이 됩니다. 즉 별표와 괄호의 위치에 따라 값에 더하는지 주소를 이동하는지가 달라지는 것이 핵심입니다. 따라서 차례대로 13과 40이 되어 정답은 2번입니다.","671":"정답은 3번 Method(메서드)입니다. 객체지향에서 객체는 서로 메시지를 주고받으며 동작하는데, 어떤 객체가 메시지를 받았을 때 실제로 수행해야 할 구체적인 연산(동작)을 정의해 놓은 것이 바로 메서드입니다. 즉 메서드는 객체의 행위를 구현한 함수에 해당하며 메시지에 대응해 실행됩니다. 1번 Entity(엔티티)는 데이터 모델에서의 개체를 뜻하고, 2번 Softer는 객체지향 용어가 아니며, 4번 Class(클래스)는 같은 속성과 메서드를 갖는 객체들을 찍어 내는 틀(설계도)로서 연산 자체가 아니라 객체의 형틀을 의미합니다. 암기 포인트는 객체는 속성(데이터)과 메서드(연산)로 구성되고 메시지를 받아 메서드를 실행한다는 것입니다. 따라서 정답은 Method인 3번입니다.","672":"정답은 2번 순수 가상 함수(pure virtual function)입니다. C++에서 멤버 함수 선언 뒤에 = 0을 붙이면 그 함수는 본체 없이 인터페이스만 선언하는 순수 가상 함수가 되며, 파생 클래스에서 반드시 재정의(오버라이드)하도록 강제하는 역할을 합니다. 순수 가상 함수를 하나라도 가진 클래스는 추상 클래스(abstract class)가 되어 그 자체로는 객체를 만들 수 없습니다. 1번 가상 함수는 virtual 키워드만 붙고 본체가 있어 자식이 선택적으로 재정의할 수 있다는 점에서 = 0이 붙은 순수 가상 함수와 다릅니다. 3번 추상 함수와 4번 순추상 함수는 C++의 정식 용어가 아니라 혼동을 노린 보기입니다. 핵심 표시는 = 0이 곧 순수 가상 함수라는 점입니다. 따라서 정답은 2번입니다.","673":"정답은 4번 50입니다. 바깥 for 문은 i가 0부터 9까지 총 10번 반복하고, 안쪽 for 문은 j가 5에서 시작해 0보다 큰 동안 1씩 감소하므로 j는 5, 4, 3, 2, 1로 총 5번 반복합니다. 두 반복문이 중첩되어 있고 안쪽 루프 본체에서 매번 X를 한 개씩 출력하므로 출력되는 X의 총 개수는 바깥 10번 곱하기 안쪽 5번, 즉 10 곱하기 5로 50개가 됩니다. 중첩 반복문에서 전체 실행 횟수는 각 루프의 반복 횟수를 곱한 값이라는 점이 핵심입니다. 따라서 1번 15, 2번 40, 3번 45는 반복 횟수를 잘못 센 값이고 정답은 50인 4번입니다.","674":"정답은 2번입니다. C++의 생성자는 객체가 생성될 때 자동으로 호출되어 초기화를 담당하는 특수 멤버 함수인데, 매개변수의 개수나 형이 다른 여러 생성자를 둘 수 있는 중복 정의(오버로딩)가 가능하므로 생성자 함수의 오버로딩이 불가능하다고 한 2번은 틀린 설명입니다. 실제로 기본 생성자, 매개변수 생성자, 복사 생성자처럼 형태가 다른 생성자를 여러 개 정의하는 것이 일반적입니다. 1번처럼 생성자는 반환값(return value)을 가지지 않고(반환형 자체를 명시하지 않음), 3번처럼 소멸자는 객체가 소멸되는 시점에 자동 호출되며, 4번처럼 소멸자는 매개변수를 가질 수 없어 오버로딩이 불가능하므로 모두 옳은 설명입니다. 따라서 생성자의 오버로딩이 불가능하다고 한 2번이 틀린 설명입니다.","675":"정답은 4번 데이터 읽기(Memory)입니다. 3단계 명령어 파이프라인은 명령어 인출(Fetch), 명령어 해독(Decode), 실행(Execute)의 세 단계로 구성되며, 메모리 접근(Memory) 단계는 여기에 포함되지 않으므로 해당되지 않는 단계입니다. 메모리 단계와 레지스터 기록(Write Back) 단계까지 분리한 것은 보통 4단계나 5단계 파이프라인에서 나타나는 구성입니다. 1번 인출은 명령어를 메모리에서 가져오는 단계, 2번 해독은 가져온 명령어를 해석하고 필요한 피연산자를 준비하는 단계, 3번 실행은 연산을 수행하는 단계로 모두 3단계 파이프라인에 속합니다. 따라서 3단계에 해당하지 않는 것은 데이터 읽기 단계인 4번입니다.","676":"정답은 1번 0011 0101 0110입니다. BCD(2진화 10진) 코드는 10진수의 각 자릿수를 독립적으로 4비트 2진수로 변환하는 방식이므로, 356은 3, 5, 6의 세 자리를 각각 따로 4비트로 바꾸면 됩니다. 3은 0011, 5는 0101, 6은 0110이므로 이를 자릿수 순서대로 이어 붙이면 0011 0101 0110이 됩니다. BCD는 일반적인 2진 변환과 달리 각 10진 자릿수를 0000부터 1001(0에서 9)까지의 4비트로만 표현한다는 점이 핵심입니다. 2번, 3번, 4번은 각 자릿수의 4비트 변환이 3, 5, 6과 맞지 않으므로 오답입니다. 따라서 356의 BCD 코드는 0011 0101 0110인 1번입니다.","677":"정답은 1번입니다. 이더넷(Ethernet)은 무선 기술이 아니라 유선 LAN(근거리 통신망)의 대표적인 표준 방식이므로, 이더넷을 가장 대표적인 초광대역(UWB) 무선기술이라고 한 1번은 틀린 설명입니다. UWB는 매우 넓은 주파수 대역을 사용하는 별개의 근거리 무선 기술로 이더넷과 무관합니다. 2번처럼 와이파이(Wi-Fi)는 무선으로 데이터를 전송하는 시스템을 가리키고, 3번처럼 이더넷은 매체에 접근할 때 충돌을 감지해 회피하는 CSMA/CD 방식을 사용하며, 4번처럼 와이파이는 초고속 인터넷 망에 무선 접속 장치(AP)를 설치해 노트북이나 스마트폰을 무선으로 인터넷에 연결하게 해 주므로 모두 옳은 설명입니다. 따라서 이더넷을 UWB 무선기술이라 한 1번이 틀린 설명입니다.","678":"정답은 3번 waitpid입니다. 좀비(zombie) 프로세스는 자식 프로세스가 이미 종료했지만 부모가 그 종료 상태를 회수(수거)하지 않아 프로세스 테이블에 잔여 정보만 남아 있는 상태인데, 부모 프로세스가 wait 또는 waitpid 함수를 호출해 자식의 종료 상태를 회수하면 좀비가 제거됩니다. waitpid는 특정 자식 프로세스를 지정해 그 종료를 기다리고 상태를 거둬들이므로 좀비 정리에 사용됩니다. 1번 unlink는 파일을 삭제하는 함수, 2번 fcntl은 파일 디스크립터의 속성을 제어하는 함수, 4번 system은 셸 명령을 실행하는 함수로 좀비 제거와는 관련이 없습니다. 핵심은 부모가 wait 계열 함수로 자식의 종료 코드를 수거해야 좀비가 사라진다는 점입니다. 따라서 정답은 waitpid인 3번입니다.","679":"정답은 4번 chgrp입니다. 리눅스에서 파일이나 디렉터리가 소속된 그룹(group)을 변경하는 명령어는 chgrp(change group)로, chgrp 그룹이름 파일이름 형태로 사용해 소유 그룹을 바꿉니다. 1번 update는 그런 용도의 표준 파일 명령이 아니고, 2번 chmod는 파일의 접근 권한(읽기 쓰기 실행)을 변경하는 명령이며, 3번 mask는 umask와 혼동을 노린 보기로 그룹 변경 명령이 아닙니다. 참고로 소유자(owner)를 바꿀 때는 chown을 쓰며 chown으로도 그룹을 함께 변경할 수 있지만, 그룹만 변경하는 전용 명령은 chgrp입니다. 따라서 파일 및 디렉터리의 소속 그룹을 변경하는 명령어는 chgrp인 4번입니다.","680":"정답은 3번 대입시간입니다. CPU 스케줄링 알고리즘의 성능을 평가하는 대표적인 기준에는 CPU 이용률(utilization), 처리율(throughput), 총처리 시간(반환 시간, turnaround time), 대기 시간(waiting time), 응답 시간(response time) 등이 있는데, 대입시간이라는 항목은 스케줄링 평가 기준에 해당하지 않습니다. 1번 CPU 이용률은 CPU가 쉬지 않고 일하는 비율을 높이려는 기준, 2번 총처리 시간은 작업 제출부터 완료까지 걸린 전체 시간, 4번 응답 시간은 요청 후 첫 반응이 나오기까지의 시간으로 모두 정당한 평가 기준입니다. 일반적으로 이용률과 처리율은 높이고 총처리 시간, 대기 시간, 응답 시간은 낮추는 것을 목표로 합니다. 따라서 스케줄링 기준이 아닌 것은 대입시간인 3번입니다.","681":"정답은 ARP입니다. ARP(Address Resolution Protocol)는 IP 주소를 물리적 주소인 MAC 주소로 변환하는 프로토콜로, 같은 네트워크 내에서 상대 호스트의 MAC 주소를 알아내 실제 데이터 전송 위치를 식별할 때 사용됩니다. DHCP가 IP를 할당하고 통신을 진행할 때 MAC 주소 기반으로 호스트나 서버의 위치를 찾는 핵심 역할을 ARP가 담당합니다. 반대로 MAC 주소로 IP를 알아내는 것은 RARP라는 점도 함께 기억하면 좋습니다. TCP는 신뢰성 있는 연결형 전송 계층 프로토콜이고, IGRP는 시스코의 거리벡터 라우팅 프로토콜이며, ICP는 캐시 간 통신용 프로토콜(Internet Cache Protocol)로 모두 MAC 주소 변환과는 무관합니다.","682":"정답은 1입니다. static int a[8]={1, 2, 3};은 배열 크기 8 중 앞의 세 원소 a[0], a[1], a[2]에 각각 1, 2, 3을 초기화하고 나머지 원소는 명시적으로 초기화하지 않은 형태입니다. C언어에서 static 배열의 경우 초기화 리스트에 지정되지 않은 나머지 원소들은 자동으로 0으로 초기화됩니다. 따라서 a[5]는 초기화 리스트에 값이 없으므로 0이 됩니다. 즉 보기 1번의 값 0이 정답이며, 나머지 보기 1, 2, 3은 각각 a[0], a[1], a[2]에 해당하는 값일 뿐 a[5]와는 관련이 없습니다.","683":"정답은 1번입니다. 스택은 LIFO(후입선출) 구조이므로 출력이 C, D, B, A가 되려면 다음 순서로 진행해야 합니다. 먼저 push A, push B, push C로 A B C를 쌓고(스택 위가 C), 여기서 pop을 하면 C가 출력됩니다. 이어서 push D 후 pop을 하면 D가 출력되고, 그 다음 스택 위에 남은 B를 pop하면 B, 마지막으로 A를 pop하면 A가 출력되어 C, D, B, A 순서가 완성됩니다. 보기 1번 push, push, push, pop, push, pop, pop, pop이 정확히 이 과정을 나타내므로 정답이고, 나머지 보기들은 출력 순서를 만들 수 없거나 스택이 비어 있는데 pop을 하는 등 잘못된 연산 순서를 담고 있습니다.","684":"정답은 3번 &&입니다. C언어 연산자 우선순위에서 논리 부정 !(단항 연산자)가 가장 높고, 그 다음 산술 연산자인 % 나머지 연산, 이어서 관계/동등 비교 연산자 ==, 그리고 논리 AND인 && 순으로 우선순위가 낮아집니다. 따라서 제시된 네 보기 중 가장 우선순위가 낮은 것은 &&입니다. 우선순위 암기 시 단항(!) > 산술(%) > 관계/동등(==) > 논리(&&, ||) > 대입(=) 순서를 기억하면 도움이 됩니다. 나머지 보기 !, ==, %는 모두 &&보다 우선순위가 높아 먼저 계산되므로 가장 낮은 것이 아닙니다.","685":"정답은 3번입니다. 캡슐화(encapsulation)는 데이터와 그 데이터를 처리하는 연산을 하나의 단위로 묶고 외부에는 인터페이스만 노출하여 내부 구현을 은닉하는 기법입니다. 캡슐화를 적용하면 모듈 내부의 관련 요소가 잘 묶이므로 응집도는 높아지고, 모듈 간의 의존성이 줄어들어 결합도는 오히려 낮아집니다. 따라서 결합도가 높아진다는 3번 설명은 캡슐화의 효과와 반대이므로 옳지 않습니다. 나머지 보기인 응집도 향상(1번), 재사용 용이성(2번), 인터페이스 단순화(4번)는 모두 캡슐화의 올바른 장점이며, 좋은 설계는 응집도는 높고 결합도는 낮은 것을 지향한다는 점을 기억해야 합니다.","686":"정답은 3번 C - D - B - F - G - E - A입니다. 트리 구조를 보면 루트 A 아래에 왼쪽 자식 B와 오른쪽 자식 E가 있고, B는 자식 C와 D를, E는 자식 F와 G를 가집니다. 후위 순회(post-order)는 왼쪽 서브트리, 오른쪽 서브트리, 루트 순으로 방문하므로, 먼저 B의 서브트리를 후위로 돌면 C, D, B가 되고, E의 서브트리를 후위로 돌면 F, G, E가 되며, 마지막에 루트 A를 방문합니다. 이를 이어 붙이면 C, D, B, F, G, E, A가 되어 3번이 정답입니다. 참고로 전위(루트-좌-우)는 A B C D E F G, 중위(좌-루트-우)는 C B D A F E G가 되므로 순회 방식을 구분해 익혀두어야 합니다.","687":"정답은 4번입니다. 소프트웨어 개발에서 구현(implementation) 단계는 앞서 작성된 설계 명세서를 바탕으로 프로그래밍 언어를 사용해 컴퓨터가 이해하고 실행할 수 있는 형태의 코드로 변환하는 과정, 즉 프로그래밍 또는 코딩 단계를 의미합니다. 따라서 설계 명세서에 따라 코딩하는 과정이라는 4번 설명이 가장 적합합니다. 1번은 요구사항 분석/정의 단계, 3번은 시스템 목표를 기술하는 요구사항 정의 단계에 해당하여 구현과 거리가 있고, 2번의 요구사항을 옮기는 과정이라는 표현은 모호하여 구현의 핵심인 코드 변환을 정확히 설명하지 못합니다. 개발 단계는 요구분석, 설계, 구현(코딩), 테스트, 유지보수 순으로 진행된다는 큰 흐름을 기억하면 좋습니다.","688":"정답은 2번 internal variables입니다. C언어의 기억 클래스(storage class)는 변수의 저장 위치와 생존 기간, 유효 범위를 결정하며 auto(automatic), register, static, extern(external) 네 가지가 있습니다. 보기의 automatic variables(자동 변수), register variables(레지스터 변수), static variables(정적 변수)는 모두 정식 기억 클래스에 해당하지만, internal variables(내부 변수)는 C언어의 정식 기억 클래스 종류가 아니므로 정답입니다. 정식 키워드로는 auto, register, static, extern이 있으며, 외부 변수는 extern으로 표현된다는 점을 구분해서 기억해야 합니다. 따라서 internal이라는 분류는 존재하지 않습니다.","689":"정답은 2번입니다. 블랙박스 검사는 프로그램의 내부 구조를 보지 않고 입력에 대한 출력의 정확성, 즉 기능 명세를 기준으로 검증하는 방법입니다. 2번에서 설명한 논리적 조건과 대응하는 행동을 간략히 표현하는 검사 사례 설계 기법은 동치 분할이 아니라 결정 테이블(원인-결과 그래프) 또는 조건 기반 기법에 가까운 설명이며, 동치 분할(equivalence partitioning)은 입력 데이터의 영역을 유효/무효 등 동치 클래스로 나누어 각 클래스의 대표값으로 검사하는 기법이므로 2번 설명은 옳지 않습니다. 1번 기능 작동 입증, 3번 인터페이스/성능/초기화 결함 발견, 4번 경계값 분석은 모두 블랙박스 검사의 올바른 설명입니다. 블랙박스 기법에는 동치 분할, 경계값 분석, 원인-결과 그래프, 오류 예측 등이 있음을 기억하세요.","690":"정답은 2번입니다. 트리의 차수(degree)는 트리 내 모든 노드가 가지는 자식 수 중에서 가장 큰 값을 의미합니다. 제시된 트리에서 루트 A는 자식 B와 C 두 개를 가지고 있고, 다른 노드들도 그 이하의 자식 수를 가지므로 노드가 가질 수 있는 최대 자식 수가 2가 됩니다. 따라서 트리의 차수는 2이며 2번이 정답입니다. 노드의 차수는 그 노드의 자식 수, 트리의 차수는 모든 노드 중 최대 차수라는 정의를 구분해서 기억하면 헷갈리지 않습니다.","691":"정답은 1번 Booch 방법입니다. 제시된 설명처럼 미시적(micro) 개발 프로세스와 거시적(macro) 개발 프로세스를 모두 포함하고, 클래스와 객체를 식별하여 속성과 연산을 정의하며 그들 간의 관계를 식별하는 객체지향 분석 기법은 부치(Booch) 방법의 특징입니다. Wirfs-Brock 방법은 분석과 설계 간의 명확한 구분 없이 고객 명세서를 바탕으로 진행하는 책임 주도(CRC) 기법이고, Jacobson 방법은 유스케이스(use case)를 중심으로 분석하는 기법이며, Coad와 Yourdon 방법은 E-R 다이어그램을 사용해 객체의 행위를 모델링하는 기법입니다. 각 방법론의 대표 키워드(부치-미시/거시 프로세스, 야콥슨-유스케이스, 코드/요던-ER다이어그램, Wirfs-Brock-책임주도)를 연결해 외워두면 좋습니다.","692":"정답은 1번 %p입니다. printf() 함수에서 변환 지정자 %p는 포인터 값, 즉 변수의 메모리 주소를 출력할 때 사용하는 형식으로 보통 16진수 형태로 주소를 표시합니다. 따라서 주소(포인터 값)를 출력하려면 %p를 써야 합니다. %d는 부호 있는 10진 정수, %u는 부호 없는 10진 정수, %c는 단일 문자를 출력하는 형식이므로 주소 출력 용도와는 맞지 않습니다. 자주 쓰는 형식으로 %f는 실수, %s는 문자열, %x는 16진수도 함께 기억해 두면 좋습니다.","693":"정답은 4번 create_timer()입니다. 리눅스 디바이스 드라이버에서 커널 타이머를 다룰 때는 init_timer()로 타이머 구조체를 초기화하고, add_timer()로 타이머를 등록해 동작시키며, del_timer()로 등록된 타이머를 삭제하는 함수들을 사용합니다. 반면 create_timer()는 커널 타이머의 표준 API에 존재하지 않는 함수이므로 관계없는 것입니다. 즉 커널 타이머의 기본 흐름은 초기화(init_timer) - 등록(add_timer) - 만료 후 필요 시 삭제(del_timer)로 이루어진다는 점을 기억하면 정답을 쉽게 가릴 수 있습니다.","694":"정답은 1번 NFS입니다. NFS(Network File System)는 네트워크를 통해 원격 컴퓨터의 파일 시스템을 마치 로컬 디스크처럼 마운트하여 운영체제가 서로 다른 환경에서도 파일을 공유하고 접근할 수 있게 해주는 분산 파일 공유 프로토콜입니다. 따라서 운영체제가 다른 컴퓨터의 파일 시스템을 이용해 파일을 공유하려는 목적에 부합합니다. TFTP는 간단한 파일 전송용 프로토콜로 부트로더 등에서 단순 전송에 쓰이며 파일 시스템 공유와는 다르고, MISC와 ADB는 파일 공유를 목적으로 하는 표준 프로토콜이 아닙니다. 네트워크 파일 공유 하면 NFS(유닉스 계열)와 SMB/CIFS(윈도우 계열)를 떠올리면 됩니다.","695":"정답은 3번입니다. 디바이스 드라이버는 하드웨어 장치와 응용 프로그램 사이에서 입출력을 중계하는 역할을 하므로, 장치에서 수집한 데이터를 처리해 전달하고(1번), 인터럽트를 처리하여 응용 프로그램에 알리며(2번), 입출력 포트의 데이터를 응용 프로그램과 송수신(4번)하는 것이 핵심 처리 루틴입니다. 반면 GUI 환경을 실시간으로 처리하는 것은 그래픽 서브시스템이나 윈도우 매니저, 응용 계층의 역할이지 디바이스 드라이버의 처리 루틴이 아니므로 3번이 정답입니다. 드라이버는 하드웨어 제어와 데이터 입출력, 인터럽트 처리에 집중한다는 점을 기억하세요.","696":"정답은 3번 arch입니다. 리눅스 커널 소스 트리에서 arch 디렉토리는 architecture의 약자로 ARM, x86, MIPS 등 특정 CPU 아키텍처나 플랫폼에 의존적인 코드를 모아 놓은 곳입니다. 따라서 플랫폼에 종속적인 코드를 찾으려면 arch 디렉토리를 보면 됩니다. fs는 파일 시스템 관련 코드, lib는 공용 라이브러리 함수, mm은 메모리 관리(memory management) 관련 코드를 담고 있어 모두 플랫폼 독립적인 일반 커널 기능에 해당합니다. 따라서 플랫폼 의존 코드 모음이라는 조건에 맞는 것은 arch뿐입니다.","697":"정답은 4번 64Mbps입니다. 기억장치의 대역폭(bandwidth)은 단위 시간당 전송 가능한 데이터의 양으로, 한 번 접근에 데이터 워드의 비트 수를 접근 시간으로 나누어 계산합니다. 여기서 데이터 워드가 32비트, 접근 속도가 0.5us(0.5×10의 마이너스 6승 초)이므로 대역폭은 32비트 / 0.5us = 32 / 0.0000005 = 64,000,000bps, 즉 64Mbps가 됩니다. 따라서 4번이 정답입니다. 대역폭 = 워드 크기(비트) ÷ 접근 시간 공식을 적용하면 되고, 0.5us마다 32비트를 전송하므로 1초에 32비트의 200만 배가 전송된다고 생각하면 64Mbps임을 확인할 수 있습니다.","698":"정답은 3번 배시 셸(bash)입니다. 배시(Bourne Again Shell)는 본 셸(Bourne shell)과의 호환성을 유지하면서 명령어 자동 완성, 히스토리, 별칭 등 C 셸과 콘 셸의 편리한 기능을 함께 갖춘 셸로, GPL을 따르는 공개 소프트웨어이며 대부분의 리눅스 배포판에서 기본 셸로 채택되어 자유롭게 사용됩니다. 따라서 본 셸 호환, 편리한 기능, GPL 공개라는 조건을 모두 만족하는 것은 배시 셸입니다. 콘 셸(ksh)은 본 셸 확장이지만 과거 상용 요소가 있었고, C 셸(csh)은 C언어 문법과 유사한 별도 셸이며, 대시 셸(dash)은 가볍고 빠르지만 배시만큼의 편의 기능을 제공하지는 않습니다. 이름의 유래가 Bourne Again이라는 점을 함께 기억하면 좋습니다.","699":"정답은 1번입니다. POSIX 스레드(pthread)에서 뮤텍스 교착상태(deadlock)를 방지하기 위한 실질적 대책으로는 일정 시간만 대기하다 실패를 반환하는 pthread_mutex_timedlock, 락 획득이 즉시 불가능하면 바로 반환하는 pthread_mutex_trylock 등이 사용되며, 또한 일관된 락 획득 순서를 지키는 방법이 활용됩니다. 그런데 보기 1번의 PTHREAD_DEADLOCK_ERRORCHECK 함수는 실제로 존재하지 않는 함수이므로 교착상태 방지 대책으로 옳지 않습니다. 참고로 에러 체크와 관련해서는 PTHREAD_MUTEX_ERRORCHECK 속성을 설정하는 방식이 있을 뿐 PTHREAD_DEADLOCK_ERRORCHECK라는 함수는 없습니다. 4번의 pthread_mutex_lock은 기본 락 함수로, trylock/timedlock과 함께 적절한 전략으로 사용하면 교착상태 회피에 활용될 수 있어 정답에서 제외됩니다.","700":"정답은 4번 /etc/service입니다(일반적으로 /etc/services 파일). 이 파일은 네트워크 서비스에서 사용하는 서비스 이름과 포트 번호, 프로토콜(TCP/UDP) 등의 매핑 정보를 정의해 둔 곳으로, 어떤 포트가 어떤 서비스에 대응하는지를 시스템이 참조할 때 사용하며 일반 사용자가 임의로 수정할 수 없는 시스템 디렉토리/파일에 속합니다. /etc/hosts는 호스트 이름과 IP 주소를 매핑하는 파일, /etc/shadow는 사용자 암호의 암호화된 정보를 저장하는 파일, /etc/fstab은 파일 시스템 마운트 정보를 담은 파일이므로 소켓/프로토콜/포트 정의라는 조건과는 맞지 않습니다. 따라서 포트와 서비스 정의라는 핵심 키워드에 해당하는 것은 /etc/services입니다.","701":"포인터 연산에서 괄호와 역참조(*)의 적용 순서를 정확히 구분하는 문제입니다. p는 배열 a의 시작 주소(a[0])를 가리키므로, *(p+3)은 먼저 포인터를 3칸 이동시켜 a[3]의 주소를 가리킨 뒤 그 값을 읽으므로 40이 됩니다. 반면 *p+3은 단항 연산자 *가 +보다 우선하여 먼저 *p로 a[0]의 값인 10을 읽고 거기에 3을 더하므로 13이 됩니다. 따라서 두 연산의 결과는 차례대로 40, 13이 되어 정답은 1번입니다. 핵심 암기 포인트는 *(p+n)은 a[n] 즉 n번째 원소 값이고 *p+n은 a[0]에 n을 더한 값이라는 점입니다. 2번 13,20과 3번 20,13, 4번 13,40은 두 연산의 적용 순서나 인덱스 계산을 혼동한 오답입니다.","702":"1-주소(단일 주소) 명령어 방식에서는 명령어가 하나의 피연산자 주소만 가지므로, 나머지 한 피연산자와 연산 결과를 임시로 보관할 특수 레지스터가 필요하며 이것이 누산기(어큐뮬레이터, ACC)입니다. 예를 들어 ADD X 명령은 ACC 값과 메모리 X의 값을 더해 그 결과를 다시 ACC에 저장하는 방식으로 동작합니다. 따라서 연산값을 저장하는 장소는 어큐뮬레이터이므로 정답은 1번입니다. 2번 스택은 0-주소(스택 머신) 방식에서 피연산자를 보관하는 구조이고, 3번 PC(프로그램 카운터)는 다음에 실행할 명령어의 주소를 담는 레지스터입니다. 4번 큐는 명령어 연산 결과 저장과 무관한 선입선출 자료구조입니다.","703":"최소항 집합 F(A,B,C)=Σ(0,2,4,5,6)을 카르노맵으로 간소화하는 문제입니다. 최소항 0(000), 2(010), 4(100), 6(110)은 모두 C=0인 항이므로 이 네 개를 묶으면 C'(C 바')으로 묶이고, 남은 5(101)는 4(100)와 인접하여 묶으면 AB'(A·B바)가 됩니다. 따라서 F = AB' + C'로 간소화되어 정답은 2번입니다. 카르노맵에서 1로 채워진 인접 칸을 2의 거듭제곱 단위로 최대한 크게 묶어 변수를 소거하는 것이 핵심입니다. 1번 A'+BC', 3번 A'B+C, 4번 AC'+B는 묶음을 잘못 설정하거나 변수를 잘못 소거한 결과로, 주어진 최소항 전체를 정확히 덮지 못하는 오답입니다.","704":"DVFS는 동작 부하에 맞춰 전압과 주파수를 동시에 조절하여 소비전력을 줄이는 저전력 기술입니다. 소비전력은 대략 P=CV^2f로 표현되어 전압(V)의 제곱과 주파수(f)에 비례하므로, 전압을 낮추면 전력이 크게 줄지만 동시에 회로가 안정적으로 동작할 수 있는 최대 주파수도 함께 낮아져 처리 성능이 떨어집니다. 즉 4번처럼 전압을 낮추고 주파수를 내리면서 동시에 처리 명령어 수를 늘리는 것은 물리적으로 모순되므로 옳지 않은 설명이며 정답은 4번입니다. 1번은 ACPI의 동작 중 전력절감 한계를 보완한다는 배경 설명으로 옳고, 2번은 전력과 주파수가 항상 단순 선형은 아니라는 점에서 옳으며, 3번은 전압과 주파수를 함께 관리한다는 DVFS의 본질을 정확히 설명한 옳은 보기입니다.","705":"자바 연산자 우선순위에 따라 식을 단계별로 계산하는 문제입니다. 식 16+11%2*-5+1에서 우선순위가 높은 나머지(%)와 곱셈(*)을 먼저 계산하는데, 11%2는 11을 2로 나눈 나머지인 1이고 단항 마이너스를 적용한 -5와 곱하면 1*(-5)=-5가 됩니다. 그다음 좌에서 우로 덧셈을 처리하면 16+(-5)+1 = 12가 되므로 정답은 1번입니다. 핵심은 %, *, /가 +, -보다 우선순위가 높고 같은 우선순위는 왼쪽부터 계산한다는 점입니다. 2번 2, 3번 1, 4번 -4는 나머지나 곱셈의 순서를 무시하고 단순히 좌에서 우로 더하거나 부호를 잘못 처리한 오답입니다.","706":"엔디언은 2바이트 이상의 데이터를 메모리에 저장할 때 바이트의 배열 순서를 정하는 방식입니다. 빅엔디언(Big-endian)은 사람이 숫자를 읽는 방식처럼 가장 큰 자리(최상위 바이트, MSB)를 가장 낮은 주소에 먼저 저장하는 방식이므로 정답은 2번입니다. 반대로 리틀엔디언은 최하위 바이트(LSB)를 먼저 저장하며, 이것을 설명한 1번은 리틀엔디언에 해당하는 오답입니다. 예를 들어 0x12345678을 빅엔디언으로 저장하면 낮은 주소부터 12 34 56 78 순으로 들어갑니다. 3번과 4번처럼 중간 바이트가 먼저 저장되거나 하위-상위-중간 순으로 저장되는 방식은 표준 엔디언 정의에 존재하지 않는 잘못된 설명입니다.","707":"버스 대역폭은 단위 시간당 전송 가능한 데이터의 양으로, 클록 주파수에 한 번에 전송하는 데이터 폭(바이트)을 곱해 구합니다. 데이터 폭 64비트는 8바이트이고 클록 주파수가 100MHz이므로, 대역폭 = 100×10^6 × 8바이트 = 800Mbyte/sec가 되어 정답은 4번입니다. 핵심 공식은 대역폭(Byte/s) = 주파수(Hz) × 데이터폭(비트)/8입니다. 1번 200은 데이터 폭을 16비트로, 2번 400은 32비트로 잘못 본 경우이고, 3번 1600은 64비트를 그대로 곱하거나 클록당 2회 전송으로 잘못 계산한 오답입니다.","708":"임베디드 시스템의 부팅은 CPU 리셋 직후 최소한의 초기화 코드 실행으로 시작해 부트로더, 커널, 램디스크 순으로 메모리에 올리는 과정으로 진행됩니다. 순서는 ㉣ CPU 리셋 후 DMA가 4KB 초기화 코드를 CPU 내부 SRAM으로 복사 → ㉡ 그 초기화 코드가 부트로더를 SDRAM으로 복사 → ㉢ 부트로더가 압축된 커널 이미지(zImage)를 해제하여 SDRAM에 로드 → ㉠ 압축된 램디스크를 SDRAM으로 복사 순이므로 정답은 3번(㉣-㉡-㉢-㉠)입니다. 핵심은 가장 먼저 작은 초기화 코드가 내부 SRAM에 올라가야 외부 SDRAM 등을 초기화하고 이후 단계가 가능하다는 점입니다. 나머지 1, 2, 4번은 초기화 코드 적재나 부트로더 복사 순서가 뒤바뀐 오답입니다.","709":"LED 보호저항 값은 전원 전압에서 LED의 순방향 전압강하를 뺀 나머지 전압을 허용 전류로 나누어 옴의 법칙으로 구합니다. 계산하면 R = (5V - 1.6V) / 36mA = 3.4V / 0.036A ≈ 94.4Ω이 되며, 전류가 한계를 넘지 않도록 이보다 같거나 큰 표준 저항을 선택해야 하므로 가장 적절한 값은 100Ω으로 정답은 3번입니다. 핵심 공식은 R = (Vcc - Vf) / I이며, 계산값보다 작은 저항을 쓰면 전류 한계를 초과해 LED가 손상될 수 있습니다. 1번 80Ω, 4번 10Ω은 계산값보다 작아 과전류 위험이 있고, 2번 90Ω도 94.4Ω보다 작아 한계를 약간 넘으므로 100Ω이 가장 안전하고 적절합니다.","710":"3단계 명령어 파이프라인은 명령어 처리를 인출(Fetch), 해독(Decode), 실행(Execute)의 세 단계로 나누어 동시에 처리량을 높이는 구조입니다. 따라서 이 세 단계에 해당하지 않는 것은 4번 데이터 읽기로, 데이터 읽기(메모리 접근)는 4단계나 5단계 파이프라인에서 별도로 분리되는 단계입니다. 일반적인 5단계 RISC 파이프라인은 인출-해독-실행-메모리접근-쓰기로 구성되며, 3단계에서는 메모리 접근과 쓰기가 실행 단계에 통합되어 있습니다. 1번 인출, 2번 해독, 3번 실행은 모두 3단계 파이프라인의 정규 단계이므로 답이 아니고, 별도 단계로 존재하지 않는 4번이 정답입니다.","711":"여러 프로세스가 공유 자원에 접근할 때 동시 접근을 제어하는 커널 동기화 기법 중 세마포어는 정수형 카운터 변수와 P(wait, 감소)와 V(signal, 증가)라는 연산을 갖춰 동시에 자원에 접근 가능한 개수를 셀 수 있어 정답은 1번입니다. 세마포어는 카운팅 기능 덕분에 여러 개의 동일 자원을 관리할 수 있는 것이 특징입니다. 2번 뮤텍스는 단 하나의 잠금을 소유한 스레드만 해제할 수 있는 이진 상호배제 장치로 연산 기능보다는 잠금/해제에 초점이 있고, 3번 조건변수는 특정 조건이 만족될 때까지 대기/통지하는 보조 메커니즘입니다. 4번 플래그는 단순한 상태 표시 변수로 연산 기반 동기화 기능을 제공하지 않습니다.","712":"리눅스 커널 소스 트리에서 arch 디렉토리는 architecture(아키텍처)의 약자로, x86, ARM, MIPS 등 CPU나 플랫폼마다 다른 의존적인 코드를 모아둔 곳이므로 정답은 3번입니다. 이식성을 위해 플랫폼 종속 코드를 arch에 격리하고 나머지는 공통 코드로 유지하는 것이 리눅스 커널 설계의 핵심입니다. 1번 fs는 파일 시스템 관련 코드, 2번 lib는 커널 내부에서 쓰는 공통 라이브러리 함수를 담은 디렉토리입니다. 4번 mn은 실제 리눅스 커널 소스에 존재하지 않는 디렉토리로 오답입니다.","713":"교착상태(데드락) 발생의 네 가지 필요조건은 상호배제, 점유대기, 비선점, 환형대기이며, 예방 기법은 이 중 하나를 무력화하는 방식입니다. 지문에서 설명하는 '필요한 모든 자원을 한 번에 요청하고 전부 받아야만 수행한다'는 방식은 자원을 일부 점유한 채 다른 자원을 기다리는 상황 자체를 없애므로 점유대기(hold and wait) 조건을 방지하는 것이며 정답은 2번입니다. 즉 자원을 쪼개서 요청하지 않게 하여 부분 점유 상태를 막는 것입니다. 1번과 3번 비선점은 이미 할당된 자원을 강제로 빼앗는 방식으로 방지하고, 4번 상호배제는 자원을 공유 가능하게 만들어 방지하는 것이므로 지문 내용과 맞지 않습니다.","714":"pthread API의 각 함수 역할을 정확히 구분하는 문제입니다. pthread_detach는 스레드를 종료시키는 함수가 아니라 호출 스레드를 분리(detach) 상태로 만들어 종료 시 자원이 자동 회수되도록 하고 더 이상 join할 수 없게 하는 함수이므로, '스레드를 종료한다'는 설명은 틀려 정답은 2번입니다. 스레드를 실제로 종료시키는 함수는 pthread_exit이나 pthread_cancel입니다. 1번 pthread_create는 새 스레드를 생성하고, 3번 pthread_join은 대상 스레드가 끝날 때까지 대기하여 종료 상태를 회수(병합)하며, 4번 pthread_cancel은 지정한 스레드에 취소 요청을 보내는 함수로 모두 옳은 설명입니다.","715":"객체지향의 캡슐화는 데이터(속성)와 그것을 다루는 메소드를 하나의 객체로 묶고 내부 구현을 외부로부터 숨기는 기법으로, 잘 설계하면 모듈 간 결합도(coupling)는 낮아지고 모듈 내부 응집도(cohesion)는 높아집니다. 따라서 '결합도가 높아진다'는 설명은 캡슐화의 목적과 정반대이므로 옳지 않으며 정답은 3번입니다. 좋은 소프트웨어는 결합도가 낮고 응집도가 높은 것을 지향한다는 점이 핵심 암기 포인트입니다. 1번 응집도가 높아진다, 2번 재사용이 용이하다, 4번 인터페이스를 단순화한다는 모두 캡슐화로 얻는 올바른 장점입니다.","716":"소프트웨어 개발 생명주기에서 구현(implementation) 단계는 설계 명세서를 바탕으로 실제 프로그래밍 언어로 코드를 작성하여 컴퓨터가 실행 가능한 형태로 변환하는 코딩 과정이므로 정답은 4번입니다. 즉 구현은 '무엇을' 만들지 정한 설계를 '어떻게' 동작하도록 실제로 만들어내는 단계입니다. 1번은 요구사항 정의 단계, 3번은 시스템 목표를 기술하는 요구사항/분석 단계에 해당하는 설명입니다. 2번 요구사항을 옮긴다는 표현은 분석 단계의 활동에 가까워 구현의 본질인 코딩 작업과는 거리가 멀어 오답입니다.","717":"소프트웨어 정형 기술 검토(FTR, Formal Technical Review)는 효율적이고 객관적인 검토를 위해 회의 규모와 범위를 통제하는 것을 원칙으로 합니다. 따라서 '의제와 참가자의 수를 제한하지 않는다'는 4번은 지침과 반대로, 실제 FTR 지침은 의제와 참가자 수를 제한하여 회의가 산만해지지 않게 하라고 권고하므로 거리가 먼 설명이며 정답은 4번입니다. 1번 논쟁과 반박 제한, 2번 문제 영역의 명확한 표현, 3번 제품별 체크리스트 개발은 모두 올바른 FTR 지침입니다. 핵심은 검토는 제품을 검토하는 것이지 개발자를 평가하는 자리가 아니며 회의를 짧고 집중되게 운영해야 한다는 점입니다.","718":"프로토타입(시제품) 모형은 개발 초기에 사용자가 직접 보고 조작할 수 있는 시제품을 만들어 보여주고 피드백을 받아 요구사항을 다듬어가는 모형이므로, 가장 큰 장점은 사용자의 요구사항을 충실히 반영할 수 있다는 점으로 정답은 3번입니다. 사용자가 완성 전에 실제 모습을 확인하므로 요구사항 오해와 시행착오를 줄일 수 있습니다. 1번 전체 공정 이해 용이와 2번 단계별 산출물의 정확성은 폭포수 모형의 특징에 가깝습니다. 4번 4세대 언어로 원시코드를 자동 생성하는 것은 4GL 기법의 특징이지 프로토타입 모형의 본질적 장점은 아니므로 오답입니다.","719":"화이트박스 테스트는 프로그램 내부 구조와 논리 흐름을 보고 검사하는 기법으로 제어 흐름 테스트, 기초 경로 검사(basis path), 데이터 흐름 테스트, 조건 검사 등이 여기에 속합니다. 반면 상태 전이 테스트는 시스템의 외부 동작과 상태 변화를 입력에 따라 검증하는 블랙박스 테스트 기법이므로 화이트박스에 해당하지 않아 정답은 3번입니다. 핵심 구분은 화이트박스는 코드 내부(경로, 조건, 데이터 흐름)를, 블랙박스는 입출력 동작(상태전이, 경계값, 동등분할)을 본다는 점입니다. 1번 제어 흐름, 2번 기초 경로, 4번 데이터 흐름 테스트는 모두 내부 구조를 검사하는 화이트박스 기법이므로 답이 아닙니다.","720":"서미스터(thermistor)는 thermal(열)과 resistor(저항)의 합성어로, 온도가 변하면 그에 따라 전기 저항 값이 민감하게 변하는 감온 저항 소자입니다. 따라서 온도 변화에 응답하는 물리적 요인은 저항이므로 정답은 4번입니다. 온도가 오르면 저항이 감소하는 NTC형과 온도가 오르면 저항이 증가하는 PTC형이 대표적입니다. 1번 전압, 2번 전류는 저항 변화의 결과로 회로에서 측정되는 2차적 양일 뿐 서미스터가 직접 온도에 반응하는 요인이 아니며, 3번 커패시터(정전용량)는 서미스터의 동작 원리와 무관한 오답입니다.","721":"리눅스 커널 모듈을 동작 중인 커널에 적재(insert module)할 때 사용하는 명령은 insmod이며, 모듈 오브젝트 파일(.ko)을 동적으로 커널 공간에 올려 새로운 기능을 추가합니다. 반대로 이미 적재된 모듈을 제거(remove module)할 때는 rmmod를 사용하고, 의존성까지 자동 처리하며 적재/제거하려면 modprobe를 씁니다. 정답 3번 insmod는 단일 모듈을 직접 적재하는 가장 기본적인 명령으로 이 문제의 요구사항인 새 모듈 적재에 정확히 부합합니다. 1번 ksmod와 4번 mkno는 존재하지 않는 명령어이며, 2번 rmmod는 적재가 아니라 제거를 수행하므로 틀립니다. 암기 포인트로 ins=insert(적재), rm=remove(제거)로 구분하면 헷갈리지 않습니다.","722":"세마포어(semaphore)는 여러 프로세스가 공유 자원을 동시에 사용하지 못하도록 상호배제(mutual exclusion)를 보장하는 동기화 기법으로, 한 프로세스가 임계영역의 자원을 사용 중이면 다른 프로세스를 대기시켰다가 자원이 반납되면 진입을 허용합니다. P(wait) 연산으로 세마포어 값을 감소시키며 자원을 획득하고 V(signal) 연산으로 증가시키며 자원을 반납하는 정수 변수 기반 메커니즘입니다. 따라서 정답 2번이 한 자원을 동시에 못 쓰므로 다른 프로세서를 대기시킨다는 세마포어의 본질을 정확히 설명합니다. 1번은 하드웨어 구성 방법으로 세마포어와 무관하고, 3번은 자원을 개수만큼 생성한다는 설명으로 세마포어의 동기화 목적과 다르며, 4번은 메모리 간 빠른 액세스로 DMA 등에 가까운 설명이라 모두 틀립니다. 핵심은 세마포어가 자원 접근을 제어하는 소프트웨어 동기화 도구라는 점입니다.","723":"15.0.0.0/14에서 prefix 14는 서브넷 마스크가 255.252.0.0임을 의미하며, 두 번째 옥텟에서 상위 6비트가 네트워크 부분이고 하위 2비트가 호스트 부분이 됩니다. 따라서 한 블록의 크기는 두 번째 옥텟 기준 4(=256/64가 아니라 2^2)로, 15.0.0.0부터 15.3.255.255까지가 하나의 네트워크 범위가 됩니다. 이 범위에서 마지막 주소 15.3.255.255는 브로드캐스트 주소이므로 호스트에 할당 가능한 마지막 주소는 그보다 하나 작은 15.3.255.254가 되어 정답은 1번입니다. 2번 15.4.255.254, 3번 15.5.255.254, 4번 15.6.255.254는 모두 다음 블록(15.4.0.0/14 이후)에 속하므로 이 네트워크의 범위를 벗어나 틀립니다. 암기 포인트로 /14는 마스크 255.252.0.0이고 두 번째 옥텟이 4단위로 증가한다는 점을 기억하세요.","724":"UDP(User Datagram Protocol)는 비연결형(connectionless) 전송 프로토콜로, 연결 설정 없이 데이터그램을 보내며 흐름제어나 재전송 같은 신뢰성 보장 기능이 없습니다. 체크섬을 통한 최소한의 오류 검출만 선택적으로 제공하고 포트 번호를 이용해 포트 대 포트 전송을 수행하지만, 데이터가 손실되거나 순서가 바뀌어도 이를 복구하지 않습니다. 따라서 신뢰할 수 있는 데이터 전송을 보장한다는 4번 설명은 UDP가 아니라 TCP의 특성이므로 거리가 먼 설명이 되어 정답입니다. 1번 비연결형 IP 전달, 2번 최소한의 신뢰성과 선택적 체크섬, 3번 포트 대 포트 전송은 모두 UDP의 올바른 특징입니다. 핵심은 신뢰성=TCP, 빠르고 단순한 비신뢰성=UDP로 구분하는 것입니다.","725":"VHDL에서 각 문장(statement)의 끝은 세미콜론(;)으로 구분하며, 콜론(:)은 신호나 변수 선언 시 이름과 타입을 구분하거나 레이블을 붙일 때 사용하므로 문장 구분 기호가 아닙니다. 따라서 문장 간 구별을 콜론으로 표시한다는 2번 설명이 틀린 것으로 정답입니다. 1번처럼 VHDL은 대소문자를 구분하지 않으며(case insensitive), 3번처럼 이중 하이픈(--) 이후부터 줄 끝까지는 주석으로 처리되고, 4번처럼 식별자의 첫 문자는 반드시 영문자여야 하며 숫자나 특수문자로 시작할 수 없습니다. 암기 포인트로 문장 종결은 세미콜론, 주석은 더블 하이픈이라는 VHDL 기본 문법을 기억하세요.","726":"8421코드(BCD)는 각 자리 가중치가 8,4,2,1인 표준 코드이고, 2421코드는 가중치가 2,4,2,1인 자기보수(self-complementing) 코드입니다. 10진수 5의 경우 8421코드는 5=4+1이므로 0101이고, 2421코드에서는 가중치 2+2+1=5가 되도록 1011로 표현하므로 2번이 정확히 맞아 정답입니다. 1번은 10진수 3의 2421코드가 0011이어야 하는데 0010(=2)로 잘못 표기했고, 3번은 7의 2421코드가 1101(2+4+1)이어야 하는데 1110으로 틀렸으며, 4번은 9의 2421코드가 1111이어야 하는데 1101로 잘못 표기했습니다. 2421코드는 0~4는 8421과 동일 패턴이고 5~9는 상위 비트를 사용해 9의 보수가 비트 반전으로 얻어지는 특징이 있습니다.","727":"ARM 프로세서에서 LR(Link Register, R14)은 서브루틴이나 함수 호출 시 호출 직후의 복귀 주소(return address)를 저장하는 레지스터로, BL(Branch with Link) 명령 실행 시 다음 명령의 주소가 LR에 자동으로 저장됩니다. 함수 실행이 끝나면 LR에 저장된 주소로 분기하여 원래 프로그램으로 복귀하므로 정답은 2번입니다. 1번 SP(Stack Pointer, R13)는 스택의 최상단 주소를 가리키고, 3번 PC(Program Counter, R15)는 현재 실행 중인 명령의 주소를 담으며, 4번 CPSR은 조건 플래그와 동작 모드 등 프로세서 상태를 저장하는 레지스터입니다. 암기 포인트로 LR=복귀 주소, PC=현재 명령 주소, SP=스택 주소로 구분하면 됩니다.","728":"네트워크 파일 시스템(NFS)은 호스트의 디렉토리를 타깃에 마운트하여 다운로드 과정 없이 파일을 공유하고 실행할 수 있게 해주며, 호스트의 큰 저장 용량을 그대로 활용할 수 있는 장점이 있습니다. 그러나 NFS는 장치 파일(device file)이나 명명 파이프 같은 특수 파일을 네트워크 마운트 디렉토리에 정상적으로 생성하고 동작시키기 어렵다는 제약이 있어, 특수 파일도 생성 가능하다는 3번이 일반적인 장점이 아니므로 정답입니다. 1번 다운로드 없이 타깃에서 사용, 2번 호스트 파일 접근과 실행, 4번 램 디스크에 올리기 큰 파일을 호스트 용량에 의존해 처리하는 것은 모두 NFS의 실제 장점입니다. 임베디드 개발에서 NFS는 루트 파일시스템 공유나 대용량 파일 처리에 유용하지만 디바이스 노드 같은 특수 파일은 타깃 로컬에서 다뤄야 한다는 점을 기억하세요.","729":"파이프라인의 속도 향상은 비파이프라인 처리시간을 파이프라인 처리시간으로 나눈 값으로 계산합니다. k단계 파이프라인에서 n개 명령을 처리할 때 파이프라인 클럭 수는 k+(n-1)이고 비파이프라인은 k×n입니다. 이 문제에서 k=4, n=15이므로 비파이프라인은 4×15=60클럭, 파이프라인은 4+(15-1)=18클럭이 되어 속도 향상은 60/18≈3.33배가 되며, 보기 중 가장 가까운 2번 3.5배가 정답입니다. 1번 2.5배, 3번 1.5배, 4번 4배는 계산값과 차이가 큽니다. 참고로 명령 수 n이 무한히 커지면 속도 향상은 단계 수 k(여기서는 4배)에 수렴하므로 4배는 이론적 최대값일 뿐 15개 명령에서는 도달하지 못합니다.","730":"테스트 오라클(test oracle)이란 테스트를 수행했을 때 나온 실행 결과가 올바른 결과(기대값)인지 아닌지를 판별해 주는 메커니즘 또는 기준을 말합니다. 즉 입력에 대한 정확한 예상 출력을 제공하여 합격/불합격을 판정하는 역할을 하므로 정답은 2번입니다. 1번은 시스템 일부 기능 시험을 위해 소프트웨어를 변경하는 것으로 결함 주입이나 스텁/드라이버에 가까운 설명이고, 3번 테스트에 사용되는 데이터는 테스트 데이터(test data)이며, 4번 테스트 수행에 필요한 모든 것은 테스트 환경이나 테스트 베드를 가리킵니다. 오라클은 참(true) 오라클, 샘플링 오라클, 휴리스틱 오라클 등으로 분류되며 결과 판정의 핵심 도구라는 점을 기억하세요.","731":"Unpacked(언팩) 10진 형식은 각 10진 숫자를 1바이트로 표현하되 상위 4비트(존 비트)에는 보통 F를, 하위 4비트에는 숫자 값을 넣고, 가장 오른쪽 숫자의 존 비트에 부호를 표시합니다. 양수는 C, 음수는 D를 부호로 사용하므로 -199는 1=F1, 9=F9, 마지막 9는 음수 부호 D가 들어가 D9가 되어 전체가 F1 F9 D9 즉 F1F9D9가 되며 정답은 2번입니다. 3번 F1F9C9는 부호가 양수(C)로 잘못되어 +199를 의미하고, 1번과 4번처럼 각 숫자를 여러 바이트로 늘려 표현한 형태는 언팩 형식이 아니라 잘못된 표기입니다. 핵심 암기는 언팩은 한 숫자당 1바이트, 존 비트는 F, 부호는 양수 C 음수 D라는 점입니다.","732":"연산자 우선순위에 따라 곱셈(*)과 나머지(%)가 덧셈(+)보다 먼저 계산되며, 곱셈과 나머지는 같은 우선순위이므로 왼쪽에서 오른쪽으로 순차 계산합니다. 따라서 F = 9*6%5+2는 먼저 9*6=54를 구하고, 54%5는 54를 5로 나눈 나머지 4가 되며, 마지막으로 4+2=6이 되어 정답은 1번 6입니다. 2번 56과 4번 54는 나머지 연산을 무시했거나 덧셈만 했을 때 나오는 오답이고, 3번 11은 우선순위를 잘못 적용한 값입니다. 핵심 암기 포인트는 %(모듈로) 연산이 *와 동일한 우선순위로 덧셈보다 먼저 처리된다는 것과 나머지 연산의 의미입니다.","733":"이 문제는 상태표를 따라 입력 X에 따라 상태를 전이시키면서 거쳐가는 상태들을 추적하는 유한상태기계(FSM) 문제입니다. 시작 상태 a에서 출발하여 주어진 입력 순서에 따라 다음 상태로 이동하며, 각 표의 X=0과 X=1 열의 다음 상태를 참조해 순차적으로 진행한 결과 거쳐가는 상태 변수의 순서가 도출됩니다. 상태표를 따라 전이를 수행하면 a, b, c, d, f 순서로 상태가 진행되어 정답은 1번 a b c d f가 됩니다. 2번 a b c d g, 3번 a b c f g, 4번 a b c g f는 중간 전이 경로에서 표의 다음 상태와 일치하지 않아 틀립니다. 상태표 문제는 시작 상태에서 입력 비트열을 하나씩 적용하며 다음 상태 칸을 정확히 따라가는 것이 핵심이며, 출력 논리값 열은 각 상태에서의 출력(Moore/Mealy)을 나타냅니다."};
function expFor(q){
  if(q.exp&&String(q.exp).trim()) return {text:q.exp, ai:false};
  var a=(typeof AI_EXP!=='undefined')?AI_EXP[q.id]:null;
  if(a&&String(a).trim()) return {text:a, ai:true};
  return null;
}

/* ---------- Tier-1: persistence & review features ---------- */
var QMAP={}; ALL.forEach(function(q){QMAP[q.id]=q;});
var LS={
  get:function(k){try{return JSON.parse(localStorage.getItem('cbt_'+k));}catch(e){return null;}},
  set:function(k,v){try{localStorage.setItem('cbt_'+k,JSON.stringify(v));}catch(e){}},
  del:function(k){try{localStorage.removeItem('cbt_'+k);}catch(e){}}
};
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

/* 진행상황 자동저장 / 이어풀기 */
function saveProgress(){
  if(!S||S.submitted)return;
  LS.set('progress',{ids:S.list.map(function(q){return q.id;}),answers:S.answers,idx:S.idx,mode:S.mode,label:S.label,start:S.start,kind:S.kind,perm:S.perm,limitSec:S.limitSec});
}
function clearProgress(){LS.del('progress');}
function resumeProgress(){
  var p=LS.get('progress'); if(!p||!p.ids)return;
  var list=p.ids.map(function(id){return QMAP[id];}).filter(Boolean);
  if(!list.length){clearProgress();renderHomeExtras();return;}
  S={list:list,answers:p.answers||{},idx:Math.min(p.idx||0,list.length-1),mode:p.mode||'exam',label:p.label,submitted:false,start:p.start||Date.now(),kind:p.kind,perm:p.perm,limitSec:p.limitSec};
  show('quiz'); renderQ(); startTimer();
}
function discardProgress(){if(confirm('진행 중인 풀이 기록을 삭제할까요?')){clearProgress();renderHomeExtras();}}

/* 오답노트 (누적) */
function markResult(q,correct){
  if(!q||!q.ans)return;
  var w=LS.get('wrong')||{};
  if(correct)delete w[q.id]; else w[q.id]=1;
  LS.set('wrong',w);
}
function startWrong(){
  var w=LS.get('wrong')||{};
  var list=Object.keys(w).map(function(id){return QMAP[id];}).filter(function(q){return q&&q.ans&&q.opts.length>=2;});
  if(!list.length){alert('오답노트가 비어 있습니다.\n문제를 풀면 틀린 문제가 자동으로 쌓입니다.');return;}
  beginQuiz(shuffle(list),'❌ 오답노트 복습 '+list.length+'문항',true,'wrong');
}

/* 북마크 */
function isBmk(id){var b=LS.get('bookmarks')||{};return !!b[id];}
function toggleBookmark(){
  if(!S)return; var q=S.list[S.idx]; var b=LS.get('bookmarks')||{};
  if(b[q.id])delete b[q.id]; else b[q.id]=1;
  LS.set('bookmarks',b); updBmkBtn(); renderOMR();
}
function updBmkBtn(){
  var btn=$('bmkBtn'); if(!btn||!S)return; var q=S.list[S.idx]; var on=isBmk(q.id);
  btn.textContent=on?'★':'☆'; btn.classList.toggle('on',on);
}
function startBookmarks(){

/* AI에 물어보기: 질문 형태로 클립보드 복사 */
function stripImg(md){return String(md||'').replace(/!\[[^\]]*\]\([^)]*\)/g,'[이미지 생략]');}
function buildAskPrompt(q){
  var L=[];
  L.push('다음 「임베디드기사 필기」 문제를 풀이해 주세요. 정답이 무엇인지, 왜 그 보기가 정답이고 나머지 보기는 왜 틀렸는지 근거와 함께 자세히 설명해 주세요.');
  L.push('');
  L.push('[문제] '+q.subjectNorm+(q.tag?(' · '+q.tag):'')+' · '+q.setLabel+' '+q.num+'번');
  L.push(stripImg(q.q).trim());
  if(q.opts&&q.opts.length){
    L.push('');
    q.opts.forEach(function(t,i){L.push(CIRC[i]+' '+stripImg(t).trim());});
  } else {
    L.push('');
    L.push('(보기가 원본 이미지 안에 포함되어 텍스트로 제공되지 않습니다.)');
  }
  if(q.ans){
    L.push('');
    L.push('참고로 공개된 정답은 '+CIRC[q.ans-1]+' ('+q.ans+'번) 입니다. 이 정답이 타당한지 검증하고, 타당하다면 그 이유를 설명해 주세요.');
  }
  return L.join('\n');
}
function showToast(msg){
  var t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.textContent=msg; t.className='show';
  clearTimeout(showToast._t); showToast._t=setTimeout(function(){t.className='';},1700);
}
function copyText(txt){
  var ok=function(){showToast('📋 AI 질문이 복사되었습니다');};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok,function(){fallbackCopy(txt,ok);});
  } else { fallbackCopy(txt,ok); }
}
function fallbackCopy(txt,cb){
  try{
    var ta=document.createElement('textarea'); ta.value=txt;
    ta.style.position='fixed'; ta.style.top='-9999px'; ta.setAttribute('readonly','');
    document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0,txt.length);
    document.execCommand('copy'); document.body.removeChild(ta); cb&&cb();
  }catch(e){ alert('복사에 실패했습니다. 텍스트를 직접 선택해 복사해 주세요.'); }
}

};

/* ---------- markdown ---------- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inlineMd(s){
  var out='', re=/!\[([^\]]*)\]\(([^)]+)\)/g, last=0, m;
  while((m=re.exec(s))){
    out += esc(s.slice(last,m.index));
    out += '<img alt="'+esc(m[1])+'" src="'+m[2]+'">';
    last = re.lastIndex;
  }
  out += esc(s.slice(last));
  return out;
}
/* 노트/해설 전용 리치 인라인: 굵게(**), 인라인 코드(`). 문제 보기엔 미적용(C 포인터 코드 보호) */
function inlineRich(s){
  return inlineMd(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
}
function mdToHtmlWith(md, inl){
  if(!md) return '';
  var lines = String(md).replace(/\r/g,'').split('\n'), i=0, html='';
  while(i<lines.length){
    var line=lines[i];
    if(/^```/.test(line)){
      var lang=line.slice(3).trim(), buf=[]; i++;
      while(i<lines.length && !/^```/.test(lines[i])){buf.push(lines[i]);i++;}
      i++;
      html+='<pre><code>'+esc(buf.join('\n'))+'</code></pre>';
    } else if(/^\s*\|.*\|\s*$/.test(line)){
      var rows=[];
      while(i<lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){
        rows.push(lines[i].trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(function(c){return c.trim();}));
        i++;
      }
      var sep = rows.length>1 && rows[1].every(function(c){return /^-+$/.test(c.replace(/\s/g,''));});
      html+='<table>';
      rows.forEach(function(r,ri){
        if(sep && ri===1) return;
        var tag = (sep && ri===0)?'th':'td';
        html+='<tr>'+r.map(function(c){return '<'+tag+'>'+inl(c)+'</'+tag+'>';}).join('')+'</tr>';
      });
      html+='</table>';
    } else if(/^\s*>/.test(line)){
      var buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){buf.push(lines[i].replace(/^\s*>\s?/,''));i++;}
      html+='<blockquote>'+buf.map(inl).join('<br>')+'</blockquote>';
    } else if(/^\s*#{1,6}\s+/.test(line)){
      html+='<div class="md-h">'+inl(line.replace(/^\s*#{1,6}\s+/,''))+'</div>'; i++;
    } else if(/^\s*[-*]\s+/.test(line)){
      var buf=[];
      while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){buf.push(lines[i].replace(/^\s*[-*]\s+/,''));i++;}
      html+='<ul>'+buf.map(function(t){return '<li>'+inl(t)+'</li>';}).join('')+'</ul>';
    } else if(line.trim()===''){
      i++;
    } else {
      var buf=[];
      while(i<lines.length && lines[i].trim()!=='' && !/^```|^\s*\||^\s*>|^\s*#{1,6}\s+|^\s*[-*]\s+/.test(lines[i])){
        buf.push(lines[i]); i++;
      }
      html+='<p>'+buf.map(inl).join('<br>')+'</p>';
    }
  }
  return html;
}
function mdToHtml(md){ return mdToHtmlWith(md, inlineMd); }
function mdRich(md){ return mdToHtmlWith(md, inlineRich); }
/* 해설 평문 → 가독성 마크다운: 정답 강조 + 암기팁 콜아웃 */
function expToMd(t){
  t=String(t||'').trim();
  t=t.replace(/\s*(암기\s*(?:팁|포인트|법)[\s\S]*)$/, function(_,tip){ return '\n\n> 💡 '+tip.trim(); });
  t=t.replace(/((?:따라서\s*)?정답은[^.]*\.)\s*/, '**$1**\n\n');
  return t;
}
function fmtNote(md){ return mdRich(md); }
function fmtExp(text){ return mdRich(expToMd(text)); }

/* ---------- state ---------- */
var S = null; // {list, answers{}, idx, mode, label, submitted}

function $(id){return document.getElementById(id);}
function show(sec){['home','quiz','results','study'].forEach(function(s){$(s).classList.toggle('hide', s!==sec);});}

function goHome(){
  if(S && !S.submitted && Object.keys(S.answers).length>0){
    if(!confirm('진행 중인 시험이 있습니다. 나가시겠습니까?')) return;
  }
  S=null; renderHome(); show('home'); $('topMeta').innerHTML='';
}

function renderHome(){
  var g=$('setGrid'); g.innerHTML='';
  SETS.forEach(function(s){
    var d=document.createElement('div'); d.className='setcard';
    d.onclick=function(){startSet(s.key,s.label);};
    d.innerHTML='<div class="t">'+s.label+'</div><div class="s">총 '+s.count+'문항 · 채점가능 '+s.gradable+'</div>';
    g.appendChild(d);
  });
  var tot=ALL.length, grad=ALL.filter(function(q){return q.ans && q.opts.length>=2;}).length;
  $('statBox').innerHTML='📊 전체 '+tot+'문항 · 채점가능 '+grad+'문항 · '+SETS.length+'개 세트 · 이미지 포함';
  renderHomeExtras();
}

function startSet(key,label){
  var list=ALL.filter(function(q){return q.setKey===key;});
  beginQuiz(list,label,false);
}
function startRandom(n){
  var pool=ALL.filter(function(q){return q.ans && q.opts.length>=2;}).slice();
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  beginQuiz(pool.slice(0,n),'랜덤 모의고사 '+n+'문항',true);
}
function beginQuiz(list,label,shuffled,kind){
  S={list:list, answers:{}, idx:0, mode: $('practiceMode').checked?'practice':'exam',
     label:label, submitted:false, start:Date.now(), kind:kind||'set'};
  // 보기 순서 섞기
  if($('shuffleOpts')&&$('shuffleOpts').checked){
    S.perm={};
    list.forEach(function(q){ if(q.opts&&q.opts.length>1){ S.perm[q.id]=shuffle(q.opts.map(function(_,i){return i;})); } });
  }
  // 실전 제한시간 (실전 모드에서만)
  var tl=$('timeLimit')?Number($('timeLimit').value):0;
  if(S.mode==='exam'&&tl>0){ S.limitSec=tl*60; }
  show('quiz'); renderQ(); startTimer(); saveProgress();
}

/* ---------- quiz render ---------- */
var timer=null;
function startTimer(){
  if(timer) clearInterval(timer);
  timer=setInterval(updMeta,1000); updMeta();
}
function updMeta(){
  if(!S){return;}
  var sec=Math.floor((Date.now()-S.start)/1000);
  var ans=Object.keys(S.answers).length;
  var timeStr;
  if(S.limitSec && !S.submitted){
    var rem=S.limitSec-sec;
    if(rem<=0){
      if(timer)clearInterval(timer);
      S.limitSec=0; S.submitted=true; clearProgress();
      alert('⏰ 제한시간이 종료되어 자동 제출합니다.');
      renderResults(); return;
    }
    var rmm=String(Math.floor(rem/60)).padStart(2,'0'), rss=String(rem%60).padStart(2,'0');
    timeStr='<span style="color:'+(rem<=60?'var(--bad)':'inherit')+';font-weight:700">⏳ '+rmm+':'+rss+'</span>';
  } else {
    var mm=String(Math.floor(sec/60)).padStart(2,'0'), ss=String(sec%60).padStart(2,'0');
    timeStr='⏱ '+mm+':'+ss;
  }
  $('topMeta').innerHTML='<span>'+S.label+'</span><span>'+timeStr+'</span><span>'+ans+' / '+S.list.length+' 답함</span>';
}
function renderQ(){
  var q=S.list[S.idx];
  $('qNo').textContent='Q'+(S.idx+1)+'. ';
  $('qSubj').textContent=q.subjectNorm + (q.tag? ' · '+q.tag : '') + ' · '+q.setLabel+' '+q.num+'번';
  $('qBody').innerHTML=mdToHtml(q.q);
  var sel=S.answers[q.id];
  var revealed = S.submitted || (S.mode==='practice' && sel!=null);
  var oc=$('qOpts'); oc.innerHTML='';
  if(q.opts.length===0){
    oc.innerHTML='<div class="muted small">※ 이 문제의 보기는 위 이미지 안에 표시됩니다 (텍스트 보기 없음).</div>';
  }
  var ord=(S.perm&&S.perm[q.id])?S.perm[q.id]:q.opts.map(function(_,i){return i;});
  ord.forEach(function(origIdx,d){
    var text=q.opts[origIdx]; var n=origIdx+1;
    var div=document.createElement('div'); div.className='opt';
    if(sel===n) div.classList.add('sel');
    if(revealed){
      if(q.ans===n) div.classList.add('correct');
      else if(sel===n) div.classList.add('wrong');
    }
    div.innerHTML='<div class="num">'+CIRC[d]+'</div><div>'+inlineMd(text)+'</div>';
    div.onclick=function(){ if(S.submitted) return;
      if(S.mode==='practice' && S.answers[q.id]!=null) return; // lock after answer in practice
      S.answers[q.id]=n;
      if(S.mode==='practice'){ markResult(q, n===q.ans); recordStat(q, n===q.ans); }
      saveProgress(); renderQ(); renderOMR(); updMeta();
    };
    oc.appendChild(div);
  });
  // feedback
  var fb=$('qFeed'); fb.className='feedback';
  if(revealed && q.ans){
    if(sel===q.ans){ fb.classList.add('show','good'); fb.innerHTML='✅ 정답입니다.'; }
    else if(sel!=null){ fb.classList.add('show','bad'); fb.innerHTML='❌ 오답 · 정답은 '+CIRC[q.ans-1]+' 입니다.'; }
    else { fb.classList.add('show','bad'); fb.innerHTML='⚠ 미응답 · 정답은 '+CIRC[q.ans-1]+' 입니다.'; }
    var ex=expFor(q);
    if(ex) fb.innerHTML+='<div class="expl mdnote">'+(ex.ai?'<div class="exp-h">🤖 AI 해설</div>':'')+fmtExp(ex.text)+'</div>';
  }
  if(revealed && !q.ans){
    fb.classList.add('show'); fb.style.background='var(--panel2)';
    fb.innerHTML='<span class="muted">이 문제는 원본에 정답이 표기되어 있지 않습니다.</span>';
  }
  $('prevBtn').disabled = S.idx===0;
  $('nextBtn').disabled = S.idx===S.list.length-1;
  renderOMR();
  updBmkBtn();
  saveProgress();
}
function renderOMR(){
  var o=$('omr'); o.innerHTML='';
  S.list.forEach(function(q,k){
    var c=document.createElement('div'); c.className='cell';
    c.textContent=k+1;
    if(S.answers[q.id]!=null) c.classList.add('answered');
    if(isBmk(q.id)) c.classList.add('flag');
    if(k===S.idx) c.classList.add('cur');
    if(S.submitted && q.ans){
      c.classList.remove('answered');
      c.classList.add(S.answers[q.id]===q.ans?'ok':'no');
    }
    c.onclick=function(){S.idx=k;renderQ();};
    o.appendChild(c);
  });
}
function move(d){var n=S.idx+d; if(n<0||n>=S.list.length)return; S.idx=n; renderQ();}
function clearAns(){var q=S.list[S.idx]; if(S.mode==='practice'&&S.submitted)return; delete S.answers[q.id]; renderQ(); updMeta();}

/* ---------- submit / results ---------- */
function submitQuiz(){
  var unanswered=S.list.filter(function(q){return q.ans && q.opts.length>=2 && S.answers[q.id]==null;}).length;
  if(unanswered>0 && !confirm('미응답 '+unanswered+'문항이 있습니다. 제출하시겠습니까?')) return;
  S.submitted=true; if(timer)clearInterval(timer);
  clearProgress();
  renderResults();
}
function renderResults(){
  var gradable=S.list.filter(function(q){return q.ans && q.opts.length>=2;});
  gradable.forEach(function(q){
    var correct=S.answers[q.id]===q.ans;
    markResult(q, correct);
    if(S.mode==='exam' && S.answers[q.id]!=null) recordStat(q, correct);
  });
  var correct=gradable.filter(function(q){return S.answers[q.id]===q.ans;}).length;
  var pct = gradable.length? Math.round(correct/gradable.length*100):0;
  // per subject
  var subj={};
  gradable.forEach(function(q){
    var s=q.subjectNorm; subj[s]=subj[s]||{c:0,t:0};
    subj[s].t++; if(S.answers[q.id]===q.ans) subj[s].c++;
  });
  var subjKeys=Object.keys(subj);
  var anyFail=subjKeys.some(function(k){return subj[k].t>=5 && subj[k].c/subj[k].t<0.4;});
  var passed = pct>=60 && !anyFail;
  var sec=Math.floor((Date.now()-S.start)/1000);
  var mm=Math.floor(sec/60), ss=sec%60;
  var color = pct>=60?'var(--ok)':(pct>=40?'var(--warn)':'var(--bad)');
  var html='<div class="row" style="justify-content:space-between;align-items:flex-end">'+
    '<div><div class="muted">'+S.label+'</div><div class="score" style="color:'+color+'">'+pct+'점</div>'+
    '<div class="muted small">'+correct+' / '+gradable.length+' 정답 · 소요 '+mm+'분 '+ss+'초</div></div>'+
    '<div><span class="tag '+(passed?'pass':'fail')+'" style="font-size:15px;padding:6px 14px">'+
       (passed?'합격 예상':'불합격 예상')+'</span></div></div>'+
    '<div class="bar"><i style="width:'+pct+'%;background:'+color+'"></i></div>';
  if(subjKeys.length>1){
    html+='<div style="margin-top:16px"><b>과목별 결과</b> <span class="muted small">(과목 40% 미만 시 과락)</span>';
    subjKeys.forEach(function(k){
      var o=subj[k], p=Math.round(o.c/o.t*100), fail=o.t>=5&&p<40;
      html+='<div class="subjrow"><span>'+k+'</span><span class="row"><span class="muted small">'+o.c+'/'+o.t+'</span>'+
        '<b style="color:'+(p>=60?'var(--ok)':p>=40?'var(--warn)':'var(--bad)')+'">'+p+'%</b>'+
        (fail?'<span class="tag fail">과락</span>':'')+'</span></div>';
    });
    html+='</div>';
  }
  $('scoreCard').innerHTML=html;
  var snw=$('studyNextWrap');
  if(snw){
    if(S.studyCtx){
      var subj2=S.studyCtx.subject, ni=S.studyCtx.idx+1, has=(CONCEPTS[subj2]||[])[ni];
      snw.innerHTML='<button class="btn ok" onclick="studyContinue(\''+jsq(subj2)+'\','+ni+')">'+(has?'📚 다음 개념 학습 ▶':'📚 개념 학습 완료 — 목록으로')+'</button>';
    } else snw.innerHTML='';
  }
  show('results'); renderReview();
  $('topMeta').innerHTML='<span>'+S.label+'</span><span>채점 완료</span>';
}
function renderReview(){
  var wrongOnly=$('wrongOnly').checked, box=$('review'); box.innerHTML='';
  S.list.forEach(function(q,k){
    var sel=S.answers[q.id], ok=(sel===q.ans);
    if(wrongOnly && (ok || !q.ans)) return;
    var d=document.createElement('div'); d.className='card'; d.style.margin='12px 0';
    var head='<div class="qhead"><span class="qno" style="font-size:16px">Q'+(k+1)+'</span>'+
      '<span class="row" style="gap:6px"><span class="chip">'+q.subjectNorm+' · '+q.setLabel+' '+q.num+'번'+
      (q.ans? (ok?' · <span style="color:var(--ok)">정답</span>':' · <span style="color:var(--bad)">오답</span>') : ' · <span class="muted">정답없음</span>')+
      '</span><button class="askbtn" onclick="openAskMenu(event,'+q.id+')" title="AI에게 질문 (GPT/Gemini/Claude)">🤖</button></span></div>';
    var body='<div class="qbody">'+mdToHtml(q.q)+'</div><div class="opts">';
    q.opts.forEach(function(t,oi){
      var n=oi+1, cls='opt';
      if(q.ans===n) cls+=' correct'; else if(sel===n) cls+=' wrong';
      body+='<div class="'+cls+'"><div class="num">'+CIRC[oi]+'</div><div>'+inlineMd(t)+
        (sel===n?' <span class="muted small">(내 선택)</span>':'')+'</div></div>';
    });
    body+='</div>';
    var rex=expFor(q);
    if(rex) body+='<div class="feedback show" style="background:var(--panel2)"><div class="exp-h">'+(rex.ai?'🤖 AI 해설':'해설')+'</div><div class="expl mdnote">'+fmtExp(rex.text)+'</div></div>';
    d.innerHTML=head+body;
    box.appendChild(d);
  });
  if(!box.children.length) box.innerHTML='<div class="muted small" style="padding:10px">표시할 문제가 없습니다. 🎉</div>';
}

/* keyboard */
document.addEventListener('keydown',function(e){
  if($('quiz').classList.contains('hide')||!S||S.submitted) return;
  if(e.key==='ArrowLeft') move(-1);
  else if(e.key==='ArrowRight') move(1);
  else if(['1','2','3','4'].includes(e.key)){
    var q=S.list[S.idx];
    var p=Number(e.key)-1;
    var ord=(S.perm&&S.perm[q.id])?S.perm[q.id]:null;
    var origIdx=ord?ord[p]:p;
    if(origIdx!=null && q.opts.length>origIdx && !(S.mode==='practice'&&S.answers[q.id]!=null)){
      var n=origIdx+1;
      S.answers[q.id]=n;
      if(S.mode==='practice'){ markResult(q, n===q.ans); recordStat(q, n===q.ans); }
      renderQ(); updMeta();
    }
  }
});

applyTheme();
renderHome(); show('home');

/* 서비스 워커 등록: 웹(https)에서 재배포 즉시 반영 + 오프라인. 앱(file://)에선 미등록 */
if('serviceWorker' in navigator && location.protocol==='https:'){
  try{
    var __hadCtrl = !!navigator.serviceWorker.controller;
    navigator.serviceWorker.register('sw.js').then(function(reg){
      reg.addEventListener('updatefound', function(){
        var nw = reg.installing;
        if(nw) nw.addEventListener('statechange', function(){
          // 이미 워커가 제어 중이던 페이지에 새 버전이 활성화되면 1회 새로고침
          if(nw.state==='activated' && __hadCtrl){ location.reload(); }
        });
      });
    })['catch'](function(){});
  }catch(e){}
}
</script>
